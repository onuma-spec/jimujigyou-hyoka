<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>富田林市 事務事業優先度評価ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.8;margin-top:3px}

.sbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sb{padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.sb-k{background:#dcfce7;color:#16a34a}
.sb-h{background:#fee2e2;color:#dc2626}
.sb-f{background:#fef3c7;color:#d97706}
.sb-u{background:#f3f4f6;color:#6b7280}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.frow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.frow select{flex:1;min-width:130px;padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:.85rem;background:#fff}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:10px}

.batch{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:12px}
.batch h3{font-size:.85rem;color:#1e40af;margin-bottom:8px}
.bbtns{display:flex;gap:8px;flex-wrap:wrap}

.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:6px 12px;font-size:.8rem}

.pbwrap{background:#e5e7eb;border-radius:4px;height:6px;margin-bottom:12px}
.pbfill{background:#1e40af;height:100%;border-radius:4px;transition:width .3s}

.ecard{background:#fff;border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #e5e7eb;transition:border-color .2s}
.ecard.rk{border-left-color:#22c55e}
.ecard.rh{border-left-color:#ef4444}
.ecard.rf{border-left-color:#f59e0b}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.72rem;font-weight:600}
.troot-法定義務あり{background:#dbeafe;color:#1d4ed8}
.troot-裁量{background:#fef3c7;color:#92400e}
.troot-不明{background:#f3f4f6;color:#6b7280}
.tcls{background:#f3e8ff;color:#7c3aed}
.tev{background:#f0fdf4;color:#15803d}
.tpdf{background:#e0f2fe;color:#0369a1}

.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}
.ename{font-size:1.15rem;font-weight:700;color:#111827;margin-bottom:6px;line-height:1.3}
.ebudget{font-size:.9rem;margin-bottom:10px}
.ebudget .amt{font-weight:700;font-size:1.05rem;color:#1e40af}
.ebudget .bdg-lbl{font-size:.78rem;color:#6b7280;margin-right:4px}
.edesc h4{font-size:.8rem;color:#6b7280;margin-bottom:4px}
.edesc p{font-size:.88rem;line-height:1.65;color:#374151;margin-bottom:10px}
.edetail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.edi{background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:3px 8px;font-size:.8rem}
.edi label{color:#9ca3af;margin-right:3px}

.rbtns{display:flex;gap:10px;margin:16px 0}
.rbtn{flex:1;padding:12px 6px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:#f9fafb;color:#374151;text-align:center;transition:all .15s;line-height:1.4}
.rbtn:hover{border-color:#9ca3af}
.rbtn small{display:block;font-size:.7rem;font-weight:400;margin-top:2px;opacity:.8}
.rbtn.ak{background:#22c55e;color:#fff;border-color:#22c55e}
.rbtn.ah{background:#ef4444;color:#fff;border-color:#ef4444}
.rbtn.af{background:#f59e0b;color:#fff;border-color:#f59e0b}

.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kbox .klbl{font-size:.75rem;color:#6b7280;margin-bottom:6px}
.kbox .knum{font-size:1.7rem;font-weight:700}
.kbox .kbdg{font-size:.85rem;font-weight:600;margin-top:3px}
.kh .knum,.kh .kbdg{color:#dc2626}
.kf .knum,.kf .kbdg{color:#d97706}
.kk .knum,.kk .kbdg{color:#059669}
.ku .knum,.ku .kbdg{color:#6b7280}

.ssec{background:#fff;border-radius:8px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ssec summary{padding:12px 16px;cursor:pointer;font-weight:600;font-size:.9rem;list-style:none;display:flex;justify-content:space-between;user-select:none}
.ssec summary:hover{background:#f9fafb}
.ssec summary::after{content:'▶';font-size:.75rem;color:#9ca3af;transition:transform .2s}
.ssec[open] summary::after{transform:rotate(90deg)}
.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:7px 10px;text-align:left;font-weight:600;white-space:nowrap}
.stbl td{padding:7px 10px;border-top:1px solid #e5e7eb;vertical-align:middle}
.stbl tr:hover td{background:#fafafa}

.note{font-size:.75rem;color:#9ca3af;margin-top:12px;line-height:1.6}
.nstrip{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.nstrip h2{font-size:1rem;font-weight:700;flex:1;text-align:center}
.done-msg{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:16px;text-align:center;margin-bottom:12px}
.done-msg h3{color:#065f46;font-size:1rem;margin-bottom:8px}
.tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.tag-item{display:flex;flex-direction:column;gap:3px}
.tag-lbl{font-size:.68rem;color:#9ca3af;font-weight:500;letter-spacing:.02em}
.field-lbl{font-size:.78rem;color:#9ca3af;margin-right:3px}

@media(max-width:560px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .rbtns{flex-direction:column}
  .bbtns{flex-direction:column}
  .frow select{min-width:100%}
}
@media print{
  .no-print{display:none!important}
  .nstrip button{display:none!important}
  body{background:#fff}
  #app{padding:0;max-width:100%}
  .ssec{box-shadow:none;border:1px solid #e5e7eb}
  details>div{display:block!important}
  .kbox{box-shadow:none;border:1px solid #e5e7eb}
}
</style>
</head>

グ、生活資金の貸付、退会・健康増進給付事業を実施する。事業の一部は外部委託するなど福利厚生事業の効率的な運用に努める。また、事業の運営については、「富田林市職員の厚生制度に関する条例」及び「富田林市職員福利厚生会規約」に基づき適正かつ効率的に行う。","pdf":"令和7年度事業評価シート（市長公室）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":22106,"name":"とんだばやしふるさと寄附金事務","bureau":"市長公室","dept":"都市魅力課","budget":62871,"next_budget":89059,"root":"裁量","cls":"（経営的施策1） 効率的・効果的な行財政運営","ev":"充実","ev_detail":"","gai":"","legal":"","law":"","desc":"官民協働により一定額以上の寄附者に対し、特産品等を贈呈。総務省の定める地場産品基準に適合した返礼品を提供できる協力事業者を募り、返礼品の充実を図る。平成29年度よりふるさと寄附金事務について一部を委託。令和元年6月の地方税法の一部改正に伴い、対象自治体の指定や返礼品の規制などについて法定化された。","pdf":"令和7年度事業評価シート（市長公室）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":22111,"name":"広報シティセールス事業","bureau":"市長公室","dept":"都市魅力課","budget":44643,"next_budget":42064,"root":"法定義務あり","cls":"（基本施策1） 参加と協働のためのしくみづくり","ev":"継続","ev_detail":"","gai":"","legal":"規則等","law":"広報とんだばやし発行規程","desc":"広報とんだばやし（月１回）を発行・配布し、市政の現状や課題についての情報提供をタイムリーに実施する。また、市ウェブサイト、ＳＮＳ（フェイスブック、LINE公式アカウントの活用、市内掲示板や各メディアへの情報提供などを通じて、市政情報や市の魅力を広く発信する。","pdf":"令和7年度事業評価シート（市長公室）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":22112,"name":"市民相談事務","bureau":"市長公室","dept":"都市魅力課","budget":8634,"next_budget":9586,"root":"裁量","cls":"（経営的施策1） 効率的・効果的な行財政運営","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"市政全般にわたっての意見や要望などの受付や調整・処理を行うとともに、市民の日常生活上の問題について相談に応じる「市民・行政相談」の実施や弁護士などの専門家が、相続・訴訟・登記など特定の分野について相談に応じる「専門相談」を実施しています。また、市政の各種施策立案の基礎資料を得るため、広聴機能の充実を目的とし、市政モニター制度や、広く市民のみなさまにアンケート調査を実施しています。","pdf":"令和7年度事業評価シート（市長公室）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":22149,"name":"情報公開事業","bureau":"市長公室","dept":"都市魅力課","budget":199,"next_budget":910,"root":"法定義務あり","cls":"（基本施策1） 参加と協働のためのしくみづくり","ev":"継続","ev_detail":"","gai":"","legal":"規則等","law":"個人情報保護法・開示しなくてはならない旨の規程","desc":"情報公開制度、個人情報保護制度の適切な運用を図ります。","pdf":"令和7年度事業評価シート（市長公室）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/atta u":"健康推進部","dept":"保険年金課","budget":23190,"next_budget":36830,"root":"裁量","cls":"（個別施策7） 主体的な健康づくりの推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"後期高齢者医療制度を実施するにあたって、賦課及び保険証等の年次更新を行うために必要な事務にかかるもの。被保険者証の年次更新や減額（限度額）認定証、保険料額決定通知書等の被保険者への送付、給付等に関する手続き及び被保険者管理を行うためのシステムの保守委託等を行う。根拠法令：高齢者の医療の確保に関する法律","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":812201,"name":"徴収事務","bureau":"健康推進部","dept":"保険年金課","budget":7833,"next_budget":8516,"root":"法定義務あり","cls":"（個別施策7） 主体的な健康づくりの推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"後期高齢者医療制度を実施するにあたって、大阪府後期高齢者医療広域連合によって算定された保険料額について、適切な収納管理を行うもの。また、未納者に対する督促状や催告書の送付、口座振替納付の推進等により、収納率の向上を図るとともに、自主納付の推進を図る。根拠法令：高齢者の医療の確保に関する法律","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":822101,"name":"後期高齢者医療広域連合納付金","bureau":"健康推進部","dept":"保険年金課","budget":2380835,"next_budget":2433314,"root":"法定義務あり","cls":"（個別施策7） 主体的な健康づくりの推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"後期高齢者医療制度は都道府県単位で市町村が参画する広域連合が保険者となっており、本市は大阪府後期高齢者医療広域連合へ参画している。本事業は、保険者である広域連合が被保険者への保険給付やそれに伴う事務等を行うにあたっての諸費用を市が収納した保険料を含めて広域連合へ納入している。根拠法令：高齢者の医療の確保に関する法律","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":832101,"name":"保険料還付金","bureau":"健康推進部","dept":"保険年金課","budget":2978,"next_budget":3200,"root":"法定義務あり","cls":"（個別施策7） 主体的な健康づくりの推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"保険料の納め過ぎがあった場合、過徴収となっている保険料（過誤納金）を確認し、速やかに還付する。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":832102,"name":"還付加算金","bureau":"健康推進部","dept":"保険年金課","budget":431,"next_budget":50,"root":"法定義務あり","cls":"（個別施策7） 主体的な健康づくりの推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"保険料の納め過ぎがあった場合、過徴収となっている保険料（過誤納金）については、準用する地方税法第１７条の規定に基づき遅滞なく還付することとされている。また、その際、同 ら生じる利子収入の積立てを行う。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":32113,"name":"高齢者福祉事務","bureau":"健康推進部","dept":"高齢介護課","budget":5377,"next_budget":11052,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"高齢者施策に関する各種申請に対する通知書の発送、消耗品の購入等の一般事務。また、入院・入所中の高齢者が一時帰宅する際に特殊寝台を貸与する業者への委託業務を行う。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":32117,"name":"配食サービス事業","bureau":"健康推進部","dept":"高齢介護課","budget":29556,"next_budget":30047,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"概ね65歳以上の単身世帯、高齢者のみの世帯、これに準ずる世帯で、老衰、心身の障害、傷病等の理由により食事の調理が困難な者に、週5回、昼食を配食し、同時に安否確認を行う。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":32120,"name":"街かどデイハウス事業","bureau":"健康推進部","dept":"高齢介護課","budget":4414,"next_budget":4540,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"外部委託可能","legal":"","law":"","desc":"要介護・要支援に該当しない65歳以上の在宅高齢者に対して、住民参加による柔軟できめ細かな介護サービス（給食や健康チェック、健康体操、その他日常生活の向上に資する事業など）を提供する街かどデイハウス運営団体への補助金事業。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":32122,"name":"訪問理容サービス運営事業","bureau":"健康推進部","dept":"高齢介護課","budget":16,"next_budget":20,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"介護保険での認定が介護度４以上の者で、座位（家族での介助による場合も含む。）が保つことができる者の居宅への訪問による、理髪サービス。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":32125,"name":"指定介護予防支援事業","bureau":"健康推進部","dept":"高齢介護課","budget":27777,"next_budget":28388,"root":"法定義務あり","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"要介護認定の要支援１又は２の認定を受けた者が、自宅で介護予防のためのサービスを適切に利用できるよう、ケアプラン（介護予防サービス計画）の作成や、サービス事業所との連絡・調整などを行う（原案作成は指定居宅 tps://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":39114,"name":"社会福祉法人生計困難者対策補助事業","bureau":"健康推進部","dept":"高齢介護課","budget":0,"next_budget":0,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"市は利用申請のあった低所得の生計困難者に、審査後に確認証を発行し、利用者は負担軽減を実施する社会福祉法人の介護保険サービスを利用する際に確認証を提示することにより、利用料軽減（利用料の1/4軽減等）を受けることができる。社会福祉法人は市町村に申請することにより、減免額の一部分の補助（一定額を超えた1/2等）を受けることができる。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":39116,"name":"介護保険利用者負担助成事業","bureau":"健康推進部","dept":"高齢介護課","budget":0,"next_budget":0,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"低所得の生計困難者は、対象となる介護サービスを利用した場合、申請書に添付書類を添えて市に申請し、市は要件を審査したうえで、利用者負担額の1/2を、高額介護サービス費を控除したのちに利用者に助成する。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":42164,"name":"高齢者保健事業","bureau":"健康推進部","dept":"高齢介護課","budget":4798,"next_budget":7897,"root":"法定義務あり","cls":"（個別施策7） 主体的な健康づくりの推進","ev":"継続","ev_detail":"","gai":"","legal":"法令","law":"高齢者の医療の確保に関する法","desc":"高齢者の医療の確保に関する法律第125条１項に基づき、大阪府後期高齢者医療広域連合が策定する広域計画等を踏まえ、高齢者保健事業を実施する。KDBシステムに格納されている被保険者の健診・医療・介護等のデータから、地域全体の健康課題を整理・分析し、健康課題の解決に向けて、関係課・関係医療団体と連携した取り組みを行う。要介護状態のハイリスクとなる生活習慣病の重症化予防やフレイルの進行の予防につながる取り組みとして個人や地域全体への健康支援（健康教育・健康相談・保健指導等）を行う。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":712101,"name":"介護保険管理事務","bureau":"健康推進部","dept":"高齢介護課","budget":21383,"next_budget":35029,"root":"裁量","cls":"（個別施策10） 高齢者福祉の推進","ev":"継続","ev_detail":"","gai":"","legal":"","law":"","desc":"介護保険被保険者の資格管理（台帳整備、被保険者証の送付等）、介護保険システムの保守委託、介護保険制度の趣旨普及等、介護保険に係る事務全般を行う。","pdf":"令和7年度事業評価シート（健康推進部）","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":712201,"name":"賦課徴収事務","bureau":"健康推進部","dept":"高齢介護課","budget":13984,"next_budget":17397,"root":"法定義務あり" function fmt(y){
  if(y>=100000) return (y/100000).toFixed(1)+'億円';
  if(y>=1000)   return (y/1000).toFixed(1)+'百万円';
  return y+'千円';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rootCls(r){ return 'troot-'+r.split('/').join('-'); }

const state = {
  ratings: JSON.parse(localStorage.getItem('tondabayashi7_ratings')||'{}'),
  filters: {bureau:'',root:'',pdf:'',gai:'',cls:'',ev:'',rating:''},
  screen: 'filter',
  queue: [],
  pos: 0,
};
function save(){ localStorage.setItem('tondabayashi7_ratings', JSON.stringify(state.ratings)); }

function getFiltered(){
  return EVENTS.filter(e=>{
    if(state.filters.bureau && e.bureau!==state.filters.bureau) return false;
    if(state.filters.root   && e.root!==state.filters.root)     return false;
    if(state.filters.pdf    && e.pdf!==state.filters.pdf)       return false;
    if(state.filters.gai    && e.gai!==state.filters.gai)       return false;
    if(state.filters.cls    && e.cls!==state.filters.cls)       return false;
    if(state.filters.ev     && e.ev!==state.filters.ev)         return false;
    if(state.filters.rating==='未評価' && state.ratings[e.no]) return false;
    if(state.filters.rating && state.filters.rating!=='未評価' && state.ratings[e.no]!==state.filters.rating) return false;
    return true;
  });
}

function stats(evts){
  const k=evts.filter(e=>state.ratings[e.no]==='続行');
  const h=evts.filter(e=>state.ratings[e.no]==='廃止');
  const f=evts.filter(e=>state.ratings[e.no]==='見直し');
  const u=evts.filter(e=>!state.ratings[e.no]);
  const sum=a=>a.reduce((s,e)=>s+e.budget,0);
  return {k:{c:k.length,b:sum(k)},h:{c:h.length,b:sum(h)},f:{c:f.length,b:sum(f)},u:{c:u.length,b:sum(u)},
          total:{c:evts.length,b:sum(evts)}};
}

function setFilter(k,v){ state.filters[k]=v; if(state.screen==='filter') renderFilter(); }
function clearFilters(){ state.filters={bureau:'',root:'',pdf:'',gai:'',cls:'',ev:'',rating:''}; renderFilter(); }

function batchRate(r){
  getFiltered().forEach(e=>{ state.ratings[e.no]=r; });
  save(); renderFilter();
}

function startCards(){
  state.queue = getFiltered().map(e=>e.no);
  if(!state.queue.length){ alert('対象事業がありません'); return; }
  const first = state.queue.findIndex(n=>!state.ratings[n]);
  state.pos = first>=0 ? first : 0;
  state.screen='card'; render();
}

function rateCard(r){
  const no=state.queue[state.pos];
  if(!no) return;
  state.ratings[no]=r; save();
  if(state.pos < state.queue.length-1){ state.pos++; renderCard(); }
  else { renderCard(); }
}
function prevCard(){ if(state.pos>0){ state.pos--; renderCard(); } }
function nextCard(){ if(state.pos<state.queue.length-1){ state.pos++; renderCard(); } }
function showFilter(){ state.screen='filter'; render(); }
function showSummary(){ state.screen='summary'; render(); }
function resetAll(){ if(confirm('全評価をリセットしますか？')) { state.ratings={}; save(); render(); } }

function opts(key){ return [...new Set(EVENTS.map(e=>e[key]))].filter(Boolean).sort(); }
function selHtml(fkey,label,val){
  const os=opts(fkey).map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`).join('');
  const dis=os?'':'disabled';
  return `<select ${dis} title="${label}" onchange="setFilter('${fkey}',this.value)"><option value="">全ての${label}</option>${os}</select>`;
}

function rcls(no){ const r=state.ratings[no]; return r==='続行'?'rk':r==='廃止'?'rh':r==='見直し'?'rf':''; }
function rBtnCls(no,r){ const c=state.ratings[no]===r; return c?(r==='続行'?'ak':r==='廃止'?'ah':'af'):''; }
function rBtnDesc(no,r){
  const d={'続行':'活動内容と予算に納得','廃止':'活動内容に納得できない','見直し':'予算に納得できない'};
  return state.ratings[no]===r ? '◀ 選択中' : d[r];
}

<div class="card">

<div class="batch">

}

      <button class="btn btn-sm btn-p" onclick="showSummary()">サマリー →</button>
    </div>
    <div style="font-size:.82rem;color:#6b7280;margin-bottom:6px">評価済み: ${done}/${total}件 (${pct}%)</div>
    <div class="pbwrap"><div class="pbfill" style="width:${pct}%"></div></div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:4px 0 8px">
    ${allDone?`<div class="done-msg"><h3>✓ この絞り込み結果（${total}件）の評価が完了しました</h3><button class="btn btn-p" onclick="showSummary()">集計サマリーを見る →</button></div>`:''}
    <div class="ecard ${rcls(no)}">
      <div class="tag-row">
        <div class="tag-item">
          <div class="tag-lbl">法的根拠</div>
          <span class="tag ${esc(rootCls(ev.root))}">${esc(ev.root)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">${LABELS.cls}</div>
          <span class="tag tcls">${esc(ev.cls)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">今後の方向性</div>
          <span class="tag tev">${esc(ev.ev)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">${LABELS.pdf_col}</div>
          <span class="tag tpdf">${esc(ev.pdf)}</span>
        </div>
      </div>
      <div class="emeta"><span class="field-lbl">${LABELS.no_col}：</span>${esc(String(ev.no))}　<span class="field-lbl">所管：</span>${esc(ev.bureau)} ／ ${esc(ev.dept)}</div>
      <div class="ename">${esc(ev.name)}</div>
      <div class="ebudget">
        <div><span class="bdg-lbl">当年度予算（R6決算）：</span><span class="amt">${fmt(ev.budget)}</span></div>
        <div><span class="bdg-lbl">次年度予算（R7予算）：</span><span class="amt">${ev.next_budget?fmt(ev.next_budget):''}</span></div>
        <div style="font-size:.72rem;color:#9ca3af;margin-top:3px">${esc(LABELS.budget_note)}</div>
      </div>
      <div class="edesc"><h4>事業概要</h4><p>${esc(ev.desc)}</p></div>
      <div class="edetail">
        <div class="edi"><label>法的根拠区分：</label>${esc(ev.legal)}</div>
        <div class="edi"><label>根拠法令名：</label>${esc(ev.law)}</div>
        <div class="edi"><label>外部委託の可能性：</label>${esc(ev.gai)}</div>
        ${LABELS.ev_detail_col?`<div class="edi"><label>${LABELS.ev_detail_col}：</label>${esc(ev.ev_detail)}</div>`:''}
      </div>
      <a href="${LABELS.source_url}" target="_blank" class="btn btn-o" style="display:block;text-align:center;text-decoration:none;margin-bottom:8px">📄 評価シートを確認</a>
    </div>
  </div>

  <div style="flex-shrink:0;background:#f3f4f6;padding:10px 0 4px;border-top:1px solid #e5e7eb">
    <div class="rbtns">
      <button class="rbtn ${rBtnCls(no,'続行')}" onclick="rateCard('続行')">
        ✓ 続行<small>${rBtnDesc(no,'続行')}</small>
      </button>
      <button class="rbtn ${rBtnCls(no,'廃止')}" onclick="rateCard('廃止')">
        ✕ 廃止<small>${rBtnDesc(no,'廃止')}</small>
      </button>
      <button class="rbtn ${rBtnCls(no,'見直し')}" onclick="rateCard('見直し')">
        △ 見直し<small>${rBtnDesc(no,'見直し')}</small>
      </button>
    </div>
    <div class="nav">
      <button class="btn btn-sm btn-o" onclick="prevCard()" ${state.pos===0?'disabled':''}>◀ 前へ</button>
      <span class="cpos">${state.pos+1} / ${total}</span>
      <button class="btn btn-sm btn-o" onclick="nextCard()" ${isLast?'disabled':''}>次へ ▶</button>
    </div>
  </div>

</div>
</div>`;
}

// ============================================================
// Screen: サマリー
// ============================================================
function renderSummary(){
  const st=stats(EVENTS);
  const zokkoList  =EVENTS.filter(e=>state.ratings[e.no]==='続行');
  const haishiList =EVENTS.filter(e=>state.ratings[e.no]==='廃止');
  const minaoshiList=EVENTS.filter(e=>state.ratings[e.no]==='見直し');
  const mirateList =EVENTS.filter(e=>!state.ratings[e.no]);

  function tblRows(list){
    if(!list.length) return '<tr><td colspan="6" style="color:#9ca3af;text-align:center;padding:12px">（なし）</td></tr>';
    return list.map(e=>`<tr>
      <td style="white-space:nowrap">${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td style="white-space:nowrap">${esc(e.bureau)}</td>
      <td><span class="tag ${esc(rootCls(e.root))}" style="font-size:.68rem">${esc(e.root)}</span></td>
      <td><span class="tag tev" style="font-size:.68rem">${esc(e.ev)}</span></td>
      <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(e.budget)}</td>
    </tr>`).join('');
  }
  const thead=`<thead><tr><th>${LABELS.no_col}</th><th>事業名</th><th>${LABELS.bureau}</th><th>根拠</th><th>方向性</th><th>予算</th></tr></thead>`;

  document.getElementById('app').innerHTML=`
<div class="nstrip">
  <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
  <h2>${LABELS.summary_title}</h2>
  <button class="btn btn-sm btn-p no-print" onclick="startCards()">評価を続ける</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:flex-end" class="no-print">
  <button class="btn btn-sm btn-o" onclick="downloadCsv()">📥 CSV出力</button>
  <button class="btn btn-sm btn-o" onclick="window.print()">🖨 印刷</button>
</div>

<p style="font-size:.82rem;color:#6b7280;margin-bottom:12px">
  続行 ${st.k.c}件 ｜ 廃止 ${st.h.c}件 ｜ 見直し ${st.f.c}件 ｜ 未評価 ${st.u.c}件（合計${EVENTS.length}件）
</p>

<div class="kgrid">
  <div class="kbox kk">
    <div class="klbl">✓ 続行</div>
    <div class="knum">${st.k.c}件</div>
    <div class="kbdg">${fmt(st.k.b)}</div>
  </div>
  <div class="kbox kh">
    <div class="klbl">✕ 廃止</div>
    <div class="knum">${st.h.c}件</div>
    <div class="kbdg">${fmt(st.h.b)}</div>
  </div>
  <div class="kbox kf">
    <div class="klbl">△ 見直し</div>
    <div class="knum">${st.f.c}件</div>
    <div class="kbdg">${fmt(st.f.b)}</div>
  </div>
  <div class="kbox ku">
    <div class="klbl">— 未評価</div>
    <div class="knum">${st.u.c}件</div>
    <div class="kbdg">${fmt(st.u.b)}</div>
  </div>
</div>

<details class="ssec" ${st.k.c?'open':''}>
  <summary>✓ 続行一覧 <span style="color:#059669">${st.k.c}件・${fmt(st.k.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(zokkoList)}</tbody></table></div>
</details>

<details class="ssec" ${st.h.c?'open':''}>
  <summary>✕ 廃止一覧 <span style="color:#dc2626">${st.h.c}件・${fmt(st.h.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(haishiList)}</tbody></table></div>
</details>

<details class="ssec" ${st.f.c?'open':''}>
  <summary>△ 見直し一覧 <span style="color:#d97706">${st.f.c}件・${fmt(st.f.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(minaoshiList)}</tbody></table></div>
</details>

<details class="ssec">
  <summary>— 未評価一覧 <span style="color:#6b7280">${st.u.c}件・${fmt(st.u.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(mirateList)}</tbody></table></div>
</details>

<p class="note">
  ※ 評価結果はこのブラウザのローカルストレージに保存されます（ページを閉じても残ります）。<br>
  ※ 予算額はR6決算 事業費（直接経費のみ・職員人件費は含まない）です。<br>
  ※ 法定義務あり事業は市単独では廃止できません。削減額はあくまで参考値です。<br>
  出典：<a href="${LABELS.source_url}" target="_blank">令和7年度事務事業評価結果｜富田林市</a>
</p>`;
}

// CSV出力
function downloadCsv(){
  const BOM = '\uFEFF';
  const edCol = LABELS.ev_detail_col || '評価詳細';
  const header = [LABELS.no_col,'事業名',LABELS.bureau,LABELS.dept,LABELS.budget_col,LABELS.next_col,'法的根拠','法的根拠区分','根拠法令名','外部委託の可能性',LABELS.cls,'今後の方向性',edCol,LABELS.pdf_col,'事業概要','評価結果'];
  const rows = EVENTS.map(e=>[
    e.no, e.name, e.bureau, e.dept, e.budget, e.next_budget,
    e.root, e.legal, e.law, e.gai, e.cls, e.ev,
    e.ev_detail,
    e.pdf, e.desc,
    state.ratings[e.no]||'未評価'
  ]);
  const csv = BOM+[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = LABELS.csv_filename;
  a.click();
}

function render(){
  if(state.screen==='filter') renderFilter();
  else if(state.screen==='card') renderCard();
  else if(state.screen==='summary') renderSummary();
}
render();

</script>
</body>
