<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>富田林市 事務事業優先度評価ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.8;margin-top:3px}
.card-nav{display:flex;justify-content:space-between;align-items:center;gap:6px}
.cnav-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0;max-width:42%}
.cnav-btn:hover{background:rgba(255,255,255,.25)}
.cnav-mid{font-size:.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;padding:0 4px}
.cnav-mid-wrap{font-size:.85rem;flex:1;min-width:0;text-align:center;padding:0 4px;line-height:1.4}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-full{width:100%;margin-bottom:8px}

.bbtns{display:flex;gap:8px;flex-wrap:wrap}

/* マップ画面 */
.filterrow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stbtn{padding:7px 14px;border:1px solid #d1d5db;border-radius:20px;background:#fff;color:#374151;font-size:.82rem;font-weight:600;cursor:pointer}
.stbtn.active{background:#1e40af;color:#fff;border-color:#1e40af}
.maphint{font-size:.82rem;color:#6b7280;line-height:1.6}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:8px}

.clsgrid-wrap{border:1px solid #eef0f2;border-radius:6px;padding:8px;max-height:35vh;overflow-y:auto}
.clsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.clsbox{background:#fff;border:1px solid #eef0f2;border-radius:6px;padding:7px 10px;cursor:pointer;transition:background .15s;min-width:0}
.clsbox:hover{background:#f7f9fc}
.clstop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.clsname{font-weight:700;font-size:.85rem;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.clsamt{font-size:.76rem;color:#374151;white-space:nowrap;flex-shrink:0}
.clsamt b{color:#1e40af}
.clsbar-wrap{background:#eef2f7;border-radius:3px;height:5px;margin-bottom:4px;overflow:hidden}
.clsbar{background:#1e40af;height:100%;border-radius:3px}
.clsmeta{font-size:.7rem;color:#9ca3af}

/* cls drilldown：行政評価（ev）でグルーピング。事業一覧は表形式（法定義務・提供形態を列見出しで明示） */
.evsec{border:1px solid #eef0f2;border-radius:6px;margin-bottom:8px;overflow:hidden}
.evsec:last-child{margin-bottom:0}
.evsec summary{padding:9px 12px;cursor:pointer;font-weight:700;font-size:.85rem;color:#374151;background:#f8f9fb;list-style:none;user-select:none}
.evsec summary::-webkit-details-marker{display:none}
.evsec summary::before{content:'▶ ';font-size:.7rem;color:#9ca3af}
.evsec[open] summary::before{content:'▼ '}
.evsec-body{padding:6px 12px 2px}
.evtbl-wrap{overflow:auto;max-height:320px;border:1px solid #eef0f2;border-radius:6px}
.evtbl{border-collapse:collapse;font-size:.82rem}
.evtbl th{text-align:left;font-weight:600;color:#6b7280;font-size:.7rem;padding:4px 8px;border-bottom:1px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;background:#fff;z-index:1}
.evtbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:normal;word-break:break-word}
.evtbl tr:last-child td{border-bottom:none}
.evtd-chk{width:28px}
.evtd-chk input{width:16px;height:16px}
.evtd-name{font-weight:600;color:#111827;cursor:pointer;width:110px;min-width:110px;max-width:110px}
.evtd-budget{color:#374151;width:65px}
.evtd-root{width:38px}
.evtd-ptype{width:80px}
.evtd-mine{width:80px}
.evtd-vote{width:70px}
.evtbl td.evtd-budget,.evtbl td.evtd-root,.evtbl td.evtd-ptype{white-space:nowrap}
.vote-stack{display:flex;flex-direction:column;gap:2px;align-items:flex-start}

/* サマリー画面：評価結果一覧（ブラウザ表示用の圧縮テーブル。列を減らしセル内で折り返す） */
.votetbl-wrap{overflow:auto;max-height:420px;border:1px solid #eef0f2;border-radius:6px}
.votetbl{width:100%;border-collapse:collapse;font-size:.82rem}
.votetbl th{text-align:left;font-weight:600;color:#6b7280;font-size:.7rem;padding:6px 8px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:1}
.votetbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:top;white-space:normal}
.votetbl tr:last-child td{border-bottom:none}
.votetbl .vsub{font-size:.72rem;color:#6b7280;margin-top:2px}
.votetbl .vno{font-size:.7rem;color:#9ca3af}
.vtag-stack{display:flex;flex-direction:column;gap:3px;align-items:flex-start}

/* サマリー画面：印刷専用の完全版（10列）テーブル。画面には出さず@media printでのみ表示 */
.votetbl-print{display:none}

/* タグ */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
.troot-法定義務あり{background:#dbeafe;color:#1d4ed8}
.troot-法定義務なし{background:#fef3c7;color:#92400e}
.troot-判断できない{background:#f3f4f6;color:#6b7280}
.troot-データなし{background:#f3f4f6;color:#9ca3af}
.tev-拡大{background:#dcfce7;color:#15803d}
.tev-現状継続{background:#dbeafe;color:#1d4ed8}
.tev-改善（手段変更）{background:#fef3c7;color:#92400e}
.tev-縮小{background:#ffedd5;color:#c2410c}
.tev-廃止方向{background:#fee2e2;color:#dc2626}
.tev-完了{background:#f3e8ff;color:#7c3aed}
.tev-続行{background:#dcfce7;color:#15803d}
.tev-廃止{background:#fee2e2;color:#dc2626}
.tev-見直し{background:#fef3c7;color:#92400e}
.tptype-green{background:#ccfbf1;color:#0f766e}
.tptype-blue{background:#dbeafe;color:#1d4ed8}
.tptype-gray{background:#f3f4f6;color:#6b7280}
.tptype-amber{background:#fef3c7;color:#92400e}
.tptype-purple{background:#ede9fe;color:#6d28d9}

/* 評価カード（opt-inキュー） */
.pbwrap{background:#e5e7eb;border-radius:4px;height:6px;margin-bottom:12px}
.pbfill{background:#1e40af;height:100%;border-radius:4px;transition:width .3s}
.ecard{background:#fff;border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #e5e7eb}
.ecard.rk{border-left-color:#22c55e}
.ecard.rh{border-left-color:#ef4444}
.ecard.rf{border-left-color:#f59e0b}
.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}
.ename{font-size:1.15rem;font-weight:700;color:#111827;margin-bottom:4px;line-height:1.3}
.ebudget{font-size:.85rem;margin-bottom:12px;color:#374151}
.ebudget .amt{font-weight:700;font-size:1rem;color:#1e40af}
.story{margin-bottom:14px}
.story p{font-size:.9rem;line-height:1.75;color:#1f2937;margin-bottom:6px}
.story-label{font-size:.72rem;font-weight:700;color:#6b7280;margin-bottom:3px;letter-spacing:.03em}
.ai-note{font-size:.75rem;color:#713f12;line-height:1.65;margin-bottom:8px;background:#fef9c3;border:1px solid #fde047;border-radius:6px;padding:8px 10px}
.sticky-actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e5e7eb;z-index:100;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.sticky-inner{max-width:780px;margin:0 auto;padding:10px 12px}
.sticky-spacer{height:110px}
.sticky-spacer.tall{height:230px}
.rbtns{display:flex;gap:10px;margin:16px 0}
.rbtn{flex:1;padding:12px 6px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:#f9fafb;color:#374151;text-align:center;transition:all .15s;line-height:1.4}
.rbtn:hover{border-color:#9ca3af}
.rbtn small{display:block;font-size:.7rem;font-weight:400;margin-top:2px;opacity:.8}
.rbtn.ak{background:#22c55e;color:#fff;border-color:#22c55e}
.rbtn.ah{background:#ef4444;color:#fff;border-color:#ef4444}
.rbtn.af{background:#f59e0b;color:#fff;border-color:#f59e0b}
.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

/* サマリー */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kbox .klbl{font-size:.75rem;color:#6b7280;margin-bottom:6px}
.kbox .knum{font-size:1.7rem;font-weight:700}
.kh .knum{color:#dc2626}
.kf .knum{color:#d97706}
.kk .knum{color:#059669}
.ku .knum{color:#6b7280}

.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid #e5e7eb}
.stbl td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.stbl tr:last-child td{border-bottom:none}
.stbl-wrap{overflow-x:auto}

.pc{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.75rem;font-weight:600;margin-right:2px;white-space:nowrap}
.pc-k{background:#dcfce7;color:#16a34a}
.pc-h{background:#fee2e2;color:#dc2626}
.pc-f{background:#fef3c7;color:#d97706}

@media(max-width:480px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .rbtns{flex-direction:column}
}

@media print{
  .no-print{display:none !important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #e5e7eb}
  .votetbl-wrap{display:none}
  .votetbl-print{display:block}
  .evtbl-wrap{max-height:none;overflow:visible;border:none}
  .evtbl td, .evtbl th{white-space:normal}
  @page{size:landscape}
}
</style>
</head>

<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const EVENTS = [{"no":"22101","name":"秘書課一般事務","bureau":"市長公室","dept":"市長公室　秘書課","budget":1981,"root":"法定義務なし","ev":"現状継続","ptype":"9","story_p1":"市長と副市長が円滑に職務を遂行できるよう秘書業務を担当するとともに、他自治体との連携を深めるために都市提携や連合組織を通じた調整を行っています。","story_p2":"市長会会議への出席を通じて、全国や地域の自治体との連携を図っています。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":2,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22102","name":"市表彰事務","bureau":"市長公室","dept":"市長公室　秘書課","budget":471,"root":"法定義務あり","ev":"現状継続","ptype":"5","story_p1":"地域に貢献された市民や団体を表彰し、その功績を称えるため、毎年11月3日にすばるホールで表彰式を開催しています。式典では市民の皆さんの協力を得て、生花装飾や市民憲章朗読などを行っています。","story_p2":"表彰式を開催し、市民や職員の功績を認める事業です。謝意を表する事業であり、成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":3,"cls":"（基本施策1） 参加と協働のためのしくみづくり","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22108","name":"計画推進事務","bureau":"市長公室","dept":"市長公室　政策推進課","budget":151,"root":"法定義務なし","ev":"現状継続","ptype":"10","story_p1":"将来の夢を実現するために、毎年度の進捗を確認し、今後3年間の事業計画を立てています。SDGsの推進と評価を通じて、持続可能な地域づくりに取り組んでいます。","story_p2":"総合基本計画の進捗管理と実施計画の策定を通じて、将来像の実現に向けた各施策・事業の促進を図る取組の成果を測るため、総合基本計画に掲げた「施策に関する指標」の達成率を成果指標に位置づけています。これにより、計画に基づいた施策がどの程度実現されているかを定量的に評価します。","story_impact":"判断できない","pdf_page":4,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22162","name":"総合調整事務","bureau":"市長公室","dept":"市長公室　政策推進課","budget":0,"root":"法定義務なし","ev":"現状継続","ptype":"9","story_p1":"行政サービスをより効率的に提供するために、組織の構成や人員、業務の役割分担を適切に管理・改善しています。また、他の地域との連携による共同処理の可能性について調査・研究を行っています。","story_p2":"効率的な執行体制の確保状況を評価するため、人口千人当たりの職員数が全国類似団体の平均値と比較してどの水準にあるかを成果指標に位置づけています。この指標により、組織・定数管理の適正性と行政運営の効率性を測定しています。","story_impact":"判断できない","pdf_page":5,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22163","name":"奨学金返還支援事業","bureau":"市長公室","dept":"市長公室　政策推進課","budget":30,"root":"法定義務なし","ev":"現状継続","ptype":"1","story_p1":"奨学金の返還負担を軽減し、若者世代の経済的な自立を支援するために、卒業後の奨学金返還金に対して年間10万円を上限とした助成金を支給しています。","story_p2":"奨学金返還支援助成金支給者数を成果指標として設定し、制度を活用して奨学金返還の負担軽減を受けた若者世代の人数を測ることで、本事業が実際に経済的困難を抱える若年層の支援につながっているかを評価しています。","story_impact":"判断できない","pdf_page":6,"cls":"（戦略的施策1）　都市魅力の創生と効果的な情報発信","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22181","name":"基幹系システム管理事業","bureau":"市長公室","dept":"市長公室　デジタル推進室","budget":116892,"root":"法定義務あり","ev":"拡大","ptype":"9","story_p1":"住民サービスを支える基盤を整えるため、基幹系システムの安定運用と機器管理、関連システムとの連携を行っています。","story_p2":"基幹系システムの安定稼動を成果指標に位置づけており、開庁時間内におけるシステムダウン回数を測定することで、住民サービスの継続性と業務遂行の信頼性を確保する成果を評価しています。","story_impact":"判断できない","pdf_page":7,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22182","name":"デジタル化推進事業","bureau":"市長公室","dept":"市長公室　デジタル推進室","budget":72315,"root":"法定義務あり","ev":"拡大","ptype":"10","story_p1":"住民の皆さんが行政サービスをより便利に利用できるようにするために、DX戦略に基づいて市役所のデジタル化を進め、デジタル技術の検討と導入を行っています。","story_p2":"市役所のデジタル化推進により、市民がデジタル技術を活用して行政手続を利用しやすくなったかを測るため、オンライン申請・届出システムの利用件数を成果指標に位置づけています。この指標により、DX戦略に基づくデジタル技術導入による市民サービスの実質的な改善効果を把握しています。","story_impact":"判断できない","pdf_page":8,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22126","name":"人事課管理事務","bureau":"市長公室","dept":"市長公室　人事課","budget":193704,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"職員の適切な管理と健康保持のため、報酬審議会などの委員会開催、産業医による健康相談やストレスチェック、公務災害補償、育児休業代替職員の配置などの事務を行っています。","story_p2":"委員会の開催を通じて人事課の管理事務を実施しました。内部管理業務であるため、成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":9,"cls":"（経営的施策3） 明日を担う職員の育成","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22127","name":"人事管理事務","bureau":"市長公室","dept":"市長公室　人事課","budget":229035,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"職員が時代の変化に対応し、市民ニーズへより良く応えるために、職員研修を通じた人材育成と意識改革に取り組んでいます。","story_p2":"職員の研修習得度を成果指標として位置づけ、単なる研修参加にとどまらず、職員が実際に知識や技能をどの程度習得できたかを ":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22149","name":"情報公開事業","bureau":"市長公室","dept":"市長公室　都市魅力課","budget":199,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"市民の皆さんが行政情報にアクセスしやすくするため、情報公開制度と個人情報保護制度を適切に運用しています。","story_p2":"情報公開制度の適切な運用成果を測定するため、情報開示請求件数に対する実際の情報開示件数（部分開示を含む）の割合を情報開示率として成果指標に位置づけています。この指標により、市民からの請求に対してどの程度情報が開示されているかを把握しています。","story_impact":"判断できない","pdf_page":15,"cls":"（基本施策1） 参加と協働のためのしくみづくり","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22141","name":"防災対策事務","bureau":"市長公室","dept":"市長公室　危機管理室","budget":19818,"root":"法定義務あり","ev":"拡大","ptype":"13","story_p1":"大規模災害時の被害を最小限にするために、食料などの備蓄、防災訓練への支援、防災マップ作成支援を行い、地域の防災力向上に取り組んでいます。","story_p2":"地域の防災力向上を図るため、防災訓練の実施支援や防災マップ作成支援等の活動を展開しており、これらの取組みによる成果を防災訓練への参加者数を指標として測定しています。","story_impact":"判断できない","pdf_page":16,"cls":"（個別施策21） 防災対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22145","name":"防犯対策事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":85042,"root":"法定義務なし","ev":"現状継続","ptype":"13","story_p1":"安全で安心して暮らせるまちづくりのため、防犯カメラの運用、警察などとの連携強化、特殊詐欺対策、青色防犯パトロールの実施を通じて、犯罪抑止と地域の見守り活動に取り組んでいます。","story_p2":"防犯カメラの運用、関係団体との連携強化、青色防犯パトロール活動の支援を通じた総合的な防犯対策の成果を、犯罪認知件数を成果指標として測定しています。","story_impact":"判断できない","pdf_page":17,"cls":"（個別施策22） 防犯対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22146","name":"防犯灯補助事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":24906,"root":"法定義務なし","ev":"現状継続","ptype":"7","story_p1":"夜間の犯罪防止と安全な街づくりのため、町会や自治会が管理する防犯灯の新設や維持管理を支援しています。器具の取替えや消費電力に応じた定額補助を行います。","story_p2":"防犯灯の整備と維持管理を通じた照度向上により、夜間の犯罪抑止効果を期待し、富田林市内の街頭犯罪認知件数を成果指標に位置づけています。地域の安全性向上を測定することで、事業の実効性を評価しています。","story_impact":"判断できない","pdf_page":18,"cls":"（個別施策22） 防犯対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22152","name":"地縁団体防犯カメラ整備補助事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":2797,"root":"法定義務なし","ev":"現状継続","ptype":"7","story_p1":"地域の犯罪を防止するため、町会・自治会が防犯カメラを設置・更新する際の費用や、カメラの修繕・保守点検にかかる経費の一部を補助しています。","story_p2":"本事業では、町会等による防犯カメラ設置補助制度利用総台数を成果指標に位置づけており、補助制度を通じて実際に設置される防犯カメラの台数累積により、地域の防犯対策強化の成果を測定しています。","story_impact":"判断できない","pdf_page":19,"cls":"（個別施策22） 防犯対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"24112","name":"防災対策施設整備事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":3267,"root":"法定義務あり","ev":"拡大","ptype":"6","story_p1":"災害時に住民が迅速に避難できるよう、防災無線システムの拡声子局を設置して、危険地域や避難所周辺への情報伝達体制を強化しています。","story_p2":"災害時に住民へ迅速かつ確実に避難情報を伝達できる体制を整備するため、防災無線拡声子局の整備数を成果指標として設定し、災害危険地域や避難所周辺への設置を進めることで、防災情報の伝達範囲の拡大を図っています。","story_impact":"判断できない","pdf_page":20,"cls":"（個別施策21） 防災対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"32601","name":"被災地支援事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":0,"root":"法定義務あり","ev":"現状継続","ptype":"12","story_p1":"災害により被害を受けた地域を支援するため、被災地の復旧・復興に向けたさまざまな支援を行っています。地震や風水害など、あらゆる災害への対応を進めています。","story_p2":"被災地支援のため出張を実施しましたが、被災地の要望により事業内容が変わることから、成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":21,"cls":"（個別施策21） 防災対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"82103","name":"非常備消防事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":35491,"root":"法定義務あり","ev":"現状継続","ptype":"6","story_p1":"消防団の活動を支援し、地域の消防力を維持するために、団員の教養研修派遣、施設・車両・装備品の維持管理を行っています。","story_p2":"消防団員数の定数管理と防火服の更新を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":22,"cls":"（個別施策23） 消防・救急体制の強化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"82106","name":"広域消防事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":1261351,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"広域的な消防行政を円滑に進めるために、必要な経費を定められた負担割合に応じて各自治体で分担し、適切な処理を行っています。","story_p2":"成果を測る指標が設定されていません。","story_impact":"判断できない","pdf_page":23,"cls":"（個別施策23） 消防・救急体制の強化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"84101","name":"消防施設整備事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":57907,"root":"法定義務あり","ev":"現状継続","ptype":"6","story_p1":"火災や災害に素早く対応するために、消防団の車庫や車両、資機材を計画的に更新・整備し、いつでも出動できる消防体制を維持しています。","story_p2":"成果を測る指標が設定されていません。","story_impact":"判断できない","pdf_page":24,"cls":"（個別施策23） 消防・救急体制の強化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"104101","name":"公共土木施設等災害復旧事業","bureau":"市長公室","dept":"市長公室　危機管理室","budget":15075,"root":"法定義務あり","ev":"現状継続","ptype":"6","story_p1":"台風や豪雨、地震などの災害から住民の生命と安全を守るため、被害が発生した際には災害対策本部を設置し、避難誘導や応急対応を行うとともに、公共施設の早期復旧に努めています。","story_p2":"災害警戒配備や災害対策本部の設置、災害復旧工事の発注に対応してきました。被災状況により事業内容が変わるため、成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":25,"cls":"（個別施策21） 防災対策の推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/111408.pdf"},{"no":"22136","name":"総務課管理事務","bureau":"総務部","dept":"総務部　総務課","budget":27477,"root":"法定義務なし","ev":"現状継続","ptype":"9","story_p1":"住民サービスを24時間体制で支えるため、宿日直業務の運用や庁内電話の管理、法律専門家との相談を行っています。","story_p2":"宿日直窓口対応や弁護士相談など、総務課の基盤的な各業務を適切に管理する事務機能そのものを成果指標に位置づけており、これらの業務運用が円滑に遂行されることで、庁舎機能と法務対応の維持を成果として捉えています。","story_impact":"判断できない","pdf_page":2,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110443.pdf"},{"no":"22137","name":"文書管理事務","bureau":"総務部","dept":"総務部　総務課","budget":26178,"root":"法定義務なし","ev":"現状継続","ptype":"9","story_p1":"行政運営を円滑に進めるため、文書の一元管理システムを構築・運用し、文書の保管や廃棄を適切に管理しています。また、条例や規則の整備と公開、行政不服審査制度の運営を行っています。","story_p2":"文書管理システムの効率性を測る指標として、文書検索に要する時間を成果指標に位置づけています。ただし、検索時間の正確な数値化が困難であることから、システムの利便性向上を定性的に評価する方針としています。","story_impact":"判断できない","pdf_page":3,"cls":"（経営的施策1） 効率的・効果的な行財政運営","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110443.pdf"},{"no":"22501","name":"統計調査事務","bureau":"総務部","dept":"総務部　総務課","budget":2878,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"国や府が実施する法定統計調査を円滑に進めるために、調査員の確保や指定統計調査の実施体制整備などを行っています。","story_p2":"本事業は国・府の法定受託事務である りの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"232101","name":"納付金事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":2620487,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"国民健康保険制度の安定的な運営を確保するために、保険料を収納して都道府県に納付し、医療給付費に充てています。","story_p2":"都道府県が財政運営の責任主体となる国保制度において、適切な医療給付費の確保が重要であることから、納付金額を成果指標に位置づけ、安定的かつ効率的な国保事業の運営を図っている。","story_impact":"判断できない","pdf_page":26,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"232201","name":"介護納付金事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":237597,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"国民健康保険の安定的な財政運営を図るため、医療費推計に基づいて納付金を決定し、保険料収納後に都道府県に納付しています。","story_p2":"都道府県が財政運営の責任主体として安定的な国保制度の運営を図るため、府から通知された国保事業費納付金の実績納付額を成果指標に位置づけ、保険料収納を通じた適切な納付が実現できているかを測定しています。","story_impact":"判断できない","pdf_page":27,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"232301","name":"後期高齢者支援金等納付金事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":757525,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"後期高齢者医療制度を安定的に運営するため、府内の医療費を推計して必要な納付金を決定し、保険料として住民から収納した後、大阪府に納付しています。","story_p2":"都道府県の財政運営責任体制における制度の安定化を図るため、府が推計した医療費に基づいて決定される納付金額を成果指標に位置づけています。保険料収納と納付金の適切な管理を通じて、国保制度の持続可能性を測定しています。","story_impact":"判断できない","pdf_page":28,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"242101","name":"疾病予防事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":18244,"root":"法定義務なし","ev":"拡大","ptype":"1","story_p1":"住民の皆さんの健康寿命を延ばすために、人間ドック受診費用を補助し、疾病の早期発見・治療につなげています。","story_p2":"人間ドック受診の促進を通じた疾病の早期発見・治療により、被保険者の健康状態の改善と医療費の抑制を目指しており、被保険者一人当たりの医療費（保険者負担分）を成果指標として位置づけています。","story_impact":"判断できない","pdf_page":29,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"242102","name":"その他保健事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":2752,"root":"法定義務あり","ev":"拡大","ptype":"5","story_p1":"医療費を適正に抑え、住民の皆さんが健康で長く暮らせるようにするために、疾病の予防と重症化予防に取り組んでいます。訪問や教室による保健指導、受診勧奨、適切な医療利用の啓発を行っています。","story_p2":"疾病の予防・重症化予防に関する保健指導や受診勧奨を通じて、被保険者の適切な医療利用を促進し、被保険者一人当たりの医療費（保険者負担分）の抑制を成果指標として位置づけています。","story_impact":"判断できない","pdf_page":30,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"242201","name":"特定健康診査等事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":71944,"root":"法定義務あり","ev":"拡大","ptype":"4","story_p1":"生活習慣病の予防と住民の健康づくりを進めるため、メタボリックシンドロームを早期に発見する健康診査と、該当者への生活習慣改善指導を行っています。","story_p2":"特定健康診査の受診率と特定保健指導の終了者率について、国指標で2023年度60％の達成を目指して事業を実施しました。特定保健指導対象者割合の減少率は、2008年度比で25％以上の削減を目標としています。","story_impact":"判断できない","pdf_page":31,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"252101","name":"財政安定化基金拠出金事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":0,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"健康保険の財政が不足した時に備えるため、大阪府の基金から無利子で資金を借りられる制度を用意しています。","story_p2":"本事業では、財政安定化基金からの貸付金額及び交付金額を成果指標に位置づけ、給付増や保険料収納不足に対応するための財源確保がどの程度実現できたかを測定しています。","story_impact":"判断できない","pdf_page":32,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"269101","name":"公債費利子償還事業","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":0,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"過去に借り入れた公債の利子を期日までに確実に償還するため、計画的に利子支払いを行っています。","story_p2":"公債費の利子償還事業の成果を評価するため、借入金利子返済の滞り額を指標として位置づけており、返済の適切性と財政の健全性を測定している。","story_impact":"判断できない","pdf_page":33,"cls":"（個別施策7） 主体的な健康づくりの推進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110447.pdf"},{"no":"272101","name":"保険料還付金","bureau":"健康推進部","dept":"健康推進部　保険年金課","budget":5788,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"保険料の過払い分が発生した場合に、世帯主からの請求に基づいて還付金をお返しするサービスです。会計年度終了後の精算を通じて、適切な保険料負担を実現しています。","story_p2":"保険料の還付にあたっては、還付件数の実績だけでなく、実際に世帯主に返納した還付金額を成果指標として位置づけており、適切な還付が実行されている 理を実施しています。また、公園愛護会の活動を支援し、地域による公園の適切な保全を推進しています。","story_p2":"公園は日常的な維持管理により初めて機能するため、継続的な清掃・修繕・樹木管理といった維持管理業務の実施自体を成果指標に位置づけています。公園施設の良好な状態を保つことで、利用者の安全性と快適性の確保を目指しています。","story_impact":"判断できない","pdf_page":8,"cls":"（個別施策29） 自然・歴史環境の保全","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110448.pdf"},{"no":"72407","name":"みどりの基金運用事業","bureau":"まちづくり部","dept":"まちづくり部　道路公園課","budget":0,"root":"法定義務あり","ev":"廃止方向","ptype":"1","story_p1":"緑豊かで快適な生活環境を作るために、市民の住宅などに生垣を植栽する際の費用を助成しています。","story_p2":"生垣植栽助成により市民の住宅等における緑化を促進し、都市部の緑地化率向上を成果指標に位置づけています。直接的な緑地面積の測定が困難な中で、助成件数の増加を通じた間接的な緑地化率の改善を成果として捉えています。","story_impact":"判断できない","pdf_page":9,"cls":"（個別施策29） 自然・歴史環境の保全","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110448.pdf"},{"no":"72408","name":"公園緑化協会育成事業","bureau":"まちづくり部","dept":"まちづくり部　道路公園課","budget":32112,"root":"法定義務なし","ev":"拡大","ptype":"7","story_p1":"地域の緑化推進と公園の適切な管理を行うため、公園緑化協会の運営を財政的に支援しています。","story_p2":"公園緑化協会の活動成果は、緑化相談や講習会の開催実績だけでなく、これらの取組がどの程度の市民参加につながっているかを把握することが重要である。そのため、各種講座参加人数を成果指標に位置づけ、市民の緑化への関心と学習機会の実現状況を測定しています。","story_impact":"判断できない","pdf_page":10,"cls":"（個別施策29） 自然・歴史環境の保全","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110448.pdf"},{"no":"72409","name":"富田林の自然を守る市民運動事業","bureau":"まちづくり部","dept":"まちづくり部　道路公園課","budget":706,"root":"法定義務なし","ev":"現状継続","ptype":"7","story_p1":"南部山間部を中心とした地域の豊かな自然環境を保全するため、市民運動協議会への補助を通じて、住民主体の自然保護活動を支援しています。","story_p2":"本事業では、里山保全活動への参加者数を成果指標に位置づけることで、市民運動協議会の活動を通じた自然保全への市民参加の拡大を測定しています。この指標により、南部山間部を中心とした地域の自然保護活動がどの程度の市民参加を得られているかを評価しています。","story_impact":"判断できない","pdf_page":11,"cls":"（個別施策29） 自然・歴史環境の保全","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110448.pdf"},{"no":"72435","name":"がけ地防災工事補助事業","bureau":"まちづくり部","dept":"まちづくり部　道路公園課","budget":8642,"root":"法定義務なし","ev":"現状継続","ptype":"1","story_p1":"市道に面するがけ地の崩落による被害や二次災害を防ぐため、防災工事にかかる費用の一部を補助しています。","story_p2":"がけ地防災工事の実施により、市民からのがけ崩れ防止に関する要望件数の減少を成果指標に位置づけ、危険ながけ地の解消が進展しているかを測定 "pdf_page":4,"cls":"（個別施策18） 農業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"52106","name":"中核農家総合支援事業","bureau":"産業部","dept":"産業部　農業創造課","budget":4014,"root":"法定義務なし","ev":"現状継続","ptype":"9","story_p1":"地域の中核となる農家を支援し、農業経営の改善を促進するために、農業経営改善計画の認定と認定農業者制度の運用を行っています。また、農地を効率的に活用する農家へ集積することで、本地域の農業活性化を図っています。","story_p2":"本事業は、農業経営改善計画の認定と農地の利用集積を通じて地域の担い手農家を育成・支援することで、本市農業の活性化を実現することを目指しており、国版認定農業者数を成果指標として位置づけています。","story_impact":"判断できない","pdf_page":5,"cls":"（個別施策18） 農業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"52110","name":"野菜価格安定事業","bureau":"産業部","dept":"産業部　農業創造課","budget":9,"root":"法定義務なし","ev":"現状継続","ptype":"4","story_p1":"野菜の価格変動から生産者を守るため、対象野菜の価格が基準より下がった場合に、生産者へ交付される価格差補給金の一部を負担しています。","story_p2":"この事業は負担金を通じて野菜価格の安定化を支援する制度的事業です。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":6,"cls":"（個別施策18） 農業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"52111","name":"地産地消推進事業","bureau":"産業部","dept":"産業部　農業創造課","budget":1899,"root":"法定義務なし","ev":"現状継続","ptype":"5","story_p1":"環境に優しい農業を広げるため、籾殻を堆肥化して農地に還元しています。また農業祭を通じて地元農産物を紹介・販売し、生産者と市民の交流を深めることで、地産地消と農業振興を推進しています。","story_p2":"本事業では、籾殻堆肥の環境保全型農業への活用を促進するため、堆肥の配布農家数を成果指標に位置づけています。これにより、循環型農業の実践と農地への還元状況を測定し、地産地消推進と農業振興の実現状況を評価しています。","story_impact":"判断できない","pdf_page":7,"cls":"（個別施策18） 農業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"52117","name":"新規就農総合支援事業","bureau":"産業部","dept":"産業部　農業創造課","budget":12975,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"持続的で力強い農業を実現するため、50歳未満の新規就農者に対して経営開始資金などの助成金を交付し、次世代の農業経営者の育成を支援しています。","story_p2":"本事業では、資金交付を受けた新規就農者が実際に農業経営を継続しているかを重要な成果指標として位置づけています。単なる就農者数の増加ではなく、交付を受けた農業者が持続的に経営を続けることで、次世代を担う力強い農業構造の実現につながると考えています。","story_impact":"判断できない","pdf_page":8,"cls":"（個別施策18） 農業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"52125","name" /www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62104","name":"中小企業融資事業","bureau":"産業部","dept":"産業部　商工観光課","budget":37616,"root":"法定義務なし","ev":"現状継続","ptype":"1","story_p1":"地域の中小企業が事業資金を借りやすくするために、金融機関に融資金を預託し、融資にかかる保証料と利子を補給しています。","story_p2":"融資制度による支援を通じて、市内の商工業者数の増加または維持を成果指標に位置づけています。融資の円滑化によって中小企業の事業継続・拡大を促進し、産業振興につながる事業所数の変動を成果として測定しています。","story_impact":"判断できない","pdf_page":24,"cls":"（個別施策17） 商工業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62107","name":"商業活性化総合支援事業","bureau":"産業部","dept":"産業部　商工観光課","budget":34,"root":"法定義務なし","ev":"現状継続","ptype":"7","story_p1":"地域の商業を活性化させるために、中小小売商業者の団体が行うイベントやプロモーション、空き店舗・空き家の活用事業に対して、経費の一部を補助しています。","story_p2":"本事業は、商店会会員数を成果指標に位置づけており、補助を通じた商業活性化施策が商店会の組織基盤の拡大にどの程度貢献しているかを測定しています。消費者との連携やにぎわい創出を通じて、商店会への加入促進につなげることを目指しています。","story_impact":"判断できない","pdf_page":25,"cls":"（個別施策17） 商工業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62108","name":"商工祭","bureau":"産業部","dept":"産業部　商工観光課","budget":1000,"root":"法定義務なし","ev":"現状継続","ptype":"11","story_p1":"地域産業の魅力を多くの住民に知ってもらうために、即売会や抽選会、各種イベントを通じて、地域産業のＰＲを行っています。","story_p2":"地域産業のPRを目的とした商工祭において、来場者数を成果指標に位置づけることで、イベントを通じた地域産業への関心喚起と消費者への認知度向上の成果を測定しています。","story_impact":"判断できない","pdf_page":26,"cls":"（個別施策20） 人が集まる機会の創出","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62113","name":"観光振興事業","bureau":"産業部","dept":"産業部　商工観光課","budget":33309,"root":"法定義務なし","ev":"現状継続","ptype":"13","story_p1":"富田林の魅力を多くの人に知ってもらい、観光客を増やすために、観光情報の発信や受け入れ環境の整備、集客イベントなどを関係機関が協力して推進しています。","story_p2":"観光振興事業では、情報発信やイベント開催を通じた集客活動の成果を測定するため、観光入込客数を成果指標として位置づけています。この指標により、実施した各種施策が実際の観光客増加につながっているかを評価しています。","story_impact":"判断できない","pdf_page":27,"cls":"（個別施策19） 地域資源を活かした観光の振興","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62115","name":"勤労者共済会補助事業","bureau":"産業部","dept":"産業部　商工観光課","budget":5386,"root":"法定義務なし","ev":"現状継続","ptype":"7","story_p1":"勤労者の生活の安定と福祉向上を図るため、勤労者共済会の事務局として、健康管理やレクレーション、祝金・見舞金の給付、割引チケット斡旋など、幅広い福利厚生事業を行っています。","story_p2":"勤労者共済会の福利厚生事業や給付事業の充実により、共済会への加入を促進することを目指しており、年度末現在の会員数を成果指標として設定しています。この指標により、事業を通じた勤労者の福利厚生向上への貢献度を測定しています。","story_impact":"判断できない","pdf_page":28,"cls":"（個別施策16） 雇用の促進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62117","name":"労働関連施策事業","bureau":"産業部","dept":"産業部　商工観光課","budget":244,"root":"法定義務なし","ev":"現状継続","ptype":"4","story_p1":"労働に関する悩みや問題を解決するため、社会保険労務士による相談を月1回実施しています。夜間相談や外国人向けの通訳派遣など、誰もが利用しやすい体制を整えています。","story_p2":"月1回の定期的な相談事業という特性から、相談者数ではなく、相談事業の継続性と対応の充実度を成果指標として位置づけています。夜間相談の実施や外国人労働者向けの通訳派遣など、相談しやすい環境整備の実績を成果として測定しています。","story_impact":"判断できない","pdf_page":29,"cls":"（個別施策16） 雇用の促進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62119","name":"就労支援事業","bureau":"産業部","dept":"産業部　商工観光課","budget":2838,"root":"法定義務なし","ev":"現状継続","ptype":"5","story_p1":"地域の就労を促進するため、専任コーディネーターによる相談、職業能力開発、求人情報の提供、企業とのマッチング事業などを総合的に行っています。","story_p2":"本事業は、就労支援センターでの相談やマッチング事業を通じた雇用促進の成果を、市内事業所従業者数の増加により測定しており、地域経済への人材供給と定着を重視した指標設定となっています。","story_impact":"判断できない","pdf_page":30,"cls":"（個別施策16） 雇用の促進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62120","name":"創業支援事業","bureau":"産業部","dept":"産業部　商工観光課","budget":1884,"root":"法定義務なし","ev":"現状継続","ptype":"1","story_p1":"地域の創業を促進するために、商工会や日本政策金融公庫と連携し、セミナーや融資制度の提供、創業経費の補助、利子補給などの支援を行っています。","story_p2":"創業支援セミナーの受講がいかに実際の創業に結びついているかを測定するため、セミナー受講による市内創業者数を成果指標に位置づけています。これにより、提供する支援施策の実効性を評価しています。","story_impact":"判断できない","pdf_page":31,"cls":"（個別施策16） 雇用の促進","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62125","name":"産業活性化事業","bureau":"産業部","dept":"産業部　商工観光課","budget":12,"root":"法定義務なし","ev":"廃止方向","ptype":"1","story_p1":"中小企業の成長を支援するため、研修費用や新商品開発費の一部を補助しています。企業の能力向上と新たな技術・商品の創出を促進しています。","story_p2":"ものづくり技術推進事業補助金の交付件数については具体的な実績データが示されていません。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":32,"cls":"（個別施策17） 商工業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62128","name":"企業立地促進事業","bureau":"産業部","dept":"産業部　商工観光課","budget":0,"root":"法定義務あり","ev":"拡大","ptype":"1","story_p1":"地域経済の活性化と雇用機会の創出のため、企業立地促進条例に基づいた奨励金交付や企業誘致施策を実施しています。","story_p2":"企業立地促進条例に基づく奨励金制度の活用実績を測るため、奨励金交付件数を成果指標に位置づけています。これにより、市内への企業誘致と雇用機会創出施策の実効性を評価しています。","story_impact":"判断できない","pdf_page":33,"cls":"（個別施策17） 商工業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"62181","name":"消費者保護対策事業","bureau":"産業部","dept":"産業部　商工観光課","budget":7199,"root":"法定義務あり","ev":"現状継続","ptype":"5","story_p1":"複雑・巧妙化する消費者トラブルから住民を守るため、相談員による相談業務と出前講座を実施し、被害の解決と未然防止に努めています。","story_p2":"消費者トラブルへの対応効果を測るため、相談者が助言のみで問題を解決できた割合を成果指標に位置づけています。助言件数を助言件数と斡旋件数の合計で除した値により、相談員の支援が相談者の自主解決にどの程度貢献しているかを評価しています。","story_impact":"判断できない","pdf_page":34,"cls":"（個別施策17） 商工業の活性化","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"63101","name":"観光交流施設運営事業","bureau":"産業部","dept":"産業部　商工観光課","budget":26184,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"地域の観光資源の魅力を広く発信し、多くの人々を呼び込むために、観光交流施設を指定管理者によって運営しています。","story_p2":"観光交流施設の運営成果を測る指標として、来館者数を設定しています。シティセールスの拠点としての施設の利用実績を通じ、本市の観光資源の魅力発信がどの程度の来訪につながっているかを把握する成果指標に位置づけています。","story_impact":"判断できない","pdf_page":35,"cls":"（個別施策19） 地域資源を活かした観光の振興","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110449.pdf"},{"no":"92101","name":"教育委員会事務","bureau":"教育総務部","dept":"教育総務部　教育総務課","budget":3766,"root":"法定義務あり","ev":"現状継続","ptype":"8","story_p1":"教育に関する重要な施策を適切に審議・決定するために、毎月の教育委員会会議を開催し、市長との協議を通じて教育行政を推進しています。","story_p2":"教育委員会の成果を測る指標として、教育委員会会議における年間審議決定件数を位置づけています。これにより、教育に関する重要な施策や課題がどの程度審議・決定されたかを把握し、教育委員会の政策形成機能の充実度を評価しています。","story_impact":"判断できない","pdf_page":3,"cls":"（個別施策3） 学校園における教育の充実","pdf_url":"https://www.city.tondabayashi.lg.jp/uploaded/attachment/110450     </div>
    <div class="sticky-spacer no-print"></div>
    <div class="sticky-actions no-print">
      <div class="sticky-inner">
        <button class="btn btn-o btn-full" onclick="render('summary')">📊 サマリー・投票を見る</button>
        <button class="btn btn-p btn-full" ${selected.size ? '' : 'disabled'} onclick="startEvalQueue()">選択した事業を評価する（${selected.size}件）</button>
      </div>
    </div>`;
}

function toggleSel(no) {
  if (selected.has(no)) selected.delete(no); else selected.add(no);
  render('cls');
}
function onEvToggle(detailsEl) {
  const key = detailsEl.getAttribute('data-evkey');
  if (detailsEl.open) openEvKeys.add(key); else openEvKeys.delete(key);
}
function selectAllCls(all) {
  const evs = EVENTS.filter(e => (e.cls || 'データなし') === curCls && matchesFilter(e));
  selected = all ? new Set(evs.map(e => e.no)) : new Set();
  render('cls');
}

// ── ②個別評価（opt-inキュー） ───────────────────────────────────────────
function startEvalQueue() {
  if (!selected.size) return;
  queue = EVENTS.filter(e => selected.has(e.no)).sort((a,b) => b.budget - a.budget);
  qCursor = 0;
  render('eval');
}

function renderEval(app) {
  if (qCursor < 0) qCursor = 0;
  if (qCursor >= queue.length) qCursor = queue.length - 1;
  const e = queue[qCursor];
  const r = ratings[e.no] || '';
  const rcls = r === '続行' ? 'rk' : r === '廃止' ? 'rh' : r === '見直し' ? 'rf' : '';
  const budgetText = e.budget ? `${fmt(e.budget)}千円` : '—';
  const impact = e.story_impact;
  const hasImpact = impact && impact !== '判断できない';
  const s3text = hasImpact
    ? `この事業がなくなった場合、${impact}という問題が起きると想定されています。`
    : `評価シートに記載されていません。`;
  const pct = Math.round((qCursor + 1) / queue.length * 100);
  const pdfUrl = e.pdf_url || LABELS.pdf_url || LABELS.source_url;

  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('cls')" title="${esc(curCls)}の一覧">← ${esc(curCls)}の一覧</button>
        <span class="cnav-mid">${qCursor+1} / ${queue.length} 件目</span>
        <button class="cnav-btn" onclick="render('map')">マップへ</button>
      </div>
    </div>
    <div class="pbwrap no-print"><div class="pbfill" style="width:${pct}%"></div></div>
    <div class="ecard ${rcls}">
      <div class="ename">${esc(e.name)}</div>
      <div class="emeta">${esc(LABELS.no_col)}：${esc(e.no)}　${esc(LABELS.dept)}：${esc(e.dept)}</div>
      <div class="tags">
        ${rootTagHtml(e.root)}
        ${evTagHtml(e.ev)}
        ${ptypeTagHtml(e.ptype)}
      </div>
      <div class="story">
        <div class="story-label">目的・事業内容</div>
        <p>${esc(e.story_p1)}</p>
      </div>
      <div class="ebudget">R6決算：<span class="amt">${budgetText}</span>　<span style="color:#6b7280;font-size:.8rem">（住民1人あたり約${fmt(Math.round(e.budget*1000/LABELS.population))}円/年）</span></div>
      <div style="font-size:.78rem;color:#6b7280;margin:-8px 0 12px">人件費：${personnelCostHtml()}</div>
      <div class="story">
        <div class="story-label">成果</div>
        <p>${esc(e.story_p2)}</p>
      </div>
      <div class="story">
        <div class="story-label">廃止した場合の影響</div>
        <p>${esc(s3text)}</p>
      </div>
    </div>
    <div class="sticky-spacer tall no-print"></div>
    <div class="sticky-actions no-print">
      <div class="sticky-inner">
        <p class="ai-note">※目的・事業内容、成果、廃止した場合の影響の説明文は、評価シートを元にAIが自動生成しています。内容に違和感がある場合や詳細を確認したい場合は、下のリンクから評価シートをご確認ください。</p>
        <a class="btn btn-p btn-full" href="${esc(pdfUrl)}#page=${e.pdf_page}" target="_blank">📄 評価シートを確認（p.${e.pdf_page}）</a>
        <div class="rbtns">
          <button class="rbtn${r==='続行'?' ak':''}" onclick="rateQueue('続行')">✓ 続行<small>活動内容と予算に納得</small></button>
          <button class="rbtn${r==='廃止'?' ah':''}" onclick="rateQueue('廃止')">✕ 廃止<small>活動内容に納得できない</small></button>
          <button class="rbtn${r==='見直し'?' af':''}" onclick="rateQueue('見直し')">△ 見直し<small>予算に納得できない</small></button>
        </div>
        <div class="nav">
          <button class="btn btn-o btn-sm" onclick="goQueue(-1)" ${qCursor===0?'disabled':''}>◀ 前へ</button>
          <span class="cpos">${qCursor+1} / ${queue.length}</span>
          <button class="btn btn-o btn-sm" onclick="goQueue(1)" ${qCursor===queue.length-1?'disabled':''}>次へ ▶</button>
        </div>
      </div>
    </div>`;
}

function rateQueue(val) {
  const e = queue[qCursor];
  ratings[e.no] = val;
  localStorage.setItem(LS_KEY, JSON.stringify(ratings));
  if (qCursor < queue.length - 1) {
    qCursor++;
    render('eval');
  } else {
    // 選んだ事業をすべて評価し終えたらマップに戻る（「評価しては戻ってきてを繰り返す」フロー）
    selected = new Set();
    render('cls');
  }
}
function goQueue(dir) {
  qCursor += dir;
  render('eval');
}

// ── ③サマリー・投票 ─────────────────────────────────────────────────────
function renderSummary(app) {
  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('map')">← マップに戻る</button>
        <span class="cnav-mid">📊 サマリー・投票</span>
      </div>
    </div>
    <div class="card">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:10px">${esc(LABELS.summary_title)}</h2>
      <div class="no-print" style="margin-bottom:12px">
        <button id="submit-btn" class="btn btn-p btn-sm" onclick="submitToSupabase()">📤 投票する</button>
        <span style="font-size:.8rem;color:#6b7280;margin-left:10px">投票すると、みんなの評価に反映されます。<br>送信されるのは事業番号・評価結果（続行/廃止/見直し）・送信日時のみです。個人情報は一切収集しません。<br>追加で評価した事業がある場合は、再度このボタンから投票できます（同じ事業を重複して送信することはありません）。<br>実際の収集情報は下の📥 生データCSVから閲覧できます。</span>
      </div>
      <p style="font-size:.78rem;color:#6b7280;margin-bottom:10px">自分が評価した事業、または誰かが投票済みの事業を対象に表示しています。</p>
      <div id="vote-section"><p style="color:#6b7280;font-size:.85rem">読み込み中...</p></div>
    </div>
    <button class="btn btn-o btn-full no-print" onclick="render('map')">← マップに戻る</button>
    <button class="btn btn-o btn-full no-print" onclick="if(confirm('評価をすべてリセットしますか？')){localStorage.removeItem(LS_KEY);localStorage.removeItem(SUBMITTED_KEY);ratings={};render('map')}">🗑 評価をリセット</button>`;
  loadPeopleData();
}

function getSubmittedNos() {
  try {
    const v = JSON.parse(localStorage.getItem(SUBMITTED_KEY) || '[]');
    return Array.isArray(v) ? v : [];
  } catch (e) { return []; }
}

async function submitToSupabase() {
  const already = new Set(getSubmittedNos());
  const rows = Object.entries(ratings)
    .filter(([no, r]) => r && !already.has(no))
    .map(([no, r]) => ({ municipality_id: MUNICIPALITY_ID, event_no: no, rating: r }));
  if (!rows.length) { alert('新しく評価した事業がありません。'); return; }
  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const { error } = await sb.from('ratings').insert(rows);
  if (error) {
    alert('送信エラー: ' + error.message);
    if (btn) { btn.disabled = false; btn.textContent = '📤 投票する'; }
    return;
  }
  rows.forEach(r => already.add(r.event_no));
  localStorage.setItem(SUBMITTED_KEY, JSON.stringify([...already]));
  if (btn) { btn.disabled = false; btn.textContent = '📤 投票する'; }
  alert(`${rows.length}件を送信しました。`);
  loadPeopleData();
}

async function loadPeopleData() {
  const { data, error } = await sb
    .from('ratings').select('event_no,rating').eq('municipality_id', MUNICIPALITY_ID);
  if (error) {
    const section = document.getElementById('vote-section');
    if (section) section.innerHTML = '<p style="color:#ef4444;font-size:.85rem">データの取得に失敗しました。</p>';
    return;
  }
  const agg = {};
  (data || []).forEach(row => {
    if (!agg[row.event_no]) agg[row.event_no] = {'続行':0,'廃止':0,'見直し':0};
    if (agg[row.event_no][row.rating] !== undefined) agg[row.event_no][row.rating]++;
  });
  peopleAgg = agg;
  // サマリー画面は投票セクションだけ差し替え（renderSummary経由だとloadPeopleDataを再度呼び無限ループになるため）。
  // それ以外（マップ・ドリルダウン等）は画面全体を再描画し、ドリルダウンの「みんなの評価」列に反映する。
  if (curScreen === 'summary') renderVoteSection();
  else render(curScreen);
}

function setVoteFilter(v) { voteFilter = v; renderVoteSection(); }

// 対象＝自分が評価した事業 ∪ 誰かが投票済みの事業。voteFilterで絞り込む
function voteRows() {
  if (!peopleAgg) return [];
  return EVENTS.filter(e => {
    const mine = ratings[e.no] || '';
    const agg = peopleAgg[e.no];
    const hasVotes = !!agg && (agg['続行'] + agg['廃止'] + agg['見直し'] > 0);
    if (!mine && !hasVotes) return false;
    if (voteFilter === '') return true;
    if (voteFilter === '未評価') return !mine && hasVotes;
    return mine === voteFilter;
  }).sort((a, b) => b.budget - a.budget);
}

function myRatingCellHtml(r) {
  return r ? `<span class="tag tev-${esc(r)}">${esc(r)}</span>` : '<span style="color:#9ca3af">未評価</span>';
}
function voteCellHtml(agg) {
  const c = agg || {'続行':0,'廃止':0,'見直し':0};
  const total = c['続行'] + c['廃止'] + c['見直し'];
  if (!total) return '<span style="color:#9ca3af">-</span>';
  return `<span class="pc pc-k">続${c['続行']}</span><span class="pc pc-h">廃${c['廃止']}</span><span class="pc pc-f">見${c['見直し']}</span>`;
}
// ドリルダウン表用：列幅が狭いため3つのバッジを縦積みにする版
function voteCellStackHtml(agg) {
  const c = agg || {'続行':0,'廃止':0,'見直し':0};
  const total = c['続行'] + c['廃止'] + c['見直し'];
  if (!total) return '<span style="color:#9ca3af;font-size:.72rem">-</span>';
  return `<div class="vote-stack"><span class="pc pc-k">続${c['続行']}</span><span class="pc pc-h">廃${c['廃止']}</span><span class="pc pc-f">見${c['見直し']}</span></div>`;
}
function classifyStackHtml(e) {
  return `<div class="vtag-stack">${rootTagHtml(e.root)}${ptypeTagHtml(e.ptype)}${evTagHtml(e.ev)}</div>`;
}
function voteCsvText(rows) {
  const header = ['事業番号','事務事業名','施策',LABELS.dept,'金額','法定義務','提供形態','行政評価','自分の評価','続行票','廃止票','見直し票'];
  const csvRows = rows.map(e => {
    const c = peopleAgg[e.no] || {'続行':0,'廃止':0,'見直し':0};
    return [e.no, e.name, e.cls, e.dept, e.budget, e.root, PTYPE_LABEL[e.ptype] || e.ptype, e.ev, ratings[e.no] || '', c['続行'], c['廃止'], c['見直し']];
  });
  return '﻿' + [header, ...csvRows].map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
}
function downloadVoteCsv() {
  const csv = voteCsvText(voteRows());
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = '富田林市_評価結果一覧.csv';
  a.click();
}

// 透明性確保のための生データ出力：Supabaseに蓄積された全投票ログをそのまま書き出す（現在の絞り込みの影響を受けない）
async function downloadPeopleCsv() {
  const { data, error } = await sb
    .from('ratings').select('id,municipality_id,event_no,rating,submitted_at')
    .eq('municipality_id', MUNICIPALITY_ID).order('submitted_at');
  if (error) { alert('取得エラー: ' + error.message); return; }
  const header = ['id', 'municipality_id', 'event_no', 'rating', 'submitted_at'];
  const csvRows = (data || []).map(r => header.map(k => '"' + String(r[k]).replace(/"/g, '""') + '"').join(','));
  const csv = '﻿' + [header.join(','), ...csvRows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = MUNICIPALITY_ID + '_ratings.csv';
  a.click();
}

function renderVoteSection() {
  const section = document.getElementById('vote-section');
  if (!section) return;
  if (!peopleAgg) { section.innerHTML = '<p style="color:#6b7280;font-size:.85rem">読み込み中...</p>'; return; }

  const allData = Object.values(peopleAgg).reduce((a, c) => ({
    '続行': a['続行'] + c['続行'], '廃止': a['廃止'] + c['廃止'], '見直し': a['見直し'] + c['見直し']
  }), {'続行': 0, '廃止': 0, '見直し': 0});
  const totalVotes = allData['続行'] + allData['廃止'] + allData['見直し'];

  if (!totalVotes && !Object.values(ratings).some(r => r)) {
    section.innerHTML = '<p style="color:#6b7280;font-size:.85rem">まだ評価・投票がありません。</p>';
    return;
  }

  const filterOptions = ['', '続行', '廃止', '見直し', '未評価'];
  const filterBtns = filterOptions.map(v => {
    const label = v || '全事業';
    return `<button class="stbtn${voteFilter === v ? ' active' : ''}" onclick="setVoteFilter('${esc(v)}')">${esc(label)}</button>`;
  }).join('');

  const rows = voteRows();

  // ブラウザ表示用：6列に圧縮し、セル内で折り返す（横スクロール不要）
  const compactRows = rows.map(e => `<tr>
      <td><div class="evtd-name">${esc(e.name)}</div><div class="vno">No.${esc(e.no)}</div></td>
      <td>${esc(e.cls)}<div class="vsub">${esc(e.dept)}</div></td>
      <td>${fmt(e.budget)}千円</td>
      <td>${classifyStackHtml(e)}</td>
      <td>${myRatingCellHtml(ratings[e.no])}</td>
      <td>${voteCellHtml(peopleAgg[e.no])}</td>
    </tr>`).join('');

  // 印刷・CSV用：完全版10列（画面には出さず@media printでのみ表示）
  const printRows = rows.map(e => `<tr>
      <td>${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td>${esc(e.cls)}</td>
      <td>${esc(e.dept)}</td>
      <td>${fmt(e.budget)}千円</td>
      <td>${rootTagShortHtml(e.root)}</td>
      <td>${ptypeTagHtml(e.ptype)}</td>
      <td>${evTagShortHtml(e.ev)}</td>
      <td>${myRatingCellHtml(ratings[e.no])}</td>
      <td>${voteCellHtml(peopleAgg[e.no])}</td>
    </tr>`).join('');

  section.innerHTML = `
    <div class="kgrid" style="margin-bottom:12px">
      <div class="kbox kk"><div class="klbl">続行票</div><div class="knum">${allData['続行']}</div></div>
      <div class="kbox kh"><div class="klbl">廃止票</div><div class="knum">${allData['廃止']}</div></div>
      <div class="kbox kf"><div class="klbl">見直し票</div><div class="knum">${allData['見直し']}</div></div>
      <div class="kbox ku"><div class="klbl">総投票数</div><div class="knum">${totalVotes}</div></div>
    </div>
    <div class="filterrow no-print">${filterBtns}</div>
    <div class="bbtns no-print" style="margin-bottom:8px">
      <button class="btn btn-o btn-sm" onclick="window.print()">🖨 印刷（全項目）</button>
      <button class="btn btn-o btn-sm" onclick="downloadVoteCsv()">📥 CSVダウンロード（全項目）</button>
      <button class="btn btn-o btn-sm" onclick="downloadPeopleCsv()">📥 生データCSV</button>
    </div>
    <div class="votetbl-wrap"><table class="votetbl">
      <thead><tr><th>事務事業名</th><th>施策／担当課</th><th>金額</th><th>分類</th><th>自分の評価</th><th>みんなの投票</th></tr></thead>
      <tbody>${compactRows}</tbody>
    </table></div>
    <div class="votetbl-print"><table class="evtbl">
      <thead><tr>
        <th>${esc(LABELS.no_col)}</th><th>事務事業名</th><th>施策</th><th>${esc(LABELS.dept)}</th><th>金額</th>
        <th>法定義務</th><th>提供形態</th><th>行政評価</th><th>自分の評価</th><th>みんなの投票</th>
      </tr></thead>
      <tbody>${printRows}</tbody>
    </table></div>`;
}

window.onload = load;

</script>
</body>
</html>
