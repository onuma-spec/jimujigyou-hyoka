<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>西宮市 事務事業優先度評価ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.8;margin-top:3px}
.card-nav{display:flex;justify-content:space-between;align-items:center;gap:6px}
.cnav-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0;max-width:42%}
.cnav-btn:hover{background:rgba(255,255,255,.25)}
.cnav-mid{font-size:.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;padding:0 4px}
.cnav-mid-wrap{font-size:.85rem;flex:1;min-width:0;text-align:center;padding:0 4px;line-height:1.4}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-full{width:100%;margin-bottom:8px}

.bbtns{display:flex;gap:8px;flex-wrap:wrap}

/* マップ画面 */
.filterrow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stbtn{padding:7px 14px;border:1px solid #d1d5db;border-radius:20px;background:#fff;color:#374151;font-size:.82rem;font-weight:600;cursor:pointer}
.stbtn.active{background:#1e40af;color:#fff;border-color:#1e40af}
.maphint{font-size:.82rem;color:#6b7280;line-height:1.6}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:8px}
.sec-heading{font-size:.85rem;font-weight:700;color:#374151;margin-bottom:6px}

.clsgrid-wrap{border:1px solid #eef0f2;border-radius:6px;padding:8px;max-height:35vh;overflow-y:auto}
.clsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.clsbox{background:#fff;border:1px solid #eef0f2;border-radius:6px;padding:7px 10px;cursor:pointer;transition:background .15s;min-width:0}
.clsbox:hover{background:#f7f9fc}
.clstop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.clsname{font-weight:700;font-size:.85rem;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.clsamt{font-size:.76rem;color:#374151;white-space:nowrap;flex-shrink:0}
.clsamt b{color:#1e40af}
.clsbar-wrap{background:#eef2f7;border-radius:3px;height:5px;margin-bottom:4px;overflow:hidden}
.clsbar{background:#1e40af;height:100%;border-radius:3px}
.clsmeta{font-size:.7rem;color:#9ca3af}

/* cls drilldown：行政評価（ev）でグルーピング。事業一覧は表形式（法定義務・提供形態を列見出しで明示） */
.evsec{border:1px solid #eef0f2;border-radius:6px;margin-bottom:8px;overflow:hidden}
.evsec:last-child{margin-bottom:0}
.evsec summary{padding:9px 12px;cursor:pointer;font-weight:700;font-size:.85rem;color:#374151;background:#f8f9fb;list-style:none;user-select:none}
.evsec summary::-webkit-details-marker{display:none}
.evsec summary::before{content:'▶ ';font-size:.7rem;color:#9ca3af}
.evsec[open] summary::before{content:'▼ '}
.evsec-body{padding:6px 12px 2px}
.evtbl-wrap{overflow:auto;max-height:320px;border:1px solid #eef0f2;border-radius:6px}
.evtbl{border-collapse:collapse;font-size:.82rem}
.evtbl th{text-align:left;font-weight:600;color:#6b7280;font-size:.7rem;padding:4px 8px;border-bottom:1px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;background:#fff;z-index:1}
.evtbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:normal;word-break:break-word}
.evtbl tr:last-child td{border-bottom:none}
.evtd-chk{width:32px;min-width:32px;max-width:32px}
.evtd-chk input{width:16px;height:16px}
.evtd-name{font-weight:600;color:#111827;cursor:pointer;width:126px;min-width:126px;max-width:126px}
.evtd-budget{color:#374151;width:65px;min-width:65px;max-width:65px}
.evtd-root{width:70px;min-width:70px;max-width:70px;font-size:.7rem;font-weight:600;overflow:hidden}
.evtd-ptype{width:100px;min-width:100px;max-width:100px;font-weight:600}
.evtd-mine{width:80px;min-width:80px;max-width:80px}
.evtd-vote{width:70px;min-width:70px;max-width:70px}
.evtbl td.evtd-budget{white-space:nowrap}
.evtbl th.evtd-root{white-space:normal}
.vote-stack{display:flex;flex-direction:column;gap:2px;align-items:flex-start}

/* サマリー画面：評価結果一覧（ブラウザ表示用の圧縮テーブル。列を減らしセル内で折り返す） */
.votetbl-wrap{overflow:auto;max-height:420px;border:1px solid #eef0f2;border-radius:6px}
.votetbl{width:100%;border-collapse:collapse;font-size:.82rem}
.votetbl th{text-align:left;font-weight:600;color:#6b7280;font-size:.7rem;padding:6px 8px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:1}
.votetbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:top;white-space:normal}
.votetbl tr:last-child td{border-bottom:none}
.votetbl .vsub{font-size:.72rem;color:#6b7280;margin-top:2px}
.votetbl .vno{font-size:.7rem;color:#9ca3af}
.vtag-stack{display:flex;flex-direction:column;gap:3px;align-items:flex-start}

/* サマリー画面：印刷専用の完全版（10列）テーブル。画面には出さず@media printでのみ表示 */
.votetbl-print{display:none}

/* タグ */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
.troot-法定義務あり{background:#dbeafe;color:#1d4ed8}
.troot-法定義務なし{background:#fef3c7;color:#92400e}
.troot-判断できない{background:#f3f4f6;color:#6b7280}
.troot-データなし{background:#f3f4f6;color:#9ca3af}
.tev-拡大{background:#dcfce7;color:#15803d}
.tev-現状継続{background:#dbeafe;color:#1d4ed8}
.tev-改善（手段変更）{background:#fef3c7;color:#92400e}
.tev-縮小{background:#ffedd5;color:#c2410c}
.tev-廃止方向{background:#fee2e2;color:#dc2626}
.tev-完了{background:#f3e8ff;color:#7c3aed}
.tev-続行{background:#dcfce7;color:#15803d}
.tev-廃止{background:#fee2e2;color:#dc2626}
.tev-見直し{background:#fef3c7;color:#92400e}
.tptype-green{background:#ccfbf1;color:#0f766e}
.tptype-blue{background:#dbeafe;color:#1d4ed8}
.tptype-gray{background:#f3f4f6;color:#6b7280}
.tptype-amber{background:#fef3c7;color:#92400e}
.tptype-purple{background:#ede9fe;color:#6d28d9}
/* ドリルダウン表の提供形態列：タグではなくフル文言のプレーンテキスト表示（色分けのみ引き継ぐ） */
.ptype-plain-green{color:#0f766e}
.ptype-plain-blue{color:#1d4ed8}
.ptype-plain-gray{color:#6b7280}
.ptype-plain-amber{color:#92400e}
.ptype-plain-purple{color:#6d28d9}
/* ドリルダウン表の法定義務列：列幅確保のためタグではなくプレーンテキスト表示 */
.root-plain-法定義務あり{color:#1d4ed8}
.root-plain-法定義務なし{color:#92400e}
.root-plain-判断できない{color:#6b7280}
.root-plain-データなし{color:#9ca3af}

/* カードの説明：処理タイプバッジ（既存タグと同系色を再利用） */
.tproc-転記{background:#f3f4f6;color:#6b7280}
.tproc-区分・分類{background:#dbeafe;color:#1d4ed8}
.tproc-AI分類{background:#ede9fe;color:#6d28d9}
.tproc-AI要約{background:#ede9fe;color:#6d28d9}
.tproc-固定表示{background:#fef3c7;color:#92400e}
/* カードの説明：評価シート起点の対応表 */
.gintro{font-size:.84rem;line-height:1.8;color:#6b7280;margin-bottom:16px}
.gproc-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;font-size:.78rem}
.gproc-legend span{display:flex;align-items:center;gap:5px}
/* カードの説明の対応表：画面幅によらず縦積みブロックに統一（3列実テーブルはモバイル・PC双方で窮屈になるため不採用） */
.gtbl{width:100%;margin-bottom:16px;font-size:.82rem;border:1px solid #e5e7eb;border-radius:6px;overflow:hidden}
.grow{display:flex;flex-wrap:wrap;gap:2px 10px;align-items:baseline;border-top:1px solid #e5e7eb;padding:10px 12px}
.grow:first-child{border-top:none}
.grow.ghead{display:none}
.gc-item{font-weight:700;color:#1e40af;flex:none;order:1}
.gc-proc{flex:none;margin-left:auto;order:2}
.gc-src{flex:0 0 100%;max-width:640px;color:#374151;line-height:1.8;margin-top:2px;order:3}
.gmap{margin-top:6px}
.gmap .row{display:flex;gap:6px;padding:3px 0;border-top:1px dashed #eef0f2;font-size:.78rem}
.gmap .row:first-child{border-top:none;padding-top:6px}
.gmap .k{color:#6b7280;flex:1;min-width:0}
.gmap .v{color:#1e40af;font-weight:600;flex:none;white-space:nowrap;padding-left:6px}
.gitem{margin-top:4px}
.glbl{font-weight:700;font-size:.92rem;margin-bottom:6px;color:#1e40af}
.gitem p{font-size:.85rem;line-height:1.8;color:#374151;margin:0}

/* 評価カード（opt-inキュー） */
.pbwrap{background:#e5e7eb;border-radius:4px;height:6px;margin-bottom:12px}
.pbfill{background:#1e40af;height:100%;border-radius:4px;transition:width .3s}
.ecard{background:#fff;border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #e5e7eb}
.ecard.rk{border-left-color:#22c55e}
.ecard.rh{border-left-color:#ef4444}
.ecard.rf{border-left-color:#f59e0b}
.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}
.ename{font-size:1.15rem;font-weight:700;color:#111827;margin-bottom:4px;line-height:1.3}
.ebudget{font-size:.85rem;margin-bottom:12px;color:#374151}
.ebudget .amt{font-weight:700;font-size:1rem;color:#1e40af}
.story{margin-bottom:14px}
.story p{font-size:.9rem;line-height:1.75;color:#1f2937;margin-bottom:6px}
.story-label{font-size:.72rem;font-weight:700;color:#6b7280;margin-bottom:3px;letter-spacing:.03em}
.ai-note{font-size:.75rem;color:#713f12;line-height:1.65;margin-bottom:8px;background:#fef9c3;border:1px solid #fde047;border-radius:6px;padding:8px 10px}
.sticky-actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e5e7eb;z-index:100;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.sticky-inner{max-width:780px;margin:0 auto;padding:10px 12px}
.sticky-spacer{height:110px}
.sticky-spacer.tall{height:230px}
.rbtns{display:flex;gap:10px;margin:16px 0}
.rbtn{flex:1;padding:12px 6px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:#f9fafb;color:#374151;text-align:center;transition:all .15s;line-height:1.4}
.rbtn:hover{border-color:#9ca3af}
.rbtn small{display:block;font-size:.7rem;font-weight:400;margin-top:2px;opacity:.8}
.rbtn.ak{background:#22c55e;color:#fff;border-color:#22c55e}
.rbtn.ah{background:#ef4444;color:#fff;border-color:#ef4444}
.rbtn.af{background:#f59e0b;color:#fff;border-color:#f59e0b}
.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

/* サマリー */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kbox .klbl{font-size:.75rem;color:#6b7280;margin-bottom:6px}
.kbox .knum{font-size:1.7rem;font-weight:700}
.kh .knum{color:#dc2626}
.kf .knum{color:#d97706}
.kk .knum{color:#059669}
.ku .knum{color:#6b7280}

.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid #e5e7eb}
.stbl td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.stbl tr:last-child td{border-bottom:none}
.stbl-wrap{overflow-x:auto}

.pc{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.75rem;font-weight:600;margin-right:2px;white-space:nowrap}
.pc-k{background:#dcfce7;color:#16a34a}
.pc-h{background:#fee2e2;color:#dc2626}
.pc-f{background:#fef3c7;color:#d97706}

@media(max-width:480px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .rbtns{flex-direction:column}
}

@media print{
  .no-print{display:none !important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #e5e7eb}
  .votetbl-wrap{display:none}
  .votetbl-print{display:block}
  .evtbl-wrap{max-height:none;overflow:visible;border:none}
  .evtbl td, .evtbl th{white-space:normal}
  @page{size:landscape}
}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const EVENTS = [{"no":"620102","name":"政策推進事務","bureau":"政策局","dept":"政策局　政策推進課","budget":50700,"root":"判断できない","ev":"現状継続","ptype":"10","story_p1":"市民が満足できるまちづくりを実現するために、長期的な指針となる総合計画に基づいて、実行可能な実施計画を策定し、計画的な政策推進を行っています。","story_p2":"総合計画に基づく政策・施策の推進として、実施計画策定と事業概要の編纂を行いました。また、総合戦略の進捗管理として有識者会議を開催し、第３期計画を策定・公開しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":26,"cls":"政策推進","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou1v2.pdf"},{"no":"620201","name":"企画調整事務","bureau":"政策局","dept":"政策局　政策推進課（政策局総括）","budget":19088,"root":"判断できない","ev":"現状継続","ptype":"8","story_p1":"市政の透明性と効率性を高めるために、庁内の幹部職員による協議を定期的に開催し、その内容を市民に公開しています。また、国県への要望調整や広域連携を通じて、地域全体の発展を推進しています。","story_p2":"庁議として政策調整会議16回・総括室長会議12回を開催し、国・県への要望事項の調整や総合教育会議の開催、幼児教育・保育のあり方に関するアクションプランの策定などを実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":28,"cls":"政策推進","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou1v2.pdf"},{"no":"620103","name":"周年事業事務","bureau":"政策局","dept":"政策局　政策推進課（周年事業等）","budget":83050,"root":"法定義務なし","ev":"現状継続","ptype":"11","story_p1":"令和7年4月の市制施行100周年という節目を記念し、次の世代へ文教住宅都市の価値を継承するために、市民参加による記念事業を展開しています。","story_p2":"市制100周年に向けたプレ事業として、記念誌制作でふるさと納税型クラウドファンディングにより209名から約211万円を集め、記念式典の企画調整やタイムカプセル開封式典を実施しました。団体等による冠付事業の実施件数については、目標を概ね達成できています。","story_impact":"判断できない","pdf_page":30,"cls":"政策推進","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou1v2.pdf"},{"no":"140103","name":"阪神西宮駅北地区公民連携事業","bureau":"政策局","dept":"政策局　政策推進課（施設・まちづくり）／都市計画課","budget":66520,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"阪神西宮駅北地区を市民生活やさまざまな都市活動の拠点として発展させるために、土地区画整理事業と市街地再開発事業を実施し、交通利便性の向上と新たな都市機能の集積に取り組んでいます。","story_p2":"区画整理では現況測量や基本設計などの検討業務を実施し、民間事業者との調整会議を12回開催して進捗状況を共有しました。再開発では施設建築物の基本計画を策定しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":32,"cls":"市街地","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files _url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"470201","name":"農業施設維持管理事業","bureau":"産業文化局","dept":"産業文化局　農政課","budget":22982,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"農業用水の安定供給と豪雨時の治水対策を確保するために、老朽化が進む灌漑用樋門やポンプ、農業用ため池などの農業施設の補修・改修を支援しています。","story_p2":"農会からの要望40件中27件の農業用施設補修・改修工事を実施しました。農業用施設の補修改修工事実施率は目標をやや達成できませんでしたが、ため池の点検とパトロールも継続的に実施しています。","story_impact":"判断できない","pdf_page":126,"cls":"農業・食の流通","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"470301","name":"有害鳥獣・外来生物捕獲等事業","bureau":"産業文化局","dept":"産業文化局　農政課","budget":31924,"root":"判断できない","ev":"現状継続","ptype":"9","story_p1":"農業被害や市民の安全を脅かす有害鳥獣やカラスから住民を守るため、猟友会と連携して適切な駆除と巣の撤去を行っています。","story_p2":"イノシシなどの有害鳥獣捕獲業務やアライグマ等の特定外来生物捕獲処理業務を実施し、カラスの巣撤去10件、タカによる追払い業務19回を行いました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":128,"cls":"農業・食の流通","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"470204","name":"農業用水利施設改修事業","bureau":"産業文化局","dept":"産業文化局　農政課","budget":101477,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"武庫川の渇水時に備えた重要な水源確保と、防災重点ため池の安全性向上のため、老朽化した古川樋門の更新と山池の法面災害対策工事を実施しています。","story_p2":"農業用水利施設の改修に向けて、山池急傾斜地崩壊対策設計を実施し、次年度の工事実施に向けた工法等の決定調査を行いました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":130,"cls":"農業・食の流通","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"580301","name":"計量検査関係事務","bureau":"産業文化局","dept":"産業文化局　消費生活センター","budget":9277,"root":"判断できない","ev":"現状継続","ptype":"9","story_p1":"店舗や事業所で使用するはかりが正確であることを確保するために、定期検査と立入検査を実施しています。","story_p2":"定期検査では1,731器を対象に検査を実施し、不合格の17器について修理または廃棄・新調を指導しました。特定計量器の合格率は目標をおおむね達成できています。","story_impact":"判断できない","pdf_page":132,"cls":"地域防犯・交通安全・消費者安全","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"580302","name":"消費生活相談事業","bureau":"産業文化局","dept":"産業文化局　消費生活センター","budget":38058,"root":"判断できない","ev":"現状継続","ptype":"5","story_p1":"消費者と事業者の情報格差を解決し、消費者が自主的・合理的に交渉できるよう支援しています。相談から斡旋まで、県や国の機関と連携して問題解決に努めています。","story_p2":"消費生活相談事業では、4,716件の相談に対応し、このうち76.0％が即日処理されました。インターネット通販や定期購入に関する相談が多く、70歳代以上からの相談が最多となっています。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":134,"cls":"地域防犯・交通安全・消費者安全","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"580303","name":"消費者教育・啓発事業","bureau":"産業文化局","dept":"産業文化局　消費生活センター","budget":24969,"root":"判断できない","ev":"改善（手段変更）","ptype":"11","story_p1":"高度化する消費者問題に対応するため、学校や地域での消費者教育を推進し、高齢者被害の防止や若年層への金銭教育など、生活に身近な啓発事業を実施しています。","story_p2":"出前講座73回で2,998人が参加するなど、多様な媒体・方法での消費者教育啓発活動を実施しました。成果指標である出前講座の延べ参加者数は目標をやや達成できませんでした。","story_impact":"判断できない","pdf_page":136,"cls":"地域防犯・交通安全・消費者安全","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"580304","name":"消費生活センター管理運営事業","bureau":"産業文化局","dept":"産業文化局　消費生活センター","budget":26326,"root":"法定義務なし","ev":"改善（手段変更）","ptype":"5","story_p1":"市民の安全な消費生活を確保するために、消費生活に関する相談対応と情報提供を行うとともに、消費者教育や消費者団体の学習・研修・交流の場として活用しています。","story_p2":"消費生活センターは年間293日開館し、学習室・実習室の利用は478回でした。うち登録団体による利用は153回で、減免制度により160件の利用料が軽減されています。ただし、学習室・実習室の利用率は目標を大きく下回る評価となりました。","story_impact":"判断できない","pdf_page":138,"cls":"地域防犯・交通安全・消費者安全","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"580306","name":"消費生活センター改修事業","bureau":"産業文化局","dept":"産業文化局　消費生活センター","budget":97,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"住民の皆様が安心して相談できる環境を整えるため、消費生活センター施設の老朽化した部分を改修し、施設の機能を維持・向上させています。","story_p2":"当年度は消費生活センター改修事業の実施がありませんでした。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":140,"cls":"地域防犯・交通安全・消費者安全","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"460101","name":"地域商業活性化対策事業","bureau":"産業文化局","dept":"産業文化局　商工課","budget":29645,"root": p2":"所有する商業床をニトリに賃貸し、実質利回り3.4%を達成しています。また、西宮都市管理株式会社への長期貸付について経営状況のモニタリングを行い、安定した返済を確認しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":150,"cls":"産業","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"460204","name":"フレンテ西宮商業床改修事業","bureau":"産業文化局","dept":"産業文化局　商工課","budget":0,"root":"法定義務なし","ev":"廃止方向","ptype":"6","story_p1":"フレンテ西宮の商業床を良好な状態に保つために、施設の維持に必要な改修工事を行っています。","story_p2":"防火シャッター取替工事を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":152,"cls":"産業","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"440101","name":"都市ブランド発信事業","bureau":"産業文化局","dept":"産業文化局　商工課（都市ブランド発信）","budget":105654,"root":"法定義務なし","ev":"現状継続","ptype":"11","story_p1":"市内産業と地域の活性化を図るため、観光協会などと連携し、スポーツや歴史文化、地域産業を核としたイベント開催やSNS・観光案内所での情報発信を行っています。","story_p2":"観光協会への補助を通じた観光情報発信、阪神西宮駅の案内所での14,525件の対応、スポーツを核とした甲子園エリア活性化事業を推進しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":154,"cls":"都市ブランド","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"480101","name":"勤労者福祉事業","bureau":"産業文化局","dept":"産業文化局　労政課","budget":57294,"root":"法定義務なし","ev":"現状継続","ptype":"10","story_p1":"勤労者とその家族の福祉を向上させるため、働きやすいまちづくりを実現する各種施策を実施しています。","story_p2":"若年層向けサポートステーション、就労支援センター、ハローワーク連携事業など複数の支援機関により、新規登録者数386人、就職者数378人の実績を挙げました。若年者等就労支援事業による就業者数は目標を概ね達成できています。","story_impact":"判断できない","pdf_page":156,"cls":"就業・労働","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"480102","name":"西宮市シルバー人材センター補助事業","bureau":"産業文化局","dept":"産業文化局　労政課","budget":31195,"root":"法定義務あり","ev":"現状継続","ptype":"7","story_p1":"高齢者の生きがい創造と地域への貢献を促進するため、シルバー人材センターを支援し、高齢者の知識や経験を活かした就業機会の確保に取り組んでいます。","story_p2":"シルバー人材センターによる高年齢者向けの就業機会確保事業に対して運営費を補助し、臨時的かつ短期的な就業機会の提供を支援しました。成果指標のデータはありませんが、事業は目標を概ね達成できています。","story_impact":"判断できない","pdf_page":158,"cls":"就業・労働","pdf_url":"http et":2832077,"root":"法定義務あり","ev":"現状継続","ptype":"6","story_p1":"家庭や事業所から出されるごみを適切に処理するために、西部総合処理センターで焼却・破砕などの中間処理を行い、資源化できるものは回収した後、残った灰や残渣を広域処分場で埋立処分しています。","story_p2":"可燃ごみ、不延ごみ、粗大ごみを合わせ約69,000tを処理し、焼却処理や破砕選別処理を実施しました。また、ダンボールやペットボトルなど約9,000tの資源ごみを分別収集し直接資源化するとともに、選別物の売払収入と電力供給収入を得ており、目標を概ね達成できています。","story_impact":"判断できない","pdf_page":288,"cls":"生活環境","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"520208","name":"東部総合処理センター管理運営事業","bureau":"環境局","dept":"環境局　施設管理課","budget":824149,"root":"法定義務あり","ev":"現状継続","ptype":"6","story_p1":"家庭から排出された燃やすごみを適切に処理するために、東部総合処理センターで焼却処理を行い、発生した焼却灰は広域処分場で埋立処分しています。","story_p2":"可燃ごみ約55,000トンの焼却処理を実施し、発生した焼却灰を埋立処分またはセメント化処理するとともに、電力供給により収入を得ました。評価指標の実績値はありませんが、目標を概ね達成できています。","story_impact":"判断できない","pdf_page":290,"cls":"生活環境","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"520210","name":"ごみ意識高揚啓発事業","bureau":"環境局","dept":"環境局　施設操作課","budget":54887,"root":"法定義務なし","ev":"現状継続","ptype":"5","story_p1":"ごみ減量と資源リサイクルの大切さを市民に理解してもらうために、リサイクルプラザでの粗大ごみの展示・再利用や、修理教室・フリーマーケット・ごみ展などの各種イベント、処理施設見学を実施しています。","story_p2":"施設見学は西部総合処理センターで31団体2,906人の受け入れを行い、「いきいきごみ展」や各種工房・フリーマーケットなど多数の啓発事業を実施し、合計3,354人以上の参加がありました。リサイクルプラザ来場者数は目標をやや達成できませんでした。","story_impact":"判断できない","pdf_page":292,"cls":"生活環境","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"520212","name":"西部総合処理センター焼却施設整備事業","bureau":"環境局","dept":"環境局　施設整備課","budget":34041,"root":"法定義務あり","ev":"現状継続","ptype":"6","story_p1":"老朽化した焼却施設を更新するために、現有施設の跡地に新しい焼却施設を整備し、稼働後に古い施設を解体する事業を行っています。","story_p2":"西部総合処理センター焼却施設整備事業では、事業者選定の実施方針を公表し、生活環境影響調査の縦覧と汚染物調査を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":294,"cls":"生活環境","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou2.pdf"},{"no":"520214","name":"東部総合処理センター破砕選別施設整備事業","bureau":"環境局","dept":"環境局　施設整備課","bu 。","story_impact":"判断できない","pdf_page":112,"cls":"障害のある人の福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"330205","name":"特別障害者手当等支給事業","bureau":"健康福祉局","dept":"健康福祉局　障害福祉課","budget":344982,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"重度の障害により日常生活で常時介護が必要な方の経済的負担を軽減するために、特別障害者手当や障害児福祉手当を支給しています。","story_p2":"特別障害者手当等は、重度の障害がある在宅の人に年4回支給され、特別障害者手当8,806人分約2.53億円、障害児福祉手当4,029人分約6,289万円が支給されました。成果指標である延べ受給者数については、目標設定の困難さから評価が行われていません。","story_impact":"判断できない","pdf_page":114,"cls":"障害のある人の福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"330206","name":"障害者介護給付等事業","bureau":"健康福祉局","dept":"健康福祉局　障害福祉課","budget":20098035,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"障害のある方が自分の能力と適性を活かして、自立した生活を送ることができるよう支援するために、障害福祉サービスに関する給付や各種支援を行っています。","story_p2":"障害者介護給付費約87億4千万円、訓練等給付費約47億4千万円、障害児通所給付費約37億3千万円など、合計約169億円の給付を実施しました。成果指標である延べ利用者数については、目標の設定が困難とされています。","story_impact":"判断できない","pdf_page":116,"cls":"障害のある人の福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"330207","name":"地域生活支援事業","bureau":"健康福祉局","dept":"健康福祉局　障害福祉課","budget":979576,"root":"判断できない","ev":"現状継続","ptype":"13","story_p1":"障害者（児）等の福祉を増進し、市民が相互に人格と個性を尊重できる環境を作るために、地域の特性や利用者の状況に応じた柔軟な支援事業を効率的・効果的に実施しています。","story_p2":"相談支援事業をはじめ、意思疎通支援や日常生活用具給付、移動支援など9つの事業を実施しました。相談支援事業の相談件数については、目標の設定が困難なため、実績値の測定に課題があります。","story_impact":"判断できない","pdf_page":118,"cls":"障害のある人の福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"330208","name":"自立支援医療事業","bureau":"健康福祉局","dept":"健康福祉局　障害福祉課","budget":569338,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"障害のある人が日常生活や仕事に必要な能力を回復・改善できるよう、障害を軽減するための医療費を助成しています。","story_p2":"自立支援医療事業では、総給付額526,406,893円で582件の給付決定を行い、特に内部障害の医療（人工透析やペースメーカー埋込み術等）が中心となっています。給付決定件数については、目標の設定が困難であることから評価が行われていません。","story_impact":"判断でき or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"320507","name":"老人保護措置事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":52138,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"65歳以上で、経済的な理由や生活環境の問題により自宅での生活が難しい方々が安心して暮らせるよう、養護老人ホームへの入所措置を講じています。","story_p2":"入所に関する相談は17件ありました。このうち養護老人ホームへの入所措置は2件となっています。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":138,"cls":"高齢者福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"320508","name":"高齢者住宅等安心確保事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":44281,"root":"法定義務なし","ev":"現状継続","ptype":"4","story_p1":"シルバーハウジング等に住む高齢者が安心して生活できるよう、生活援助員を派遣して安否確認や生活相談を行い、関係機関と連携しながら支援体制を整えています。","story_p2":"生活援助員を6住宅に計7名派遣し、514戸の高齢者住宅で生活相談2,519件と一時的家事援助255件の支援を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":140,"cls":"高齢者福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"320703","name":"成年後見制度利用支援事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":52838,"root":"判断できない","ev":"現状継続","ptype":"5","story_p1":"判断能力が低下した方が安心して生活できるよう、後見申立が困難な場合は行政が代わりに家庭裁判所に申立てを行い、また費用負担が理由で制度利用が難しい方に対して申立費用や報酬の一部を助成しています。","story_p2":"市長申し立て25件、後見人報酬助成101件を実施し、関係部門への研修を通じて連携強化を図りました。成年後見が必要な住民への支援体制を整備していますが、目標設定の困難さから成果の数値化が課題となっています。","story_impact":"判断できない","pdf_page":142,"cls":"高齢者福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"320704","name":"高齢者虐待防止ネットワーク事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":22570,"root":"判断できない","ev":"現状継続","ptype":"9","story_p1":"高齢者への虐待を防ぎ、被害者を守るため、関係機関が連携するネットワークの構築や相談対応、そして虐待防止に関する啓発活動を行っています。","story_p2":"虐待通報142件に対して73件を虐待と認定し、3機関が連携して事実確認と支援を実施しました。また、各地域包括支援センターとのヒアリングを通じて困難ケースや課題を協議しています。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":144,"cls":"高齢者福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"330101","name":"権利擁護支援センター運営事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":51871,"root":"法定義務なし","ev":"現状継続","ptype":"4","story_p1":"高齢者と障害者が安心して生活できるよう、権利擁護支援センターを設置し、相談支援や法的支援、成年後見制度の利用支援などの総合的なサポートを行っています。","story_p2":"権利擁護支援センターでは、新規相談712件、継続相談5,071件、専門相談76件に対応しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":146,"cls":"障害のある人の福祉","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"340101","name":"生活保護扶助事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":15025556,"root":"法定義務あり","ev":"現状継続","ptype":"13","story_p1":"生活に困窮する市民の皆さんが最低限度の生活を送れるよう支援するために、生活保護扶助を行っています。同時に、受給者の自立を促進することで、安定した生活の実現を目指しています。","story_p2":"生活保護の扶助は生活扶助、住宅扶助、医療扶助など複数の種類があり、延べ218,456世帯、271,441人に対して約139億円の扶助金を支給しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":148,"cls":"生活支援","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"340201","name":"生活困窮者自立支援等事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":157672,"root":"判断できない","ev":"現状継続","ptype":"13","story_p1":"生活が困難な方が生活保護に頼らず自立できるよう支援するため、相談対応や家計改善、就労支援などの様々なサービスを提供しています。","story_p2":"生活困窮者向けに自立相談支援753件、住居確保給付金12件、就労準備支援42回、学習支援1,536人など多面的な支援を実施しました。就労・増収件数は目標を概ね達成できており、被保護者の就労支援でも24人の就労につながるなど、自立支援の成果が現れています。","story_impact":"判断できない","pdf_page":150,"cls":"生活支援","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"340501","name":"行旅死亡人等取扱事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":14711,"root":"判断できない","ev":"現状継続","ptype":"9","story_p1":"身元が判明しない、または引き取り手がいない方が亡くなられた場合、適切に対応するために、遺体の火葬と遺骨の保管、官報公告を行っています。","story_p2":"行旅死亡人等の取扱件数は39件でした。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":152,"cls":"生活支援","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou3.pdf"},{"no":"340502","name":"中国残留邦人等生活支援給付事業","bureau":"健康福祉局","dept":"健康福祉局　くらし支援課","budget":21618,"root":"判断できない","ev":"現状継続","ptype":"1 ","bureau":"教育委員会","dept":"教育委員会　地域学校協働課","budget":83290,"root":"法定義務なし","ev":"現状継続","ptype":"8","story_p1":"学校・家庭・地域が一体となって子どもを育成するため、学校運営協議会の開催や地域住民によるボランティア活動を推進しています。","story_p2":"学校運営協議会は小中高等学校など全校種で合計310回開催され、延べ779事業の教育連携事業が実施されました。地域学校協働活動推進員の研修・交流会にも198名が参加し、ネットワークの構築が進みました。教育連携事業の年間総事業数は目標をやや達成できませんでした。","story_impact":"判断できない","pdf_page":132,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"230305","name":"放課後キッズルーム事業","bureau":"教育委員会","dept":"教育委員会　地域学校協働課（放課後事業）","budget":311421,"root":"法定義務なし","ev":"拡大","ptype":"4","story_p1":"小学生が放課後に安全で充実した時間を過ごせるようにするため、学校の教室や運動場を活用した遊びや学びの場を提供しています。","story_p2":"放課後キッズルーム事業は直営型24校、委託型7校の計31校で実施されています。ただし苦楽園小と上甲子園小については現場責任者のコーディネーター配置ができておらず、成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":134,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"230102","name":"青少年育成事業","bureau":"教育委員会","dept":"教育委員会　青少年育成課","budget":62364,"root":"判断できない","ev":"現状継続","ptype":"7","story_p1":"青少年が社会の一員として必要な意識を育むとともに、安全で安心なまちづくりを進めるために、成人式の実施や青少年団体の活動支援を行っています。","story_p2":"成人の日に3,478人が参加する二十歳のつどいを開催し、37地区の青少年愛護協議会による252事業や31地区での放課後子供教室など、地域主体の青少年育成活動を支援しました。実行委員会メンバーの確保は目標をやや達成できませんでした。","story_impact":"判断できない","pdf_page":136,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"230104","name":"山東自然の家管理運営事業","bureau":"教育委員会","dept":"教育委員会　青少年育成課","budget":130971,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"西宮市の児童生徒が豊かな自然環境で学習できるよう、山東自然の家の管理運営を行っています。小学校の自然学校や中学校の転地学習のほか、青少年団体や市民の活動拠点として活用されています。","story_p2":"施設利用は149件、延べ30,519人の利用がありました。西宮市の学校利用が中心で延べ23,797人となっています。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":138,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"230106","name":"山東自然の家改修事業","bureau":"教育委員会","dept":"教育委員会　青少年育成課","budget":30794,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"山東自然の家を利用される方の安全と快適性を確保するため、老朽化した施設や設備を計画的に修繕・改修しています。","story_p2":"山東自然の家において、直流電源装置蓄電池工事を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":140,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"230107","name":"教育委員会神祇官分室維持管理事業","bureau":"教育委員会","dept":"教育委員会　青少年育成課","budget":12975,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"青少年の健全な育成を支援する体制を整えるために、青少年育成課の事務室として使用する教育委員会分室の維持管理を行っています。","story_p2":"清掃や警備、空調保守点検など施設の維持管理業務を継続的に実施し、階段点字タイル取替や汚水管修繕などの必要な修繕を行いました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":142,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"210213","name":"入園関係事業","bureau":"教育委員会","dept":"教育委員会　学事課","budget":9145,"root":"法定義務なし","ev":"現状継続","ptype":"9","story_p1":"市立幼稚園への入園希望者が多い場合でも、公平に入園児を選考するため、一括抽選を実施しています。また、幼児教育無償化に対応し、保育料を段階的に引き下げ、令和元年10月から無償化しました。","story_p2":"市立幼稚園11園のうち定員を上回った園はなく、13園で保育時間終了後の預かり事業「おむすび広場事業」を実施しました。成果を測る指標が設定されていません。","story_impact":"判断できない","pdf_page":144,"cls":"子供・子育て支援","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220202","name":"学籍等事務","bureau":"教育委員会","dept":"教育委員会　学事課","budget":53241,"root":"判断できない","ev":"現状継続","ptype":"9","story_p1":"すべての学齢児童・生徒が適切な教育を受けるために、学籍簿の作成・管理と就学事務を行っています。また、就学先が不明な児童・生徒について調査を実施し、把握に努めています。","story_p2":"新入生への就学通知書郵送や外国籍児童への就学案内、在校生の毎月異動調査、特認校制度による入学希望者募集、卒業証書等学籍諸表簿の作成、就学先未確認児童への照会調査を実施しました。小学校就学率は目標を概ね達成できています。","story_impact":"判断できない","pdf_page":146,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220502","name":"奨学事業","bureau":"教育委員会","dept":"教育委員会　学事課","budget":99973,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"経済的な理由で学び続けることが難しい人々に対して、修学に必要な資金を給付・貸付することで、すべての人に教育の機会が得られるようにしています。","story_p2":"私立高等学校入学給付金74人、高校奨学金271人、大学奨学金42人、在日外国人学校就学助成金18人、中学校夜間学級就学助成金6人に対して学資の給付・貸付を行いました。目標の設定が困難なため、成果指標による評価は行われていません。","story_impact":"判断できない","pdf_page":148,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220503","name":"就学奨励助成事業","bureau":"教育委員会","dept":"教育委員会　学事課","budget":427420,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"経済的理由で就学が困難な児童・生徒の教育を受ける機会を保障するため、給食費などの費用を援助しています。","story_p2":"小学校2,836人、中学校1,626人、特別支援学校28人に対し、厚生労働大臣が定める基準に基づいて就学援助を行いました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":150,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220101","name":"学校改革事務","bureau":"教育委員会","dept":"教育委員会　学事課（教育企画）/学事課","budget":116091,"root":"判断できない","ev":"現状継続","ptype":"10","story_p1":"児童生徒数の変化に対応し、より良い教育環境を整備するために、学校園の統廃合や校区調整、通学路の安全改善などの制度改革と企画調整を行っています。","story_p2":"児童生徒数推計の作成、通学路の安全警備業務委託、8校51箇所の通学路合同点検実施、注意喚起看板の調査・取替、義務教育学校の説明会開催、安全警備業務委託、小規模保育施設卒園児向けの預かり保育実施など、学校改革に関連した多角的な取り組みを実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":152,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220203","name":"基礎学力向上事業","bureau":"教育委員会","dept":"教育委員会　学校教育課","budget":32247,"root":"法定義務なし","ev":"現状継続","ptype":"13","story_p1":"子どもたちの基礎学力の定着を支援するため、ICT活用による学習支援と指導員の配置、また持続発展教育を通じた体験活動の機会を提供しています。","story_p2":"市内61校に学習支援員を配置し、ICT活用授業支援や個別指導など多角的な学習支援を実施しました。また、7校が自然体験学習を、14校がESD推進施設を活用し、自ら学ぶ力の育成に向けて目標をおおむね達成しています。","story_impact":"判断できない","pdf_page":154,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220204","name":"小学校学習指導推進事業","bureau":"教育委員会","dept":"教育委員会　学校教育課","budget":18728,"root":"法定義務なし","ev":"改善（手段変更）","ptype":"5","story_p1":"音楽などの文化的な体験を通じて、生涯学習に取り組む人材を育成するため、小学4年生を対象とした合同音楽会を開催しています。","story_p2":"7月3日から5日の3日間で6ステージの合同音楽会を開催し、市立小学校40校と義務教育学校1校の4年生が参加して、合唱や合奏などの音楽表現 /shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220603","name":"小学校体験活動事業","bureau":"教育委員会","dept":"教育委員会　学校教育課","budget":102758,"root":"法定義務なし","ev":"改善（手段変更）","ptype":"5","story_p1":"児童が豊かな自然の中で人や自然とふれあい、「生きる力」を育成するために、5年生対象の4泊5日宿泊体験と3年生対象の体験型環境学習を実施しています。","story_p2":"41校の5年生4,376人が自然学校で陶芸やカヌー、野外炊飯などの活動を、3年生4,258人が浜探検や川の生き物調査などの環境体験を実施しました。参加児童の様子を測る指標により、目標を概ね達成できています。","story_impact":"判断できない","pdf_page":166,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220604","name":"学校人権教育事業","bureau":"教育委員会","dept":"教育委員会　学校教育課","budget":34670,"root":"法定義務なし","ev":"現状継続","ptype":"13","story_p1":"学校園における人権教育を推進し、教職員の研修支援や日本語指導が必要な児童生徒への支援を行うことで、すべての子どもたちが安心して学べる環境づくりを実現しています。","story_p2":"人権教育指導員の研修会や地区別研修会を開催し、日本語教室を週1回37講座開設して小学生28名、中学生9名が参加しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":168,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220606","name":"トライやる・ウィーク推進事業","bureau":"教育委員会","dept":"教育委員会　学校教育課","budget":21276,"root":"法定義務なし","ev":"現状継続","ptype":"5","story_p1":"阪神・淡路大震災の教訓から「心の教育」の大切さを認識し、中学2年生が1週間学校を離れて地域や自然での体験活動を通じて、生きる力を身に付けるために実施しています。","story_p2":"市立中学2年生などが5月から12月にかけて職業体験やボランティア活動などの5日間の社会体験を実施しました。活動後に充実していたと答えた割合について、目標を概ね達成できている状況です。","story_impact":"判断できない","pdf_page":170,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220205","name":"中学校学習指導推進事業","bureau":"教育委員会","dept":"教育委員会　学校教育課／学校教育課（部活動地域移行推進）","budget":76424,"root":"法定義務なし","ev":"改善（手段変更）","ptype":"13","story_p1":"中学生の学習環境を充実させ、体育・スポーツ、進路指導、音楽教育、部活動など総合的な教育活動を推進するため、各種支援事業と地域との連携に取り組んでいます。","story_p2":"中学校体育連盟への分担金支出、進路指導支援、部活動指導員13校への配置、中学校合同音楽会の開催、地域クラブ活動の基本方針策定など、複数の事業を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":172,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220504","name":"生徒指導事業","bureau":"教育委員会","dept":"教育委員会　児童生徒支援課","budget":125589,"root":"法定義務なし","ev":"現状継続","ptype":"13","story_p1":"児童生徒の自己指導能力を育成し、問題行動に対応するため、スクールサポーターやスクールソーシャルワーカーの配置、学校問題解決支援チームの設置、いじめ相談専用ダイヤルの運営など、多角的な支援体制を整備しています。","story_p2":"スクールソーシャルワーカーやスクールカウンセラーを派遣し、問題行動や不登校への支援を行うとともに、いじめ相談専用ダイヤルの設置や各学校での教育相談充実により、児童生徒の問題解決を図りました。学校問題解決支援チーム派遣による改善割合は目標をやや達成できませんでした。","story_impact":"判断できない","pdf_page":174,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220511","name":"不登校児童生徒支援事業","bureau":"教育委員会","dept":"教育委員会　児童生徒支援課","budget":86454,"root":"法定義務なし","ev":"現状継続","ptype":"5","story_p1":"不登校児童生徒が学校以外の場所で安心して学べる環境を整備するために、複数の教育支援センター「あすなろ」を運営し、個々の状況に応じた支援を行っています。","story_p2":"6つの教育支援センター「あすなろ」で計92名、オンライン支援で27名の児童生徒が利用し、不登校の子どもたちの学習支援と社会的自立に向けた支援を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":176,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"230103","name":"青少年補導関係事業","bureau":"教育委員会","dept":"教育委員会　児童生徒支援課","budget":32862,"root":"法定義務なし","ev":"改善（手段変更）","ptype":"13","story_p1":"青少年の健全育成と非行化防止のために、補導委員による見守りや声かけ、街頭広報、環境浄化活動など、関係機関と連携した総合的な補導活動を実施しています。","story_p2":"39地区162名の補導委員による月3回の巡回補導、全小学校区での合同補導、街頭補導車による市域全体の巡回パトロール、および学校・警察との連携強化や環境実態調査を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":178,"cls":"青少年育成","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"220512","name":"教育支援センター改修事業","bureau":"教育委員会","dept":"教育委員会　児童生徒支援課","budget":15920,"root":"法定義務なし","ev":"現状継続","ptype":"6","story_p1":"不登校児童生徒が安心して学べる環境を作るために、教育支援センター「あすなろ」の老朽化した施設を改修し、支援機能の充実を図っています。","story_p2":"教育支援センターの水道設備改修工事により、安全な水道水の使用環境を整備しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":180,"cls":"学校教育","pdf_url":"https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.files/R7jimujigyou4.pdf"},{"no":"22050 function evTagShortHtml(ev) {

}

function ptypeTagHtml(ptype) {

function ratingTagHtml(r) {
  return r ? `<span class="tag tev-${esc(r)}">あなたの評価：${esc(r)}</span>` : '';
}

// ── 施策(cls)別集計（常に全事業ベース）──────────────────────────────────
function clsStats() {
  const map = {};
  let grandTotal = 0;
  EVENTS.forEach(e => {
    const c = e.cls || 'データなし';
    if (!map[c]) map[c] = { cls: c, count: 0, budget: 0 };
    map[c].count++;
    map[c].budget += e.budget;
    grandTotal += e.budget;
  });
  return { list: Object.values(map), grandTotal };
}

// ── 法的根拠フィルタ（チャート・施策一覧・ドリルダウンすべてに反映） ─────────
function setRootFilter(val) { rootFilter = val; render('map'); }
function matchesFilter(e) { return !rootFilter || e.root === rootFilter; }
function rootFilterOptions() {
  const totals = {};
  EVENTS.forEach(e => { totals[e.root] = (totals[e.root] || 0) + 1; });
  return ROOT_ORDER.filter(r => totals[r] > 0);
}
function filteredClsBudgets() {
  const map = {};
  let total = 0;
  EVENTS.forEach(e => {
    if (!matchesFilter(e)) return;
    const c = e.cls || 'データなし';
    map[c] = (map[c] || 0) + e.budget;
    total += e.budget;
  });
  return { map, total };
}

// ── 画面切替 ─────────────────────────────────────────────────────────────
function render(screen) {
  curScreen = screen;
  const app = document.getElementById('app');
  if (screen === 'map') renderMap(app);
  else if (screen === 'cls') renderClsDrill(app);
  else if (screen === 'eval') renderEval(app);
  else if (screen === 'guide') renderGuide(app);
  else if (screen === 'summary') renderSummary(app);
}

// ── ①全体像マップ ────────────────────────────────────────────────────────
function renderMap(app) {
  const { list: fullList } = clsStats();
  const { map: filteredMap, total: filteredTotal } = filteredClsBudgets();
  const visible = fullList.filter(s => (filteredMap[s.cls] || 0) > 0);
  const sorted = visible.slice().sort((a,b) => (filteredMap[b.cls] || 0) - (filteredMap[a.cls] || 0));
  const maxBudget = Math.max(...sorted.map(s => filteredMap[s.cls] || 0), 1);
  const filteredCount = EVENTS.filter(matchesFilter).length;

  const filterBtns = [''].concat(rootFilterOptions()).map(r => {
    const label = r || '全事務事業';
    return `<button class="stbtn${rootFilter===r?' active':''}" onclick="setRootFilter('${esc(r)}')">${esc(label)}</button>`;
  }).join('');

  const cards = sorted.map(s => {
    const fBudget = filteredMap[s.cls] || 0;
    const evalTarget = EVENTS.filter(e => (e.cls || 'データなし') === s.cls && matchesFilter(e));
    const evaluated = evalTarget.filter(e => ratings[e.no]).length;
    const barPct = maxBudget ? (fBudget / maxBudget * 100).toFixed(1) : 0;
    const sharePct = filteredTotal ? (fBudget / filteredTotal * 100).toFixed(1) : '0.0';
    return `<div class="clsbox" onclick="openCls('${esc(s.cls)}')">
      <div class="clstop">
        <span class="clsname" title="${esc(s.cls)}">${esc(s.cls)}</span>
        <span class="clsamt">${(fBudget/100000).toFixed(1)}億円 <b>${sharePct}%</b></span>
      </div>
      <div class="clsbar-wrap"><div class="clsbar" style="width:${barPct}%"></div></div>
      <div class="clsmeta">${evalTarget.length}件中 評価済み${evaluated}件</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="hd">
      <h1>${esc(LABELS.tool_title)}</h1>
      <div class="sub">${esc(LABELS.card_title)}（全${EVENTS.length}件・${esc(LABELS.cls)}${fullList.length}区分）</div>
    </div>
    <div class="card">
      <div class="filterrow">${filterBtns}</div>
      <p class="maphint">${esc(LABELS.cls)}を選ぶ→事務事業を選ぶ→評価する→投票する、という流れで進みます。まずは${esc(LABELS.cls)}のカードを選んでください。上部のボタンを使うと、法定義務の有無によって事業を絞り込めます（バーの長さと％は、絞り込み対象の中でその${esc(LABELS.cls)}が占める規模を表します）。</p>
      <div class="fresult">${filteredCount}件・${(filteredTotal/100000).toFixed(1)}億円・${esc(LABELS.cls)}${sorted.length}区分　タップで選択</div>
      <div class="sec-heading">${esc(LABELS.cls)}一覧</div>
      <div class="clsgrid-wrap"><div class="clsgrid">${cards}</div></div>
    </div>
    <button class="btn btn-o btn-full" onclick="render('summary')">📊 サマリー・投票を見る</button>
    <div class="card" style="font-size:.75rem;color:#6b7280;line-height:1.5;overflow-wrap:anywhere">
      <strong>出典：</strong><a href="${esc(LABELS.source_url)}" target="_blank" style="overflow-wrap:anywhere">${esc(LABELS.source_url)}</a><br>
      ${esc(LABELS.card_title)}<br>
      住民1人あたりコストは人口${fmt(LABELS.population)}人（<a href="https://www.digital.go.jp/resources/japandashboard/municipal-finance" target="_blank">デジタル庁 地方財政ダッシュボード</a>）で計算
    </div>`;
}

// ── cls ドリルダウン（opt-in選択） ─────────────────────────────────────────
function openCls(cls) {
  curCls = cls;
  selected = new Set();
  openEvKeys = null; // 次回描画時に「現状継続」以外を開いた既定状態で初期化
  render('cls');
}

function renderClsDrill(app) {
  const evs = EVENTS.filter(e => (e.cls || 'データなし') === curCls && matchesFilter(e));

  // グルーピング軸は行政評価ev一本（現状継続のみ既定で折りたたみ）。
  // 12分類（支援対象×提供形態）は行ごとのバッジで「何をしている事業か」を示すのみで、グルーピングには使わない。
  const groups = {};
  evs.forEach(e => {
    const key = e.ev || 'データなし';
    (groups[key] = groups[key] || []).push(e);
  });
  const orderedKeys = EV_PRIORITY.filter(k => groups[k]).concat(Object.keys(groups).filter(k => !EV_PRIORITY.includes(k)));

  // 開閉状態は openEvKeys に保持し、チェックボックス操作による再描画をまたいで維持する（既定はすべて折りたたみ）
  if (!openEvKeys) {
    openEvKeys = new Set();
  }

  const evRowHtml = e => {
    const checked = selected.has(e.no) ? 'checked' : '';
    return `<tr>
      <td class="evtd-chk"><input type="checkbox" ${checked} onchange="toggleSel('${e.no}')"></td>
      <td class="evtd-name" onclick="toggleSel('${e.no}')">${esc(e.name)}</td>
      <td class="evtd-budget">${(e.budget/100000).toFixed(1)}億円</td>
      <td class="evtd-root">${rootPlainHtml(e.root)}</td>
      <td class="evtd-ptype">${ptypePlainHtml(e.ptype)}</td>
      <td class="evtd-mine">${myRatingCellHtml(ratings[e.no])}</td>
      <td class="evtd-vote">${voteCellStackHtml(peopleAgg && peopleAgg[e.no])}</td>
    </tr>`;
  };

  const evTableHtml = list => `<div class="evtbl-wrap"><table class="evtbl">
    <thead><tr>
      <th class="evtd-chk"></th><th class="evtd-name">事務事業名</th><th class="evtd-budget">金額</th>
      <th class="evtd-root">法定義務</th><th class="evtd-ptype">提供形態</th><th class="evtd-mine">自分の評価</th><th class="evtd-vote">みんなの評価</th>
    </tr></thead>
    <tbody>${list.map(evRowHtml).join('')}</tbody>
  </table></div>`;

  const sections = orderedKeys.map(key => {
    const list = groups[key].slice().sort((a,b) => b.budget - a.budget);
    const sumOku = (list.reduce((s,e)=>s+e.budget,0)/100000).toFixed(1);
    const openAttr = openEvKeys.has(key) ? ' open' : '';
    return `<details class="evsec" data-evkey="${esc(key)}"${openAttr} ontoggle="onEvToggle(this)">
      <summary>行政による評価結果が${esc(key)}の事務事業（${list.length}件・${sumOku}億円）</summary>
      <div class="evsec-body">${evTableHtml(list)}</div>
    </details>`;
  }).join('');

  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('map')">← マップに戻る</button>
        <span class="cnav-mid-wrap" title="${esc(curCls)}">${esc(curCls)}${rootFilter ? `（${esc(rootFilter)}のみ）` : ''}</span>
      </div>
    </div>
    <div class="card">
      <div class="bbtns" style="margin-bottom:10px">
        <button class="btn btn-o btn-sm" onclick="selectAllCls(true)">全選択</button>
        <button class="btn btn-o btn-sm" onclick="selectAllCls(false)">全解除</button>
        <span style="font-size:.8rem;color:#6b7280;align-self:center">${evs.length}件中 ${selected.size}件選択中</span>
      </div>
      <p class="maphint" style="margin-bottom:10px">タップして展開し、評価したい事務事業にチェックを入れて「選択した事務事業を評価する」を押してください（複数選択できます）。</p>
      ${sections}
    </div>
    <div class="sticky-spacer no-print"></div>
    <div class="sticky-actions no-print">
      <div class="sticky-inner">
        <button class="btn btn-o btn-full" onclick="render('summary')">📊 サマリー・投票を見る</button>
        <button class="btn btn-p btn-full" ${selected.size ? '' : 'disabled'} onclick="startEvalQueue()">選択した事務事業を評価する（${selected.size}件）</button>
      </div>
    </div>`;
}

function toggleSel(no) {
  if (selected.has(no)) selected.delete(no); else selected.add(no);
  reRenderClsPreserveScroll();
}
function onEvToggle(detailsEl) {
  const key = detailsEl.getAttribute('data-evkey');
  if (detailsEl.open) openEvKeys.add(key); else openEvKeys.delete(key);
}
function selectAllCls(all) {
  const evs = EVENTS.filter(e => (e.cls || 'データなし') === curCls && matchesFilter(e));
  selected = all ? new Set(evs.map(e => e.no)) : new Set();
  reRenderClsPreserveScroll();
}
// チェックボックス操作で画面全体を再描画すると、内訳テーブル（.evtbl-wrap）が
// 個別にスクロール領域を持つためスクロール位置が先頭に戻ってしまう。
// 再描画前後でページ全体とテーブルごとのスクロール位置を保存・復元する。
function reRenderClsPreserveScroll() {
  const sy = window.scrollY;
  const wrapScrolls = {};
  document.querySelectorAll('.evsec').forEach(sec => {
    const wrap = sec.querySelector('.evtbl-wrap');
    if (wrap) wrapScrolls[sec.getAttribute('data-evkey')] = wrap.scrollTop;
  });
  render('cls');
  window.scrollTo(0, sy);
  document.querySelectorAll('.evsec').forEach(sec => {
    const key = sec.getAttribute('data-evkey');
    if (key in wrapScrolls) {
      const wrap = sec.querySelector('.evtbl-wrap');
      if (wrap) wrap.scrollTop = wrapScrolls[key];
    }
  });
}

// ── ②個別評価（opt-inキュー） ───────────────────────────────────────────

  render('eval');
}

        <div class="story-label">成果</div>

      </div>

          <div class="gc-src">Ⅱ「事務事業の実施概要」の「事業概要」欄の文章をAIが読み、住民への提供のされ方（現金給付か、業者委託か、施設・インフラ整備か等）で分類したものです。分類結果は人の目でも確認・補正しています。評価シートに直接この項目はありません。</div>

        </div>
        <div class="grow">
          <div class="gc-item">目的・事業内容</div>
          <div class="gc-src">Ⅱ「事業概要」欄の文章（最大400字）を、AIが1〜2文に要約したものです。</div>
          <div class="gc-proc">${procBadge('AI要約')}</div>
        </div>
        <div class="grow">
          <div class="gc-item">決算額（${esc(LABELS.budget_col)}）</div>
          <div class="gc-src">Ⅲ「事業費（コスト）の推移」表、「トータルコスト（C＋D）E」行の「令和6年度決算」列の数値をそのまま使っています。隣に表示される「住民1人あたり約◯円/年」は、この決算額を西宮市の人口（${fmt(LABELS.population)}人）で割って算出した参考値で、評価シートには記載されていません。</div>
          <div class="gc-proc">${procBadge('転記')}</div>
        </div>
        <div class="grow">
          <div class="gc-item">人件費 含む／含まない</div>
          <div class="gc-src">全事業共通で「含む」表記です（トータルコストが正規職員人件費を含むため。個別の事業ごとに判定しているものではありません）。</div>
          <div class="gc-proc">${procBadge('転記')}</div>
        </div>
        <div class="grow">
          <div class="gc-item">成果</div>
          <div class="gc-src">Ⅱ「令和X年度実施内容」の文章、Ⅳ「事業の成果や効果を示す指標名」、Ⅴ「成果の達成状況」の評価内容をもとに、AIが文章化しています。</div>
          <div class="gc-proc">${procBadge('AI要約')}</div>
        </div>
        <div class="grow">
          <div class="gc-item">廃止した場合の影響</div>
          <div class="gc-src">西宮市の評価シートには、この事業をやめた場合の影響を記載する専用の欄がありません。そのため、この項目は常に「評価シートに記載されていません。」と表示されます。</div>
          <div class="gc-proc">${procBadge('固定表示')}</div>
        </div>
        <div class="grow">
          <div class="gc-item">「📄 評価シートを確認」リンク</div>
          <div class="gc-src">カードの元になった評価シートのPDFの該当ページに直接ジャンプします。事業の所管局に応じて、5分冊（報告書Ⅰ〜Ⅴ）のいずれかにリンクします。</div>
          <div class="gc-proc">${procBadge('転記')}</div>
        </div>
      </div>
      <div class="gitem">
        <div class="glbl">評価ボタン</div>
        <p>
          <span class="rbtn ak" style="display:inline-block;padding:4px 10px;margin:2px 4px 2px 0">✓ 続行</span>活動内容と予算に納得<br>
          <span class="rbtn ah" style="display:inline-block;padding:4px 10px;margin:2px 4px 2px 0">✕ 廃止</span>活動内容に納得できない<br>
          <span class="rbtn af" style="display:inline-block;padding:4px 10px;margin:2px 4px 2px 0">△ 見直し</span>予算に納得できない
        </p>
      </div>

    <div class="sticky-spacer no-print"></div>
    <div class="sticky-actions no-print">
      <div class="sticky-inner">
        <button class="btn btn-p btn-full" onclick="render('eval')">← カードに戻る</button>
      </div>
    </div>`;
}

function rateQueue(val) {
  const e = queue[qCursor];
  ratings[e.no] = val;
  localStorage.setItem(LS_KEY, JSON.stringify(ratings));
  if (qCursor < queue.length - 1) {
    qCursor++;
    render('eval');
  } else {
    // 選んだ事業をすべて評価し終えたらマップに戻る（「評価しては戻ってきてを繰り返す」フロー）
    selected = new Set();
    render('cls');
  }
}
function goQueue(dir) {
  const next = qCursor + dir;
  if (next < 0) return;
  if (next >= queue.length) { render('cls'); return; }
  qCursor = next;
  render('eval');
}

// ── ③サマリー・投票 ─────────────────────────────────────────────────────
function renderSummary(app) {
  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('map')">← マップに戻る</button>
        <span class="cnav-mid">📊 サマリー・投票</span>
      </div>
    </div>
    <div class="card">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:10px">${esc(LABELS.summary_title)}</h2>
      <div class="no-print" style="margin-bottom:12px">
        <button id="submit-btn" class="btn btn-p btn-sm" onclick="submitToSupabase()">📤 投票する</button>
        <span style="font-size:.8rem;color:#6b7280;margin-left:10px">投票すると、自分の評価がみんなの評価に反映されます。<br>送信されるのは事業番号・評価結果（続行/廃止/見直し）・送信日時のみです。個人情報は一切収集しません。<br>追加で評価した事業がある場合は、再度このボタンから投票できます（同じ事業を重複して送信することはありません）。<br>実際の収集情報は下の📥 生データCSVから閲覧できます。</span>
      </div>
      <div class="no-print" style="margin-bottom:12px;padding-top:12px;border-top:1px solid #eef0f2">
        <button class="btn btn-o btn-sm" onclick="downloadAllEventsCsv()">📥 全事務事業データをCSVでダウンロード（${EVENTS.length}件）</button>
        <span style="font-size:.8rem;color:#6b7280;margin-left:10px">評価対象の全事務事業を、目的・事業内容、成果、廃止した場合の影響も含めて一括ダウンロードできます。行政による公表はPDFのみのため、表計算ソフト等でご自身の分析にご活用ください。</span>
      </div>
      <div id="vote-section"><p style="color:#6b7280;font-size:.85rem">読み込み中...</p></div>
    </div>
    <button class="btn btn-o btn-full no-print" onclick="render('map')">← マップに戻る</button>
    <button class="btn btn-o btn-full no-print" onclick="if(confirm('評価をすべてリセットしますか？')){localStorage.removeItem(LS_KEY);localStorage.removeItem(SUBMITTED_KEY);ratings={};render('map')}">🗑 自分の評価をリセット</button>`;
  loadPeopleData();
}

function getSubmittedNos() {
  try {
    const v = JSON.parse(localStorage.getItem(SUBMITTED_KEY) || '[]');
    return Array.isArray(v) ? v : [];
  } catch (e) { return []; }
}

async function submitToSupabase() {
  const already = new Set(getSubmittedNos());
  const rows = Object.entries(ratings)
    .filter(([no, r]) => r && !already.has(no))
    .map(([no, r]) => ({ municipality_id: MUNICIPALITY_ID, event_no: no, rating: r }));
  if (!rows.length) { alert('新しく評価した事業がありません。'); return; }
  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const { error } = await sb.from('ratings').insert(rows);
  if (error) {
    alert('送信エラー: ' + error.message);
    if (btn) { btn.disabled = false; btn.textContent = '📤 投票する'; }
    return;
  }
  rows.forEach(r => already.add(r.event_no));
  localStorage.setItem(SUBMITTED_KEY, JSON.stringify([...already]));
  if (btn) { btn.disabled = false; btn.textContent = '📤 投票する'; }
  alert(`${rows.length}件を送信しました。`);
  loadPeopleData();
}

async function loadPeopleData() {
  const { data, error } = await sb
    .from('ratings').select('event_no,rating').eq('municipality_id', MUNICIPALITY_ID);
  if (error) {
    const section = document.getElementById('vote-section');
    if (section) section.innerHTML = '<p style="color:#ef4444;font-size:.85rem">データの取得に失敗しました。</p>';
    return;
  }
  const agg = {};
  (data || []).forEach(row => {
    if (!agg[row.event_no]) agg[row.event_no] = {'続行':0,'廃止':0,'見直し':0};
    if (agg[row.event_no][row.rating] !== undefined) agg[row.event_no][row.rating]++;
  });
  peopleAgg = agg;
  // サマリー画面は投票セクションだけ差し替え（renderSummary経由だとloadPeopleDataを再度呼び無限ループになるため）。
  // それ以外（マップ・ドリルダウン等）は画面全体を再描画し、ドリルダウンの「みんなの評価」列に反映する。
  if (curScreen === 'summary') renderVoteSection();
  else render(curScreen);
}

function setVoteFilter(v) { voteFilter = v; renderVoteSection(); }

// 対象＝自分が評価した事業 ∪ 誰かが投票済みの事業。voteFilterで絞り込む
function voteRows() {
  if (!peopleAgg) return [];
  return EVENTS.filter(e => {
    const mine = ratings[e.no] || '';
    const agg = peopleAgg[e.no];
    const hasVotes = !!agg && (agg['続行'] + agg['廃止'] + agg['見直し'] > 0);
    if (!mine && !hasVotes) return false;
    if (voteFilter === '') return true;
    if (voteFilter === '未評価') return !mine && hasVotes;
    return mine === voteFilter;
  }).sort((a, b) => b.budget - a.budget);
}

function myRatingCellHtml(r) {
  return r ? `<span class="tag tev-${esc(r)}">${esc(r)}</span>` : '<span style="color:#9ca3af">未評価</span>';
}
function voteCellHtml(agg) {
  const c = agg || {'続行':0,'廃止':0,'見直し':0};
  const total = c['続行'] + c['廃止'] + c['見直し'];
  if (!total) return '<span style="color:#9ca3af">-</span>';
  return `<span class="pc pc-k">続${c['続行']}</span><span class="pc pc-h">廃${c['廃止']}</span><span class="pc pc-f">見${c['見直し']}</span>`;
}
// ドリルダウン表用：列幅が狭いため3つのバッジを縦積みにする版
function voteCellStackHtml(agg) {
  const c = agg || {'続行':0,'廃止':0,'見直し':0};
  const total = c['続行'] + c['廃止'] + c['見直し'];
  if (!total) return '<span style="color:#9ca3af;font-size:.72rem">-</span>';
  return `<div class="vote-stack"><span class="pc pc-k">続${c['続行']}</span><span class="pc pc-h">廃${c['廃止']}</span><span class="pc pc-f">見${c['見直し']}</span></div>`;
}
function classifyStackHtml(e) {
  return `<div class="vtag-stack">${rootTagHtml(e.root)}${ptypeTagHtml(e.ptype)}${evTagHtml(e.ev)}</div>`;
}
function voteCsvText(rows) {
  const header = ['事業番号','事務事業名','施策',LABELS.dept,'金額','法定義務','提供形態','行政評価','自分の評価','続行票','廃止票','見直し票'];
  const csvRows = rows.map(e => {
    const c = peopleAgg[e.no] || {'続行':0,'廃止':0,'見直し':0};
    return [e.no, e.name, e.cls, e.dept, e.budget, e.root, PTYPE_LABEL[e.ptype] || e.ptype, e.ev, ratings[e.no] || '', c['続行'], c['廃止'], c['見直し']];
  });
  return '﻿' + [header, ...csvRows].map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
}
function downloadVoteCsv() {
  const csv = voteCsvText(voteRows());
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = '西宮市_評価結果一覧.csv';
  a.click();
}

// 自分で分析したい人向け：評価・投票の状況によらず全事務事業を出力（行政の公表がPDFのみのため）
function allEventsCsvText() {
  const header = ['事業番号','事務事業名',LABELS.cls,LABELS.dept,'金額(千円)','法定義務','提供形態','行政評価','目的・事業内容','成果','廃止した場合の影響'];
  const csvRows = EVENTS.map(e => {
    const impact = e.story_impact;
    const hasImpact = impact && impact !== '判断できない';
    const impactText = hasImpact
      ? `この事業がなくなった場合、${impact}という問題が起きると想定されています。`
      : '評価シートに記載されていません。';
    return [e.no, e.name, e.cls, e.dept, e.budget, e.root, PTYPE_LABEL[e.ptype] || e.ptype, e.ev, e.story_p1, e.story_p2, impactText];
  });
  return '﻿' + [header, ...csvRows].map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
}
function downloadAllEventsCsv() {
  const csv = allEventsCsvText();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = '西宮市_事務事業データ一覧.csv';
  a.click();
}

// 透明性確保のための生データ出力：Supabaseに蓄積された全投票ログをそのまま書き出す（現在の絞り込みの影響を受けない）
async function downloadPeopleCsv() {
  const { data, error } = await sb
    .from('ratings').select('id,municipality_id,event_no,rating,submitted_at')
    .eq('municipality_id', MUNICIPALITY_ID).order('submitted_at');
  if (error) { alert('取得エラー: ' + error.message); return; }
  const header = ['id', 'municipality_id', 'event_no', 'rating', 'submitted_at'];
  const csvRows = (data || []).map(r => header.map(k => '"' + String(r[k]).replace(/"/g, '""') + '"').join(','));
  const csv = '﻿' + [header.join(','), ...csvRows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = MUNICIPALITY_ID + '_ratings.csv';
  a.click();
}

function renderVoteSection() {
  const section = document.getElementById('vote-section');
  if (!section) return;
  if (!peopleAgg) { section.innerHTML = '<p style="color:#6b7280;font-size:.85rem">読み込み中...</p>'; return; }

  const allData = Object.values(peopleAgg).reduce((a, c) => ({
    '続行': a['続行'] + c['続行'], '廃止': a['廃止'] + c['廃止'], '見直し': a['見直し'] + c['見直し']
  }), {'続行': 0, '廃止': 0, '見直し': 0});
  const totalVotes = allData['続行'] + allData['廃止'] + allData['見直し'];

  if (!totalVotes && !Object.values(ratings).some(r => r)) {
    section.innerHTML = '<p style="color:#6b7280;font-size:.85rem">まだ評価・投票がありません。</p>';
    return;
  }

  const filterOptions = ['', '続行', '廃止', '見直し', '未評価'];
  const filterBtns = filterOptions.map(v => {
    const label = v || '全事務事業';
    return `<button class="stbtn${voteFilter === v ? ' active' : ''}" onclick="setVoteFilter('${esc(v)}')">${esc(label)}</button>`;
  }).join('');

  const rows = voteRows();

  // ブラウザ表示用：6列に圧縮し、セル内で折り返す（横スクロール不要）
  const compactRows = rows.map(e => `<tr>
      <td><div class="evtd-name">${esc(e.name)}</div><div class="vno">No.${esc(e.no)}</div></td>
      <td>${esc(e.cls)}<div class="vsub">${esc(e.dept)}</div></td>
      <td>${fmt(e.budget)}千円</td>
      <td>${classifyStackHtml(e)}</td>
      <td>${myRatingCellHtml(ratings[e.no])}</td>
      <td>${voteCellHtml(peopleAgg[e.no])}</td>
    </tr>`).join('');

  // 印刷・CSV用：完全版10列（画面には出さず@media printでのみ表示）
  const printRows = rows.map(e => `<tr>
      <td>${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td>${esc(e.cls)}</td>
      <td>${esc(e.dept)}</td>
      <td>${fmt(e.budget)}千円</td>
      <td>${rootTagShortHtml(e.root)}</td>
      <td>${ptypeTagHtml(e.ptype)}</td>
      <td>${evTagShortHtml(e.ev)}</td>
      <td>${myRatingCellHtml(ratings[e.no])}</td>
      <td>${voteCellHtml(peopleAgg[e.no])}</td>
    </tr>`).join('');

  section.innerHTML = `
    <div class="sec-heading">投票状況</div>
    <div class="kgrid" style="margin-bottom:12px">
      <div class="kbox kk"><div class="klbl">続行票</div><div class="knum">${allData['続行']}</div></div>
      <div class="kbox kh"><div class="klbl">廃止票</div><div class="knum">${allData['廃止']}</div></div>
      <div class="kbox kf"><div class="klbl">見直し票</div><div class="knum">${allData['見直し']}</div></div>
      <div class="kbox ku"><div class="klbl">総投票数</div><div class="knum">${totalVotes}</div></div>
    </div>
    <div class="filterrow no-print">${filterBtns}</div>
    <div class="bbtns no-print" style="margin-bottom:8px">
      <button class="btn btn-o btn-sm" onclick="window.print()">🖨 印刷（全項目）</button>
      <button class="btn btn-o btn-sm" onclick="downloadVoteCsv()">📥 CSVダウンロード（全項目）</button>
      <button class="btn btn-o btn-sm" onclick="downloadPeopleCsv()">📥 生データCSV</button>
    </div>
    <p style="font-size:.78rem;color:#6b7280;margin-bottom:10px">自分が評価した事務事業、または誰かが投票済みの事務事業を対象に表示しています。上部のボタンを使うと、自分の評価によって表示する事務事業を絞り込めます。</p>
    <div class="votetbl-wrap"><table class="votetbl">
      <thead><tr><th>事務事業名</th><th>施策／担当課</th><th>金額</th><th>分類</th><th>自分の評価</th><th>みんなの評価</th></tr></thead>
      <tbody>${compactRows}</tbody>
    </table></div>
    <div class="votetbl-print"><table class="evtbl">
      <thead><tr>
        <th>${esc(LABELS.no_col)}</th><th>事務事業名</th><th>施策</th><th>${esc(LABELS.dept)}</th><th>金額</th>
        <th>法定義務</th><th>提供形態</th><th>行政評価</th><th>自分の評価</th><th>みんなの評価</th>
      </tr></thead>
      <tbody>${printRows}</tbody>
    </table></div>`;
}

window.onload = load;

</script>
