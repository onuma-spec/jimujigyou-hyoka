<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西宮市 事務事業優先度評価ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

/* ヘッダー */
.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.8;margin-top:3px}

/* ステータスバー */
.sbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sb{padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.sb-k{background:#dcfce7;color:#16a34a}
.sb-h{background:#fee2e2;color:#dc2626}
.sb-f{background:#fef3c7;color:#d97706}
.sb-u{background:#f3f4f6;color:#6b7280}
.sb-n{background:#f3f4f6;color:#6b7280}

/* カード共通 */
.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* フィルターパネル */
.frow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.frow select{flex:1;min-width:130px;padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:.85rem;background:#fff}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:10px}

/* 一斉評価パネル */
.batch{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:12px}
.batch h3{font-size:.85rem;color:#1e40af;margin-bottom:8px}
.bbtns{display:flex;gap:8px;flex-wrap:wrap}

/* ボタン */
.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:6px 12px;font-size:.8rem}

/* プログレスバー */
.pbwrap{background:#e5e7eb;border-radius:4px;height:6px;margin-bottom:12px}
.pbfill{background:#1e40af;height:100%;border-radius:4px;transition:width .3s}

/* イベントカード */
.ecard{background:#fff;border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #e5e7eb;transition:border-color .2s}
.ecard.rk{border-left-color:#22c55e}
.ecard.rh{border-left-color:#ef4444}
.ecard.rf{border-left-color:#f59e0b}

/* タグ */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.72rem;font-weight:600}
.troot-法定義務あり{background:#dbeafe;color:#1d4ed8}
.troot-裁量{background:#fef3c7;color:#92400e}
.troot-評価対象外{background:#f3f4f6;color:#6b7280}
.troot-不明{background:#f3f4f6;color:#6b7280}
.tcls{background:#f3e8ff;color:#7c3aed}
.tev{background:#f0fdf4;color:#15803d}
.tpdf{background:#e0f2fe;color:#0369a1}

.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}
.ename{font-size:1.15rem;font-weight:700;color:#111827;margin-bottom:6px;line-height:1.3}
.ebudget{font-size:.9rem;margin-bottom:10px}
.ebudget .amt{font-weight:700;font-size:1.05rem;color:#1e40af}
.ebudget .bdg-lbl{font-size:.78rem;color:#6b7280;margin-right:4px}
.edesc h4{font-size:.8rem;color:#6b7280;margin-bottom:4px}
.edesc p{font-size:.88rem;line-height:1.65;color:#374151;margin-bottom:10px}
.edetail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.edi{background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:3px 8px;font-size:.8rem}
.edi label{color:#9ca3af;margin-right:3px}

/* 評価ボタン */
.rbtns{display:flex;gap:10px;margin:16px 0}
.rbtn{flex:1;padding:12px 6px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:#f9fafb;color:#374151;text-align:center;transition:all .15s;line-height:1.4}
.rbtn:hover{border-color:#9ca3af}
.rbtn small{display:block;font-size:.7rem;font-weight:400;margin-top:2px;opacity:.8}
.rbtn.ak{background:#22c55e;color:#fff;border-color:#22c55e}
.rbtn.ah{background:#ef4444;color:#fff;border-color:#ef4444}
.rbtn.af{background:#f59e0b;color:#fff;border-color:#f59e0b}

/* ナビ */
.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

/* サマリー KPI */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kbox .klbl{font-size:.75rem;color:#6b7280;margin-bottom:6px}
.kbox .knum{font-size:1.7rem;font-weight:700}
.kbox .kbdg{font-size:.85rem;font-weight:600;margin-top:3px}
.kh .knum,.kh .kbdg{color:#dc2626}
.kf .knum,.kf .kbdg{color:#d97706}
.kk .knum,.kk .kbdg{color:#059669}
.ku .knum,.ku .kbdg{color:#6b7280}

/* サマリーリスト */
.ssec{background:#fff;border-radius:8px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ssec summary{padding:12px 16px;cursor:pointer;font-weight:600;font-size:.9rem;list-style:none;display:flex;justify-content:space-between;user-select:none}
.ssec summary:hover{background:#f9fafb}
.ssec summary::after{content:'▶';font-size:.75rem;color:#9ca3af;transition:transform .2s}
.ssec[open] summary::after{transform:rotate(90deg)}
.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:7px 10px;text-align:left;font-weight:600;white-space:nowrap}
.stbl td{padding:7px 10px;border-top:1px solid #e5e7eb;vertical-align:middle}
.stbl tr:hover td{background:#fafafa}

/* 注記 */
.note{font-size:.75rem;color:#9ca3af;margin-top:12px;line-height:1.6}

/* ナビストリップ */
.nstrip{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.nstrip h2{font-size:1rem;font-weight:700;flex:1;text-align:center}

/* 完了メッセージ */
.done-msg{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:16px;text-align:center;margin-bottom:12px}
.done-msg h3{color:#065f46;font-size:1rem;margin-bottom:8px}

/* カード内ラベル付きタグ行 */
.tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.tag-item{display:flex;flex-direction:column;gap:3px}
.tag-lbl{font-size:.68rem;color:#9ca3af;font-weight:500;letter-spacing:.02em}
.field-lbl{font-size:.78rem;color:#9ca3af;margin-right:3px}

@media(max-width:560px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .rbtns{flex-direction:column}
  .bbtns{flex-direction:column}
  .frow select{min-width:100%}
}
@media print{
  .no-print{display:none!important}
  .nstrip button{display:none!important}
  body{background:#fff}
  #app{padding:0;max-width:100%}
  .ssec{box-shadow:none;border:1px solid #e5e7eb}
  details>div{display:block!important}
  .kbox{box-shadow:none;border:1px solid #e5e7eb}
}
</style>
</head>

<div id="app"></div>
<script>
const LABELS = {"bureau": "局", "dept": "主管課", "cls": "事業分類", "budget_col": "R7当初予算(千円)", "next_col": "R8当初予算(千円)", "tool_title": "西宮市 事務事業優先度評価ツール", "card_title": "西宮市 令和7年度 事務事業評価", "summary_title": "西宮市 令和7年度 事務事業優先度評価結果", "output_file": "nishinomiya_index.html", "no_col": "事業番号", "csv_filename": "西宮市_令和7年度_事務事業優先度評価結果.csv", "source_url": "https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.html", "pdf_col": "評価文書名", "ev_detail_col": ""};

めると共に、中央図書館の移転など新たな都市機能を集積することで、誰もが利用しやすく賑わい のある駅前拠点市街地の形成を目指す。","pdf":"令和7年度事務事業評価結果報告書(Ⅰ)"},{"no":"140104","name":"本庁舎周辺ウォーカブル推進事業","dept":"政策推進課 （施設・まち づくり）","bureau":"政策局","budget":12000,"next_budget":34000,"root":"裁量","cls":"施設等整備","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"","gai":"評価対象外","desc":"本庁舎周辺地区は、市役所の本庁舎や市民会館などの公共施設のほか六湛寺公園や六湛寺南公園などの憩いの空間・イベント スペースが集まる来街者の多い本市の中心地である。 しかし現在、本庁舎周りの空間では歩行者と自転車・バイクが交錯するなど、高齢者や子育て世代が安心して歩き、滞在でき る空間とはなっていない。 本地区において、だれもが安全で快適に過ごせるウォーカブルな空間への転換を推進し、回遊性と滞在快適性を高めることで より多くの市民が安心して利用できるよう、国の補助事業等を有効に活用し、居心地がよく歩きたくなる（ウォーカブルな） まちなかづくりを推進する。","pdf":"令和7年度事務事業評価結果報告書(Ⅰ)"},{"no":"620301","name":"行政経営推進事務","dept":"財政構造改 善推進課／ 財政構造改 善推進課 （事業推進） ／財政構造 改善推進課 （政策経営）","bureau":"政策局","budget":6381,"next_budget":1223,"root":"評価対象外","cls":"企画・調整・調査","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"無し","gai":"既に委託しており、範囲等の拡大はできない","desc":"「限られた経営資源を最大限に活用し、市民満足度の高い行政運営を行う」こととした、本市の行政経営の理念に基づく取組 を推進するとともに、効果的・効率的な行財政運営を進める。令和５年10月に策定した「西宮市財政構造改善基本方針」をふ まえ、財政基金取崩しに依存しない財政体質の確立に向け、実質単年度収支の均衡を保つことを目指し、令和７年２月に「西 宮市財政構造改善実施計画」を策定し、財政構造改善の取組を進めている。","pdf":"令和7年度事務事業評価結果報告書(Ⅰ)"},{"no":"380301","name":"国際交流協会補助事業","dept":"秘書課","bureau":"政策局","budget":47411,"next_budget":49129,"root":"裁量","cls":"補助金","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"公益財団法人 西宮市国際交流協会補助金交付 要綱","gai":"外部委託が不可能な事業である","desc":"西宮市は国際化と国際交流に対する需要に対応し、積極的な地域の国際化と国際交流事業を実施するため、平成４年に財団法 人西宮市国際交流協会を設立した。 協会では、基本財産の運用益や会費収入のみで事業を行うことは困難であり、市から補助金を交付するものである。なお、平 成23年９月30日公益財団法人に移行し、公益財団法人西宮市国際交流協会となった。","pdf":"令和7年度事務事業評価結果報告書(Ⅰ)"},{"no":"380302","name":"外国人人権啓発事業","dept":"秘書課","bureau":"政策局","budget":135,"next_budget":1125,"root":"裁量","cls":"ソフト事務法令等無","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"要綱・規則なし","gai":"既に委託しており、範囲等の拡大はできない","desc":"西宮市では9,000人を超える外国人市民が居住している。社会情勢の国際化の流れ、様々な規制緩和を受け、身近な地域社会で も外国人や異文化に接する機会が増えている。 全市民が互いを理解し、平和な社会を築いていくためには、外国人の人権に対して理解を深め、差別を許さない心を啓発し、 多文化共生の社会の実現を図らなければならない。 そのためには、広報・啓発活動は欠かすことができない取り組みである。","pdf":"令和7年度事務事業評価結果報告書(Ⅰ)" ot":"裁量","cls":"施設等整備","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"西宮市支所事務処理規則","gai":"評価対象外","desc":"山口センターの設備の劣化を抑制し良好な状況に保つため、適時・適切な保全を実施することにより、安全・機能の確保、施 設の長寿命化を図る。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"710415","name":"アクタ西宮ステーション事業","dept":"アクタ西宮 ステーショ ン","bureau":"市民局","budget":73250,"next_budget":76125,"root":"法定義務あり","cls":"ソフト事務法令等無","ev":"現状どおり継続","ev_detail":"","legal":"条例","law":"西宮市事務分掌条例 西宮市事務分掌規則 住民基本台帳法 等","gai":"既に委託しており、更に範囲等の拡大が可能である","desc":"市民等からの平日時間延長及び土・日・祝日の窓口業務の実施要望を背景に、平成16年５月に開設された。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"710416","name":"夙川市民サービスセンター事業","dept":"アクタ西宮 ステーショ ン","bureau":"市民局","budget":8555,"next_budget":8622,"root":"法定義務あり","cls":"ソフト事務法令等無","ev":"現状どおり継続","ev_detail":"","legal":"条例","law":"西宮市事務分掌条例 西宮市事務分掌規則 住民基本台帳法 等","gai":"既に委託しており、更に範囲等の拡大が可能である","desc":"昭和52年10月、人口増加の著しい夙川地区の住民の利便性の向上を図るために開設された。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"710401","name":"戸籍住民基本台帳事業","dept":"市民課","bureau":"市民局","budget":975607,"next_budget":990984,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"住民基本台帳法・戸籍法・出入国管理及び難 民認定法・マイナンバー法","gai":"既に委託しており、範囲等の見直しが必要である","desc":"明治４年に公布された戸籍法は、日本国民を登録しその国籍と親族身分関係を公に証明する制度である。 住民基本台帳法は、昭和42年に施行され、住民に関する記録を正確かつ統一的に行うことで、市民の利便性を向上させるだけ でなく、国及び地方公共団体における各種行政事務の合理化に資することを目的としている。 また、平成24年７月９日からは、外国人住民が住民基本台帳法の適用対象となり、それまでの外国人登録法が廃止されたこと で、新たな在留制度が開始された。 さらに平成27年10月には社会保障・税番号制度が導入され、平成28年１月から申請のあった市民にマイナンバーカード（個人 番号カード）を交付しており、外国人住民を含めた市民の更なる利便性の向上と各種行政事務の効率化を図ることが期待され ている。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350101","name":"国民健康保険事務事業","dept":"国民健康保 険課","bureau":"市民局","budget":619433,"next_budget":419996,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"国民健康保険法","gai":"既に委託しており、範囲等の見直しが必要である","desc":"現行の国民健康保険法が昭和33年12月に制定され、翌34年１月に施行されたことから、すべての市町村は、昭和36年４月１ 日までに国民健康保険事業を行うことが義務付けられた。 平成20年４月の後期高齢者医療制度等の医療制度改革に対応するため、大規模なシステム改修等の事務を行い、28年度には3 0年度の国保都道府県単位化及びシステムオープン化のためにシステム更新を実施した。 平成21年度より、年金特別徴収やコンビニ収納を開始、24年度よりキャッシュカードを用いた窓口での保険料の口座振替申 請を可能にし、29年度には口座振替を原則化した。30年度より、コールセンター（25年度より実施）を市税と統合した。令和 ４年度よりスマホ決済及びWeb口座振替受付サービスを開始した。 医療費適正化を図り国保財政を健全に運営するため、平成21年度より保険者レセプト管理システムの電子データを用いた診 療報酬明細書","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350102","name":"保険給付事業","dept":"国民健康保 険課","bureau":"市民局","budget":28158379,"next_budget":28554005,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"国民健康保険法","gai":"外部委託が不可能な事業である","desc":"現行の国民健康保険法が昭和33年12月に制定され、翌34年１月に施行されたことから、すべての市町村は、36年４月１日ま でに国民健康保険事業を行うことが義務づけられた。これにより、わが国は、昭和36年４月、すべての国民が何らかの医療保 険制度の対象となる国民皆保険体制を確立した。本市においては、合併前の旧武庫郡鳴尾村において昭和18年11月から組合経 営として国民健康保険事業が実施されており、その後村営移管等を経て、32年10月１日より全市実施となった。 平成30年度から国民健康保険の財政の責任主体は県に移ったが、国民健康保険被保険者の疾病、負傷、出産又は死亡に関し ての保険給付は市が行い、その財源は県からの交付金で賄われている。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350103","name":"国民健康保険保健事業","dept":"国民健康保 険課","bureau":"市民局","budget":342021,"next_budget":349154,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"高齢者の医療の確保に関する法律","gai":"既に委託しており、範囲等の見直しが必要である","desc":"高齢者の医療の確保に関する法律に基づき、平成20年４月より医療保険者に対して、40歳以上の被保険者を対象とする、メ タボリックシンドローム（内臓脂肪症候群）に着目した健診及び保健指導を行うことが義務付けられた。西宮市国民健康保険 においても対象被保険者に対して実施している。 特定健康診査によって抽出された特定保健指導対象者に対して、リスクに応じ、個々の生活習慣の改善に主眼を置いた保健 指導を医師・保健師・管理栄養士等によって実施する。また、生活習慣病を含めた疾病の早期発見や重症化予防として、総合 健康診断（人間ドック）受診費用の助成を行う。そのほか、医療費や診療内容の現状を把握し、被保険者の健康に対する意識 や医療費に対するコスト意識を高め、医療費の適正化を図る事業を実施する。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350301","name":"国民年金事務","dept":"医療年金課","bureau":"市民局","budget":18600,"next_budget":118580,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"国民年金法","gai":"まだ委託を実施していないが、一部可能である","desc":"国民年金制度は,日本国内に住む20歳以上60歳未満のすべての人が加入して社会全体で支え合う公的な制度であり、老齢、障 害又は死亡時に所得保障として年金を支給する。被保険者（加入者）は職業などの種類により、第１号被保険者から第３号被 保険者の３種類に区分される。日本年金機構が主体として行っている事業であるが、第１号被保険者の加入届や、学生納付特 例の申請、保険料の免除申請などは市が取り扱う（法定受託事務）。 平成28年11月に「公的年金制度の財政基盤及び最低保障機能の強化等のための国民年金法等の一部を改正する法律の一部を 改正する法律」（改正年金機能強化法）が成立し、平成29年８月より老齢年金の受給資格期間が25年から10年に短縮された。 令和元年10月に消費税増税に伴い、年金生活者支援給付金が開始された。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350302","name":"外国人等障害者・高齢者特別給付等事業","dept":"医療年金課","bureau":"市民局","budget":5530,"next_budget":4177,"root":"裁量","cls":"扶助費","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"西宮市外国人等障害者特別給付金支給要綱・ 西宮市外国人等高齢者特別給付金支給要綱","gai":"外部委託が不可能な事業である","desc":"国民年金制度は、国内に居住するすべての日本国民を対象として昭和36年４月に発足したが、外国籍の方や長期間海外に滞 在していた日本人は加入できない制度であった。その後、昭和57年１月に国民年金法の改正により国籍要件が撤廃されたが、 既に高齢や重度の障害の方は年金受給資格を満たすことができず、制度的無年金者が存在することとなった。 西宮市では、制度上の理由から無年金となっている外国籍障害者・高齢者等に対して、平成６年度から重度障害者特別給付 金、平成８年度から高齢者特別給付金の支給を実施している。平成10年度からは兵庫県においても助成金制度が発足し、市の 給付金に加算し支給することになった。重度障害者特別給付金は、平成20年度から中度障害者にも支給対象を広げ、名称を障 害者特別給付金に変更している。平成22年度からは、障害基礎年金、老齢福祉金に倣った併給を実施している。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350401","name":"医療費助成事業","dept":"医療年金課","bureau":"市民局","budget":4113942,"next_budget":4738689,"root":"法定義務あり","cls":"扶助費","ev":"拡充","ev_detail":"","legal":"条例","law":"西宮市医療費助成条例、西宮市高齢障害者医 療費助成要綱","gai":"既に委託しており、範囲等の拡大はできない","desc":"福祉医療費助成制度は、保険診療でかかった医療費の全部または一部を助成する制度であり、高齢者、乳幼児等、子ども、 母子家庭等、障害者を対象としている。兵庫県との共同事業であるが、本市では各医療費助成制度において、所得制限の緩和 や助成対象の拡大等を独自に実施している。 令和３年７月から、乳幼児等医療費助成制度について、所得制限により対象外になっていた小学１年生から小学３年生を助 成対象とし、医療費の自己負担額の一部を助成している。また、全ての福祉医療費助成制度において、健康保険が適用となる 訪問看護療養費を助成対象とした。 令和５年１月から、こども医療費助成について、所得制限により対象外となっていた小学４年生から中学３年生と新たに高 校生世代（18歳到達以後最初の３月31日まで）を助成対象とし、医療費の自己負担額の一部を助成している。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350201","name":"後期高齢者医療事務","dept":"高齢者医療 保険課","bureau":"市民局","budget":57711,"next_budget":324705,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"高齢者の医療の確保に関する法律","gai":"既に委託しており、範囲等の拡大はできない","desc":"平成20年４月、老人保健制度に代わる新たな高齢者医療制度として「高齢者の医療の確保に関する法律」に基づき、75歳以 上の人と65歳〜74歳の一定の障害がある人を対象とする「後期高齢者医療制度」が創設された。 後期高齢者医療広域連合が、被保険者の認定や保険料の決定、医療の給付等、制度の運営を行い、市は、被保険者への資格 確認書等の引渡しと被保険者からの各種届出や申請の受付、保険料の徴収などを行う。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350202","name":"後期高齢者医療健康診査事業","dept":"高齢者医療 保険課","bureau":"市民局","budget":336173,"next_budget":363951,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"高齢者の医療の確保に関する法律第125条","gai":"既に委託しており、範囲等の拡大はできない","desc":"高齢者の医療の確保に関する法律第125条において、後期高齢者医療広域連合が健康教育・健康相談・健康診査・保健指導・そ の他の被保険者の健康の保持増進のために必要な事業を行うように努めなければならないとされている。しかしながら、兵庫 県では、高齢である被保険者の利便性の確保等の観点から、健康診査等を各市町が実施し、広域連合がそれを補助するかたち の体制としている。 平成20年度からの長寿（後期高齢者）健康診査に加え、平成25年度に人間ドック受診費用助成を、平成27年度には75歳・80歳 の被保険者を対象とする長寿歯科健康診査を、それぞれ開始し、後期高齢者の健康に対する意識の向上と疾病の早期発見・重 症化予防を図っている。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"350203","name":"後期高齢者医療保険料徴収事務","dept":"高齢者医療 保険課","bureau":"市民局","budget":84056,"next_budget":131010,"root":"評価対象外","cls":"賦課・徴収","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"高齢者の医療の確保に関する法律","gai":"既に委託しており、範囲等の拡大はできない","desc":"平成20年４月、老人保険制度に代わる新たな高齢者医療制度として「高齢者の医療の確保に関する法律」に基づき、75歳以 上の人と65歳〜74歳の一定の障害がある人を対象とする「後期高齢者医療制度」が創設された。 被保険者一人ひとりが保険料を負担するこの制度において、高齢者世代内では勿論、高齢者と若年者の世代間の保険料負担 の公平化及び財政的基盤の安定を図るため、普通徴収の収入率を高める有効な手段である口座振替納付の推進のみならず、滞 納者に対する文書や電話による督促や催告、窓口や個別訪問での納付相談を実施している。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380101","name":"西宮市保護司会補助等事業","dept":"人権平和推 進課","bureau":"市民局","budget":1718,"next_budget":1718,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"保護司法・更生保護法（任意規定）、西宮市 犯罪被害者等支援条例","gai":"外部委託が不可能な事業である","desc":"保護司は、保護観察官と協力し、民間人としての柔軟性と地域の実情に通じているという特性を活かしながら保護観察や生活 環境調整の実務に当たるほか、地域社会において更生保護活動などを行っている。保護司会は昭和24年に前身となる組織が発 足し、昭和26年から“社会を明るくする運動”を行っている。市はその活動に対して必要な協力として補助金を交付している また、平成28年４月１日より条例を定めて犯罪被害にあわれた方やそのご家族への支援を行っている。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380102","name":"人権啓発推進事業","dept":"人権平和推 進課","bureau":"市民局","budget":3268,"next_budget":2655,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"人権教育及び人権啓発の推進に関する法律他","gai":"既に委託しており、範囲等の拡大はできない","desc":"人権文化の普及・定着を図るため、平成30年度に策定した「第２次西宮市人権教育・啓発に関する基本計画」に基づき、人権 啓発活動を行う。また、法務局や人権擁護委員協議会と連携し、人権擁護活動や人権啓発活動を行う。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380103","name":"芦乃湯会館管理運営事業","dept":"人権平和推 進課","bureau":"市民局","budget":97975,"next_budget":104553,"root":"法定義務あり","cls":"施設管理運営","ev":"現状どおり継続","ev_detail":"","legal":"条例","law":"西宮市立芦乃湯会館条例","gai":"既に委託しており、範囲等の拡大はできない","desc":"歴史的・社会的要因による地域内外の閉鎖性を解消し、市民相互の交流および健康の増進を図るために設置された同会館の管 理運営を行う（平成９年10月設置）。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380104","name":"住宅新築資金等回収事務","dept":"人権平和推 進課","bureau":"市民局","budget":5245,"next_budget":5364,"root":"評価対象外","cls":"賦課・徴収","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"西宮市同和更生生業資金貸付要綱、西宮市住 宅新築資金貸付要綱等","gai":"外部委託が不可能な事業である","desc":"同和更生生業資金及び住宅新築資金等貸付元利金償還金の回収・整理業務 同和更生生業資金は、昭和48年に市単独費で発足した５年返済の貸付制度である。貸付要綱では、「事業を営む」「療養のた め」「療養期間中の生活維持」「借金返済」等を目的とした貸付金であったが、昭和56年度末にこの制度が廃止された。 住宅新築資金等は、昭和47年に国・県、市費で発足した貸付制度である。貸付要綱では、「新築物件」、「住宅建築用の宅地 取得」、「自己所有の住宅の改修」等を目的とした貸付金であったが、平成８年度末にこの制度は廃止された。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380105","name":"芦乃湯会館改修事業","dept":"人権平和推 進課","bureau":"市民局","budget":77485,"next_budget":14600,"root":"裁量","cls":"施設等整備","ev":"現状どおり継続","ev_detail":"","legal":"規則等","law":"西宮市事務分掌規則","gai":"評価対象外","desc":"西宮市立芦乃湯会館の機械・設備の改修を行い、施設の維持管理をするとともに、利用者の安全・快適性を確保する。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380501","name":"平和施策推進事業","dept":"人権平和推 進課","bureau":"市民局","budget":6662,"next_budget":6291,"root":"裁量","cls":"ソフト事務法令等無","ev":"手法・内容の見直し","ev_detail":"","legal":"規則等","law":"西宮市事務分掌規則","gai":"既に委託しており、範囲等の拡大はできない","desc":"西宮市は昭和58年12月10日、「世界中に核兵器の廃絶を強く訴えるとともに、平和を愛する社会をはぐくみ、築くことを誓う 」ことを内容とする平和非核都市宣言を行った。戦争経験のない世代が増え、戦争・被爆体験を風化させることなく、二度と 悲惨な戦争が起きることがないよう平和の尊さを次代に継承するため、平和非核啓発活動を行う。 また、平和資料館の老朽化した設備や施設を、機器の耐用年数や中長期修繕計画に基づき、機器の更新や施設改修を行い、利 用者の安全・快適性を確保する。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"380110","name":"人権教育推進事業","dept":"人権教育推 進課","bureau":"市民局","budget":16689,"next_budget":17544,"root":"評価対象外","cls":"ソフト事務法令等有","ev":"現状どおり継続","ev_detail":"","legal":"法令","law":"人権教育及び人権啓発の推進に関する法律 等","gai":"既に委託しており、範囲等の拡大はできない","desc":"市民一人一人が生涯を通じて学習していく中で、人権問題の正しい理解と認識を深め、人権尊重の精神、社会連帯意識の育成 を図り、真に民主的な人間形成を目指し、あらゆる差別の解消をねらいとし、次の事業等を行う。 １ 関連団体・機関と連携・協働して人権学習会などを開催し、人権教育・啓発を推進する。 ２ 西宮市人権・同和教育協議会の各専門部会に行政職員を派遣し、市民との協働を図る。 ３ 西宮市人権・同和教育研究集会の運営等に行政職員を派遣し、市民との協働を図る。 ４ 関係各課・学校園等と連携し、地域の教育力の向上を図る。","pdf":"令和7年度事務事業評価結果報告書(Ⅱ)"},{"no":"38010 // ユーティリティ
function fmt(y){
  if(y>=100000) return (y/100000).toFixed(1)+'億円';
  if(y>=1000)   return (y/1000).toFixed(1)+'百万円';
  return y+'千円';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rootCls(r){ return 'troot-'+r.replace('/','\\/');}

// 状態
const state = {
  ratings: JSON.parse(localStorage.getItem('nishi7_ratings')||'{}'),
  filters: {bureau:'',root:'',cls:'',ev:'',gai:'',pdf:'',rating:''},
  screen: 'filter',
  queue: [],
  pos: 0,
};
function save(){ localStorage.setItem('nishi7_ratings', JSON.stringify(state.ratings)); }

// 絞り込み
function getFiltered(){
  return EVENTS.filter(e=>{
    if(state.filters.bureau && e.bureau!==state.filters.bureau) return false;
    if(state.filters.root   && e.root!==state.filters.root)     return false;
    if(state.filters.cls    && e.cls!==state.filters.cls)       return false;
    if(state.filters.ev     && e.ev!==state.filters.ev)         return false;
    if(state.filters.gai    && e.gai!==state.filters.gai)       return false;
    if(state.filters.pdf    && e.pdf!==state.filters.pdf)       return false;
    if(state.filters.rating==='未評価' && state.ratings[e.no]) return false;
    if(state.filters.rating && state.filters.rating!=='未評価' && state.ratings[e.no]!==state.filters.rating) return false;
    return true;
  });
}

function stats(evts){
  const k=evts.filter(e=>state.ratings[e.no]==='続行');
  const h=evts.filter(e=>state.ratings[e.no]==='廃止');
  const f=evts.filter(e=>state.ratings[e.no]==='見直し');
  const u=evts.filter(e=>!state.ratings[e.no]);
  const sum=a=>a.reduce((s,e)=>s+e.budget,0);
  return {k:{c:k.length,b:sum(k)},h:{c:h.length,b:sum(h)},f:{c:f.length,b:sum(f)},u:{c:u.length,b:sum(u)},
          total:{c:evts.length,b:sum(evts)}};
}

// アクション
function setFilter(k,v){ state.filters[k]=v; if(state.screen==='filter') renderFilter(); }
function clearFilters(){ state.filters={bureau:'',root:'',cls:'',ev:'',gai:'',pdf:'',rating:''}; renderFilter(); }

function batchRate(r){
  getFiltered().forEach(e=>{ state.ratings[e.no]=r; });
  save(); renderFilter();
}

function startCards(){
  state.queue = getFiltered().map(e=>e.no);
  if(!state.queue.length){ alert('対象事業がありません'); return; }
  const first = state.queue.findIndex(n=>!state.ratings[n]);
  state.pos = first>=0 ? first : 0;
  state.screen='card'; render();
}

function rateCard(r){
  const no=state.queue[state.pos];
  if(!no) return;
  state.ratings[no]=r; save();
  if(state.pos < state.queue.length-1){ state.pos++; renderCard(); }
  else { renderCard(); } // 末尾でも再描画（完了メッセージ表示）
}
function prevCard(){ if(state.pos>0){ state.pos--; renderCard(); } }
function nextCard(){ if(state.pos<state.queue.length-1){ state.pos++; renderCard(); } }
function showFilter(){ state.screen='filter'; render(); }
function showSummary(){ state.screen='summary'; render(); }
function resetAll(){ if(confirm('全評価をリセットしますか？')) { state.ratings={}; save(); render(); } }


// 選択肢を収集
function opts(key){ return [...new Set(EVENTS.map(e=>e[key]))].filter(Boolean).sort(); }
function selHtml(fkey,label,val){
  const disp=o=>o;
  const os=opts(fkey).map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(disp(o))}</option>`).join('');
  return `<select title="${label}" onchange="setFilter('${fkey}',this.value)"><option value="">全ての${label}</option>${os}</select>`;
}

// タグ表示
function tagHtml(root,cls,ev){
  return `<span class="tag ${esc(rootCls(root))}">${esc(root)}</span>`+
         `<span class="tag tcls">${esc(cls)}</span>`+
         `<span class="tag tev">${esc(ev)}</span>`;
}

// 評価クラス・ラベル
function rcls(no){ const r=state.ratings[no]; return r==='続行'?'rk':r==='廃止'?'rh':r==='見直し'?'rf':''; }
function rBtnCls(no,r){ const c=state.ratings[no]===r; return c?(r==='続行'?'ak':r==='廃止'?'ah':'af'):''; }
function rBtnDesc(no,r){
  const d={'続行':'活動内容と予算に納得','廃止':'活動内容に納得できない','見直し':'予算に納得できない'};
  return state.ratings[no]===r ? '◀ 選択中' : d[r];
}

// ============================================================
// Screen: フィルター
// ============================================================
function renderFilter(){
  const filtered=getFiltered();
  const st=stats(EVENTS), fs=stats(filtered);
  const hasFilter=Object.values(state.filters).some(Boolean);

  document.getElementById('app').innerHTML=`
<div class="hd">
  <h1>🏛 ${LABELS.tool_title}</h1>
  <div class="sub">令和7年度 事務事業評価 ${EVENTS.length}事業 ／ 総予算 ${fmt(st.total.b)}（事業費のみ・人件費除く）</div>
  <div style="font-size:.75rem;color:#9ca3af;margin-top:4px">出典：<a href="https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.html" target="_blank" style="color:#9ca3af">令和7年度事務事業評価結果報告書｜西宮市ホームページ</a></div>
</div>

<div class="sbar">
  <span class="sb sb-k">続行 ${st.k.c}件</span>
  <span class="sb sb-h">廃止 ${st.h.c}件・${fmt(st.h.b)}</span>
  <span class="sb sb-f">見直し ${st.f.c}件・${fmt(st.f.b)}</span>
  <span class="sb sb-u">未評価 ${st.u.c}件</span>
  ${st.k.c+st.h.c+st.f.c>0?`<button class="btn btn-sm btn-o" onclick="resetAll()" style="margin-left:auto">↺ リセット</button>`:''}
</div>

<div class="card">
  <div style="font-size:.85rem;font-weight:600;color:#374151;margin-bottom:8px">絞り込み</div>
  <div class="frow">
    ${selHtml('pdf',LABELS.pdf_col,state.filters.pdf)}
    ${selHtml('bureau',LABELS.bureau,state.filters.bureau)}
    ${selHtml('root','根拠タグ',state.filters.root)}
    ${selHtml('cls',LABELS.cls,state.filters.cls)}
    ${selHtml('ev','市の評価',state.filters.ev)}
    ${selHtml('gai','外部委託',state.filters.gai)}
    <select title="評価結果" onchange="setFilter('rating',this.value)">
      <option value="">全ての評価結果</option>
      <option value="続行"${state.filters.rating==='続行'?' selected':''}>続行</option>
      <option value="廃止"${state.filters.rating==='廃止'?' selected':''}>廃止</option>
      <option value="見直し"${state.filters.rating==='見直し'?' selected':''}>見直し</option>
      <option value="未評価"${state.filters.rating==='未評価'?' selected':''}>未評価</option>
    </select>
  </div>
  <div class="fresult">
    対象: <strong>${filtered.length}件</strong> ／ ${fmt(fs.total.b)}
    ${hasFilter?`<button class="btn btn-sm btn-o" onclick="clearFilters()" style="margin-left:8px">✕ クリア</button>`:''}
  </div>
</div>

<div class="batch">
  <h3>一斉評価 — 上の絞り込み結果（${filtered.length}件）を一括設定</h3>
  <div class="bbtns">
    <button class="btn btn-k" onclick="batchRate('続行')">✓ 全部 続行</button>
    <button class="btn btn-h" onclick="batchRate('廃止')">✕ 全部 廃止</button>
    <button class="btn btn-f" onclick="batchRate('見直し')">△ 全部 見直し</button>
  </div>
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap">
  <button class="btn btn-p" onclick="startCards()" style="flex:1">
    カード評価を始める → （${filtered.length}件）
  </button>
  <button class="btn btn-o" onclick="showSummary()">集計サマリー →</button>
</div>
${hasFilter?`<p style="font-size:.78rem;color:#9ca3af;margin-top:8px">※ フィルター適用中。カード評価はこの ${filtered.length} 件を表示します。</p>`:''}`;
}

// ============================================================
// Screen: カード評価
// ============================================================
function renderCard(){
  const total=state.queue.length;
  const no=state.queue[state.pos];
  const ev=EVENTS.find(e=>e.no===no);
  if(!ev){ showFilter(); return; }

  const done=state.queue.filter(n=>state.ratings[n]).length;
  const pct=total>0?Math.round(done/total*100):0;
  const st=stats(EVENTS);
  const isLast=state.pos===total-1;
  const allDone=state.queue.every(n=>state.ratings[n]);

  document.getElementById('app').innerHTML=`
<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f3f4f6;overflow:hidden;z-index:10">
<div style="max-width:780px;margin:0 auto;height:100%;display:flex;flex-direction:column;padding:12px">

  <!-- 上固定 -->
  <div style="flex-shrink:0">
    <div class="nstrip">
      <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:.75rem;font-weight:700;color:#1e40af">${LABELS.card_title}</div>
        <div class="sbar" style="margin:4px 0 0;justify-content:center">
          <span class="sb sb-k">続行 ${st.k.c}件</span>
          <span class="sb sb-h">廃止 ${st.h.c}件</span>
          <span class="sb sb-f">見直し ${st.f.c}件</span>
          <span class="sb sb-u">未評価 ${st.u.c}件</span>
        </div>
      </div>
      <button class="btn btn-sm btn-p" onclick="showSummary()">サマリー →</button>
    </div>
    <div style="font-size:.82rem;color:#6b7280;margin-bottom:6px">評価済み: ${done}/${total}件 (${pct}%)</div>
    <div class="pbwrap"><div class="pbfill" style="width:${pct}%"></div></div>
  </div>

  <!-- スクロール中段 -->
  <div style="flex:1;overflow-y:auto;padding:4px 0 8px">
    ${allDone?`<div class="done-msg"><h3>✓ この絞り込み結果（${total}件）の評価が完了しました</h3><button class="btn btn-p" onclick="showSummary()">集計サマリーを見る →</button></div>`:''}
    <div class="ecard ${rcls(no)}">
      <div class="tag-row">
        <div class="tag-item">
          <div class="tag-lbl">法的根拠</div>
          <span class="tag ${esc(rootCls(ev.root))}">${esc(ev.root)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">事業分類</div>
          <span class="tag tcls">${esc(ev.cls)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">行政の評価方針</div>
          <span class="tag tev">${esc(ev.ev)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">${LABELS.pdf_col}</div>
          <span class="tag tpdf">${esc(ev.pdf)}</span>
        </div>
      </div>
      <div class="emeta"><span class="field-lbl">${LABELS.no_col}：</span>${esc(String(ev.no))}　<span class="field-lbl">所管：</span>${esc(ev.bureau)} ／ ${esc(ev.dept)}</div>
      <div class="ename">${esc(ev.name)}</div>
      <div class="ebudget">
        <div><span class="bdg-lbl">当年度当初予算（R7）：</span><span class="amt">${fmt(ev.budget)}</span></div>
        ${ev.next_budget>0?`<div><span class="bdg-lbl">次年度当初予算（R8）：</span><span class="amt">${fmt(ev.next_budget)}</span></div>`:''}
        <div style="font-size:.72rem;color:#9ca3af;margin-top:3px">※ 事業費のみ（人件費除く）</div>
      </div>
      ${ev.desc?`<div class="edesc"><h4>事業概要</h4><p>${esc(ev.desc)}</p></div>`:''}
      <div class="edetail">
        ${ev.root==='法定義務あり'?`<div class="edi"><label>法的根拠の詳細：</label>${esc(ev.legal)}${ev.law?' — '+esc(ev.law):''}</div>`:ev.law?`<div class="edi"><label>根拠法令：</label>${esc(ev.law)}</div>`:''}
        ${ev.gai?`<div class="edi"><label>外部委託の可能性：</label>${esc(ev.gai)}</div>`:''}
        ${ev.ev_detail?`<div class="edi"><label>${LABELS.ev_detail_col}：</label>${esc(ev.ev_detail)}</div>`:''}
      </div>
      <a href="${LABELS.source_url}" target="_blank" class="btn btn-o" style="display:block;text-align:center;text-decoration:none;margin-bottom:8px">📄 評価シートを確認</a>
    </div>
  </div>

  <!-- 下固定：評価ボタン＋ナビ -->
  <div style="flex-shrink:0;background:#f3f4f6;padding:10px 0 4px;border-top:1px solid #e5e7eb">
    <div class="rbtns">
      <button class="rbtn ${rBtnCls(no,'続行')}" onclick="rateCard('続行')">
        ✓ 続行<small>${rBtnDesc(no,'続行')}</small>
      </button>
      <button class="rbtn ${rBtnCls(no,'廃止')}" onclick="rateCard('廃止')">
        ✕ 廃止<small>${rBtnDesc(no,'廃止')}</small>
      </button>
      <button class="rbtn ${rBtnCls(no,'見直し')}" onclick="rateCard('見直し')">
        △ 見直し<small>${rBtnDesc(no,'見直し')}</small>
      </button>
    </div>
    <div class="nav">
      <button class="btn btn-sm btn-o" onclick="prevCard()" ${state.pos===0?'disabled':''}>◀ 前へ</button>
      <span class="cpos">${state.pos+1} / ${total}</span>
      <button class="btn btn-sm btn-o" onclick="nextCard()" ${isLast?'disabled':''}>次へ ▶</button>
    </div>
  </div>

</div>
</div>`;
}

// ============================================================
// Screen: サマリー
// ============================================================
function renderSummary(){
  const st=stats(EVENTS);
  const zokkoList  =EVENTS.filter(e=>state.ratings[e.no]==='続行');
  const haishiList =EVENTS.filter(e=>state.ratings[e.no]==='廃止');
  const minaoshiList=EVENTS.filter(e=>state.ratings[e.no]==='見直し');
  const mirateList =EVENTS.filter(e=>!state.ratings[e.no]);

  function tblRows(list){
    if(!list.length) return '<tr><td colspan="5" style="color:#9ca3af;text-align:center;padding:12px">（なし）</td></tr>';
    return list.map(e=>`<tr>
      <td style="white-space:nowrap">${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td style="white-space:nowrap">${esc(e.bureau)}</td>
      <td><span class="tag ${esc(rootCls(e.root))}" style="font-size:.68rem">${esc(e.root)}</span></td>
      <td><span class="tag tev" style="font-size:.68rem">${esc(e.ev)}</span></td>
      <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(e.budget)}</td>
    </tr>`).join('');
  }
  const thead=`<thead><tr><th>${LABELS.no_col}</th><th>事業名</th><th>${LABELS.bureau}</th><th>根拠</th><th>行政評価</th><th>予算</th></tr></thead>`;

  document.getElementById('app').innerHTML=`
<div class="nstrip">
  <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
  <h2>${LABELS.summary_title}</h2>
  <button class="btn btn-sm btn-p no-print" onclick="startCards()">評価を続ける</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:flex-end" class="no-print">
  <button class="btn btn-sm btn-o" onclick="downloadCsv()">📥 CSV出力</button>
  <button class="btn btn-sm btn-o" onclick="window.print()">🖨 印刷</button>
</div>

<p style="font-size:.82rem;color:#6b7280;margin-bottom:12px">
  続行 ${st.k.c}件 ｜ 廃止 ${st.h.c}件 ｜ 見直し ${st.f.c}件 ｜ 未評価 ${st.u.c}件（合計${EVENTS.length}件）
</p>

<div class="kgrid">
  <div class="kbox kk">
    <div class="klbl">✓ 続行</div>
    <div class="knum">${st.k.c}件</div>
    <div class="kbdg">${fmt(st.k.b)}</div>
  </div>
  <div class="kbox kh">
    <div class="klbl">✕ 廃止</div>
    <div class="knum">${st.h.c}件</div>
    <div class="kbdg">${fmt(st.h.b)}</div>
  </div>
  <div class="kbox kf">
    <div class="klbl">△ 見直し</div>
    <div class="knum">${st.f.c}件</div>
    <div class="kbdg">${fmt(st.f.b)}</div>
  </div>
  <div class="kbox ku">
    <div class="klbl">— 未評価</div>
    <div class="knum">${st.u.c}件</div>
    <div class="kbdg">${fmt(st.u.b)}</div>
  </div>
</div>

<details class="ssec" ${st.k.c?'open':''}>
  <summary>✓ 続行一覧 <span style="color:#059669">${st.k.c}件・${fmt(st.k.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(zokkoList)}</tbody></table></div>
</details>

<details class="ssec" ${st.h.c?'open':''}>
  <summary>✕ 廃止一覧 <span style="color:#dc2626">${st.h.c}件・${fmt(st.h.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(haishiList)}</tbody></table></div>
</details>

<details class="ssec" ${st.f.c?'open':''}>
  <summary>△ 見直し一覧 <span style="color:#d97706">${st.f.c}件・${fmt(st.f.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(minaoshiList)}</tbody></table></div>
</details>

<details class="ssec">
  <summary>— 未評価一覧 <span style="color:#6b7280">${st.u.c}件・${fmt(st.u.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(mirateList)}</tbody></table></div>
</details>

<p class="note">
  ※ 評価結果はこのブラウザのローカルストレージに保存されます（ページを閉じても残ります）。<br>
  ※ 予算額は事業費のみ（人件費除く）です。実際のコストはトータルコスト（事業費＋人件費）より小さくなります。<br>
  ※ 法定義務あり事業は市単独では廃止できません。削減額はあくまで参考値です。<br>
  出典：<a href="https://www.nishi.or.jp/shisei/gyoseikeiei/gyoseihyoka/hyokakekka.html" target="_blank">令和7年度事務事業評価結果報告書｜西宮市ホームページ</a>
</p>`;
}

// CSV出力
function downloadCsv(){
  const BOM = '\uFEFF';
  const header = [LABELS.no_col,'事業名',LABELS.bureau,LABELS.dept,'法的根拠',LABELS.cls,'市の評価',LABELS.pdf_col,LABELS.budget_col,LABELS.next_col,'評価結果'];
  const rows = EVENTS.map(e=>[
    e.no, e.name, e.bureau, e.dept, e.root, e.cls, e.ev, e.pdf, e.budget, e.next_budget,
    state.ratings[e.no]||'未評価'
  ]);
  const csv = BOM+[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = LABELS.csv_filename;
  a.click();
}

// メイン
function render(){
  if(state.screen==='filter') renderFilter();
  else if(state.screen==='card') renderCard();
  else if(state.screen==='summary') renderSummary();
}
render();

</script>
</body>
</html>
