<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}

.sbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}

.sb-h{background:#fee2e2;color:#dc2626}
.sb-f{background:#fef3c7;color:#d97706}
.sb-u{background:#f3f4f6;color:#6b7280}
.sb-n{background:#f3f4f6;color:#6b7280}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.frow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.frow select{flex:1;min-width:130px;padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:.85rem;background:#fff}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:10px}

.batch{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:12px}
.batch h3{font-size:.85rem;color:#1e40af;margin-bottom:8px}
.bbtns{display:flex;gap:8px;flex-wrap:wrap}

.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}

.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}

.troot-不明{background:#f3f4f6;color:#6b7280}

.tev{background:#f0fdf4;color:#15803d}

.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}

.rbtns{display:flex;gap:10px;margin:16px 0}

.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.kbox .kbdg{font-size:.85rem;font-weight:600;margin-top:3px}
.kh .knum,.kh .kbdg{color:#dc2626}
.kf .knum,.kf .kbdg{color:#d97706}
.kk .knum,.kk .kbdg{color:#059669}
.ku .knum,.ku .kbdg{color:#6b7280}

.ssec{background:#fff;border-radius:8px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ssec summary{padding:12px 16px;cursor:pointer;font-weight:600;font-size:.9rem;list-style:none;display:flex;justify-content:space-between;user-select:none}
.ssec summary:hover{background:#f9fafb}
.ssec summary::after{content:'▶';font-size:.75rem;color:#9ca3af;transition:transform .2s}
.ssec[open] summary::after{transform:rotate(90deg)}
.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:7px 10px;text-align:left;font-weight:600;white-space:nowrap}
.stbl td{padding:7px 10px;border-top:1px solid #e5e7eb;vertical-align:middle}
.stbl tr:hover td{background:#fafafa}

.note{font-size:.75rem;color:#9ca3af;margin-top:12px;line-height:1.6}
.nstrip{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.nstrip h2{font-size:1rem;font-weight:700;flex:1;text-align:center}
.done-msg{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:16px;text-align:center;margin-bottom:12px}
.done-msg h3{color:#065f46;font-size:1rem;margin-bottom:8px}
.tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.tag-item{display:flex;flex-direction:column;gap:3px}
.tag-lbl{font-size:.68rem;color:#9ca3af;font-weight:500;letter-spacing:.02em}
.field-lbl{font-size:.78rem;color:#9ca3af;margin-right:3px}

@media(max-width:560px){
  .kgrid{grid-template-columns:repeat(2,1fr)}

  .bbtns{flex-direction:column}
  .frow select{min-width:100%}

@media print{
  .no-print{display:none!important}
  .nstrip button{display:none!important}
  body{background:#fff}
  #app{padding:0;max-width:100%}
  .ssec{box-shadow:none;border:1px solid #e5e7eb}
  details>div{display:block!important}
  .kbox{box-shadow:none;border:1px solid #e5e7eb}
}
</style>

・男女共同参画審議会を開催し、委員の意見を聴取","pdf":"R6kitamoto_sheet.pdf"},{"no":179,"name":"公平委員会負担金支出事業","dept":"人権推進課","bureau":"総務部","budget":56,"next_budget":344,"root":"法定義務あり","cls":"60 健全で開かれたまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"法令により余地がない","desc":"埼玉県央広域公平委員会は、職員の利益の保護と公正な人事権の行使を保障するための公正・中立な第三者機関として北本市役所内に設置されている。\n当該機関の円滑な運営を図るため、構成団体において負担金を支出する。\n\n公平委員会については、平成13年度から鴻巣市、桶川市、北本市、北本地区衛生組合、埼玉県央広域事務組合及び埼玉中部環境保全組合、平成29年度から鴻巣行田北本環境資源組合（現　彩北広域清掃組合）が加入し、合計7団体で設置しており、構成団体数に応じた平等割及び構成団体の職員数割で決定した負担金を支出する。","pdf":"R6kitamoto_sheet.pdf"},{"no":181,"name":"市民参画・協働推進審議会等運営事業","dept":"くらし安全課","bureau":"市民経済部","budget":44,"next_budget":110,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"北本市執行機関の附属機関に関する条例、北本市市民参画・協働推進審議会規則、北本市協働推進等庁内委員会設","gai":"検討の必要性が低い","desc":"（目的）\n自治基本条例に定める、「参画及び協働の推進」と「公益的活動の支援」について検討する。\n（内容）\n【市民参画・協働推進審議会】\n市長の諮問に応じ、市民参画及び協働の推進に関する事項について調査審議する。\n【協働推進等庁内委員会】\n北本市市民参画推進条例及び北本市協働推進条例の適正な運用（市民参画手続・市民施策提案制度・協働事業提案制度）と北本市市民公益活動推進計画の進行管理を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":183,"name":"協働推進事業","dept":"くらし安全課","bureau":"市民経済部","budget":2000,"next_budget":2000,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"北本市自治基本条例、北本市協働推進条例、北本市市民参画・協働推進審議会規則","gai":"検討の必要性が低い","desc":"（目的）\nまちづくりにおける市民の参加を図り、誰もが安心して生活できる個性豊かな自立したまちを実現する。\n（内容）\n１　先駆的で専門的な知見を有する市民等から地域課題の解決方法を提案をしてもらい、市と協働で取組みを行う「協働事業提案制度」の周知を図り実施する。\n２　北本市協働推進等庁内委員会を開催し、提案された協働事業を審議する。\n３　必要に応じて、北本市市民参画・協働推進審議会を開催し、提案された協働事業を審議する。","pdf":"R6kitamoto_sheet.pdf"},{"no":185,"name":"市民公益活動支援事業","dept":"くらし安全課","bureau":"市民経済部","budget":194,"next_budget":870,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"北本市自治基本条例、北本市市民参画・協働推進審議会規則","gai":"検討の必要性が低い","desc":"（目的）\n市民が主体的に地域の問題解決に取り組む活動を支援し、誰もが安心して生活できる個性豊かな自立したまちを実現する。\n（内容）\n１　ＮＰＯ法人やボランティア団体等市民公益活動団体が実施する公益的、社会貢献的な取組みに対し、一部を補助し、活動を支援する。\n２　ＮＰＯ法人の設立に要した費用のうち、一部を補助し、法人の設立を支援する。\n３　市民公益活動団体が自由に活動を紹介できるよう、北本駅東西自由通路内にＮＰＯ等の掲示板を設置する。\n４　庁舎内に市民公益活動支援コーナーを設置し、市民公益活動団体が気軽に打合せができるスペースを提供する。","pdf":"R6kitamoto_sheet.pdf"},{"no":187,"name":"自治会振興事業","dept":"くらし安全課","bureau":"市民経済部","budget":28606,"next_budget":30682,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"要綱","law":"自治会振興交付金交付要綱、自治会集会施設整備事業等補助金交付要綱、自治会集会所施設借地料補助金交付要","gai":"検討の必要性が低い","desc":"（目的）\n自治会活動が活性化することにより、地域の交流を図り、自治会への加入が促進される。また、安定した自治会運営を図ることにより、地域住民が安全・安心に暮らし続けられるまちづくりの実現につなげる。\n（内容）\n１　自治会振興交付金：自治会活動振興のため全ての自治会（111自治会）に交付する。\n２　自治会集会施設整備事業等補助金：集会所施設等を整備しようとする自治会に交付する。\n３　集会施設借地料補助金：集会所施設の土地を借上げて活動する自治会に交付する。","pdf":"R6kitamoto_sheet.pdf"},{"no":189,"name":"自治会連合会支援事業","dept":"くらし安全課","bureau":"市民経済部","budget":1203,"next_budget":1203,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"（目的）\n自治会連合会の目的である「111人の自治会長相互の親睦を図り、連絡を密にして市政に協力し、市民福祉の増進に寄与すること」を実現するため、連合会への支援を行うことにより、地域住民が安全・安心に暮らし続けられるまちづくりを図る。\n（内容）\n左記の目的を達成するための活動（①会員相互の啓発、連絡及び親睦、②市及び各種団体との連携、協力及び調整等）の実施を支援するため、補助金を支出。","pdf":"R6kitamoto_sheet.pdf"},{"no":191,"name":"コミュニティ振興事業","dept":"くらし安全課","bureau":"市民経済部","budget":24203,"next_budget":34785,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"要綱","law":"コミュニティ協議会補助金交付要綱、地域コミュニティ委員会補助金交付要綱、コミュニティ助成事業実施要綱","gai":"検討の必要性が低い","desc":"（目的）\nコミュニティ活動が活性化することにより、地域の交流が促進され、地域住民が安全・安心に暮らすことができるコミュニティづくりの実現を図る。\n（内容）\n１　コミュニティ協議会補助金：コミュニティ協議会事務局の運営に要する費用及び活動に要する費用に対し補助金を交付する。\n２　地域コミュニティ委員会補助金：８地域のコミュニティ委員会の活動支援としてそれぞれの地域に補助金を交付する。\n３　一般コミュニティ助成金：一般コミュニティ助成事業：コミュニティ活動で必要な設備を整備する地域に補助金を交付する。","pdf":"R6kitamoto_sheet.pdf"},{"no":193,"name":"路線バス利便性向上事業","dept":"くらし安全課","bureau":"市民経済部","budget":22066,"next_budget":22066,"root":"裁量","cls":"40 快適で安心・安全なまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"市内の民間路線バスを維持していくとともに、新たな路線や既存路線の改良等の提案や要望をしていくことにより、市内公共交通の利便性向上を図っていく。\n土 を創出する目的として、本市産農産物を「＆greenfood」と名付け、北本ブランドとしてＰＲをしている。","pdf":"R6kitamoto_sheet.pdf"},{"no":323,"name":"農業近代化資金利子補給事業","dept":"産業観光課","bureau":"市民経済部","budget":127,"next_budget":147,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"経営意欲のある認定農業者等が、農業の規模拡大等により経営の向上を図ることを目的として資金を融資機関から借りて機械や施設等を購入・整備するとき、資金を貸し付けた融資機関に対して利子補給を行い、農業者を資金面で支援する。\n資金を融資期間から借りて経営向上のための機械や施設を購入する農業者に対して、原則最長１５年間の償還期限の中で、県と市が利子補給を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":325,"name":"農政推進会議補助事業","dept":"産業観光課","bureau":"市民経済部","budget":900,"next_budget":1100,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"地域の農業経営の改善と生産性の向上を目指した方向付けについて、幅広く組織的に展開し、本市農業の体質強化を推進するため。\n農政推進会議が行う本市農業の経営規模拡大・農作業の効率化・農用地の有効利用・基盤整備の推進・担い手の確保等を目的とした事業に対する支援を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":327,"name":"園芸振興事業","dept":"産業観光課","bureau":"市民経済部","budget":452,"next_budget":808,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"農作物の生産性や生産技術の向上と増産意欲を高め、農業経営の発展に資する。また、家庭菜園において収穫された農産物を品評展示することにより、市民の地域農業への理解を深めるとともに、野菜作りに対する関心を高める。\n\n農産物共進会事業、果樹園芸振興事業、施設園芸振興事業、露地野菜振興事業を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":329,"name":"市民農園整備事業","dept":"産業観光課","bureau":"市民経済部","budget":0,"next_budget":3,"root":"裁量","cls":"50 活力あふれるまち","ev":"C_見直しして継続","ev_detail":"2_財源の見直し","legal":"","law":"","gai":"検討する余地がある","desc":"市民に農業体験の場を提供し、農業に対して理解を深め、良好な緑地の保全に資することを目的とする。\n\n農園開設者に対して、農園整備に関する費用について支援する。","pdf":"R6kitamoto_sheet.pdf"},{"no":331,"name":"家畜伝染病予防事業","dept":"産業観光課","bureau":"市民経済部","budget":4,"next_budget":44,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討する余地がある","desc":"家畜の伝染病疾病の予防を支援し、畜産農家の経営の安定を図る。\n家畜伝染病の予防接種、牛法定検査（定期及び臨時）の補助、家畜環境衛生改善及び公害対策として実施する薬剤購入に係る費用に対する支援。","pdf":"R6kitamoto_sheet.pdf"},{"no":333,"name":"新谷田かんがい排水路整備事業費負担金事業","dept":"産業観光課","bur 、5-3就労対策の充実\n基本事業：5-1、5-3のすべての基本事業\n主な取組：5-1、5-3の全ての主な取組","pdf":"R6kitamoto_sheet.pdf"},{"no":343,"name":"北本まつり運営事業","dept":"産業観光課","bureau":"市民経済部","budget":9948,"next_budget":13038,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討する余地がある","desc":"北本まつり「宵まつり」は、「わがまち\"宵まつり”でふるさとづくり」という理念のもと、市民の企画・運営を通して、市民が「北本は私のふるさとです」と言えることの実現を目指し実施される。また「産業まつり」は、農商工における市内産業の活性化及び市民への市内産業への理解と、日ごろの感謝を目的として実施される。\n①宵まつり\n　宵まつり運営委員会の事務局を観光協会がつとめ、宵まつりの企画、運営(各団体のパフォーマンス、地域コミュニティ等のねぷた・囃子山車の運行)を行う。\n②産業まつり\n　産業まつり実行委員会を中心に商工会が事務局を努め、産業まつりの企画、運営(物産販売、展示、農作物共進会、姉妹都市交流等)を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":345,"name":"北本市観光協会補助事業","dept":"産業観光課","bureau":"市民経済部","budget":16278,"next_budget":16278,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討する余地がある","desc":"本市の生活や文化、自然環境や歴史的資源等に地域の人々が誇りと愛情を持ち、地域全体として盛り上げる地域密着型の観光を推進すること、及び本市の地域資源、特産品等の情報発信を行うことで市の知名度、イメージアップを図るとともに、農商工連携の中心的な担い手として、本市の物産観光産業の推進を図ることを目的に団体の育成、及び運営を支援する。\n観光協会職員人件費、事務局運営費等に対する補助。","pdf":"R6kitamoto_sheet.pdf"},{"no":347,"name":"森林セラピー事業","dept":"産業観光課","bureau":"市民経済部","budget":3190,"next_budget":3226,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討する余地がある","desc":"「森林セラピー基地・セラピーロード」の認定制度を活用し、都心近郊に残された貴重な緑地空間と自然環境の良さを広くＰＲして、市民の健康増進の取組として推進するとともに、来訪者の増加を促すプログラムを用意して地域経済の活性化につなげるもの。\n・森林セラピー事業補助事業（北本市観光協会が行う森林セラピー基地運営事業に要する費用に対する補助）\n・森林セラピー基地推進協議会開催　等","pdf":"R6kitamoto_sheet.pdf"},{"no":349,"name":"中小企業資金融資制度事業","dept":"産業観光課","bureau":"市民経済部","budget":16112,"next_budget":13879,"root":"裁量","cls":"50 活力あふれるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"経営の安定や改善、合理化を図るため、北本市中小企業資金融資規則に基づき、金融機関に融資の依頼を行う。また、同規則に基づく利子補給及び保証料補助により、利用者の負担軽減を図り、中小企業者等の経営の安定に資することを目的とする。\n①中小企業資金融資事業\n指定金融機関に資金を預託し、中小企業者等向けの融資を行う。\n②中小企業資金融資制度利子補給事業\n中小企業資金融資利用者に、一定の要件のもと利子補給を行う。\n③中小企業資金融資制度保証料補助事業\n中小企業資金融資利用者に、一定の要件のもと保証料補 と暮らせるまち","ev":"B_現状のまま継続","ev_detail":"3_見直しの必要性はあるが時期尚早","legal":"条例","law":"北本市敬老祝金条例","gai":"検討の必要性が低い","desc":"目的：敬老の意を表するとともに、長寿を祝福する。\n内容：8月末日において、住民基本台帳に引き続き1年以上記録され、かつ、贈呈対象年齢となる人に、敬老祝金を贈呈する。","pdf":"R6kitamoto_sheet.pdf"},{"no":361,"name":"老人クラブ活動費補助事業","dept":"共生福祉課","bureau":"福祉部","budget":4683,"next_budget":6015,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"目的：老人クラブ等が実施する社会奉仕活動事業、教養講座開催事業、健康増進事業等に対し補助を行うことで、多くの高齢者の社会参加と福祉増進を図る。\n内容：老人クラブ単会及び老人クラブ連合会に対し補助金を交付。老人クラブが実施する健康づくり事業、講演会、演芸会への補助と事業支援。","pdf":"R6kitamoto_sheet.pdf"},{"no":363,"name":"総合福祉センター管理運営事業","dept":"共生福祉課","bureau":"福祉部","budget":51970,"next_budget":51970,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"C_見直しして継続","ev_detail":"1_実施方法等の見直し","legal":"","law":"","gai":"検討の必要性が低い","desc":"目的：地域福祉推進の拠点として、総合的な福祉サービスを通じて市民の福祉増進及び福祉意識の高揚を図る。施設の適切な管理運営を行う。\n内容：指定管理業務（①施設の管理運営　②施設の利用承認　③施設及び設備の維持管理　④老人デイサービスの運営　⑤生活介護事業の運営　⑥各種福祉団体・ボランティア等の育成　⑦その他必要な事業）","pdf":"R6kitamoto_sheet.pdf"},{"no":365,"name":"生活保護事業","dept":"共生福祉課","bureau":"福祉部","budget":1244069,"next_budget":1282026,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"法令","law":"生活保護法","gai":"法令により余地がない","desc":"日本国憲法の理念に基づき、生活に困窮する全ての国民に対して、その程度に応じ、必要な保護を行い、その最低限度の生活を保障するとともに、その自立を助長することを目的とする。","pdf":"R6kitamoto_sheet.pdf"},{"no":367,"name":"自立支援給付サービス等事業","dept":"障がい福祉課","bureau":"福祉部","budget":1432789,"next_budget":1604183,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"法令","law":"障害者の日常生活及び社会生活を総合的に支援するための法律","gai":"法令により余地がない","desc":"障がい者が自ら選択した場所に居住し、又は障がい者若しくは障がい児が自立した日常生活または社会生活を営むことができるように必要な自立支援給付（介護給付、訓練等給付、特定障害者特別給付、地域相談支援給付、計画相談支援給付、自立支援医療、療養介護医療、補装具、高額障害福祉サービス等給付）を行う。利用希望者からの申請により本人等の状況を調査したうえで支給決定を行う。支給決定を受けた者は、支給決定内容のサービスを事業者等から提供を受け、所得に応じた利用者負担（負担上限月額の範囲内で１割負担）を事業者等に支払い、事業者等は残りを市に請求し、市は審査のうえ支払いを行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":369,"name":"相談支援事業","dept":"障がい福祉課","bureau":"福祉部","budget":9324,"next_budget":9324,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"目的：障がいのある人等からの相談に応じ、支援をすることにより、障がいのある人等が自立した日常生活または社会生活を営むことができるようにするため。\n内容：障がいのある人、その保護者、介護者などからの相談に応じ、直接電話、訪問等により、必要な情報の提供等の支援を行うとともに、権利擁護のために必要な援助を行うもの。\n※障害者総合支援法に基づく地域生活支援事業の必須事業\n※鴻巣市との人口按分：基準日令和5年4月1日　36％\n※生活相談支援センターしゃろーむ、生活支援センター夢の実に委託\n※令和6年度より委託料増額　サービス、ニーズの多様化により相談件数が増加しているため、相談支援員を１人から２人に増員","pdf":"R6kitamoto_sheet.pdf"},{"no":371,"name":"地域活動支援センター支援事業","dept":"障がい福祉課","bureau":"福祉部","budget":15343,"next_budget":16089,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"目的：障がいのある人に創作的活動、生産活動の機会、社会との交流の促進等の機会を提供することを目的とする。\n内容：地域活動支援センターを運営する事業者に補助金を支出し、運営を支援するもの。※NPO法人北本福祉の会かがやきの郷、社会福祉法人恩賜財団済生会支部埼玉県済生会","pdf":"R6kitamoto_sheet.pdf"},{"no":373,"name":"手話通訳者派遣事業","dept":"障がい福祉課","bureau":"福祉部","budget":13851,"next_budget":14153,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"","law":"","gai":"法令により余地がない","desc":"聴覚障がい者及び音声・言語機能障がい者に対し、家庭生活並びに社会生活におけるコミュニケーションを円滑に行うため、手話通訳者を派遣することにより、聴覚障がい者等の福祉の増進を図る。市内に在住在勤の聴覚障がい者等で、手話通訳を必要としている人に手話通訳者を派遣する。北本市社会福祉協議会に事業委託。","pdf":"R6kitamoto_sheet.pdf"},{"no":375,"name":"要約筆記奉仕員派遣事業","dept":"障がい福祉課","bureau":"福祉部","budget":612,"next_budget":660,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"","law":"","gai":"法令により余地がない","desc":"聴覚障がい者及び音声・言語機能障がい者に対し、円滑な意思の伝達を図る。市内に在住在勤の聴覚障がい者等で、要約筆記を必要としている人が対象。埼玉県内に要約筆記者を派遣する。利用料は無料だが、派遣先で費用がかかる場合は、利用者負担。埼玉聴覚障害者福祉会に事業委託。","pdf":"R6kitamoto_sheet.pdf"},{"no":377,"name":"日常生活用具支援事業","dept":"障がい福祉課","bureau":"福祉部","budget":12846,"next_budget":17180,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】市内に居住地を有する重度身体障がい者（児）に対し、日常生活用具を給付することにより、日常生活の便宜を図り、もって重度身体障がい者の福祉の増進を図る。\n【内容】日常生活用具を必要とする障がい者、障がい児、難病患者等からの申請に応じて、市は、給付券を発行し、指定事業者を通じてストマ等の用具を給付する。","pdf":"R6kitamoto_sheet.pdf"},{"no":379,"name":"移動支援事業","dept":"障がい福祉課","bureau":"福祉部","budget":9526,"next_budget":10640,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"法令","law":"障害者の日常生活及び社会生活を総合的に支援するための法律、北本市移動支援事業実施要綱","gai":"検討の必要性が低い","desc":"【目的】屋外での移動に困難がある障がい者（児）について、外出のための支援として移動支援事業を行うことにより、障がい者等の地域での自立生活及び社会参加を促す。\n【内容】事前に市に利用申請書を提出した障がい者（児）について、事前に市に登録した事業者により障がい者等が円滑に外出することができるよう移動の支援を受けることができる。事業者には利用実績に応じて市より補助金を交付する。","pdf":"R6kitamoto_sheet.pdf"},{"no":381,"name":"精神障がい者家族教室開催事業","dept":"障がい福祉課","bureau":"福祉部","budget":56,"next_budget":76,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"目的：精神障がい者の家族が疾病への理解を深め対応方法を学び、家族間交流を行うことで疾病によって引き起こされる諸問題に対処し、社会資源の活用等主体的に療養生活を営めるよう家族の健康の向上を図る。\n内容：精神科医、臨床心理士、精神保健福祉士等による講話。グループワークを通した家族交流。","pdf":"R6kitamoto_sheet.pdf"},{"no":383,"name":"成年後見制度利用支援事業","dept":"障がい福祉課","bureau":"福祉部","budget":16,"next_budget":478,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"","law":"","gai":"法令により余地がない","desc":"目的：知的障がい者及び精神障がい者が、民法第7条から第18条までの後見制度、保佐制度及び補助制度を利用するにあたり、その支援をす　　　ることにより、要支援者がその有する能力を活用し、自らが希望する自立した日常生活を営むことができる環境整備の実現に資するた　　　め。\n内容：障害福祉サービスの利用等の観点から、成年後見制度の利用が有効と認められる知的障がい者、精神障がい者に対し、制度の利用を支　　　援することにより、障がい者の権利擁護を図る。成年後見制度の申し立てに要する経費の一部を補助する。","pdf":"R6kitamoto_sheet.pdf"},{"no":385,"name":"訪問入浴サービス事業","dept":"障がい福祉課","bureau":"福祉部","budget":1705,"next_budget":3166,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"【目的】身体上の障害等により、家庭において入浴することが困難な身体障害者に対して、入浴サービスを行うことに関し必要な事項を定め、当該身体障害者の心身の健康を増進するとともに、家族介護の負担を軽減し、もって在宅福祉の向上を図る。\n【内容】対象者について、月4回を上限として主に移動入浴車による訪問入浴サービスの提供を事業者に委託して実施。","pdf":"R6kitamoto_sheet.pdf"},{"no":387,"name":"日中一時支援事業","dept":"障がい heet.pdf"},{"no":421,"name":"視覚障害者ガイドヘルパー派遣事業","dept":"障がい福祉課","bureau":"福祉部","budget":1098,"next_budget":1254,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"","law":"","gai":"検討の必要性が低い","desc":"付添者を得られないため社会生活上必要な外出が困難な視覚障がい者に対し、視覚障害者ガイドヘルパーを派遣することにより、視覚障がい者の福祉の増進を図る。身体障害者手帳所持者のうち、視覚の障害程度が１・２級の在宅の人が対象。費用は無料。派遣先で費用がかかる場合は利用者負担。社会福祉協議会に委託。","pdf":"R6kitamoto_sheet.pdf"},{"no":423,"name":"福祉電話料扶助事業","dept":"障がい福祉課","bureau":"福祉部","budget":14,"next_budget":14,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"重度身体障害者等が必要とする機器の利用に対し補助をすることで、福祉の増進を図る。緊急時通報システムが必要な重度障がい者及び電話を使用することが困難な重度身体障がい者が使用する機器に対して、設置費用を補助する。","pdf":"R6kitamoto_sheet.pdf"},{"no":425,"name":"障害児通所給付事業","dept":"障がい福祉課","bureau":"福祉部","budget":295117,"next_budget":360712,"root":"法定義務あり","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"4_現状では見直しが不可能","legal":"法令","law":"児童福祉法","gai":"法令により余地がない","desc":"児童が心身ともに健やかに育成されるよう、児童の身近な場所における児童の福祉に関する支援を行う。\n（障害児通所給付（児童発達支援、医療型児童発達支援、放課後等デイサービス、保育所等訪問支援）、高額障害児通所給付、肢体不自由児通所医療、障害児相談支援給付の支給を行う）\n利用希望者からの申請により本人等の状況を調査したうえで支給決定を行う。支給決定を受けた者は、支給決定内容のサービスを事業者から提供を受け、所得に応じた利用者負担（負担上限月額の範囲内で１割負担）を事業者に支払い、事業者は残りを市に請求を行い、市は審査のうえ支払いを行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":427,"name":"小児慢性特定疾病児童日常生活用具給付事業","dept":"障がい福祉課","bureau":"福祉部","budget":254,"next_budget":0,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"要綱","law":"北本市小児慢性特定疾病児童日常生活用具事業実施要綱","gai":"検討の必要性が低い","desc":"目的：児童福祉法に規定する医療費支給決定を受けている小児慢性特定疾病児童等に対し、特殊寝台等の日常生活用具を給付することにより、日常生活の便宜を図る。\n内容：【対象者】市内に住所を有する児で、児童福祉法に規定する医療費支給認定を受けている小児慢性特定疾病児童等で、基準に定める状態にあると認められる児。\n【給付額】用具の給付を受けた児童の扶養義務者は、その収入に応じて用具の給付に要する費用の一部を用具の納入業者に支払う。市は扶養義務者が業者に支払った額を減じた額を業者に支払う。\n【手続き等】事前の申請手続き、小児慢性特定疾病医療受給者証の写しが必要。","pdf":"R6kitamoto_sheet.pdf"},{"no":429,"name":"難聴児補聴器購入助成事業","dept":"障がい福祉課","bureau":"福祉部","budget":78,"next_budget":354,"root":"裁量","cls":"10 子どもの成長を支える et.pdf"},{"no":457,"name":"介護予防・生活支援サービス事業","dept":"高齢介護課","bureau":"こども健康部","budget":129095,"next_budget":159729,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"要支援者等に対し、要介護状態等になることを予防又は要介護状態等の軽減もしくは悪化の防止及び地域における自立した日常生活の支援実施することにより、一人ひとりの生きがいや自己実現のための取り組みを支援し、活動的で生きがいのある生活や人生を送ることができるよう支援する。\n要支援認定者及び事業対象者に対し、訪問型サービス、通所型サービス、生活支援サービスの提供を行う。地域の実情に応じたサービスの提供体制や指定基準、利用料等を決定した上で、事業者指定・委託・補助等の方法により実施する。","pdf":"R6kitamoto_sheet.pdf"},{"no":459,"name":"高額介護予防サービス費等相当事業","dept":"高齢介護課","bureau":"こども健康部","budget":289,"next_budget":0,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"高額介護予防サービス費を適正に支払い、利用者に介護サービス利用料の負担を軽減する。結果、自立して日常生活を送ってもらうことを目的とする。\n要支援認定者が介護予防サービスを受けた場合に支払う１ヶ月ごとの利用者負担上限額は、所得区分に応じて設定されており、利用者負担額が上限を超えた場合に、その超えた分の払い戻しを行う。主な業務は、①給付対象者の抽出、②新規対象者への申請勧奨、③申請書の受付、④受付内容審査、⑤起案、⑥支払い決定通知の発送、⑦支払い。","pdf":"R6kitamoto_sheet.pdf"},{"no":461,"name":"介護予防ケアマネジメント事業","dept":"高齢介護課","bureau":"こども健康部","budget":15761,"next_budget":17620,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"介護予防・日常生活支援サービス事業対象者に対して介護予防ケアマネジメントを実施し、高齢者自身が地域における自立した日常生活を送れるよう支援する。\n要支援認定者及び事業対象者に対して、要介護状態になることの予防と日常生活の自立支援を目的として、地域包括支援センター・委託居宅介護支援事業所が、介護予防ケアプランの作成及び支援を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":463,"name":"一般介護予防事業","dept":"高齢介護課","bureau":"こども健康部","budget":3457,"next_budget":3763,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"65歳以上の高齢者及びその支援のための活動に関わる人が、介護予防に関する正しい知識を持ち、要支援・要介護状態に陥ることを予防するとともに、主体的な介護予防の取り組みを実施するような地域社会を構築する。","pdf":"R6kitamoto_sheet.pdf"},{"no":465,"name":"包括的支援事業","dept":"高齢介護課","bureau":"こども健康部","budget":107660,"next_budget":108957,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","la ","dept":"子育て支援課","bureau":"福祉部","budget":31896,"next_budget":33349,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"北本市ひとり親家庭等医療費の支給に関する条例","gai":"法令により余地がない","desc":"ひとり親家庭等の保護者と養育している児童が、医療機関に医療保険制度でかかった場合、支払った医療費の一部を助成する制度。\nひとり親家庭等に対する医療費の一部を助成することにより、子どもの保健の向上とひとり親家庭等の福祉の増進を図ることを目的とする。\n病気などにより、医療機関（病院・診療所・歯科医院・調剤薬局・整骨院等）で受診した場合の医療費を一部助成する制度で、対象者は通院・入院ともに満18歳の年度末までの児童（一定の障害がある児童は20歳になる前日まで）とその親等。助成の対象となる医療費は、医療保険制度が適用される医療費の一部負担金（ただし、健康保険により高額療養費や付加給付金がある場合は、その額を除いた額）。","pdf":"R6kitamoto_sheet.pdf"},{"no":477,"name":"ひとり親家庭自立支援事業","dept":"子育て支援課","bureau":"福祉部","budget":1321,"next_budget":12304,"root":"法定義務あり","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"検討の必要性が低い","desc":"ひとり親家庭を対象に、経済的支援、就労支援、日常生活支援を行う\n・ひとり親家庭高等職業訓練促進給付・訓練修了給付\n・ひとり親自立支援教育訓練給付\n・公正証書作成支援\n・ひとり親家庭日常生活支援\n・ひとり親家庭等自立支援プログラム策定事業\n・母子福祉資金貸付制度、JR定期乗車券割引制度","pdf":"R6kitamoto_sheet.pdf"},{"no":479,"name":"多子出産祝金事業","dept":"子育て支援課","bureau":"福祉部","budget":1750,"next_budget":3000,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"北本市多子出産祝金支給条例","gai":"検討の必要性が低い","desc":"多子（第３子以降の子）を出産した者、若しくはその配偶者又は当該多子の養育者に５万円を支給する。\nこの条例は、多子の出産を推奨するために北本市多子出産祝金（以下「出産祝金」という。）を支給することにより、多子世帯の経済負担の軽減を図るとともに本市の人口増加に寄与することを目的とする。","pdf":"R6kitamoto_sheet.pdf"},{"no":481,"name":"子育て応援事業","dept":"子育て支援課","bureau":"福祉部","budget":8307,"next_budget":7128,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"C_見直しして継続","ev_detail":"4_他事業との整理統合","legal":"要綱","law":"北本市子育て応援事業実施要綱","gai":"検討の必要性が低い","desc":"令和３年４月１日以降に生まれた児童の出生時、１歳６か月児健診時、３歳児健診時に、子育て世帯の経済支援と児童の健やかな成長に資することを目的として、こども商品券を各１万円、計３万円を支給する。\n本事業を実施することにより、県との連携事業「コバトンベビーギフト」を対象家庭が利用できる。\n令和６年度より、対象児童の３歳児健診が開始されたため、子育て応援事業が拡大となった。","pdf":"R6kitamoto_sheet.pdf"},{"no":483,"name":"乳児用品貸出事業","dept":"子育て支援課","bureau":"福祉部","budget":802,"next_budget":1362,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要 髄ドナー","dept":"健康づくり課","bureau":"こども健康部","budget":195,"next_budget":0,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"要綱","law":"北本市骨髄移植ドナー助成費交付要綱","gai":"検討の必要性が低い","desc":"【献血】\n＜目的＞\n・市内の協力団体による献血の受入れ、日程調整等を円滑に実施し、啓発活動（ポスターや記念品の配布、高等学校訪問等）を通じ、市民の献血への理解を深め、献血実施人数の向上を目的とする。\n\n【骨髄移植ドナー助成費交付】\n＜目的＞\n予算の範囲内で北本市骨髄移植ドナー助成費を交付することにより、提供者の休業による経済的負担の軽減を図り、もって骨髄及び末梢血幹細胞移植の推進及びドナー登録の推進に寄与することを目的とする。\n＜当年度のみの特殊事情等＞\n令和6年度の歳出予算は1人分（140,000円）だったが、2人分の助成費の交付があったので、280,000円の歳出であった。埼玉県骨髄移植ドナー助成費補助金事業実施報告にて令和6年度の助成額を報告。埼玉県骨髄移植ドナー助成費補助金交付要綱に定める補助率のとおり当該所要経費の2分の1以内である、140,000円の補助金を受け取った。","pdf":"R6kitamoto_sheet.pdf"},{"no":549,"name":"母子保健・妊産婦事業","dept":"健康づくり課","bureau":"こども健康部","budget":31864,"next_budget":40566,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"要綱","law":"母子保健法第16条、第17条、北本市早期不妊検査費・不育症検査費助成金交付要綱、北本市低所得世帯の妊婦に","gai":"検討の必要性が低い","desc":"妊娠を望む夫婦に対する必要な不妊検査費・不育症検査費の一部助成を行うことで、経済的な負担を軽減し、安心して妊娠・出産に臨めるよう支援する。また、妊娠期を安心、安全に過ごし、健康管理を行うことで、健やかな出産、育児に繋げる。\n事業の内容は、不妊検査費・不育症検査費助成金交付、母子健康手帳交付、妊婦健康診査事業、低所得妊婦初回産科受診料助成金交付、新生児聴覚検査、産婦健康診査、１か月児健康診査助成金交付、妊産婦家庭訪問、プレママセミナー、プレママ・プレパパセミナー","pdf":"R6kitamoto_sheet.pdf"},{"no":551,"name":"未熟児養育医療費支援事業","dept":"健康づくり課","bureau":"こども健康部","budget":5898,"next_budget":8199,"root":"法定義務あり","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"身体の発育が未熟な状態で生まれ、入院を必要とする乳児に対して、その治療に必要な医療費を市が負担することにより、未熟児を扶養する世帯の負担軽減を目的とする。指定養育医療機関に入院し、治療を行う際の医療費を支給する。（出生から継続した入院の医療費が対象となる。1歳まで。）","pdf":"R6kitamoto_sheet.pdf"},{"no":553,"name":"乳児家庭全戸訪問事業","dept":"健康づくり課","bureau":"こども健康部","budget":1656,"next_budget":4435,"root":"法定義務あり","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"乳児を持つ家庭の成長発達や育児への不安の軽減を図るとともに、相談先のひとつとして保健師の存在を知ってもらう機会とする。生後4か月までの乳児がいるすべての家庭を訪問し、以下の支援を行う。\n・子育てに関する不安な悩みの傾聴、相談\n・子育てに関する情報提供\n・乳児及びその保護者の心身の状態、及び養育環境の把握\n・支援が必要な家庭に対するサービスの検討と リをインストールしたスマートフォンを身に付け、参加者が各自ウォーキング（歩数等に合わせ健康ポイント付与）。個別の記録を本人に提供。\n【健康スタンプ事業】ウオーキング状況等により、景品が当たる抽選を実施\n【健康増進教室参加費助成事業】\n※ 平成27･28･29年度、「埼玉県健康長寿埼玉モデル普及促進事業」（補助金交付）の対象事業。","pdf":"R6kitamoto_sheet.pdf"},{"no":573,"name":"健康体力づくり市民会議運営事業","dept":"健康づくり課","bureau":"こども健康部","budget":50,"next_budget":154,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"北本市執行機関の附属機関に関する条例、北本市健康・体力づくり市民会議","gai":"検討の必要性が低い","desc":"市民の健康の増進と体力の向上に関する事業計画の策定及びその推進を図るために必要な事項等について審議し、市民の健康の増進と体力の向上に資する。\n事務局として会議を運営する。\n令和６年度実施状況\n第１回会議開催（対面）\n・前期計画の最終報告及び「第二期北本市みんないきいき！健康なまちづくりプラン（健康増進計画・食育推進計画・歯科口腔保健推進計画）」に関する事業実施状況について","pdf":"R6kitamoto_sheet.pdf"},{"no":575,"name":"精神保健事業（自殺対策事業含む）","dept":"健康づくり課","bureau":"こども健康部","budget":655,"next_budget":0,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"法令","law":"精神保健及び精神障害者福祉に関する法律、自殺対策基本法、北本市民のいのちと心を守る自殺対策条例","gai":"検討の必要性が低い","desc":"精神保健に関する知識の普及向上に努めると共に、相談体制を整備することで、市民が健康で生き生きと暮らせるようにする。\n精神保健に関する市民向け講座\n精神科医によるこころの相談、保健師による随時相談\n自殺予防街頭キャンペーン・ＨＰ上のメンタルヘルスチェック\n暮らしとこころの総合相談会\n関係者向け自殺予防対応研修","pdf":"R6kitamoto_sheet.pdf"},{"no":577,"name":"後期高齢者特別会計繰出事業","dept":"保険年金課","bureau":"こども健康部","budget":191716,"next_budget":207420,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"法令","law":"高齢者の医療の確保に関する法律","gai":"法令により余地がない","desc":"後期高齢者医療特別会計への繰出金\n高齢者の医療の確保に関する第９９条第１項の規定に基づき、所得の少ない被保険者について、広域連合の定めた条例により保険料の減額した額の総額を基礎として算定した額を市の一般会計から保険基盤安定負担金として後期高齢者医療特別会計に繰出すものである。","pdf":"R6kitamoto_sheet.pdf"},{"no":579,"name":"国民健康保険特別会計繰出事業","dept":"保険年金課","bureau":"こども健康部","budget":385275,"next_budget":436969,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・国民健康保険特別会計の財政の安定化を図るために一般会計からの繰出しを行う。\n【内容】\n・国民健康保険特別会計の財政の安定化を図るために、一般会計から国民健康保険法の規定に基づき、適切な繰り入れを行う。\n・繰入れの実施に当たっては、総務省自治財政局調整課事務連絡通知の中に示す基本的な考え方・方法に沿って適正に実施する。","pdf":"R6kitamoto_sheet.pdf"},{"no":581,"name":"後期高齢者医療広域連合事業","dept":"保険年金課","bureau":"こども健康部","budget":1196558,"next_budget":1281433,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"埼玉県後期高齢者医療広域連合を運営するために納付するものである。　（後期高齢者医療広域連合納付金）\n後期高齢者医療保険料、保険基盤安定繰入金、延滞金の総額である。","pdf":"R6kitamoto_sheet.pdf"},{"no":583,"name":"後期高齢者医療広域連合運営負担事業","dept":"保険年金課","bureau":"こども健康部","budget":806056,"next_budget":860349,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"法令","law":"高齢者の医療の確保に関する法律","gai":"法令により余地がない","desc":"後期高齢者医療広域連合負担金\n①後期高齢者医療広域連合共通経費負担金\n②後期高齢者医療広域連合療養給付費負担金","pdf":"R6kitamoto_sheet.pdf"},{"no":585,"name":"後期高齢者健康診査等事業","dept":"保険年金課","bureau":"こども健康部","budget":68158,"next_budget":84005,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"生活習慣病の早期発見・健康保持のため受診を勧奨する。（介護保険施設等の入所者は除く）","pdf":"R6kitamoto_sheet.pdf"},{"no":587,"name":"後期高齢者人間ドック検診等補助事業","dept":"保険年金課","bureau":"こども健康部","budget":2939,"next_budget":3400,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"法令により余地がない","desc":"生活習慣病その他の疾病の予防および早期発見を目的として人間ドック・脳ドック検診を受ける人に対して補助を実施する。","pdf":"R6kitamoto_sheet.pdf"},{"no":589,"name":"高齢者の保険事業と介護予防等の一体的な実施事業","dept":"保険年金課","bureau":"こども健康部","budget":6618,"next_budget":8258,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"A_重点化・拡大して継続","ev_detail":"－","legal":"法令","law":"高齢者の医療の確保に関する法律","gai":"検討する余地がある","desc":"令和３年度から高齢者の保健事業と介護予防の一体的な実施を開始した。まず、ハイリスクアプローチとして、糖尿病性腎症重症化予防プログラムに準じて、糖尿病のリスクの高い人や通院治療中の人に対して、通院先の医療機関の医師の指示に基づき生活指導を実施することにより、被保険者の健康維持、医療費の適正化を実現することを目的とする糖尿病性腎症重症化予防事業を実施した。令和６年度から２つ目のハイリスクアプローチとして、健康状態が一定期間明らかでない後期高齢者医療被保険者に対して市からアプローチを行うことで、対象者自身が自分の健康状態を振り返り、セルフチェックの重要性に気づき、健診受診など自らの健康管理の実施を促進することを目的とする健康状態不明者対策事業を開始した。","pdf":"R6kitamoto_sheet.pdf"},{"no":591,"name":"後期高齢者医療特別会計事業","dept":"保険年金課","bureau":"こども健康部","budget":2701,"next_budget":3764,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"法令により余地がない","desc":"高齢期における適切な医療の確保を図り、高齢者の福祉の増進を図る。\n後期高齢者医療制度の安定的な運営のため、保険料徴収などの事務が適切に執行されるための経費(事務費繰入金)を負担する。","pdf":"R6kitamoto_sheet.pdf"},{"no":593,"name":"国民健康保険運営等事業","dept":"保険年金課","bureau":"こども健康部","budget":23425,"next_budget":21654,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・国保における資格の取得・喪失等の資格管理を行うことで、国保制度の適正な運営を行う。\n・国民健康保険法第83条の規定に基づき、国民健康保険団体連合会の会員である保険者が共同して国保事業を適正円滑に行う。\n・国保事業に要する費用に充てるため、国保税を課す。\n【内容】\n・国民健康保険業務を運営するために必要とする資格管理、被保険者証の交付等を行う。\n・国民健康保険税の賦課及び納税通知書の送付をするとともに、保険税の理解を得るための「国保税のしおり」を作成し、加入時の配布や納税通知書または保険証送付時に同封する。\n・国民健康保険団体連合会運営のための負担金を支払う。\n・市町村の国民健康保険事業の運営に関する協議会の開催・庶務を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":595,"name":"療養諸費・移送費給付事業","dept":"保険年金課","bureau":"こども健康部","budget":3838647,"next_budget":3891456,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・被保険者の疾病、負傷等に対して、法令の規定により保険給付（療養給付費・療養費）を行う。\n・法令の規定により、国民健康保険加入者が療養の給付を受けるため病院や診療所に移送された場合に、保険者に義務付けられている移送費を支給する。\n【内容】\n・国民健康保険加入者が療養の給付を受けるためにかかった医療費の内、一部負担金を除く費用を支払う。\n・共同事業として、国民健康保険団体連合会へ委託する診療報酬明細書の審査業務に係る費用を支払う。\n・診療報酬明細書(電子レセプト)の縦覧点検を委託等により実施する。\n・移送費の支給申請により、移送の目的である保険診療として適切で、患者が疾病又は負傷により移動することが著しく困難であり、かつ緊急やむを得ないと認められた場合移送費を支給する。","pdf":"R6kitamoto_sheet.pdf"},{"no":597,"name":"高額療養費等支給事務","dept":"保険年金課","bureau":"こども健康部","budget":574850,"next_budget":569479,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・被保険者の属する世帯の過重な医療費の自己負担の軽減を図り、医療保険の機能をより有効に働かせる。\n【内容】\n・被保険者の1カ月の一部負担金が一定の自己負担限度額を超える場合は、その超える額を高額療養費として支給する。高額療養費は、償還払いが原則であるが、限度額適用認定証及び高齢者受給者証交付者に関しては、医療機関窓口では限度額までの支払いとすることで負担軽減し、限度額超過分を高額療養費として保険者から医療機関に支払う。\n・国保と介護保険の限度額適用後の自己負担の年額(8月～翌7月)を合算し、一定の限度額を超えている場合、高額医療・高額介護合算療養費を被保険者へあとから支給する。","pdf":"R6kitamoto_sheet.pdf"},{"no":599,"name":"出産育児一時金支給事務","dept":"保険年金課","bureau":"こども健康部","budget":6979,"next_budget":10505,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・子どもが健やかに生まれ育つ環境づくりを推進するため、分娩に直接要する費用のほか、出産前後に発生する費用の負担を軽減するため、国民健康保険加入者のうち、妊娠85日以上の出産等をした方に一時金を支給する。\n【内容】\n・医療機関への支払いを軽減する直接支払制度の他、本人が全額を負担した場合でも、後日申請により支給する。","pdf":"R6kitamoto_sheet.pdf"},{"no":601,"name":"葬祭費支給事務","dept":"保険年金課","bureau":"こども健康部","budget":5200,"next_budget":5500,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・国民健康保険加入者が死亡したときに葬祭を行った人に、葬祭費を支給する。\n【内容】\n・葬祭執行者の申請により葬祭費を支給する。","pdf":"R6kitamoto_sheet.pdf"},{"no":603,"name":"傷病手当費支給事務","dept":"保険年金課","bureau":"こども健康部","budget":42,"next_budget":3,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"条例","law":"国民健康保険条例","gai":"検討の必要性が低い","desc":"【目的】\n・新型コロナウイルス感染症が拡大したことにより、給与の支払いを受けている者が感染した場合に休みやすい環境を整備する必要があるため、傷病手当金の支給を国の財政支援措置のもと実施する。\n【内容】\n・被保険者が新型コロナウイルスに感染し、又は発熱などの症状があり、感染が疑われることにより会社などを休んで給与等の支払いを受けていない若しくは減額され、一定の要件に該当する者に支給する。\n【備考】\n・令和5年5月8日から新型コロナウイルス感染症は５類感染症に位置づけられ、国の財政支援措置の終了とともに当該事業は廃止予定となる。但し、保険給付に係る請求権の時効は、給付の原因発生日から2年となるため、この範囲内において事業を当面継続していく。(支給対象は令和5年5月7日までに感染し、就労不能により給与が無給または減額となった場合に限る。)","pdf":"R6kitamoto_sheet.pdf"},{"no":605,"name":"疾病予防事業","dept":"保険年金課","bureau":"こども健康部","budget":11500,"next_budget":13639,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・人間ドック、脳ドックの受診また、健康教室等の保健事業を実施し、被保険者の健康保持と疾病の重症化予防を図る。\n【内容】\n・人間ドック検診・脳ドック検診のいずれか一方が申請により年度（毎年4/1～3/31）に１回交付される。補助額は検診料の7割（上限2万円）。\n・特定健康診査の結果を基に、疾病の重症化予防のための健康教室を実施する。\n・保険制度パンフレット「国保連絡帳」を作成・配布し、保険制度と健康に対する理解を深めるとともに、健康管理の意識付けと医療費適正化の観点から、2ヵ月に一度医療費通知を送付する。","pdf":"R6kitamoto_sheet.pdf"},{"no":607,"name":"糖尿病性腎症重症化予防事業","dept":"保険年金課","bureau":"こども健康部","budget":2437,"next_budget":3225,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"【目的】\n・糖尿病性腎症重症化予防プログラムに基づき、糖尿病のリスクの高い人に対して、医療機関への受診勧奨を実施するとともに、通院治療中の人に対して、通院先の医療機関の医師の指示に基づき生活指導を実施することにより、糖尿病性腎症の重症化予防を促進し、北本市国民健康保険被保険者の健康維持、医療費の適正化を実現することを目的とする。\n【内容】\n・未受診者や受診中断者に対して、医療機関への受診を促すために受診勧奨通知書の送付や電話での勧奨を行う。また、糖尿病が重症化するリスクが高い人のうち、かかりつけ医による選定及び本人からの参加同意があった人に対して、適切な食事や運動に関する保健指導（個別面談及び電話フォロー）を実施する。更に、保健指導修了者のうち、希望者には、継続支援（個別面談）も実施する。","pdf":"R6kitamoto_sheet.pdf"},{"no":609,"name":"特定健康診査・特定保健指導事業","dept":"保険年金課","bureau":"こども健康部","budget":50330,"next_budget":60094,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・脳・心血管疾患のリスクであるメタボリックシンドロームを早期に発見し、必要な人には保健指導を行うことにより、生活習慣病、ひいては脳・心血管疾患等重篤な疾患の発症や重症化を予防し、医療費の適正化を図る。\n【内容】\n・市内契約医療機関で健康診査及び結果説明実施。その後、対象者を選定し、民間業者委託による保健指導を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":611,"name":"公債費・諸支出金・予備費管理事業","dept":"保険年金課","bureau":"こども健康部","budget":35088,"next_budget":15294,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・国民健康保険税額の更正等の理由により、過年度分の過納額の還付や加算金を支払う。また、国や県等からの補助金について、確定額を超える補助金等の交付を受けていた場合に返還する。\n【内容】\n・被保険者の国保資格の得喪や修正申告等により、国保税額に変更が生じ、既に納付済みのため、過納額が生じた場合は、本人宛の還付通知を行う。国や県等からの補助金について、実績報告等による額の確定等に伴い、その額を超える補助金等が交付されていた場合に、その超えた額を返還する。\n・不測の事態から特別会計歳出予算の不足が見込まれ、緊急対応を要する場合、予備費の充用により対応する。","pdf":"R6kitamoto_sheet.pdf"},{"no":613,"name":"国民健康保険事業費納付金事業","dept":"保険年金課","bureau":"こども健康部","budget":1647761,"next_budget":1670191,"root":"法定義務あり","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"2_見直しには法令等の改正が必須","legal":"","law":"","gai":"法令により余地がない","desc":"【目的】\n・県が市町村の療養の給付等に要する費用その他の国保事業に要する費用を、市町村に国民健康保険保険給付費等交付金として交付するための財源に充てるための国民健康保険事業費納付金を県に納付する。\n【内容】\n・ w":"","gai":"検討の必要性が低い","desc":"目的：遊水地・雨水幹線等を適切に維持管理し、施設機能の保持を図る。\n内容：大雨時等に溢水被害など発生することの無いよう、遊水地・雨水幹線等の除草、清掃、浚渫などの維持管理を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":711,"name":"汚水管維持管理事業","dept":"建設課","bureau":"都市整備部","budget":31761,"next_budget":48105,"root":"法定義務あり","cls":"40 快適で安心・安全なまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"法令により余地がない","desc":"目的：汚水管の補修により下水道施設の機能維持を図る。流域下水道処理施設へ汚水を放流するにあたり、その水質が基準に適合するか確認のため水質分析調査を行う。整備済みの汚水管情報を台帳として調製し保管することで、資産管理、維持管理での活用を図る。汚水管に接続する排水設備の検査を行い、基準に適合しているかを確認する。\n内容：汚水管の維持管理のため、管渠内部の状態を調査し損傷箇所等の確認を行う。マンホールでは、蓋のガタつきの有無、高さ調整等の対応をとる。流域下水道接続点、特定事業場について、水質分析調査を行い、検査結果を県に報告する。前年度に整備、開発行為等によって築造され寄付採納をされた汚水施設について新たに下水道台帳に掲載し、最新の内容として更新を行う。","pdf":"R6kitamoto_sheet.pdf"},{"no":713,"name":"公共下水道整備事業（雨水）","dept":"建設課","bureau":"都市整備部","budget":4510,"next_budget":10000,"root":"法定義務あり","cls":"40 快適で安心・安全なまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"法令","law":"下水道法","gai":"検討の必要性が低い","desc":"目的：公共下水道事業認可区域内を事業計画に基づき、大雨時などにおける浸水対策として、雨水管の築造等行い雨水排水の向上を図るもの。\n内容：公共下水道事業認可区域(雨水)505.7haの中の勝林雨水幹線の整備を行っていく。","pdf":"R6kitamoto_sheet.pdf"},{"no":715,"name":"公共下水道整備事業（汚水）","dept":"建設課","bureau":"都市整備部","budget":94694,"next_budget":180840,"root":"法定義務あり","cls":"40 快適で安心・安全なまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"法令","law":"下水道法","gai":"検討の必要性が低い","desc":"目的：公共下水道事業認可区域内を事業計画に基づき、汚水管渠を整備し事業の推進を図るもの。\n内容：公共下水道事業認可区域723.9ha、令和４年度３月末整備済区域6２8.65ha","pdf":"R6kitamoto_sheet.pdf"},{"no":717,"name":"中丸中継ポンプ場維持管理及び整備事業","dept":"建設課","bureau":"都市整備部","budget":10687,"next_budget":10682,"root":"法定義務あり","cls":"40 快適で安心・安全なまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"法令","law":"下水道法","gai":"検討の必要性が低い","desc":"目的：中丸・二ツ家地域における汚水を中継ポンプ場を経由し、荒川左岸北部流域下水道管渠に接続するためポンプアップにより放流可能とするため、施設の機械設備、電気設備等が正常に稼働するよう維持管理を行い、経年による機器の更新など国の交付金等を活用しながら持続的な維持管理を実施する。\n内容：中丸中継ポンプ場施設は、平成３０年度に耐震化工事が完了した。\nこの施設は、２４時間常時稼働していることから、施設内の電気設備機器や機械設備機器等においても経年による劣化が見られてきており、ストックマネジメント計画に基づいた計画的な機器類の改修（器機の入れ替えなど）を行っていく。","pdf" 文化センターのホールを無料で開放し発表の場を提供することによって、サークル団体のつながりを支援し、地域文化活動の振興を図る。\n北本市市民文化祭の舞台発表として、市民団体が文化センターホールで、音楽・演劇・演芸・ダンス・バレエ等の発表を行う。\n○出演団体募集：6月\n○運営委員会：7月、9月、10月、12月\n○発表会：11月","pdf":"R6kitamoto_sheet.pdf"},{"no":787,"name":"きたもとピアノフェスティバル実施事業","dept":"生涯学習課","bureau":"教育部","budget":278,"next_budget":3,"root":"裁量","cls":"20 健康でいきいきと暮らせるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"音楽文化の創造と発展・向上に寄与し、北本市の音楽文化活動の推進を図る。\n市内在住在勤在学、北本市にゆかりのある人を募集し、スタインウェイのコンサートグランドピアノによる演奏会を開催する。","pdf":"R6kitamoto_sheet.pdf"},{"no":789,"name":"国際交流推進事業","dept":"生涯学習課","bureau":"教育部","budget":300,"next_budget":3,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"北本市及び近隣に居住する外国人に対して、日本語を教えるとともに、交流を深め国際化の推進に努めるもの。\n国際交流ラウンジ委員会で、日曜日の午後、北本市及び近隣在住の外国人に日本語を教え、学習後に交流会を開催し交流を深めている。外国人が自分の国を紹介し国際理解を深めている。外国語の学習会を開催し、外国語の普及に努める。","pdf":"R6kitamoto_sheet.pdf"},{"no":791,"name":"青少年問題協議会運営事業","dept":"生涯学習課","bureau":"教育部","budget":61,"next_budget":993,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"法令により余地がない","desc":"市内における青少年に関する施策の連絡調整を図り、その効果的推進を期し、青少年の健全な育成を図る。必要に応じて会議を開催し、青少年の指導、育成、保護、及び矯正に関する総合的施策について、調査審議し、適切な実施を図るため、関係機関との連絡調整を図る。","pdf":"R6kitamoto_sheet.pdf"},{"no":793,"name":"青少年健全育成研修事業","dept":"生涯学習課","bureau":"教育部","budget":50,"next_budget":3,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"3_見直しの必要性はあるが時期尚早","legal":"","law":"","gai":"検討する余地がある","desc":"地域の結び付きを深め、子どもに対する家庭・地域の教育力を高め、もって青少年健全育成に対する意識の向上を図る。\n講師を招聘し、小学校、中学校の保護者を対象とした子育て講座、幼稚園の保護者を対象とした幼稚園家庭教育学級、青少年指導員や青少年育成推進員を対象とした青少年健全育成研修会を実施する。","pdf":"R6kitamoto_sheet.pdf"},{"no":795,"name":"青少年指導委員巡回指導・連絡調整会議運営事業","dept":"生涯学習課","bureau":"教育部","budget":274,"next_budget":0,"root":"裁量","cls":"10 子どもの成長を支えるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"要綱","law":"北本市青少年指導委員設置要綱","gai":"検討する余地がある","desc":"青少年の非行防止及び健全育成を図るため、毎月第1・3木曜日 "1_大幅な見直しは必要ない","legal":"法令","law":"社会教育法、地方教育行政の組織及び運営に関する法律","gai":"検討の必要性が低い","desc":"住民のために、実際生活に即する教育、学術及び文化に関する各種の事業を行う。その実施により住民の教養の向上、健康の増進、情操の純化を図り、また生活文化の振興、社会福祉の増進に寄与する。\n地区公民館等の管理運営を指定管理者に委託する。指定管理者から提出される月次報告等を通じて、管理・運営状況を把握するとともに、適時モニタリングを実施し、改善等を求める。定期的に指定管理料の支払を行う。庁内検査委員会および評価委員会への報告書類の作成並びにヒアリングに出席する。指定管理者業務に対する苦情・要望を受け、改善について指定管理者とともに対処する。","pdf":"R6kitamoto_sheet.pdf"},{"no":807,"name":"人権教育推進委員会運営事業","dept":"生涯学習課","bureau":"教育部","budget":33,"next_budget":971,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"北本市の人権教育・啓発事業の充実を図る。\n北本市人権教育推進委員会において、北本市の人権教育・啓発事業について検討し、北本市の人権教育の推進を図る。","pdf":"R6kitamoto_sheet.pdf"},{"no":809,"name":"人権文集発行事業","dept":"生涯学習課","bureau":"教育部","budget":239,"next_budget":3,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"市内の小・中学校の全児童生徒の人権意識の高揚、啓発を図り、人権問題や差別問題に正しく対処できるよう育成する。市内の小・中学校の人権作文の中から選ばれた作品を掲載した人権文集『じんけん』を発行し、市内小・中学校の全児童生徒に配布する。","pdf":"R6kitamoto_sheet.pdf"},{"no":811,"name":"人権啓発資料作成事業","dept":"生涯学習課","bureau":"教育部","budget":689,"next_budget":914,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討する余地がある","desc":"同和問題を始めとした様々な人権問題について正しい理解を促進し、安心して暮らせるまちづくりを目指す。人権啓発資料『ふれあい』、北本市人権教育推進委員会広報『けやき』について、検討委員会で内容や装丁を検討した上で発行し、市内全家庭に配布する。","pdf":"R6kitamoto_sheet.pdf"},{"no":813,"name":"社会人権教育推進事業","dept":"生涯学習課","bureau":"教育部","budget":286,"next_budget":3,"root":"裁量","cls":"30 みんなが参加し育てるまち","ev":"B_現状のまま継続","ev_detail":"1_大幅な見直しは必要ない","legal":"","law":"","gai":"検討の必要性が低い","desc":"市民一人一人が人権問題を正しく認識し、その解決に向け努力ができるよう、市民や教員の人権意識の高揚、啓発を図る。地域や職場における人権教育推進者を育成するために、講師を招聘して、４日の生涯学習人権講座研修会を行う。また、地域の市民を対象に公民館等の施設を使って、生涯学習公民館等人権教育研修会を行う。さらに、ＰＴＡの人権意識の啓発のために、小・中学校ＰＴＡにおける人権教育研修を行う。北本市立堀の内集会所を会場に、石戸小学校全児童・西中学校全生徒を対象とした蒲桜子ども会、成人・高齢者を対象とした成人・長寿学級を開催し、人権意識の高揚、啓発を図っている。","pdf":"R6kitamoto_sheet.pdf"},{"no":815,"name":"堀の内集会所運営委 function fmt(y){
  if(y>=100000) return (y/100000).toFixed(1)+'億円';
  if(y>=1000)   return (y/1000).toFixed(1)+'百万円';
  return y+'千円';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rootCls(r){ return 'troot-'+r.split('/').join('-'); }

const state = {
  ratings: JSON.parse(localStorage.getItem('kitamoto6_ratings')||'{}'),
  filters: {bureau:'',root:'',cls:'',ev:'',gai:'',pdf:'',rating:''},
  screen: 'filter',
  queue: [],
  pos: 0,
};
function save(){ localStorage.setItem('kitamoto6_ratings', JSON.stringify(state.ratings)); }

function getFiltered(){
  return EVENTS.filter(e=>{
    if(state.filters.bureau && e.bureau!==state.filters.bureau) return false;
    if(state.filters.root   && e.root!==state.filters.root)     return false;
    if(state.filters.cls    && e.cls!==state.filters.cls)       return false;
    if(state.filters.ev     && e.ev!==state.filters.ev)         return false;
    if(state.filters.gai    && e.gai!==state.filters.gai)       return false;
    if(state.filters.pdf    && e.pdf!==state.filters.pdf)       return false;
    if(state.filters.rating==='未評価' && state.ratings[e.no]) return false;
    if(state.filters.rating && state.filters.rating!=='未評価' && state.ratings[e.no]!==state.filters.rating) return false;
    return true;
  });
}

function stats(evts){
  const k=evts.filter(e=>state.ratings[e.no]==='続行');
  const h=evts.filter(e=>state.ratings[e.no]==='廃止');
  const f=evts.filter(e=>state.ratings[e.no]==='見直し');
  const u=evts.filter(e=>!state.ratings[e.no]);
  const sum=a=>a.reduce((s,e)=>s+e.budget,0);
  return {k:{c:k.length,b:sum(k)},h:{c:h.length,b:sum(h)},f:{c:f.length,b:sum(f)},u:{c:u.length,b:sum(u)},
          total:{c:evts.length,b:sum(evts)}};
}

function setFilter(k,v){ state.filters[k]=v; if(state.screen==='filter') renderFilter(); }
function clearFilters(){ state.filters={bureau:'',root:'',cls:'',ev:'',gai:'',pdf:'',rating:''}; renderFilter(); }

function batchRate(r){
  getFiltered().forEach(e=>{ state.ratings[e.no]=r; });
  save(); renderFilter();
}

function startCards(){
  state.queue = getFiltered().map(e=>e.no);
  if(!state.queue.length){ alert('対象事業がありません'); return; }
  const first = state.queue.findIndex(n=>!state.ratings[n]);
  state.pos = first>=0 ? first : 0;
  state.screen='card'; render();
}

function rateCard(r){
  const no=state.queue[state.pos];
  if(!no) return;
  state.ratings[no]=r; save();
  if(state.pos < state.queue.length-1){ state.pos++; renderCard(); }
  else { renderCard(); }
}
function prevCard(){ if(state.pos>0){ state.pos--; renderCard(); } }
function nextCard(){ if(state.pos<state.queue.length-1){ state.pos++; renderCard(); } }
function showFilter(){ state.screen='filter'; render(); }
function showSummary(){ state.screen='summary'; render(); }
function resetAll(){ if(confirm('全評価をリセットしますか？')) { state.ratings={}; save(); render(); } }

function opts(key){ return [...new Set(EVENTS.map(e=>e[key]))].filter(Boolean).sort(); }
function selHtml(fkey,label,val){
  const os=opts(fkey).map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`).join('');
  return `<select title="${label}" onchange="setFilter('${fkey}',this.value)"><option value="">全ての${label}</option>${os}</select>`;
}

function rcls(no){ const r=state.ratings[no]; return r==='続行'?'rk':r==='廃止'?'rh':r==='見直し'?'rf':''; }
function rBtnCls(no,r){ const c=state.ratings[no]===r; return c?(r==='続行'?'ak':r==='廃止'?'ah':'af'):''; }
function rBtnDesc(no,r){
  const d={'続行':'活動内容と予算に納得','廃止':'活動内容に納得できない','見直し':'予算に納得できない'};
  return state.ratings[no]===r ? '◀ 選択中' : d[r];
}

// ============================================================
// Screen: フィルター
// ============================================================
function renderFilter(){
  const filtered=getFiltered();
  const st=stats(EVENTS), fs=stats(filtered);
  const hasFilter=Object.values(state.filters).some(Boolean);

  document.getElementById('app').innerHTML=`
<div class="hd">
  <h1>🏛 ${LABELS.tool_title}</h1>
  <div class="sub">令和6年度 事務事業評価 ${EVENTS.length}事業 ／ 総予算 ${fmt(st.total.b)}（R6決算 事業費・職員人件費除く）</div>
  <div style="font-size:.75rem;color:#9ca3af;margin-top:4px">出典：<a href="https://www.city.kitamoto.lg.jp/soshiki/seisakusuisinbu/seisakusuisin/gyomu/hyouka/r6jimujigyouhyouka/18439.html" target="_blank" style="color:#9ca3af">令和6年度事務事業評価シート｜北本市ホームページ</a></div>
</div>

<div class="sbar">
  <span class="sb sb-k">続行 ${st.k.c}件</span>
  <span class="sb sb-h">廃止 ${st.h.c}件・${fmt(st.h.b)}</span>
  <span class="sb sb-f">見直し ${st.f.c}件・${fmt(st.f.b)}</span>
  <span class="sb sb-u">未評価 ${st.u.c}件</span>
  ${st.k.c+st.h.c+st.f.c>0?`<button class="btn btn-sm btn-o" onclick="resetAll()" style="margin-left:auto">↺ リセット</button>`:''}
</div>

<div class="card">
  <div style="font-size:.85rem;font-weight:600;color:#374151;margin-bottom:8px">絞り込み</div>
  <div class="frow">
    ${selHtml('pdf',LABELS.pdf_col,state.filters.pdf)}
    ${selHtml('bureau',LABELS.bureau,state.filters.bureau)}
    ${selHtml('root','法的根拠',state.filters.root)}
    ${selHtml('cls',LABELS.cls,state.filters.cls)}
    ${selHtml('ev','市の評価',state.filters.ev)}
    ${selHtml('gai','外部委託',state.filters.gai)}
    <select title="評価結果" onchange="setFilter('rating',this.value)">
      <option value="">全ての評価結果</option>
      <option value="続行"${state.filters.rating==='続行'?' selected':''}>続行</option>
      <option value="廃止"${state.filters.rating==='廃止'?' selected':''}>廃止</option>
      <option value="見直し"${state.filters.rating==='見直し'?' selected':''}>見直し</option>
      <option value="未評価"${state.filters.rating==='未評価'?' selected':''}>未評価</option>

<div class="batch">
  <h3>一斉評価 — 上の絞り込み結果（${filtered.length}件）を一括設定</h3>
  <div class="bbtns">
    <button class="btn btn-k" onclick="batchRate('続行')">✓ 全部 続行</button>

<div style="display:flex;gap:10px;flex-wrap:wrap">

// ============================================================
// Screen: カード評価
// ============================================================
function renderCard(){
  const total=state.queue.length;
  const no=state.queue[state.pos];
  const ev=EVENTS.find(e=>e.no===no);
  if(!ev){ showFilter(); return; }

  const done=state.queue.filter(n=>state.ratings[n]).length;
  const pct=total>0?Math.round(done/total*100):0;
  const st=stats(EVENTS);
  const isLast=state.pos===total-1;
  const allDone=state.queue.every(n=>state.ratings[n]);

  document.getElementById('app').innerHTML=`
<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f3f4f6;overflow:hidden;z-index:10">
<div style="max-width:780px;margin:0 auto;height:100%;display:flex;flex-direction:column;padding:12px">

  <div style="flex-shrink:0">
    <div class="nstrip">
      <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:.75rem;font-weight:700;color:#1e40af">${LABELS.card_title}</div>
        <div class="sbar" style="margin:4px 0 0;justify-content:center">
          <span class="sb sb-k">続行 ${st.k.c}件</span>
          <span class="sb sb-h">廃止 ${st.h.c}件</span>
          <span class="sb sb-f">見直し ${st.f.c}件</span>
          <span class="sb sb-u">未評価 ${st.u.c}件</span>
        </div>
      </div>
      <button class="btn btn-sm btn-p" onclick="showSummary()">サマリー →</button>
    </div>
    <div style="font-size:.82rem;color:#6b7280;margin-bottom:6px">評価済み: ${done}/${total}件 (${pct}%)</div>
    <div class="pbwrap"><div class="pbfill" style="width:${pct}%"></div></div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:4px 0 8px">
    ${allDone?`<div class="done-msg"><h3>✓ この絞り込み結果（${total}件）の評価が完了しました</h3><button class="btn btn-p" onclick="showSummary()">集計サマリーを見る →</button></div>`:''}
    <div class="ecard ${rcls(no)}">
      <div class="tag-row">
        <div class="tag-item">
          <div class="tag-lbl">法的根拠</div>
          <span class="tag ${esc(rootCls(ev.root))}">${esc(ev.root)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">政策</div>
          <span class="tag tcls">${esc(ev.cls)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">行政の評価方針</div>
          <span class="tag tev">${esc(ev.ev)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">${LABELS.pdf_col}</div>
          <span class="tag tpdf">${esc(ev.pdf)}</span>
        </div>
      </div>
      <div class="emeta"><span class="field-lbl">${LABELS.no_col}：</span>${esc(String(ev.no))}　<span class="field-lbl">所管：</span>${esc(ev.bureau)} ／ ${esc(ev.dept)}</div>
      <div class="ename">${esc(ev.name)}</div>
      <div class="ebudget">
        <div><span class="bdg-lbl">当年度予算（R6決算）：</span><span class="amt">${fmt(ev.budget)}</span></div>
        ${ev.next_budget>0?`<div><span class="bdg-lbl">次年度予算（R7当初）：</span><span class="amt">${fmt(ev.next_budget)}</span></div>`:''}
        <div style="font-size:.72rem;color:#9ca3af;margin-top:3px">※ 事業費のみ（職員人件費除く）</div>
      </div>
      ${ev.desc?`<div class="edesc"><h4>事業概要</h4><p>${esc(ev.desc)}</p></div>`:''}
      <div class="edetail">
        ${ev.root==='法定義務あり'?`<div class="edi"><label>法的根拠の詳細：</label>${esc(ev.legal)}${ev.law?' — '+esc(ev.law):''}</div>`:''}
        ${ev.gai?`<div class="edi"><label>外部委託の可能性：</label>${esc(ev.gai)}</div>`:''}
        ${ev.ev_detail?`<div class="edi"><label>評価詳細：</label>${esc(ev.ev_detail)}</div>`:''}
      </div>
      <a href="${LABELS.source_url}" target="_blank" class="btn btn-o" style="display:block;text-align:center;text-decoration:none;margin-bottom:8px">📄 評価シートを確認</a>

      <button class="btn btn-sm btn-o" onclick="nextCard()" ${isLast?'disabled':''}>次へ ▶</button>
    </div>

// ============================================================
// Screen: サマリー
// ============================================================
function renderSummary(){
  const st=stats(EVENTS);
  const zokkoList  =EVENTS.filter(e=>state.ratings[e.no]==='続行');
  const haishiList =EVENTS.filter(e=>state.ratings[e.no]==='廃止');
  const minaoshiList=EVENTS.filter(e=>state.ratings[e.no]==='見直し');
  const mirateList =EVENTS.filter(e=>!state.ratings[e.no]);

  function tblRows(list){
    if(!list.length) return '<tr><td colspan="6" style="color:#9ca3af;text-align:center;padding:12px">（なし）</td></tr>';
    return list.map(e=>`<tr>
      <td style="white-space:nowrap">${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td style="white-space:nowrap">${esc(e.bureau)}</td>
      <td><span class="tag ${esc(rootCls(e.root))}" style="font-size:.68rem">${esc(e.root)}</span></td>
      <td><span class="tag tev" style="font-size:.68rem">${esc(e.ev)}</span></td>
      <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(e.budget)}</td>
    </tr>`).join('');
  }
  const thead=`<thead><tr><th>${LABELS.no_col}</th><th>事業名</th><th>${LABELS.bureau}</th><th>根拠</th><th>行政評価</th><th>予算</th></tr></thead>`;

  document.getElementById('app').innerHTML=`

  <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
  <h2>${LABELS.summary_title}</h2>
  <button class="btn btn-sm btn-p no-print" onclick="startCards()">評価を続ける</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:flex-end" class="no-print">
  <button class="btn btn-sm btn-o" onclick="downloadCsv()">📥 CSV出力</button>
  <button class="btn btn-sm btn-o" onclick="window.print()">🖨 印刷</button>
</div>

<p style="font-size:.82rem;color:#6b7280;margin-bottom:12px">
  続行 ${st.k.c}件 ｜ 廃止 ${st.h.c}件 ｜ 見直し ${st.f.c}件 ｜ 未評価 ${st.u.c}件（合計${EVENTS.length}件）
</p>

<div class="kgrid">
  <div class="kbox kk">
    <div class="klbl">✓ 続行</div>
    <div class="knum">${st.k.c}件</div>
    <div class="kbdg">${fmt(st.k.b)}</div>
  </div>
  <div class="kbox kh">
    <div class="klbl">✕ 廃止</div>
    <div class="knum">${st.h.c}件</div>
    <div class="kbdg">${fmt(st.h.b)}</div>
  </div>
  <div class="kbox kf">
    <div class="klbl">△ 見直し</div>
    <div class="knum">${st.f.c}件</div>
    <div class="kbdg">${fmt(st.f.b)}</div>
  </div>
  <div class="kbox ku">
    <div class="klbl">— 未評価</div>
    <div class="knum">${st.u.c}件</div>
    <div class="kbdg">${fmt(st.u.b)}</div>
  </div>
</div>

<details class="ssec" ${st.k.c?'open':''}>
  <summary>✓ 続行一覧 <span style="color:#059669">${st.k.c}件・${fmt(st.k.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(zokkoList)}</tbody></table></div>
</details>

<details class="ssec" ${st.h.c?'open':''}>
  <summary>✕ 廃止一覧 <span style="color:#dc2626">${st.h.c}件・${fmt(st.h.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(haishiList)}</tbody></table></div>
</details>

<details class="ssec" ${st.f.c?'open':''}>
  <summary>△ 見直し一覧 <span style="color:#d97706">${st.f.c}件・${fmt(st.f.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(minaoshiList)}</tbody></table></div>
</details>

<details class="ssec">
  <summary>— 未評価一覧 <span style="color:#6b7280">${st.u.c}件・${fmt(st.u.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(mirateList)}</tbody></table></div>
</details>

<p class="note">
  ※ 評価結果はこのブラウザのローカルストレージに保存されます（ページを閉じても残ります）。<br>
  ※ 予算額はR6決算 事業費（直接経費のみ・職員人件費は含まない）です。<br>
  ※ 法定義務あり事業は市単独では廃止できません。削減額はあくまで参考値です。<br>
  出典：<a href="https://www.city.kitamoto.lg.jp/soshiki/seisakusuisinbu/seisakusuisin/gyomu/hyouka/r6jimujigyouhyouka/18439.html" target="_blank">令和6年度事務事業評価シート｜北本市ホームページ</a>
</p>`;
}

// CSV出力
function downloadCsv(){
  const BOM = '\uFEFF';
  const header = [LABELS.no_col,'事業名',LABELS.bureau,LABELS.dept,'法的根拠',LABELS.cls,'市の評価',LABELS.pdf_col,LABELS.budget_col,LABELS.next_col,'評価結果'];
  const rows = EVENTS.map(e=>[
    e.no, e.name, e.bureau, e.dept, e.root, e.cls, e.ev, e.pdf, e.budget, e.next_budget,
    state.ratings[e.no]||'未評価'
  ]);
  const csv = BOM+[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = LABELS.csv_filename;
  a.click();
}

function render(){
  if(state.screen==='filter') renderFilter();
  else if(state.screen==='card') renderCard();
  else if(state.screen==='summary') renderSummary();
}
render();

</script>
