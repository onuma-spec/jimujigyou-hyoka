<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>品川区 事務事業優先度評価ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.8;margin-top:3px}
.card-nav{display:flex;justify-content:space-between;align-items:center;gap:6px}
.cnav-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:1;min-width:0;max-width:42%}
.cnav-btn:hover{background:rgba(255,255,255,.25)}
.cnav-mid{font-size:.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;padding:0 4px}
.cnav-mid-wrap{font-size:.85rem;flex:1;min-width:0;text-align:center;padding:0 4px;line-height:1.4}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:6px 12px;font-size:.8rem}
.btn-full{width:100%;margin-bottom:8px}

.bbtns{display:flex;gap:8px;flex-wrap:wrap}

/* マップ画面 */
.filterrow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.stbtn{padding:7px 14px;border:1px solid #d1d5db;border-radius:20px;background:#fff;color:#374151;font-size:.82rem;font-weight:600;cursor:pointer}
.stbtn.active{background:#1e40af;color:#fff;border-color:#1e40af}
.maphint{font-size:.82rem;color:#6b7280;line-height:1.6}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:8px}

.clsgrid-wrap{border:1px solid #eef0f2;border-radius:6px;padding:8px;max-height:35vh;overflow-y:auto}
.clsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.clsbox{background:#fff;border:1px solid #eef0f2;border-radius:6px;padding:7px 10px;cursor:pointer;transition:background .15s;min-width:0}
.clsbox:hover{background:#f7f9fc}
.clstop{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px}
.clsname{font-weight:700;font-size:.85rem;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.clsamt{font-size:.76rem;color:#374151;white-space:nowrap;flex-shrink:0}
.clsamt b{color:#1e40af}
.clsbar-wrap{background:#eef2f7;border-radius:3px;height:5px;margin-bottom:4px;overflow:hidden}
.clsbar{background:#1e40af;height:100%;border-radius:3px}
.clsmeta{font-size:.7rem;color:#9ca3af}

/* cls drilldown：行政評価（ev）でグルーピング。事業一覧は表形式（法定義務・提供形態を列見出しで明示） */
.evsec{border:1px solid #eef0f2;border-radius:6px;margin-bottom:8px;overflow:hidden}
.evsec:last-child{margin-bottom:0}
.evsec summary{padding:9px 12px;cursor:pointer;font-weight:700;font-size:.85rem;color:#374151;background:#f8f9fb;list-style:none;user-select:none}
.evsec summary::-webkit-details-marker{display:none}
.evsec summary::before{content:'▶ ';font-size:.7rem;color:#9ca3af}
.evsec[open] summary::before{content:'▼ '}
.evsec-body{padding:6px 12px 2px}
.evtbl-wrap{overflow:auto;max-height:320px;border:1px solid #eef0f2;border-radius:6px}
.evtbl{border-collapse:collapse;font-size:.82rem}
.evtbl th{text-align:left;font-weight:600;color:#6b7280;font-size:.7rem;padding:4px 8px;border-bottom:1px solid #e5e7eb;white-space:nowrap;position:sticky;top:0;background:#fff;z-index:1}
.evtbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:normal;word-break:break-word}
.evtbl tr:last-child td{border-bottom:none}
.evtd-chk{width:28px}
.evtd-chk input{width:16px;height:16px}
.evtd-name{font-weight:600;color:#111827;cursor:pointer;width:110px;min-width:110px;max-width:110px}
.evtd-budget{color:#374151;width:65px}
.evtd-root{width:38px}
.evtd-ptype{width:80px}
.evtd-mine{width:80px}
.evtd-vote{width:70px}
.evtbl td.evtd-budget,.evtbl td.evtd-root,.evtbl td.evtd-ptype{white-space:nowrap}
.vote-stack{display:flex;flex-direction:column;gap:2px;align-items:flex-start}

/* サマリー画面：評価結果一覧（ブラウザ表示用の圧縮テーブル。列を減らしセル内で折り返す） */
.votetbl-wrap{overflow:auto;max-height:420px;border:1px solid #eef0f2;border-radius:6px}
.votetbl{width:100%;border-collapse:collapse;font-size:.82rem}
.votetbl th{text-align:left;font-weight:600;color:#6b7280;font-size:.7rem;padding:6px 8px;border-bottom:1px solid #e5e7eb;position:sticky;top:0;background:#fff;z-index:1}
.votetbl td{padding:8px;border-bottom:1px solid #f3f4f6;vertical-align:top;white-space:normal}
.votetbl tr:last-child td{border-bottom:none}
.votetbl .vsub{font-size:.72rem;color:#6b7280;margin-top:2px}
.votetbl .vno{font-size:.7rem;color:#9ca3af}
.vtag-stack{display:flex;flex-direction:column;gap:3px;align-items:flex-start}

/* サマリー画面：印刷専用の完全版（10列）テーブル。画面には出さず@media printでのみ表示 */
.votetbl-print{display:none}

/* タグ */
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
.troot-法定義務あり{background:#dbeafe;color:#1d4ed8}
.troot-法定義務なし{background:#fef3c7;color:#92400e}
.troot-判断できない{background:#f3f4f6;color:#6b7280}
.troot-データなし{background:#f3f4f6;color:#9ca3af}
.tev-拡大{background:#dcfce7;color:#15803d}
.tev-現状継続{background:#dbeafe;color:#1d4ed8}
.tev-改善（手段変更）{background:#fef3c7;color:#92400e}
.tev-縮小{background:#ffedd5;color:#c2410c}
.tev-廃止方向{background:#fee2e2;color:#dc2626}
.tev-完了{background:#f3e8ff;color:#7c3aed}
.tev-続行{background:#dcfce7;color:#15803d}
.tev-廃止{background:#fee2e2;color:#dc2626}
.tev-見直し{background:#fef3c7;color:#92400e}
.tptype-green{background:#ccfbf1;color:#0f766e}
.tptype-blue{background:#dbeafe;color:#1d4ed8}
.tptype-gray{background:#f3f4f6;color:#6b7280}
.tptype-amber{background:#fef3c7;color:#92400e}
.tptype-purple{background:#ede9fe;color:#6d28d9}

/* 評価カード（opt-inキュー） */
.pbwrap{background:#e5e7eb;border-radius:4px;height:6px;margin-bottom:12px}
.pbfill{background:#1e40af;height:100%;border-radius:4px;transition:width .3s}
.ecard{background:#fff;border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #e5e7eb}
.ecard.rk{border-left-color:#22c55e}
.ecard.rh{border-left-color:#ef4444}
.ecard.rf{border-left-color:#f59e0b}
.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}
.ename{font-size:1.15rem;font-weight:700;color:#111827;margin-bottom:4px;line-height:1.3}
.ebudget{font-size:.85rem;margin-bottom:12px;color:#374151}
.ebudget .amt{font-weight:700;font-size:1rem;color:#1e40af}
.story{margin-bottom:14px}
.story p{font-size:.9rem;line-height:1.75;color:#1f2937;margin-bottom:6px}
.story-label{font-size:.72rem;font-weight:700;color:#6b7280;margin-bottom:3px;letter-spacing:.03em}
.ai-note{font-size:.75rem;color:#713f12;line-height:1.65;margin-bottom:8px;background:#fef9c3;border:1px solid #fde047;border-radius:6px;padding:8px 10px}
.sticky-actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #e5e7eb;z-index:100;box-shadow:0 -4px 12px rgba(0,0,0,.08)}
.sticky-inner{max-width:780px;margin:0 auto;padding:10px 12px}
.sticky-spacer{height:110px}
.sticky-spacer.tall{height:230px}
.rbtns{display:flex;gap:10px;margin:16px 0}
.rbtn{flex:1;padding:12px 6px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:#f9fafb;color:#374151;text-align:center;transition:all .15s;line-height:1.4}
.rbtn:hover{border-color:#9ca3af}
.rbtn small{display:block;font-size:.7rem;font-weight:400;margin-top:2px;opacity:.8}
.rbtn.ak{background:#22c55e;color:#fff;border-color:#22c55e}
.rbtn.ah{background:#ef4444;color:#fff;border-color:#ef4444}
.rbtn.af{background:#f59e0b;color:#fff;border-color:#f59e0b}
.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

/* サマリー */
.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kbox .klbl{font-size:.75rem;color:#6b7280;margin-bottom:6px}
.kbox .knum{font-size:1.7rem;font-weight:700}
.kh .knum{color:#dc2626}
.kf .knum{color:#d97706}
.kk .knum{color:#059669}
.ku .knum{color:#6b7280}

.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:8px 10px;text-align:left;font-weight:600;border-bottom:1px solid #e5e7eb}
.stbl td{padding:7px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.stbl tr:last-child td{border-bottom:none}
.stbl-wrap{overflow-x:auto}

.pc{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.75rem;font-weight:600;margin-right:2px;white-space:nowrap}
.pc-k{background:#dcfce7;color:#16a34a}
.pc-h{background:#fee2e2;color:#dc2626}
.pc-f{background:#fef3c7;color:#d97706}

@media(max-width:480px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .rbtns{flex-direction:column}
}

@media print{
  .no-print{display:none !important}
  body{background:#fff}
  .card{box-shadow:none;border:1px solid #e5e7eb}
  .votetbl-wrap{display:none}
  .votetbl-print{display:block}
  .evtbl-wrap{max-height:none;overflow:visible;border:none}
  .evtbl td, .evtbl th{white-space:normal}
  @page{size:landscape}
}
</style>
</head>

<script>

const EVENTS = [{"no":"1","name":"全庁共通プロジェクト推進経費","bureau":"企画経営部","dept":"企画経営部　企画課","budget":90700,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"全庁に関わるプロジェクトを円滑に進めるため、現在活用方針が定まっていない公有地について、民間活力の導入なども含めた多角的な利活用方法を検討しています。","story_p2":"旧荏原第四中学校跡地について、ワークショップや庁内検討会を実施して区民ニーズを把握し、整備基本計画をまとめるとともに、初となるPFI事業実施の方向性を整理しました。その他の公有地活用方針決定については、実績値が報告されていません。","story_impact":"判断できない","pdf_page":1,"cls":"変化に対応して効果的・効率的に施策を展開する"},{"no":"2","name":"企画関係事務費","bureau":"企画経営部","dept":"企画経営部　企画課","budget":33637,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"企画事務を円滑に進めるため、事務用品や出張旅費、資料購入費、複合機印刷経費、通信料などの必要経費を支出しています。","story_p2":"行財政情報サービス通信費や複合機印刷経費などの支払い事務を実施しています。複合機印刷経費については毎年部数等の見直しを行い、縮減傾向にあります。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":2,"cls":"変化に対応して効果的・効率的に施策を展開する"},{"no":"3","name":"計画策定経費","bureau":"企画経営部","dept":"企画経営部　企画課","budget":62273,"root":"データなし","ev":"改善（手段変更）","ptype":"10","story_p1":"持続的な発展に向けて総合計画を策定・改定し、行政評価を通じた不断の見直しを行うことで、より効率的で効果的な行政運営につなげています。","story_p2":"総合実施計画と総合戦略を改定し、ウェルビーイング指標を新たに設定しました。全小事業を対象とした事務事業評価により財源を捻出し、ウェルビーイング向上につながる新たな施策への予算配分につなげました。","story_impact":"判断できない","pdf_page":3,"cls":"変化に対応して効果的・効率的に施策を展開する"},{"no":"4","name":"ＳＤＧｓ推進経費","bureau":"企画経営部","dept":"企画経営部　企画課","budget":141925,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"ＳＤＧｓ未来都市として、企業や団体、大学など多様な主体との連携を通じ、地域の課題解決と持続可能な発展を実現するために、プラットフォームの構築や助成事業、職員研修などを総合的に推進しています。","story_p2":"内閣府からSDGs未来都市に選定され、未来都市計画を策定しました。共創プラットフォームの設置や民間提案の募集、企業・団体への助成、職員向けワークショップなど、SDGs推進に向けた多様な取組を実施しています。","story_impact":"判断できない","pdf_page":4,"cls":"変化に対応して効果的・効率的に施策を展開する"},{"no":"5","name":"指定管理者制度経費","bureau":"企画経営部","dept":"企画経営部　企画課","budget":21513,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"民間事業者が管理する公共施設について、利用者アンケートや労働環境チェックを実施することで、質の高いサービス提供と安全で適正な管理体制を確保しています。","story_p2":"15施設・12事業者を対象に利用者満足度調査と労働環境チェックを実施しました。満足度調査では10事業者が優良、2事業者が妥当と評価され、労働環境チェックではすべての事業者が基準以上の点数を獲得しています。","story_impact":"判断できない","pdf_page":5,"cls":"中長期的な視点で施設マネジメントを推進する"},{"no":"6","name":"基金積立金","bureau":"企画経営部","dept":"企画経営部　財政課","budget":11397,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"将来の不測の事態に備え、5つの基金を積み立てています。税収の変動に対応する財政調整基金、借金返済のための減債基金、施設整備や文化スポーツ振興、災害復旧に充当する各基金を着実に積み増すことで、安定した行政運営を実現しています。","story_p2":"国債等運用利子と一般財源を積み立て、財政調整基金、減債基金、公共施設整備基金、文化スポーツ振興基金、災害復旧基金の5つの基金を確保しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":6,"cls":"健全財政を堅持する"},{"no":"7","name":"予算関係管理費","bureau":"企画経営部","dept":"企画経営部　財政課","budget":81718,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"予算の編成や配当、執行の調整を円滑に行うために、年間予算の編成や補正予算の作成、予算書などの印刷・提出、財政担当者会議への参加などを行っています。","story_p2":"当初予算書と補正予算書、主要施策の成果報告書の印刷及び図書購入を実施しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":7,"cls":"データなし"},{"no":"8","name":"起債償還元金","bureau":"企画経営部","dept":"企画経営部　財政課","budget":9117,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"学校施設の建設や道路整備などの公共事業を実施するために借り入れた資金について、その元金を計画的に返済しています。","story_p2":"学校教育施設等整備事業により新規に借入れを行った一方で、過去の事業債については計画的に償還を進め、目標とした償還元金額を達成しました。","story_impact":"判断できない","pdf_page":8,"cls":"健全財政を堅持する"},{"no":"9","name":"起債利子","bureau":"企画経営部","dept":"企画経営部　財政課","budget":2279,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"以前に借り入れた資金の利子を償還するために、毎年発生する借入金の利息を支払っています。","story_p2":"過去に借入れた事業債に対する利子を計画的に支出し、償還利子額が目標と一致する実績を上げました。","story_impact":"判断できない","pdf_page":9,"cls":"健全財政を堅持する"},{"no":"10","name":"営繕事務費","bureau":"企画経営部","dept":"企画経営部　施設整備課","budget":363503,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"公共施設の改修工事を効率的かつ安定的に進めるため、設計や工事監理などの業務を年間を通じて一括委託し、統一的な管理体制で営繕業務を推進しています。","story_p2":"区有施設の小規模改修工事に係る設計・監理等の業務を年間委託し、営繕業務の統一的な管理による効率化・安定化を図りました。小規模改修工事に係る設計・監理等の実施割合については、年間業務委託における予定件数のうち実施状況を指標として設定しています。","story_impact":"判断できない","pdf_page":10,"cls":"中長期的な視点で施設マネジメントを推進する"},{"no":"11","name":"区施設創エネ設備整備推進費","bureau":"企画経営部","dept":"企画経営部　施設整備課","budget":10513,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"地球環境にやさしい施設づくりを通じてゼロカーボンシティの実現を目指すために、既存の公有建築物に太陽光発電設備を計画的に設置しています。","story_p2":"既存12施設への太陽光発電設備と蓄電池の計画的な導入を進めており、現在までに4件の実施設計 で公正な契約の締結と履行管理を行っています。","story_p2":"制限付き一般競争入札242件と指名競争入札778件を実施し、区内中小企業者の受注機会確保に努めました。予定価格に応じた総合評価方式や最低制限価格制度の活用により、公共工事の品質確保とダンピング受注排除を図るとともに、公契約条例を制定しました。","story_impact":"判断できない","pdf_page":16,"cls":"健全財政を堅持する"},{"no":"17","name":"公有財産管理費","bureau":"企画経営部","dept":"企画経営部　経理課","budget":322378,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"公有財産を適切に管理・運用するために、財産台帳の整備、貸付契約事務、財産価格の評定、土地先買い制度の手続きなどを行っています。","story_p2":"公有財産台帳の整備、財産価格審議会の年4回開催、土地先買い制度の届出受付などの活動を実施しました。普通財産の賃貸料収入と用途廃止土地の売却実績により、公有財産の適切な管理と活用を図っています。","story_impact":"判断できない","pdf_page":17,"cls":"中長期的な視点で施設マネジメントを推進する"},{"no":"18","name":"賦課事務費","bureau":"企画経営部","dept":"企画経営部　税務課","budget":784669,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"区政の根幹となる自主財源を確保するために、特別区民税や軽自動車税などの適正な課税と徴収を行っています。","story_p2":"課税資料の取り込みや無申告者への催告、扶養控除の調査など、多角的な賦課事務を実施しました。納税義務者数は目標276,500人に対し276,199人となり、ほぼ目標を達成しています。","story_impact":"判断できない","pdf_page":18,"cls":"健全財政を堅持する"},{"no":"19","name":"徴収事務費","bureau":"企画経営部","dept":"企画経営部　税務課","budget":439990,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"安定した行政財源を確保するために、口座振替やクレジット納付などの納付方法を増やし、滞納を防ぐ環境づくりに取り組んでいます。","story_p2":"毎年度徴収基本方針を策定し職員に周知・徹底するとともに、厳格な滞納整理に取り組んだ結果、特別区民税収納率は目標の97.05%を上回る99.19%を達成し、3年連続で23区中1位となりました。キャッシュレス決済の導入や電子システムの活用により、納付環境の充実と業務効率化も進めています。","story_impact":"判断できない","pdf_page":19,"cls":"健全財政を堅持する"},{"no":"20","name":"税務関係事務費","bureau":"企画経営部","dept":"企画経営部　税務課","budget":93173,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"税収を確保し、住民の皆様が安心して暮らせる行政サービスを提供するため、納税意識の高揚や期限内納付の推進、ふるさと納税返礼品の拡充に取り組んでいます。","story_p2":"納税功労者表彰や啓発イベント、駅での横断幕掲出など、複数の施策を展開して納税啓発活動を推進しました。ふるさと納税については返礼品の充実とポータルサイトの拡充、SNS活用により、制度の認知度向上と区民理解促進を図りました。","story_impact":"判断できない","pdf_page":20,"cls":"健全財政を堅持する"},{"no":"21","name":"定額減税補足給付金","bureau":"企画経営部","dept":"企画経営部　税務課","budget":1455274,"root":"データなし","ev":"完了","ptype":"1","story_p1":"賃金上昇が物価高に追い付いていない住民の負担を緩和するため、令和6年6月から所得税・住民税の定額減税を実施し、減税しきれない方には不足額を給付金でお支払いしています。","story_p2":"定額減税の補足給付金について、対象者44,351人のうち37,424人に給付を実施しました。減税しきれない額が生じた方に対する給付対象者への給付実績により、事業目的の達成が図られています。","story_impact":"判断できない","pdf_page":21,"cls":"データなし"},{"no":"22","name":"企業・大学等との連携促進","bureau":"区長室","dept":"区長室　総務課","budget":8406,"root":"データなし","ev":"廃止方向","ptype":"8","story_p1":"企業や大学との協働を通じて地域の活性化と課題解決を進めるため、連携促進協議会の活動支援と事業補助を行っています。","story_p2":"区内企業との意見交換会や社会貢献活動の周知、相談対応を通じて連携を強化し、大学との協働では6大学の地域貢献活動をまとめたリーフレットを作成・配布するとともに、4校に対して地域社会貢献活動支援補助金を交付しました。","story_impact":"判断できない","pdf_page":22,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"23","name":"非核平和都市品川宣言事業","bureau":"区長室","dept":"区長室　総務課","budget":26518,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"核兵器廃絶と恒久平和の実現を目指し、戦争の悲惨さと平和の大切さを次世代に伝えるため、広島・長崎への派遣事業や平和資料の収集、平和関連施設の保守管理などを行っています。","story_p2":"広島市に中学生15人、長崎市に中学生から29歳までの6人を派遣し、平和学習を実施しました。平和関連施設の管理やパネル展を年8回開催するとともに、非核平和都市宣言40周年記念事業として動画作成や記念式典を開催し、平和啓発活動を推進しました。","story_impact":"判断できない","pdf_page":23,"cls":"平和で人権が尊重され多様性を認め合う社会の実現"},{"no":"24","name":"危機管理経費","bureau":"区長室","dept":"区長室　総務課","budget":26907,"root":"データなし","ev":"縮小","ptype":"9","story_p1":"皆さんの生命と財産を守るため、災害や事故、事件の予防対策を講じるとともに、万が一危機が発生した場合には、行政情報や各種団体との連携を活かして適切に対応しています。","story_p2":"新型インフルエンザ等の流行時に必要な体制整備のため、BCP上必要な消毒液とマスクの備蓄数を維持しながら購入・配布し、24時間危機管理体制の構築に向けて管理職の宿日直を実施しました。","story_impact":"判断できない","pdf_page":24,"cls":"区民を災害から守る対策の推進"},{"no":"25","name":"二十歳の集い式典経費","bureau":"区長室","dept":"区長室　総務課","budget":19375,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"二十歳を迎える住民の社会人としての自覚を促し、輝かしい前途を祝福するために、毎年1月の第2月曜日に式典を実施しています。","story_p2":"民法改正に伴い成人式から二十歳の集いへ名称変更し、実行委員の公募により9月から12月にかけて4回の実行委員会を開催しました。式典への参加者数は目標1,344人に対し実績1,383人と、目標を上回る参加を実現しました。","story_impact":"判断できない","pdf_page":25,"cls":"青少年の成長と自立の支援"},{"no":"26","name":"新年賀詞交歓会経費","bureau":"区長室","dept":"区長室　総務課","budget":9169,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"区内の官公署や関係団体との親睦を深め、新年を祝うために、毎年仕事始めの翌日に交歓会を開催しています。区と関わりの深い団体の構成員などを招待し、相互の連携を図っています。","story_p2":"区長や来賓のあいさつ、邦楽演奏などの式典と懇談会を開催し、参加者に認定の手土産を提供しました。出席者数を成果指標として設定していますが、実績値が記録されていません。","story_impact":"判断できない","pdf_page":26,"cls":"協働によるまちづくりを促進する"},{"no":"27","name":"自治功労者等表彰","bureau":"区長室","dept":"区長室　総務課","budget":20418,"root":"データなし","ev":"現状継続","ptype":"5","story_p1":"品川区の発展に貢献された方々の功績をたたえ、住民の皆様の福祉向上につなげるため、表彰式を開催し、表彰状と記念品を贈呈しています。","story_p2":"毎年4月に表彰候補者の推薦を依頼し、7月中旬の審査会で受賞者を決定、10～11月に表彰式を開催しています。審査は根拠法令や要綱に基づいて実施され、被表彰者に表彰状と記念品を贈呈しています。","story_impact":"判断できない","pdf_page":27,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"28","name":"全国自治体との連携事業","bureau":"区長室","dept":"区長室　総務課官民共創担当","budget":7073,"root":"データなし","ev":"縮小","ptype":"9","story_p1":"人口減少による地方の活性化という課題に対応するため、全国の自治体との信頼関係を構築し、相互に発展・成長できるよう連携を推進しています。連携協定締結団体や災害時相互援助協定団体との協力を通じて、全国規模での取り組みを展開しています。","story_p2":"高知県と福井県坂井市との連携事業により、観光PR動画制作、食育出前授業、特産品の提供・展示など計18事業を実施しました。これらを通じて、両自治体との連携事業数が着実に積み重ねられています。","story_impact":"判断できない","pdf_page":28,"cls":"地方分権・全国連携を推進する"},{"no":"29","name":"地域住民と外国人との交流促進","bureau":"区長室","dept":"区長室　総務課","budget":13581,"root":"データなし","ev":"拡大","ptype":"5","story_p1":"区内に暮らす17,000人以上の外国人と日本人が互いの文化を理解し、共生できる地域づくりのために、大使館との文化交流や多文化共生講座の開催、在住外国人への生活支援を行っています。","story_p2":"外国人住民向けにLINEで週2回、英語とやさしい日本語による生活情報配信を行い、開始から英語793人、やさしい日本語662人の登録を達成しました。また、区民と職員向けの多文化共生講座ややさしい日本語講座の開催、大使館等との連携による文化交流機会の創出を通じて、多文化共生社会の実現に取り組んでいます。","story_impact":"判断できない","pdf_page":29,"cls":"平和で人権が尊重され多様性を認め合う社会の実現"},{"no":"30","name":"国際友好都市交流事業","bureau":"区長室","dept":"区長室　総務課","budget":167669,"root":"データなし","ev":"縮小","ptype":"7","story_p1":"ポートランド市、ジュネーヴ市、オークランド市との姉妹・友好都市交流や地域での国際文化交流を通じて、外国人に開かれた多様な国際都市の実現を図っています。","story_p2":"姉妹・友好都市との交流として、オークランド市から青少年20名を受け入れ、ジュネーヴ市に16名、オークランド市に30名の青少年を派遣するなど、計66名の青少年ホームステイ・語学研修を実施しました。また、外国人向け日本語教室には216名が受講し、国際交流の拡大を図りました。","story_impact":"判断できない","pdf_page":30,"cls":"平和で人権が尊重され多様性を認め合う社会の実現"},{"no":"31","name":"山北町との交流事業","bureau":"区長室","dept":"区長室　総務課官民共創担当","budget":8192,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"水と緑に恵まれた山北町との交流を通じて、区民の皆さんが健全で潤いのある生活を実現するために、昭和63年から交流事業を実施しています。","story_p2":"交流拠点施設「ひだまりの里」の運営管理を行い、貸し農園利用などを通じた交流を展開しています。また、文化団体を派遣してイベントを盛り上げ、観光パンフレット作成により区民の利用 "},{"no":"37","name":"いじめ防止対策推進事業","bureau":"区長室","dept":"区長室　総務課","budget":70952,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"子どもたちがいじめのない安全で楽しい生活を送れるよう、学校・地域・教育委員会が連携していじめの未然防止・早期発見・早期対応に取り組んでいます。また、相談対応の充実と被害者の支援を行っています。","story_p2":"いじめ相談対策室は77件の相談に対応し、電話が57％と最も多く利用されました。また教育委員会との連携強化や被害者支援制度の創設、地域への啓発講座実施など、包括的な対策を進めています。","story_impact":"判断できない","pdf_page":37,"cls":"未来を切り拓く学校教育の推進"},{"no":"38","name":"広報紙発行経費","bureau":"区長室","dept":"区長室　戦略広報課","budget":183120,"root":"データなし","ev":"縮小","ptype":"11","story_p1":"住民が行政情報を分かりやすく入手できるよう、広報紙の発行と多様な配布方法の提供を行っています。視覚障害者向けの音声版や外国語版など、誰もが情報にアクセスしやすい環境を整えています。","story_p2":"広報紙「広報しながわ」は年38回、毎号104,000部を発行し、新聞折込や駅等での配布、個別配送、電子書籍・多言語版など多様な配信手段により、全ての住民に情報を届けています。また、視覚障害者向けの声の広報やHTML版の配信、英語版広報紙の発行など、アクセシビリティに配慮した情報提供を実施しており、区の情報周知に貢献しています。","story_impact":"判断できない","pdf_page":38,"cls":"区民参画と情報発信を推進する"},{"no":"39","name":"区政資料等発行経費","bureau":"区長室","dept":"区長室　戦略広報課","budget":41548,"root":"データなし","ev":"縮小","ptype":"11","story_p1":"住民の皆さんが行政情報を幅広く入手できるよう、ポスターやガイドマップ、区勢情報などの資料を発行しています。また世論調査や航空写真記録により、皆さんの意見を把握し、地域の記録を残しています。","story_p2":"統合ポスターと統合ちらしをおおよそ月1回発行し、公共施設や町会・自治会掲示板を通じて区の行事・催し物を周知しました。また、転入者向けガイドの配布、世論調査の実施、航空写真の撮影・収蔵など、多角的に区の情報発信を行いました。","story_impact":"判断できない","pdf_page":39,"cls":"区民参画と情報発信を推進する"},{"no":"40","name":"広報番組等経費","bureau":"区長室","dept":"区長室　戦略広報課","budget":132012,"root":"データなし","ev":"縮小","ptype":"11","story_p1":"区政や地域の情報、緊急情報を住民に正確に伝えるため、ケーブルテレビやラジオ、YouTubeなどの多様なメディアを活用して番組を放送・配信しています。","story_p2":"ケーブルテレビで121本の番組を放送・公開し、ウェルビーイング予算の施策をクイズ形式で紹介する新シリーズを制作しました。またFMラジオでも年間を通じて広報番組を放送し、情報提供の充実を図りました。","story_impact":"判断できない","pdf_page":40,"cls":"区民参画と情報発信を推進する"},{"no":"41","name":"ホームページ等経費","bureau":"区長室","dept":"区長室　戦略広報課","budget":86642,"root":"データなし","ev":"改善（手段変更）","ptype":"11","story_p1":"住民が必要な情報を正確・迅速に得られるよう、ホームページや各種SNS、デジタルサイネージなど複数の媒体を通じて、行政情報と地域の魅力を継続的に発信しています。","story_p2":"ホームページへのアクセスは1,375万件以上、多言語翻訳ページは15万件以上のアクセスがありました。LINEの登録数は35,880人、しなメールやSNS（X、フェイスブック）を通じて継続的に情報発信を行い、多様な手段で住民への情報提供を実施しまし :91890,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"駅周辺の魅力的なまちづくりを推進するため、庁舎跡地の活用を検討し、行政機能とにぎわい機能を備えた複合拠点の形成に取り組んでいます。","story_p2":"土地区画整理事業では区画道路の整備が進捗し、庁舎跡地活用検討委員会を5回開催して区民ニーズを把握し、活用のテーマと重視する視点を導き出しました。成果指標は事業地内の使用収益開始面積と公共面積の供用状況で測定されます。","story_impact":"判断できない","pdf_page":62,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"63","name":"地域振興事業","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":200965,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"地域社会の福祉と住民生活の向上のため、町会・自治会の活動を多角的に支援し、コミュニティ活動の活性化と地域の連帯感を高めています。","story_p2":"町会・自治会の加入促進では、QRコードを活用した電子申請の導入により124件の加入があり、前年度比35件の増加を達成しました。また、行政書士による事務処理支援や各地域での制度説明会を通じて、町会・自治会の運営基盤の強化を図りました。","story_impact":"判断できない","pdf_page":63,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"64","name":"地域環境整備等助成金","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":153841,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"町会・自治会による交通安全や町内美化などの環境整備事業を支援し、住民の良好な生活環境を保全するために、各種助成金を交付しています。","story_p2":"197町会・自治会への助成金交付と13地区の美化推進事業への補助金交付により、地域の環境整備と交通安全、防犯対策などの取組みを支援しました。また、世帯数と人口を現状に合わせた要綱改正を実施し、減額となる町会・自治会への減額保証制度を導入することで、地域コミュニティの活性化を図りました。","story_impact":"判断できない","pdf_page":64,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"65","name":"地域活動基盤整備補助","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":76740,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"町会・自治会が会館や掲示板などの施設整備を行う際に、その費用の一部を助成することで、地域住民の自治意識を高め、行政への参加促進につなげています。","story_p2":"町会・自治会会館の耐震改修工事や掲示板の設置・修繕、活動拠点の賃借料に対する支援を行い、地域活動の基盤整備を進めました。補助上限額の引き上げと補助対象の拡充により、支援の充実を図っています。","story_impact":"判断できない","pdf_page":65,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"66","name":"ふれあい掲示板管理費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":30553,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"地域のコミュニティ活動を促進するために、町会・自治会が地域情報を発信できるふれあい掲示板を管理・運営しています。掲示板の建替えや修繕は行政が担当し、掲出物の管理は地域で行っていただいています。","story_p2":"町会・自治会を通じて、ふれあい掲示板を活用したポスター・チラシの掲示および管理業務を支援するとともに、掲示板の建替え・移設など必要な整備を実施しています。成果指標は補助金交付地区数や新設・移設・修繕件数で測定されています。","story_impact":"判断できない","pdf_page":66,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"67","name":"区民まつり経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":143643,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"区民のだれもが気軽に参加できるまつりを開催し、人と人とのふれあいや連帯意識を深めることで、明るく豊かなまちづくりを進めています。","story_p2":"13地区の実行委員会が企画運営し、校庭や公園などを会場に盆踊りや模擬店、子どもコーナーなどを実施しました。参加延べ人数は66,371人となり、地域の交流と活性化を促進しました。","story_impact":"判断できない","pdf_page":67,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"68","name":"地域振興関係事務費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":47147,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"地域活動課の業務を円滑に進めるため、事務用品や複合機などの必要な設備・用品を整備しています。ペーパーレス化を推進し、効率的な事務運営に努めています。","story_p2":"本課職員の旅費支出、各地域センター職員による地区町会・自治会の研修会や青少年健全育成事業の旅費支出、課内消耗品の購入を行いました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":68,"cls":"データなし"},{"no":"69","name":"八潮地区まちづくり事業","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":19970,"root":"データなし","ev":"改善（手段変更）","ptype":"10","story_p1":"昭和58年の入居開始から築年が経ち、公共施設の改築時期を迎えるとともに、高齢化が進む八潮地区の持続可能なまちづくりを実現するために、住民と施設関係者が主体的に課題を抽出し、懇談会やセミナーを通じてコンセプト検討を進めています。","story_p2":"八潮みらい懇談会を4回開催し、インタビューやセミナーを通じて地域の意見を聴取しました。これらの活動をもとに、八潮地区の基本情報整理と4つのまちづくり方向性（コンセプト）を策定し、現地見学会やワークショップなどの地域活性化セミナーを実施しました。","story_impact":"判断できない","pdf_page":69,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"70","name":"区政協力委員会経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":52642,"root":"データなし","ev":"改善（手段変更）","ptype":"8","story_p1":"住民の声を行政に反映させ、効率的な行政運営を実現するため、町会長・自治会長を委員として複数のブロック別・地区別会議を開催しています。","story_p2":"ブロック別および地区別の区政協力委員会を計17回開催し、各地区からの議題を受けて地域の課題解決に向けた協議を実施しました。成果指標である開催回数と参加延べ人数により、事業の実施状況が測定されます。","story_impact":"判断できない","pdf_page":70,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"71","name":"協働推進事業","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":38917,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"区民や地域貢献団体が主体的に活動できる環境を整備し、地域課題の解決を通じて誰もが充実感を感じられる社会を実現するため、活動の支援と協働の促進に取り組んでいます。","story_p2":"区民活動助成制度で8件を採択し、136人が研修に参加するなど、地域活動を多角的に支援しました。情報サイトは月約14,900件のアクセスがあり、協働推進の拠点として機能しています。","story_impact":"判断できない","pdf_page":71,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"72","name":"地域振興基金積立金","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":892,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"社会貢献活動や公益活動を行う団体を支援することで、地域社会の振興を図るため、地域振興基金を設置・運営しています。","story_p2":"寄付金と基金利子により、地域振興基金を着実に積み立てています。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":72,"cls":"データなし"},{"no":"73","name":"地域センター等管理運営費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":980042,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"地域住民が利用する地域センターと集会所の効率的な運営と環境整備を通じて、住民サービスの向上と行政手続の円滑化を実現しています。","story_p2":"各施設の維持管理と安全対策に取り組み、自動火災報知設備改修や防水工事、照明LED化など多数の改修工事を実施しました。行政手続利用等は年間279,368件の利用があり、地域の核として各種区民サービスが活用されています。","story_impact":"判断できない","pdf_page":73,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"74","name":"ウェルカムセンター原・交流施設経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":34953,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"原小学校跡地のウェルカムセンター原・交流施設を地域の拠点として活かすため、住民組織による運営を支援し、施設の維持管理と自主的な活動を推進しています。","story_p2":"運営協議会への経費助成により地域の自主的活動を支援し、諸室やグラウンドの貸し出しおよびカルチャー講座などの自主事業を実施しました。また、外部トイレの洋式化工事を行い、施設設備の維持改善を図りました。","story_impact":"判断できない","pdf_page":74,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"75","name":"区民保養所経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":154394,"root":"データなし","ev":"廃止方向","ptype":"13","story_p1":"高齢者の生きがいづくりや家族の絆を深め、子どもたちの学習機会を広げるため、伊東市と日光市に保養所を設置し、区民の保養・健康増進・学習の推進に取り組んでいます。","story_p2":"毎月の広報誌掲載と年3～4回のポスター・チラシ配布により、区民保養所の認知度向上と利用促進を図りました。品川荘は稼働率60％以上を維持し、光林荘は校外学習の受け入れと一般団体客の活用により、両施設の有効活用が進みました。","story_impact":"判断できない","pdf_page":75,"cls":"生涯を通じた健康づくりの推進"},{"no":"76","name":"青少年健全育成事業","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":174387,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"地域の大人たちが子どもたちの成長を見守る環境を作るために、行政と地域が力を合わせて青少年健全育成事業を行っています。","story_p2":"各地区の青少年対策地区委員会がバスハイクやスポーツ交流、運動会などの事業を実施し、中学生の主張大会や地区委員研修会等を通じて青少年の自立性・社会性育成と指導者の資質向上を図った。また発足70周年に向けた実行委員会を立ち上げ、記念事業の準備を進めた。","story_impact":"判断できない","pdf_page":76,"cls":"子どもの笑顔があふれるまちの実現"},{"no":"77","name":"地域支え愛活動経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":49783,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"住み慣れた地域で安心して生活できるよう、地域住民が相互に支援し合う活動を推進しています。地域センターが核となり、町会や自治会などの団体と協力して、日常生活を支援する体制づくりを進めています。","story_p2":"13地区で支え愛活動会議を実施し、高齢者向けサロンや健康体操教室など地区ごとの活動を展開。32件の活動実績と86人のボランティア登録により、地域の支援体制が構築されています。","story_impact":"判断できない","pdf_page":77,"cls":"地域における共生社会の実現"},{"no":"78","name":"歩行喫煙防止推進経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":104777,"root":"データなし","ev":"改善（手段変更）","ptype":"11","story_p1":"歩行中の喫煙や吸い殻の投げ捨てを防ぎ、安全で快適な生活環境を守るために、路上喫煙禁止地区の指定や巡回指導、公衆喫煙所の管理などに取り組んでいます。","story_p2":"指定地区での指導と過料徴収、路上喫煙の苦情地区への喫煙所設置・整備、民間事業者への喫煙所助成を実施しました。路上喫煙等の過料処分件数、公衆喫煙所の整備数、民間公衆喫煙所への助成件数を成果指標としています。","story_impact":"判断できない","pdf_page":78,"cls":"生涯を通じた健康づくりの推進"},{"no":"79","name":"生活安全協議会経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":5008,"root":"データなし","ev":"改善（手段変更）","ptype":"8","story_p1":"すべての住民が安心して生活できる地域社会を実現するため、警察署や防犯協会と連携し、生活安全に関する意識向上と課題協議に取り組んでいます。","story_p2":"地域安全のつどいの開催、こども110ばんの家の確保、生活安全協議会での協議を通じて、官民協働で防犯意識の高揚と地域の安全確保に取り組みました。成果指標である地域安全のつどいの開催回数は目標値の達成状況を測定する指標として設定されています。","story_impact":"判断できない","pdf_page":79,"cls":"安全と安心を体感できる地域社会の実現"},{"no":"80","name":"生活安全活動費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":18298,"root":"データなし","ev":"縮小","ptype":"3","story_p1":"地域全体の防犯意識を高め、安全で安心して暮らせるまちづくりを進めるため、防犯活動の推進と高齢者の特殊詐欺被害防止に取り組んでいます。","story_p2":"児童が防犯パトロール車に同乗して防犯広報活動に参加し、区民の防犯意識向上に貢献しています。また、シルバー人材センター職員がATM周辺で高齢者への声掛けや注意喚起を行うとともに、自動通話録音機の無償貸与により特殊詐欺被害防止対策を推進しています。","story_impact":"判断できない","pdf_page":80,"cls":"安全と安心を体感できる地域社会の実現"},{"no":"81","name":"生活安全サポート隊活動費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":72127,"root":"データなし","ev":"現状継続","ptype":"5","story_p1":"防犯知識を持つ専従職員が警察と連携してパトロールを行い、住民の防犯啓発や児童見守り、学校の防犯指導を実施することで、安全で安心できる地域づくりを目指しています。","story_p2":"警察官経験者19名と青色防犯パトロール車5台（土曜日は3台）の体制で、週7日間にわたり生活安全パトロールを実施し、年間4,368回の目標を達成しました。また警察署と連携してセーフティ教室を開催し、児童への防犯啓発と適正使用指導を推進しています。","story_impact":"判断できない","pdf_page":81,"cls":"安全と安心を体感できる地域社会の実現"},{"no":"82","name":"児童見守りシステム運営費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":209345,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"子どもたちの登下校時の安全確保と地域の防犯ネットワークづくりを推進するため、独自開発の児童見守りシステムを安定的に運用し、協力者ネットワークを維持しています。","story_p2":"全区立小学校および私立・国都立小学校の児童にGPS機能付き防犯ブザーを貸与し、292日間のシステム稼働により緊急時対応を実施しました。年間86,817件の発報があり、センターのオペレーターが一次対応を行い、保護者・学校・警察等と連携して児童の安全確保に取り組みました。","story_impact":"判断できない","pdf_page":82,"cls":"安全と安心を体感できる地域社会の実現"},{"no":"83","name":"防犯活動団体支援","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":51088,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"町会や商店街などの地域団体による防犯活動を支援し、防犯カメラの設置や見守り活動の充実を図ります。また、個人宅の防犯機器設置も支援することで、犯罪を未然に防ぎ、安心して暮らせるまちづくりを目指しています。","story_p2":"地域団体の防犯パトロール活動や青色防犯パトロール車の運行、防犯カメラ等の設備設置に対して助成を行っています。個人宅の防犯設備設置補助も実施し、対象を拡大して防犯環境の整備を支援しています。","story_impact":"判断できない","pdf_page":83,"cls":"安全と安心を体感できる地域社会の実現"},{"no":"84","name":"社会を明るくする運動経費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":13710,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"犯罪や非行をした人たちの立ち直りを支援し、更生についての理解を深めるため、関係団体と連携して『社会を明るくする運動』を推進し、再犯防止に取り組んでいます。","story_p2":"街頭広報活動では主要駅頭などで啓発物資を配布し、社会を明るくする運動を推進しました。また中央大会で優秀な青少年を表彰するとともに、再犯防止推進委員会を開催し、保護観察所による講演を実施しました。","story_impact":"判断できない","pdf_page":84,"cls":"地域における共生社会の実現"},{"no":"85","name":"統計調査事務費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":6264,"root":"データなし","ev":"現状継続","ptype":"10","story_p1":"統計調査を円滑に実施するために、旅費や事務用消耗品、調査支援システムの運用に必要な経費を計上しています。","story_p2":"統計調査に必要な消耗品の購入、国勢調査等で使用するシステム内の地図を最新版へアップデート、調査区の修正情報をシステムに反映させるなど、統計調査支援システムの機能維持と精度向上に取り組みました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":85,"cls":"データなし"},{"no":"86","name":"区統計資料作成費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":6646,"root":"データなし","ev":"縮小","ptype":"10","story_p1":"統計資料を体系的に整理し、住民の皆様に必要な情報を適切にお届けするために、人口・経済・社会など各分野の統計書を編集刊行するとともに、毎月の人口動態を公表しています。","story_p2":"統計書「品川区の統計」を発刊し、庁内各課や関係機関に配布するとともに、電子版をホームページに掲載することで、行政施策の策定や効果測定、民間事業者や一般の利用に供することができました。","story_impact":"判断できない","pdf_page":86,"cls":"データなし"},{"no":"87","name":"統計調査員等確保対策","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":3645,"root":"データなし","ev":"改善（手段変更）","ptype":"10","story_p1":"各種統計調査を円滑に実施するため、統計調査員と指導員を確保し、講習会の実施や名簿管理を通じて、その資質向上と適切な管理に取り組んでいます。","story_p2":"広報媒体を活用した公募により33名の新規調査員を登録し、統計調査員の確保に取り組みました。また、研修や講習会を通じて調査員の資質向上に努めており、統計調査員登録要綱に基づく登録調査員数が成果指標として設定されています。","story_impact":"判断できない","pdf_page":87,"cls":"データなし"},{"no":"88","name":"学校基本調査","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":2706,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"学校教育の現状を正確に把握するため、幼稚園から高等学校までの各学校を対象に、児童生徒数や教職員数などの基本情報を毎年調査しています。","story_p2":"私立37校について5月1日を調査期日として実施し、公立56校については教育委員会で調査を実施した。成果指標「対象件数／学校基本調査」により、調査の実施状況を測定している。","story_impact":"判断できない","pdf_page":88,"cls":"データなし"},{"no":"89","name":"建設工事統計調査","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":4995,"root":"データなし","ev":"完了","ptype":"10","story_p1":"建設工事の実態を把握し、経済・社会政策や建設行政の基礎資料とするために、建設業者を対象に受注動向と施工状況についての統計調査を実施しています。","story_p2":"建設工事受注動態統計調査は毎月書類を送付して調査を実施し、建設工事施工統計調査は7月1日を調査期日として実施しました。対象事業所・事業者数の実績に基づいて統計情報を収集し、建設工事に関する動態把握を行いました。","story_impact":"判断できない","pdf_page":89,"cls":"データなし"},{"no":"90","name":"経済センサス調査区管理","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":916,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"事業所や企業の統計調査を正確に実施するために、経済センサスで設定した調査区の地図や台帳を毎年修正・管理しています。","story_p2":"経済センサス調査区の境界見直しと境界線の確認作業を実施しました。調査区管理に関する成果指標が設定されており、調査区数の管理状況を把握しています。","story_impact":"判断できない","pdf_page":90,"cls":"データなし"},{"no":"91","name":"区民活動交流施設運営費","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":125335,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"旧八潮南小学校跡を活用した交流施設として、文化芸術やスポーツ、地域活動を通じて多世代の住民がふれあい交流できる環境を整備し、八潮地域の活性化を図っています。","story_p2":"諸室の貸出や修繕工事などの施設管理・運営業務を行い、館内の空調を全館空調から個別空調に更新しました。大規模改修工事に伴う仮事務所移転などの対応も実施しています。","story_impact":"判断できない","pdf_page":91,"cls":"誰もがつながる魅力ある地域社会の実現"},{"no":"92","name":"国勢調査調査区設定","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":38778,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"令和7年10月に実施される国勢調査に向けて、調査を行う地域の範囲を正確に設定するため、調査区の確認作業と事務説明会への参加を行っています。","story_p2":"3,847調査区の総点検を実施し、再開発や区画整理による街区変更に対応して基本単位区を修正した。世帯数増加への対応として調査区の再編・新設を行い、社会福祉施設の把握に基づく特別調査区の設定も完了した。","story_impact":"判断できない","pdf_page":92,"cls":"データなし"},{"no":"93","name":"全国家計構造調査","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":5580,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"地域ごとの家計の実態を把握し、世帯所得や消費の水準・構造に関する基礎資料を得るために、総務省が5年ごとに実施する統計調査です。","story_p2":"全国家計構造調査において、令和2年国勢調査の指定4調査区から調査対象世帯の抽出を行い、10月1日を調査期日として調査を実施しました。成果指標は対象世帯数で設定されていますが、具体的な実績値および評価内容が報告されていません。","story_impact":"判断できない","pdf_page":93,"cls":"データなし"},{"no":"94","name":"農林業センサス","bureau":"地域振興部","dept":"地域振興部　地域活動課","budget":7507,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"農林業の実態を把握し、農林業行政の施策立案に必要な基礎資料を整備するため、経営規模が一定以上の農林業経営者を対象に5年ごとの調査を実施しています。","story_p2":"2月1日を調査期日として農林業センサスの調査を実施しました。成果指標である調査対象数については、実績値の報告がありません。","story_impact":"判断できない","pdf_page":94,"cls":"データなし"},{"no":"95","name":"戸籍届出・証明事務費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":441478,"root":"法定義務あり","ev":"現状継続","ptype":"5","story_p1":"親族関係を公に証明する戸籍原本を整備し、戸籍証明書の交付や身分関係の登録を行うことで、国民の身分関係を正確に記録・管理しています。","story_p2":"戸籍届出は目標20,000件に対して21,093件の実績があり、目標を上回りました。振仮名法制化への準備を進めるとともに、コンビニ交付サービスの拡充により、住民の利便性向上に取り組んでいます。","story_impact":"判断できない","pdf_page":95,"cls":"データなし"},{"no":"96","name":"住民基本台帳事務費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":248153,"root":"法定義務あり","ev":"現状継続","ptype":"5","story_p1":"住民の居住関係を正確に記録し、行政サービスを効率化するために、転入・転出などの届出受付や住民票の交付、全国共通システムの運用を行っています。","story_p2":"住民基本台帳に関する各種届出事務と証明交付を行っており、コンビニ交付やオンライン請求などの非来庁サービスを拡充することで、住民の利便性向上に取り組んでいます。オンライン請求による住基証明書の利用も進んでいます。","story_impact":"判断できない","pdf_page":96,"cls":"データなし"},{"no":"97","name":"中長期在留者関係事務費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":16498,"root":"法定義務あり","ev":"現状継続","ptype":"5","story_p1":"在留外国人が安心して生活できるよう、住居地届出の受理や特別永住者証明書の交付などの事務を適正に行い、外国人の公正な管理に役立てています。","story_p2":"中長期在留者の住居地届出および特別永住者証明書交付等の事務を適正に遂行しました。外国人住民に係る在留関連事務取扱件数は3,329件の実績となりました。","story_impact":"判断できない","pdf_page":97,"cls":"データなし"},{"no":"98","name":"印鑑登録証明事務費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":27553,"root":"法定義務あり","ev":"現状継続","ptype":"5","story_p1":"印鑑登録の申請受け付けから証明書の交付まで、これらの事務を正確かつ迅速に処理することで、住民の利便を高め、取引の安全に寄与しています。","story_p2":"印鑑登録証明書の発行事務を行い、コンビニ交付やオンライン請求など非来庁型サービスを段階的に導入することで、住民の利便性向上とマイナンバーカード普及促進に取り組んでいます。","story_impact":"判断できない","pdf_page":98,"cls":"データなし"},{"no":"99","name":"住居表示管理事務費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":18842,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"皆さんが住所を正確に把握し、訪問者も目的地を見つけやすくなるよう、住居表示制度を運営しています。住居番号の管理から案内板の維持管理、変更証明書の交付まで、わかりやすい街づくりを実現しています。","story_p2":"建築工作物の住居番号付定を835件実施しました。新築届の電子申請システムを導入して周知を進め、期末時点で半数を超える申請が電子化されるなど、利便性向上と事務効率化が進んでいます。","story_impact":"判断できない","pdf_page":99,"cls":"データなし"},{"no":"100","name":"行政サービスコーナー経費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":138069,"root":"データなし","ev":"縮小","ptype":"5","story_p1":"駅ビルや駅前の身近な場所に行政サービスコーナーを開設し、住民が証明書発行やマイナンバーカード交付などのサービスを利用しやすくしています。","story_p2":"図書取次サービスやマイナンバーカード交付業務の拡充、窓口委託の一本化による経費節減を実施した。戸籍証明書広域交付は1,745件、図書利用券のスマートフォン表示も開始され、住民サービスの利便性が向上している。","story_impact":"判断できない","pdf_page":100,"cls":"データなし"},{"no":"101","name":"個人番号カード経費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":251787,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"社会保障・税制度の効率性と透明性を高め、皆様の利便性を向上させるために、個人番号の付番・通知、個人番号カードの交付、電子証明書の更新などを行っています。","story_p2":"マイナンバーカード交付は複数の会場で実施し、郵便局への手続き委託により更新会場を拡大しました。また福祉施設や支援団体への取得補助を行政書士会に委託し、カード保有率の向上を図っています。","story_impact":"判断できない","pdf_page":101,"cls":"データなし"},{"no":"102","name":"区民斎場運営費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":49726,"root":"データなし","ev":"廃止方向","ptype":"6","story_p1":"住民が人生最終の儀式を執り行うのに相応しい環境を提供するため、なぎさ会館という斎場を運営しています。式場や控室などの施設を備え、故人とご遺族にとって安らかで厳粛なお別れの時間をサポートします。","story_p2":"LED工事とエアコン不良により前年度は営業日数が減少しましたが、今年度は友引を休館日とした2会場体制で最大610件の葬儀に対応可能となりました。利用率は25.5％となり、安定した運営体制が構築されています。","story_impact":"判断できない","pdf_page":102,"cls":"データなし"},{"no":"103","name":"臨海斎場運営費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":36591,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"高齢化に伴い増加する火葬需要に対応するため、5つの地域が協力して火葬場と葬儀式場の管理運営を行っています。既存施設の修繕とともに、2030年度の運用開始に向けて施設の増設を計画的に進めています。","story_p2":"火葬利用率は81.9％と増加傾向で、特に昼間帯の需要が高く、式場利用率は100％に達し待ち期間が発生しているため、今後の施設拡大が計画されています。","story_impact":"判断できない","pdf_page":103,"cls":"データなし"},{"no":"104","name":"おくやみコーナー経費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":13372,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"亡くなられた方の手続きで遺族の皆様の負担を減らすため、役所内の各種手続きをまとめて行える専門窓口を設置しています。DXを活用した予約制のワンストップ窓口で、複数の部門の手続きを一度に済ませられます。","story_p2":"おくやみコーナーは予約枠を段階的に拡大し、電子申請や電話での事前予約、グループウェアによる関係課連携、マイナンバー対応の書かない窓口システムなどにより、遺族の手続き負担を軽減しています。おくやみハンドブックの配布も進めており、死亡に伴う各種手続きの円滑化を図っています。","story_impact":"判断できない","pdf_page":104,"cls":"データなし"},{"no":"105","name":"戸籍住民関係事務費","bureau":"地域振興部","dept":"地域振興部　戸籍住民課","budget":118314,"root":"データなし","ev":"縮小","ptype":"9","story_p1":"戸籍住民課の各種サービスを向上させるため、Webカメラを活用して地域センター窓口の対応をサポートしています。複雑な手続きについては本庁職員が資料を確認し、画面上で説明することで対応時間の短縮を図っています。","story_p2":"年間11万件を超える来庁者に対してフロアマネージャーを配置し窓口案内サービスの向上を図るとともに、戸籍住民課と各地域センターに14台の窓口遠隔支援システムを設置し、住民サービスの充実を進めました。","story_impact":"判断できない","pdf_page":105,"cls":"データなし"},{"no":"106","name":"中小企業センター運営費","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":222367,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"区内の中小企業の振興と、そこで働く人たちの福利厚生を支援するため、中小企業センターの運営・維持管理を行っています。講習室や会議室、スポーツ室などの施設を貸し出しています。","story_p2":"中小企業センターでは、勤労者や住民向けに貸室および体育施設の貸出管理を行い、施設の利便性向上のためキャッシュレス決済導入と予約システムのリニューアルを実施しました。貸室利用件数は成果を測る指標として設定されています。","story_impact":"判断できない","pdf_page":106,"cls":"地域の活力を高める産業の振興"},{"no":"107","name":"伝統的産業の振興","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":25115,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"地域の伝統工芸文化を守り、次世代へ継承するために、展示会や実演体験、教室開催など様々な機会を通じて伝統産業の魅力を広く紹介しています。","story_p2":"伝統工芸の実演・体験イベントの充実や小学校での教室実施、イベント参加による販路拡大など、積極的な取り組みが行われています。一方、「伝統の技と味しながわ展」の来場者数は目標2,000人に対し1,360人と、目標達成には至りませんでした。","story_impact":"判断できない","pdf_page":107,"cls":"伝統・文化を継承し親しむ環境づくり"},{"no":"108","name":"産業振興事業助成金","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":18317,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"商店街や公衆浴場、産業協会などの地域産業団体の振興発展を支援するために、これらの団体が実施する事業に対して補助金を交付しています。","story_p2":"商店街連合会などの団体に対して、講習や研修などの事業費を補助することで、商店街の円滑な運営を支援しています。商店街組合の組織体制の維持に向けた取り組みが進められています。","story_impact":"判断できない","pdf_page":108,"cls":"地域の活力を高める産業の振興"},{"no":"109","name":"勤労者福利厚生事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":39714,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"中小企業で働く人たちが充実した余暇生活を送り、仕事への意欲を高められるよう、勤労者共済会の運営を支援しています。","story_p2":"共済会への補助を通じて、勤労者福利厚生事業の円滑な運営を支援しており、会員相互の共済による生活の安定と福利厚生の増進に貢献しています。会員数は4,728人となっています。","story_impact":"判断できない","pdf_page":109,"cls":"地域の活力を高める産業の振興"},{"no":"110","name":"産学連携推進事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":13755,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"地域の中小企業が大学や高等専門学校と連携して、製品・技術開発を強化できるよう支援しています。技術指導や研究費助成、施設利用補助などを通じて、企業の競争力向上を図っています。","story_p2":"都立高専への技術相談、大学等との共同研究支援、産業技術研究センター利用料助成により、区内製造事業者の製品開発を支援しています。産学連携情報交流会を通じて、大学等との連携機会の創出に取り組んでいます。","story_impact":"判断できない","pdf_page":110,"cls":"地域の活力を高める産業の振興"},{"no":"111","name":"創業支援センター等運営費","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":220060,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"区内で創業を希望する事業者やスタートアップ企業に優れた立地環境での創業場所を提供し、産業の活性化と既存製造業者の経営革新を促進するため、3つの創業支援センターと工場アパートを運営しています。","story_p2":"4つの創業支援センターの施設管理とセミナー開催を実施し、定期的な連絡会議を通じて施設間の連携や利用者相互乗り入れを促進しています。セミナー数を成果指標として設定し、創業支援の充実に向けた取組みを進めています。","story_impact":"判断できない","pdf_page":111,"cls":"地域の活力を高める産業の振興"},{"no":"112","name":"品川産業支援交流施設経費","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":108699,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"企業の事業拡張や新規事業の創出を支援し、企業間の交流を促進するために、産業支援交流施設SHIPを運営しています。多様な機能を備えた施設で、地域産業の活性化と区民の地域活動を推進しています。","story_p2":"職員による利用者ニーズの把握や設備導入、セミナー開催に加え、コミュニティマネージャーの配置により会員交流を促進しました。工房ではモノづくり相談や3Dプリンター支援を展開し、インキュベーションマネージャーによる経営相談や金融・士業との相談会を定期的に実施しています。","story_impact":"判断できない","pdf_page":112,"cls":"地域の活力を高める産業の振興"},{"no":"113","name":"品川ビジネスクラブ助成金","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":38864,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"区内の産業団体を振興するため、ビジネスクラブが実施するネットワーキング形成、海外人材活用支援、創業・経営支援などの事業を支援しています。","story_p2":"品川ビジネスクラブは産業支援活動に取り組み、毎年度のビジネス創造コンテストを通じて将来性のあるアイデアを発掘・育成しています。成果指標として一般枠と区民枠の応募件数が設定されていますが、具体的な実績データが示されていません。","story_impact":"判断できない","pdf_page":113,"cls":"地域の活力を高める産業の振興"},{"no":"114","name":"五反田産業文化施設経費","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":156335,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"地域の企業発展と連携を推進し、活気あるまちづくりを実現するために、旧ゆうぽうと跡地に商業・文化施設を整備しています。イベントホールやギャラリーなどの多様な利用施設により、産業と文化の拠点となる施設の運営を支援しています。","story_p2":"株式会社マグネットスタジオを指定管理者に選定し、5月の開業後、イベントホール80％、ギャラリー75％の稼働率確保を目標として施設運営を開始しました。成果指標の実績データが未公開のため、目標達成状況の詳細は確認できません。","story_impact":"判断できない","pdf_page":114,"cls":"地域の活力を高める産業の振興"},{"no":"115","name":"就業支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":25198,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"地域住民の就職を支援し、区内企業の雇用を促進するために、ハローワークと連携した就業相談や職業紹介、就業支援セミナーを実施しています。","story_p2":"ハローワーク専門相談員による職業相談・職業紹介、求人検索コーナーの提供、生活保護受給者への就労支援、就業相談・セミナーによる履歴書添削や模擬面接など、多段階の就業支援を実施しています。就職件数、就業相談人数、就業支援セミナー参加人数を指標として成果を測定しています。","story_impact":"判断できない","pdf_page":115,"cls":"地域の活力を高める産業の振興"},{"no":"116","name":"就業関連団体支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":115491,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"高齢者の多様な就業ニーズに対応するため、職業相談所やシルバー人材センターなどの関連団体に対して運営経費の補助や資金の貸し付けを行い、円滑な運営を支援しています。","story_p2":"55歳以上の方を対象とした無料職業紹介と、高齢者に適した仕事の提供が行われています。サポしながわでの新規求職者と就職決定者の実績により、高齢者の就業支援が実施されていますが、成果を測る指標の詳細な実績数値がありません。","story_impact":"判断できない","pdf_page":116,"cls":"地域の活力を高める産業の振興"},{"no":"117","name":"産業情報収集提供事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":43414,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"企業や産業団体などから情報を集めて、地域の中小企業が経営に必要な情報を得られるようにするため、ニュース配布や景況調査、支援サイト運営などを行っています。","story_p2":"中小企業支援サイトとメールマガジンの運営、年4回の景況調査（約600社対象）、産業実態調査とアンケート・ヒアリング調査を実施しました。成果指標は設定されていますが、具体的な実績数値が示されていません。","story_impact":"判断できない","pdf_page":117,"cls":"地域の活力を高める産業の振興"},{"no":"118","name":"中小企業事業資金融資あっせん","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":1042730,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"中小企業の経営に必要な資金調達を支援するため、金融機関への融資あっせんと利子補給、信用保証料の補助を行っています。","story_p2":"物価高騰対策として利子補給と信用保証料全額補助による支援資金を継続し、1,945件の融資あっ旋を実施しました。中小企業の資金繰りニーズはやや低下傾向にありますが、融資あっ旋申請に対して紹介状を発行することで、企業の資金調達を支援しています。","story_impact":"判断できない","pdf_page":118,"cls":"地域の活力を高める産業の振興"},{"no":"119","name":"経営支援セミナー運営費","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":2933,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"産業構造の高度化に対応し、中小企業が生き残るための経営戦略やノウハウを学べる場を提供するため、経営者向けセミナーや講師派遣による講習会を実施しています。","story_p2":"経営支援セミナーでは団体と共催でセミナーや講演会を実施し、講師派遣制度により8事業者が21回の従業員研修に対して支援を受けました。","story_impact":"判断できない","pdf_page":119,"cls":"地域の活力を高める産業の振興"},{"no":"120","name":"経営相談事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":49668,"root":"データなし","ev":"現状継続","ptype":"4","story_p1":"区内中小企業の経営安定と成長を図るため、融資あっ旋や経営改善などの支援を専門相談員が行います。また、企業の課題に応じて専門家を派遣し、継続的で総合的な経営支援を実施しています。","story_p2":"中小企業診断士や弁護士、弁理士などの専門家による融資、経営、創業、企業法務、特許出願に関する個別相談を実施し、経営・金融・創業等相談の件数を成果指標として設定しています。ビジネス・カタリスト派遣制度では、全業種の中小企業を対象に専門家派遣支援を行っています。","story_impact":"判断できない","pdf_page":120,"cls":"地域の活力を高める産業の振興"},{"no":"121","name":"事業承継支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":24338,"root":"データなし","ev":"縮小","ptype":"4","story_p1":"経営者の高齢化に伴う後継者不足に対応するため、セミナーや専門家派遣、後継者育成塾などを通じて事業承継を支援し、世代交代の促進と地域経済の発展を図っています。","story_p2":"セミナー開催、専門家派遣による個別支援、後継者塾での講座開催を通じて、事業承継の検討や理解促進、次世代経営者のネットワーク形成に取り組みました。事業承継の検討企業数、後継者塾受講者数、事業承継完了企業数を成果指標として設定し、事業承継支援を推進しています。","story_impact":"判断できない","pdf_page":121,"cls":"地域の活力を高める産業の振興"},{"no":"122","name":"雇用確保支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":77855,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"労働人口の減少や人手不足に対応するため、中小企業のテレワーク導入やエンジニア・外国人材の確保を支援し、優秀な人材の確保・定着と事業の持続的成長につなげています。","story_p2":"魅力ある職場づくり支援とエンジニア確保支援により企業の人材確保・定着を促進するとともに、モンゴル高専との交流事業でインターンシップから定着支援まで一貫した支援を実施しています。","story_impact":"判断できない","pdf_page":122,"cls":"地域の活力を高める産業の振興"},{"no":"123","name":"競争力強化支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":105469,"root":"データなし","ev":"拡大","ptype":"7","story_p1":"区内の中小企業が新製品開発やデジタル技術を活用し、下請け脱却と競争力強化を実現するために、製品開発費やDX導入、特許取得などを幅広く支援しています。","story_p2":"DX・デジタル技術活用推進事業により132社が取組みを始め、特許権取得経費助成を通じて19社が新たに特許権を取得するなど、多角的な支援により企業の技術革新と競争力強化を促進しています。","story_impact":"判断できない","pdf_page":123,"cls":"地域の活力を高める産業の振興"},{"no":"124","name":"販路拡大支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":174025,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"区内の中小事業者が持つ高度な技術や高付加価値製品を展示会や商談会でPRすることで、技術ブランド力の向上と販路拡大を支援しています。","story_p2":"海外展示会への6件の出展支援に加え、新規事業展開支援では18件の着手支援と15件のPR支援を実施しました。ものづくり・IT商談会では前年度を上回る商談件数を達成し、展示ブース設置による新たなPR機会の創出に寄与しています。","story_impact":"判断できない","pdf_page":124,"cls":"地域の活力を高める産業の振興"},{"no":"125","name":"スタートアップ推進事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":69263,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"起業家やスタートアップ企業の成長を支援することで、地域産業の活性化と情報通信業などの企業集積を促進しています。情報発信やネットワークづくり、専門家相談など多角的な支援を行っています。","story_p2":"五反田バレーと連携し、交流会やセミナーを通じた起業間もないITスタートアップ企業への支援を行っています。また、大手・中小企業や金融機関・大学・行政が連携するスタートアップ・エコシステム推進事業を開始し、対面イベントやオンラインコミュニティでのマッチング機会を提供しています。","story_impact":"判断できない","pdf_page":125,"cls":"地域の活力を高める産業の振興"},{"no":"126","name":"商店街振興事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":54135,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"商店街の活性化と安心・安全な街づくりを実現するため、商店街組合の設立支援や装飾灯などの管理費助成、専門家による伴走支援を行っています。","story_p2":"商店街エリアサポーターが15商店街の課題解決支援と5エリアの巡回支援を実施し、19商店街の助成金申請を支援しました。また、79商店街の装飾灯やアーケード内電灯など約4,300本分の電気代を補助し、街の防犯と安全・安心な街づくりに貢献しています。","story_impact":"判断できない","pdf_page":126,"cls":"地域の活力を高める産業の振興"},{"no":"127","name":"商店街にぎわい創出事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":97875,"root":"データなし","ev":"縮小","ptype":"7","story_p1":"地域の商業や交流の中心となる商店街を支援し、活気あるまちづくりを実現するために、イベント開催経費や地域活動経費の一部を助成しています。","story_p2":"商店街のイベント開催に対して、56件の経費助成を実施しました。イベント事業助成や若手・女性支援事業など、多様な実施主体に応じた支援を通じて、商店街のにぎわい創出を推進しています。","story_impact":"判断できない","pdf_page":127,"cls":"地域の活力を高める産業の振興"},{"no":"128","name":"省エネルギー対策・業務改善設備更新助成金","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":277833,"root":"データなし","ev":"完了","ptype":"7","story_p1":"エネルギー価格の高騰で経営が厳しい区内事業者を支援するため、省エネルギー対策と業務改善に必要な設備投資費用の一部を助成しています。","story_p2":"エネルギー価格の高騰対策として、緊急経済対策による助成事業を実施しました。省エネルギー対策・業務改善設備更新に関する助成金の申請事業者数について、成果指標として設定されています。","story_impact":"判断できない","pdf_page":128,"cls":"地域の活力を高める産業の振興"},{"no":"129","name":"商店街活性化推進事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":29722,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"商店街の施設環境を整備し、販売促進活動や組織力を強化するため、活性化に向けた各種事業に要する経費の一部を助成しています。","story_p2":"商店街からの申請に応じて、装飾灯やアーチの建替え、LED化事業など施設環境の整備費用の一部を助成しています。成果指標として申請件数を設定していますが、実績値が記録されていません。","story_impact":"判断できない","pdf_page":129,"cls":"地域の活力を高める産業の振興"},{"no":"130","name":"商店街ステップ・アップ支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":20547,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"商店街が直面する消費者ニーズの変化やデジタル化、後継者問題などの課題に対応するため、イベント開催、情報発信、地域サポーター派遣などの取組を支援しています。","story_p2":"商店街が実施するミニイベント等の経費を助成するホリデー・トレーニング事業と、紙媒体・電子媒体での情報発信を支援する事業を実施しており、これらの助成金を申請・実施した商店街数を成果指標として設定していますが、具体的な実績数値が示されていません。","story_impact":"判断できない","pdf_page":130,"cls":"地域の活力を高める産業の振興"},{"no":"131","name":"商店街店舗支援事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":8028,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"商店街の活性化と個店の成長を図るために、集客力強化や販路開拓、ブランド開発に取り組む店舗の活動経費を支援しています。","story_p2":"販路開拓支援として「品川いいもの巡り」と「パン・スイーツマルシェ」の催事を実施し、26店舗が出店しました。販路開拓支援事業の催事に出店した店舗数を成果指標として設定していますが、評価内容についてのデータが確認できません。","story_impact":"判断できない","pdf_page":131,"cls":"地域の活力を高める産業の振興"},{"no":"132","name":"共通商品券普及促進事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":950860,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"地域経済の活性化と区民生活の安定を図るため、商店街が発行するプレミアム付商品券を支援しています。また、キャッシュレス決済利用時のポイント還元により、区内中小店舗の利用促進に取り組んでいます。","story_p2":"プレミアム付区内共通商品券を年2回発行し、春季34,664件、秋季24,251件の申込があり、販売率95.6%～98.8%と高い実績を上げた。併せてキャッシュレス決済サービスと連携したポイント還元事業を実施し、地域経済の活性化を促進した。","story_impact":"判断できない","pdf_page":132,"cls":"地域の活力を高める産業の振興"},{"no":"133","name":"商店街連携推進事業","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":5908,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"商店街の活性化を図るため、商店街が企業や専門家と連携して実施する事業経費の一部を助成しています。商店街と企業の双方にメリットのある活性化プランに基づいた事業を支援します。","story_p2":"複数の商店街に対して連携に関する提案を行い、商店街エリアサポーターと連携しながら実現に向けた働きかけを継続しています。戸越銀座商店街では、商店街と地元企業・大学等が連携して「災害に強いまちづくり」をテーマにした活動が継続的に行われており、企業・団体と連携した商店街の拡大に向けた取り組みが進められています。","story_impact":"判断できない","pdf_page":133,"cls":"地域の活力を高める産業の振興"},{"no":"134","name":"消費生活相談および支援","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":49349,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"消費者トラブルを防ぎ、自立した消費者を育成するために、講座やイベントを通じた消費者教育と相談支援を行っています。また、人や社会・環境に配慮した消費行動を推奨し、持続可能な社会の実現を目指しています。","story_p2":"契約やスマートフォン・ネットのトラブル回避をテーマとした消費者育成講座を実施するとともに、11月にエシカル消費イベントを開催し、持続可能な社会の構築に向けた取り組みを進めました。","story_impact":"判断できない","pdf_page":134,"cls":"安全と安心を体感できる地域社会の実現"},{"no":"135","name":"消費者センター運営費","bureau":"地域振興部","dept":"地域振興部　地域産業振興課","budget":8905,"root":"データなし","ev":"現状継続","ptype":"5","story_p1":"消費者トラブルの相談対応と消費者教育を推進するため、消費者センターの運営と専門スタッフの能力向上を図り、商品表示の適正性確認と立入検査を通じて、消費者の利益と安全を守っています。","story_p2":"消費生活相談員6人が電話・対面で相談対応を行い、通信販売やネット通販のトラブル増加に対応して、3,054件の相談を受け付け、目標の3,000件を達成しました。","story_impact":"判断できない","pdf_page":135,"cls":"データなし"},{"no":"136","name":"観光資源整備事業","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":149772,"root":"データなし","ev":"縮小","ptype":"11","story_p1":"区内の魅力ある観光資源を活かした都市型観光を展開し、来街者の増加とにぎわい創出を図るため、観光関連団体との連携やイベント開催を通じて観光振興を推進しています。","story_p2":"水辺の活性化を目指し、6地区でのイベント開催、観光ＰＲブース出展、目黒川イルミネーション点灯、キャラクターによるＳＮＳ発信など多角的な観光ＰＲ活動を展開しました。通年運航試行したしながわクルーズは391便で6,275人が乗船し、観光資源の魅力向上を図りました。","story_impact":"判断できない","pdf_page":136,"cls":"まちの魅力を活かした都市型観光の推進"},{"no":"137","name":"観光情報発信事業","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":19379,"root":"データなし","ev":"縮小","ptype":"11","story_p1":"より多くの方に訪れていただくため、イベントやスポット、商店など様々な観光情報を、サイトやSNSなど複数の媒体を通じて発信しています。鉄道事業者との連携やゲストハウスを活用したツアーなども実施しています。","story_p2":"観光協会サイトでの情報掲載、駅やデジタルサイネージでのPR、外国人向けツアー8回実施、羽田空港周辺自治体との連携によるニーズ調査など、多角的に観光情報発信を展開しました。","story_impact":"判断できない","pdf_page":137,"cls":"まちの魅力を活かした都市型観光の推進"},{"no":"138","name":"観光サービス充実事業","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":82422,"root":"データなし","ev":"改善（手段変更）","ptype":"11","story_p1":"観光客がしながわの魅力を快適に楽しめるよう、観光案内所の整備やパンフレット、観光大使による案内を通じて、質の高い観光サービス環境を構築しています。","story_p2":"4つの観光案内所を通年運営し、観光情報の提供を行いました。観光パンフレットやマップの制作・増刷、シナモロールを活用したSNS発信や地域イベント出演により、来街者への情報発信と賑わい作りに取り組みました。","story_impact":"判断できない","pdf_page":138,"cls":"まちの魅力を活かした都市型観光の推進"},{"no":"139","name":"フィルムコミッション事業","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":7730,"root":"データなし","ev":"廃止方向","ptype":"11","story_p1":"映画やドラマなどの撮影を支援し、作品の中で地域を紹介することで、ロケ地訪問の増加と新たな観光スポットの創出を図っています。","story_p2":"フィルムコミッションサイトを通じてテレビ事業者等から81件の撮影問い合わせを受け、ロケ地情報や関連作品の紹介、キャンペーン実施により、映像制作事業者や視聴者をターゲットとした情報発信を行いました。","story_impact":"判断できない","pdf_page":139,"cls":"まちの魅力を活かした都市型観光の推進"},{"no":"140","name":"区民レクリエーション","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":8700,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"区民の皆さまが文化活動に参加しやすい環境をつくるために、将棋・囲碁・合唱などの団体と協力して、大会やコンサート、いけばな展などの事業を開催しています。","story_p2":"吟剣詩舞道、将棋、囲碁、合唱の大会を春秋2回、ジュニア囲碁フェスタと麻雀大会を年1回開催しました。区民いけばな展ではお茶席を新たに設置し、品川区民コンサートではクラシック音楽の演奏会を年2回開催するなど、文化・レクリエーション活動の場を提供しました。","story_impact":"判断できない","pdf_page":140,"cls":"伝統・文化を継承し親しむ環境づくり"},{"no":"141","name":"各種団体支援","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":5961,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"生涯学習社会の実現に向けて、地域の団体による自主的な活動を支援しています。登録制度による施設優先申込みや使用料減免、講師謝礼助成、ボランティア保険料負担など、団体の育成と発展に必要な支援を行っています。","story_p2":"団体登録促進、講師謝礼補助、プロデュース型講座支援、ボランティア保険など、多面的な支援を実施しました。社会教育関係団体数は目標1,200団体に対し1,268団体となり、目標を達成しました。","story_impact":"判断できない","pdf_page":141,"cls":"学びとスポーツの楽しさが拡がる環境づくり"},{"no":"142","name":"文化芸術・スポーツ活動支援事業","bureau":"文化観光スポーツ振興部","dept":"文化観光スポーツ振興部　文化観光戦略課","budget":27731,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"区民が文化芸術に気軽に触れ親しめるよう、幅広いジャンルのイベントや伝統芸能の鑑賞会を開催し、地域の活性化につなげています。また、文化芸術やスポーツで優秀な成績を上げた児童生徒の顕彰も行っています。","story_p2":"国際手話を活かした能狂言鑑賞会や雅楽鑑賞会の開催、まちぐるみ文化イベントの実施により、住民が文化芸術に触れる機会を提供しました。また文化イベント助成8件の採択、優秀な成績を収めた児童生徒28件の顕彰、工事現場の仮囲いを活用したアー （手段変更）","ptype":"4","story_p1":"閉じこもりがちな高齢者が健康を維持し、転倒骨折を予防するために、地域ボランティアと協力して運動機能訓練や生活指導を行う健康教室を開催しています。","story_p2":"健康運動指導士による健康体操と各地区の創意工夫したプログラムを実施し、血圧測定などの健康状態確認も行いました。13地区での延べ参加者数を成果指標として設定し、事業を展開しています。","story_impact":"判断できない","pdf_page":302,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"303","name":"しながわ出会いの湯事業","bureau":"健康推進部","dept":"健康推進部　健康課","budget":38653,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"高齢者の健康づくりと生きがいづくり、地域のつながりを促進するために、毎週木曜日に公衆浴場で健康体操やカラオケなどのプログラムと入浴サービスを無料で提供しています。","story_p2":"コロナ禍以降の定員制限を段階的に緩和し、より多くの住民が出会いの湯プログラムに参加できる環境整備に取り組みました。延参加者数の目標は9,168人に設定されています。","story_impact":"判断できない","pdf_page":303,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"304","name":"栄養改善事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":9335,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"65歳以上の高齢者が栄養について学び、仲間づくりができるよう、2つの料理教室を実施しています。低栄養や認知症、閉じこもり予防、生活の質向上のため、実践的な調理技術と知識の習得を支援しています。","story_p2":"事業を再開し、料理の実技指導に加えて栄養・口腔についての学習内容を加えることで、住民が自宅でも継続できる栄養改善を実現しました。延参加人数の目標1,000人達成に向けて事業を実施しています。","story_impact":"判断できない","pdf_page":304,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"305","name":"地域貢献ポイント事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":4751,"root":"データなし","ev":"改善（手段変更）","ptype":"2","story_p1":"高齢者が社会との繋がりを保ち、いつまでも活躍できる環境を作るために、ボランティア活動にポイントを付与し、それを寄付へ繋げる仕組みを運営しています。","story_p2":"60歳以上のボランティア参加者に対してポイント付与制度を運用し、貯めたポイントを商品券や寄付に交換することで地域への還元を実現しました。介護予防事業の参加者へのチラシ配布や定期的な広報により、事業の周知を進めています。","story_impact":"判断できない","pdf_page":305,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"306","name":"地域包括支援センター機能強化事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":6583,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"高齢者が介護が必要な状態になることを防ぐため、理学療法士などの専門家が相談や支援を行い、介護予防に関する知識と技術の向上を進めています。","story_p2":"介護予防指導員を配置して住民主体の通いの場立上げに向けた検討を進めるとともに、フレイル予防講演会を実施し、参加者の9割以上が予防への取組意識が高まったと回答するなど、高齢者の介護予防啓発において成果を上げています。","story_impact":"判断できない","pdf_page":306,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"307","name":"介護予防による地域づくり推進事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":7335,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"住民が地域で主体的に介護予防活動に取り組み、健康寿命を延ばすために、地域の通いの場の立ち上げから運営、継続支援まで総合的にサポートしています。","story_p2":"住民主体の通いの場の実施・支援に加え、リハビリテーション専門職による地域診断や講座実施、独自の介護予防体操の作成、体力測定システムの導入など、支援内容を段階的に充実させてきました。地域介護予防活動の登録制度の開始やフレイル予防教室の実施により、高齢者の自主的な活動を促進しています。","story_impact":"判断できない","pdf_page":307,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"308","name":"地域包括支援センター運営費","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":47540,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"高齢者が住み慣れた地域で安心して暮らせるよう、介護予防から相談支援、虐待防止までを総合的に実施しています。","story_p2":"区職員による配置が困難な主任介護支援専門員について、区内社会福祉法人等から派遣研修生を受け入れることで、地域包括支援センターの体制維持を実現した。高齢者虐待防止研修などを通じて人材育成に取り組んでいます。","story_impact":"判断できない","pdf_page":308,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"309","name":"在宅介護支援センター事業費","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":365798,"root":"データなし","ev":"現状継続","ptype":"4","story_p1":"高齢者が住み慣れた自宅で安心して生活できるよう、身近な相談窓口として20箇所の在宅介護支援センターを設置し、介護保険制度や地域資源を活用した包括的な支援を行っています。","story_p2":"地域高齢者からの相談を受け、在宅介護支援センターにおいて24,017件の相談・支援に対応しました。","story_impact":"判断できない","pdf_page":309,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"310","name":"医療連携の促進","bureau":"福祉部","dept":"福祉部　福祉計画課","budget":12374,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"在宅で療養する高齢者が安心して生活できるよう、医療・介護・福祉の専門職が連携を強化し、必要な情報提供と啓発活動を行っています。","story_p2":"医療と介護の連携強化に向け、地域ケアブロック会議での課題共有、多職種連携研修の定期開催、在宅医療検索ウェブサイトの機能拡充、ガイドブックの改訂と配布、アドバンス・ケア・プランニング講座の本格実施など、複数の取組を展開しました。これらの活動を通じ、関係機関同士の連携が強化され、在宅療養支援体制の充実が図られています。","story_impact":"判断できない","pdf_page":310,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"311","name":"ケアマネジメント支援事業","bureau":"福祉部","dept":"福祉部　福祉計画課","budget":12459,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"要介護状態になっても地域で暮らし続けられる環境を作るため、ケアプランの質向上研修と口腔ケア研修を実施し、高齢者の在宅生活維持と生活の質充実を図っています。","story_p2":"ケアマネジメントの質向上を目指し、初任者・現任者・予防担当者向けの研修を開催しました。また、歯科医師会の協力のもと、講義と実習を組み合わせた口腔ケア研修を実施し、受講者の満足度は高い水準を示しています。","story_impact":"判断できない","pdf_page":311,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"312","name":"介護保険給付適正化事業","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":21946,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"介護サービスの質を高め、介護保険制度を適正に運営するために、事業所への指導やアンケート調査、講習会の開催などを通じて、事業者の質向上と利用者への啓発に取り組んでいます。","story_p2":"介護サービス事業者に対して実地または書面での指導を実施し、介護保険給付の適正化を推進しました。一方、国の指針に基づき、費用対効果が見込みづらい介護給付費通知事業は廃止しています。","story_impact":"判断できない","pdf_page":312,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"313","name":"在宅介護者研修・支援事業","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":29580,"root":"データなし","ev":"縮小","ptype":"5","story_p1":"要介護高齢者を在宅で介護する方の負担を軽減し、支援体制を強化するため、介護者の交流・相談の場や介護職員向けの研修を実施しています。","story_p2":"ケアラー懇談会は前年度の8回から15回に増加し、介護者教室の参加者は22人から110人に大幅に増加しました。これらの事業を通じて、家族介護者同士の情報交換やリフレッシュの場が提供され、参加者の満足度が高く、ケアラー支援についての理解も深まりました。","story_impact":"判断できない","pdf_page":313,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"314","name":"成年後見制度利用支援事業","bureau":"福祉部","dept":"福祉部　福祉計画課","budget":9197,"root":"データなし","ev":"改善（手段変更）","ptype":"1","story_p1":"認知症により判断能力が低下した高齢者の権利を守るため、成年後見制度の利用が困難な方に対して、成年後見人等の報酬の一部を助成しています。","story_p2":"成年後見制度の利用促進基本計画に基づき、資力のない人でも制度を利用できるよう、成年後見人等への報酬助成を実施しています。わかりやすい周知に努めながら、本人の財産状況に応じた報酬助成を決定し、制度の利用を支援しています。","story_impact":"判断できない","pdf_page":314,"cls":"地域における共生社会の実現"},{"no":"315","name":"住宅改修アドバイザー派遣等事業","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":2473,"root":"データなし","ev":"縮小","ptype":"4","story_p1":"高齢者が安全で快適に在宅生活を続けられるよう、バリアフリー化の専門知識を持つアドバイザーを派遣し、身体状況に合った適切な住宅改修をサポートしています。","story_p2":"住宅改修を希望する被保険者に対して住宅改修アドバイザーを派遣し、1,837件の派遣実績を上げました。また、施工業者やケアマネジャーを対象とした研修会を実施し、住宅改修制度の理解促進を図りました。","story_impact":"判断できない","pdf_page":315,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"316","name":"配食サービス栄養改善事業","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":7373,"root":"データなし","ev":"廃止方向","ptype":"3","story_p1":"食事の確保が困難で栄養改善が必要な高齢者の健康を守るために、週2回まで栄養バランスの取れた昼食をご自宅にお届けしています。配達を通じて定期的に高齢者の状況把握を行い、介護予防に取り組んでいます。","story_p2":"栄養士の管理下で調理した栄養バランスの良い昼食を高齢者宅に配達し、約600名に対して6,379食を配食しました。高齢者の栄養改善と状況把握を行い、目標6,500食に対してほぼ達成する成果を上げています。","story_impact":"判断できない","pdf_page":316,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"317","name":"ＡＬＳ患者コミュニケーション支援事業","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":4588,"root":"データなし","ev":"現状継続","ptype":"4","story_p1":"ALS患者が入院した際に、患者のコミュニケーション方法を理解している支援者を医療機関に派遣することで、看護職員が患者との適切なコミュニケーション技術を習得できるよう支援しています。","story_p2":"高齢者支援係の保健師がALS患者を担当するケアマネジャーと連携し、本事業の案内・周知を行っています。利用者数については、事業の実績把握に向けた取り組みが進められています。","story_impact":"判断できない","pdf_page":317,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"318","name":"認知症高齢者グループホーム家賃助成事業","bureau":"福祉部","dept":"福祉部　高齢者福祉課","budget":28377,"root":"データなし","ev":"改善（手段変更）","ptype":"1","story_p1":"特別養護老人ホームの入所要件が厳しくなる中、認知症のある低所得の要介護1・2高齢者が経済的理由でサービスを受けられない状況を解消するため、グループホームの家賃を月額上限24,000円まで助成しています。","story_p2":"認知症高齢者グループホームの家賃助成は、月額助成により低所得世帯の負担軽減を図っており、対象となる1,261人に助成を交付しました。助成対象世帯の割合は37～42％で推移しており、支援ニーズに応じた継続的な事業運営がなされています。","story_impact":"判断できない","pdf_page":318,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"319","name":"認知症地域支援推進事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":2438,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"認知症の方が住み慣れた地域で安心して暮らし続けられるよう、専門の推進員とともに認知症事業の充実に取り組んでいます。","story_p2":"認知症地域支援推進員検討会議、認知症講演会、認知症家族勉強会、認知症サポーター企画会議など各事業に協力を得ながら事業を推進しました。認知症地域支援推進員の人数により、事業の推進体制の構築状況を測定しています。","story_impact":"判断できない","pdf_page":319,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"320","name":"生活支援体制整備事業","bureau":"福祉部","dept":"福祉部　福祉計画課","budget":17606,"root":"データなし","ev":"現状継続","ptype":"8","story_p1":"高齢者が安心して生活できる地域を作るために、生活支援コーディネーターを配置し、地域の支援体制を整備しています。また、高齢者が気軽に交流できる場を提供し、社会参加を支援しています。","story_p2":"高齢者の憩いの場となるフリースペースを開催し、地域での居場所づくりと外出機会の増加につなげました。また、地域支援員の登録促進により、ボランティア活動を通じたフリースペース運営体制の構築を進めました。","story_impact":"判断できない","pdf_page":320,"cls":"地域における共生社会の実現"},{"no":"321","name":"認知症早期発見・早期診断推進事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":1411,"root":"データなし","ev":"縮小","ptype":"13","story_p1":"認知症の早期発見・早期診断を通じて、誰もが住み慣れた地域で安心して生活できるよう、医療と介護が連携して支援する体制を整備しています。","story_p2":"認知症初期集中支援チームは複数設置されており、各チームが初期集中支援ケースに対応しています。認知症の早期発見・早期診断に向けた支援体制の構築が進められています。","story_impact":"判断できない","pdf_page":321,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"322","name":"認知症カフェ運営補助事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":3919,"root":"データなし","ev":"縮小","ptype":"7","story_p1":"認知症の早期発見と地域での支援体制を整備す budget":107144,"root":"データなし","ev":"拡大","ptype":"13","story_p1":"認知症の人が尊厳を保ちながら安心して暮らせる共生社会を実現するため、サポーター養成、普及啓発、見守りサービス、検診、相談支援など総合的な認知症施策を推進しています。","story_p2":"認知症サポーター養成講座は、日曜やオンライン開催、小中学生向けなど多様な受講機会を確保し、企画会議を通じてサポーター活動を充実させました。普及啓発事業では講演会3回開催とあたまの元気度チェック全10会場実施により認知症理解を促進し、認知症検診は受診率が前年度より向上し、伴走型支援事業も開設されました。","story_impact":"判断できない","pdf_page":328,"cls":"高齢者が安心して暮らせる環境づくり"},{"no":"329","name":"高齢者活動支援事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":91043,"root":"データなし","ev":"改善（手段変更）","ptype":"13","story_p1":"高齢者の社会参加を促進し、地域での活動や健康づくき、生きがいづくりを支援するため、ボランティア活動の支援、健康・文化的な各種事業、デジタル教室、補聴器購入助成などを行っています。","story_p2":"高齢者クラブの普及啓発やボランティア養成講座の実施、健康づくり・生きがい活動事業を計画どおり実施しました。ICT関連教室は会場・相談枠を拡充し、補聴器購入費助成は所得制限を撤廃して、より多くの高齢者の社会参加と生活の質向上を支援しました。","story_impact":"判断できない","pdf_page":329,"cls":"地域における共生社会の実現"},{"no":"330","name":"高齢者クラブ支援事業","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":60185,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"高齢者の生きがいづくりと社会参加を促進するために、高齢者クラブの活動を支援し、会員のコミュニケーションや友愛活動の充実を図っています。","story_p2":"高齢者クラブへの助成は会員数や友愛活動の実績に応じて交付し、クラブの活発な活動を支援しています。軽スポーツ大会や芸能大会、研修会を通じて、9,149名の会員が参加するクラブ間の連携を深め、生きがいづくりと仲間づくりを促進しています。","story_impact":"判断できない","pdf_page":330,"cls":"地域における共生社会の実現"},{"no":"331","name":"介護予防活動拠点運営費","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":39514,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"高齢者がフレイルや認知症を予防し、充実した生活を送れるよう、介護予防事業の実施と活動拠点施設の運営・維持管理を行っています。","story_p2":"介護予防活動拠点の施設や設備の経年劣化に対して修繕を実施し、健康器具の保守点検も行われました。実施事業数、自主活動やサークル数などの成果指標が設定されていますが、具体的な実績数値については明記されていません。","story_impact":"判断できない","pdf_page":331,"cls":"地域における共生社会の実現"},{"no":"332","name":"シルバーセンター運営費","bureau":"福祉部","dept":"福祉部　高齢者地域支援課","budget":170989,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"60歳以上の高齢者が交流し、健康づくりや趣味活動に取り組む場を提供するために、区内10カ所のシルバーセンターの維持管理と運営を行っています。","story_p2":"施設の経年劣化に対応した修繕を実施し、夏季には避暑室を開放するなど利用環境の整備に取り組みました。また、3年ごとの利用登録団体更新年度における各種問い合わせ対応を行い、施設の適切な運営管理を進めました。","story_impact":"判断できない","pdf_page":332,"cls":"地域における共生社会の実現"},{"no":"333","name":"高齢者多世代交流支 ":373,"cls":"区民を災害から守る対策の推進"},{"no":"374","name":"衛生統計調査費","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":12243,"root":"法定義務あり","ev":"現状継続","ptype":"10","story_p1":"国の厚生労働行政に必要な基礎資料を得るため、人口動態や生活状況、医療従事者の就業実態などに関する各種統計調査を実施しています。","story_p2":"人口動態調査では出生3,019件、死亡3,498件などを把握し、国民生活基礎調査や医療従事者調査など複数の統計調査を実施しました。人口動態調査票は目標11,500枚に対し10,505枚を作成し、住民の人口動態に関する基礎データを収集しました。","story_impact":"判断できない","pdf_page":374,"cls":"データなし"},{"no":"375","name":"犬の登録・予防注射","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":12603,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"狂犬病の発生を予防し、住民の安全を守るために、飼い犬の登録と予防注射を行っています。また、犬のしつけ方教室を開催し、適正な飼養管理と飼い主のマナー向上に努めています。","story_p2":"飼い犬登録963頭、狂犬病予防注射済票交付9,842件の実績があり、未登録犬518件、未接種犬4,096件に対して督促通知を実施しました。犬のしつけ方教室を年2回開催し、適正飼養の啓発に取り組んでいます。","story_impact":"判断できない","pdf_page":375,"cls":"生涯を通じた健康づくりの推進"},{"no":"376","name":"猫の適正飼養および活動支援事業","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":15112,"root":"データなし","ev":"改善（手段変更）","ptype":"1","story_p1":"動物愛護と適正な飼養管理を推進するため、猫の不妊・去勢手術の費用助成、飼い方に関する講演会、地域猫活動の講習会を実施しています。","story_p2":"飼い猫111頭、飼い主のいない猫111頭の不妊・去勢手術費を助成し、猫の健康管理と野良猫の増加抑制に取り組みました。また、猫の健康と地域猫についての講演会・講習会を開催し、適正飼養の啓発を進めています。","story_impact":"判断できない","pdf_page":376,"cls":"生涯を通じた健康づくりの推進"},{"no":"377","name":"食品衛生","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":198762,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"飲食を原因とする健康被害を防ぎ、住民の健康を守るために、食品関連施設の衛生管理や食品表示の監視、食中毒発生時の原因究明と再発防止に取り組んでいます。","story_p2":"食品関連施設への監視指導3,221件、食品検査108件の実施により食品衛生管理を徹底しました。食中毒調査41施設・75名に対応するとともに、事業者向け講習会29回、消費者向け街頭相談など延べ2,500名以上への情報提供を通じて、食品衛生の知識向上と安全確保に努めました。","story_impact":"判断できない","pdf_page":377,"cls":"生涯を通じた健康づくりの推進"},{"no":"378","name":"環境衛生","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":34799,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"皆さんの日常生活に関わる環境衛生施設の安全性を確保するために、施設の許認可・監視指導、空気環境測定、水質検査などを実施しています。","story_p2":"理美容所やクリーニング所、旅館業など環境衛生関係施設に対して、許認可事務と監視指導を実施しました。許認可件数103件、監視件数546件であり、前年度から監視件数が増加しています。また、水質等の理化学検査および特定建築物の空気検査を実施し、不適施設に対する改善指導を行いました。","story_impact":"判断できない","pdf_page":378,"cls":"生涯を通じた健康づくりの推進"},{"no":"379","name":"医薬衛生","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":62646,"root":"法定義務あり","ev":"現状継続","ptype":"13","story_p1":"医療機関や薬局の適切な運営を監視し、医薬品の安全性を確保することで、誰もが安心して質の高い医療を受けられる環境づくりを進めています。","story_p2":"医事・薬事関係施設1,130施設に対する監視指導を実施し、1,099施設が基準に適合しました。また、医薬品等43件の試験検査をすべて基準に適合で完了し、区民からの医療機関相談586件に対応するなど、医薬衛生の確保に努めました。","story_impact":"判断できない","pdf_page":379,"cls":"生涯を通じた健康づくりの推進"},{"no":"380","name":"そ族昆虫防除対策費","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":59147,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"蚊などの感染症を防ぎ、蜂刺されによる危険から住民の健康と安全を守るために、雨水マスへの薬剤投入や蜂の巣駆除、感染症予防の啓発活動を行っています。","story_p2":"区内約48,000箇所の雨水マスを対象に蚊の発生調査および防除作業を実施し、蜂の巣駆除では前年度比でスズメバチ97個、アシナガバチ等251個を駆除しました。蚊発生抑制剤の投入回数等により、感染症媒介昆虫の発生抑制に取り組んでいます。","story_impact":"判断できない","pdf_page":380,"cls":"生涯を通じた健康づくりの推進"},{"no":"381","name":"生活衛生関係事務費","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":25865,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"生活衛生課の業務を効率的に進めるために、システムの保守管理や必要な用品の発注、公用車の保険・車検費用などの経費を支出しています。","story_p2":"コピー用紙の削減を中心に不要在庫を抱えない発注管理、法規集の差し替えによる職員の法知識の最新化、公用車の適切な車検実施により、生活衛生関係事務の効率的な運営体制を構築しました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":381,"cls":"データなし"},{"no":"382","name":"衛生検査室管理運営費","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":113332,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"感染症対策と生活環境の衛生を確保するため、食品検査や感染症検査などの各種検査を実施するとともに、地域センターなどの複合施設を適切に管理し、利用者の安全と施設の長寿命化を図っています。","story_p2":"生活衛生課の監視員による収去検体や採水試料の検査、学校・保育園給食の細菌検査、保健予防課依頼の検査など、各種検査業務を実施しました。また、品川第一地域センタービルの定期的な保守点検、消火器交換やガス漏れ警報器設置などの施設管理業務を行い、利用者の安全確保に努めました。","story_impact":"判断できない","pdf_page":382,"cls":"データなし"},{"no":"383","name":"栄養・食生活改善普及啓発および指導","bureau":"健康推進部","dept":"健康推進部　生活衛生課","budget":31316,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"生活習慣病の予防と健康寿命の延伸を目指し、区民が正しい食に関する知識を習得できるよう支援するとともに、飲食店や給食施設に対して健康的な食事提供の普及啓発と指導を行っています。","story_p2":"小学生と保護者向けの体験型講演会を2回開催し76人が参加、食生活改善のきっかけを提供しました。給食施設への講習会は対面21名、動画視聴70施設が参加し、食品表示相談・指導も80件対応するなど、食環境づくりと栄養管理の普及啓発を着実に推進しました。","story_impact":"判断できない","pdf_page":383,"cls":"生涯を通じた健康づくりの推進"},{"no":"384","name":"未熟児養育医療費公費負担","bureau":"健康推進部","dept":"健康推進部　保健予防課","budget":22265,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"体重が2,000グラム以下の未熟児や出生時に正常な機能を維持していない新生児は、疾病にかかりやすく死亡率が高いため、すみやかに適切な医療を受けることが重要です。そこで、指定医療機関での入院治療に必要な医療費を公費で負担しています。","story_p2":"未熟児養育医療費公費負担事業では、3カ所の保健センターでの申請受付と医師による医学的審査を経て、医療券の交付および医療費の給付支払いを実施しています。指定医療機関に入院中の未熟児が適切な医療給付を受けられる体制が整備されています。","story_impact":"判断できない","pdf_page":384,"cls":"生涯を通じた健康づくりの推進"},{"no":"385","name":"育成医療・療育給付事業","bureau":"健康推進部","dept":"健康推進部　保健予防課","budget":4080,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"身体障害のある子どもや結核治療が必要な方が早期に適切な治療を受けられるよう、保護者の経済的負担に応じて医療費や日用品などの給付を行っています。","story_p2":"育成医療は3カ所の保健センターで申請受付し、医師による審査のうえ医療券作成と医療費支出処理を実施しました。療育給付については対象となる入院者がいなかったため実績はありません。","story_impact":"判断できない","pdf_page":385,"cls":"生涯を通じた健康づくりの推進"},{"no":"386","name":"予防接種事業","bureau":"健康推進部","dept":"健康推進部　保健予防課","budget":2551072,"root":"データなし","ev":"現状継続","ptype":"4","story_p1":"伝染病の発生と蔓延を防ぎ、公衆衛生の向上を図るため、定期予防接種と臨時接種を実施しています。また、任意予防接種の費用助成により、経済的負担を軽減し、接種率向上と住民の健康維持に取り組んでいます。","story_p2":"区内外の医療機関での接種体制整備と費用還付制度により接種環境を整備するとともに、個別送付や勧奨通知、電子申請サービスの活用を通じて接種率向上に取り組んでいます。五種混合ワクチン１期初回およびＭＲ２期の定期予防接種率を成果指標として設定していますが、実績評価データがそろっていません。","story_impact":"判断できない","pdf_page":386,"cls":"生涯を通じた健康づくりの推進"},{"no":"387","name":"自殺対策事業","bureau":"健康推進部","dept":"健康推進部　保健予防課","budget":39651,"root":"データなし","ev":"改善（手段変更）","ptype":"11","story_p1":"誰もが自殺に追い込まれることのない地域社会を実現するため、関係機関とのネットワーク強化、区民への啓発、相談支援、人材育成など総合的な自殺対策を推進しています。","story_p2":"自殺対策推進検討委員会を設置し、関係機関との連携体制を構築しました。ゲートキーパー研修を年6回開催するとともにオンライン研修動画を公開し、幅広い層への人材育成に取り組んでいます。インターネット広告を活用した相談事業では、様々な属性の相談者に対応しています。","story_impact":"判断できない","pdf_page":387,"cls":"生涯を通じた健康づくりの推進"},{"no":"388","name":"結核対策事業","bureau":"健康推進部","dept":"健康推進部　保健予防課","budget":116150,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"結核の発生や感染拡大を防ぐために、健診による早期発見、患者への治療支援、接触者への検査など、段階的で包括的な対策を実施しています。","story_p2":"高齢者向けの定期結核健診を16,228 養リスクのある後期高齢者に対し、管理栄養士等による訪問・電話での3ヶ月間の栄養指導を実施するとともに、高齢者クラブやふれあい健康塾において低栄養予防・フレイル予防・オーラルフレイル予防の講座を開催し、個別支援と集団啓発の両面から栄養改善と介護予防を推進しています。","story_impact":"判断できない","pdf_page":446,"cls":"生涯を通じた健康づくりの推進"},{"no":"447","name":"人間ドック助成事業","bureau":"健康推進部","dept":"健康推進部　国保医療年金課","budget":7588,"root":"データなし","ev":"改善（手段変更）","ptype":"2","story_p1":"区民の健康寿命を延ばし医療費の削減につなげるため、人間ドック受診にかかる費用の一部を助成しています。","story_p2":"251人の申請に対し全員に助成を行い、後期高齢者健康診査の受診券への同封やチラシ配布により事業周知を図りました。人間ドック費用の助成人数は増加傾向で推移しています。","story_impact":"判断できない","pdf_page":447,"cls":"生涯を通じた健康づくりの推進"},{"no":"448","name":"後期高齢者歯科健診事業","bureau":"健康推進部","dept":"健康推進部　国保医療年金課","budget":25925,"root":"データなし","ev":"改善（手段変更）","ptype":"2","story_p1":"健康寿命を延ばし、誤嚥性肺炎などの病気を防ぐために、後期高齢者医療制度に加入している76～80歳の方を対象に歯科健診とフレイル評価を実施しています。","story_p2":"76歳～80歳の被保険者を対象に、地区歯科医師会に委託して一般口腔内検査、口腔機能評価、フレイル評価を実施し、受診者に介護予防資料を提供しています。後期高齢者歯科健診の受診率が成果指標として設定されていますが、具体的な実績データが示されていません。","story_impact":"判断できない","pdf_page":448,"cls":"生涯を通じた健康づくりの推進"},{"no":"449","name":"葬祭費","bureau":"健康推進部","dept":"健康推進部　国保医療年金課","budget":197534,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"後期高齢者医療制度の被保険者がお亡くなりになった際に、葬儀を行った喪主の経済的負担を軽減するため、葬祭費として7万円を支給しています。","story_p2":"被保険者が死亡した際、葬儀を行った喪主に対して葬祭費を支給しています。支給件数は2,410件で同程度の水準を維持しており、安定した事業運営が行われています。","story_impact":"判断できない","pdf_page":449,"cls":"生涯を通じた健康づくりの推進"},{"no":"450","name":"過誤納保険料還付金","bureau":"健康推進部","dept":"健康推進部　国保医療年金課","budget":13058,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"後期高齢者医療保険料の誤った納付があった場合に、その過誤納分をお返ししています。口座振替登録の有無に応じて、適切な手続きで還付金をご返還します。","story_p2":"後期高齢者医療保険料の過誤納が生じた場合に還付金の対応を行っており、還付金額は同程度で推移しています。","story_impact":"判断できない","pdf_page":450,"cls":"生涯を通じた健康づくりの推進"},{"no":"451","name":"保険料還付加算金","bureau":"健康推進部","dept":"健康推進部　国保医療年金課","budget":604,"root":"法定義務あり","ev":"現状継続","ptype":"1","story_p1":"保険料の還付時に発生した加算金を支給するために、この事業を実施しています。","story_p2":"納付があった保険料について還付加算金が生じた場合に還付する事業です。当年度においては還付加算金が生じなかったため、還付は発生しませんでした。","story_impact":"判断できない","pdf_page":451,"cls":"生涯を通じた健康づくりの推進"},{"no":"452","name":"景観まちづくり推進事業","bureau":"都市環境部","dept":"都市環境部　都市計画課","budget":31043,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"地域の特性を活かした快適で潤いのある景観づくりを実現するため、大規模建築計画への指導や地域特有の景観誘導、そして歴史的な街なみの修景支援を行っています。","story_p2":"景観審議会を7回開催し23件を審議するなど、地域特性に応じた景観誘導を実施しました。旧東海道品川宿地区では届出件数20件、街なみ環境整備事業補助により修景を支援し、沿道の修復実績19％を達成しています。","story_impact":"判断できない","pdf_page":452,"cls":"魅力的で良好な都市景観の形成"},{"no":"453","name":"都市計画審議会経費","bureau":"都市環境部","dept":"都市環境部　都市計画課","budget":16274,"root":"データなし","ev":"現状継続","ptype":"8","story_p1":"都市計画に関する重要な決定を、学識経験者や議員などで構成された審議会で慎重に検討するために、都市計画審議会を設置・運営しています。","story_p2":"都市計画審議会を3回開催し、地区計画の変更や公園の変更など5件の審議事項について答申を受けました。都市計画変更等が適切に実行されています。","story_impact":"判断できない","pdf_page":453,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"454","name":"区民の自主的なまちづくりへの支援","bureau":"都市環境部","dept":"都市環境部　都市計画課","budget":15937,"root":"データなし","ev":"廃止方向","ptype":"7","story_p1":"住民の皆さんが主体的に進めるまちづくり活動を支援することで、地域の特性に合わせた生活環境を改善し、活力あるみどり豊かな住みよいまちづくりの実現を目指しています。","story_p2":"まちづくり活動を推進する3団体に対して、事務費や広報費などの運営経費の一部を補助しました。成果指標として補助件数や専門家による指導助言の実施状況を設定しましたが、具体的な実績数値が公表されていません。","story_impact":"判断できない","pdf_page":454,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"455","name":"中高層建築物開発指導","bureau":"都市環境部","dept":"都市環境部　都市計画課","budget":22675,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"良好な都市空間と住環境の形成を図るために、一定規模以上の建設事業について、建築確認申請前に協議を行っています。緑化や防災対策、駐車場整備など、住みよいまちづくりに必要な内容を事業者と調整しています。","story_p2":"開発環境指導要綱協議により8割以上の事業者が協定を締結し、良好な住環境整備の指導を行っています。また、協定事業者による隣接共用スペースの連続化を支援する補助制度を通じて、歩道状スペース等の整備が進められています。","story_impact":"判断できない","pdf_page":455,"cls":"魅力的で良好な都市景観の形成"},{"no":"456","name":"空港環境経費","bureau":"都市環境部","dept":"都市環境部　都市計画課","budget":49723,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"羽田空港の新飛行経路による航空機騒音の実態を把握するため、2ヶ所の小学校に測定機器を設置し、騒音データを収集・分析して月報・年報で公表しています。","story_p2":"立会小学校と台場小学校の2地点で航空機騒音を測定し、立会小学校では7,882回、台場小学校では14,195回の騒音発生を記録。両地点の年間Lden値は50dB、49dBで、航空機騒音の監視・把握が実施されました。","story_impact":"判断できない","pdf_page":456,"cls":"地球環境にやさしいまちづくり"},{"no":"457","name":"都市計画関係事務費","bureau":"都市環境部","dept":"都市環境部　都市計画課","budget":78946,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"都市計画事務を円滑に進めるため、事務用消耗品の購入、システムデータの更新、都市計画図書の作成などを行っています。","story_p2":"事務用消耗品の購入や職員旅費の適正な執行に努めるとともに、用途地域検索システムのデータ変更や都市計画図の作成を委託により実施しました。また、都市計画道路内の未整備隅切りについて、都市計画変更の方針検討と図書作成を進めました。成果を測る指標は設定されていません。","story_impact":"判断できない","pdf_page":457,"cls":"データなし"},{"no":"458","name":"住宅改善資金融資あっせん・助成事業","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":72327,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"自宅の修築や改善工事を検討されている方へ、金融機関からの低利融資あっせんや工事費用の助成を行うことで、快適で安全な住環境づくりを支援しています。","story_p2":"住宅修築資金融資あっせんは12件の申請に対し9件が実行され、6件の信用保証料助成を行いました。また、住宅改善工事助成は一般住宅264件、共同住宅33件の合計297件を支援し、多くの住民の住宅改善を促進しました。","story_impact":"判断できない","pdf_page":458,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"459","name":"住環境整備連携事業","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":13463,"root":"データなし","ev":"現状継続","ptype":"7","story_p1":"災害に強い安全な住宅の整備を促進するため、耐震化や不燃化に関する相談体制を整備し、住宅まつりの開催や定期的な住宅相談会、建物の無料診断などを実施しています。","story_p2":"住宅まつりにおいて建前実演や住宅相談、パネル展示を実施し、災害に強い住宅整備を促進しました。住まいの健康診断事業の周知強化により、相談から実際の施工に繋がる案件も生まれています。","story_impact":"判断できない","pdf_page":459,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"460","name":"マンション管理支援事業","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":23302,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"マンション特有の課題解決を支援し、適正な維持管理を促進するため、セミナーや相談窓口の設置、専門家派遣、管理計画の認定など、総合的なサポートを実施しています。","story_p2":"マンション管理相談では2回のセミナーを開催し75人が参加し、開催日時の工夫により新規層の獲得と相談申し込みにつながった。届出制度は449件の届出（94.5%）を達成し、未届マンションへの調査も実施した。また、認定制度セミナーを開催し21人が参加するなど、周知活動を推進した。","story_impact":"判断できない","pdf_page":460,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"461","name":"空き家等対策事業","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":28154,"root":"データなし","ev":"拡大","ptype":"11","story_p1":"空き家の発生を予防し、適正な管理と有効活用を推進することで、住民の生活環境向上を図っています。セミナーや相談窓口を通じて、所有者をサポートしています。","story_p2":"空き家予防セミナーの開催や相続人調査により所有者3戸72人を特定するなど発生予防と適正管理の促進を実施しました。令和3年8月に設置した空き家専門相談窓口では32件の相談があり、25件が解決に至るなど有効活用の推進に成果を上げています。","story_impact":"判断できない","pdf_page":461,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"462","name":"区営住宅管理費","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":256659,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"住宅に困っている低所得者に安心して暮らせる住まいを提供し、計画的な修繕と長寿命化工事を実施することで、居住者の生活安定と施設の効率的な管理を実現しています。","story_p2":"家賃納付スケジュール周知、滞納者への督促・訪問指導、連帯保証人への連絡など、段階的な取り組みを実施しています。住宅使用料の収納率は目標の95.81%に対して95.44%の実績となり、ほぼ目標水準の成果を達成しました。","story_impact":"判断できない","pdf_page":462,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"463","name":"区民住宅管理費","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":1068568,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"中堅所得ファミリー層の定住化と住民生活の安定を図るため、良好な賃貸住宅を適切な価格で供給するとともに、計画的な維持・修繕により安心して暮らせる住まいづくりを推進しています。","story_p2":"区民住宅は718戸が入居し、滞納者への督促や個別面談により滞納解消に努めています。リノベーションやSNS配信による入居促進により小中規模住宅の入居率が改善され、3施設で外壁改修や防水工事などの長寿命化工事を実施しました。","story_impact":"判断できない","pdf_page":463,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"464","name":"建築審査会事務","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":11357,"root":"法定義務あり","ev":"現状継続","ptype":"8","story_p1":"建築基準法に基づき、建築行政を公正かつ民主的に執行するために、建築審査会の審議が円滑に進むよう庶務事務を行い、建築基準の適正な運用を図っています。","story_p2":"建築審査会の開催調整、案件の事前調査、審査請求および同意案件の審査会運営、委員報酬支払い事務を実施しました。各年度における建築審査会開催回数を成果指標として設定し、適切な審査体制の維持に努めています。","story_impact":"判断できない","pdf_page":464,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"465","name":"建築紛争調整事務","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":16191,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"マンションなど中高層建築物の建築に伴う近隣トラブルを防ぎ、良好な地域環境を守るために、事前説明会の開催指導や紛争が生じた際の調整手続きを行っています。","story_p2":"建築物の新築・解economyや解体工事計画について事業者に対して近隣への事前説明を求め、工事による紛争を未然に予防しています。建築紛争調停委員会の開催を通じて、紛争解決に向けた調整が行われています。","story_impact":"判断できない","pdf_page":465,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"466","name":"居住支援事業","bureau":"都市環境部","dept":"都市環境部　住宅課","budget":47248,"root":"データなし","ev":"縮小","ptype":"8","story_p1":"高齢者や障害者、ひとり親など住宅確保が難しい方が民間賃貸住宅に入居しやすくするために、不動産事業者との連携や家主向けのセミナー開催、家賃補助などの支援を行っています。","story_p2":"居住支援協議会を1回開催し入居促進事業の報告・協議を実施しました。不動産事業者向けセミナーを2回開催して32人が参加し、住宅確保要配慮者177人の民間賃貸住宅への入居につながりました。","story_impact":"判断できない","pdf_page":466,"cls":"地域特性を活かした計画的なまちづくり"},{"no":"467","name":"住宅関係事務費","bureau":" ,"story_impact":"判断できない","pdf_page":471,"cls":"区民を災害から守る対策の推進"},{"no":"472","name":"防災生活圏促進事業","bureau":"都市環境部","dept":"都市環境部　木密整備推進課","budget":19061,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"地震などの災害に強い都市づくりを推進するため、広域避難場所までの主要道路である富士見通りと大原通りの拡幅整備を進めています。これにより、安全で円滑な避難行動と救援活動を確保します。","story_p2":"荏原北・西五反田地区と戸越・豊町地区の2地区で防災生活圏促進事業を実施し、用地測量1件、用地取得1件、富士見通り道路拡幅整備工事に取り組みました。整備しなければならない総延長に対する整備完了延長の割合により、事業の進捗状況を測定しています。","story_impact":"判断できない","pdf_page":472,"cls":"区民を災害から守る対策の推進"},{"no":"473","name":"避難道路機能強化事業","bureau":"都市環境部","dept":"都市環境部　木密整備推進課","budget":23738,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"地震などの災害に強いまちづくりを推進するため、広域避難場所までの主要な避難道路である滝王子通りを幅員10.0ｍに拡幅し、安全で円滑な避難と救援活動を確保しています。","story_p2":"広域避難場所への避難道路である滝王子通りの機能強化に向けて、土地鑑定評価、用地測量、用地取得、道路拡幅整備工事を実施しました。成果指標は整備完了延長の割合で測定されますが、実績データが示されていません。","story_impact":"判断できない","pdf_page":473,"cls":"区民を災害から守る対策の推進"},{"no":"474","name":"従前居住者用住宅管理費","bureau":"都市環境部","dept":"都市環境部　木密整備推進課","budget":57172,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"密集住宅市街地の整備事業に協力していただいた方々に対して、確実に新しい住宅を供給するため、賃貸住宅の管理・運営を行い、安心できる居住環境を整えています。","story_p2":"3地区に合計56戸の従前居住者用住宅を設置し、37戸が入居している（入居率66.0%）。建物管理業務委託や居室清掃委託、小口修繕工事を実施し、密集住宅市街地整備事業の協力者向け住宅として適切に管理・運営しています。","story_impact":"判断できない","pdf_page":474,"cls":"区民を災害から守る対策の推進"},{"no":"475","name":"整備地域不燃化加速事業","bureau":"都市環境部","dept":"都市環境部　木密整備推進課","budget":37135,"root":"データなし","ev":"現状継続","ptype":"13","story_p1":"木造住宅密集地域の地震災害と火災被害を防ぐため、老朽建築物の除却や建替え費用の助成、専門家による相談支援などを行い、防災性と住環境の向上を図っています。","story_p2":"中延四丁目地区と小山二丁目地区を対象に、専門家派遣1件、除却助成6件を実施し、1,077件の戸別訪問による事業周知を行いました。燃えにくさを示す指標である不燃領域率の向上に向けて、耐火等建築物の立地状況や道路、公園などの整備を進めています。","story_impact":"判断できない","pdf_page":475,"cls":"区民を災害から守る対策の推進"},{"no":"476","name":"大崎駅周辺地区再開発事業","bureau":"都市環境部","dept":"都市環境部　都市開発課","budget":5606946,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"大崎駅と五反田駅の周辺地域を先端的で活力あるまちへ生まれ変わらせるため、民間事業者による再開発を支援しながら道路や公園などの都市基盤施設を計画的に整備しています。","story_p2":"西品川一丁目地区など3つの再開発事業地区で、都市計画手法を活用して民間事業を誘導・支援し、道路や広場などの都市基盤施設
