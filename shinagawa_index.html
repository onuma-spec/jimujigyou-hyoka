：講習室、会議室、音楽ホール、楽屋、スタジオ、託児室、プラネタリウム\n◆荏　原：講習室、料理講習室、レクリエーションホール、会議室、グループ室、大ホール、温水プール\n◆東品川：講習室、会議室、美術工芸室、視聴覚室、レクリエーションホール、スポーツ室、託児室、グループ室\n◆旗の台：会議室、レクリエーションホール、スポーツ室、グループ室\n◆南大井：講習室、レクリエーションホール、美術工芸室、スポーツ室、託児室、グループ室","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":152,"name":"歴史館運営費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":82530,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区にかかわる歴史資料を収集・保管・展示し、区民の教養の向上や学術および文化の発展に寄与する。\n【事業概要】\n◆品川歴史館の維持管理を行い、展示観覧者や貸出施設利用者など入館者への対応を行う。\n◆品川歴史館の常設展や特別展、企画展、コーナー展など各種の展示を行う。\n◆品川区にかかわる歴史資料を収集・保管し、調査研究を行う。\n◆歴史講座、古文書講座などの講座・講演会を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":153,"name":"地域スポーツ支援","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":90402,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の生涯にわたる自主的なスポーツ・レクリエーション活動の環境を整備し、地域スポーツの推進を図る。\n【概要】\n◆地域が主体となり運営する区内の地域スポーツクラブにおいて各種スポーツ教室やイベント（スポーツ大会等）を実施し、地域でのスポー\nツ活動を推進し、誰でもスポーツに参加できる環境を整備する。\n◆パラスポーツチャレンジデーやユニバーサルスポーツフェスタ等を実施し、障害者理解の促進を図り、共生社会の実現を目指す。\n◆令和3年度に誕生した区をホームタウンとするプロスポーツチームと連携し、小学生を対象としたスポーツ教室を実施し、もっと上手くな\nりたいという「する」スポーツの推進とプロスポーツを観戦したいという「みる」スポーツの推進の相乗効果を図る。\n◆しながわシティランは、区民がランナー、ボランティア、応援など様々な形で参加し、区民みんなが輝く大会とすることで、区民のシビッ\nクプライドの醸成を図るとともに、品川のまちの魅力を区内外に発信する。\n◆デフリンピックの開催に伴い、デフスポーツの周知・啓発を行うことにより、聴覚障害の理解促進、共生社会の実現に寄与する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":154,"name":"地域スポーツ施設開放","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":363663,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の地域でのスポーツ活動を促進するため、区立学校等の体育館・校庭・温水プール等の施設を開放する。\n【概要】\n◆47校（区立小学校31校・中学校9校・義務教育学校6校・その他1校）の体育館・校庭・教室を開放する。\n◆10校（区立小学校7校・中学校3校）の校庭・屋外プールについて、種目を指定（テニス・学校プール夏季一般開放）した上で開放する。\n◆5校（区立中学校1校・義務教育学校4校）の温水プールを開放する。\n◆八潮公園多目的広場を身近な地域で屋外スポーツを楽しめるよう開放する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":155,"name":"少年少女スポーツ普及事業","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":17627,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆少年少女スポーツ大会\n少年少女各種スポーツ大会を実施し、仲間づくりを通じて肉体的・精神的な健全育成を図る。\n◆少年少女スポーツ開放\nスポーツ活動の場として、学校校庭・地域広場等を開放する。\n◆青少年健全育成表彰\n少年野球、少年少女サッカー、小学生バレーボール、U12バスケットボール等の青少年のスポーツ活動において、育成者を表彰することによ\nり青少年の健全育成に携わる指導者層の拡大につなげる。\n◆ジュニアスポーツ拡大・定着プロジェクト\n子どものスポーツに親しむ習慣や意欲を養うことで、積極的にスポーツをする子どもとしない子どもの二極化を解消し、体力の向上を図ると\nともに、ジュニアスポーツの裾野の拡大とスポーツ習慣の定着を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":156,"name":"オリンピック・パラリンピックスポーツ等振興事業","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":67349,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"D 完了・廃止する事業","ev_detail":"事業移管・統合","gai":"","legal":"","law":"","desc":"【目的】\n◆東京2020大会のレガシーに係る事業、その他のスポーツ振興を通じた地域活性化を図る。\n【概要】\n◆ホッケー教室・大会の実施、観戦ツアーの実施\n区応援競技であるホッケーの普及啓発を図る。区応援競技を中心に、様々な競技の試合観戦・競技体験を行うツアーを実施する。\n◆しながわホッケー地域応援プロジェクト\n年間を通して、区・日本ホッケー協会・地域がチームとして連携し、ホッケー競技の応援企画を実施する。\n◆ブラインドサッカー体験・国内大会の実施\n区応援競技であるブラインドサッカーの普及啓発およびパラスポーツへの理解促進を図る。\n◆旧東品川清掃作業所暫定活用\n旧東品川清掃作業所を文化・スポーツを起点としたまちのにぎわいを創出する場「アイルしながわ」として暫定活用する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":157,"name":"野外活動事業","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":4100,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆キャンプ場運営\n青少年健全育成の一環として野外活動やキャンプ活動を行う目的で設置したキャンプ場を円滑に運営するため、施設管理業務を行う。\n◆野外活動事業\n区民が野外活動を通じて自然に接し、親しむことができるよう、夏季に初心者ファミリー向けのキャンプ教室を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":158,"name":"区民スポーツ大会","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":21975,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民のスポーツの祭典として、日頃スポーツに親しむ区民がその成果を発揮するとともに、参加者間の親睦を図り、区民スポーツの振興を\n図る。\n◆「水と緑の市町村との交流事業」の一環として、山北町においてスポーツを通じての交流・親睦を図るとともに、スポーツの普及とレベル\nアップを図る。\n【概要】\n◆（公財）品川区スポーツ協会と共催し、品川区民スポーツ大会を年4季（春季・夏季・秋季・冬季）開催する。\n◆品川区民スポーツ大会マラソン大会（以下「区民マラソン大会」という。）等の成績優秀者（10名程度）を山北町主催の丹沢湖ハーフマラ\nソン大会に派遣する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":159,"name":"品川区スポーツ協会助成金","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":60946,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆公益財団法人品川区スポーツ協会の健全な運営と発展を図るため、同協会に対し必要な助成を行い、もって区のスポーツ振興に資する。\n【内容】\n◆事務局運営費に対する助成\n（1）事務局人件費\n（2）事務局維持費\n（3）各連盟助成費\n（4）ホームページ維持費\n（5）広報事業費\n（6）研修事業費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":160,"name":"体育館運営経費","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":404311,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区立体育館の適切な管理運営を行うとともに、区民の健康や体力の維持増進を目的に体育館利用の促進を図る。\n【概要】\n◆総合体育館・戸越体育館の施設の維持管理\n◆各種スポーツ教室の開催など体育、スポーツおよびレクリエーションに係る事業の運営\n◆区民への施設の貸出業務・利用料金の徴収\n◆区民スポーツ大会への会場提供などを通じた区民のスポーツ・レクリエーションの振興\n※平成18年度より、（公財）品川区スポーツ協会を指定管理者として管理運営を委託","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":161,"name":"公園運動施設費","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":20454,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区民のスポーツ活動の拠点として、公園運動施設の整備・充実を図る。\n【概要】\n◆公園の有料運動施設等を区民のスポーツ活動の拠点として開放し、施設の利用促進を図る。\n◆しながわ中央公園内でボルダリング場を運営し、子どもたちを中心に新たなスポーツを気軽に楽しめる機会を創出する。\n◆ボルダリング競技の普及・啓発のため、主に初心者を対象としたボルダリング教室を定期的に開催する。また、オリンピアン・クライミン\nグ選手等を招いたボルダリングイベントを実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":162,"name":"施設予約システム管理経費","bureau":"文化観光スポーツ振興部","dept":"スポーツ推進課","budget":10773,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区施設の利用者の利便性向上を図るため、施設予約システムを運用する。\n【概要】\n◆施設予約システムを利用し、区施設の利用者管理・予約管理等を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":163,"name":"プレイパーク運営費","bureau":"子ども未来部","dept":"子ども育成課","budget":35611,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目　的】\n◆冒険ひろばの利用者が安全に利用でき、おもいきり外遊びを体験し、屋外でしか経験できない遊びを援助する。\n◆乳幼児期から野外活動に親しめる環境を整え、安心して自由で豊かに外遊びができる場をつくる。\n【概　要】（※年末・年始を除く）\n◆北浜こども冒険ひろば（平成14年度事業開始）\n・北浜公園　月～金、土曜日　午後2時～午後6時・聖蹟公園　火、水曜日　午後2時～午後6時（第1・第3水曜日は午前11時～午後6時）\n◆しながわ冒険ひろば（平成29年度事業開始）\n・しながわ区民公園　月～水、土、日曜日　午前10時30分～午後5時30分\n◆荏原地区モデル実施委託\n・旗の台公園（月2回実施）午前10時30分～午後5時　・荏原中央公園、あさひ公園（月1回実施）午前10時30分～午後4時30分","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":164,"name":"児童センター運営費","bureau":"子ども未来部","dept":"子ども育成課","budget":890820,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆遊びをとおして健康の増進、情操をゆたかにするなど児童健全育成を図り、子育て家庭を支援する。\n【概要】\n①児童センター維持管理\n②児童センター事業\n　　施設運営委託、指導員等謝礼、教材費・行事用経費、劇団委託・合同文化事業等、親育ち支援事業、\n　　子育てひろば事業、子育て支援スタッフ育成事業、多世代交流支援事業、わっくわくランドしながわ\n　　子育て応援プログラム、男性の育児参画支援事業、Wi-Fi設置・運用\n③人材育成\n④児童センター改築、改修","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":165,"name":"すまいるスクール運営費","bureau":"子ども未来部","dept":"子ども育成課","budget":1569713,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n全小学校で放課後や長期休業日等に学校施設を活用して、児童が学習や遊び、スポーツなどができる居場所として、「すまいるスクール」\n（全児童放課後等対策事業）を開設・運営している。各すまいるスクールでは、「フリータイム」「学習タイム」とあわせて、ボランティア\nの協力を得て、英会話・工作・囲碁などの「教室」事業を実施しており、自由に参加し活動できる場所として、学校等と連携して内容の充実\nに努めている。\n【概要】\n①区内在住の全児童を対象に「放課後児童クラブ」と「放課後子供教室」の一体型で、区内在住の全児童を対象に実施（登録制）\n②地域人材等外部講師による教室や体験活動（伝統文化、スポーツ運動、学び・教育、ものづくり）\n③すまいるスクールに従事する放課後児童支援員有資格者の人材確保と処遇改善\n④放課後児童健全育成事業の質の向上\n⑤就労家庭等の家事負担軽減のため、夏休み中の利用児童に仕出し弁当の取り次ぎを実施。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":166,"name":"青少年問題協議会","bureau":"子ども未来部","dept":"子ども育成課","budget":1450,"next_budget":0,"root":"","cls":"青少年の成長と自立の支援","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】　\n◆青少年関係施策の総合的かつ効果的な推進を図るとともに、関係機関、団体の連絡調整を図る。\n◆毎月第一日曜日の「家庭の日」の普及啓発を兼ねて、異年齢の親子が自然体験を通じてともに成長することにより「意欲・関心」「規範意\n識」「職業意識」を醸成する機会を提供し、次代を担う青少年育成、教育につなげる。\n【概要】\n◆青少年問題協議会の運営・開催\n◆青少年問題協議会で定める専門委員会の運営・開催\n◆親子が自然体験できる機会の提供として「親子ネイチャープロジェクト」を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":167,"name":"青少年育成活動","bureau":"子ども未来部","dept":"子ども育成課","budget":102723,"next_budget":0,"root":"","cls":"青少年の成長と自立の支援","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n青少年の豊かな人間性を育み、自立と社会参加を促すため、青少年育成に関する様々な事業を実施する。\n【概要】\n◆青少年委員は、地域における青少年育成の中心的な担い手として、青少年や青少年関係団体相互関係機関と連携をとりながら、青少年健全\n育成を目的に活動を行う。\n◆青少年委員会は、小学4年生～高校生を対象に1年間を通して異年齢の集団活動を行い、思いやりや助け合いの精神を身につけられるジュニ\nア・リーダー教室を運営する。\n◆ひきこもりや不登校等、生きづらさをもつ子ども・若者とその家族の相談や支援を行う「子ども若者応援フリースペース」および「エール\nしながわ」の相談拠点を運営する。\n◆これまで区で進めてきた「子ども・子育て支援事業計画」と「子ども・若者計画」を一本化し、区内の子ども・若者・子育て家庭を対象と\nした総合計画である、「品川区こども計画」を令和6年度に策定する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":168,"name":"児童相談等運営支援事業","bureau":"子ども未来部","dept":"子ども育成課","budget":2361,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n児童福祉審議会を開催する。また、区児童相談所の支援に関わる子どもの権利擁護の推進を図る。\n\n【概要】\n◆区長の附属機関として、児童の福祉に関する事項の調査・審議を行う児童福祉審議会を開催する。\n◆子どもの意見を尊重するため、区児童相談所が関わる子どもへ意見表明等支援員を派遣する。\n◆児童福祉法の規定に基づき、被措置児童等虐待に係る通告があった場合に調査等を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":169,"name":"児童入所施設措置費等支弁経費","bureau":"子ども未来部","dept":"子ども育成課","budget":429671,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n児童相談所が児童を児童福祉施設等に入所等措置を行った場合、児童福祉法第50条により、当該施設等が法に定める最低基準を維持するため\nの費用を支弁することが児童相談所設置市に義務付けられている。当該費用の支弁により、措置児童等の生活水準が維持され、健全な環境で\n養育を受けられるようにする。\n【概要】\n児童相談所が児童福祉施設等への児童の入所措置を行った場合に措置費・医療費等の支弁を行う。また、措置費支弁に付随する経費として東\n京都および措置費共同経理課へ負担金を支払う。\n※措置費とは、児童福祉施設等を運営していくために必要な職員の人件費や児童に係る生活費や教育費など、児童の養育に必要な経費をい\nう。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":170,"name":"社会的養護推進経費","bureau":"子ども未来部","dept":"子ども育成課","budget":3608,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n　社会的養護を必要とする子どもが適切な環境で養育されるように環境整備等を行うことで、子どもの最善の利益の実現を図り、すべての子\nどもの権利が保障されることを目的とする。\n\n【概要】\n◆社会的養護を必要とする子どもができるだけ家庭的な環境で養育される環境を整えるため、里親登録数の増や区内児童養護施設の小規模\n化・地域分散化に取り組む。\n◆養子縁組民間あっせん機関を利用して特別養子縁組が成立した際の手数料を一部補助することで、養子縁組民間あっせん機関を利用して特\n別養子縁組を行う際の経済的負担解消を図る。\n◆児童の養育環境整備等のため、児童養護施設・里親等へ補助金の交付や関連する事業を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":171,"name":"在宅子育て支援事業","bureau":"子ども未来部","dept":"子ども育成課","budget":1104448,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n主に妊娠期から就学前の子を持つ親を対象に、子育て関連の情報発信や子育て応援プログラムを実施し、子育て家庭の不安を軽減する。ま\nた、子育て中の保護者の心身リフレッシュのため、児童を一時的に預かり、健やかな親子関係の構築に係る支援の充実を図る。\n【概要】\n◆保護者が安心して子育てできるよう、区の子育て支援事業や子育てに関する有益な情報をアプリ等で広く提供する。\n◆子育て応援プログラムや子育て支援団体への助成により、乳幼児親子の居場所や交流の場をつくり、不安や孤独感の解消を図る。\n◆オアシスルームの実施拠点は以下のとおり12施設\n児童センター内：5施設（伊藤、小関、東五反田、西中延、北品川）\n区立保育園内：1施設（北品川第二保育園）\nその他：6施設（荏原保健センター内、ものづくり創造センター内、品川区役所第三庁舎内、平塚ゆうゆうプラザ、ぷりすくーる西五反田\n内、戸越）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":172,"name":"子どもの未来応援基金積立金","bureau":"子ども未来部","dept":"子ども育成課","budget":2500000,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆地域全体で子ども・若者および子育て世帯を支え、将来にわたり子ども等の幸福が持続する社会の実現を目指して行う事業に要する財源を\n確保するため、品川区子どもの未来応援基金を設置している。\n\n効率性\n◆執行率100％","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":173,"name":"児童相談事業","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":93643,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆児童虐待の未然防止、早期発見、早期対応を図るため、関係機関との連携を強化し、子どもと家庭に関する総合相談、地域における子ども\nと家庭に対する支援を行う。\n【概要】\n◆担当職員、専門相談員、保健師による児童家庭相談対応を行う。品川区児童相談所と連携し、児童虐待通告などがあった相談についても地\n域での支援が適していると判断されたものについては対応を行う。\n◆要保護地域対策協議会として、児童虐待に関する地域支援ネットワークを構築し、関係機関等との連絡調整を行う。\n◆乳幼児ショートステイ事業として生後5日から1歳未満までの養育に不安がある家庭の乳幼児を中心に期間7日以内で預かりを行う。\n◆保健所、保健センター等と連携し、子どもの健全な成長に懸念がある家庭に対し、児童虐待の予防的支援として養育支援訪問を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":174,"name":"子育て支援事業運営費","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":57968,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆子育て家庭に対する育児支援および子どもに関する相談に応じるため、品川区立家庭あんしんセンターにおいて各種事業を実施する。\n【概要】\n◆児童および家庭に関する総合相談(発育・発達、しつけ等)に応じ、助言・アドバイスの対応等を行う。\n◆育児支援ヘルパー派遣事業（すこやかサポート）を実施する。\n◆子育て短期支援事業として、ショートステイ・トワイライトステイを実施する。（第二種社会福祉事業）\n◆養育支援訪問事業として、専門相談および生活に関する支援を実施する。（第二種社会福祉事業）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":175,"name":"ネウボラネットワーク経費（子育て期）","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":281287,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆子どもを安心して健やかに産み育てる環境を整えるため、「妊娠～出産～育児」における切れ目のない支援を行う。\n【概要】\n◆子育てネウボラ相談事業：児童センターに子育てネウボラ相談員を配置し、子育て期の育児に関する様々な悩みや不安等の相談に応じる。\n◆産後家事育児支援利用助成事業：お子さんを養育している方の心と体のケアに対応できる家事・育児支援ヘルパー（区と提携）の利用に対\nして、サービス利用費の一部を助成する。\n◆バースデーサポート事業：1歳の誕生日を迎えるお子さんを養育している家庭に子育てについてのアンケートを送付し、回答のあった方へ\nバースデーサポートギフトを届ける。\n◆きずなレター事業：区民向けに妊娠期から出産後3歳を迎えるまでの期間、専門職が監修した成長時期に合わせた子育ての助言や、区事\n業・相談窓口を通知する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":176,"name":"ヤングケアラー支援事業","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":29009,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n　令和2、3年度に国が実施した調査では、小学6年生で約15人に1人、中学2年生で約17人に1人が「家族の世話をしている」と回答した。区に\nおいてもヤングケアラーの実態を把握し、支援に向けた相談体制を構築する。\n【概要】\n◆ＳＮＳ等を活用したオンライン相談窓口の開設・コーディネーターの配置。\n◆学校関係者や関係機関職員を対象とした研修会の開催。\n◆ヤングケアラー同士の支え合い、悩みの共有の場（ピアサポート）の開催。\n◆支援員が家庭訪問して家事支援を行う「訪問支援事業」、週2日程度の家族分の夕食または昼食を無料で提供し食事の用意の負担軽減を図\nる「配食支援事業」、訪問型で学習の機会を提供するとともに長期休暇等を利用し課外学習の場を提供する「訪問型生活・学習支援事業」、\n日本語がルーツではない家庭に通訳を派遣して通訳を担う当事者の負担軽減を図る「外国語通訳等派遣事業」を実施。\n◆主に若者ケアラーに向けて、キャリア相談を実施。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":177,"name":"ファミリーサポートセンター運営費","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":23375,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆育児の援助を行いたい者（提供会員）と受けたい者（依頼会員）からなる会員組織により、地域で子育てを支えあう仕組みづくりを行う。\n会員相互の援助活動の調整や交流を図る。\n【概要】\n◆提供会員：区内在住もしくは在勤、在学する20歳以上で育児の援助を行いたい方\n（活動前にファミリー・サポート・センターによる提供会員養成講座を受講すること）\n◆依頼会員：区内在住で、生後43日以上おおむね12才までのお子さんを持つ保護者の方で育児の援助を受けたい方\n◆援助活動の内容\n・保育施設等の保育開始前、または保育終了後の子どもの預かり\n・保育施設までの子どもの送迎\n・病後の回復期で登園または登校できない子どもの預かり　など","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":178,"name":"母子生活支援施設運営費","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":85997,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆児童福祉法に基づき、配偶者のいない女性（母親）と扶養されている18歳未満の児童を保護するとともに、自立の促進のためにその生活を\n支援する。\n【概要】\n◆母子生活支援施設「品川区ひまわり荘」を設置・運営し、支援が必要な母子を監護するとともに、その自立を促進するため、個々の家庭状\n況等に応じて、就労、家庭生活や児童の教育に関する相談及び助言などの支援を行う。\n◆品川区ひまわり荘は品川区家庭あんしんセンター内に設置されており、品川区家庭あんしんセンター条例第9条に基づき、指定管理者によ\nり管理・運営している。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":179,"name":"女性福祉事業","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":3394,"next_budget":0,"root":"","cls":"平和で人権が尊重され多様性を認め合う社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆配偶者からの暴力など、女性を取り巻く生活上・社会上の問題や悩みを解消するため、各種相談事業や必要に応じて母子等の保護を行うな\nど、女性福祉の向上と自立に向けた支援を行う。\n【概要】\n◆女性相談支援員を配置し、以下の相談・支援を行う。\n　・帰来先のない女性や母子等の保護\n　・援護を必要とする若年女性の早期発見\n　・対象者の自立にむけた相談支援","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":180,"name":"入院助産費","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":2784,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆入院して分娩する必要があるにもかかわらず、経済的な理由によりその費用を支払うことが困難な妊産婦に対し、助産施設（病院等）にお\nいて分娩の介助や看護を受けられるよう支援することで、妊産婦の負担軽減と健全な出産の確保を図ることを目的とする。\n【概要】\n◆入院助産費の助成\n　・助産施設における出産費用（分娩介助料、入院料・処置料等）について、本人からの申請により公費負担\n　　※所得制限あり","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":181,"name":"ひとり親家庭自立等支援","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":25980,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆母子及び父子並びに寡婦福祉法では、すべての母子及び父子家庭には、その児童がおかれている環境にかかわらず、心身ともに健やかに育\n成されるために必要な諸条件と、その母親や父親の健康で文化的な生活が保障されている。本理念の実現のため、ひとり親の抱える様々な問\n題に対し、各種の相談支援事業を行い自立を促すとともに、生活の安定を図ることを目的とした各種支援事業を実施する。\n【概要】\n◆ひとり親家庭の福祉推進のため、専門の相談員（母子・父子自立支援員、就労相談員、家庭相談員など）を配置し、ひとり親の抱えている\n様々な問題・課題に対して適切にサポートし、自立に向けた支援を行う。主な事業は以下のとおり。\n①相談事業（ひとり親家庭相談）  ②ひとり親家庭自立・就労支援（自立支援プログラム策定、高等職業訓練促進給付金事業他）  ③養育費\n相談支援事業  ④ひとり親家庭住宅入居支援事業  ⑤ひとり親家庭学習支援事業（ぐんぐんスクール）  ⑥ひとり親家庭一時介護事業  ⑦ひ\nとり親家庭休養ホーム事業","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":182,"name":"子ども家庭センター開設準備経費","bureau":"子ども未来部","dept":"子ども家庭支援センター","budget":17373,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n◆令和6年4月施行の改正児童福祉法において、各区市町村での「子ども家庭センター」の設置が努力義務化された。子ども家庭センターは、\n母子保健・児童福祉の両機関が一体的に相談支援を行う機関であり、品川区は、これまでの「しながわネウボラネットワーク」などで推進し\nてきた連携体制を活かし、令和7年4月の開設を目指す。\n【概要】\n◆子ども家庭センター開設に向けて、母子保健と児童福祉が一体となり支援を行える仕組みを構築する。連携会議や分科会の開催、先行自治\n体への視察、児童福祉において情報共有の円滑化を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":183,"name":"奨学金貸付事業","bureau":"子ども未来部","dept":"子育て応援課","budget":13975,"next_budget":0,"root":"","cls":"青少年の成長と自立の支援","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆修学する意志があるにもかかわらず、経済的理由により修学等が困難な者およびその保護者に対し、奨学金を貸し付け、奨学生の健やかな\n成長と経済的自立を図ることを目的とする。\n【概要】\n①在学応援資金（貸付対象：高等学校等に在学中の生徒）※平成30年度より事業開始\n　・経済的理由により修学することおよび修学に付随する課外活動等を行うことが困難な場合、子どもの将来目標を達成するために必\n　　要と認められる資金を、在学する本人（子ども）に貸付する制度。\n　・要件を満たしている場合、奨学金運営委員会の審議を経た上で貸付金返還免除となる制度がある。\n②入学準備金（貸付対象：高等学校等に入学予定の生徒（9年生）の保護者）\n　・高等学校等に入学に必要な費用を、入学を予定している子どもの保護者に貸付する制度。\n③債権回収業務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":184,"name":"子どもすこやか医療費助成事業","bureau":"子ども未来部","dept":"子育て応援課","budget":2100434,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆子どもの保険診療による医療費を助成することによリ、子どもの健全育成および保健の向上を図り、子育て支援に寄与することを目的とす\nる。 \n【概要】\n中学生までの医療費助成\n　対象者　　0歳～中学3年生（15歳到達後の最初の年度末まで）\n　助成範囲　保険診療による自己負担分、入院時食事標準負担額","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":185,"name":"高校生等医療費助成事業","bureau":"子ども未来部","dept":"子育て応援課","budget":322565,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆高校生等に係る医療費を助成することにより、高校生等の健全育成および保健の向上を図り、子育て支援に寄与することを目的とする。\n【概要】\n◆高校生等医療費助成事業\n　　対象者　　高校生等（15歳到達後の最初の4月1日から18歳到達後の最初の年度末まで）　在学要件なし\n　　助成範囲　保険診療による自己負担分および入院時食事標準負担額\n　　※令和5年4月より事業開始（令和4年度は事業準備のみ）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":186,"name":"各種手当事務","bureau":"子ども未来部","dept":"子育て応援課","budget":154751,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆家庭生活の安定、児童の健全育成および資質の向上、児童の福祉の推進に向けた各種手当事務について、区民等へ適切な周知を行い、迅速\nに対応する。\n【概要】\n◆各種手当事務（児童手当、児童育成手当、児童扶養手当など）について、窓口手続きやシステム開発などの類似する業務を一括して行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":187,"name":"児童手当給付金","bureau":"子ども未来部","dept":"子育て応援課","budget":5384454,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆父母その他の保護者が子育てについての第一義的責任を有するという基本的認識の下に、子どもを養育している者に児童手当を支給するこ\nとにより、家庭等における生活の安定に寄与するとともに次代の社会を担う子どもの健やかな育ちに資する。\n【概要】\n◆児童手当（令和6年9月分まで）\n　対象者　区内に住所があり、15歳に達する日以後の最初の3月31日までの児童を養育している世帯　　支給月　2月、6月、10月　\n　手当額　所得制限額未満 0～3歳未満15,000円、3歳～小学校修了（第1・2子）10,000円、3歳～小学校修了（第3子以降）15,000円、\n　　　　　中学生 10,000円、所得制限額以上・上限額未満 5,000円、所得上限額以上は支給なし\n◆令和6年10月分からは制度改正があり、支給対象は高校生年代まで拡大、支給月は年6回（偶数月）に変更、所得制限撤廃\n　手当額　0～3歳未満 15,000円、3歳～高校生年代（第1・2子） 10,000円、第3子以降 30,000円","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":188,"name":"児童育成手当給付金","bureau":"子ども未来部","dept":"子育て応援課","budget":475619,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆区の制度で、ひとり親や障害のある児童を養育する親などに対して手当を支給することにより、児童の心身の健やかな成長に寄与し、児童\nの福祉の増進を図る。\n【概要】\n①育成手当（月額13,500円）\n　対象　区内に住所があり、18歳に達する日以後の最初の3月31日までの児童を次のいずれかの状態で養育している父・母または養育者\n　　　　　・父母が離婚した児童　・父または母が死亡、生死不明の児童　・母が婚姻によらないで生まれた児童\n　　　　　・父または母に重度の障害がある児童　など\n②障害手当（月額15,500円）\n　対象　以下の障害のある20歳未満の児童を養育している父・母または養育者\n　　　　　・中度以上の知的障害（愛の手帳1～3度程度）　・身体障害者手帳1～2級程度　・脳性麻痺または進行性筋萎縮症","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":189,"name":"児童扶養手当給付金","bureau":"子ども未来部","dept":"子育て応援課","budget":635540,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆父または母と生計を同じくしていない児童が養育されている家庭の生活の安定と自立の促進に寄与し、児童の福祉の増進を図る。\n【概要】\n◆児童扶養手当\n　対象者　区内に住所があり、18歳に達する日以後の最初の3月31日までの児童等を、次のいずれかの状態で養育している父・母または\n　　　　　養育者\n　　　　　　・父母が離婚した児童　・父または母が死亡・生死不明の児童　・母が婚姻によらないで生まれた児童　\n　　　　　　・父または母に重度の障害のある児童　など\n　支給月　奇数月\n　手当額　月額45,500円～10,740円　児童2人の場合：月額10,750円～5,380円加算　児童3人目以降：月額6,450円～3,230円加算\n　　　　　児童3人目以降の加算額は、令和6年11月分から児童2人目の加算額と同額に引き上げ","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":190,"name":"子育て世帯生活支援特別給付事業","bureau":"子ども未来部","dept":"子育て応援課","budget":194945,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n◆エネルギー、食料品等の物価高騰による、家計への影響が特に大きい低所得の子育て世帯へ、臨時的な措置として給付金を支給する\n　ことにより、負担の軽減を図ることを目的とする。\n【概要】\n◆子育て世帯生活支援特別給付金【低所得の子育て世帯に対する物価高騰対策支援給付金(こども加算分)】令和6年度繰越明許予算\n　　対象者　「住民税非課税世帯物価高騰対策追加給付金」の受給者で、18歳以下の児童を扶養している世帯\n　　支給額　児童1人につき5万円\n◆子育て世帯生活支援特別給付金【住民税非課税世帯等物価高騰対策支援給付金(こども加算分)】令和6年4月補正予算、12月補正予算\n　　対象者　基準日時点で品川区に住民登録があり、令和6年度（定額減税前）の住民税が非課税または均等割のみ課税となる世帯の\n　　　　　　うち、「住民税非課税世帯等物価高騰対策支援給付金」の受給者で、18歳以下の児童を扶養している世帯\n　　支給額　児童1人につき5万円【4月補正予算】、児童1人につき2万円【12月補正予算】","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":191,"name":"子どもの未来応援事業","bureau":"子ども未来部","dept":"子育て応援課","budget":74091,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n生まれ育った環境や親の経済状況が、世代を超えて子どもの将来へ連鎖することがないよう、地域や企業と連携し、子どもの食の支援を通じ\nて、子どもの貧困や環境格差改善を図る。\n\n【概要】\n主な事業は以下のとおり。\n◆しあわせ食卓事業\n◆子育て世帯へのお米支援プロジェクト\n◆子ども食堂開設・運営支援\n◆子ども食堂運営者等へのフードパントリー事業支援","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":192,"name":"ひとり親家庭医療費助成事務","bureau":"子ども未来部","dept":"子育て応援課","budget":69532,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆ひとり親家庭等に対し、医療費の全部または一部を助成することにより、ひとり親家庭等の健康を維持し、\n　もって福祉の増進を図ることを目的とする。\n【概要】\n◆ひとり親家庭等医療費助成事業\n　　対象者　　0歳～高校生等（18歳に達する日以後の最初の年度末、中度以上の障害がある児童については20歳未満）\n　　　　　　　までの子どもを養育しているひとり親家庭等　 ※所得制限あり\n　　助成範囲　保険診療による自己負担分\n　　自己負担　住民税課税世帯：自己負担1割　住民税非課税世帯：自己負担なし","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":193,"name":"ひとり親世帯臨時特別給付金","bureau":"子ども未来部","dept":"子育て応援課","budget":48998,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n◆国の子育て世帯生活支援特別給付金の対象とならないひとり親世帯に対し、所得制限なしで区独自の給付金事業を実施する。\n\n【概要】\n◆ひとり親世帯臨時特別給付金\n　対象者　平成18年4月2日（特別児童扶養手当対象児童は平成17年1月2日）から令和7年1月1日までの間に出生した児童を養育する\n          ひとり親世帯\n　支給額　児童1人につき2万円","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":194,"name":"ベビーシッター利用支援事業費","bureau":"子ども未来部","dept":"保育入園調整課","budget":368701,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆ベビーシッター利用支援（事業者連携型）：認可保育園等に入園できなかった場合の保育施設の代替手段としてベビーシッターを利用する\n場合、利用料の一部を負担することにより、保護者の復職等を支援する。\n◆ベビーシッター利用支援（一時預かり利用支援事業）：日常生活上の突発的な事情等により、一時的に保育が必要になった保護者がベビー\nシッターを利用する場合の利用料を助成することにより、保護者の多様な保育ニーズに応えるとともに経済的負担の軽減を図る。\n【概要】\n◆ベビーシッター利用支援（事業者連携型）：認可保育園等への入園が不承諾となった場合にベビーシッター事業者を利用する場合、1時間\nあたり150円の負担でベビーシッターを利用できるよう、利用料の一部を負担軽減する。\n◆ベビーシッター利用支援（一時預かり利用支援事業）：日常生活上の突発的な事情等により、一時的にベビーシッターによる保育を必要と\nする保護者に対し、利用料の一部を助成する。（日中：1時間あたり上限額2,500円　夜間：1時間あたり上限額3,500円）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":195,"name":"保育園改築事業","bureau":"子ども未来部","dept":"保育入園調整課","budget":840984,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区立保育園の改築を計画的に進め、安全かつ安心で質の高い保育を提供するとともに、施設利用者の利便性・安全性を向上させ、地域にお\nける子育て支援を推進する。\n\n【概要】\n◆品川区内保育園等あり方基本方針に基づいた、施設の耐用年数等を考慮した計画的な改築により、保育環境を充実させるとともに、保育需\n要や多様な子育てニーズ等を反映した特色ある施設づくりを進める。\n◆保育園は園庭の狭い施設が多く、同敷地内への仮設園舎の設置が難しいことから、近隣の区有地等に仮設園舎を建築して一時的に移転さ\nせ、本園舎を整備する手法を軸として、区立保育園の改築を計画的に進めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":196,"name":"ぷりすくーる西五反田経費","bureau":"子ども未来部","dept":"保育入園調整課","budget":254892,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆小学校就学前の乳幼児に対し、保育所および幼稚園の相互の特色を生かした保育および教育を継続的かつ一体的に行なうことにより、乳幼\n児の健全な育成を図るとともに、地域における子育て家庭を支援する。\n【概要】\n◆保育園部門（0～2歳児：定員46人）、幼児教育部門（3～5歳児：定員54人）、ふれあい交流室（地域の子育て家庭に対する支援）を併設し\nた公設民営の就学前乳幼児教育施設である。\n◆延長夜間保育、預かり保育の他、キッズダンスなどの特別プログラムを実施し様々なニーズに応えている。\n◆とうきょうすくわくプログラム推進事業を活用し、園児の興味・関心に応じた探究活動を実施している。\n◆ふれあい交流室では、地域の子育て家庭に対し子育て相談や各種講座を実施し、通園児に限定しない総合的な子育て支援施策を実施してい\nる。\n◆運営は、指定管理者制度により社会福祉法人福栄会が行っている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":197,"name":"保育入園調整事務費","bureau":"子ども未来部","dept":"保育入園調整課","budget":125100,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆保育入園調整課における事務執行を行い、児童福祉の向上に努める。\n\n【概要】\n◆保育入園調整課における事務執行を行う\n　①認可保育園等の入園調整および保育料徴収事務経費\n　②保育施設の支援および指導検査事務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":198,"name":"認可外保育施設等保育料助成","bureau":"子ども未来部","dept":"保育入園調整課","budget":866962,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆認可外保育施設や認証保育所を利用する児童の保護者に対し、利用費および保育料の一部を給付・助成することにより、保護者の経済的負\n担を軽減するとともに、安心して子どもを産み育てられる環境づくりを推進する。\n【概要】\n◆認可外保育施設施設等利用費給付：認可外保育施設や認証保育所を利用する児童の保護者（0～2歳児は住民税非課税世帯のみ）に対し、国\nの幼児教育無償化に伴う施設等利用費を給付する。（0～2歳児 上限月額42,000円・3～5歳児 上限月額37,000円）\n◆認可外保育施設保育料助成：認可外保育施設や認証保育所を利用する児童の保護者に対し、保育料の一部を助成する。\n（0～2歳児(課税世帯第1子) 上限月額40,000円・0～2歳児(課税世帯第2子以降) 上限月額67,000円・0～2歳児(非課税世帯) 上限月額25,000\n円・3～5歳児 上限月額20,000円）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":199,"name":"私立幼稚園保育料助成","bureau":"子ども未来部","dept":"保育入園調整課","budget":1010527,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆私立幼稚園等に通園している園児保護者に対し、利用費および保育料の一部を給付・助成することにより、保護者の経済的負担を軽減する\nとともに、幼児教育の振興と充実を図る。\n【概要】\n◆私立幼稚園施設等利用費給付\n私立幼稚園等に通園させている園児保護者に対し、国の幼児教育無償化に伴う施設等利用費（上限月額25,700円）を給付する。\n◆私立幼稚園施設等利用費給付（預かり保育分）\n私立幼稚園等に通園させている園児保護者が預かり保育を利用する場合、国の幼児教育無償化に伴う施設等利用費（上限月額11,300円）を給\n付する。\n◆私立幼稚園等入園料補助金　◆私立幼稚園等園児保護者補助金\n私立幼稚園等に通園させている園児保護者に対し、入園料の一部（上限100,000円）や保育料の一部（上限月額13,200円）を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":200,"name":"保育園運営費","bureau":"子ども未来部","dept":"保育施設運営課","budget":2605541,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆保護者が就労や疾病等のために乳幼児の保育を必要とする場合に、保護者に代わって保育する。\n◆乳幼児の健やかな発達と保護者の子育てを支援する。\n\n【概要】\n「公立保育園（33園）の運営」、「特別支援児等の健やかな発達」、「保護者支援等」\n　①基本保育、特別保育（延長夜間、一時、休日、年末、病後児）\n　②給食提供業務\n　③特別支援児巡回相談、育児相談会\n　④子育て支援事業（食育推進、一日保育士体験、チャイルドステーション）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":201,"name":"保育園維持管理費","bureau":"子ども未来部","dept":"保育施設運営課","budget":521149,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆認可公立保育園（33園）の運営にかかる施設の維持管理を行う。\n\n【概要】\n「公立保育園の維持管理」\n　①電気・ガス・水道・電話料金等支出\n　②管理用消耗品等（保育環境整備消耗品を含む）\n　③園舎清掃委託・リフト等保守委託\n　④建物小破修理\n　⑤施設整備の実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":202,"name":"就学前教育推進事業","bureau":"子ども未来部","dept":"保育施設運営課","budget":93152,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆0歳から就学前までの全ての子どもたちが保育園と幼稚園の区別なく等しく質の高い保育・教育を提供する。\n◆小学校へのスムーズな移行ができるよう乳幼児教育の充実を図る。\n【概要】\n「保育者のスキル向上」、「保育園・幼稚園と小学校の連携」、「質の高い乳幼児教育の提供」\n　①のびしなプロフェッショナルスクール\n　②保幼小ジョイント事業\n　③保育・教育の充実（ＩＣＴ体験事業、運動・体力向上事業、教材・教具の充実）\n　④公・私立保育園地域連携推進事業","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":203,"name":"幼保一体施設保育園運営費","bureau":"子ども未来部","dept":"保育施設運営課","budget":438431,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆保護者が就労や疾病等のために乳幼児の保育を必要とする場合に、保護者に代わって保育する。\n◆乳幼児の健やかな発達と保護者の子育てを支援する。\n◆幼稚園と保育園のそれぞれの培ってきた利点を融合させ、乳幼児期に一貫した保育・教育を行う。\n【概要】\n「幼保一体施設における区立保育園6園（八潮南保育園、二葉つぼみ保育園、台場保育園、西五反田第二保育園、荏原西第二保育園、五反田\n第二保育園）の運営」、「特別支援児等の健やかな発達」、\n　①基本保育、特別保育（延長夜間、一時、休日、年末、病後児）\n　②給食提供業務\n　③特別支援児巡回相談\n　④子育て支援事業（食育推進、一日保育士体験、チャイルドステーション）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":204,"name":"幼保一体施設幼稚園運営費","bureau":"子ども未来部","dept":"保育施設運営課","budget":91650,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆生涯にわたる人格形成の基礎を培う乳幼児期における質の高い教育・保育環境を整備し、子育ち・親育ちを支援する。\n◆保護者が就労や疾病等のために乳幼児の保育を必要とする場合に、保護者に代わって保育する。\n\n【概要】\n「幼保一体施設における区立幼稚園6園（平塚幼稚園、御殿山幼稚園、第一日野幼稚園、台場幼稚園、二葉幼稚園、八潮わかば幼稚園）の運\n営」、「特別支援児等の健やかな発達」\n　①預かり保育\n　②給食提供業務（預かり保育（平塚、御殿山、二葉、八潮わかば）・給食体験（第一日野、台場））\n　③特別支援児巡回相談","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":205,"name":"幼保一体施設維持管理費","bureau":"子ども未来部","dept":"保育施設運営課","budget":168672,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆園児が安全に園生活を送ることができるよう、施設の維持管理を行う。\n\n【概要】\n「幼保一体施設6園（平塚すこやか園、御殿山すこやか園、第一日野すこやか園、のびっこ園台場、二葉すこやか園、八潮すこやか園）の維\n持管理」\n　①光熱水費の支出（電気・ガス・水道・電話料金等）\n　②各種設備保守点検委託（空調機保守点検・警備業務・消防設備保守点検他）\n　③施設整備の実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":206,"name":"公設民営保育園経費","bureau":"子ども未来部","dept":"保育施設運営課","budget":910308,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆保護者が就労や疾病等のために乳幼児の保育を必要とする場合に、保護者に代わって保育する。\n◆乳幼児の健やかな発達と保護者の子育てを支援する。\n\n【概要】\n「公設民営保育園5園（ひがしやつやま保育園、三ツ木保育園、八潮北保育園、八潮西保育園、一本橋保育園）の運営」、「特別支援児等の\n健やかな発達」、「保護者支援等」\n　①基本保育、特別保育（延長保育、一時保育、空きスペース利用型年間保育事業）\n　②特別支援児巡回相談","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":207,"name":"病児・病後児保育委託","bureau":"子ども未来部","dept":"保育施設運営課","budget":85364,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆児童が病気で集団保育が困難であり、保護者が仕事を休めない場合の保護者の子育てと就労の両立支援を行う。\n\n【概要】\n◆保育園や幼稚園等に通園している子どもが病気のため集団保育が困難で、家庭で保育ができない場合に、\n　医療機関および保育所に併設している病児保育室において看護師などが一時的に保育を実施する。\n　①病児保育（病気時）\n　②病後児保育（病気の回復期）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":208,"name":"幼稚園運営費","bureau":"子ども未来部","dept":"保育施設運営課","budget":21475,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆生涯にわたる人格形成の基礎を培う幼児期における質の高い教育・保育環境を整備し、子育ち・親育ちを支援する。\n◆保護者が就労や疾病等のために幼児の保育を必要とする場合に、保護者に代わって保育する。\n\n【概要】\n「公立幼稚園3園（城南幼稚園、浜川幼稚園、伊藤幼稚園）の園務運営（幼保一体施設6園を除く）」\n　①教育環境の提供、預かり保育\n　②特別支援児巡回相談","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":209,"name":"幼稚園維持管理費","bureau":"子ども未来部","dept":"保育施設運営課","budget":23708,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆園児が安全に園生活を送ることができるよう、施設の維持管理を行う。\n\n【概要】\n「公立幼稚園3園（城南幼稚園、浜川幼稚園、伊藤幼稚園）の維持管理」\n　①光熱水費の支出（電気・ガス・水道・電話料金等）\n　②各種設備保守点検委託（空調機保守点検・警備業務・消防設備保守点検他）\n　③園舎改修工事","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":210,"name":"区内私立保育園経費","bureau":"子ども未来部","dept":"保育施設運営課","budget":20657247,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆私立保育園において安全・安心な運営がなされるような環境の整備および保育提供体制の充実を図ること。\n◆私立保育園における保育の質の向上により保育サービスの充実を図ること。\n◆私立保育園における特別支援保育の充実を図ること。\n\n【概要】\n◆子ども・子育て支援法による公定価格に基づき委託費を支給するとともに、職員配置の充実および保育所の運営の安定化を図るための区独\n自の運営費助成を行う。\n◆運営費助成のほか、保育の質の向上のため保育士の処遇改善や各種保育事業に対して助成を行う。\n◆私立保育園にて特別な配慮を要する児童の受入体制を整備するほか、臨床心理士および学校心理士による専門性を活かした巡回相談を実施\nする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":211,"name":"地域型保育事業経費","bureau":"子ども未来部","dept":"保育施設運営課","budget":987987,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n　◆保育所の最低定員数である20名未満の少人数を対象に、家庭に近い雰囲気のもと、きめ細やかな保育を実施することにより、主に0歳か\nら2歳までの乳幼児の健やかな育ちを支援する。\n\n【概要】\n　◆子ども・子育て支援法による公定価格に基づき地域型保育給付費を支給するとともに、区独自の運営費を助成することにより、事業実施\nの安定化を図ることで児童の保護者に多様な保育事業の提供を促進し、児童福祉の向上を図ることを目的とする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":212,"name":"認証保育所経費","bureau":"子ども未来部","dept":"保育施設運営課","budget":1488704,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆認証保育所の運営費等を助成することにより、多様な保育サービスの提供、保育所における安心・安全の向上を図る。\n\n【概要】\n◆平成13年度より東京都の待機児童対策として大都市特有の保育ニーズに対応し、特に需要の大きい低年齢児の受け入れを行うため「0歳児\n保育」、「13時間開所」を義務付けた認証保育所制度を創設した。民間事業者の創意工夫を生かし、入所調整制度ではなく保育園と利用者と\nの直接契約により利用者本位のサービスを提供するものである。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":213,"name":"認可外保育施設等経費","bureau":"子ども未来部","dept":"保育施設運営課","budget":129036,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆商店街の店舗等地域の空きスペースを利用した子育て交流ルームの運営に助成金を交付することにより、品川区のすべての子育て家庭が、\n安心と喜びをもって子育てができる地域で支えるネットワークの構築を支援することを目的とする。\n\n効率性\n◆保護者・園児が利用する保育施設の類型を問わず、安心して施設に通えるような保育環境の整備のため、国や都の補助金を活用し、保育事\n業者に対して要綱に基づいた運営費助成等を行っている。事業の執行率は安定的に推移しており、今後も国・都支出金を活用しながら、保育\nの質を確保していく。\n\n【概要】\n◆子育て支援のNPO法人が実施する「子育て交流ルーム」に対し、運営費の助成を行う。\n場所：品川地区・北品川商店街（品川宿おばちゃんち）\n　　　荏原地区・昭和通り商店会（昭和通りおばちゃんち）\n保育事業者：NPO法人「ふれあいの家－おばちゃんち」\n実施内容：一時預かり事業、短時間契約保育、子育て相談\n定員：（品川宿）14人、（昭和通り）15人","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":214,"name":"区外保育園委託","bureau":"子ども未来部","dept":"保育施設運営課","budget":167211,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆保護者が品川区外の保育園にて保育を希望した場合における、安定的な保育サービスの提供を行うこと。\n【概要】\n◆子ども・子育て支援法第24条第1項および第5項を根拠として、品川区に居住する児童が、区外の公立・私立保育園に通う場合に、児童福祉\n法第24条第1項に基づく保育の実施に係る費用を、公立保育園についてはその施設の存する自治体へ、私立保育園についてはその設置者に支\n払う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":215,"name":"私立幼稚園経費","bureau":"子ども未来部","dept":"保育施設運営課","budget":361445,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆私立幼稚園における質の高い教育・保育サービスの安定的な供給および充実を図ること。\n\n【概要】\n◆子ども・子育て支援法上の公定価格に基づき算定した施設型給付費を支給することにより、区内私立幼稚園において質の高い教育・保育\nサービスの供給を図る。\n◆区内私立幼稚園設置者および品川区私立幼稚園協会に対して、必要な補助金を交付することにより、幼児教育の振興を図る。\n◆私立幼稚園において、特別な配慮を要する児童の受入体制を整備するほか、学校心理士による専門性を活かした巡回相談を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":216,"name":"児童相談所移管推進事業","bureau":"品川区児童相談所","dept":"児童相談課","budget":78844,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n◆住民生活に身近な基礎自治体として、区立の児童相談所を開設することにより、子ども・家庭支援のあらゆる場面において子どもの最善の\n利益の実現を図り、すべての子どもの権利が保障されることを目的とする。\n【概要】\n◆子どもの最善の利益と権利擁護に資する相談、援助、一時保護等を一貫して支援するための施設を整備する。\n◆児童相談所の運営に必要な人材の確保を進めるとともに、近隣自治体への職員派遣や研修の実施等により、人材の育成を図る。\n◆運営に係る課題や児童相談所設置市事務の検討を進めるとともに、運営方法の検討や業務マニュアルの作成を着実に進める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":217,"name":"児童相談所運営費","bureau":"品川区児童相談所","dept":"児童相談課","budget":149439,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"A 拡大する事業","ev_detail":"新規の取組み","gai":"","legal":"","law":"","desc":"【目的】\n◆区民にとって身近な基礎自治体が児童相談所を運営し、相談や援助、子どものケア、保護者支援、家庭復帰まで一貫して支援することによ\nり、子ども・家庭支援のあらゆる場面において子どもの最善の利益の実現を図り、すべての子どもの権利が保障されることを目的とする。\n【概要】\n◆医師や弁護士等の人材を確保しながら、専門研修や外部講師の招へいによる研修を実施することで職員の人材育成に取り組む。\n◆区の児童虐待通告の一義的な窓口を担っていることから、子どもとその家庭に関する様々な相談を24時間・365日受け付けるための相談受\n付体制を整備する。\n◆子どもや家庭を支援するための各種事業（里親養育包括支援事業、メンタルフレンド事業、未成年後見人事業等）を実施する。\n◆児童相談所を運営するうえで必要となる事務用品や書籍、郵券等を購入するほか、円滑にケースワークを行うために携帯電話等を配備す\nる。\n◆児童虐待防止等の周知・啓発を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":218,"name":"一時保護所運営費","bureau":"品川区児童相談所","dept":"児童相談課","budget":40106,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n一時保護所は、虐待や養育困難等の状況にある概ね2歳から18歳までの子どもを一時的に家庭から分離し、安全で安心できる環境を提供する\n施設である。一時保護中に子どもの心身の安定を図るとともに、今後の支援方針や適切な措置を検討する役割を担う。\n【概要】\n◆一時保護中の子どもが心身ともに安心して規則正しく生活できるよう、生活に必要な衣服、消耗品等をそろえるとともに、集団生活の中で\nのストレスを軽減するため、児童の気分転換や情緒の安定を図ることを目的に、書籍や遊具等を利用できる環境を整備する。\n◆保護期間中においても子どもに学習の機会を提供するほか、子どもの発達に応じた体力づくりや体を動かすことによるストレス解消を図る\nため、運動できる環境を整備する。\n◆一時保護所での生活に変化と楽しみを与えるとともに、行動観察の一助とするため、季節・文化に由来する行事の体験の機会を設ける。ま\nた、外出することで公共交通機関等の利用に関するマナーを学び、社会性を身に付ける機会とする。\n◆温かく楽しい食事環境により子どもの心と体の安定と成長を促すことを目的とし、給食の提供を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":219,"name":"児童相談所維持管理経費","bureau":"品川区児童相談所","dept":"児童相談課","budget":76933,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆施設の適正な維持管理\n◆児童相談所および一時保護所業務に必要なサービス加入等ハード面の整備\n◆子どもの安全およびプライバシーを守るための施設整備\n【概要】\n◆光熱水費や電話料金等の支払い\n◆インターネット環境の整備\n◆警備・受付や清掃、設備維持管理等の業務委託\n◆施設の維持管理に必要な物品等の購入\n◆施設の維持管理や子どもの安全確保に必要な工事・修繕","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":220,"name":"高齢者安否確認事業","bureau":"福祉部","dept":"福祉計画課","budget":72964,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆高齢者の見守り体制を整備することにより、生活の安全を確保する。\n【概要】\n①救急代理通報システム\n◆65歳以上のひとり暮らし高齢者等を対象に、自宅内で病気や事故などの緊急事態が生じた際、派遣員が即時援助に駆けつける。\n②長寿お祝い事業\n◆長寿を祝し、お祝い品を贈呈することで、いきいきと暮らし続けることを支援する。また受領を確認することで、安否確認を行う。\n③高齢者等地域見守りネットワーク事業\n◆高齢者の不安を解消するため、町会・自治会の見守り活動の支援や民間事業者との協定による見守り推進に向けた施策を展開する。\n④災害時自動安否確認システム\n◆区からの情報提供や安否確認の連絡を一斉発信する機能とAIを組み合わせたシステムにより、非常時の安否確認を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":221,"name":"高齢者福祉施設整備費","bureau":"福祉部","dept":"福祉計画課","budget":1918085,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者が住み慣れた地域で安心して生活が続けられるよう、高齢者福祉施設の整備を促進する。\n◆在宅での生活が難しくなった際のセーフティーネットとして、多様な入所・入居系施設の整備を促進する。\n【概要】\n◆民間事業者による高齢者福祉施設を誘致するため、整備助成を実施する。また、民間事業者による施設整備を推進するため、不動産所有者\n等を対象としたセミナーおよび個別相談会を実施する。\n◆高齢者人口の推移に合わせてサービス量を適切に見込みつつ、限られた資源を十分に活用しながら計画的に特別養護老人ホーム、認知症高\n齢者グループホーム、小規模多機能型居宅介護（看護含む）等の高齢者福祉施設を整備する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":222,"name":"社会福祉法人認可・指導監査事務費","bureau":"福祉部","dept":"福祉計画課","budget":311,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者・障害者・保育等に係る社会福祉事業を運営する社会福祉法人への認可・指導監査を行い、法人の適正かつ安定的な運営の確保を図\nる。\n【概要】\n◆区内のみに事業所が所在する社会福祉法人の法人設立認可、定款変更認可・変更届等、指導監査（実地検査）を行い、適正な法人運営と社\n会福祉事業の健全な経営の確保を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":223,"name":"地域福祉推進費","bureau":"福祉部","dept":"福祉計画課","budget":180191,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆包括的な支援体制の構築を推進し、支え合い・助け合いの意識の醸成を図ることにより、地域における共生社会の実現を目指す。\n【概要】\n①支え愛・ほっとステーション事業\n◆地域における身近な福祉の相談窓口として、関係機関と連携し、必要なサービス・支援につなげる。\n②重層的支援体制整備事業\n◆地域住民の複雑化・複合化した課題に対応するため、既存の制度や分野を超えた支援体制の構築を図る。\n③孤独・孤立対策推進事業\n◆無料匿名チャット相談窓口を開設し、孤独・孤立問題の重症化予防に向けた取組みを推進する。\n④ユニバーサルデザイン普及啓発事業\n◆「おたがいさま運動」の実施を通じて、多様性への理解を促進し、お互いを認め合う意識を醸成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":224,"name":"民生委員活動経費","bureau":"福祉部","dept":"福祉計画課","budget":74184,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆地域住民の立場に立って各関係機関と協力し、高齢者、障害者、子育て家庭や生活困窮家庭等の様々な相談に応じる民生・児童委員の活動\nを支援することで地域福祉の推進を図る。\n【事業概要】\n◆民生・児童委員の活動基盤として、協議会、研修等を開催し民生委員制度の運営を支援する。\n◆民生・児童委員の欠員地区等において、適格な候補者を選出し都知事へ推薦する。\n◆主任児童委員を除く民生・児童委員を高齢者相談員として委嘱し、高齢者等への見守りや訪問活動を通じて、安否確認や各種サービス利用\n等の相談・助言を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":225,"name":"成年後見制度経費","bureau":"福祉部","dept":"福祉計画課","budget":17676,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆認知症高齢者の急増を背景に、認知症により判断能力が低下した高齢者等の権利擁護の充実と推進を図る。 \n【概要】\n◆家庭裁判所に後見人付与の申立てができない人のために、区長申立ての手続を行う。\n◆成年後見制度の利用の促進に関する法律（平成28年法律第29号）に基づき、品川区成年後見制度利用促進基本計画を策定した。（令和6年\n「品川区第4期地域福祉計画」と統合）\n　当該計画に基づき、区と品川区社会福祉協議会とが、中核機関（地域連携ネットワークを構築するにあたり中核となる機関）として一体と\nなり成年後見制度の利用を推進する。\n◆品川区社会福祉協議会に対し、品川成年後見センター運営のための人件費と事業費を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":226,"name":"福祉計画事務費","bureau":"福祉部","dept":"福祉計画課","budget":20192,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者の社会参加や自主的な共助活動を支援する。\n【概要】\n◆ほっとサロン事業助成                                                                                        \n地域での『支え合い』を推進する拠点として、区有施設の有効活用を通じて、自主的な地域ボランティア活動の場を提供する。また、区内で\n自主活動を行っているほっとサロンの事業運営を支援し、地域の高齢者が主体となった生きがい活動や支え合いを推進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":227,"name":"障害者施策推進経費","bureau":"福祉部","dept":"障害者施策推進課","budget":5788,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者等が安心して地域で暮らし続けられるように、地域共生社会の実現を目指し、総合的・計画的に障害者施策を推進する。\n【概要】\n①障害者差別解消推進事業\n◆障害者差別の解消や障害者理解の普及啓発を行うため、区民等へ啓発用リーフレットの配布や障害者差別解消支援地域協議会を設置し、関\n係機関の連携を図る。また、障害者差別解消推進本部を設置し、障害者差別の解消に向けた取組みを推進する。\n②障害者福祉サービス第三者評価受審支援事業\n◆区立施設の福祉サービス等第三者評価受審の実施および民間事業所の福祉サービス第三者評価受審支援に要する経費を補助する。\n③障害者計画等策定・推進事業\n◆計画の進捗状況の検証および分析・評価を行うため、障害福祉計画等推進委員会を設置し、施策の実施状況、取り組み成果や課題、推進施\n策の提案などを協議し、計画の推進を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":228,"name":"障害福祉サービス事業者指定等経費","bureau":"福祉部","dept":"障害者施策推進課","budget":528,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆障害福祉サービス事業所等に対して指導検査を実施し、障害福祉サービス等の質の確保および向上、自立支援給付の適正化を図る。\n【概要】\n◆障害福祉サービス事業所等に訪問し、検査（書類検査・ヒアリング等による運営状況等の確認）を実施し、必要に応じて助言・指導などの\n改善措置を講ずる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":229,"name":"障害者福祉施設等整備費","bureau":"福祉部","dept":"障害者施策推進課","budget":247065,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者の高齢化・重度化・親なき後に備えるとともに、住み慣れた地域で安心して自分らしい暮らしができるよう、障害者の生活基盤を整\n備する。\n【概要】\n①障害者グループホームの整備促進\n◆民間事業所による障害者グループホームを誘致するため、整備費助成を継続して実施する。\n◆障害者の重度化・高齢化・親なき後にも対応した障害者グループホームを整備する。\n②重症心身障害者通所施設（ピッコロ）の定員拡充\n◆八潮南特別養護老人ホーム等の増改築にあたり、重症心身障害者通所施設（ピッコロ）を移転し定員を拡充する。\n③療育支援体制の充実\n◆区内全体の療育支援体制を充実するため、児童発達支援センターを整備する。（小山台2丁目、戸越6丁目）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":230,"name":"障害者施策関係事務費","bureau":"福祉部","dept":"障害者施策推進課","budget":605,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆課の円滑な事務運営を図るため。\n【概要】\n◆他事業を円滑に遂行するために、消耗品の購入や職員旅費を執行する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":231,"name":"権利擁護支援事業","bureau":"福祉部","dept":"障害者支援課","budget":3282,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区長申立制度を利用し、身寄りのない、または親族の支援を受けられない知的障害者や精神障害者に後見人等の申立てをし、財産管理・身\n上保護を行う。また、成年後見人等の報酬の一部を助成することで、成年後見制度の利用促進を図り、障害者が地域で安心・安全な生活を送\nれるようにする。その他、障害者虐待防止法に基づき、障害者虐待の予防および早期発見、虐待を受けた障害者の迅速かつ適切な保護および\n自立の支援ならびに適切な擁護者に対する支援を行うことにより、障害者の権利を擁護する。\n【概要】\n①成年後見制度における区長申立ての実施\n◆後見人等の選任が必要な知的障害者や精神障害者に対して区長申立ての制度を活用して、後見開始等申立てを家庭裁判所に行う。\n②費用の求償◆資力のある知的障害者や精神障害者（被後見人等）に対しては、後見人等選任後に申立て費用の求償を行う。\n③成年後見人等報酬助成◆助成を受けなければ制度の利用が困難な障害者に成年後見人等の報酬額の一部を助成する。\n④障害者虐待防止対策支援事業◆虐待等により一時的に避難が必要な際、緊急一時保護施設の提供を行う業務を委託する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":232,"name":"障害者理解・普及啓発事業","bureau":"福祉部","dept":"障害者支援課","budget":16777,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者就労施設等で製作された製品の販売や、各種イベントの実施により、障害者に対する区民の理解と関心を深める。\n【概要】\n①障害者週間記念のつどいの開催\n◆区民の障害者福祉への理解促進および普及啓発を行うため、毎年障害者週間（12月3日～12月9日）に合わせて実施。\n②障害者作品展\n◆障害のある人たちの趣味や技術を活かした作品、リハビリテーション活動の中で作成した作品を展示することにより、区民の障害福祉への\n関心と理解を深める。\n③手話理解促進\n◆手話言語条例の制定を機に、区民や事業者に対して手話の理解促進を図る。\n④障害者まつり、⑤障害者レクリエーション、⑥福祉ショップ運営費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":233,"name":"基幹相談支援センター運営費","bureau":"福祉部","dept":"障害者支援課","budget":281543,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者等の重症化・高齢化や「親なき後」に備えるとともに、住み慣れた地域で安心して自分らしい暮らしができるよう、サービスや相談\n支援の充実を図る。\n【概要】\n①品川区精神障害者地域生活支援センターの運営費補助\n◆品川区精神障害者地域生活支援センター　たいむの運営費を補助する。\n②障害者版福祉カレッジ\n◆障害福祉サービスや相談の質の向上を目指して、介護福祉専門学校の福祉カレッジを活用し、計画的な人材育成に取り組むことで地域全体\nの支援力向上を図る。\n③障害者福祉システムの保守・運用、④障害認定支援システムの保守・運用、⑤同行援護従事者養成研修、⑥介護給付費等支給審査会、⑦地\n域自立支援協議会、⑧障害児者の包括支援相談体制整備促進事業、⑨障害者相談支援システムネットワーク経費　等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":234,"name":"障害者介護給付事務","bureau":"福祉部","dept":"障害者支援課","budget":3030898,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n　障害者総合支援法に基づく介護給付費の支給および知的障害者施設送迎事業を行うことで、障害者の福祉の向上を図る。また、利用者負担\n軽減のための各種軽減措置を行うことで、利用者が障害福祉サービス等を安心して利用できるようにする。\n【概要】\n①介護給付費の支給\n◆（支給対象サービス）居宅介護、重度訪問介護、同行援護、療養介護、生活介護、短期入所、施設入所支援、療養介護医療費\n②知的障害者施設送迎事業\n◆重度の知的障害者を受け入れている生活介護事業所が利用者のうち障害支援区分の高い要配慮者を送迎する際の費用を助成する。\n③利用者負担軽減事業\n◆旧障害者自立支援法の施行時に行った区独自の利用者負担軽減策を継続する。また、障害者総合支援法等に基づく高額障害福祉サービス等\n給付費および多子軽減措置を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":235,"name":"障害者訓練等給付事務","bureau":"福祉部","dept":"障害者支援課","budget":2792808,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者総合支援法に基づく訓練等給付費、補装具費、自立支援医療費の支給を行うことで、障害者の福祉の向上を図る。また、同法に基づ\nく事業者に対する運営費等を補助することで、事業者の運営を安定化し、もってサービス利用者の福祉の向上を図る。\n【概要】\n①訓練等給付費の支給\n◆（支給対象サービス）共同生活援助、自立訓練（機能訓練）、自立訓練（生活訓練）、就労移行支援、就労継続支援Ａ型、就労継続支援Ｂ\n型、就労定着支援、自立生活援助\n②補装具費の支給\n◆身体障害のある人が、失われた機能を補って、日常生活や職業活動を容易にするために必要な補装具費（購入費・修理費・借受費）の支給\nを行う。\n③自立支援医療費（更生医療）の支給、④日中活動系サービス推進事業補助金、⑤障害者グループホーム支援事業 等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":236,"name":"相談支援給付等事務","bureau":"福祉部","dept":"障害者支援課","budget":208063,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者総合支援法上の障害福祉サービス、および児童福祉法上の障害児通所サービス利用に必要となる計画相談支援事業を着実に実施し、\n地域の相談支援体制を強化することで適正な障害福祉サービス等の利用を促し、自立促進を図る。\n【概要】\n◆相談支援体制の整備\n◆計画相談支援給付費等の支給\n◆地域拠点相談支援事業所への委託","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":237,"name":"地域生活支援事業","bureau":"福祉部","dept":"障害者支援課","budget":320702,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者総合支援法に基づき、障害者（児）が自立し安心して地域で生活ができるよう支援や体制整備を行う。\n【事業概要】\n①移動支援事業\n◆屋外での移動が困難な障害者（児）が外出や社会参加する機会を持ち、地域の中で生活を送れる支援体制を整える。\n②日常生活用具給付事業\n◆重度障害者に自立支援用具等の給付または貸与をすることで、日常生活の支援を行う。\n③日中一時支援事業\n◆障害児を持つ家族のレスパイトや就労支援として日中一時支援を行う。\n④医療的ケア児地域生活支援促進事業\n◆医療的ケア児等が多様な人と関わることができ、その家族が困りごとを相談できる場の提供を行う。　その他7事業実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":238,"name":"社会参加支援事業","bureau":"福祉部","dept":"障害者支援課","budget":165353,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者や外出困難な方の社会参加の利便性と生活圏の拡大を図る。また、障害者の社会生活を支えるための区内の各団体に対する助成金を\n交付することにより、団体の健全な運営を支援し、障害者の社会参加の促進を図る。\n【概要】\n①障害者福祉タクシー・自動車燃料費助成事業\n◆外出困難な障害者に対し、タクシーの利用料金または自動車燃料費の一部を助成し、生活の利便および生活圏の拡大を図る。\n②中等度難聴児発達支援事業\n◆身体障害者手帳の交付対象とならない中等度難聴児に対し、言語の習得、生活能力・コミュニケーション能力等の向上を促進するため、補\n聴器の購入・修理費用の一部を助成する。\n③車両関連助成事業（身体障害者用自動車改造費助成事業、自動車運転免許取得経費助成事業、福祉車両購入費等助成事業）\n◆障害者の社会参加の促進を図るため、車両の改造費用・運転免許取得費用の助成や福祉車両の購入等の助成を行う。　その他4事業","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":239,"name":"在宅生活支援事業","bureau":"福祉部","dept":"障害者支援課","budget":22448,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者（児）が安全な在宅生活を送ることができるよう各種支援を行う。\n【概要】\n①障害者世帯ハウスクリーニングサービス事業\n◆障害者の世帯等で、本人または家族による大掃除が困難なものに対し、日常の清掃では手の及ばない箇所の清掃を行う。\n②住宅設備改善給付事業　◆区内居住の在宅の重度身体障害者（児）に対し、中規模改修等住宅設備の改善に要する費用を給付する。\n③福祉電話助成事業　◆障害者および障害者の属する世帯に対し、電話料を助成する。\n④車いす貸出事業　⑤障害者救急代理通報システム事業　⑥住宅あっ旋事業　⑦共同生活援助家賃助成\n⑧重症心身障害児(者)在宅レスパイト・就労等支援事業　⑨障害者医療ショートステイ事業","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":240,"name":"障害者福祉手当等支給事務","bureau":"福祉部","dept":"障害者支援課","budget":940036,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者等に各種手当や見舞金を支給することにより、福祉の増進を図る。\n【概要】\n◆各種手当の支給\n①障害者福祉手当\n②特別障害者手当等\n③重度脳性麻痺者介護事業\n④被爆者見舞金\n⑤定住外国人等福祉給付金\n⑥給付事務処理委託","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":241,"name":"心身障害者福祉会館運営費","bureau":"福祉部","dept":"障害者支援課","budget":236010,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内に居住する障害者に対し、自立と社会経済活動への参加を促進するための援助を行うことにより、障害者の福祉の増進を図る。\n【概要】\n①障害者自立訓練センター\n◆機能訓練、生活介護\n②地域活動支援センター\n◆地域活動支援センター\n③旗の台障害児者相談支援センター\n◆特定相談支援事業・障害児相談支援事業・障害者総合支援法第77条第1項第3号に定める業務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":242,"name":"西大井福祉園等運営費","bureau":"福祉部","dept":"障害者支援課","budget":40381,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区立西大井福祉園は、知的障害者の保護、生活指導、作業指導を行い福祉の向上を図ることを目的とした知的障害者の通所施設であ\nる。\n◆品川区立西大井つばさの家は、施設に通所または就労している知的障害者に対し、生活の場を提供するとともに、地域社会での自立生活を\n支援するグループホームである。\n【概要】\n◆品川区立西大井福祉園および品川区立西大井つばさの家の管理運営","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":243,"name":"かがやき園運営費","bureau":"福祉部","dept":"障害者支援課","budget":158429,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆知的障害者の生活指導、作業指導を行い、福祉の向上を図る。\n【概要】\n①かがやき園運営\n◆区立施設かがやき園の管理運営。\n②重度障害者受入促進\n◆強度行動障害があり、特段の配慮が必要な障害者を受け入れている施設の円滑な運営を支援する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":244,"name":"北品川つばさの家運営費","bureau":"福祉部","dept":"障害者支援課","budget":7602,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆施設に通所または就労している知的障害者に対し、生活の場を提供するとともに地域社会での自立生活を支援する。\n【概要】\n◆北品川つばさの家（共同生活援助）の管理運営","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":245,"name":"障害者訓練センター運営費","bureau":"福祉部","dept":"障害者支援課","budget":33534,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆障害者が安心して働き続けられるよう、身近な地域において就労面と生活面の支援を一体的に提供することにより、障害者の一般就労を促\n進の拡大を図るとともに、障害者の自立と社会参加を一層促進する。\n【概要】\n①障害者就労支援事業\n◆品川区障害者就労支援センターに専門のスタッフを配置し、障害者に対する就労面の支援ならびに生活面の支援を通じて民間事業者等への\n就労につなげる。\n②超短時間雇用促進事業\n◆東京大学先端科学技術研究センターのノウハウを活用し、障害者等の多様な働き方を実現するための仕組みを構築し、企業と就労に意欲の\nある障害者等をつなげる枠組みを構築する。\n◆障害者就労支援センターを超短時間雇用促進事業を推進する中心的な機関に位置付け、企業等へのアプローチを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":246,"name":"重症心身障害者通所施設運営費","bureau":"福祉部","dept":"障害者支援課","budget":96013,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅の重症心身障害者の日中活動の場を確保し、運動機能の低下防止、健康管理等在宅療養生活の質の向上を図る。\n【概要】\n◆地域の通所施設への通所が困難な重症心身障害者（医療的なケアが必要な者を含む）を対象に、施設において入浴、理学療法、摂食指導、\n運動、制作、音楽活動を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":247,"name":"発達障害者支援施設等運営費","bureau":"福祉部","dept":"障害者支援課","budget":76013,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】◆品川区立発達障害者支援施設および品川区立上大崎つばさの家の管理運営\n【概要】\n①品川区立発達障害者支援施設\n◆発達障害者の自立および社会参加に資する支援を行う。（就労継続支援Ｂ型）。\n②品川区立上大崎つばさの家\n◆知的障害者に対し生活の場を提供するとともに地域社会での自立生活を支援することで親なき後の心配を解消する（共同生活援助）。\n③成人期支援事業\n◆発達障害と思われる方の就労に関する相談や居場所の提供、自立支援のためのプログラム提供等を行う。\n④品川区発達障害児者相談支援センター\n◆発達障害児者およびその家族への相談支援を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":248,"name":"障害児者福祉施設管理経費","bureau":"福祉部","dept":"障害者支援課","budget":9609,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"（目的）\n◆区内にある障害児者福祉施設の保守・修繕や施設運営法人に対する助成等を行い、施設の適切な管理を行う。\n（概要）\n①障害者住宅設備等保守点検\n◆区立障害者住宅（平塚きぼう荘）の保守点検を行う。\n②高温水経費助成\n◆品川総合福祉センター本部およびサンかもめに対する高温水経費の助成を行う。\n③障害児者福祉施設管理\n◆障害者支援課分室を利用した障害児者福祉施設の法定点検および経年劣化等による修繕を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":249,"name":"障害児者総合支援施設運営費","bureau":"福祉部","dept":"障害者支援課","budget":515494,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区内に住所を有する障害児および障害者の福祉の増進を図る。\n【概要】\n①児童発達支援センター品川区立品川児童学園\n◆子ども発達相談室・児童発達支援・放課後等デイサービス・保育所等訪問支援・日中一時支援\n②訪問系サービス\n◆居宅介護・重度訪問介護・同行援護・行動援護・移動支援\n③品川区南品川障害児者相談支援センター\n◆特定相談支援事業・障害児相談支援事業・障害者総合支援法第77条第1項第3号に定める相談業務\n④日中活動・短期入所系サービス\n◆生活介護・就労継続支援B型・短期入所・地域活動支援センター","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":250,"name":"障害児支援給付事務","bureau":"福祉部","dept":"障害者支援課","budget":1625207,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆児童福祉法に基づく障害児通所支援給付費の支給や障害児の療育指導員の加配を行った場合の助成を行い、障害児の福祉の向上を図る。ま\nた、医療的ケアを必要とする療育を行う事業所に支援を行うことで、区内の医療的ケア児に対する療育環境を整備する。\n【事業概要】\n①児童福祉法に基づく障害児通所給付費の支給\n◆児童発達支援、障害児通所支援等\n②障害児通所支援事業運営補助事業\n◆重症心身障害児や医療的ケアを必要とする障害児の療育を行う事業所へ助成し、医療的ケア児等に対する療育環境を整備する。\n③重症心身障害児（者）受入れ促進補助\n◆重症心身障害児（者）通所事業者に対して運営費の補助を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":251,"name":"障害者支援事務費","bureau":"福祉部","dept":"障害者支援課","budget":99403,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆課および福祉事務所の円滑な事務運営を図るための事務経費\n【概要】\n①避難行動要支援者個別計画作成\n◆「品川区要配慮者支援全体計画」では要配慮者の支援が定められており、円滑な避難支援を図るため障害者の個別避難計画を作成する。\n②障害福祉サービス等居住支援手当事業補助金\n◆障害福祉サービス等職員の処遇改善を図るため、居住支援手当を支給する。\n③障害者施設援護経費助成\n◆品川区心身障害者施設に対する援護経費助成要綱に基づき、夜勤職員、看護職員に係る体制加算および建物賃借に係る経費の一部を、品川\n区独自の援護経費を助成することで、心身障害者施設運営の充実を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":252,"name":"出石つばさの家運営費","bureau":"福祉部","dept":"障害者支援課","budget":32419,"next_budget":0,"root":"","cls":"障害のある人がいきいきと暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆施設に通所または就労している知的障害者に対し、生活の場を提供するとともに地域社会での自立生活を支援する。\n◆自宅で介護する人が病気などで一時的に介護できない場合に、短期間の入所により入浴や排せつ、食事の介護などを行う。\n【概要】\n◆出石つばさの家（共同生活援助および短期入所）の管理運営","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":253,"name":"在宅高齢者支援事業","bureau":"福祉部","dept":"高齢者福祉課","budget":665444,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅の要介護高齢者等に対し、介護保険の給付およびその他の各種サービスを提供し福祉の向上を図る。\n【概要】\n①高齢者自立支援住宅改修給付事業\n◆介護保険の住宅改修サービス事業の対象者拡充（非該当者）と内容拡充（浴槽の取り替え等）の事業を実施する。\n②在宅サービスセンター事業費\n◆区の高齢者福祉施策を老人福祉法に基づき区内社会福祉法人が設置した在宅サービスセンターにより委託実施する。\n③社会福祉協議会本部事業助成\n◆品川区社会福祉協議会における事業（さわやかサービス、紙おむつ支給事業、入院中の紙おむつ代助成事業等）に係る費用を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":254,"name":"高齢者災害対策支援事業費","bureau":"福祉部","dept":"高齢者福祉課","budget":6710,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆災害時に自ら避難することが困難な避難行動要支援者等が円滑に避難できるよう、避難体制づくりの支援を行う。\n【概要】\n◆福祉避難所において避難者を円滑に受け入れるため、災害用備蓄品を配備する。\n◆重度要介護高齢者の痰吸引等に欠かせない電源を確保するため、家庭用電源からの蓄電が可能な大型蓄電池を福祉避難所に配備する。\n◆災害時避難行動要支援者等に係る個別支援計画を、在宅介護支援センターを含む区内居宅介護支援事業所に委託し作成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":255,"name":"高齢者安否確認事業","bureau":"福祉部","dept":"高齢者福祉課","budget":3560,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n①高齢者世帯の安否確認事業\n◆高齢者の自宅における異変に対し迅速に対応し、救命、孤立死の防止を図る。\n②高齢者見守り事業\n◆高齢者の熱中症等の予防に向けた普及啓発を図り、高齢者の健康と安全を確保する。\n③外出同行支援\n◆ひとりで出かけることが不安な高齢者等にヘルパーが同行することにより、生活の質の向上や自立した日常生活の維持を図る。\n【概要】\n①自宅内での異変が疑われる際、専門業者によるドア等の解除を行う。\n②民生委員、在宅介護支援センター等による予防対策の普及啓発活動、および避暑シェルターの設置運営。\n③ひとりで出かけることが不安で自宅に閉じこもりがちな方等に対し、外出時にヘルパーが同行し不安解消や外出支援を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":256,"name":"特別養護老人ホーム運営費","bureau":"福祉部","dept":"高齢者福祉課","budget":899012,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆特に所得の低い者（生計困難者）に対する利用者負担の軽減を図るため、特別養護老人ホーム入所者を対象に介護保険利用者負担額軽減措\n置事業を実施し、所得が低くとも適切な介護施設サービスの提供が受けられる環境を整え、セーフティネットとしての介護保険制度の安定的\nな運営を図る。\n◆日常生活全般にわたり常時介護を必要とし、かつ、家庭において介護を受けることが困難な高齢者を入所させ、必要なサービスを提供す\nる。\n【概要】\n◆特別養護老人ホームを運営する社会福祉法人に対し、低所得者で生計困難である対象者に対し軽減した一定経費分を助成する。\n◆区立特別養護老人ホームにおいて、常時の介護、その他日常生活上必要なサービスを行う。\n◆特別養護老人ホームへの入所申込を、外部委員を含めた委員会にて総合的に審査し、入所の優先順位の高い方から入所できるよう登録名簿\nを作成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":257,"name":"在宅サービスセンター運営費","bureau":"福祉部","dept":"高齢者福祉課","budget":259128,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅の要介護高齢者に対し、各種サービスを提供することにより、当該高齢者およびその介護者の福祉の向上を図る。\n【概要】\n◆老人福祉法に基づき区立により整備した在宅サービスセンターにより、通所介護・認知症対応型通所介護を提供するため、より良い運営を\n行うことができる指定管理者を指定し、当該指定管理者に必要経費として協定に基づく管理運営経費を支弁する。\n①通所介護、②（介護予防）認知症対応型通所介護、③第一号通所事業、④生活介護","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":258,"name":"在宅介護支援センター運営費","bureau":"福祉部","dept":"高齢者福祉課","budget":26936,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者とその家族が、区の窓口に行かなくても身近なところで気軽に専門職員に相談できることを可能とし、介護保険サービスをはじめ、\n必要な保健・医療、福祉サービスの調整等を受けることにより、高齢者本人の在宅生活の自立支援を図る。\n【概要】\n①相談と必要なサービスの調整\n②各種保健・医療・福祉サービスの申請手続きの代行\n③福祉機器の紹介や住宅改修相談\n④要介護認定調査\n⑤基本チェックリストの実施\n⑥居宅サービス計画（ケアプラン）等の作成","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":259,"name":"地域密着型サービス施設運営費","bureau":"福祉部","dept":"高齢者福祉課","budget":107783,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅の要介護者等へ、通いや泊まり、訪問などの各種サービスを提供する小規模多機能型居宅介護事業所等に対し一定の財政支援を行い、\n事業運営の安定化と在宅サービスの充実を図る。\n【概要】\n◆区立地域密着型多機能ホームおよび認知症高齢者グループホームに対して管理運営経費（指定管理料）を支弁し、区立施設として要介護状\n態となった高齢者等の住み慣れた地域での生活を支援する。\n◆民間の（看護）小規模多機能型居宅介護事業所に対して、運営支援に係る補助金を支弁し、地域密着型サービスの充実を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":260,"name":"高齢者福祉施設支援事業","bureau":"福祉部","dept":"高齢者福祉課","budget":315007,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n①法人に対する助成金\n◆区内社会福祉法人の安定した事業経営を支援するとともに、区の独自性に優れた高齢者福祉施策の向上を図る。\n②老人保護措置費\n◆日常の生活環境や経済上の理由によって、自宅で生活することが困難な高齢者を、養護老人ホームに措置することで、安定した生活を送れ\nるよう支援する。\n【概要】\n①区内社会福祉法人に対し各種助成金を交付する。\n②養護老人ホームへの入所措置および移送、措置費支払、自己負担金徴収等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":261,"name":"福祉人材確保・定着事業","bureau":"福祉部","dept":"高齢者福祉課","budget":318532,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆慢性的な介護福祉職員の不足に対応するため、研修等資格取得に係る助成、人材確保に向けた支援に加え、品川介護福祉専門学校への入学\n促進に資する取組を実施し、介護福祉職員の確保を図るとともに住居支援等を通じて処遇改善と住環境の整備等を推進し、就業定着につなげ\nる。\n\n【概要】\n◆介護職員の確保・定着を図るため、実務者研修等の受講費助成や同職員等の確保にかかる経費を支給する。\n◆外国人介護職員を確保するため、ファミーユ西品川および民間借り上げ宿舎の家賃助成を行う。\n◆品川介護福祉専門学校の入学生を対象に、卒業後3年間区内指定施設で勤務すれば返済免除となる奨学金を実施する。\n◆区内介護事業所を運営する事業者が雇用する介護職員等を対象に居住支援手当を支給する場合、その支給に要する経費（社会保険料雇用主\n負担額含む）に対して補助金を交付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":262,"name":"福祉サービス評価・向上支援事業","bureau":"福祉部","dept":"高齢者福祉課","budget":22818,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区としての一定の評価基準を設定し、区の方向性や今までの区サービス評価をふまえた東京都福祉サービス第三者評価を受審させること\nで、区内の認知症高齢者グループホームのサービスの質の向上を図る。\n【概要】\n①高齢者（東京都）福祉サービス第三者評価受審支援\n東京都福祉サービス第三者（外部）評価の受審を支援、質の高い介護サービス提供につなげる。\n②要介護度改善ケア奨励事業助成\n施設入所者の要介護度の軽減につながる質の高い介護サービスを提供した施設に対して、奨励金を支給することで、施設職員の意欲向上と質\nの高いサービスの提供を目指す。\n③養介護施設従事者虐待防止・身体拘束廃止研修\n介護施設における虐待行為を防止するため、施設管理者・現場職員を対象にした研修を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":263,"name":"介護保険特別会計繰出金","bureau":"福祉部","dept":"高齢者福祉課","budget":4424754,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険法に基づき、介護・地域支援事業に要する費用の一部と職員給与費等・保険料軽減分に要する費用の一部を一般会計から介護保険\n特別会計へ繰出す。 \n【概要】\n①介護給付費繰出分\n◆介護・介護予防に要する費用の12.5/100\n②地域支援事業（介護予防・日常生活支援総合事業）繰出分\n◆介護予防・日常生活支援総合事業に要する費用の12.5/100\n③地域支援事業（その他地域支援事業）繰出分\n◆その他地域支援事業に要する費用の19.25/100\n④職員給与費等の繰出分　⑤保険料軽減の繰出分","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":264,"name":"高齢者福祉事務費","bureau":"福祉部","dept":"高齢者福祉課","budget":3504,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者や児童虐待防止に向けたネットワークの構築と早期発見・対応の強化を図る。\n◆歩行が困難な高齢者に対し、車いすを貸与することによって福祉の向上を図る。\n【概要】\n◆地域での高齢者虐待、児童虐待・ＤＶや障害者虐待などの情報を 24 時間、専用電話により受け付け、通報者の秘密を厳守しつつ、家庭内\nにおける虐待等を早期に発見し適切な対応を図る。また、虐待者からの分離を図る必要がある際の一時保護施設を確保する。\n◆品川区内の65歳以上の高齢者等で、自力歩行が困難であって介助者のある者を対象に最長6ヶ月まで車いすを貸与する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":265,"name":"職員共済組合業務経理等負担金（介護）","bureau":"福祉部","dept":"高齢者福祉課","budget":814,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆東京都職員共済組合は、地方公務員等共済組合法に基づき地方公務員の病気、負傷、出産、休業、災害、退職、障害若しくは死亡又はその\n被扶養者の病気、負傷、出産、死亡若しくは災害に関して短期給付及び長期給付を行い、併せて福祉事業を実施することによって、地方公務\n員及びその家族の生活の安定と福祉の向上に寄与するとともに、公務の能率的運営に資することを目的として運営されている。\n◆地方公共団体は、組合の事務に要する費用については、政令で定めるところにより算定した額を負担する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":266,"name":"一般事務費（介護）","bureau":"福祉部","dept":"高齢者福祉課","budget":258212,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆保険給付費の支払事務その他介護保険事業執行に必要な一般的事務費\n【概要】\n◆介護保険システムに係る運用経費等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":267,"name":"各種団体分担金（介護）","bureau":"福祉部","dept":"高齢者福祉課","budget":267,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区職員互助会員の福利厚生のために実施する事業の充実強化を図る。\n【概要】\n◆職員互助会補助金の支出事務を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":268,"name":"東京都国保団体連合会負担金","bureau":"福祉部","dept":"高齢者福祉課","budget":148,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆第一号被保険者が交通事故等の第三者による不法行為により介護給付を受ける場合、第三者求償に係る事務を東京都国保連合会に委託す\nる。\n◆保険料等の特別徴収に係る経由事務負担金を東京都国保連合会に支払う。\n【概要】\n◆第三者行為事務委託料\n◆保険料等の特別徴収に係る経由事務負担金","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":269,"name":"介護保険料賦課徴収事務費","bureau":"福祉部","dept":"高齢者福祉課","budget":44154,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険資格管理事務・介護保険料賦課徴収事務に要する事務を執行する。\n【概要】\n◆65歳到達者および65歳以上の転入者に対し、介護保険被保険者証を発行する。\n◆第一号被保険者に対し介護保険料額を通知し徴収する。\n◆普通徴収の対象者へ納付書を送付するとともに口座振替の申請を勧奨する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":270,"name":"介護認定審査会費","bureau":"福祉部","dept":"高齢者福祉課","budget":21367,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】 \n◆介護保険法による介護保険認定審査会を実施する。\n【概要】\n◆介護認定審査会\n①委　員　　介護保険運営に理解のある保健・医療・福祉に関する学識経験者（58人）\n②設置数　　6合議体\n③構　成　　1合議体あたり　委員5名（有識者1人、医療系2人、福祉系2人）\n④開催数　　週6回（各合議体1回開催）\n⑤予備日　　定例の審査会での審査未了案件につき、まとめて審査を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":271,"name":"認定調査等費","bureau":"福祉部","dept":"高齢者福祉課","budget":179215,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険法に基づく要介護認定に係る認定調査および主治医意見書作成の実施\n【概要】\n◆要介護認定調査委託\n①区内在宅分（区職員または品川ケア協議会、在宅介護支援センター等へ委託）②区内施設分（区職員または品川ケア協議会、入所施設、在\n宅介護支援センターへ委託）\n③区外在宅分（居宅介護支援事業所へ委託）④区外施設分（入所施設または居宅介護支援事業所ヘ委託）\n◆主治医意見書\n①在宅新規分（外来受診中、初回）②在宅継続分（外来受診中、2回目以降）\n③施設新規分（入院・入所中、初回）④施設継続分（入院・入所中、2回目以降）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":272,"name":"介護保険制度趣旨普及費","bureau":"福祉部","dept":"高齢者福祉課","budget":15895,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険制度の円滑な運営に必要な情報および介護予防への理解・啓発を行う。\n◆制度に関するＰＲ、相談等に必要なサービスパンフレット類を整える。\n 【概要】\n◆制度案内パンフレットや被保険者証同封送付用パンフレット作成\n◆制度案内サイト（品川区 介護・在宅医療・障害福祉情報）による周知","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":273,"name":"介護保険制度推進委員会費","bureau":"福祉部","dept":"高齢者福祉課","budget":640,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆第九期介護保険事業計画の運営にあたり、制度改正に対する的確な制度運営が求められるとともに、団塊世代が65歳以上となる2025年を見\n据えた、地域包括ケアシステムの推進が求められていることから、介護保険制度の円滑・公正な運営を図るため、区長の諮問機関として介護\n保険制度推進委員会を設置・運営する。\n【概要】\n◆要介護認定者の増加や給付費が増加傾向にある中、介護事業の充実や地域における自助・共助活動の推進を検証するとともに、保険財政に\n関する健全運営の検討・提言を行う。またモニタリング等調査部会において、適正な介護サービス基盤の確保とその質の向上を図るため、介\n護保険事業運営と一体的な管理を行う。さらに高齢者の日常生活圏域におけるニーズを把握することで地域課題を抽出する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":274,"name":"地域密着型サービス事業者指定等事務費","bureau":"福祉部","dept":"高齢者福祉課","budget":2577,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"◆区が主体となり適切な地域密着型サービスの運営を図るために、介護事業者の申請による事業者指定・更新を行う。\n\n効率性\n◆執行率は87.0%であり、効率的に実施できている。\n◆指定更新のほか、各種加算の届出審査入力業務の外部委託により適正化および効率化を図っている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":275,"name":"居宅介護サービス給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":11968319,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都国保連合会等に対する介護報酬の支払い。（居宅介護サービス給付分）\n【概要】\n◆要介護者が指定居宅サービス事業者の行う在宅サービス（指定居宅サービス）を受けた時、居宅介護サービス費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":276,"name":"地域密着型介護サービス給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":2363507,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆地域密着型介護サービス給付分の東京都国保連合会等に対する介護報酬の支払い。（地域密着型介護サービス給付分）\n【事業概要】\n◆高齢者が中重度の要介護状態になっても可能な限り住み慣れた自宅・地域で生活を継続できるように、地域密着型介護サービス事業者から\n指定地域密着型サービスを受けた時、地域密着型介護サービス費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":277,"name":"居宅介護福祉用具費","bureau":"福祉部","dept":"高齢者福祉課","budget":24060,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅の要介護者が都道府県知事の指定を受けた指定特定福祉用具販売事業所から、入浴や排泄に用いる福祉用具等の一定のもの（特定福祉\n用具）を購入した時、居宅介護福祉用具購入費を支給する。\n【概要】\n◆購入費の9～7割を支給する。（同一年度で上限10万円）\n◆対象用具：腰掛便座、自動排泄処理装置の交換可能部品、入浴補助用具、簡易浴槽、移動用リフト吊具、排泄予測支援機器に加え、令和6\n年4月からスロープ、歩行器、歩行補助つえも対象（貸与との選択制）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":278,"name":"居宅介護住宅改修費","bureau":"福祉部","dept":"高齢者福祉課","budget":20576,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅介護を重視し、高齢者の自立を支援する観点から、福祉用具導入の際必要となる段差の解消や手すりの設置などの住宅改修費用を給付\nする。\n【概要】\n◆住宅改修を行う際、必要な書類（住宅改修が必要な理由書等）を添えて、事前に申請書を提出し、工事完成後、領収書等を提出することに\nより、保険給付される。\n◆保険給付は原則9割（上限18万円）、所得に応じて8割（上限16万円）・7割（上限14万円）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":279,"name":"居宅介護サービス計画給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":955859,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都国保連合会等に対する介護報酬の支払い。（居宅介護サービス計画給付分）\n【概要】\n◆要介護者が指定居宅介護支援事業者の行う居宅介護支援（指定居宅介護支援）を受けた時、居宅介護サービス計画給付費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":280,"name":"施設介護サービス給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":5776346,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都国保連合会等に対する介護報酬の支払い。\n（施設介護サービス給付分・特例施設介護サービス給付分） \n【概要】\n◆要介護者が介護保険施設に入所（入院）して施設サービスを受けた時、施設介護サービス費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":281,"name":"介護予防サービス給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":1294665,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都国保連合会等に対する介護報酬の支払い。（介護予防サービス給付分）\n【概要】\n◆要支援者が指定介護予防サービス事業者の行う介護予防サービス（指定介護予防サービス）を受けた時、介護予防サービス費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":282,"name":"地域密着型介護予防サービス給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":30853,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都国保連合会等に対する介護報酬の支払い。（地域密着型介護予防サービス給付分）\n【概要】\n◆高齢者が要支援状態になっても可能な限り住み慣れた自宅・地域で生活を継続するようにするため、地域指定密着型介護予防サービス事業\n者から指定地域密着型介護予防サービスを受けた時、指定地域密着型介護予防サービス費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":283,"name":"介護予防福祉用具費","bureau":"福祉部","dept":"高齢者福祉課","budget":13773,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅の要支援者が都道府県知事の指定を受けた指定特定福祉用具販売事業所から、入浴や排泄に用いる福祉用具等の一定のもの（特定福祉\n用具）を購入した時、居宅介護予防福祉用具購入費を支給する。\n【概要】\n◆購入費の9～7割を支給する。（同一年度で上限10万円）\n◆対象用具：腰掛便座、自動排泄処理装置の交換可能部品、入浴補助用具、簡易浴槽、移動用リフト吊具、排泄予測支援機器に加え、令和6\n年4月からスロープ、歩行器、歩行補助つえも対象（貸与との選択制）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":284,"name":"介護予防住宅改修費","bureau":"福祉部","dept":"高齢者福祉課","budget":29046,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅介護を重視し、高齢者の自立を支援する観点から、福祉用具導入の際必要となる段差の解消や手すりの設置などの住宅改修費用を給付\nする。\n【概要】\n◆住宅改修を行う際、必要な書類（住宅改修が必要な理由書等）を添えて、事前に申請書を提出し、工事完成後、領収書等を提出することに\nより、保険給付される。\n◆保険給付は原則9割（上限18万円）、所得に応じて8割（上限16万円）・7割（上限14万円）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":285,"name":"介護予防サービス計画給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":177270,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都国保連合会等への介護報酬の支払い。（介護予防サービス計画給付分）\n【概要】\n◆要支援者が指定介護予防支援事業者である地域包括支援センターから介護予防サービス計画作成等の介護予防支援（指定介護予防支援）を\n受けた時、介護予防サービス計画給付費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":286,"name":"審査支払手数料","bureau":"福祉部","dept":"高齢者福祉課","budget":27520,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護給付費に係る東京都国保連合会に対する審査支払手数料の支払い。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":287,"name":"高額介護サービス費","bureau":"福祉部","dept":"高齢者福祉課","budget":705072,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護サービス費の家計負担軽減を図るため、介護サービス費の自己負担上限額を超えた額を支給する。\n【概要】\n◆同じ月に利用した介護サービスの1割、2割、3割の自己負担分の合計額（同じ世帯内に複数の利用者がいる場合には、世帯合計額）が、所\n得区分ごとに定める上限額を超える場合にその超える額を高額介護サービス費として支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":288,"name":"高額医療合算介護サービス費","bureau":"福祉部","dept":"高齢者福祉課","budget":120030,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護サービス費および医療費の家計負担軽減を図るため、介護（介護予防）サービスの自己負担上限額を超えた額を支給する。\n【概要】\n◆8月1日から翌年7月31日までの1年間に医療、介護（介護予防）サービスの自己負担がある方で、世帯の年間の自己負担額の合計が所得区分\nに応じて設定された自己負担上限額を超える方に、その超える額を高額医療合算介護サービス費として支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":289,"name":"特定入所者介護サービス費","bureau":"福祉部","dept":"高齢者福祉課","budget":299768,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険施設を利用する低所得の被保険者に、食費と居住費の基準費用額と負担限度額の差額を補足給付として支払う。\n【概要】\n◆低所得者の要介護者が施設サービスや短期入所サービスを利用した際に、食費・居住費（滞在費）を補足給付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":290,"name":"特定入所者介護予防サービス費","bureau":"福祉部","dept":"高齢者福祉課","budget":1205,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険施設を利用する低所得の被保険者に、食費と居住費の基準費用額と負担限度額の差額を補足給付として支払う。\n【概要】\n◆低所得者の要支援者が施設サービスや短期入所サービスを利用した際に、食費・居住費（滞在費）を補足給付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":291,"name":"要支援者夜間対応サービス特別給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":243,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆平成11年度に創設された地域密着型サービス・夜間対応型訪問介護は、24時間365日切れ目のないサービスとして在宅生活を継続するため\nに期待されているサービスである。しかし、従前の制度では対象者が要介護者に限定されているため、必要度が高い要支援者は利用できな\nかった。そのため、対象者を要支援者にも拡大し、平成21年度から市町村特別給付として区独自のサービスを開始した。\n◆要介護者と同様に、要支援者に対しても365日切れ目のないサービス提供をめざし、特に夜間帯における安心感の確保、緊急の訪問介護\nサービスを提供する。\n【概要】\n◆夜間帯（おおむね22時から翌7時）において、以下のサービスを提供する。\n①オペレーションセンターサービス…利用者にケアコール端末を設置し、緊急時のコールに対して看護師等が適切な措置を講じる。\n②随時訪問サービス…コールの内容により、必要に応じて訪問介護員が訪問し対応する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":292,"name":"通院等外出介助サービス特別給付費","bureau":"福祉部","dept":"高齢者福祉課","budget":4318,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険制度の予防訪問介護や訪問介護では対象外とされている、要支援者の通院のための介助および要介護者については病院内での介助\nを支援するため、平成21年度から市町村特別給付として区独自のサービスを開始した。\n◆日常生活を送る上で必要不可欠である要支援者の通院介助および要介護者における病院内での介助サービスを独自に制度化することによ\nり、少しでも長く継続した在宅生活ができるよう支援する。\n【概要】\n◆要支援者通院介助サービスは、訪問介護事業所の職員が、歩行が不安定な要支援者に対して安全に通院できるよう支援する。\n◆要介護者病院内介助サービスは、訪問介護事業所の職員が、要介護者が通院したとき、病院内における待ち時間の付き添い・医師等との面\n談などで介助が必要な場合に介助サービスを提供する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":293,"name":"予防訪問事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":303060,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆要介護状態等になることの予防または軽減、悪化防止のほか地域において自立した日常生活が行えるよう支援する。\n【概要】\n①予防訪問事業・生活機能向上支援訪問事業\n◆ヘルパーが自宅を訪問し、身体介護や生活援助を行う。生活機能向上支援訪問事業は生活援助中心のサービスを行う。 \n②すけっとサービス事業\n◆住民の担い手による生活支援サービス訪問型を構築し、区内全域にサービスを展開する。 \n③管理栄養士派遣による栄養改善事業\n◆管理栄養士を確保している薬局等の介護保険指定居宅療養管理指導事業所（委託事業者）が管理栄養士による訪問指導を実施する。 \n④柔道整復師による機能訓練訪問事業\n◆柔道整復師会品川支部に所属する柔道整復師（機能訓練指導員）による訪問機能訓練を短期集中型サービスとして実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":294,"name":"予防通所事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":775006,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆要介護状態等となることの予防または軽減・悪化防止のほか地域において自立した日常生活が送れるよう支援する。\n【概要】\n①予防通所事業\n◆通所介護施設で日常生活上の支援や機能訓練などを行う。\n※いきいき活動支援プログラム…予防通所事業利用から引き続き実施する、自立支援・介護予防のためのプログラム。\n②はつらつ健康教室（短期集中予防サービス事業）\n◆運動器・口腔機能の向上や、低栄養・認知症予防のためのプログラムを総合的に提供する。\n③地域ミニデイ事業\n◆区内社会福祉法人などの有償ボランティアが主体となり、体操やレクリエーション活動などを行うことで、日常生活に必要な機能訓練を行\nう。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":295,"name":"高額総合事業サービス費","bureau":"福祉部","dept":"高齢者福祉課","budget":1731,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護サービス費の家計負担軽減を図るため、総合事業サービスの自己負担上限額を超えた額を支給する。\n【概要】\n◆同じ月に利用した総合事業サービスの1割、2割、3割の自己負担分の合計額（同じ世帯内に複数の利用者がいる場合には、世帯合計額）\nが、所得区分ごとに定める上限額を超える場合にその超える額を高額総合事業サービス費として支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":296,"name":"高額医療合算総合事業サービス費","bureau":"福祉部","dept":"高齢者福祉課","budget":3175,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆介護サービス費および医療費の家計負担軽減を図るため、介護（介護予防）サービス、総合事業サービスの自己負担上限額を超えた額を支\n給する。\n【概要】\n◆8月1日から翌年7月31日までの1年間に医療、介護（介護予防）サービス、総合事業サービスの自己負担がある方で、世帯の年間の自己負担\n額の合計が所得区分に応じて設定された自己負担上限額を超える方に、その超える額を高額医療合算総合事業サービス費として支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":297,"name":"総合事業ケアマネジメント費","bureau":"福祉部","dept":"高齢者福祉課","budget":93422,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆地域の実情に応じた多様なサービスの充実に対応する介護予防ケアマネジメントを行い、要支援者、総合事業対象者への効果的かつ効率的\nな支援を目指す。 \n【概要】\n◆介護予防ケアマネジメント費について、東京都国保連合会にその経費を支払う（一部の給付管理外サービス事業に係るマネジメント費は、\n直接在宅介護支援センター等へ支払う）。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":298,"name":"介護予防対象者把握事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":9517,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆要介護・要支援認定者および総合事業対象者を除く、区内在住の75歳以上の後期高齢者に対し、調査票を送り、生活機能調査を行うこと\nで、的確に介護予防対象者を把握し、介護予防事業の参加へと繋げていく。\n【概要】\n◆基本チェックリストを中心とする生活機能チェックを年1回（11～12月頃）郵送にて行う。\n　対象者：要支援・要介護認定者および総合事業対象者を除く75歳以上の区民　約20,000人","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":299,"name":"介護予防普及啓発事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":3455,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【事業の背景】\n◆介護を必要とする要因である活動量の低下や参加機会の減少を抑制し、これを支える栄養の摂取や身体機能の維持を図り、日常生活におい\nて介護予防への取組みを意識化するため、積極的に普及啓発を行う必要がある。\n【目的】\n◆介護保険制度のわかりにくさが指摘されており、制度の案内や情報の提供が求められている。また、介護予防の意識化を図ることで、高齢\n者の活動機会を増やし、参加意欲を促進して理解と啓発に努める。\n【内容】\n◆高齢者自身が活動機会を積極的に見つけ出すヒントとなる情報の総合的発信、普及啓発を行い介護予防事業への参加を促進する。\n【概要】\n①介護予防パンフレット作成\n②フレイル予防フェスタ実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":300,"name":"運動系介護予防事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":92571,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n65歳以上の高齢者が、主体的な参加のもと、要介護状態等になることの予防または軽減・悪化防止のための活動を行い、地域において自立し\nた日常生活が送れるよう支援する。\n【概要】\n多様なメニューを用意しており、運動強度や持久性の違いによりステップを設定し、参加者が選択することを可能としている。\n◆カラダ見える化トレーニング：民間フィットネスジムで、筋力や歩行姿勢等を専用機器で測定し「見える化」して取り組む運動。\n◆うんどう機能トレーニング：椅子やゴムチューブ等を使って日常生活に必要な筋力や体力をアップする運動。\n◆健康やわら体操：柔道整復師による、椅子を使って日常生活に必要な柔軟性・バランス機能をアップする運動。\n◆うんどう教室：公園等に設置した健康遊具を使用し、日常生活でつまずかない・ふらつかない身体づくりを行う運動。\n◆その他トレーニング事業：デイサービスセンターでも筋力やバランスをアップさせる運動を実施。マシンでトレーニング、身近でトレーニ\nング、水中トレーニング、予防ミニデイがある。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":301,"name":"認知症予防事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":34362,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆65歳以上の高齢者に、認知症や要介護状態になることを予防または軽減・悪化防止するほか、地域において自立した生活が送れるよう支援\nするため、一般介護予防事業として実施する。\n【概要】\n①脳力アップ元気教室\n◆学習、工作、運動、e-スポーツの4コースによる講座で、他者との交流を通じて継続的な社会参加の促進を図る。\n②計画力育成講座\n◆参加者が自ら考え計画を立てることで、脳の活性化を図るとともに、自主活動に繋げるための支援を通して、地域での生きがいや仲間づく\nりにより認知症予防を図る。\n③絵本読み聞かせ講座\n◆絵本の読み聞かせ方法の基礎を学び、実践発表を行う、知的活動と社会参加による認知症予防を目的とした講座。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":302,"name":"ふれあい健康塾","bureau":"健康推進部","dept":"健康課","budget":4528,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆閉じこもりがちな高齢者を対象に、健康維持と転倒骨折予防のための運動機能訓練や生活指導等を盛り込み、地域のボランティア活動等を\n活用した地域参加型の健康教室を行う。\n◆平成27年4月から「品川区介護予防・日常生活支援総合事業実施要綱」の一般介護予防事業として行う。\n【概要】\n◆運営にあたっては、各地区健康づくり推進委員会に委託し、地域の「支えあい」「助けあい」の意識の向上および住民参加を図り、高齢者\nの安全な外出先の確保と地域での交流の拡大もあわせて目指す。\n①体操：健康運動指導士による座ってできる健康体操②お楽しみプログラム：頭の体操、カラオケ等の楽しい遊びを取り入れる。\n③実施場所：13地区　地域センター（大井第一地区は南大井文化センター）④実施回数：月1回　1回2時間程度\n⑤定員：各地区20名程度　⑥委託先：健康づくり推進協議会へ委託　委託費：650,000円/年（50,000円×13地区）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":303,"name":"しながわ出会いの湯事業","bureau":"健康推進部","dept":"健康課","budget":36888,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆介護予防と健康づくり、レクリエーション活動の一環として公衆浴場を利用し地域の高齢者の健康づくりと参加者同士のふれあいを促進す\nる。\n【概要】\n◆区内の公衆浴場を利用し、毎週木曜日、入浴前に高齢者が講師の指導により、気軽に参加できる「お楽しみプログラム（健康体操・カラオ\nケなど）」と「入浴サービス」を楽しみながら、健康づくりと生きがいづくりを図る。\nあわせて区内公衆浴場振興に寄与している。参加費は無料。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":304,"name":"栄養改善事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":8847,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆65歳以上の高齢者の方を対象に、栄養について学ぶ機会の提供や仲間づくりを目的とした料理教室を実施する。\n【概要】\n①わくわくクッキング\n◆地域に根ざしたＮＰＯ・地域の介護事業者と協力・連携し、効率的に介護予防事業の実施基盤を充実させる。低栄養・認知症・閉じこもり\n予防のため、買い物、調理の実践をする。また専門職による口腔ケアプログラムの講習を行う。なお、本教室を修了した人を対象に自主活動\nの支援とボランティア育成のための講座を実施し、その後の活動へ繋げる。 \n②シニアのためのやさしい手料理教室\n◆一人暮らしの高齢者をメインに、食生活の改善を図り生活リズムをつくることを目的に、一人分の買い物と準備・片づけを含む調理方法を\n習得する。また、仲間づくりをすることにより、生活の質を向上させる。なお、本教室を修了した人を対象に自主活動の支援とボランティア\n育成のための講座を実施し、その後の活動へ繋げる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":305,"name":"地域貢献ポイント事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":4262,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的・概要】\n◆介護保険法に基づく地域支援事業として、区民が高齢期を迎えても積極的に社会参加をし、高齢者相互の支え合いや地域の支援を行い続け\nられるよう、ボランティア活動への参加者にポイントを付与する。また、これを換金して社会福祉事業に寄付するなど社会貢献活動へつなげ\nることで、高齢者の介護支援ボランティア活動の普及を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":306,"name":"地域包括支援センター機能強化事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":5500,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆理学療法士等を「介護予防による地域づくり推進員」とし、在宅介護支援センターと密接に連携し、介護予防の取組を推進する。\n◆研修等を通じてケアマネジャーのスキル向上と、区民向けに介護予防に関する啓発活動を行い、意識の向上を図る。\n【概要】\n◆リハビリテーションに関する専門的知見を有する理学療法士が、高齢者の有する能力を評価し改善の可能性を助言する等、地域包括支援セ\nンターと連携し、介護予防の取組を総合的に支援する。\n◆地域包括支援センター等における介護予防機能強化推進事業委託\n①「介護予防による地域づくり推進員」の配置\n②ケアマネジャー、在宅サービスセンター職員等への介護予防に関する技術的助言\n③自立支援に向けた介護予防の取組支援\n◆住民等への介護予防に関する講演会の開催（年1回）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":307,"name":"介護予防による地域づくり推進事業","bureau":"福祉部","dept":"高齢者地域支援課","budget":5716,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区民が地域で主体的に介護予防活動を実施することで健康寿命の延伸につなげられるよう、住民主体の通いの場（地域介護予防活動）の実\n施を支援する。\n【概要】\n◆リハビリテーション専門職の派遣受け入れにより、通いの場の立ち上げ支援や出張講座等による活動の継続支援を行う。\n◆体力測定システム（ＦＡＩＴ）を活用し、体力・認知機能を測定するとともに、測定結果に基づくトレーニングメニューを紹介し、自宅で\nの運動の取組みについても継続支援する。\n◆通いの場を新規で立ち上げる団体に対して、運営費を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":308,"name":"地域包括支援センター運営費","bureau":"福祉部","dept":"高齢者福祉課","budget":23925,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆地域包括支援センターとして機能するため、中枢機能を担う高齢者福祉課（機能強化型地域包括支援センター）に、社会福祉士、保健師、\n主任介護支援専門員を配置し、①介護予防ケアマネジメント、②高齢者や家族に対する総合的な相談・支援、③高齢者の虐待の防止、早期発\n見等の権利擁護事業、④支援困難ケースへの対応など、地域の在宅介護支援センターと一体的に実施する。 \n【概要】\n◆地域包括支援センターの設置\n在宅介護支援センターを、地域包括支援センターの出先窓口（支所）として位置づけ、総合相談、高齢者の実態把握、介護予防のスクリーニ\nングからケアマネジメントまでを実施する。また高齢者福祉課は地域包括支援センターの中枢として、包括的支援事業の一体的な管理を行う\nとともに、必要な三職種の確保のために社会福祉法人から主任介護支援専門員の派遣を受け入れる。\n◆高齢者虐待防止事業\n介護支援専門員やサービス提供事業所等を対象に、高齢者虐待防止に資する研修会等を開催する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":309,"name":"在宅介護支援センター事業費","bureau":"福祉部","dept":"高齢者福祉課","budget":353478,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆介護保険法令により、地域包括支援センターの設置が区に義務付けられている。本区では当該センターの中枢機能を高齢者福祉課（機能強\n化型地域包括支援センター）に設置しつつ、加えて在宅介護支援センターを地域高齢者の相談・支援の核とした機能を担う支所（地域包括支\n援サブセンター）として20箇所設置し、両者の一体的な運営により「品川区在宅介護支援システム」を構築している。\n◆高齢者の身近な総合相談・支援窓口として、在宅介護支援センターは介護保険等の公的制度のみならず地域資源をも活用し、地域内で支援\nを途切れることなく包括的に提供する「地域包括支援センター」としての機能を発揮する。このため、地域高齢者の実態把握に注力し、自立\n支援高齢者の早期発見、予防重視型ケアマネジメントを実施し、できるだけ我が家での安心・安全な生活の継続を図る。\n【概要】\n◆在宅介護支援センターは、居宅介護支援事業所と地域包括支援センターのサブセンターを兼ね、①地域高齢者の総合相談・支援、②介護・\n予防ケアマネジメント、③虐待予防・早期発見、権利擁護、④包括的・継続的支援⑤地域のネットワークづくりなどの各業務を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":310,"name":"医療連携の促進","bureau":"福祉部","dept":"福祉計画課","budget":10011,"next_budget":0,"root":"","cls":"高齢者が安心して暮らせる環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆在宅療養生活を送る高齢者が安心して生活できるよう、地域
