、バリアフリー化を進めています。","story_p2":"管理する35箇所の公衆便所について、365日毎日1～3回の清掃を実施するとともに、小破修繕を継続的に行い、利用環境の維持に努めています。まちの清潔さに関する評価を指標として、施設維持の成果を測定しています。","story_impact":"判断できない","pdf_page":546,"cls":"地球環境にやさしいまちづくり"},{"no":"547","name":"緑化活動支援事業","bureau":"防災まちづくり部","dept":"防災まちづくり部　公園課","budget":178783,"root":"データなし","ev":"改善（手段変更）","ptype":"1","story_p1":"緑豊かで美しいまちづくりを実現するために、生垣や屋上緑化への助成、ボランティア活動の支援、保存樹木の維持管理を行っています。","story_p2":"生垣緑化や屋上緑化の助成、ボランティア活動の支援により、地域住民による緑化と花のあるまちづくりを推進しました。保存樹木46件の維持管理を実施し、街なみの景観向上に貢献しています。","story_impact":"判断できない","pdf_page":547,"cls":"水と親しむみどり豊かなまちづくり"},{"no":"548","name":"マイガーデン運営費","bureau":"防災まちづくり部","dept":"防災まちづくり部　公園課","budget":15280,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"区民が土に触れ、野菜を育てる喜びを身近で体験できる環境を作るため、遊休地や公共空間を農地として整備し、区民農園を設置しています。","story_p2":"区民向けに48区画の菜園を1年間契約で貸し出すとともに、子ども向け体験農園において収穫体験型教室を実施しています。スポーツ・レクリエーション施設に関する世論調査による評価と年間利用者数により、事業の成果を測定しています。","story_impact":"判断できない","pdf_page":548,"cls":"水と親しむみどり豊かなまちづくり"},{"no":"549","name":"施設植栽・花壇維持管理","bureau":"防災まちづくり部","dept":"防災まちづくり部　公園課","budget":27879,"root":"データなし","ev":"縮小","ptype":"6","story_p1":"樹木を健康に育て、街を美しく保つために、施設の樹木管理と街角花壇の維持管理を行っています。潤いと安らぎのある街並みづくりを目指しています。","story_p2":"街角に15箇所の花壇を設置し四季折々の花を植えることで、うるおいある街なみを創造しました。また、剪定51件、刈り込み20件、害虫駆除13件などの樹木管理により、施設の樹木を健全な状態に保つことができました。","story_impact":"判断できない","pdf_page":549,"cls":"水と親しむみどり豊かなまちづくり"},{"no":"550","name":"公園総務費","bureau":"防災まちづくり部","dept":"防災まちづくり部　公園課","budget":5179,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"公園課の円滑な業務運営のために、職員旅費や車両経費などの運営経費を確保しています。また職員を対象に樹木点検員養成研修を実施し、職員自らが樹木点検できる体制を整備しています。","story_p2":"職員を対象に現場での樹木点検方法等を習得するための研修を実施しました。樹木点検員養成研修の参加人数を成果指標として設定し、研修参加者の養成に取り組んでいます。","story_impact":"判断できない","pdf_page":550,"cls":"データなし"},{"no":"551","name":"河川管理費","bureau":"防災まちづくり部","dept":"防災まちづくり部　河川下水道課","budget":94142,"root":"データなし","ev":"縮小","ptype":"6","story_p1":"住民が安心して水に親しめる環境をつくるため、立会川と目黒川の水質改善や浚渫を進めるとともに、気候変動による水害を軽減する総合的な治水対策を推進しています。","story_p2":"目黒川と立会川の水質調査、立会川への高濃度酸素溶解水供給、河川と船着場の清掃・点検・修繕を実施しました。水のきれいさや水辺空間への満足度、目黒川の浚渫延長を指標として成果を測定しています。","story_impact":"判断できない","pdf_page":551,"cls":"水と親しむみどり豊かなまちづくり"},{"no":"552","name":"水辺利活用事業","bureau":"防災まちづくり部","dept":"防災まちづくり部　河川下水道課","budget":155854,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"水辺空間の魅力を高め、にぎわいのある街づくりを実現するために、水辺利活用推進計画に基づいたハード・ソフト施策の推進や、船着場の管理・改修、橋のライトアップなどに取り組んでいます。","story_p2":"水辺利活用推進計画の策定、航行マナー啓発活動、橋のライトアップと環境配慮、災害用照明整備、船着場改修検討など、水辺空間の利活用と安全性向上に向けた取組みを実施しました。区有船着場の利用回数と水辺空間の区民満足度により、成果を測定しています。","story_impact":"判断できない","pdf_page":552,"cls":"水と親しむみどり豊かなまちづくり"},{"no":"553","name":"治水対策推進助成事業","bureau":"防災まちづくり部","dept":"防災まちづくり部　河川下水道課","budget":9245,"root":"データなし","ev":"改善（手段変更）","ptype":"1","story_p1":"豪雨による浸水被害から住民の財産を守り、限られた水資源を有効活用するため、雨水貯留タンク・防水板・地下浸透施設の設置費用を助成しています。","story_p2":"雨水利用タンク6件、防水板設置2件の申請に対して全件交付金を助成しました。雨水浸透施設は申請がありませんでしたが、制度の充実により6件の相談と次年度への2件の相談につながり、複数のPR活動を通じて制度認知の向上を図りました。","story_impact":"判断できない","pdf_page":553,"cls":"区民を災害から守る対策の推進"},{"no":"554","name":"排水施設建設事業","bureau":"防災まちづくり部","dept":"防災まちづくり部　河川下水道課","budget":2844408,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"戸越・西品川地区と勝島地区の浸水被害を軽減するために、目黒川に雨水を排水する幹線と雨水管の整備を進めています。","story_p2":"第二戸越幹線の整備工事が完了し、内径3.5ｍ、延長2.7㎞のシールド工法による下水道幹線が整備されました。引き続き取水・空気抜き設備の整備を進めるとともに、勝島地区雨水管整備事業に着手するなど、排水施設の機能向上に向けた取組が進められています。","story_impact":"判断できない","pdf_page":554,"cls":"区民を災害から守る対策の推進"},{"no":"555","name":"下水道管改修事業","bureau":"防災まちづくり部","dept":"防災まちづくり部　河川下水道課","budget":526346,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"老朽化した下水道施設の更新と耐震化により、道路陥没を防ぎ、災害時の下水道機能と交通機能を確保するために、東京都と連携して事業を実施しています。","story_p2":"東京都と連携して約8haの老朽化対策を実施し、下水道施設の再構築を進めました。また、経営計画に基づき耐震化対象地区を拡大して耐震化工事に取り組んでいます。","story_impact":"判断できない","pdf_page":555,"cls":"区民を災害から守る対策の推進"},{"no":"556","name":"河川下水道総務費","bureau":"防災まちづくり部","dept":"防災まちづくり部　河川下水道課","budget":12919,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"河川と下水道に関する各事業を円滑に進めるため、職員の旅費や事務用品の購入、関連団体への負担金など、課内庶務事務に必要な経費を支出しています。","story_p2":"城南地区の協議会を通じて東京都に河川浄化や環境整備について要望し、各種対策協議会の運営に参画することで関連事業を推進しました。水のきれいさや水辺空間に関する住民満足度が成果指標として設定されていますが、具体的な実績値が示されていません。","story_impact":"判断できない","pdf_page":556,"cls":"データなし"},{"no":"557","name":"防災会議費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":20581,"root":"データなし","ev":"現状継続","ptype":"8","story_p1":"災害対策基本法に基づいて防災会議を開催し、地域防災計画の策定と推進によって、住民の安全で安心な暮らしを守るための防災対策を実施しています。","story_p2":"地域防災計画の大規模修正を5年ごとに実施し、防災区民組織などの意見を反映させています。防災会議の出席率は約90％と高く、多様な視点を取り入れた防災体制の構築が進められています。","story_impact":"判断できない","pdf_page":557,"cls":"区民を災害から守る対策の推進"},{"no":"558","name":"防災区民組織育成費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":118626,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"災害時に住民が自助・共助に基づき主体的に対応できるよう、町会・自治会を母体とした防災区民組織を支援しています。装備品の配備と助成金交付を通じて、組織の運営を円滑にし、防災活動の充実発展を促進しています。","story_p2":"防災資器材整備助成金の周知と活用状況把握を行い、未活用団体への再周知により資器材整備を促進しました。また防災訓練の実施状況に応じた助成金交付と訓練支援により、防災活動の充実強化を図りました。","story_impact":"判断できない","pdf_page":558,"cls":"区民を災害から守る対策の推進"},{"no":"559","name":"防災訓練経費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":248776,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"災害発生時に住民と職員が適切に対応できるよう、防災訓練を支援・実施しています。地区総合防災訓練、一斉防災訓練、水防訓練を行い、自助・共助の意識向上と職員の災害対応能力向上に取り組んでいます。","story_p2":"地区総合防災訓練を10地区で実施し、5地区では防災コンテンツを活用した「PLUS ONE 2024」として、参加しづらい世代も含めた誰もが気軽に参加できる形式を試験的に展開した。区内一斉防災訓練では災害対策本部訓練と避難所運営訓練を実施し、初動連携対応や情報伝達体制の確認を行い、水防訓練には職員260人が参加して実践的な技能向上を図った。","story_impact":"判断できない","pdf_page":559,"cls":"区民を災害から守る対策の推進"},{"no":"560","name":"防災普及教育費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":838601,"root":"データなし","ev":"縮小","ptype":"5","story_p1":"区民の防災意識を高め、自助・共助の取り組みを促進するために、体験館の運営や防災リーダーの育成、マンション防災対策、防災教育など、様々な普及啓発活動を展開しています。","story_p2":"防災体験館の運営、防災学校の複数コース実施、防災ハンドブックやマンション向け啓発資料の配布、全中学校への防災教材配布、地震体験車の派遣、携帯トイレの全区民配布など、幅広い防災教育活動を実施しました。防災体験館来館者数と防災学校実施回数を指標として、防災意識の向上を目指しています。","story_impact":"判断できない","pdf_page":560,"cls":"区民を災害から守る対策の推進"},{"no":"561","name":"消防団運営費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":35257,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"地域の防災体制を強化するために、消防団の活動を支援しています。補助金の交付や手当の支払い、装備品の充実など、消防団が円滑に活動できるよう支援しています。","story_p2":"消防団の円滑な運営と質的向上を図るため、本団・分団・少年団・防火防災協会に対して補助金交付や各種手当、表彰報償金を交付し活動を支援しました。補助金は運営事業、団員交誼親睦事業、活動装備品に適正に使用されています。","story_impact":"判断できない","pdf_page":561,"cls":"区民を災害から守る対策の推進"},{"no":"562","name":"避難行動要支援者経費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":72955,"root":"データなし","ev":"改善（手段変更）","ptype":"7","story_p1":"災害時に自力で避難できない要支援者が安全に避難できるよう、関係機関と連携して支援体制を整備しています。避難訓練や計画作成支援を通じて、地域全体で要支援者を守る仕組みづくりを進めています。","story_p2":"避難行動要支援者名簿を作成して防災区民組織へ配布し、避難体制づくりについての相談に対応しました。また、ワークショップを実施した防災区民組織への資器材貸与や、水害時に要配慮者利用施設の利用者の避難確保体制を強化するための計画作成支援を実施しています。","story_impact":"判断できない","pdf_page":562,"cls":"区民を災害から守る対策の推進"},{"no":"563","name":"防災体制整備費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":272750,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"災害時の迅速な対応体制を整えるため、職員の装備品や情報システム・通信機器などを充実させ、初動活動に万全の態勢で臨めるようにしています。","story_p2":"気象情報の収集体制強化、避難情報通知コール、総合防災情報システムの改修、職員参集システムのアップデート、被災情報管理システムのクラウド化、防災ポータル・防災アプリのリリースなど、複数の施策により風水害時の初動対応と情報配信体制を整備しました。避難情報通知コール登録者数、防災アプリダウンロード数、防災ポータル閲覧数を成果指標としており、これらの利用数により住民への情報提供機能の浸透度を測定しています。","story_impact":"判断できない","pdf_page":563,"cls":"区民を災害から守る対策の推進"},{"no":"564","name":"防災情報配信経費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":121391,"root":"データなし","ev":"現状継続","ptype":"11","story_p1":"災害時に迅速かつ正確な情報をお届けするために、ホームページやSNS、LINE、防災行政無線など複数の手段を用いて、情報発信体制を強化しています。","story_p2":"公式LINEの防災メニューに地震・風水害などの区分を追加し、避難フロー図を掲載して情報の到達容易性を高めた。また、防災タブレットの導入支援や防災ラジオの販売（981台）、防災行政無線の放送内容の見直し（7回放送）など、複数の情報配信手段を整備した。","story_impact":"判断できない","pdf_page":564,"cls":"区民を災害から守る対策の推進"},{"no":"565","name":"初期消火体制強化費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":103835,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"火災による被害を最小限に抑えるため、街頭消火器の計画的な維持管理、家庭用消火器の助成、感震ブレーカーの設置支援を行い、初期消火体制を強化しています。","story_p2":"街頭消火器の取替えと点検を継続実施し、劣化した消火器の機能維持を図りました。家庭用消火器の購入補助を実施するとともに、感震ブレーカーの設置補助を212件に支給し、初期消火体制と地震火災対策の強化を進めました。","story_impact":"判断できない","pdf_page":565,"cls":"区民を災害から守る対策の推進"},{"no":"566","name":"災害時応急物資確保費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":396864,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"地震や風水害などの災害時に避難者が安心して生活できるよう、あらかじめ必要な物資を計画的に備蓄し、物流事業者と連携して迅速に届ける体制を整備しています。","story_p2":"避難所避難者約9万人分の食糧品備蓄27万食の購入を進め、保存期限が近い物資を防災訓練や生活困窮世帯支援で有効活用しています。また間仕切りやトイレトラックの導入、民間事業者との協力協定締結により、災害時の生活環境改善と物流体制確保に取り組んでいます。","story_impact":"判断できない","pdf_page":566,"cls":"区民を災害から守る対策の推進"},{"no":"567","name":"避難所管理費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":143378,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"災害時に住民の皆さんが安全に避難できるよう、避難所の設備を整備・管理し、運営体制を強化しています。非常用発電機や給水栓などの維持管理を行い、いざという時に備えています。","story_p2":"非常用発電機や応急給水栓などの防災設備について、点検により安定的な稼働状況を確認しました。また、避難看板の設置を進め、複数年度にわたる整備が完了し、避難所の機能強化が達成されました。","story_impact":"判断できない","pdf_page":567,"cls":"区民を災害から守る対策の推進"},{"no":"568","name":"帰宅困難者対策経費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":149786,"root":"データなし","ev":"改善（手段変更）","ptype":"8","story_p1":"大規模災害時に駅周辺で発生する帰宅困難者の安全確保と混乱防止のため、事業者や関係機関と連携して一時滞在施設の拡充や物資の備蓄、情報提供体制を整備しています。","story_p2":"ターミナル駅周辺の帰宅困難者対策として、協議会の設置・運営や滞留者支援ルール作成、防災訓練支援を実施しました。一時滞在施設の確保と備蓄物資の入替え、保存期限切れ物資の有効活用、ポータブル蓄電池の配備により、災害時への備えを整備しています。","story_impact":"判断できない","pdf_page":568,"cls":"区民を災害から守る対策の推進"},{"no":"569","name":"弔慰金・見舞金経費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":11296,"root":"データなし","ev":"現状継続","ptype":"1","story_p1":"災害救助法が適用されない小規模な火災や水害の被害者を支援するために、被害状況に応じた見舞金や弔慰金、宿泊費用を支給しています。","story_p2":"火災により亡くなられた2名への弔慰金、火災や水害で被害を受けた18世帯と2事業所への見舞金、および火災で居住困難となった7世帯10名への宿泊見舞金を支給しました。災害弔慰金と災害見舞金の支給実績を通じて、被災者への支援を実施しています。","story_impact":"判断できない","pdf_page":569,"cls":"区民を災害から守る対策の推進"},{"no":"570","name":"自衛官等募集事務費","bureau":"防災まちづくり部","dept":"防災まちづくり部　防災課","budget":10434,"root":"法定義務あり","ev":"現状継続","ptype":"9","story_p1":"自衛官等の募集に関する広報宣伝を実施し、我が国を守るという使命を持つ自衛隊への理解を深め、適切な募集を進めるために、広報誌への掲載やイベント開催、募集相談員の委嘱などを行っています。","story_p2":"自衛官募集相談員の委嘱式を実施し、広報紙での案内掲示や募集対象者情報の提供、ポスタースタンドなどの物品購入を通じて募集広報を行っています。配置目標である15名の募集相談員の確保を目指した取組を進めています。","story_impact":"判断できない","pdf_page":570,"cls ":"データなし","ev":"現状継続","ptype":"5","story_p1":"自然体験や歴史文化学習を通じて、児童生徒の健康増進と集団生活での規律や連帯感を育成するため、6年生は日光、7年生は磐梯高原で2泊3日の移動教室を実施しています。","story_p2":"日光移動教室では37校と特別支援学級が連合で実施し2,761人の児童が、磐梯高原移動教室では15校と特別支援学級が連合で実施し1,702人の生徒が参加しました。文化遺産見学やハイキング、体験学習などを通じて、児童生徒の参加を促進する取組が行われています。","story_impact":"判断できない","pdf_page":591,"cls":"未来を切り拓く学校教育の推進"},{"no":"592","name":"就学援助費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":189758,"root":"データなし","ev":"現状継続","ptype":"1","story_p1":"経済的な理由で学校に通うことが難しい児童・生徒のために、学用品費や修学旅行費などの援助費を支給しています。また、新入学時の支度金や、障害のあるお子さんの保護者への奨励費も提供しています。","story_p2":"4月の全児童・生徒への書類配布と保護者メール周知により申請漏れを防ぎ、年3回の定期支給と新1年生への入学前支給を実施しました。特別支援教育就学奨励費についても、年2回の申請受付により対象者への支給を行いました。","story_impact":"判断できない","pdf_page":592,"cls":"未来を切り拓く学校教育の推進"},{"no":"593","name":"教材教具費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":775309,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"子どもたちが充実した学習環境で教育目標を達成できるよう、教材・教具の整備を行い、英検受検料の助成や補助教材費の公費負担を通じて学習を支援しています。","story_p2":"学校の教育環境整備として、理科・算数設備を7校で整備し、老朽楽器を12校で、体育器具を10校で取り替えた。また補助教材費の公費負担により、保護者の経済的負担を軽減した。","story_impact":"判断できない","pdf_page":593,"cls":"未来を切り拓く学校教育の推進"},{"no":"594","name":"学校ＩＣＴ活用経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":1987633,"root":"データなし","ev":"改善（手段変更）","ptype":"3","story_p1":"子どもたち一人ひとりの資質や能力をより効果的に育成するために、全児童・生徒へのタブレット端末配付や電子黒板の整備、オンライン学習環境の構築を進めています。","story_p2":"区立学校に在籍する全ての児童・生徒にタブレット端末を配付し、家庭学習の環境を整備しました。災害や感染症による臨時休業に対応できるオンライン学習環境の構築と、教員による質の高い授業実現のためのICT機器整備を進めています。","story_impact":"判断できない","pdf_page":594,"cls":"未来を切り拓く学校教育の推進"},{"no":"595","name":"学校システム運営費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":210817,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"学校事務をシステム化・ネットワーク化することで、事務作業の効率化と省力化を実現しています。学齢簿や学校保健、給食情報の管理、児童生徒の出欠席や成績管理などをデジタル化し、学校運営をサポートしています。","story_p2":"学校事務システムは約2,040名が利用し学齢簿管理や給食業務を、校務支援システムは約1,750名の教職員が出欠席・成績管理に活用しており、業務の正確性と効率性を向上させています。","story_impact":"判断できない","pdf_page":595,"cls":"未来を切り拓く学校教育の推進"},{"no":"596","name":"特色ある教育活動経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":32000,"root":"データなし","ev":"改善（手段変更）","ptype":"9","story_p1":"特色ある教育活動の実施と学習環境の向上のため、補助的教材と学校備品の整備を行っています。小中一貫教育に基づき、学校間の連携と教員の指導力向上を意識した教育活動を展開しています。","story_p2":"38校からの要望のうち35校について、楽器などの教材や学習環境向上の備品、校内活動に必要な物品等の予算計上を行いました。また、全校で学校別パンフレットを作成し、各学校の特色ある教育活動を推進しています。","story_impact":"判断できない","pdf_page":596,"cls":"未来を切り拓く学校教育の推進"},{"no":"597","name":"学校図書館資料整備費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":44589,"root":"データなし","ev":"現状継続","ptype":"6","story_p1":"児童生徒の学習や読書活動を充実させるために、学校図書館の蔵書を増やし、教育環境を整備しています。","story_p2":"学習・読書活動の推進のため、区立学校への図書購入予算を令達し、小学校では約38万～39万冊、中学校では約15万～15万冊で推移しています。文科省基準対比率により、学校図書館の整備状況が測定されています。","story_impact":"判断できない","pdf_page":597,"cls":"未来を切り拓く学校教育の推進"},{"no":"598","name":"学校維持管理費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":1486835,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"子どもたちが安全で快適に学べる環境を整えるため、学校の施設・設備の維持管理を行っています。電気やガス、水道の管理から機器の点検、ごみ回収まで、学校運営に必要な様々な業務を実施しています。","story_p2":"学校5校の維持管理を実施し、電気15,372千KWH、ガス2,326,467㎥、水道376,622㎥を使用しました。可燃ごみ212,705㎏、不満燃ごみ92,168㎏を回収し、粗大ごみの廃棄87台、リサイクル68台を処理しました。消火器1,756本、ガスストーブ177台、救助袋64基、避難ハシゴ40基の保守点検を実施し、施設の安全性と機能維持を図りました。","story_impact":"判断できない","pdf_page":598,"cls":"未来を切り拓く学校教育の推進"},{"no":"599","name":"学校運営費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":460368,"root":"データなし","ev":"改善（手段変更）","ptype":"6","story_p1":"子どもたちが快適に学べる環境を整備し、学校の円滑な運営を図るために、校舎の備品更新、教室改修、行事運営、防犯用具購入などを行っています。","story_p2":"黒板5枚の取替、放送室音声調整卓2校の整備、23学級の普通教室改修工事・備品整備を実施し、学校施設の環境整備を進めました。また、7年生1815個への防災ヘルメット配備により、児童生徒の安全確保体制を整備しています。","story_impact":"判断できない","pdf_page":599,"cls":"未来を切り拓く学校教育の推進"},{"no":"600","name":"給食運営費","bureau":"教育委員会事務局","dept":"教育委員会事務局　学務課","budget":3108571,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"学校給食を安定的に提供し、良好な給食環境を整備するために、調理業務の委託や食器などの消耗品購入、生ごみのリサイクル処理などを実施しています。","story_p2":"給食調理業務と栄養士業務委託は総合評価方式で実施し、モニタリングを通じて安定的な給食提供と学校からの高評価を得ています。牛乳紙パック回収はリサイクル環境教育として実施校が増加し、衛生講習会は年2回開催され、食の安全性確保に取り組んでいます。","story_impact":"判断できない","pdf_page":600,"cls" 教育の推進"},{"no":"606","name":"教職員研修","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":29757,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"将来の教育を担う優秀な教職員の育成を図るため、産能マネージメントスクールの研修補助や幼児教育研修などを実施しています。","story_p2":"産業能率大学の研修を中堅教員研修として活用し、創造的な見方や広い視野を持つ人材育成を目指した。幼児教育研修会と幼稚園教諭フォローアップ研修会も実施し、グループ協議や環境の工夫をテーマとした内容により、教員の学びを深めた。","story_impact":"判断できない","pdf_page":606,"cls":"未来を切り拓く学校教育の推進"},{"no":"607","name":"教職員支援経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":315017,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"教員の長時間勤務を改善し、授業準備などの本来業務に専念できる環境を整えるため、勤務時間外の電話対応を委託し、事務補助職員を配置しています。","story_p2":"全46校の区立学校で夜間電話対応委託を展開し、都の補助金を活用してSSS、副校長補佐、エデュケーション・アシスタントの配置による人的支援を拡充しました。小学校2校への新規配置に続き、全小学校への拡大を予定しています。","story_impact":"判断できない","pdf_page":607,"cls":"未来を切り拓く学校教育の推進"},{"no":"608","name":"一貫教育推進経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":307751,"root":"データなし","ev":"現状継続","ptype":"9","story_p1":"児童・生徒の学力向上と学校改善を実現するため、一貫教育の効果を評価・検討し、教育課程や指導方法の課題解決に取り組んでいます。","story_p2":"教育検討委員会および教科等検討部会を複数回開催し、一貫教育の推進と学力向上施策について協議しました。また、2～9年生を対象とした学力定着度調査を年1回実施し、指導計画の見直しと教職員の資質向上に取り組みました。保護者と生徒による一貫教育の推進に関する評価を実施し、事業の成果を測定しています。","story_impact":"判断できない","pdf_page":608,"cls":"未来を切り拓く学校教育の推進"},{"no":"609","name":"習熟度別学習推進経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":33154,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"一人ひとりの学力や能力に応じた指導を行い、基礎的な学習内容の確実な定着を図るために、指導助手を配置して習熟度別のグループ学習を実施しています。","story_p2":"申請のあった学校に指導助手を配置し、算数・数学の授業で一人ひとりの習熟度に応じた指導を実施しました。また、加配教員により3年生から9年生で少人数習熟度別指導を展開しています。","story_impact":"判断できない","pdf_page":609,"cls":"未来を切り拓く学校教育の推進"},{"no":"610","name":"特色ある教育活動経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":10663,"root":"データなし","ev":"改善（手段変更）","ptype":"4","story_p1":"豊かな心と確かな学力を備え、グローバル社会で活躍する人材を育成するため、学校支援ボランティアの配置や地域人材による教育活動支援、基礎学力向上事業、職業体験授業などの特色ある教育活動を実施しています。","story_p2":"学校独自予算については19校から要望があり、児童・生徒の学習効果が期待できる18校について予算計上しました。しながわドリームジョブでは、地域の職業人を講師として招き、児童・生徒が様々な職業について直接学び、自分の将来について考える機会を提供しています。","story_impact":"判断できない","pdf_page":610,"cls":"未来を切り拓く学校教育の推進"},{"no":"611","name":"学力向上プラン推進事業","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":5821,"root":"データなし","ev":"改善（手段変更）","ptype":"5","story_p1":"家庭学習の習慣が身についていない生徒を対象に、夏季休業期間中に宿泊・日帰りの勉強合宿を実施し、集中して学習できる環境で自己学習能力を伸ばすとともに、学習習慣の定着と進路選択の幅を広げています。","story_p2":"夏季休業期間中に8年生を対象とした勉強合宿を実施し、指導助手等による複数体制での指導を行いました。宿泊型と日帰型を組み合わせた実施により、参加生徒の学力向上を支援しています。","story_impact":"判断できない","pdf_page":611,"cls":"未来を切り拓く学校教育の推進"},{"no":"612","name":"多様性理解・多文化共生推進事業","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":17346,"root":"データなし","ev":"現状継続","ptype":"5","story_p1":"国際社会に貢献できる人材を育成するため、パラスポーツ体験やアスリートとの交流、大使館との連携を通じて、多様性理解と多文化共生を推進しています。","story_p2":"ブラインドサッカー体験教室を実施し、児童・生徒のスポーツへの関心拡大と障害者理解の醸成を図るとともに、教員向け研修により指導方法の改善につなげた。","story_impact":"判断できない","pdf_page":612,"cls":"未来を切り拓く学校教育の推進"},{"no":"613","name":"１～６年生の英語科経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":222226,"root":"データなし","ev":"現状継続","ptype":"4","story_p1":"英語によるコミュニケーション能力の向上と国際理解に必要な主体性を養うため、1年生から体系的な英語教育を実施しています。外国語指導助手による実践的な授業と、独自の指導内容を組み合わせた学習を行っています。","story_p2":"1・2年生の全授業にALTを年間35時間派遣し、3・4年生には年間35時間、5・6年生には年間70時間のJTEを配置しました。ジュニア・イングリッシュキャンプは全校で実施され、児童・保護者の9割以上が1年生からの英語教育を肯定的に評価しています。","story_impact":"判断できない","pdf_page":613,"cls":"未来を切り拓く学校教育の推進"},{"no":"614","name":"英語力向上推進経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":105198,"root":"データなし","ev":"現状継続","ptype":"4","story_p1":"7～9年生の英語によるコミュニケーション能力を高め、世界の言語や文化への理解を深めるために、ALTによる指導やオンライン英会話レッスン、放課後の英会話教室やイングリッシュキャンプなどを実施しています。","story_p2":"英語教育を推進するため、外国語指導助手を各クラスに年間10回派遣するとともに、全15校でオンライン英会話レッスンとグローバル人材育成塾を実施しました。8年生は年間8～10回、7・9年生は年間4回のレッスンを受講し、イングリッシュキャンプも宿泊型・日帰型で開催されています。","story_impact":"判断できない","pdf_page":614,"cls":"未来を切り拓く学校教育の推進"},{"no":"615","name":"保幼小連携推進経費","bureau":"教育委員会事務局","dept":"教育委員会事務局　指導課","budget":10242,"root":"データなし","ev":"縮小","ptype":"9","story_p1":"幼稚園や保育園から小学校への円滑な接続と就学前教育の充実を図るため、独自のカリキュラムの啓発と、子どもたちの成長や好奇心を応援する都の推進事業を実施しています。","story_p2":"保幼小の円滑な接続を目指し、「親子で準備わくわく1年生」のリーフレットを作成・配付しました。幼児期に育てたい力   '6': 'blue', '7': 'blue', '8': 'blue',
  '9': 'gray', '10': 'gray',
  '11': 'amber', '12': 'amber',
  '13': 'purple',
};
let ratings = {};
let rootFilter = '';      // '' = 全事業 / ROOT_ORDERのいずれかで絞り込み（チャート・施策一覧・ドリルダウン全てに反映）
let curCls = null;        // 現在ドリルダウン中の施策
let selected = new Set(); // opt-in選択された事業番号
let queue = [];           // 評価キュー（selectedから作る）
let qCursor = 0;
let openEvKeys = null;    // ドリルダウンの行政評価セクションの開閉状態（チェックボックス操作の再描画をまたいで保持。nullなら次回描画時に既定値で初期化）
let peopleAgg = null;     // Supabase集計結果 {no: {続行,廃止,見直し}}（取得前はnull）
let voteFilter = '';      // 評価結果一覧のフィルタ：'' 全事業 / '続行'/'廃止'/'見直し' / '未評価'（自分は未評価・みんなは投票済み）
let curScreen = 'map';    // 現在表示中の画面（loadPeopleData完了後の再描画先を追跡）

function load() {
  try { ratings = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) {}
  showRenewalNoticeIfNeeded();
  render('map');
  loadPeopleData(); // ドリルダウンで「みんなの評価」を見せるため、投票前でも起動時に取得する
}

// 旧v2利用者向け：評価内容が引き継がれないことの一度きりの案内（v2の保存キーが残っている＝過去に利用した形跡がある場合のみ表示）
function showRenewalNoticeIfNeeded() {
  const NOTICE_KEY = LS_KEY + '_renewal_notice_shown';
  if (localStorage.getItem(OLD_LS_KEY) && !localStorage.getItem(NOTICE_KEY)) {
    alert('このツールは新しくなりました。恐れ入りますが、以前ご利用いただいた際の評価内容は引き継がれません。お手数をおかけしますが、改めてご覧いただければと思います。');
    localStorage.setItem(NOTICE_KEY, '1');
  }
}

function fmt(n) {
  if (!n) return '0';
  return n.toLocaleString();
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fracPct(count, total) {
  const pct = total ? Math.round(count / total * 100) : 0;
  return `${count}/${total}（${pct}%）`;
}

function personnelCostHtml() {
  const val = LABELS.personnel_cost || '確認取れず';
  return ['含む','含まない','確認取れず'].map(o => `${o===val?'☑':'☐'}${o}`).join('　');
}

function rootTagHtml(root) {
  return `<span class="tag troot-${esc(root)}">${esc(root)}</span>`;
}
function evTagHtml(ev) {
  return `<span class="tag tev-${esc(ev)}">行政評価：${esc(ev)}</span>`;
}
// 表の列見出し（法定義務／行政評価）で文脈が既に示されている場合の短縮版タグ
function rootTagShortHtml(root) {
  const short = root.startsWith('法定義務') ? root.replace('法定義務', '') : root;
  return `<span class="tag troot-${esc(root)}">${esc(short)}</span>`;
}
function evTagShortHtml(ev) {
  return `<span class="tag tev-${esc(ev)}">${esc(ev)}</span>`;
}
function ptypeTagHtml(ptype) {
  const tier = PTYPE_TIER[ptype] || 'amber';
  const label = PTYPE_LABEL[ptype] || ptype;
  return `<span class="tag tptype-${tier}">${esc(label)}</span>`;
}
// ドリルダウン表用：短縮ラベル版
function ptypeTagShortHtml(ptype) {
  const tier = PTYPE_TIER[ptype] || 'amber';
  const label = PTYPE_LABEL_SHORT[ptype] || ptype;
  return `<span class="tag tptype-${tier}">${esc(label)}</span>`;
}
function ratingTagHtml(r) {
  return r ? `<span class="tag tev-${esc(r)}">あなたの評価：${esc(r)}</span>` : '';
}

// ── 施策(cls)別集計（常に全事業ベース）──────────────────────────────────
function clsStats() {
  const map = {};
  let grandTotal = 0;
  EVENTS.forEach(e => {
    const c = e.cls || 'データなし';
    if (!map[c]) map[c] = { cls: c, count: 0, budget: 0 };
    map[c].count++;
    map[c].budget += e.budget;
    grandTotal += e.budget;
  });
  return { list: Object.values(map), grandTotal };
}

// ── 法的根拠フィルタ（チャート・施策一覧・ドリルダウンすべてに反映） ─────────
function setRootFilter(val) { rootFilter = val; render('map'); }
function matchesFilter(e) { return !rootFilter || e.root === rootFilter; }
function rootFilterOptions() {
  const totals = {};
  EVENTS.forEach(e => { totals[e.root] = (totals[e.root] || 0) + 1; });
  return ROOT_ORDER.filter(r => totals[r] > 0);
}
function filteredClsBudgets() {
  const map = {};
  let total = 0;
  EVENTS.forEach(e => {
    if (!matchesFilter(e)) return;
    const c = e.cls || 'データなし';
    map[c] = (map[c] || 0) + e.budget;
    total += e.budget;
  });
  return { map, total };
}

// ── 画面切替 ─────────────────────────────────────────────────────────────
function render(screen) {
  curScreen = screen;
  const app = document.getElementById('app');
  if (screen === 'map') renderMap(app);
  else if (screen === 'cls') renderClsDrill(app);
  else if (screen === 'eval') renderEval(app);
  else if (screen === 'summary') renderSummary(app);
}

// ── ①全体像マップ ────────────────────────────────────────────────────────
function renderMap(app) {
  const { list: fullList } = clsStats();
  const { map: filteredMap, total: filteredTotal } = filteredClsBudgets();
  const visible = fullList.filter(s => (filteredMap[s.cls] || 0) > 0);
  const sorted = visible.slice().sort((a,b) => (filteredMap[b.cls] || 0) - (filteredMap[a.cls] || 0));
  const maxBudget = Math.max(...sorted.map(s => filteredMap[s.cls] || 0), 1);
  const filteredCount = EVENTS.filter(matchesFilter).length;

  const filterBtns = [''].concat(rootFilterOptions()).map(r => {
    const label = r || '全事業';
    return `<button class="stbtn${rootFilter===r?' active':''}" onclick="setRootFilter('${esc(r)}')">${esc(label)}</button>`;
  }).join('');

  const cards = sorted.map(s => {
    const fBudget = filteredMap[s.cls] || 0;
    const evalTarget = EVENTS.filter(e => (e.cls || 'データなし') === s.cls && matchesFilter(e));
    const evaluated = evalTarget.filter(e => ratings[e.no]).length;
    const barPct = maxBudget ? (fBudget / maxBudget * 100).toFixed(1) : 0;
    const sharePct = filteredTotal ? (fBudget / filteredTotal * 100).toFixed(1) : '0.0';
    return `<div class="clsbox" onclick="openCls('${esc(s.cls)}')">
      <div class="clstop">
        <span class="clsname" title="${esc(s.cls)}">${esc(s.cls)}</span>
        <span class="clsamt">${(fBudget/100000).toFixed(1)}億円 <b>${sharePct}%</b></span>
      </div>
      <div class="clsbar-wrap"><div class="clsbar" style="width:${barPct}%"></div></div>
      <div class="clsmeta">${evalTarget.length}件中 評価済み${evaluated}件</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="hd">
      <h1>${esc(LABELS.tool_title)}</h1>
      <div class="sub">${esc(LABELS.card_title)}（全${EVENTS.length}件・${esc(LABELS.cls)}${fullList.length}区分）</div>
    </div>
    <div class="card">
      <div class="filterrow">${filterBtns}</div>
      <p class="maphint">「法定義務なし」を選ぶと、住民の裁量判断が及ぶ事業だけに絞って施策別に確認できます。バーの長さと％は、絞り込み対象の中でその施策が占める規模を表します。</p>
      <div class="fresult">${filteredCount}件・${(filteredTotal/100000).toFixed(1)}億円が対象（${esc(LABELS.cls)}${sorted.length}区分・クリックで事業を選んで評価）</div>
      <div class="clsgrid-wrap"><div class="clsgrid">${cards}</div></div>
    </div>
    <button class="btn btn-o btn-full" onclick="render('summary')">📊 サマリー・投票を見る</button>
    <div class="card" style="font-size:.75rem;color:#6b7280;line-height:1.5">
      <strong>出典：</strong><a href="${esc(LABELS.source_url)}" target="_blank">${esc(LABELS.source_url)}</a>／${esc(LABELS.card_title)}／住民1人あたりコストは人口${fmt(LABELS.population)}人（<a href="https://www.digital.go.jp/resources/japandashboard/municipal-finance" target="_blank">デジタル庁 地方財政ダッシュボード</a>）で計算
    </div>`;
}

// ── cls ドリルダウン（opt-in選択） ─────────────────────────────────────────
function openCls(cls) {
  curCls = cls;
  selected = new Set();
  openEvKeys = null; // 次回描画時に「現状継続」以外を開いた既定状態で初期化
  render('cls');
}

function renderClsDrill(app) {
  const evs = EVENTS.filter(e => (e.cls || 'データなし') === curCls && matchesFilter(e));

  // グルーピング軸は行政評価ev一本（現状継続のみ既定で折りたたみ）。
  // 12分類（支援対象×提供形態）は行ごとのバッジで「何をしている事業か」を示すのみで、グルーピングには使わない。
  const groups = {};
  evs.forEach(e => {
    const key = e.ev || 'データなし';
    (groups[key] = groups[key] || []).push(e);
  });
  const orderedKeys = EV_PRIORITY.filter(k => groups[k]).concat(Object.keys(groups).filter(k => !EV_PRIORITY.includes(k)));

  // 開閉状態は openEvKeys に保持し、チェックボックス操作による再描画をまたいで維持する（既定はすべて折りたたみ）
  if (!openEvKeys) {
    openEvKeys = new Set();
  }

  const evRowHtml = e => {
    const checked = selected.has(e.no) ? 'checked' : '';
    return `<tr>
      <td class="evtd-chk"><input type="checkbox" ${checked} onchange="toggleSel('${e.no}')"></td>
      <td class="evtd-name" onclick="toggleSel('${e.no}')">${esc(e.name)}</td>
      <td class="evtd-budget">${(e.budget/100000).toFixed(1)}億円</td>
      <td class="evtd-root">${rootTagShortHtml(e.root)}</td>
      <td class="evtd-ptype">${ptypeTagShortHtml(e.ptype)}</td>
      <td class="evtd-mine">${myRatingCellHtml(ratings[e.no])}</td>
      <td class="evtd-vote">${voteCellStackHtml(peopleAgg && peopleAgg[e.no])}</td>
    </tr>`;
  };

  const evTableHtml = list => `<div class="evtbl-wrap"><table class="evtbl">
    <thead><tr><th></th><th>事務事業名</th><th>金額</th><th>法定義務</th><th>提供形態</th><th>自分の評価</th><th>みんなの評価</th></tr></thead>
    <tbody>${list.map(evRowHtml).join('')}</tbody>
  </table></div>`;

  const sections = orderedKeys.map(key => {
    const list = groups[key].slice().sort((a,b) => b.budget - a.budget);
    const sumOku = (list.reduce((s,e)=>s+e.budget,0)/100000).toFixed(1);
    const openAttr = openEvKeys.has(key) ? ' open' : '';
    return `<details class="evsec" data-evkey="${esc(key)}"${openAttr} ontoggle="onEvToggle(this)">
      <summary>行政による評価結果が${esc(key)}の事務事業（${list.length}件・${sumOku}億円）</summary>
      <div class="evsec-body">${evTableHtml(list)}</div>
    </details>`;
  }).join('');

  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('map')">← マップに戻る</button>
        <span class="cnav-mid-wrap" title="${esc(curCls)}">${esc(curCls)}${rootFilter ? `（${esc(rootFilter)}のみ）` : ''}</span>
      </div>
    </div>
    <div class="card">
      <div class="bbtns" style="margin-bottom:10px">
        <button class="btn btn-o btn-sm" onclick="selectAllCls(true)">全選択</button>
        <button class="btn btn-o btn-sm" onclick="selectAllCls(false)">全解除</button>
        <span style="font-size:.8rem;color:#6b7280;align-self:center">${evs.length}件中 ${selected.size}件選択中</span>
      </div>
      <p class="maphint" style="margin-bottom:10px">行政による今後の方向性（廃止方向・縮小など変化がある区分）を先頭に表示しています。すべて折りたたんでいます。気になる区分をタップして展開してください。</p>
      ${sections}
    </div>
    <div class="sticky-spacer no-print"></div>
    <div class="sticky-actions no-print">
      <div class="sticky-inner">
        <button class="btn btn-o btn-full" onclick="render('summary')">📊 サマリー・投票を見る</button>
        <button class="btn btn-p btn-full" ${selected.size ? '' : 'disabled'} onclick="startEvalQueue()">選択した事業を評価する（${selected.size}件）</button>
      </div>
    </div>`;
}

function toggleSel(no) {
  if (selected.has(no)) selected.delete(no); else selected.add(no);
  render('cls');
}
function onEvToggle(detailsEl) {
  const key = detailsEl.getAttribute('data-evkey');
  if (detailsEl.open) openEvKeys.add(key); else openEvKeys.delete(key);
}
function selectAllCls(all) {
  const evs = EVENTS.filter(e => (e.cls || 'データなし') === curCls && matchesFilter(e));
  selected = all ? new Set(evs.map(e => e.no)) : new Set();
  render('cls');
}

// ── ②個別評価（opt-inキュー） ───────────────────────────────────────────
function startEvalQueue() {
  if (!selected.size) return;
  queue = EVENTS.filter(e => selected.has(e.no)).sort((a,b) => b.budget - a.budget);
  qCursor = 0;
  render('eval');
}

function renderEval(app) {
  if (qCursor < 0) qCursor = 0;
  if (qCursor >= queue.length) qCursor = queue.length - 1;
  const e = queue[qCursor];
  const r = ratings[e.no] || '';
  const rcls = r === '続行' ? 'rk' : r === '廃止' ? 'rh' : r === '見直し' ? 'rf' : '';
  const budgetText = e.budget ? `${fmt(e.budget)}千円` : '—';
  const impact = e.story_impact;
  const hasImpact = impact && impact !== '判断できない';
  const s3text = hasImpact
    ? `この事業がなくなった場合、${impact}という問題が起きると想定されています。`
    : `評価シートに記載されていません。`;
  const pct = Math.round((qCursor + 1) / queue.length * 100);

  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('cls')" title="${esc(curCls)}の一覧">← ${esc(curCls)}の一覧</button>
        <span class="cnav-mid">${qCursor+1} / ${queue.length} 件目</span>
        <button class="cnav-btn" onclick="render('map')">マップへ</button>
      </div>
    </div>
    <div class="pbwrap no-print"><div class="pbfill" style="width:${pct}%"></div></div>
    <div class="ecard ${rcls}">
      <div class="ename">${esc(e.name)}</div>
      <div class="emeta">${esc(LABELS.no_col)}：${esc(e.no)}　${esc(LABELS.dept)}：${esc(e.dept)}</div>
      <div class="tags">
        ${rootTagHtml(e.root)}
        ${evTagHtml(e.ev)}
        ${ptypeTagHtml(e.ptype)}
      </div>
      <div class="story">
        <div class="story-label">目的・事業内容</div>
        <p>${esc(e.story_p1)}</p>
      </div>
      <div class="ebudget">R6決算：<span class="amt">${budgetText}</span>　<span style="color:#6b7280;font-size:.8rem">（住民1人あたり約${fmt(Math.round(e.budget*1000/LABELS.population))}円/年）</span></div>
      <div style="font-size:.78rem;color:#6b7280;margin:-8px 0 12px">人件費：${personnelCostHtml()}</div>
      <div class="story">
        <div class="story-label">成果</div>
        <p>${esc(e.story_p2)}</p>
      </div>
      <div class="story">
        <div class="story-label">廃止した場合の影響</div>
        <p>${esc(s3text)}</p>
      </div>
    </div>
    <div class="sticky-spacer tall no-print"></div>
    <div class="sticky-actions no-print">
      <div class="sticky-inner">
        <p class="ai-note">※目的・事業内容、成果、廃止した場合の影響の説明文は、評価シートを元にAIが自動生成しています。内容に違和感がある場合や詳細を確認したい場合は、下のリンクから評価シートをご確認ください。</p>
        <a class="btn btn-p btn-full" href="${(() => { const pdfUrl = e.pdf_url || LABELS.pdf_url || LABELS.source_url; return esc(pdfUrl); })()}#page=${e.pdf_page + 1}" target="_blank">📄 評価シートを確認（p.${e.pdf_page}）</a>
        <div class="rbtns">
          <button class="rbtn${r==='続行'?' ak':''}" onclick="rateQueue('続行')">✓ 続行<small>活動内容と予算に納得</small></button>
          <button class="rbtn${r==='廃止'?' ah':''}" onclick="rateQueue('廃止')">✕ 廃止<small>活動内容に納得できない</small></button>
          <button class="rbtn${r==='見直し'?' af':''}" onclick="rateQueue('見直し')">△ 見直し<small>予算に納得できない</small></button>
        </div>
        <div class="nav">
          <button class="btn btn-o btn-sm" onclick="goQueue(-1)" ${qCursor===0?'disabled':''}>◀ 前へ</button>
          <span class="cpos">${qCursor+1} / ${queue.length}</span>
          <button class="btn btn-o btn-sm" onclick="goQueue(1)" ${qCursor===queue.length-1?'disabled':''}>次へ ▶</button>
        </div>
      </div>
    </div>`;
}

function rateQueue(val) {
  const e = queue[qCursor];
  ratings[e.no] = val;
  localStorage.setItem(LS_KEY, JSON.stringify(ratings));
  if (qCursor < queue.length - 1) {
    qCursor++;
    render('eval');
  } else {
    // 選んだ事業をすべて評価し終えたらマップに戻る（「評価しては戻ってきてを繰り返す」フロー）
    selected = new Set();
    render('cls');
  }
}
function goQueue(dir) {
  qCursor += dir;
  render('eval');
}

// ── ③サマリー・投票 ─────────────────────────────────────────────────────
function renderSummary(app) {
  app.innerHTML = `
    <div class="hd no-print">
      <div class="card-nav">
        <button class="cnav-btn" onclick="render('map')">← マップに戻る</button>
        <span class="cnav-mid">📊 サマリー・投票</span>
      </div>
    </div>
    <div class="card">
      <h2 style="font-size:1rem;font-weight:700;margin-bottom:10px">${esc(LABELS.summary_title)}</h2>
      <div class="no-print" style="margin-bottom:12px">
        <button id="submit-btn" class="btn btn-p btn-sm" onclick="submitToSupabase()">📤 投票する</button>
        <span style="font-size:.8rem;color:#6b7280;margin-left:10px">投票すると、みんなの評価に反映されます。<br>送信されるのは事業番号・評価結果（続行/廃止/見直し）・送信日時のみです。個人情報は一切収集しません。<br>追加で評価した事業がある場合は、再度このボタンから投票できます（同じ事業を重複して送信することはありません）。<br>実際の収集情報は下の📥 生データCSVから閲覧できます。</span>
      </div>
      <p style="font-size:.78rem;color:#6b7280;margin-bottom:10px">自分が評価した事業、または誰かが投票済みの事業を対象に表示しています。</p>
      <div id="vote-section"><p style="color:#6b7280;font-size:.85rem">読み込み中...</p></div>
    </div>
    <button class="btn btn-o btn-full no-print" onclick="render('map')">← マップに戻る</button>
    <button class="btn btn-o btn-full no-print" onclick="if(confirm('評価をすべてリセットしますか？')){localStorage.removeItem(LS_KEY);localStorage.removeItem(SUBMITTED_KEY);ratings={};render('map')}">🗑 評価をリセット</button>`;
  loadPeopleData();
}

function getSubmittedNos() {
  try {
    const v = JSON.parse(localStorage.getItem(SUBMITTED_KEY) || '[]');
    return Array.isArray(v) ? v : [];
  } catch (e) { return []; }
}

async function submitToSupabase() {
  const already = new Set(getSubmittedNos());
  const rows = Object.entries(ratings)
    .filter(([no, r]) => r && !already.has(no))
    .map(([no, r]) => ({ municipality_id: MUNICIPALITY_ID, event_no: no, rating: r }));
  if (!rows.length) { alert('新しく評価した事業がありません。'); return; }
  const btn = document.getElementById('submit-btn');
  if (btn) { btn.disabled = true; btn.textContent = '送信中...'; }
  const { error } = await sb.from('ratings').insert(rows);
  if (error) {
    alert('送信エラー: ' + error.message);
    if (btn) { btn.disabled = false; btn.textContent = '📤 投票する'; }
    return;
  }
  rows.forEach(r => already.add(r.event_no));
  localStorage.setItem(SUBMITTED_KEY, JSON.stringify([...already]));
  if (btn) { btn.disabled = false; btn.textContent = '📤 投票する'; }
  alert(`${rows.length}件を送信しました。`);
  loadPeopleData();
}

async function loadPeopleData() {
  const { data, error } = await sb
    .from('ratings').select('event_no,rating').eq('municipality_id', MUNICIPALITY_ID);
  if (error) {
    const section = document.getElementById('vote-section');
    if (section) section.innerHTML = '<p style="color:#ef4444;font-size:.85rem">データの取得に失敗しました。</p>';
    return;
  }
  const agg = {};
  (data || []).forEach(row => {
    if (!agg[row.event_no]) agg[row.event_no] = {'続行':0,'廃止':0,'見直し':0};
    if (agg[row.event_no][row.rating] !== undefined) agg[row.event_no][row.rating]++;
  });
  peopleAgg = agg;
  // サマリー画面は投票セクションだけ差し替え（renderSummary経由だとloadPeopleDataを再度呼び無限ループになるため）。
  // それ以外（マップ・ドリルダウン等）は画面全体を再描画し、ドリルダウンの「みんなの評価」列に反映する。
  if (curScreen === 'summary') renderVoteSection();
  else render(curScreen);
}

function setVoteFilter(v) { voteFilter = v; renderVoteSection(); }

// 対象＝自分が評価した事業 ∪ 誰かが投票済みの事業。voteFilterで絞り込む
function voteRows() {
  if (!peopleAgg) return [];
  return EVENTS.filter(e => {
    const mine = ratings[e.no] || '';
    const agg = peopleAgg[e.no];
    const hasVotes = !!agg && (agg['続行'] + agg['廃止'] + agg['見直し'] > 0);
    if (!mine && !hasVotes) return false;
    if (voteFilter === '') return true;
    if (voteFilter === '未評価') return !mine && hasVotes;
    return mine === voteFilter;
  }).sort((a, b) => b.budget - a.budget);
}

function myRatingCellHtml(r) {
  return r ? `<span class="tag tev-${esc(r)}">${esc(r)}</span>` : '<span style="color:#9ca3af">未評価</span>';
}
function voteCellHtml(agg) {
  const c = agg || {'続行':0,'廃止':0,'見直し':0};
  const total = c['続行'] + c['廃止'] + c['見直し'];
  if (!total) return '<span style="color:#9ca3af">-</span>';
  return `<span class="pc pc-k">続${c['続行']}</span><span class="pc pc-h">廃${c['廃止']}</span><span class="pc pc-f">見${c['見直し']}</span>`;
}
// ドリルダウン表用：列幅が狭いため3つのバッジを縦積みにする版
function voteCellStackHtml(agg) {
  const c = agg || {'続行':0,'廃止':0,'見直し':0};
  const total = c['続行'] + c['廃止'] + c['見直し'];
  if (!total) return '<span style="color:#9ca3af;font-size:.72rem">-</span>';
  return `<div class="vote-stack"><span class="pc pc-k">続${c['続行']}</span><span class="pc pc-h">廃${c['廃止']}</span><span class="pc pc-f">見${c['見直し']}</span></div>`;
}
function classifyStackHtml(e) {
  return `<div class="vtag-stack">${rootTagHtml(e.root)}${ptypeTagHtml(e.ptype)}${evTagHtml(e.ev)}</div>`;
}
function voteCsvText(rows) {
  const header = ['事業番号','事務事業名','施策',LABELS.dept,'金額','法定義務','提供形態','行政評価','自分の評価','続行票','廃止票','見直し票'];
  const csvRows = rows.map(e => {
    const c = peopleAgg[e.no] || {'続行':0,'廃止':0,'見直し':0};
    return [e.no, e.name, e.cls, e.dept, e.budget, e.root, PTYPE_LABEL[e.ptype] || e.ptype, e.ev, ratings[e.no] || '', c['続行'], c['廃止'], c['見直し']];
  });
  return '﻿' + [header, ...csvRows].map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
}
function downloadVoteCsv() {
  const csv = voteCsvText(voteRows());
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = '品川区_評価結果一覧.csv';
  a.click();
}

// 透明性確保のための生データ出力：Supabaseに蓄積された全投票ログをそのまま書き出す（現在の絞り込みの影響を受けない）
async function downloadPeopleCsv() {
  const { data, error } = await sb
    .from('ratings').select('id,municipality_id,event_no,rating,submitted_at')
    .eq('municipality_id', MUNICIPALITY_ID).order('submitted_at');
  if (error) { alert('取得エラー: ' + error.message); return; }
  const header = ['id', 'municipality_id', 'event_no', 'rating', 'submitted_at'];
  const csvRows = (data || []).map(r => header.map(k => '"' + String(r[k]).replace(/"/g, '""') + '"').join(','));
  const csv = '﻿' + [header.join(','), ...csvRows].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type: 'text/csv'}));
  a.download = MUNICIPALITY_ID + '_ratings.csv';
  a.click();
}

function renderVoteSection() {
  const section = document.getElementById('vote-section');
  if (!section) return;
  if (!peopleAgg) { section.innerHTML = '<p style="color:#6b7280;font-size:.85rem">読み込み中...</p>'; return; }

  const allData = Object.values(peopleAgg).reduce((a, c) => ({
    '続行': a['続行'] + c['続行'], '廃止': a['廃止'] + c['廃止'], '見直し': a['見直し'] + c['見直し']
  }), {'続行': 0, '廃止': 0, '見直し': 0});
  const totalVotes = allData['続行'] + allData['廃止'] + allData['見直し'];

  if (!totalVotes && !Object.values(ratings).some(r => r)) {
    section.innerHTML = '<p style="color:#6b7280;font-size:.85rem">まだ評価・投票がありません。</p>';
    return;
  }

  const filterOptions = ['', '続行', '廃止', '見直し', '未評価'];
  const filterBtns = filterOptions.map(v => {
    const label = v || '全事業';
    return `<button class="stbtn${voteFilter === v ? ' active' : ''}" onclick="setVoteFilter('${esc(v)}')">${esc(label)}</button>`;
  }).join('');

  const rows = voteRows();

  // ブラウザ表示用：6列に圧縮し、セル内で折り返す（横スクロール不要）
  const compactRows = rows.map(e => `<tr>
      <td><div class="evtd-name">${esc(e.name)}</div><div class="vno">No.${esc(e.no)}</div></td>
      <td>${esc(e.cls)}<div class="vsub">${esc(e.dept)}</div></td>
      <td>${fmt(e.budget)}千円</td>
      <td>${classifyStackHtml(e)}</td>
      <td>${myRatingCellHtml(ratings[e.no])}</td>
      <td>${voteCellHtml(peopleAgg[e.no])}</td>
    </tr>`).join('');

  // 印刷・CSV用：完全版10列（画面には出さず@media printでのみ表示）
  const printRows = rows.map(e => `<tr>
      <td>${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td>${esc(e.cls)}</td>
      <td>${esc(e.dept)}</td>
      <td>${fmt(e.budget)}千円</td>
      <td>${rootTagShortHtml(e.root)}</td>
      <td>${ptypeTagHtml(e.ptype)}</td>
      <td>${evTagShortHtml(e.ev)}</td>
      <td>${myRatingCellHtml(ratings[e.no])}</td>
      <td>${voteCellHtml(peopleAgg[e.no])}</td>
    </tr>`).join('');

  section.innerHTML = `
    <div class="kgrid" style="margin-bottom:12px">
      <div class="kbox kk"><div class="klbl">続行票</div><div class="knum">${allData['続行']}</div></div>
      <div class="kbox kh"><div class="klbl">廃止票</div><div class="knum">${allData['廃止']}</div></div>
      <div class="kbox kf"><div class="klbl">見直し票</div><div class="knum">${allData['見直し']}</div></div>
      <div class="kbox ku"><div class="klbl">総投票数</div><div class="knum">${totalVotes}</div></div>
    </div>
    <div class="filterrow no-print">${filterBtns}</div>
    <div class="bbtns no-print" style="margin-bottom:8px">
      <button class="btn btn-o btn-sm" onclick="window.print()">🖨 印刷（全項目）</button>
      <button class="btn btn-o btn-sm" onclick="downloadVoteCsv()">📥 CSVダウンロード（全項目）</button>
      <button class="btn btn-o btn-sm" onclick="downloadPeopleCsv()">📥 生データCSV</button>
    </div>
    <div class="votetbl-wrap"><table class="votetbl">
      <thead><tr><th>事務事業名</th><th>施策／担当課</th><th>金額</th><th>分類</th><th>自分の評価</th><th>みんなの投票</th></tr></thead>
      <tbody>${compactRows}</tbody>
    </table></div>
    <div class="votetbl-print"><table class="evtbl">
      <thead><tr>
        <th>${esc(LABELS.no_col)}</th><th>事務事業名</th><th>施策</th><th>${esc(LABELS.dept)}</th><th>金額</th>
        <th>法定義務</th><th>提供形態</th><th>行政評価</th><th>自分の評価</th><th>みんなの投票</th>
      </tr></thead>
      <tbody>${printRows}</tbody>
    </table></div>`;
}

window.onload = load;

</script>
</body>
</html>
