0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆地震等の災害に強い都市づくりを推進するため、地区の広域避難場所までの主要道路となる避難道路を拡幅する公共基盤整備を進める。\n【概要】\n◆広域避難場所「大井競馬場・しながわ区民公園」までの安全・安心な避難行動および円滑な救援・救護活動を確保するため、避難道路滝王\n子通りの幅員を拡幅整備し、併せて、都市防災不燃化促進事業による沿道建物の不燃化も促進する。\n・滝王子通り拡幅計画幅員：10.0ｍ","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":474,"name":"従前居住者用住宅管理費","bureau":"都市環境部","dept":"木密整備推進課","budget":34853,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆密集住宅市街地整備促進事業等の実施に伴い、老朽建築物の除去、共同化建替えへの参加、公共施設用地の提供等により居住する住宅を確\n保できない事業協力者への住宅を確実に供給するため、賃貸住宅（従前居住者用住宅）を設置し、管理・運営を行い、事業協力者の事業協力\n後における居住環境を整え、密集事業への円滑な協力につなげる。\n【概要】\n◆従前居住者用住宅3棟（ソレイユ戸越、ソレイユ中延、コンフォール品川西大井）の管理・運営を行う。\n・建物維持管理業務委託\n・居室清掃委託\n・内装修繕工事","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":475,"name":"整備地域不燃化加速事業","bureau":"都市環境部","dept":"木密整備推進課","budget":34036,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆木造住宅密集地域における地震災害およびこれに起因する延焼火災等の被害を防ぐため、都と連携し、老朽建築物の除却費助成、不燃構造\n建築物の建築設計および工事監理費助成などの助成支援を行い、重点的、集中的な取組みを行いながら、防災性、住環境の向上を図る。\n【概要】\n◆都の整備地域不燃化加速事業を活用し、不燃化特区支援事業以外の火災危険度が高く、不燃領域率が低い地域を対象に除却や建替え等に係\nる一部経費の助成支援を行うほか、専門家による相談派遣を行う。\n・老朽建築物除却費助成、住替え支援助成、建築設計費・工事監理費助成\n・専門家派遣支援","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":476,"name":"大崎駅周辺地区再開発事業","bureau":"都市環境部","dept":"都市開発課","budget":5545508,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆大崎駅周辺地区は、まちづくりマスタープランにおいて、計画的なまちづくりを誘導し、都市機能の更なる集積、活用や道路・公園等の都\n市基盤の整備等を図ることで広域活性化拠点にふさわしい質の高い先端都市を形成することをまちづくりの方針としている。\n◆大崎駅周辺地域都市再生ビジョンに基づき、地区計画や都市再生特別地区などの都市計画諸制度を活用し、民間の再開発事業等を適切に誘\n導、支援していくとともに、道路や広場等の都市基盤施設を計画的に整備していく。\n◆大崎駅周辺地区ではものづくり産業をリードする業務機能や都市型住宅、生活支援施設等の導入を図るとともに老朽建築物の更新に合わ\nせ、歩道や緑豊かな公園・広場等の都市空間を充実させ、潤いのある安全で住み・働き続けられるまちづくりを進めていく。\n◆五反田駅周辺地区は、まちづくりマスタープランにおいて、商業・業務・文化機能の更新を促進し、五反田らしい魅力とにぎわいのあるま\nちづくりを促進するとともに、土地の有効な高度利用を図る大街区化をまちづくりの方針としている。\n◆五反田駅周辺にぎわいゾーンまちづくりビジョン等に基づき地区計画や市街地再開発事業等の都市計画手法を活用し民間の再開発事業を適\n切に誘導・支援していくとともに、道路や広場等の都市基盤施設を計画的に整備していく。また駅周辺地区においては、戦後の旧土地区画整\n理による狭い道路や建物の老朽化等の課題を解決し、さらなるにぎわいの創出や安全・安心なまちづくりを進めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":477,"name":"大井町駅周辺地区再開発事業","bureau":"都市環境部","dept":"都市開発課","budget":13963,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆大井町駅周辺地区は、まちづくりマスタープランにおいて、大規模な土地利用転換等を契機として区の中心核にふさわしい商業、業務、住\n宅、宿泊および文化施設等の多様な機能を備えた複合拠点の形成を図るため、大井町駅周辺地区の計画的・総合的な整備を図ることをまちづ\nくりの方針としている。\n◆大井町駅周辺地域まちづくり方針に基づき、地区計画や市街地再開発事業等の都市計画手法を活用し、民間の再開発事業等を適切に誘導、\n支援していくとともに、道路や広場等の都市基盤施設を計画的に整備していく。\n◆大井町駅周辺地区は、商業・業務・文化・居住などの機能強化による人が集まり、便利で安全な歩きたくなるまちづくり、環境に配慮し、\n魅力的で快適なまちづくりを進めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":478,"name":"武蔵小山駅周辺地区再開発事業","bureau":"都市環境部","dept":"都市開発課","budget":3064,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆武蔵小山駅周辺地区では、まちづくりマスタープランにおいて、土地の高度利用を図り、都市機能の強化、更新、集積ならびに防災性の向\n上を図り、にぎわいと回遊性のある区の西の玄関口に相応しい複合市街地の形成をめざすことをまちづくり方針としている。\n◆武蔵小山駅周辺地域まちづくりビジョン等に基づき、地区計画や市街地再開発事業等の都市計画手法を活用し、民間の再開発事業等を適切\nに誘導、支援していくとともに、道路や広場等の都市基盤施設を計画的に整備していく。\n◆武蔵小山駅周辺地区では、既存商店街の魅力を継承し、多世代に対応した住宅と商店街が一体となった個性豊かな複合市街地の形成を図る\nとともに、回遊性や滞留空間を備えた、居住者だけではなく来訪者にとっても安全性が高いまちづくりを進めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":479,"name":"戸越公園駅周辺地区再開発事業","bureau":"都市環境部","dept":"都市開発課","budget":8124,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆戸越公園駅周辺地区では、まちづくりマスタープランにおいて、東急大井町線の踏切解消、周辺地域の防災性の向上および既存の商店街と\n調和したにぎわいの創出を図ることをまちづくりの方針としている。\n◆戸越公園駅周辺まちづくりビジョン等に基づき、地区計画や市街地再開発事業等の都市計画手法を活用し、民間の再開発事業などを適切に\n誘導、支援していくとともに、道路や広場等の都市基盤施設を計画的に整備していく。\n◆戸越公園駅周辺地区では、補助29号線沿道の延焼遮断帯形成による防災性の向上や新たな商業施設の整備による既存の商店街との連続した\nにぎわいの創出に向けたまちづくりを進めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":480,"name":"品川駅南地域周辺まちづくり事業","bureau":"都市環境部","dept":"都市開発課","budget":8357,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆品川駅南地域周辺は、まちづくりマスタープランにおいて、旧東海道、品川浦、御殿山、目黒川・天王洲運河などの様々な地域資源を活か\nし、地域特性に配慮したきめ細かい規制・誘導を図っていくことをまちづくりの方針としている。\n◆品川駅南地域まちづくりビジョンに基づき、地区計画や市街地再開発事業等の都市計画手法を活用し、民間の再開発事業などを適切に誘\n導、支援していくとともに、道路や広場等の都市基盤施設を計画的に整備していく。\n◆品川駅南地域周辺では、品川浦や旧東海道などの地域特性を踏まえて適切な土地利用を図ることで新たなにぎわいの創出に向けたまちづく\nりを進めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":481,"name":"戸越公園駅周辺まちづくり事業","bureau":"都市環境部","dept":"都市開発課","budget":6372,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆「戸越公園駅周辺まちづくりビジョン基本計画編」等に基づき、補助第29号線沿道地区を対象とした延焼遮断帯形成を目的とした事業であ\nり、地元や東京都と連携のもと、検討委員会の支援や地権者の意向を踏まえた建物の共同化等の支援など戸越公園駅周辺における具体的なま\nちづくりの検討を行う。\n◆戸越公園駅周辺地区整備計画検討業務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":482,"name":"京浜急行線連続立体交差化事業","bureau":"都市環境部","dept":"都市開発課","budget":2789233,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"〈連続立体交差事業〉\n◆踏切遮断による交通渋滞および踏切事故の解消、鉄道に分断された市街地の一体化等を図るため、鉄道路線の立体化を推進し、安全で快適\nなまちづくりを実現する。\n◆泉岳寺駅～新馬場駅間において、3か所の踏切除却に向け、令和2年度から事業を実施している。\n◆同時期に進める駅前広場整備等の周辺基盤整備等を含め、東京都や鉄道事業者と連携して進める。\n〈駅前広場整備事業〉\n◆連続立体交差事業を契機として、駅前広場の整備を行い、駅周辺のにぎわいの創出、回遊性・防災性の向上および交通結節機能の強化など\nを図る。\n◆令和2年4月に事業認可を取得し、約2,300㎡の駅前広場整備に向け、事業を実施している。\n◆連続立体交差事業の進捗に合わせ、東京都や鉄道事業者と協議して整備を進める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":483,"name":"東急大井町線連続立体交差化事業","bureau":"都市環境部","dept":"都市開発課","budget":109126,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"〈連続立体交差事業〉\n◆踏切遮断による交通渋滞および踏切事故の解消、鉄道に分断された市街地の一体化等を図るため、鉄道路線の立体化を推進し、安全で快適\nなまちづくりを実現する。\n◆戸越公園駅周辺における6カ所の踏切除却に向けて、事業認可取得のための検討を進めている。\n◆同時期に進める駅前広場整備等の周辺基盤整備等を含め、東京都や鉄道事業者と連携して進める。\n〈駅前広場整備事業〉\n◆連続立体交差事業を契機として、駅前広場の整備を行い、駅周辺のにぎわいの創出、回遊性・防災性の向上および交通結節機能の強化など\nを図る。\n◆令和5年10月に都市計画決定し、事業認可取得に向けた検討を進めている。\n◆連続立体交差事業の進捗に合わせ、東京都や鉄道事業者と協議して整備を進める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":484,"name":"都市開発関係事務費","bureau":"都市環境部","dept":"都市開発課","budget":766,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"◆再開発事業に係る全般的な調整・支援を行う。\n◆東品川四丁目、西五反田三丁目他各地区計画に基づく再開発事業に係る指導・調整を行っている。\n◆連続立体交差化事業および周辺まちづくり事業に係る全体調整・支援を行っている。\n◆コピー使用料課共通物品を中心とした需用費、各開発協会への研修会費等の負担金及び交付金など課事業へかかる経費を支出している。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":485,"name":"細街路拡幅整備事業","bureau":"都市環境部","dept":"建築課","budget":394480,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の理解と協力のもと、良好な住環境を確保し安全で快適なまちづくりを促進するため、消防活動や交通、環境上、大きな障害となって\nいる細街路（建築基準法第42条2項に指定されている道路）の拡幅整備を支援する。\n【概要】\n◆細街路沿道建物の建替え時等に合わせて拡幅整備工事を行うため、建築確認申請前に拡幅範囲に関する協議を取り交わし、拡幅整備工事を\n区で受託する。\n◆整備に必要な費用の助成や、区道沿いの後退用地の寄付に対する奨励金交付などの誘導策を実施し、細街路の解消を促進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":486,"name":"私道整備事業","bureau":"都市環境部","dept":"建築課","budget":70629,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆私道における通行の安全の確保および生活環境の向上に資するため、傷んだ舗装や排水施設の不具合など私道の整備に係る工事を受託す\nる。\n【概要】\n◆傷んだ舗装や排水施設の不具合などが発生した私道の所有者からの申請により、私道整備工事を区で受託する。\n◆私道の幅員や他道路への接続状況により助成率に違いがあるが、私道整備工事を受託することにより、私道における通行の安全の確保およ\nび生活環境の向上を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":487,"name":"住宅・建築物耐震化支援事業","bureau":"都市環境部","dept":"建築課","budget":530540,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆切迫する首都直下地震の発生に備えるため、建築物の耐震性を確保し、区民の生命・財産を守り、災害に強い安全なまちづくりを推進す\nる。\n【概要】\n◆耐震性の不足する建築物の所有者に耐震性を高めるためにかかる費用（耐震診断、補強設計、耐震改修工事等）の全部または一部を助成す\nる。\n◆戸別訪問等による周知や意識啓発の向上、積極的な情報提供等を行い、事業への理解・協力を促す。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":488,"name":"がけ・擁壁安全化支援事業","bureau":"都市環境部","dept":"建築課","budget":1178,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆近年、大型台風や局地的豪雨を要因とした土砂災害の危険性が高まっているが、区内においては多くの自然斜面や擁壁が存在している。が\nけ・擁壁等の安全化対策を支援することで、擁壁崩落から生命・財産の安全を確保するとともに、災害発生時の道路閉塞・避難・消火活動の\n支障となる危険性の解消を推進する。\n【概要】\n◆道路沿い等のがけ・擁壁や土砂災害警戒区域内等のがけ・擁壁の安全化対策として行う、擁壁の改修工事等の費用の一部を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":489,"name":"コンクリートブロック塀等安全化支援事業","bureau":"都市環境部","dept":"建築課","budget":6285,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n道路に面するコンクリートブロック塀等の安全化対策工事を実施するための必要な経費の一部を助成することにより、地域の安全性の向上を\n図り、災害に強いまちづくりを促進する。\n【概要】\n◆道路沿いのコンクリートブロック塀等の安全化対策の工事費の一部を助成し、災害に強いまちづくりを促進する。\n◆確認申請に掛かる費用を助成し、利用者の負担を減らす。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":490,"name":"建築行政指導費","bureau":"都市環境部","dept":"建築課","budget":12511,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n　建築基準法および関係法令に基づく建築物の審査および指導行政事務を行う。\n【概要】\n　◆建築物および工作物の確認、許可、認定に係る審査ならびに検査に関すること\n　◆建築関係法令上の指導および相談に関すること\n　◆違反建築の監視パトロールや取締りおよび是正指導\n　◆建築基準法第12条第1項および第3項特殊建築物定期報告に基づく建築物等の安全確保、維持保全についての指導\n　　①特定建築物定期報告　②建築設備定期報告　③昇降機等定期報告　④防火設備定期報告\n　◆建築基準法第15条第1項の規定に基づく建築工事届および建築物除去届の受理\n　◆建築動態統計調査規則に基づく建築着工統計、建築物除去統計調査\n　◆建設リサイクル法第10条第1項の規定に基づく分別解体等届出の受理ならびに助言・勧告","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":491,"name":"建築関係事務費","bureau":"都市環境部","dept":"建築課","budget":14913,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n　◆システム等を活用した膨大な建物情報の正確かつ効率的な管理、運用により、各種申請受付および証明書発行等サービスの向上、窓口業\n務の効率化を図る。\n【概要】\n　◆課内関係事務費（共通経費）　\n　◆建築行政支援システム保守および改修　\n　◆窓口機器等賃貸借\n　◆技術講習会参加費および技術資格取得講座受講料","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":492,"name":"省エネルギー対策事業","bureau":"都市環境部","dept":"環境課","budget":37099,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆温室効果ガス（二酸化炭素）排出量削減に向け、区民・事業者の様々な取組みについて、周知啓発・支援していく。\n◆地球温暖化対策の推進に関する法律に基づく「品川区職員環境行動計画（しながわ職員エコアクト）」の定めにより、区独自の環境マネジ\nメントシステム「しながわエコリンク」の運用を実施する。\n【概要】\n◆太陽光発電・蓄電池システム、高効率給湯器（エネファーム・エコキュート・エコジョーズ等）、省エネルギー家電（エアコン・冷蔵\n庫）、宅配ボックスなど省エネルギー性能の高い設備を導入した区民または事業者に対し、購入費用の一部を助成する。\n◆区独自の環境マネジメントシステム「しながわエコリンク」を継続的かつ安定的に運用し、区の環境活動を積極的に推進する。\n◆グリーン電力証書システム（太陽光発電設備などの所有が難しい事業者でも、電力の環境価値を取引できる仕組み）をイベントで活用し区\n民への啓発を図る。\n◆その他　低公害車買換え支援助成事業","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":493,"name":"カラス及び外来種対策事業","bureau":"都市環境部","dept":"環境課","budget":8631,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆環境基本計画の目標である「すこやかで快適な暮らし」を実現するため、カラス・外来種・鳥インフルエンザの対策を行い、生活環境被害\nの防止を図る。\n【概要】\n◆カラスに関する区民からの苦情、相談に基づきカラスの巣や落ちヒナの撤去を行う。\n◆生態系及び人の生命・身体に被害を引き起こすおそれのある外来生物の防除を実施する。\n◆地球温暖化による気温上昇により様々な外来生物の生息地域が拡大している。そのため特定外来生物が区内で発見された際に迅速な初動対\n応を実施する。\n◆野鳥のえさやり相談に対し、注意喚起やえさやり防止看板の配布等の対応を行う。\n◆鳥インフルエンザが疑われる野鳥の不審死事案について、現場確認、死骸回収、消毒を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":494,"name":"環境指導相談費","bureau":"都市環境部","dept":"環境課","budget":4494,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区環境基本計画の基本目標である「すこやかで快適な暮らし」を実現するため、民間事業者・都との連携により、生活環境の保全に取\nり組む。\n【概要】\n◆法令に定められた公害防止の基準に適合するよう、工場・指定作業場を審査・指導し、公害の未然防止を図る。\n◆法令に定められた公害防止のための規制基準に適合するよう特定建設作業実施届等を審査し、適正に工事が実施されるよう指導する。\n◆公害に対する区民からの苦情申し立てにより、関係法令に基づいて公害現象の調査を行い、改善指導を実施する。\n◆土壌汚染関連の相談対応、窓口での情報提供を行い、条例に基づく土壌調査が適切に実施されるよう推進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":495,"name":"環境調査測定費","bureau":"都市環境部","dept":"環境課","budget":18518,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆大気汚染、騒音・振動、公共用水域（目黒川・立会川・海域）の水質汚濁状況の把握と、環境基準の達成状況を監視し、区民に情報提供す\nることで区民の健康と生活環境の保全を図る。\n【概要】\n◆大気測定局を設置し大気汚染調査を行いホームページで区民に公表し健康を支える環境づくりに貢献する。\n◆科学的・生物学的な分析をもとに河川、海域計11地点で公共用水域水質調査および地下水水質調査を行い、区民の健康で快適な生活を確保\nする。\n◆光化学スモッグ緊急時対策を実施し、区内の小・中学校、幼稚園、保育園等へ発令状況を周知する。\n◆東日本大震災に関連して区内における放射線量を定点測定し、区民の不安を解消する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":496,"name":"アスベスト対策事業","bureau":"都市環境部","dept":"環境課","budget":1588,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆アスベストが多く使用された民間建築物の解体ピークは令和10年頃に訪れると推計されており、適切な解体・改修をより一層推進する必要\nがある。令和4年度からはアスベストの有無にかかわらず、元請け業者等による事前調査結果の報告が義務付けられている。アスベストによ\nる健康被害に対する区民の不安を解消するため、事前調査の促進、分析調査・除去費用の支援、現場調査、指導を行う。\n【概要】\n◆区内の住宅等についてアスベスト分析調査助成・除去実施を助成する。\n◆建築物石綿含有建材調査者により、建築物等の石綿について目視調査を実施する。\n◆石綿関連法令に基づく届出の審査・指導および現場調査、建築物解体工事等に伴う石綿飛散防止対策を指導する。また、区民からのアスベ\nストにかかる相談対応を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":497,"name":"環境学習交流施設管理運営費","bureau":"都市環境部","dept":"環境課","budget":157814,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n　地球温暖化による影響が年々顕著になり、さらなる対策強化が求められる中、区民の環境意識の向上と自主的な環境保全行動を促進するた\nめ、体験を通じて楽しみながら行う環境学習や、環境課題の継続的・効果的な情報発信を行う。\n【概要】\n◆環境学習交流施設（施設愛称：エコルとごし）において、環境を身近なものとして体験できる学習機会を提供するとともに、戸越公園利用\n者も気軽に利用できる地域の交流拠点としての機能も備えた魅力ある施設運営をめざす。\n◆学校等と連携のもと、気候変動や戸越公園内の自然環境を活かした生物多様性などについて、ワークショップを通じた環境学習を行う。\n◆区民、事業者、地域団体等と協働し、先端技術を活用した事業の実施や情報発信を行うことで区民の行動変容につなげる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":498,"name":"環境管理対策運用経費","bureau":"都市環境部","dept":"環境課","budget":2533,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n環境管理対策に必要な課内庶務事務を行う。\n【概要】\n◆主な課内庶務事務\n　・事務用消耗品等の購入\n　・出張旅費の管理","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":499,"name":"エコライフ普及事業","bureau":"都市環境部","dept":"環境課","budget":5567,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"（1）地球にやさしい環境運動推進事業　地球温暖化をはじめとして、「食品ロス」や「海洋プラスチック汚染」等、近年、周辺を取り巻く\n環境課題が年々多様化している。区では長期基本計画において「環境にやさしいまちづくり」、「協働による環境活動の推進」を掲げてお\nり、これらを目指すため、環境への負荷の少ない「エコライフ」を区民に啓発する必要がある。商店街のメディアネットワークを活用して区\n民への啓発を行うことで、商店街に身近な家庭部門に効果的に取組みを波及させることができる。このことにより、区内全域に環境への負荷\nの少ない「エコライフ」の推進を図る。\n（2）国産間伐材の有効活用事業　地球温暖化防止のための森林吸収源対策に関する財源の確保のため、森林環境譲与税が創設された中で、\n区としても区民に対して、間伐材や間伐材を利用した製品を使用・流通させることで森林の整備が進み、環境保全に繋がっていくことを普及\n啓発する必要がある。また、啓発する中で、長期基本計画都市像でもある「次代につなぐ環境都市の実現」の実現に向け、環境への負荷の少\nない「エコライフ」を区民に啓発し、推進していく必要がある。国産間伐材をテーマにしたワークショップ等の体験を通じて、環境教育を行\nうことで、間伐材について様々な理解を深めてもらい、エコ意識の醸成を図ることを目的とする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":500,"name":"地域エコ活動推進事業","bureau":"都市環境部","dept":"環境課","budget":11017,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"[目的]　品川区環境基本計画の共通目標である、次世代につながる「日常的に実践する人」を育てる（環境教育・環境コミュニケーション）\nを実現するため、年代や立場を問わず、気軽に参加できる環境を整え、取組みの裾野を広げる。\n[概要]\n◆環境意識の向上を図るため、環境問題の専門家や著名人による講演会を実施する。\n　環境保全に関する活動事例を広く区民等に紹介し、自主的な取組みを促進するため、関係部署と連携し環境表彰式を実施する。\n◆小学生の環境意識の向上を図るため、小学生が理解しやすい環境学習動画を作成し、日常的な環境問題について考える機会を提供する。\n◆気温が上昇する夏季に、節電や脱炭素社会の実現について考える機会としてもらうため、「打ち水」を実施する。\n◆食品ロスの認知度向上や幅広い世代に対し食品を大切に扱う意識の醸成を図るため、区民向けの啓発事業を各種展開していく。\n◆使い捨てプラスチック削減意識向上のため、マイボトル用給水機の設置および設置助成、イベント等で使用する使い捨てプラスチック容器\n類の削減啓発を行う。\n◆森林整備やカーボンオフセットなど森林環境譲与税を活用した広域的な森林保全事業を推進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":501,"name":"資源回収","bureau":"都市環境部","dept":"品川区清掃事務所","budget":1139535,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆資源の有効活用とごみ減量を図るため、資源回収を実施する。\n【概要】\n◆資源ステーション回収\n区内約11,000カ所の資源ステーションより、週1回、8品目12種類の資源を回収する。　　\n◆拠点回収\n小学校などの区施設31カ所で、月2回、4品目の資源を回収する。\n◆区施設回収\n区施設126カ所（164施設）より、月1回、5品目の資源を回収する。\n◆資源の持ち去り対策\nパトロール車2台により、区内を巡回し、資源の持ち去り行為を監視する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":502,"name":"資源化センター管理運営費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":255794,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内で回収された資源物（古紙・びん・缶・ペットボトル・乾電池・蛍光灯・古布・園芸用土・廃食用油・小型家電）について、適正な保\n管と安定した中間処理を行った上で、再商品化業者に引き渡す。\n【内容】\n◆区内の資源ステーションから回収された資源物に関して、夾雑物を取り除き、品目毎に分別・圧縮・梱包し再商品化業者に引き渡す。\n◆拠点回収品目に関しては、一定期間適正に保管した後、再商品化業者に引き渡す。\n\n【施設概要】\n◆名称（所在地）：資源化センター（八潮1-4-1）\n◆敷地面積／延床面積：約7,209㎡／約2,387㎡","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":503,"name":"資源物再商品化経費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":196671,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆回収した資源物の中間処理および再商品化を行うことにより、資源循環を推進する。\n【概要】\n◆資源プラスチックや色びん、ペットボトルを公益財団法人日本容器包装リサイクル協会が定める品質基準に適合するよう、中間処理を品川\n区資源化センターおよび民間施設に委託する。\n◆乾電池や蛍光灯等を品川区資源化センターにおいて中間処理する。\n◆中間処理された資源物を再商品化業者に引き渡しリサイクルする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":504,"name":"集団回収","bureau":"都市環境部","dept":"品川区清掃事務所","budget":61138,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆資源の有効利用とごみ減量を図るため、地域の集団回収団体の登録相談や指導・用具の貸与、報奨金支払い等支援を行う。\n【概要】\n◆649団体（令和6年度）\n◆報奨金の支給　8円/ｋｇ\n◆回収補助用具の貸し出しおよび消耗品の支給（ひも・表彰旗・軍手等）\n◆環境表彰式での表彰状の贈呈\n◆雑がみ回収協力金の支給　より一層の古紙回収の促進を図るため、雑がみの回収実績があった団体に対し協力金を支払う。\n◆回収業者への支援（ルート対策費）\nリサイクルルート確保のため、古紙（新聞・雑誌・段ボール）の市場価格が一定数を下回った場合に支援する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":505,"name":"リサイクル活動支援","bureau":"都市環境部","dept":"品川区清掃事務所","budget":3764,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆家庭用生ごみ処理機購入費助成\n家庭用生ごみ処理機の購入を助成し、資源の有効活用とごみ減量および地球にやさしい暮らしの啓発を図る。\n◆フリーマーケット支援事業\n家庭で不要になった生活用品を持ち寄り、それらを自主販売し再利用することにより、資源循環型社会に寄与する。\n【概要】\n◆家庭用生ごみ処理機購入費助成\n本体購入価格の3分の1を助成する。（1,000円未満切り捨て、2万円を上限）\n◆フリーマーケット支援事業\n区が主催するフリーマーケットの出店者募集および受付を行う。また、区民団体が主催するフリーマーケットの開催に必要な支援を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":506,"name":"粗大ごみからのリユース事業","bureau":"都市環境部","dept":"品川区清掃事務所","budget":11231,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆粗大ごみの中からリユース可能なものを選定し、希望する方に提供することで資源の有効利用とごみ減量を図る。\n【概要】\n◆粗大ごみの中からリユース可能なものを選定し、その情報をインターネット上に掲載。引き取り希望者を募集した後、指定日に品川区資源\n化センターにて提供する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":507,"name":"廃棄物減量等推進審議会経費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":673,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆区長の附属機関として、一般廃棄物の発生抑制、再利用の促進および廃棄物の適正な処理に関する諮問事項を審議するために設置してい\nる。\n【概要】\n◆区議会議員、学識経験者および区民のうちから区長が委嘱する委員20人以内で構成し、任期は2年である。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":508,"name":"普及啓発費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":2748,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"D 完了・廃止する事業","ev_detail":"事業移管・統合","gai":"","legal":"","law":"","desc":"【目的】\n◆「資源・ごみの分け方・出し方」等の印刷物を作成するなど区民に周知啓発を実施することで、ごみの排出抑制・資源の適正処理を図る。\n【概要】\n◆「資源・ごみの分け方・出し方」パンフレット作成\n品川区の資源やごみの分け方・出し方をわかりやすく記載したパンフレットを転入者や希望者に配布する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":509,"name":"廃棄物排出指導費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":805,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆廃棄物の発生を抑制し、再利用を促進するとともに、廃棄物を適正に処理することによって、生活環境の保全および公衆衛生の向上ならび\nに資源が循環して利用される都市の形成を図り、区民の健康で快適な生活を確保する。\n【概要】\n◆ふれあい指導費\n区民および事業者に対し、ごみ・資源の分別、事業系廃棄物の有料シール添付などの指導または助言を行う。\n◆中小規模事業者向け適正排出指導経費等\n中小規模事業者への適正排出の誘導、医療系廃棄物排出指導、事業系リサイクルルートの支援、宿泊事業者への適正な廃棄物排出指導を行\nう。\n◆事業用建築物指導経費\n1,000㎡以上の事業用建築物への排出指導、大規模建築物（3,000㎡以上）への排出指導および保管場所等の設置確認を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":510,"name":"一般廃棄物処理業許可事務費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":318,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆一般廃棄物の処理等は、原則区の固有事業であり他の者が業を行うことは禁止されている。この禁止された業を関係法令等で定める諸条件\nを満たした者に許可するとともに、業者指導を行い、事業系一般廃棄物を適正に処理する。\n【概要】\n◆一般廃棄物処理業の許可、浄化槽清掃業許可に関する行政指導および処分等の事務を行う。\n◆許可・更新にあたっては、立入検査を行うなど、適正に処理されていることを確認する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":511,"name":"清掃事務所等施設管理事業","bureau":"都市環境部","dept":"品川区清掃事務所","budget":173805,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆家庭系廃棄物、一部事業系一般廃棄物およびし尿収集・運搬を行うなど清掃事業サービスを提供し区民の衛生生活環境を滞りなく維持する\nため清掃事務所および分室の円滑な事業運営を図る。\n【概要】\n◆職員の安全かつ快適な職場環境を形成するため、課内共通で使用する事務用消耗品の購入や事務事業に係る職員旅費、清掃事務所および分\n室の光熱水費や維持管理費等の支払いを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":512,"name":"安全衛生費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":13997,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆清掃事務所における職場の労働安全や清掃車両の交通安全に関する教育を実施し、災害のない職場を作るとともに、健康で快適な労働環境\nを維持する。\n【概要】\n◆交通安全講習会の実施や、保護具の購入、健康診断受診のための旅費や作業服等のクリーニング費用等の支払いを行っている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":513,"name":"収集運搬作業費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":1409787,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆ごみを適正かつ円滑に収集することにより、生活環境の維持・保全および公衆衛生の向上を図る。\n◆直営車の車検等、維持管理を行う。\n◆事業系一般廃棄物、粗大ごみ収集・運搬・処分に要する手数料を有料ごみ処理券によるシール制とし、区民・事業者の利便性を図る。\n【概要】\n◆燃やすごみは週2回、陶器・ガラス・金属ごみは月2回収集している。\n◆直営車の燃料購入、自賠責保険、任意保険、車検、車両の購入等を行う。\n◆事業系ごみ、粗大ごみを排出する場合には、有料ごみ処理券を貼付して排出する。\n◆有料ごみ処理券は、区内のコンビニ、スーパー、公募店などの取扱所で販売し、清掃事務所では、窓口での販売、印刷発注などの業務を行\nう。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":514,"name":"東京二十三区清掃一部事務組合分担金等","bureau":"都市環境部","dept":"品川区清掃事務所","budget":1924699,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"◆清掃工場など清掃事業の一部を共同処理する「東京二十三区清掃一部事務組合」および「東京二十三区清掃協議会」の分担金の支出を行\nい、円滑な清掃事業を運営する。\n\n効率性\n◆定められた金額を確実に支出している。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":515,"name":"清掃関係事務費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":4430,"next_budget":0,"root":"","cls":"","ev":"D 完了・廃止する事業","ev_detail":"事業移管・統合","gai":"","legal":"","law":"","desc":"【目的】\n◆廃棄物の収集・運搬から清掃工場への搬入、埋め立て処分までのすべての過程を把握する東京23区廃棄物情報管理システム、有料ごみ処理\n券の取扱所、発注・納品・在庫管理、売上実績・手数料収納管理等を行うごみ処理券管理システム、集団回収業務における集団回収実施団\n体、回収業者、資源回収実績の情報管理を行い、報奨金、業者支援金の支出事務を行う集団回収システム等を活用することにより円滑な事業\n運営を図る。\n【概要】\n◆各システムの運用保守業務委託、パソコン等システムで使用する情報機器の使用賃貸借、トナーなど消耗品の購入等を行っている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":516,"name":"リサイクル普及啓発費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":6547,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】◆ごみ減量およびリサイクルの推進を図るため普及啓発を実施する。\n【概要】◆ごみ・追っかけ隊事業：日頃排出しているごみや資源がどのように処理されているか取材することで、ごみの減量・リサイクルの\n推進を図るバス見学会。\n◆小学生ごみ減量・リサイクルポスター展：区立小学校を通じて「清掃・リサイクル」のテーマでポスターを募集、展示する。その中から優\n秀作品を12点選び、清掃車両にステッカーとして貼付け、「ごみ・リサイクルカレンダー」等に掲載する。\n◆ごみ・リサイクルカレンダーの発行：ごみ・資源の分別や回収日を周知するためにカレンダーを発行する。\n◆不用品交換情報紙くるくる：不用品を譲りたい人と、それを欲しい人の相互間で直接取引ができる機会を提供する。\n◆廃棄物減量等推進員：18歳以上の区内在住または区内在勤者でごみ減量およびリサイクルに協力できる方を町会・自治会からの推薦または\n公募により、廃棄物減量等推進員を選出し区長が委嘱する。任期は2年。平成12年から活動を実施している。\n◆出前講座：町会・自治会・サークル等の会合に出張し、要望に応じたテーマに沿って講習を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":517,"name":"粗大ごみ再商品化経費","bureau":"都市環境部","dept":"品川区清掃事務所","budget":39777,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"＜粗大ごみのリユース・リサイクル事業＞\n【目的】\n◆木製製品、プラスチック製衣装ケース、自転車、羽毛布団を資源としてリユースまたはリサイクルすることで、ごみ減量、資源化率の向\n上、CO2排出量の削減を行う。\n【概要】\n◆粗大ごみ中継所に持ち込んだ粗大ごみの中から木製製品、プラスチック製衣装ケース、自転車、羽毛布団を抜き出しリユース・リサイクル\nのための選別・解体作業を委託している。\n　選別・解体された木製製品は廃棄処理費用より安価で再生事業者に処理を委託し、その他の対象製品はリユース・リサイクル事業者に売却\nしている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":518,"name":"やさしいまちづくり整備費","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":247623,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者や障害者などを含み、誰もが住み慣れた地域で安心して暮らすためには、自由に行動できる環境と、やさしく思いやりに満ちたまち\nづくりが求められる。これまで進めてきたバリアフリー施策をより充実し、区民・事業者・区などの各主体が目標を共有し、一丸となって取\nり組むことでやさしいまちづくりの整備を推進する。\n【概要】\n◆区内鉄道駅のバリアフリー化を図るため、エレベーターや可動式ホーム柵の整備にかかる費用の一部を助成する。\n◆「大井町駅周辺地区」および「旗の台駅周辺地区」において、バリアフリー計画および特定事業計画を策定している。特定事業の進捗を確\n認し、特定事業計画の更新(改定)を行う。\n◆「しながわお休み石構想」に基づき、高齢者などがまちを歩くときに腰をおろしてひと休みできるものとして、また、まちのサイン的要素\nもあわせ周囲の景観にも調和するものとして設置してきたお休み石の維持管理を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":519,"name":"地域交通検討経費","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":152037,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の公共交通網を補完し、地域公共交通による公共交通との結節機能強化や近くに鉄道駅やバス停がないような地域の交通利便性の向上\n等、地域交通の充実を図る。\n【概要】\n◆コミュニティバスは、3つの候補ルートの中から導入効果が最も高いとされた大井ルートにおいて、令和4年3月末より試行運行を開始し\nた。大井ルートの試行運行期間は、令和4年度から令和7年度までの4年間とし、3年目（令和6年度）の実績（判断基準：収支率50％以上）に\n基づき、本格導入、見直し(廃止含む)等について判断を行う。\n◆コミュニティバスの試行運行に加え、ＡＩオンデマンド交通やグリーンスローモビリティなど多様なニーズに対応する新しい交通サービス\nの導入を検討する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":520,"name":"交通安全啓発費","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":30474,"next_budget":0,"root":"","cls":"区民と進める交通安全のまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆警察署や関係機関・団体等と連携して通学路安全・安心プログラムの実施、交通安全啓発事業や交通安全対策会議等の開催、交通安全啓発\n用刊行物の発行、交通安全に関する陳情処理、自転車安全教室の開催など交通安全を啓発するとともに交通事故防止に努める。\n【概要】\n◆自転車等安全利用指導員による交通ルールやマナーの啓発・指導\n◆交通安全に関する陳情の処理（交通管理者等との調整、立看板等設置）\n◆スタントマンを活用した自転車安全教室等の実施　　　　　\n◆ヒヤリハット地点周知事業　　　　　　　　　　　　　　　◆通学路安全対策\n◆交通安全対策会議、交通安全協議会等の開催　　　　　　　◆路外駐車場の届出事務\n◆黄色い帽子、幼児用交通安全教育本の配布　　　　　　　　◆交通傷害保険の加入促進\n◆交通しながわ、お元気だより（高齢者向け新聞）の作成　　◆自転車ヘルメット購入助成","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":521,"name":"交通安全協会補助金","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":6700,"next_budget":0,"root":"","cls":"区民と進める交通安全のまちの実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆警察署及び関係団体と連携し、交通道徳の普及と交通諸施設の改善を図り、交通の円滑と安全を促進することを目的とする。\n【概要】\n◆全国組織として一般財団法人全日本交通安全協会（道路交通の安全を目的とする非営利法人）があり、都道府県単位で公益財団法人、一般\n財団法人、一般社団法人などが設置されている。また警察署単位で設置された地域交通安全協会は、法人格のないボランティア団体である。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":522,"name":"駅周辺等放置自転車対策事業","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":511842,"next_budget":0,"root":"","cls":"区民と進める交通安全のまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆駅周辺の道路等公共の場所において、通行機能や歩行者の安全確保および緊急活動の場の確保を図るため、放置自転車等撤去業務、自転車\n等駐車場の整備・運営、駐車場使用料の徴収事務および放置自転車に対する指導啓発・警備を行うことにより、自転車等の放置をなくす。\n【概要】\n◆放置自転車等撤去業務および保管所における管理・返還・処分業務　\n◆自転車等駐車場の整備および運営、維持管理事務\n◆自転車等駐車場内等における整理・指導業務\n◆駐車場使用料および保管料の徴収業務\n◆放置禁止区域の周知や警告等の看板類の設置\n◆駅周辺の放置自転車等に対する放置防止指導啓発・警備","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":523,"name":"シェアサイクル事業","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":194,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の日常利用や観光客の利用による利便性・回遊性の向上、低炭素化による環境負荷の軽減等を目的として利用を推進する。\n【概要】\n◆平成29年（2017年）10月にシェアサイクルの社会実験を開始した。初年度は京浜東北線より東側（臨海部）を中心に展開し、平成30年\n（2018年）4月より区内全域へ展開するとともに、都内10区（品川・千代田・中央・港・新宿・文京・江東・目黒・大田・渋谷）の広域連携\nに参入することで行政区域を超えた相互乗り入れを可能とし、令和2年度から本格実施した。\n◆広域連携は、令和2年度に中野区、令和3年度に杉並区、令和4年度に練馬区、墨田区、令和5年度に世田谷区、台東区が参入し、現時点で16\n区での相互乗り入れが可能となっている。\n◆運営事業者と災害協定を締結し、災害時の応急対応等に活用する体制を整備している。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":524,"name":"地域交通政策総務費","bureau":"防災まちづくり部","dept":"地域交通政策課","budget":2103,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n　地域交通政策課における円滑な業務の運営に要する費用\n【概要】\n　職員旅費や地域交通政策課全体の事務処理における事務経費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":525,"name":"道路・公園等占用費","bureau":"防災まちづくり部","dept":"土木管理課","budget":13585,"next_budget":0,"root":"","cls":"魅力的で良好な都市景観の形成","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆区道、区立公園等における企業者施行工事や民間施行工事ならびに屋外広告物の設置について適正な許可を行うことで、良好な都市環境お\nよび都市景観を形成する。\n【概要】\n◆道路占用等の許可・指導監督事務　　◆道路工事調整協議会の開催\n◆屋外広告物の許可事務　　　　　　　◆道路工事の施行承認許可・指導監督事務\n◆沿道掘削工事の審査・指導監督事務　◆（一財）道路管理センターが運営する道路管理システムの経費負担","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":526,"name":"道路・公園等監察費","bureau":"防災まちづくり部","dept":"土木管理課","budget":1283,"next_budget":0,"root":"","cls":"魅力的で良好な都市景観の形成","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆区が管理する道路(区有通路を含む。以下同じ。)、河川、公園、児童遊園、法定外公共物等(以下「土木施設」という。)の構造を保全し、\nその機能および良好な景観を確保するため、違法行為の取締りおよび違反不正行為の排除等(以下「監察」という。)を行う。\n【概要】\n◆監察事項は、次のとおり。\n①土木施設の損傷またはその誘因となる事象に関すること。②土木施設に関する禁止行為に関すること。③土木施設の不法占用に関するこ\nと。④土木施設の占用状況に関すること。⑤土木施設の隣接区域における工事等に関すること。⑥車両制限令による違反行為に関すること。\n⑦屋外広告物法による違反行為に関すること。⑧その他土木施設の管理に関する法令違反の取締り、および区内美化等の特命事項に関するこ\nと。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":527,"name":"屋外広告物取締事務","bureau":"防災まちづくり部","dept":"土木管理課","budget":7526,"next_budget":0,"root":"","cls":"魅力的で良好な都市景観の形成","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆公道などに掲出された違反広告物の除却や指導を行い、都市の美観維持に努める。\n【概要】\n◆違反はり紙等除却(簡易除却)\n　①委託による除却　シルバー人材センターに委託。月に11回（年間延べ132回）巡回して違反はり紙等を除却をする。\n　②ボランティアによる除却　区内在住在勤の5名以上のボランティア団体(しながわ景観美化隊)による違反はり紙等の除却をする。\n　③日常パトロールでの除却　日常パトロールや陳情対応等で現場へ行く先での違反はり紙等の除却をする。\n　④合同パトロールでの除却　駅周辺での商店街、警察、道路管理者（国・都）等での違反はり紙等の除却をする。\n◆違反広告物の指導\n　①日常パトロールや陳情等で指摘のあった、申請が出ていないまたは許可基準に合わない違反広告物の指導をする。\n　②合同パトロールにおいて商店街等の違反広告物への指導・啓発を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":528,"name":"道路・公園等公有地管理事務","bureau":"防災まちづくり部","dept":"土木管理課","budget":16161,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区道および公園等の境界を明確にし、公有地の適正な管理を図る。また、囲い込み等されている法定外公共物の境界確定を進め、公有地の\n保全確保を図る。\n◆境界標および公共基準点の適正な維持管理を行う。\n◆道路内の桝に設置してある基準点の適正な維持管理を行う。\n【概要】\n◆区が所有する道路、公園ならびに法定外公共物等の境界を測量し、確定等を行う。\n◆区管理の境界標の亡失が発見された場合は、適宜復旧を行う。\n◆亡失している公共基準点の設置を計画的に行う。\n◆基準点桝に堆積した汚泥の清掃作業を5年毎に行う。（次回令和8年度予定）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":529,"name":"道路・公園等台帳補正事務","bureau":"防災まちづくり部","dept":"土木管理課","budget":25655,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆適正な道路管理を行うため、道路台帳平面図および調書の補正を行う。\n◆土木管理業務支援システムとの連携を図り、窓口サービスの向上と管理業務の効率化を行う。\n◆インターネットによる道路平面図検索サイトの円滑な運営と適正なデータ提供を行う。\n◆適正な公園管理を行うため、公園台帳を補正するとともに、的確な公園情報を提供する。\n【概要】\n◆道路台帳の補正業務　　　　　　　　　◆公園台帳の補正業務\n◆土木管理業務支援システムの管理業務　◆インターネット掲載の道路平面図管理業務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":530,"name":"地籍調査事業","bureau":"防災まちづくり部","dept":"土木管理課","budget":25918,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆国土調査法に基づく官民境界等の調査において、土地の実態を正確に把握し、地籍を明確化することにより、土地境界のトラブル防止や災\n害発生後の迅速な復旧・復興、まちづくり等を円滑に進められるようにする。\n【概要】\n◆国土調査促進特別措置法に基づく第七次国土調査事業十箇年計画（令和2年度～令和11年度）により、地籍調査（街区調査）を災害危険度\nの高い地区より実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":531,"name":"土木管理総務費","bureau":"防災まちづくり部","dept":"土木管理課","budget":1681,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆土木管理課における円滑な業務の運営に要する費用\n【概要】\n◆職員の旅費の支給\n◆事務用消耗品の購入\n◆複合機印刷経費\n◆図書の購入\n◆車両の必要経費\n◆連絡用郵券","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":532,"name":"道路維持管理費","bureau":"防災まちづくり部","dept":"道路課","budget":890587,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆道路を常時良好な状態に保ち、安全で円滑な交通を確保する。\n【概要】\n◆目黒川沿道の排水場、ずい道等の排水施設の維持管理を行う。\n◆道路の異常箇所の修繕、日常巡回および維持作業、主要区道の路面清掃など道路の維持管理を行う。\n◆街路樹の維持管理を行う。\n◆区民から道路の不具合などについて通報していただくシステム（しなみちレポート）をＰＲし、効率的な要望対応を進める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":533,"name":"道路安全施設費","bureau":"防災まちづくり部","dept":"道路課","budget":109022,"next_budget":0,"root":"","cls":"区民と進める交通安全のまちの実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆道路交通の安全と円滑化を図るため、道路反射鏡、横断抑止柵など道路安全施設の補修・整備を行う。\n【概要】\n◆道路安全施設の補修・整備を行う。\n◆安全で快適なまちづくりを目指し、歩行者や自転車の交通安全を確保するため、カラー舗装や路面表示を整備したり、交通事故を防止する\nために交差点の改良を行う。 \n◆交通安全の確保に向けて、教育委員会および学校、警察等の関係機関等と連携し、定期的な合同点検を実施し、対策が必要な箇所の整備を\n行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":534,"name":"街路灯管理費","bureau":"防災まちづくり部","dept":"道路課","budget":283911,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆街路灯維持管理　道路利用者の夜間における安全性を確保するため、街路灯および私道防犯灯の維持補修を行う。\n◆ＬＥＤ街路灯建替事業　照明効率の高いＬＥＤ型街路灯に建て替えることでＣＯ2排出量と電気料金の削減を図る。\n【概要】\n◆街路灯維持管理　定期巡回点検・故障時調査・修理を行う。\n　　　　　　　　　街路灯　　　14,047基\n　　　　　　　　　私道防犯灯　 5,185基\n　　　　　　　　　合　計　　　19,232基　(令和7年4月1日基準)　　　　\n◆ＬＥＤ街路灯建替事業　蛍光ランプ等を使用した街路灯を、高効率・長寿命のＬＥＤ型街路灯に取り替える。\n　　　　　　　　　取替数　 　　905基","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":535,"name":"道路改良事業","bureau":"防災まちづくり部","dept":"道路課","budget":552921,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆良好な道路環境を保全するため、品川区舗装修繕計画に基づき、計画的に道路の改良を行う。\n（東五反田一丁目バリアフリー特定道路整備、ゼームス坂下区間歩道段差解消、その他路線での改良工事等）\n【概要】\n◆計画的な道路改良（令和6年度：8,003㎡）\n◆東五反田一丁目（区道Ⅱ-2号）の国土交通大臣が指定したバリアフリー特定道路の約240ｍの区間（セミフラット化、歩道幅員拡幅）（令\n和5年度～令和6年度）\n◆ゼームス坂通りのバリアフリー連続化の850ｍの区間（令和元年度～令和6年度）\n◆雨水流出抑制に資する雨水浸透桝の設置（20個）\n◆自転車通行環境の整備を行うための10年間の整備計画の作成\n◆踏切手前部視覚障害者誘導ブロックの整備（12箇所）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":536,"name":"無電柱化推進事業","bureau":"防災まちづくり部","dept":"道路課","budget":108411,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区無電柱化推進計画に基づき区道全てを対象とし無電柱化を推進する。\n　防災性の向上のため重要で整備効果の高い路線について優先的に整備を実施していく。\n【概要】\n◆競馬場通り\n　譲渡設備を活用した電線共同溝整備工事を東電タウンプランニング（株）と協定を締結して実施する。\n　令和6年度は修正設計と支障移設工事（ガス・水道）を実施する。\n◆戸越公園周辺の区道（補助26号線～文庫の森区間）\n　令和6年度は引込連系管工事（電力）および引込連系管設計（通信）を実施する。\n◆林試の森公園周辺区道（西側）\n　令和6年度は無電柱化の実施に向けた概略検討を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":537,"name":"補助２０５号線整備事業","bureau":"防災まちづくり部","dept":"道路課","budget":3126,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"D 完了・廃止する事業","ev_detail":"事業移管・統合","gai":"","legal":"","law":"","desc":"【目的】\n◆区の中心核である大井町駅周辺と西大井地区を結ぶ横断道路として整備し、この地域の都市基盤の整備、地域住民の交通安全、防災対策の\n向上を図るため、地区幹線道路を整備する。\n【概要】\n◆全体整備延長1,326ｍをⅠ期（446ｍ）Ⅱ期（550ｍ）Ⅲ期（330ｍ）に分けて整備を進めている。\n◆Ⅰ期区間は平成28年度にすべての整備が完了している。　\n◆Ⅱ期区間は平成25年度にすべての整備が完了している。　\n◆Ⅲ期区間（原踏切～補助29号線の約300ｍ）は第4次優先整備路線に指定されており、未整備区間の整備に向けて、関係機関と協議を行って\nいく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":538,"name":"補助１６３号線整備事業","bureau":"防災まちづくり部","dept":"道路課","budget":5589,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆区の中心核である大井町駅周辺と大崎・五反田を結ぶ都市軸道路として地区幹線道路を整備する。\n【概要】　\n◆全体整備延長2,139ｍを3区間に分けて整備をしている。\n◆Ⅰ期区間（百反坂下以北）の564ｍは平成7年度で整備が完了している。　\n◆Ⅱ期区間（補助26号線以南）の約549ｍは平成23年度に整備が完了している。　\n◆Ⅲ期区間（約1,026ｍ）のうち、東急大井町線ガード下区間（約65ｍ）は、電線共同溝の台帳作成および都道部の引継ぎを実施する。\n◆Ⅲ期区間（約1,026ｍ）のうち、未整備区間（約630m）については、JR大崎支線交差部におけるJR協議や広町地区区画整理事業との調整を\n実施することから課題整理のため道路予備修正設計委託を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":539,"name":"用地取得事務費","bureau":"防災まちづくり部","dept":"道路課","budget":797,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民福祉の向上に資する公共施設の整備拡充のため、用地の取得を進める。\n【概要】\n◆公共施設整備等のため用地の取得を行う（有償・無償・買戻し）。\n・有償：土地代金・補償費・媒介手数料の支払いによる取得。\n・無償：寄付・遺贈・譲与・帰属による取得。\n・買戻し：品川区土地開発公社からの買戻しによる取得。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":540,"name":"橋梁維持管理費","bureau":"防災まちづくり部","dept":"道路課","budget":76247,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆橋梁、横断歩道橋、歩道橋エレベーター・エスカレーターを維持管理し、常に良好な状態を確保する。\n【概容】\n◆橋梁や歩道橋の日常清掃および点検などを行う。\n◆橋梁や歩道橋の小破修繕を行う。\n◆歩道橋エスカレーター、エレベーターの清掃作業、日常点検・定期点検および運行管理を行う。\n◆区管理施設数は、橋梁49橋、歩道橋18橋、エレベーター7カ所、エスカレーター1カ所である。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":541,"name":"橋梁改修事業","bureau":"防災まちづくり部","dept":"道路課","budget":120617,"next_budget":0,"root":"","cls":"快適な交通環境の整備","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区が管理する橋梁の多くは建設後既に20年から50年が経過しているため、このまま老朽化が進むと多くの橋梁で一斉に大規模な修繕や架替\nえの時期を迎えることになる。そのため、財政支出の抑制を図りながら橋梁の健全性を向上させる。\n【概要】\n◆令和2年度に策定した橋梁長寿命化修繕計画に基づき、区が管理する全ての橋梁を対象に、延命化を含む最適な維持管理を推進する。\n◆令和6年度は、5年に一度の橋梁長寿命化修繕計画の改訂作業を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":542,"name":"道路橋梁総務費","bureau":"防災まちづくり部","dept":"道路課","budget":6097,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】　　\n◆道路課における、円滑な業務の運営に要する費用\n【概要】　　\n◆職員旅費や道路課全体の事務処理における事務的経費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":543,"name":"公園・児童遊園維持管理費","bureau":"防災まちづくり部","dept":"公園課","budget":1666871,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の公園・児童遊園・緑地等276箇所（令和6年度末）を、常に良好な状況で利用できるよう、管理運営する。\n【概要】\n◆安全で快適な利用しやすい施設として維持管理していくため、以下の業務を実施する。\n　◇清掃業務　◇樹木維持管理　◇巡回点検・警備・喫煙マナーアップ業務　◇照明等電気設備の設置・補修\n　◇フェンス・防球ネット等の管理施設設置・補修　◇遊具・砂場等の遊戯施設設置・補修　◇管理詰所等の警備業務\n　◇防犯カメラの設置・補修\n　◇大規模公園等における一括管理　他","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":544,"name":"公園・児童遊園整備費","bureau":"防災まちづくり部","dept":"公園課","budget":1000223,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】　\n◆「水とみどりの基本計画・行動計画」に基づき、住民のレクリエーションや憩いの場、子どもがのびのびと安全に成長できる場、防災の拠\n点、生物の育成の場、生き物とのふれあいの場などとしての機能を高め、特色ある公園の整備を進める。また、身近で親しみのある公園の充\n実を図るため、多様な手法を活用し、地域住民のライフスタイルに応じた、公園機能の更新や、区民ニーズを反映した公園づくりを目指す。\n【概要】\n◆西五反田公園の公園施設の更新および改修を行う。◆浜川北公園、東海公園、立会川児童遊園（その３）、旗の台北公園の公園施設の更新\nおよび改修を行う。◆公園内の水飲みや園路の整備、階段・傾斜路への手すり設置等、ユニバーサルデザイン化を進める。◆子どもたちを含\nめた住民ニーズを公園づくりに的確に反映していくため、区民参加による公園づくりに取り組む。◆多様なニーズに対応したより魅力ある都\n市公園の創出を目指し、Ｐａｒｋ－ＰＦＩ（公募設置管理制度）を導入する。◆立会川・勝島地区の利便性・回遊性の向上および災害時の避\n難に資する新たな歩行者動線を目的に「（仮称）勝島人道橋」を整備する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":545,"name":"しながわ水族館運営費","bureau":"防災まちづくり部","dept":"公園課","budget":412449,"next_budget":0,"root":"","cls":"まちの魅力を活かした都市型観光の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆区を代表する観光施設であるしながわ水族館において、必要に応じた施設・設備の維持管理を行うとともに、魅力のあるイベントや特別展\n示を企画し、さらには様々な媒体等を活用した情報発信を行う。\n◆令和4年3月に策定した「しながわ水族館リニューアルの方向性について」を踏まえ、新たな魅力を発信する水族館として整備していく。\n【概要】\n◆しながわ水族館の運営支援を行う。\n◆しながわ水族館の魅力を発信する。\n◆老朽化した施設・設備等の改修工事を行う。\n◆しながわ水族館リニューアルに向けた設計を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":546,"name":"公衆便所維持管理費","bureau":"防災まちづくり部","dept":"公園課","budget":57240,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆公衆便所利用者が快適で安心して利用しやすい便所となるよう、日常の維持管理を行う。\n【概要】\n◆施設維持管理\n　公衆便所35箇所で日々清掃を実施し、破損が生じた際、修繕を行う。\n　全箇所でバリアフリー化を進める。洋便器化は完了。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":547,"name":"緑化活動支援事業","bureau":"防災まちづくり部","dept":"公園課","budget":129353,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民や企業にもみどりづくりに関わってもらうための支援や意識の醸成を進めるとともに、区民が自主的にみどりの創出に取り組める仕組\nみづくりを進める。\n【概要】\n◆地域の緑化を推進し、街なみの景観を向上することを目的とし、道路に接する箇所に生垣や樹木を希望する方に助成金を交付するととも\nに、既存建物や新築建物の屋上等を緑化する方に工事費用の一部を助成する。\n◆区が管理する花壇の花苗の植付けや管理、公園・道路の清掃などについてボランティア活動をする地域の方々を支援し、区民の手による緑\n化と花のあるまちづくりを後押しする。\n◆区内に残された数少ない大木および樹林を保護するため、所有者の同意を得て保存樹木に指定し、基本剪定や害虫駆除など維持管理の一部\nを区が実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":548,"name":"マイガーデン運営費","bureau":"防災まちづくり部","dept":"公園課","budget":14468,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の遊休地や公共空間を活用し、区民が土に触れ、野菜等を育て収穫する喜びを身近なところで体験しながら緑化を進めるマイガーデン\nを設置することにより、緑化の推進や啓発に寄与する。\n【概要】\n◆区内の遊休地や公共空間を農地として整備し、マイガーデン（区民農園）を設置する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":549,"name":"施設植栽・花壇維持管理","bureau":"防災まちづくり部","dept":"公園課","budget":20082,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区有施設の樹木の健全な発育を促すとともに、周囲との調和を図るため、剪定、刈り込み、害虫駆除等を実施する。また、うるおいや安ら\nぎのある街なみを創出することを目的として、区内に設置した街角花壇を良好な状態に維持するため、花の植替えと管理を行う。\n【概要】\n◆区施設（学校、その他一部の施設を除く）を対象に、適時樹木等の管理を実施する。\n◆街角花壇を良好な状態に維持するため、植替えと管理を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":550,"name":"公園総務費","bureau":"防災まちづくり部","dept":"公園課","budget":3098,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆公園課において、円滑な業務の運営に要する費用 \n【概要】\n◆職員旅費や車両関連経費、事務的経費等、円滑な業務の運営を行う。　\n◆職員を対象に樹木点検員養成研修を実施し、見識を高め、職員自ら樹木点検ができるようにする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":551,"name":"河川管理費","bureau":"防災まちづくり部","dept":"河川下水道課","budget":74957,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区民等が安心して水に親しみ、水辺空間を利活用できるよう、河川や運河の環境改善を図るともに適切に維持管理する。\n◆気候変動の影響よる水害を軽減させるために、総合的な治水対策を推進する。\n【概要】\n◆立会川の水質改善\n①高濃度酸素溶解水による水質改善対策 ②河川清掃等 ③河川および運河美化の啓発\n◆目黒川の水質浄化\n①目黒川浚渫・障害物撤去等 ②城南河川清流復活事業\n◆総合治水対策\n①総合治水対策推進計画改定","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":552,"name":"水辺利活用事業","bureau":"防災まちづくり部","dept":"河川下水道課","budget":126093,"next_budget":0,"root":"","cls":"水と親しむみどり豊かなまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆水辺空間の利用促進を一層進展させ、水辺のにぎわいやうるおいある街づくりを目指す。\n◆区内の水辺が多くの来訪者でにぎわう観光・交流の軸となることを目指す。\n◆舟運ネットワークの充実を図ることや、災害時の防災拠点として活用するため、区有船着場を良好な状態で管理する。\n【概要】\n◆水辺のさらなる魅力向上やにぎわい創出のため、具体的な取組みを示した水辺利活用推進計画に基づき、ハードやソフト施策を推進し、地\n域の活性化や地域ブランドの向上を図る。\n◆災害時における人・モノ運搬の拠点、舟運・水辺のにぎわい拠点として機能を維持するため、区有船着場を適切に管理・改修する。\n◆区内の水辺が多くの人でにぎわう観光・交流の軸となることを目指し、ヒカリの水辺プロジェクトとして、目黒川や運河に架かる橋のライ\nトアップを実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":553,"name":"治水対策推進助成事業","bureau":"防災まちづくり部","dept":"河川下水道課","budget":1679,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆水循環の保全・回復や省エネ・省資源等の観点から、雨水を利用することを目的として、雨水利用タンクの設置促進を図る。\n◆浸水被害から区民の財産を守るため、住宅・店舗等の出入口に防水板を設置する際の費用の一部を助成する。\n◆東京都および区が定めた総合治水対策の目標に基づき、1時間当たり10㎜分の雨水流出抑制を図るため、宅地内（民有地）雨水浸透施設の\n普及に努める。\n【概要】\n◆民間小規模建築物で、屋根等に降った雨水を貯留し利用するためのタンクを設置する場合、設置に要する費用の一部を助成する。\n◆開発指導要綱の対象物や半地下構造物を除き、防水板設置および関連工事に要する費用の一部を助成する。\n◆新築、増改築等に係わらず宅地内に降った雨水を地下に浸透させる施設（浸透ます・浸透管）および公共雨水浸透ますへの接続管の設置に\n要する費用の一部を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":554,"name":"排水施設建設事業","bureau":"防災まちづくり部","dept":"河川下水道課","budget":2813119,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都区部における下水道事業は、東京都が一体的に事業を実施しているが、区内の下水道を整備促進する観点から、品川区では事業の一\n部を東京都から受託し、東京都と連携して下水道事業を推進する。\n【概要】\n◆戸越・西品川地区周辺の浸水被害軽減に向け、目黒川に雨水を排水する第二戸越幹線を令和12年度を目途に整備する。\n◆勝島地区に雨水管を令和12年度を目途に整備し、浸水被害の軽減を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":555,"name":"下水道管改修事業","bureau":"防災まちづくり部","dept":"河川下水道課","budget":495057,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都区部における下水道事業は、東京都が一体的に事業を実施しているが、品川区内における下水道施設の老朽化および震災対策等につ\nいて、区は東京都から事業の一部を受託し、東京都と連携して事業を実施する。\n【概要】\n◆老朽化対策事業【再構築】\n　下水道管整備後50年程度経過した目黒川左岸地区の老朽化した下水道施設について、東京都と連携して取替えや更生を行うとともに、老朽\n化した下水道管の延命化を図りつつ、道路陥没を未然に防ぎ、雨水の排水能力の増強を進めていく。\n◆耐震化推進事業 \n　首都直下地震などが発生したときに備え、災害復旧拠点や避難所などを対象に下水道管とマンホールとの接続部の耐震化やマンホールの浮\n上抑制対策を推進することで下水道機能を確保するとともに、緊急輸送道路などの交通機能を確保する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":556,"name":"河川下水道総務費","bureau":"防災まちづくり部","dept":"河川下水道課","budget":547,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆各事業の円滑な執行を図るため、課内庶務事務に係る経費を支出する。\n\n【概要】\n◆職員旅費　◆事務用消耗品の購入　◆郵便料　◆有料駐車場使用料\n◆東京河川改修促進連盟分担金\n◆東京高潮対策促進連盟分担金\n◆東京都総合治水対策協議会負担金\n◆目黒川環境整備促進流域三区連絡会分担金\n◆城南五区下水道・河川連絡協議会分担金","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":557,"name":"防災会議費","bureau":"防災まちづくり部","dept":"防災課","budget":373,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆災害対策基本法に基づき品川区防災会議を開催し、品川区地域防災計画の策定および計画に基づく対策の推進を行っている。\n【概要】\n◆区長が会長を務め、地方行政機関、自衛隊、都、警視庁、東京消防庁、消防団、公共機関の代表者など61人以内の委員で構成\n◆下記の事項を担任する。\n①品川区地域防災計画を作成し、その実施を推進すること\n②区長の諮問に応じて区の地域に係る防災に関する重要事項を審議すること\n③前号に規定する重要事項に関し、区長に意見を述べること\n④その他、法律またはこれに基づく政令によりその権限に関する事務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":558,"name":"防災区民組織育成費","bureau":"防災まちづくり部","dept":"防災課","budget":51067,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆町会・自治会を母体とした区民の自主組織である防災区民組織を積極的に支援し、災害時、住民が自助・共助の考えに基づき主体的に災害\n対応が行えるよう、育成・強化を図る。\n【概要】\n◆防災区民組織（区民消火隊・ミニポンプ隊含む）の活動にかかる装備品の配備および助成金の交付を通して、防災区民組織の運営の円滑化\nおよび組織の資質の向上を支援し、区民の防災活動の充実発展を促進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":559,"name":"防災訓練経費","bureau":"防災まちづくり部","dept":"防災課","budget":31946,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆自助・共助のための防災訓練を支援するとともに、職員の災害対応能力向上のための各種訓練を実施し、災害発生時の対応に備える。\n【概要】\n◆地区総合防災訓練を実施\n◆区内一斉防災訓練を実施\n◆水防訓練を実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":560,"name":"防災普及教育費","bureau":"防災まちづくり部","dept":"防災課","budget":665902,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の「自助」「共助」の意識の高揚と自主的な防災活動の促進、在宅避難の推進を図るため、防災に関する知識の普及および意識啓発を\n行う。\n【概要】\n◆しながわ防災体験館運営では、初期消火体験などの各種コンテンツやワークショップを通じて、防災意識の高揚を図る。\n◆しながわ防災学校では、区民・防災区民組織・事業者を対象に、防災に関する知識や技術の習得を図り、地域防災力を向上させる人材とし\nて、「しながわ防災リーダー」を育成する。\n◆マンション防災対策では、訓練実施やエレベーター用防災チェア配布により、共助の仕組みづくりや自助の取組みを推進する。\n◆共助の担い手としての役割が期待できる中学生に対し、専用の教材の作成・配布により防災教育を強化し、区の防災力の向上につなげる。\n◆地震体験車などによる防災教育により、事前の対策や発災時の初動対応について啓発する。\n◆啓発冊子は、防災知識の普及および防災意識の啓発のため、定期的な見直しを図りながら配布を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":561,"name":"消防団運営費","bureau":"防災まちづくり部","dept":"防災課","budget":17844,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆3消防団本団、17消防団分団、3消防少年団および3防火防災協会に対し補助を行い、消防団活動および防災体制づくりを支援する。\n【概要】\n◆品川区消防団等補助金交付要綱に基づく交付\n◆歳末警戒等手当の支払い\n◆消防団福祉共済掛金の支払い\n◆消防団装備品補助金の交付\n◆消防団運営補助金の交付","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":562,"name":"避難行動要支援者経費","bureau":"防災まちづくり部","dept":"防災課","budget":13067,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆災害時に自ら避難することが困難な避難行動要支援者が円滑に避難できるよう、避難体制づくりの支援を行う。\n【概要】\n◆福祉関係者を含めた関係部局と連携し、支援体制の構築を進める。\n◆防災区民組織による避難誘導ワークショップを実施し、避難ルートや避難誘導方法の確認を行うなど、要支援者への支援体制づくりを支援\nする。\n◆要配慮者利用施設における避難確保計画の作成支援を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":563,"name":"防災体制整備費","bureau":"防災まちづくり部","dept":"防災課","budget":168172,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆災害対策本部等による応急活動に必要なシステム・物資等を充実させ、初動活動体制を整備する。\n【概要】\n◆区職員による応急活動に必要な装備品を整備する。\n◆災害対策本部における情報の収集・分析・共有に必要となる情報システム・通信媒体等を整備する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":564,"name":"防災情報配信経費","bureau":"防災まちづくり部","dept":"防災課","budget":43722,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆災害時における情報収集および区民に対する情報発信を強化する。\n【概要】\n◆区のホームページ・ケーブルテレビ品川・ＳＮＳ・Ｊアラートなどに加え、区公式ＬＩＮＥの防災メニューを充実させ、情報発信力を高め\nる。\n◆防災タブレットを活用し、防災区民組織との情報共有を推進する。\n◆屋外に設置したスピーカー等で、一斉に通報を行う防災行政無線を適切に運用するとともに、区ホームページ・ＳＮＳ・防災行政無線確認\nダイヤル・防災ラジオなど放送内容の確認ができる手段を充実させる。\n◆防災体制整備費にて導入している被災情報管理システムに付随する防災ポータル・アプリの周知に努める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":565,"name":"初期消火体制強化費","bureau":"防災まちづくり部","dept":"防災課","budget":37598,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆街頭消火器や消火ポンプなどの適正な維持管理および区民への家庭用消火器の助成金により、初期消火体制を強化する。\n◆木造住宅を対象にした感震ブレーカーの設置費用補助により、地震による電気火災の発生を抑制する。\n【概要】\n◆8年経過した街頭消火器を計画取替する。\n◆3年経過した街頭消火器を計画点検する。\n◆家庭用消火器の購入あっせんを行う。\n◆学校に配備した消火ポンプの保守点検を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":566,"name":"災害時応急物資確保費","bureau":"防災まちづくり部","dept":"防災課","budget":300087,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆震災や風水害など、さまざまな災害事象に応じた物資を確保することで、発災時における避難者の生活環境の改善を図る。\n◆備蓄倉庫等の効率的な運営体制の構築を図るとともに、物流事業者と連携した発災時の輸送・支援体制を構築する。\n【概要】\n◆都の被害想定における避難者数に応じて、避難生活に必要な物資の備蓄を計画的に進めるとともに、スフィア基準等を踏まえた避難者の生\n活環境の向上のため、高齢者や乳幼児などの要配慮者をはじめ、多様な視点に対応した物資を充実させる。\n◆備蓄物資を適切に管理し、備蓄場所や賞味期限、数量等を正確に把握し管理を行う。\n◆民間倉庫等を活用した備蓄倉庫を確保するとともに、既存倉庫の役割を整理することで、災害時の輸送体制を構築する。\n◆発災時に物資を迅速に輸送するために、平時から物流事業者等と連携した体制を構築し、備蓄倉庫や物資を一体的に管理することで、効率\n的な運営体制および輸送体制の強化を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":567,"name":"避難所管理費","bureau":"防災まちづくり部","dept":"防災課","budget":47035,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆災害時における地域の避難拠点である避難所の設備等を整備するとともに、避難所運営体制を強化する。\n【概要】\n◆避難所運営に関する設備（非常用発電機、応急給水栓、浅井戸、避難所表示シート、広域避難場所看板等）の維持管理等を行う。\n◆応急給水栓からの給水に必要な検査キットの入れ替えを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":568,"name":"帰宅困難者対策経費","bureau":"防災まちづくり部","dept":"防災課","budget":57255,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆帰宅困難者の発生や地域における被害の拡大防止のため、事業者の自助・共助に係る取組みを推進する。\n◆大規模災害発生に伴う駅周辺等の帰宅困難者の安全を確保し、駅周辺の安全確保と混乱防止を図る。\n\n【概要】\n◆事業者や関係機関等から構成される帰宅困難者対策協議会において、ターミナル駅周辺の帰宅困難者等への支援方法を検討する。\n◆区は各協議会における物資の充実やマニュアルの策定を支援し、各協議会および関係機関との連携を強化し、駅周辺での情報提供など共助\nによる帰宅困難者支援を行う。\n◆行き場のない帰宅困難者を受け入れるため、事業者と災害時協力協定を締結し、一時滞在施設の拡充を図り、備蓄物資を配備する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":569,"name":"弔慰金・見舞金経費","bureau":"防災まちづくり部","dept":"防災課","budget":885,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆災害救助法の適用にならない小規模な火災・水害等に際し、被害を受けた世帯等に対して見舞金等を支給するとともに、死亡者がある場合\nには、遺族に対し弔慰金を支給し、被災者を支援する。また、被害により自宅に居住することができず、宿泊施設を利用しなければならない\n世帯に対して宿泊施設費用を支給する。\n【概要】\n◆火災被害　単身世帯　20，000円／普通世帯　30，000円（普通世帯の人数が2人以上の場合は、1人あたり10，000円を追加）　\n◆風水害による住宅の損壊　50，000円（1世帯）　　　　　　　　◆事業所浸水　10，000円（床上、商品等に被害）\n◆床上浸水　単身世帯　30，000円／普通世帯　40，000円　　　　◆床下浸水　単身・普通世帯を問わず10，000円　　　　　　　\n◆弔慰金　死亡者一人あたり50，000円\n◆宿泊費用　1人1泊10,000円を上限に基本2泊まで","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":570,"name":"自衛官等募集事務費","bureau":"防災まちづくり部","dept":"防災課","budget":23,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆第1号法定受託事務として、自衛官等募集に関する広報宣伝を実施する。\n【概要】\n◆「広報しながわ」による自衛官募集の記事を掲載\n◆自衛官及び自衛官候補生の募集のため、必要な募集対象者情報の提出\n◆自らの意思で、我が国を守るという崇高な使命を有する自衛隊に入隊・入校する者に対し、激励会を行う\n◆自衛官募集の理解、今後の募集協力の拡大を図るために、自衛官募集相談員連名委嘱式を実施\n◆防災啓発イベントでのチラシ配布","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":571,"name":"防災総務費","bureau":"防災まちづくり部","dept":"防災課","budget":4570,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆災害対策に関する業務の執行に必要となる一般的経費\n【概要】\n◆各地区防災協議会・避難所連絡会議等に係る職員旅費\n◆車両の点検および整備費、保険料\n◆印刷、用品等購入、後納郵便、有料駐車場使用に係る事務的経費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":572,"name":"委員会運営費","bureau":"教育委員会事務局","dept":"庶務課","budget":12611,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆「地方教育行政の組織及び運営に関する法律」に基づき設置された教育委員会における会議を開催し、運営する。\n【概要】 \n◆毎月2回、第2・第4火曜日に教育委員会定例会を、必要に応じて臨時会をそれぞれ開催する。\n◆品川区教育委員会の権限に属する事務の管理および執行状況の点検・評価（事務事業評価）を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":573,"name":"教育広報発行費","bureau":"教育委員会事務局","dept":"庶務課","budget":2706,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区の教育について区民等に広く周知するため、教育広報および広報しながわ教育特集号を発行する。\n【概要】\n◆教育広報誌「教育のひろば」を年1回発行し、児童・生徒およびその保護者、教職員、関係者へ配布する。\n◆広報しながわ教育特集号を年1回発行し、児童・生徒およびその保護者、教職員のほか、広報しながわ送付先すべてへ配布する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":574,"name":"教職員福利厚生費","bureau":"教育委員会事務局","dept":"庶務課","budget":31831,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆法律に基づき教職員の安全と健康維持増進を図ることで、学校教育の円滑な実施とその成果を確保する。\n【概要】\n◆教職員の健康を保持するため、健康診断（定期健康診断・各種がん検診・ストレスチェック等）を実施し、心身の相談等に対応する。\n◆学校教職員の安全と健康維持増進を図るため、健康教育・健康管理業務を行う。\n◆産業医の配置により、①教職員の心身の悩みの相談、②ストレスチェック後における希望する高ストレス者への面接指導、③長時間労働者\nへの面接指導、④学校管理職を対象とするメンタルヘルス講習会　を実施する。\n◆学校職員に職務執行上、必要な被服を貸与する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":575,"name":"文化財保存活用事業","bureau":"教育委員会事務局","dept":"庶務課","budget":16275,"next_budget":0,"root":"","cls":"伝統・文化を継承し親しむ環境づくり","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆子どもたちや区民に伝統と文化を尊重する精神を育むとともに、新しい文化の創造に資するために、伝統・文化遺産の継承と文化財の保\n護・活用に努める。\n【概要】\n◆品川区文化財保護条例に基づき、文化財の保護および活用に関する重要事項を調査審議し、教育委員会へ建議を行う。\n◆文化財調査を進めその保存に努めるとともに、文化財調査報告書刊行や「文化財めぐり」等の普及事業を通じて区内文化財の活用に努め\nる。\n◆埋蔵された文化遺産を保護するために、発掘・整理調査および同調査記録の作成等を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":576,"name":"ＰＴＡ関係費","bureau":"教育委員会事務局","dept":"庶務課","budget":21868,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区教育委員会からの委託を通じてＰＴＡ活動を支援することにより、各家庭における家庭教育力向上を図る。\n【概要】\n◆ＰＴＡ活動の活発化を図るために区立学校ＰＴＡとＰＴＡ連合会に各種の研修・事業を委託する。\n◆保護者自らが子育てについて考え、学ぶことを目的とし、家庭教育に関する学習会等を委託する。また、教育委員会主催の講演会を開催す\nる。\n◆家庭での教育力の必要性を自覚することを目的として、家庭教育ブックを作成・配付する。\n◆小学校・義務教育学校37校のうち、校庭開放運営委員会より申請があった学校について、校庭を遊び場として開放し、児童の健全育成を行\nう。\n◆ＰＴＡが主体となり実施している83運動《子どもの登下校時刻（午前8時と午後3時）に合わせて、地域・住民が見守る運動》を支援するこ\nとで、区民への一層の周知、運動の推進を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":577,"name":"義務教育施設整備基金積立金","bureau":"教育委員会事務局","dept":"庶務課","budget":2142352,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆将来的に必要となる義務教育施設整備費の安定的な財源確保のために基金を設置し、毎年度予算に定めた額を積み立てる。\n【概要】\n◆上記目的の達成に向け、基金の運用益による「運用額積立金」および「新規積立金」を基金へ充当する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":578,"name":"教育総務関係事務費","bureau":"教育委員会事務局","dept":"庶務課","budget":19258,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆各種事務事業を円滑に推進するための事務用経費のほか、他の小事業に属さない事務事業を実施する。\n【概要】\n◆業務委託・教育訟務員の任用により区立学校で発生するトラブル対応に関する学校・教育委員会からの相談を受け付け、助言を行う。\n◆東京都獣医師会品川支部との共催により開催する動物愛護作文コンクールに要する物品購入、作文集印刷を行う。\n◆品川区珠算振興会との共催により開催する珠算競技会に伴う表彰状を購入する。\n◆その他日常の事務処理にかかる物品・備品・複写機使用料等を支出する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":579,"name":"学校維持補修費","bureau":"教育委員会事務局","dept":"庶務課","budget":445269,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設の適切な維持管理を行い、良好な学校施設環境を保つことにより、児童・生徒の学習環境の改善、安全衛生の向上を図る。\n【概要】\n◆円滑な学校運営を行うため、必要に応じて簡易的な維持修繕や中小規模の改修工事等を実施する。\n◆計画的に学校敷地内の樹木の診断や剪定を行い、適切に樹木を維持管理することで災害時における安全性を確保するとともに、児童・生徒\nの良好な学習環境を整備する。\n◆校庭整備や維持修繕に必要な原材料を購入する。\n◆その他、日常の事務処理にかかる物品やソフトウェア使用料等を支出する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":580,"name":"校舎等整備","bureau":"教育委員会事務局","dept":"庶務課","budget":1086602,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設の安全性・機能性を維持し、児童・生徒の学習・生活環境を向上させるため、計画的に校舎の改修を行う。\n【概要】\n◆老朽化している学校トイレの改修を進め、和式トイレの洋式化を推進する。\n◆耐用期限を迎えている空調設備を計画的に改修し、児童・生徒の良好な学習環境を維持する。また、高効率機器を採用することで省エネル\nギー化を図る。\n◆従来設置していた蛍光灯照明器具について、省エネルギー化を図るためＬＥＤ照明器具への更新を進める。\n◆耐用期限を迎えている受水槽について、不具合による事故を未然に防ぎ、児童・生徒に清潔な水を提供するため、計画的に取替工事を進め\nる。\n◆学校運営に必要不可欠な電話交換設備や非常放送設備について、計画的に更新を進め健全な状態を維持する。\n◆学校施設の安全性を維持するため、防火戸・防火シャッター、自動火災報知設備等の改修を進める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":581,"name":"外壁・屋上改修費","bureau":"教育委員会事務局","dept":"庶務課","budget":438542,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設の安全性・機能性を維持し、児童・生徒の学習・生活環境を向上させるため、計画的に建物の改修を行う。\n【概要】\n◆外壁の劣化による雨漏り、コンクリートの剥落や窓の脱落等の危険を未然に防ぐため、外壁改修工事を実施する。\n◆経年劣化している屋上の防水層を改修し、健全な状態を維持する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":582,"name":"学校体育施設整備費","bureau":"教育委員会事務局","dept":"庶務課","budget":243573,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設の安全性・機能性を維持し、児童・生徒の学習・生活環境を向上させるため、計画的に学校体育施設の改修を行う。\n【概要】\n◆経年劣化している校庭やプールについて、施設の不備による事故を未然に防ぎ、児童・生徒の運動環境を向上させるため、計画的に改修を\n進める。\n◆屋内運動場について、熱中症を予防し年間を通して快適な運動環境を実現するため空調設備を設置する。\n◆屋内運動場の舞台照明や校庭の屋外夜間照明設備について、ＬＥＤ照明器具への改修を進め、利便性を高めるとともに省エネルギー化を推\n進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":583,"name":"施設整備等設計委託","bureau":"教育委員会事務局","dept":"庶務課","budget":50790,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設の改修工事を行うにあたり、前年度中に設計業務を完了させることで、学校の夏休み期間に工事を集中させ、児童・生徒の生活や\n学習環境への影響を軽減する。\n【概要】\n◆夏休み期間や年度早期に発注が必要な工事について、民間の設計事務所に設計業務委託を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":584,"name":"学校維持管理費","bureau":"教育委員会事務局","dept":"庶務課","budget":204677,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆法令に定められた点検等の実施により、長期的に学校施設を健全に維持し、児童・生徒の安全・安心で良好な学習環境を確保する。\n◆登下校区域防犯カメラの保守点検等を実施し、児童・生徒の登下校時の安全性を向上させる。\n【概要】\n◆学校施設内の設備について、法令等に基づき保守点検を実施する。\n◆登下校区域防犯カメラについて、保守点検等の実施により適切に維持管理を行う。\n◆学校施設の安全性・防犯性を確保するため、機械警備業務を委託する。\n◆児童・生徒や地域住民に対するカラスの被害を防止するため、学校敷地内のカラス営巣等撤去業務を委託する。\n◆機器等の更新状況を把握し長期的な建物の保全に活用するため、施設保全システムにおいて工事履歴等のデータを継続的に更新する。\n◆その他、日常の維持管理に必要な消耗品等の購入や庁有車の整備等を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":585,"name":"学校運営費","bureau":"教育委員会事務局","dept":"庶務課","budget":545401,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校に勤務する区職員の職務内容の充実と資質の向上を図る。\n◆学校教育の円滑な運営を確保する。\n【概要】\n◆地域活動と教育活動の円滑な協調を図るため、校長・園長に対し交際費等を措置する。\n◆教育施設として良好な環境を図るため、登下校時間における児童の通学確認および通学環境整備、土曜授業日等の学校受付業務、用務業務\nを委託する。\n◆教育活動に伴う教職員のけが等に備え、一般的な常備薬を購入・配付する。\n◆学校における文書保管が適切になされるよう、ファイリングシステム維持・運営に必要な用品を購入・配付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":586,"name":"学校改築推進経費","bureau":"教育委員会事務局","dept":"庶務課","budget":4471954,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設の老朽化や就学人口の増加等に対応するため、計画的に学校改築を推進し、児童・生徒が安全で快適な学校生活を送れるよう、良\n好な学習環境を整備する。\n【概要】\n◆改築にあたっては、建物の老朽度、就学人口の動向や地域バランス等を踏まえ、効率的に計画を進める。\n◆敷地内で学校運営を継続しながら改築を進めていく中で、建築手法の工夫や適切な建替計画を設定することで、児童・生徒への影響を最小\n限にするとともに、工期の縮減や経費の削減を図る。\n◆省エネ・創エネ設備の導入等により脱炭素化への取組みを推進するとともに、児童・生徒や地域住民に対する環境教育への活用・啓発を行\nう。\n◆災害時には地域防災の要となるよう、非常用発電機や蓄電池、マンホールトイレ、防災備蓄倉庫等を整備し、防災機能の充実を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":587,"name":"就学事務費","bureau":"教育委員会事務局","dept":"学務課","budget":8479,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校教育における適正な就学を図る。\n\n【概要】\n◆各学校での特色ある教育活動の周知を図るため、学校選択に係る学校案内パンフレットを作成する。\n◆就学事務諸書類の作成および帳票印刷、送付等を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":588,"name":"クラブ・部活動指導員経費","bureau":"教育委員会事務局","dept":"学務課","budget":9663,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆中学校・義務教育学校におけるクラブ活動および合同部活動・小中連携部活動指導の効果を高めるとともに、学校教職員の部活動指導にか\nかる負担軽減を目的とする。 \n\n【概要】\n◆中学校・義務教育学校のクラブ活動および合同部活動・小中連携部活動における外部指導員を配置する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":589,"name":"プール指導員経費","bureau":"教育委員会事務局","dept":"学務課","budget":12233,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区立学校においてプール指導を通じ、児童・生徒に水泳の心得や楽しさ、安全に対する態度を身につけさせるとともに、学期中の水泳指導\nの成果を確かなものにし、泳力の向上を図る。\n【概要】\n◆プール指導は教員を主体に行うが、小学校および義務教育学校（前期）については、実技指導を（公財）品川区スポーツ協会に委託し、中\n学校および義務教育学校（後期）については、実技指導補助員を配置することで一層の水泳技術の向上を図る。\n◆事故防止などの安全対策として、安全管理補助員を必要に応じて配置する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":590,"name":"夏季施設費","bureau":"教育委員会事務局","dept":"学務課","budget":19292,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆夏休み期間中等に豊かな自然の中で心身を鍛錬することによって児童の健康増進を図るとともに、教師と児童が生活を共にすること\n　により心の交流と団体行動の訓練の場として実施する。\n\n【概要】\n◆全校の実施スケジュール決定やバス・宿舎・同行する看護師の確保など、各学校での実施計画をサポートする。\n◆児童にとって安全な夏季施設とするため、校長会と協議しながらモデルコース作成、引率教員への説明会および実地踏査を行う。\n◆各校はハイキング、飯盒炊飯、キャンプファイヤーなど野外体験活動を含む1泊2日の日光夏季施設を5年生で実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":591,"name":"移動教室経費","bureau":"教育委員会事務局","dept":"学務課","budget":170472,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆自然に親しみ歴史的文化遺産等の学習を経験させるとともに集団生活を通して規律や連帯感を養い、健康増進を目的として\n　日光（6年）・磐梯高原（7年）において移動教室を実施する。\n\n【概要】\n◆全校の実施スケジュール決定やバス・宿舎・同行する看護師の確保など、各学校での実施計画をサポートする。\n◆児童・生徒たちにとって安全な移動教室とするため校長会と協議しながらモデルコース作成、引率教員への説明会や実地踏査を行う。\n◆各校では文化遺産見学、ハイキング、伝統工芸品作成体験を含んだ2泊3日の移動教室を6・7年生にて行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":592,"name":"就学援助費","bureau":"教育委員会事務局","dept":"学務課","budget":163866,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆経済的理由によって就学困難な児童および生徒の保護者に対して就学援助費等を支給し、もって義務教育を円滑に実施する。\n【概要】\n◆品川区に住所を有し、公立学校に在籍する児童・生徒の保護者であって生活に困窮している者に対し、学用品費、修学旅行費等の就学援助\n費を支給する。\n◆品川区に住所を有し、公立小学校または義務教育学校に在籍を予定する新1年生の保護者であって生活に困窮している者に対し、就学援助\n費(入学支度金)を前倒しで支給する。\n◆品川区立学校の特別支援学級に在籍する、または、学校教育法施行令第22条の3に規定する程度の障害をもつ児童・生徒の保護者に対し、\n学用品費、修学旅行費等の就学奨励費を支給する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":593,"name":"教材教具費","bureau":"教育委員会事務局","dept":"学務課","budget":748825,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆教育目標を達成するため、教材・教具の整備・充実を図る。\n\n【概要】\n◆教材教具消耗品、備品等の購入\n◆英検チャレンジ事業（品川区立学校に在籍する5～9年生に対し、英検の年3回の受検のうち1回分（受験級の制限なし）の検定料を全額助\n成）\n◆補助教材費保護者負担軽減事業（区立学校対象学年の全員が使用する補助教材等の費用を公費負担）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":594,"name":"学校ＩＣＴ活用経費","bureau":"教育委員会事務局","dept":"学務課","budget":1950090,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆子どもたち一人ひとりの資質・能力をより効果的に育成できる教育ＩＣＴ環境を実現するため、児童・生徒の学習用タブレット端末、電子\n黒板、校内ネットワーク等を一体的に整備する。\n【概要】\n◆区立学校に在籍する全ての児童・生徒に学習用タブレット端末を配付し、家庭においても学習可能な環境を整備する。\n◆災害や感染症等による臨時休業にも対応可能な双方向型のオンライン学習環境を整備し、子どもたちの学びの機会を保障する。\n◆教員がプロジェクタやモニター一体型電子黒板、指導用デジタル教科書を活用し、より質の高い、分かりやすい授業を実現する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":595,"name":"学校システム運営費","bureau":"教育委員会事務局","dept":"学務課","budget":185002,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆学校事務のシステム化およびネットワーク化を行い、学校事務の効率化・省力化・共通化を図る。\n【概要】\n◆学校事務システム：学齢簿、学校保健、学校給食等の情報管理のシステム化および運用\n◆校務支援システム：児童生徒の出欠席、成績全般、指導計画等のシステム化および運用","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":596,"name":"特色ある教育活動経費","bureau":"教育委員会事務局","dept":"学務課","budget":21834,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆特色ある教育活動の実施・学習環境の向上を図るための補助的教材および学校備品の整備を行う。\n\n効率性\n◆執行率は85.1％となっている。\n◆需用費については、児童・生徒の人数に変動があり必要数の見直しをした結果、不用額が生じている。\n◆備品購入費については、契約落差による不用額が生じている。\n\n【概要】\n◆平成18年度からスタートした「小中一貫教育」に基づき、小学校・中学校・義務教育学校の連携と教員の指導力向上を意識した教育活動を\n展開する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":597,"name":"学校図書館資料整備費","bureau":"教育委員会事務局","dept":"学務課","budget":42777,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学習・読書活動の推進のため、学校図書館の整備・充実を図る。\n【概要】\n◆区立学校の図書購入等を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":598,"name":"学校維持管理費","bureau":"教育委員会事務局","dept":"学務課","budget":1468095,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設・設備の維持管理を行う。\n【概要】\n◆光熱水費\n◆維持管理用消耗品等\n◆維持管理用備品\n◆普通ごみ回収\n◆粗大ごみ回収\n◆各種機器保守点検委託等\n◆施設管理業務委託","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":599,"name":"学校運営費","bureau":"教育委員会事務局","dept":"学務課","budget":420976,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区立小中学校の学校環境の整備および円滑な校務の運営を図る。（校具の整備、行事式日の運営、校務の運営）\n【概要】\n◆教育内容の充実および教材・教具の多様化に適応した教育環境の整備を図る。予算の一部を学校に配当し執行している。\n◆校具の整備\n①学校における消耗品、備品の老朽取替え（黒板、背面ロッカー、児童・生徒用机椅子、放送室音声調整卓等）\n②就学人口増に伴う教室改修工事・備品整備\n◆行事式日の運営\n◆校務の運営\n①校務用消耗品、防犯ブザー・ヘルメット購入\n②クラブ活動大会参加費助成・校長会等分担金","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":600,"name":"給食運営費","bureau":"教育委員会事務局","dept":"学務課","budget":3047859,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆給食業務遂行の円滑化と良好な給食環境の維持を図る。\n【概要】\n◆学校給食無償化事業を実施する。\n◆給食調理業務等代行による安定した給食の提供を行う。　\n◆事務（給食業務）職員の退職不補充校の栄養士業務を委託する。\n◆強化磁器食器他給食消耗品、衛生管理用物品を購入する。\n◆給食生ごみの回収・リサイクル処理委託により資源リサイクル化に取組む。\n◆環境教育の一環として、牛乳紙パックをリサイクル処理し回収する。\n◆長期休業中に清掃事業者等によるグリストラップ他清掃委託を行う。\n◆調理機器・給食施設の修繕および小破修繕を行うなど。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":601,"name":"給食施設整備費","bureau":"教育委員会事務局","dept":"学務課","budget":190603,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆安全で衛生的な学校給食を提供するため、調理機器等の整備や給食施設設備を改修し、事故防止と衛生管理の徹底を図る。\n【概要】\n◆給食施設設備改修工事\n◆大型調理機器老朽取替","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":602,"name":"保健運営費","bureau":"教育委員会事務局","dept":"学務課","budget":259147,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校保健安全法第6条に基づく学校環境衛生の維持\n◆学校保健安全法第11条・13条に基づく児童・生徒の健康管理および健康診断実施\n◆学校保健安全法第23条に基づく学校医等の設置\n\n【概要】\n◆保健用薬品・プール消毒薬品等の購入や、環境衛生検査等各種検査委託等による学校環境衛生の維持\n◆就学時健診の実施や心臓検診等各種検診委託等による児童・生徒の健康管理および健康診断実施\n◆児童・生徒の健康診断や保健指導等に従事する学校医、学校環境衛生検査や薬品等の管理に関する指導を行う学校薬剤師の設置","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":603,"name":"特別支援学校補助教材費保護者負担軽減事業","bureau":"教育委員会事務局","dept":"学務課","budget":561,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆特別支援学校に在籍する児童・生徒の保護者に対し、補助教材費を支給することで、子育て家庭の負担軽減を図る。\n【概要】\n◆品川区に住所を有し、特別支援学校に在籍する児童生徒の保護者に対し、補助教材費の実費を支給する。ただし、同一年度中に、他の事業\nによりすでに補助教材費の支給を受けている者は、減額支給または対象外とする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":604,"name":"特別支援学校給食費補助事業","bureau":"教育委員会事務局","dept":"学務課","budget":1263,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆特別支援学校に在籍する児童・生徒の保護者に対し、給食費相当分を支給することで、子育て家庭の負担軽減を図る。\n【概要】\n◆品川区に住所を有し、特別支援学校に在籍する児童・生徒の保護者に対し、給食費相当分を支給する。ただし、同一年度中に、他の事業に\nよりすでに給食費の支給を受けている者は、減額支給または対象外とする。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":605,"name":"区教員事務費","bureau":"教育委員会事務局","dept":"指導課","budget":3062,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区独自の一貫教育を円滑・継続的に進めるため、品川区に愛着を持ち、高い使命感と意欲がある区固有教員を配置し、学力の向上と豊\nかな人間性の育成を図る。\n【概要】\n◆採用選考により品川区固有教員を採用する。\n◆昇任選考によりキャリアに応じた職層を意識させ、教員としての資質向上を図る。\n◆教員としての専門性を高めるため、独自の研修を行うとともに、東京都主催研修への参加や外部機関による専門研修受講を支援する。ま\nた、異校種の免許取得について助成を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":606,"name":"教職員研修","bureau":"教育委員会事務局","dept":"指導課","budget":571,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆将来、品川区の教育を中核となって牽引し、活躍することが期待される教職員の育成を図る。\n\n【概要】\n◆産業能率大学の産能マネージメントスクールの1日研修を補助する。また、幼児教育研修、幼稚園教諭フォローアップ研修を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":607,"name":"教職員支援経費","bureau":"教育委員会事務局","dept":"指導課","budget":6151,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校を取り巻く環境が複雑化、多様化し、学校に求められる役割が拡大する中、教員の長時間勤務が社会問題となっており、働き方改革を\n早急に進めていく必要がある。勤務時間外の電話対応にかかる負担を軽減させ、また、事務作業等に従事する会計年度任用職員を配置し、本\n来業務である授業準備等に充てる時間を確保する。\n【概要】\n◆学校夜間電話対応委託を実施し、勤務時間外の電話対応にかかる負担を軽減させる。\n◆人的支援として、スクール・サポート・スタッフ（ＳＳＳ）、副校長補佐およびエデュケーション・アシスタントを配置し、教員の本来業\n務に充てる時間を確保する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":608,"name":"一貫教育推進経費","bureau":"教育委員会事務局","dept":"指導課","budget":44186,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆「品川区立学校教育要領」に基づき、一貫教育によりどのような効果や結果が現れるか評価・検討していく必要がある。\n◆区は、教育課程や区の課題を明確にすることで、教育施策に活かし、各学校は、教育課程や指導方法に関する事項の課題・解決策を明確に\nすることで、指導方法の改善および教職員の資質向上を図ることで、児童・生徒の学力向上および学校改善を目的とする。\n【概要】\n◆品川教育検討委員会を年1回開催し、区の教育の理念・方向性および、区立全小学校、中学校および義務教育学校における一貫教育の推\n進、今後の教育課題への対応等について協議する。検討委員会の委員は、学識経験者、校長会代表、区民代表、教育次長等で構成する。\n◆検討委員会の下に「教科等検討部会」、「その他教育長が必要と認める部会」等を設置する。なお、組織の役割および構成は、必要に応じ\nて異なるため年度ごとに別に定める。\n◆年に1度開催される小中一貫教育全国サミットにおいて、一貫教育の周知および一層の推進を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":609,"name":"習熟度別学習推進経費","bureau":"教育委員会事務局","dept":"指導課","budget":27235,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆教科の学習の内容理解や技能など一人ひとりの習熟度や能力に応じた指導を行い、基礎的・基本的な内容の確実な定着を図る。\n【概要】\n◆個性や特性を生かした個々の児童・生徒の学力を伸ばすため希望校に指導助手を配置し、習熟度別のグループを編成して、個に応じた指導\nを展開する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":610,"name":"特色ある教育活動経費","bureau":"教育委員会事務局","dept":"指導課","budget":3423,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆みんなのウェルビーイングが実現した「子どもたちの笑顔でつながる共生社会」を目指して策定した「品川区教育振興基本計画」を受け、\n豊かな心を育む教育、確かな学力の育成、グローバル社会における人材の育成等に向けた学校独自の特色ある教育活動を実施する。\n【概要】\n◆授業等での児童・生徒への学習支援を行う、学校支援ボランティアを配置する。\n◆地域の特性や学校の教育活動に応じて地域の豊富な人材による教育活動支援を行う。\n◆放課後や長期休業期間に指導助手や退職教員等を活用して学力向上を図る、基礎学力向上事業を実施する。\n◆子どもたちが自分の将来の夢を考え、自分の夢を実現させるためのきっかけとするため、地域人材等から様々な職業の方を招聘し、特別授\n業を開催する「しながわドリームジョブ」を、区立学校のうち希望する学校で実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":611,"name":"学力向上プラン推進事業","bureau":"教育委員会事務局","dept":"指導課","budget":2862,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆家庭学習の習慣が身についてない生徒について、集中して学習に取り組む環境を作る必要がある。\n◆自学自習の学習習慣を体得し、日常とは異なる環境の中で、集中して取り組むことができる自己学習能力を伸ばし、向学の精神を養う。ま\nた、学習態度の向上を通して、進路選択の幅を広げる。\n【概要】\n◆夏季休業期間中等に、宿泊および日帰りの勉強合宿を実施する。一定期間集中して学習できる環境で、学習習慣を身に付ける機会を提供す\nる。指導助手（免許保持者）・指導補助者（大学生等）を配置し、個に応じた指導を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":612,"name":"多様性理解・多文化共生推進事業","bureau":"教育委員会事務局","dept":"指導課","budget":5086,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆オリンピック・パラリンピック教育をきっかけに始まったパラスポーツ体験授業、アスリートとの交流、大使館との交流などを継続・実施\nすることで、国際社会に貢献し、東京および日本のさらなる発展の担い手となる人材の育成を図る。\n【概要】\n◆パラスポーツ体験授業、アスリートとの交流、大使館との交流等を引き続きしながわ多様性理解・多文化共生推進事業として実施する。\n◆区応援競技であったブラインドサッカーについて、8年生を対象に体験教室を、全校で行う。また、教員の資質向上（障害者理解）のため\nに、教員に対象の体験研修を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":613,"name":"１～６年生の英語科経費","bureau":"教育委員会事務局","dept":"指導課","budget":73378,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆英語によるコミュニケーション能力の向上を図り、国際理解に必要な主体性や積極性を養うために、英語を1年生から学ぶ。\n【概要】\n◆1・2年生はＡＬＴ（外国語指導助手）による授業を通じ、言語や文化に興味・関心を持たせ、理解を深めるとともに、聞く・話すなど実践\n的なコミュニケーション能力の素地を養う。\n◆3～6年生には、ＪＴＥ（英語専科指導員）による、区独自の指導内容を加えた英語指導を行う。\n◆4年生には「英語に親しむ」学習のまとめと5年生以降の「英語を使う」学習への意識付けを目的とした、ジュニア・イングリッシュキャン\nプを実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":614,"name":"英語力向上推進経費","bureau":"教育委員会事務局","dept":"指導課","budget":100706,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆7～9年生の、国際理解、英語によるコミュニケーション能力を高めるとともに、英語活動を通じて世界の言語、文化、社会等への興味・関\n心・理解を深める。\n【概要】\n◆ＡＬＴ（外国語指導助手）による指導補助や、品川オンライン英会話レッスンでのマンツーマンでの英語指導などを行い、学習の充実を図\nる。\n◆希望者を対象とした放課後の英会話レッスン教室「グローバル人材育成塾」、その受講生から希望者を募って実施する「イングリッシュ\nキャンプ」により、円滑なコミュニケーションをとることができる実践的な英語力を身に付ける事業を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":615,"name":"保幼小連携推進経費","bureau":"教育委員会事務局","dept":"指導課","budget":2790,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】　　\n◆品川区における保幼小の円滑な接続と就学前教育の充実を目指し、小学校および義務教育学校前期課程の実態からの視点で、就学前教育に\nおいて幼児に指導してほしい内容を整理するとともに、管理職の意識向上を図る。 \n\n【概要】　　\n◆区独自に作成したジョイント期カリキュラムの実施に当たり、啓発のためのリーフレットを作成する。\n◆全ての乳幼児の「伸びる・育つ（すくすく）」と「好奇心・探究心（わくわく）」を応援する幼保共通の都補助プログラム「とうきょうす\nくわくプログラム推進事業」を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":616,"name":"幼稚園講師採用経費","bureau":"教育委員会事務局","dept":"指導課","budget":11367,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆通園する園児の安全の確保かつ教育活動の充実を図るため、幼稚園講師を採用する。\n【概要】\n◆必修研修等に正規教員が出席する場合等の園児の安全確保・教育の質の確保のため、教育時間中に講師を配置するほか、周年行事の実施に\n対する支援等、必要に応じた講師の配置を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":617,"name":"学校地域連携推進経費","bureau":"教育委員会事務局","dept":"指導課","budget":114724,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目　的】\n◆保護者および地域住民等の学校運営への参画促進により、教育活動の継続性を担保するとともに、学校・家庭・地域が一体となって学校運\n営の改善や児童・生徒の健全育成に取り組むことを目的とする。地域全体で学校教育を支援する体制づくりを推進し、教員や地域の大人が子\nどもと向き合う時間の増加、地域住民等の学習成果の活用機会の拡充および地域の教育力の活性化を図るものとする。\n◆部活動を持続可能な取組みとするとともに、学校の働き方改革による学校教育の質の向上を図る。また、児童・生徒の多様な体験機会を確\n保し、スポーツや文化の楽しさ、喜びを感じるとともに自己実現や地域への愛着をもてる人材の輩出につなげる。\n【概要】\n◆学校運営の基本方針の承認等を行い、保護者や地域住民等の意見を反映させる校区教育協働委員会を設置する。\n◆校区教育協働委員会の企画・調整に基づき、学校支援ボランティアを組織し、放課後対策や授業の補助等を行う。\n◆学校支援活動の総合調整を行うため、「学校地域コーディネーター」を各校および指導課に配置する。\n◆品川区立学校の5～9年生を対象とし、より多くの子どもたちがスポーツを楽しめることを目指し民間委託による地域部活動を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":618,"name":"教職員システム管理費","bureau":"教育委員会事務局","dept":"指導課","budget":1495,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆都費教職員の旅費支給事務支援や教職員の在校時間の把握等を行うためのシステム保守を行う。\n◆「全国教員研修プラットフォーム（Plant）」の活用により、幼稚園教諭および区固有教員の都実施の研修への参加や自己研鑽の支援を行\nう。\n\n【概要】\n◆出退勤補完システムにより、旅費支給事務の円滑化を図る。また、教職員の在校時間を把握し、各学校に情報提供を行う。\n◆「全国教員研修プラットフォーム（Plant）」の活用により、幼稚園教諭および区固有教員の研修申し込みや研修受講履歴管理を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":619,"name":"教育指導関係事務費","bureau":"教育委員会事務局","dept":"指導課","budget":13559,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆課内の各種庶務事務を円滑に行う。\n◆教職員へ防災服を貸与し、防災訓練および災害時に備える。\n【概要】\n◆課内各事業の円滑運営のため、消耗品購入等を行う。また、区立学校・幼稚園の教職員が着用する職員証を作成する。\n◆防災服を購入し、教職員へ貸与する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":620,"name":"教職員研修","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":4910,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆直面する学校教育の諸課題について各種研修や校内研究会を行い、指導内容や指導方法の改善・拡充を図る。\n【概要】\n◆各職層や各校において直面する学校教育の諸課題について各種研修会・研究会を行う。\n　（校長研修、副校長研修、中堅教諭等資質向上研修、初任者研修、市民科研修、校内研究会など）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":621,"name":"品川区研究学校","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":2077,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区立幼稚園、区立学校における教科・領域等について、自主的に研究主題を設定し、教育活動の質の向上を図る。\n【概要】\n◆研究主題に基づいて2年に渡り実践・研究を行い、2年目に成果発表を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":622,"name":"品川区教育会助成金","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":1582,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区立学校（園）教職員部会における研究活動の推進、教職員の資質向上のための研修活動の充実など、教育のより一層の振興を図る。\n【概要】\n◆教科別等の部会への研究活動概要の発行や研究発表会、全国研究大会への参加者派遣および各種講演会への参加にかかる経費の補助を行\nう。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":623,"name":"人権尊重教育推進経費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":1233,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校や地域における人権尊重の推進上の諸問題に系統的・組織的に取り組む実践を通じて、人権尊重の意識を高める。また、同和問題をは\nじめ様々な人権問題にかかわる差別意識の解消を図る人権尊重教育を行う。\n【概要】\n◆人権尊重教育推進校を指定する。\n◆学校教育で人権に関する様々な課題について研究を深めるために、2つの委員会を設置する。\n①同和教育推進委員会：人権教育・同和教育の指導内容・方法について、研修会や協議会を通して教職員の見識を高めるとともに、同和教育\n先進地域の視察や人権・標語ポスター展の運営・実施によって、本区における人権教育・同和教育の一層の推進・充実を図る。校長、副校\n長、幼稚園長または副園長、教諭等20人で構成。\n②平和に関する指導資料作成委員会：具体的な指導内容・方法を研究授業実践で検討し、実践事例を掲載した指導資料を作成し、指導に役立\nてる。校長、副校長、幼稚園長または副園長、教諭等11人で構成。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":624,"name":"生徒指導対策費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":5661,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆時間外手当が支給されない教職員について、勤務時間外や夏季の早朝・夜間においても、意欲的に指導に当たれるよう、勤務環境を整備す\nる。\n◆区立中学校および義務教育学校（後期課程）生徒の進路指導の充実を図る。\n\n【概要】\n◆勤務を要しない日および勤務時間外に一定の要件下で2時間以上の校外指導にあたった教職員に対し、報償費を支出する。また、部活動指\n導に対しても、勤務時間外の指導について、教職員に報償費を支給する。\n◆進路指導に際し、卒業生の招へいや、生徒・父母を対象にした進路説明会で講演会を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":625,"name":"帰国児童・生徒等支援費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":12392,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆海外からの帰国児童・生徒ならびに海外より来日した外国籍の児童・生徒を対象とし、児童・生徒が日本の生活習慣および学習習慣に速や\nかに適応し、学校生活および社会生活を円滑に営むことができる能力を育成する。\n【概要】\n◆山中小学校および八潮学園の空き教室において、日本語能力の習得を進めるための言語指導や、対象者の実態に応じた教科への適応指導を\nＮＰＯ団体が行っている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":626,"name":"いじめ防止対策費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":85120,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区いじめ防止対策推進条例に基づき、いじめ防止・いじめ根絶に向けた取組みを推進する。\n\n【概要】\n◆学校・教育委員会において、いじめの「未然防止」「早期発見」「早期対応」の段階に合わせた取組みや、いじめ等に関する相談・支援を\n行う。\n◆地域・関係団体との連携強化を図り、いじめ問題の解決につなげるため、品川区いじめ根絶協議会を開催し、いじめ防止対策について協議\nする。\n◆教育委員会の附属機関として、学識経験者・法律・心理・福祉等の専門家で構成する品川区いじめ対策委員会（第三者委員会）を設置し、\nいじめ防止等の対策の推進に係る審議またはいじめによる重大事態の調査を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":627,"name":"連合行事費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":12701,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆連合行事を通じて、知徳体の調和のとれた人間性豊かな児童・生徒の育成をめざすとともに学校間の交流と親睦を深め教育活動の充実を図\nる。\n【概要】\n◆各行事費（音楽鑑賞教室、特別支援学級連合スポーツ大会、英語学習成果発表会、特別支援学級連合学習発表会）について、教育会への事\n業委託により実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":628,"name":"教育総合支援センター維持運営費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":25261,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆教育総合支援センター（平成27年開設）の維持管理、事業運営等を円滑に行うための事務用経費のほか、他の小事業に属さない事務事業を\n実施する。\n\n【概要】\n◆電気・水道等の光熱水費や電話料金の支払\n◆警備・清掃・設備管理等の業務委託\n◆センターの維持管理に要する物品等の購入、工事・修繕\n◆センター所有車のガソリン・車検・その他修繕・消耗品の購入、自動車賠償責任保険料、自動車重量税等の支払\n◆緊急時連絡用携帯電話利用料の支払\n◆空調改修工事の設計委託","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":629,"name":"教育相談事業費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":846,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆子どもたちが心身ともに健やかに成長し、安心した家庭環境の中での生活を支援するため、区内在住または区立学校在学の子ども（幼児・\n小学生・中学生・高校生）の教育に関する問題、悩みや心配について、本人とその保護者、および学校関係者の相談を受け付ける。\n\n効率性\n◆執行率は94.5％と高く、適正かつ効率的に執行している。\n◆教育支援センターや学校支援チームHEARTSなどとの役割分担などについては、検討が必要である。\n\n【概要】\n◆電話相談\n◆来室相談（カウンセリング・プレイセラピー）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":630,"name":"市民科・各教科充実経費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":67060,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆市民科や各教科の領域において、区立学校へ在籍している児童・生徒一人ひとりが自らの人生観を構築できる能力や学力の向上の着実な推\n進を図る。\n【概要】\n◆区独自の教科書の印刷や副教科書等の購入を行う。\n◆経済活動の体験的な学習を通して社会の実態を理解し、豊かな社会性や人間性の基礎的教養を身につける（スチューデントシティ）。ま\nた、金融体験活動を通して、主体的に生活設計に取り組める資質能力を身につける（ファイナンスパーク）。\n◆和楽器を演奏する活動を通して伝統音楽を体感させるため、邦楽講師を派遣し、授業を実施する。\n◆専門的講師（士業等）による市民授業や医師によるがん教育授業を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":631,"name":"特色ある教育活動経費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":14005,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆学校独自の特色ある教育活動を実施する。\n【概要】\n◆ホースセラピー（浜川小）\n◆いのちの授業（城南第二小、第四日野小、立会小、第二延山小、豊葉の杜学園）　\n◆和太鼓の発表（浜川小、浜川中）\n◆読み書き支援アプリの導入（第一日野小、鮫浜小、台場小、八潮学園）\n◆理科の観察・実験に使用する設備の準備や片付け等を行う補助員（理科観察実験支援員）の配置（複数校　国補助事業）　\n◆学校と家庭の連携推進事業支援員の配置（複数校　都補助事業）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":632,"name":"体力向上推進事業","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":54721,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆専門的指導により、児童・生徒に確かな技能を身に付けさせるとともに、教員の体育の授業力向上を図る。また、児童・生徒の体力向上へ\nの意欲を高め、指導の充実および運動の日常化により体力の向上を図る。\n【概要】\n◆テクニカルアドバイザーを配置し、専門的指導により、児童・生徒に確かな技能を身に付けさせる。\n◆全校で共通の種目に取り組むスポーツトライアルを実施し、児童・生徒の運動意欲向上につなげていく。\n◆1分間程度でできる簡単な運動（ワンミニッツエクササイズ）を、学校や家庭で行うことで、心と体をほぐし、集中力を高める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":633,"name":"不登校対策事業費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":152232,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】　\n◆不登校児童・生徒がどのような状況にあっても、学習の機会を確保し、居場所を見つけられるよう誰一人取り残さない支援を実施するた\nめ、不登校・児童生徒へ学校内外の居場所の提供や、フリースクール利用料等の助成事業、ポータルサイトによる情報発信等を行う。\n\n【概要】\n◆区内4箇所の教育支援センター「マイスクール」の運営\n◆校内別室指導支援員の全校配置\n◆メタバースによる不登校支援の実施\n◆品川不登校支援ポータルサイトの運営\n◆ファミリークラブ品川（不登校児童・生徒の親むけの情報提供・交流会）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":634,"name":"特別支援教育サポート経費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":18980,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目　的】\n◆障害のある児童・生徒の一人一人の教育的ニーズを把握し、適切な支援につなげる。\n◆教員の特別支援教育に関する理解を深め指導力の向上を図る。\n【概　要】\n◆専門家による訪問相談の実施\n◆各種研修の実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":635,"name":"特別支援学級等運営費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":450310,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目　的】\n◆一人一人の教育的ニーズを把握し、その持てる力を高め生活や学習上の困難を改善または克服するため、適切な指導・支援を実施できる体\n制整備を図る。\n【概　要】\n◆支援員の配置や医療的ケア児の受入れ体制の整備など、様々な障害や病気のある児童・生徒が安全かつ安心して学校生活を送ることができ\nるよう支援する。\n◆障害に応じた教育の場として特別支援学級等を設け教育を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":636,"name":"就学事務費","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":5652,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"＜政策予算＞\n【目　的】\n◆障害のある児童・生徒の障害および発達の状況に応じた適切な教育の場の検討機関として、就学相談委員会を設置する。\n【概　要】\n◆就学相談を受ける子どもの発達状況を確認するため、田中ビネー検査（心理検査）を実施し、検査結果を参考に就学相談を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":637,"name":"教科書採択事務","bureau":"教育委員会事務局","dept":"教育総合支援センター","budget":970,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆区立学校で使用する教科用図書の採択を適正に実施する。\n【概要】\n◆教科用図書調査検討委員会および教科書調査研究委員会を開催し、採択に向けた検討を行う。\n◆教科用図書調査検討委員会は、校長、副校長、学識経験者、保護者・地域代表15人で構成する。\n◆教科書調査研究委員会は、校長、副校長、教職員等の10人程度で構成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":638,"name":"品川図
