<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品川区 事務事業優先度評価ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:#f3f4f6;color:#1f2937;min-height:100vh}
#app{max-width:780px;margin:0 auto;padding:12px}

.hd{background:#1e40af;color:#fff;padding:14px 16px;border-radius:8px;margin-bottom:12px}
.hd h1{font-size:1.1rem;font-weight:700}
.hd .sub{font-size:.8rem;opacity:.8;margin-top:3px}

.sbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.sb{padding:4px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.sb-k{background:#dcfce7;color:#16a34a}
.sb-h{background:#fee2e2;color:#dc2626}
.sb-f{background:#fef3c7;color:#d97706}
.sb-u{background:#f3f4f6;color:#6b7280}

.card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}

.frow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.frow select{flex:1;min-width:130px;padding:7px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:.85rem;background:#fff}
.fresult{font-size:.95rem;font-weight:600;color:#1e40af;margin-bottom:10px}

.batch{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:12px;margin-bottom:12px}
.batch h3{font-size:.85rem;color:#1e40af;margin-bottom:8px}
.bbtns{display:flex;gap:8px;flex-wrap:wrap}

.btn{padding:9px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:#1e40af;color:#fff}
.btn-k{background:#22c55e;color:#fff}
.btn-h{background:#ef4444;color:#fff}
.btn-f{background:#f59e0b;color:#fff}
.btn-o{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-sm{padding:6px 12px;font-size:.8rem}

.pbwrap{background:#e5e7eb;border-radius:4px;height:6px;margin-bottom:12px}
.pbfill{background:#1e40af;height:100%;border-radius:4px;transition:width .3s}

.ecard{background:#fff;border-radius:8px;padding:18px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);border-left:4px solid #e5e7eb;transition:border-color .2s}
.ecard.rk{border-left-color:#22c55e}
.ecard.rh{border-left-color:#ef4444}
.ecard.rf{border-left-color:#f59e0b}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.72rem;font-weight:600}
.troot-法定義務あり{background:#dbeafe;color:#1d4ed8}
.troot-裁量{background:#fef3c7;color:#92400e}
.troot-不明{background:#f3f4f6;color:#6b7280}
.tcls{background:#f3e8ff;color:#7c3aed}
.tev{background:#f0fdf4;color:#15803d}
.tpdf{background:#e0f2fe;color:#0369a1}

.emeta{font-size:.8rem;color:#6b7280;margin-bottom:6px}
.ename{font-size:1.15rem;font-weight:700;color:#111827;margin-bottom:6px;line-height:1.3}
.ebudget{font-size:.9rem;margin-bottom:10px}
.ebudget .amt{font-weight:700;font-size:1.05rem;color:#1e40af}
.ebudget .bdg-lbl{font-size:.78rem;color:#6b7280;margin-right:4px}
.edesc h4{font-size:.8rem;color:#6b7280;margin-bottom:4px}
.edesc p{font-size:.88rem;line-height:1.65;color:#374151;margin-bottom:10px}
.edetail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.edi{background:#f9fafb;border:1px solid #e5e7eb;border-radius:4px;padding:3px 8px;font-size:.8rem}
.edi label{color:#9ca3af;margin-right:3px}

.rbtns{display:flex;gap:10px;margin:16px 0}
.rbtn{flex:1;padding:12px 6px;border:2px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:700;background:#f9fafb;color:#374151;text-align:center;transition:all .15s;line-height:1.4}
.rbtn:hover{border-color:#9ca3af}
.rbtn small{display:block;font-size:.7rem;font-weight:400;margin-top:2px;opacity:.8}
.rbtn.ak{background:#22c55e;color:#fff;border-color:#22c55e}
.rbtn.ah{background:#ef4444;color:#fff;border-color:#ef4444}
.rbtn.af{background:#f59e0b;color:#fff;border-color:#f59e0b}

.nav{display:flex;justify-content:space-between;align-items:center}
.cpos{font-size:.85rem;color:#6b7280}

.kgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kbox{background:#fff;border-radius:8px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.kbox .klbl{font-size:.75rem;color:#6b7280;margin-bottom:6px}
.kbox .knum{font-size:1.7rem;font-weight:700}
.kbox .kbdg{font-size:.85rem;font-weight:600;margin-top:3px}
.kh .knum,.kh .kbdg{color:#dc2626}
.kf .knum,.kf .kbdg{color:#d97706}
.kk .knum,.kk .kbdg{color:#059669}
.ku .knum,.ku .kbdg{color:#6b7280}

.ssec{background:#fff;border-radius:8px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.ssec summary{padding:12px 16px;cursor:pointer;font-weight:600;font-size:.9rem;list-style:none;display:flex;justify-content:space-between;user-select:none}
.ssec summary:hover{background:#f9fafb}
.ssec summary::after{content:'▶';font-size:.75rem;color:#9ca3af;transition:transform .2s}
.ssec[open] summary::after{transform:rotate(90deg)}
.stbl{width:100%;border-collapse:collapse;font-size:.82rem}
.stbl th{background:#f3f4f6;padding:7px 10px;text-align:left;font-weight:600;white-space:nowrap}
.stbl td{padding:7px 10px;border-top:1px solid #e5e7eb;vertical-align:middle}
.stbl tr:hover td{background:#fafafa}

.note{font-size:.75rem;color:#9ca3af;margin-top:12px;line-height:1.6}
.nstrip{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.nstrip h2{font-size:1rem;font-weight:700;flex:1;text-align:center}
.done-msg{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:16px;text-align:center;margin-bottom:12px}
.done-msg h3{color:#065f46;font-size:1rem;margin-bottom:8px}
.tag-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.tag-item{display:flex;flex-direction:column;gap:3px}
.tag-lbl{font-size:.68rem;color:#9ca3af;font-weight:500;letter-spacing:.02em}
.field-lbl{font-size:.78rem;color:#9ca3af;margin-right:3px}

@media(max-width:560px){
  .kgrid{grid-template-columns:repeat(2,1fr)}
  .rbtns{flex-direction:column}
  .bbtns{flex-direction:column}
  .frow select{min-width:100%}
}
@media print{
  .no-print{display:none!important}
  .nstrip button{display:none!important}
  body{background:#fff}
  #app{padding:0;max-width:100%}
  .ssec{box-shadow:none;border:1px solid #e5e7eb}
  details>div{display:block!important}
  .kbox{box-shadow:none;border:1px solid #e5e7eb}
}
</style>
</head>

<script>
const LABELS = {"bureau": "担当部署", "dept": "担当課", "cls": "政策の柱", "budget_col": "R6決算(千円)", "next_col": "R7当初予算(千円)", "tool_title": "品川区 事務事業優先度評価ツール", "card_title": "品川区 令和7年度 事務事業評価", "summary_title": "品川区 令和7年度 事務事業優先度評価結果", "output_file": "shinagawa_index.html", "no_col": "ページ番号", "csv_filename": "品川区_令和7年度_事務事業優先度評価結果.csv", "source_url": "https://www.city.shinagawa.tokyo.jp/PC/kuseizyoho/kuseizyoho-siryo/kuseizyoho-siryo-zaisei/kuseizyoho-siryo-zaisei-shinagawa/kuseizyoho-siryo-zaisei-shinagawa-gyouseihyoka/R7gyoseihyoka/20240222105532.html", "pdf_col": "評価文書名", "ev_detail_col": "今後の取組の方向性", "budget_note": "※ 行政費用（人件費除く）"};
const EVENTS = [{"no":1,"name":"全庁共通プロジェクト推進経費","bureau":"企画経営部","dept":"企画課","budget":57181,"next_budget":0,"root":"","cls":"変化に対応して効果的・効率的に施策を展開する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆全庁に関わるプロジェクトの円滑な事業実施を目指す。\n【概要】\n◆活用方針未定の公有地等について、多様な行政ニーズを踏まえた利活用に向け、民間活力の活用等、あらゆる手段を視野に入れた検討を進\nめる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":2,"name":"企画関係事務費","bureau":"企画経営部","dept":"企画課","budget":3415,"next_budget":0,"root":"","cls":"変化に対応して効果的・効率的に施策を展開する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆企画事務の執行に要する経費。\n【概要】\n◆各種事務経費等の支出（事務用品購入費、出張旅費、資料購入費、複合機印刷経費、行財政情報サービス通信料）。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":3,"name":"計画策定経費","bureau":"企画経営部","dept":"企画課","budget":27923,"next_budget":0,"root":"","cls":"変化に対応して効果的・効率的に施策を展開する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区の総合計画等の策定・調整・進行管理等を行う。\n【内容】\n◆品川区総合実施計画・品川区総合戦略を改定する。\n◆区が取り組む事務事業および政策について、不断の検証や見直し・改善を行うことで、より効率的で効果的な行財政運営につなげるため、\n行政評価（事務事業評価・政策評価）を実施する。\n◆区が持続的に発展していくための戦略目標と取組みを示した「品川区総合戦略」の進捗確認を行う総合戦略推進委員会を開催する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":4,"name":"ＳＤＧｓ推進経費","bureau":"企画経営部","dept":"企画課","budget":102301,"next_budget":0,"root":"","cls":"変化に対応して効果的・効率的に施策を展開する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆ＳＤＧｓ未来都市として、ＳＤＧｓの達成に向けた取組みを加速させ、地域の課題解決および持続可能な発展を目指す。\n【概要】\n◆しながわＳＤＧｓ共創推進プラットフォームでの多様なステークホルダー間の相互交流や情報共有を通じ自律的取組みを促進する。\n◆しながわシティラボを通じ、企業・団体・大学等からの提案による社会課題の解決（課題解決型）、また、企業・団体・大学等へ新サービ\nスの実証実験の場を提供すること（実証実験提案型）による新たなソリューションの創出といった双方向の連携を推進する。\n◆ウェルビーイング・ＳＤＧｓ推進事業実行委員会を主体とした「ウェルビーイング・ＳＤＧｓ推進ファンド」を創設し、地域課題・行政課\n題の解決を図る民間企業や地域団体、大学、研究機関等が行う新たな技術やサービスを用いた事業に対して助成を行う。\n◆職員向けの実践的なワークショップ等を通じて、ＳＤＧｓを推進し、企業・団体・大学等との連携強化に向けた機運醸成を図る。\n◆ＳＤＧｓ宣言制度を通じ、ＳＤＧｓ達成に資する事業者・団体等の取組みを募集・周知し、ＳＤＧｓの取組みを一層促進していく。\n◆「国連を支える世界こども未来会議 in SHINAGAWA」を通じ、子どものアイデアや意見を施策に反映していく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":5,"name":"指定管理者制度経費","bureau":"企画経営部","dept":"企画課","budget":9752,"next_budget":0,"root":"","cls":"中長期的な視点で施設マネジメントを推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】  \n◆指定管理者制度導入施設の継続的な業務改善を通じて、質の高い公共サービスを効率的に提供するとともに公の施設の安全かつ適正な管理\nを確保することを目的とする。 \n【概要】 \n◆民間事業者のノウハウを活用した利用者アンケート等による「利用者満足度調査」の実施。 \n◆社会保険労務士等による労働条件に係る「労働環境チェック」の実施。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":6,"name":"基金積立金","bureau":"企画経営部","dept":"財政課","budget":4162214,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"◆財政調整基金：年度間における税源の不均衡調整のため、基金を積み立てる。\n◆減債基金：公債費に充当するために積み立てる。\n◆公共施設整備基金：公共施設の整備資金に充当するために積み立てる。\n◆文化スポーツ振興基金：文化芸術、スポーツ活動等の振興および環境整備に充当するために積み立てる。\n◆災害復旧基金：災害時における救助、災害の復旧および災害からの復興の財源に充当するために積み立てる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":7,"name":"予算関係管理費","bureau":"企画経営部","dept":"財政課","budget":3080,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n予算の編成や配当および執行の調整等を円滑に行う。\n\n【概要】\n予算編成に関する基本方針に基づき、年間予算として編成する。また、年度途中に緊急で予算措置を必要とする経費については、補正予算と\nして編成する。\n◆予算書や同説明書、主要施策の成果報告書等を印刷し、議会に提出する。\n◆事務の参考に資するため、図書等の購入、会計法規の追録を行う。\n◆財政担当者会議等への出席のため、出張旅費を確保する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":8,"name":"起債償還元金","bureau":"企画経営部","dept":"財政課","budget":1023486,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆学校施設建設や道路整備などのために、政府や銀行などの長期（25年以内）貸付資金により起債したことに伴い、その元金を償還する。\n\n効率性\n\n【概要】\n◆既起債に伴う償還元金","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":9,"name":"起債利子","bureau":"企画経営部","dept":"財政課","budget":153119,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆起債に伴う利子を償還する。 \n\n【概要】\n◆既起債に対する償還利子","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":10,"name":"営繕事務費","bureau":"企画経営部","dept":"施設整備課","budget":129748,"next_budget":0,"root":"","cls":"中長期的な視点で施設マネジメントを推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区有施設の改修工事に係る設計・工事監理業務等を年間を通じて包括的に委託し、営繕業務の統一的な管理による効率化・安定化を図る。\n◆所管部署による新改築や大規模改修工事の計画立案などについて、技術的に支援する。\n\n【概要】\n◆区有施設の改修工事に係る設計・監理等業務について、年間を通じて委託する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":11,"name":"区施設創エネ設備整備推進費","bureau":"企画経営部","dept":"施設整備課","budget":60926,"next_budget":0,"root":"","cls":"地球環境にやさしいまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n　ＳＤＧｓのゴール達成やゼロカーボンシティしながわの実現に向け、地球環境にやさしい区有施設の整備を推進する。\n\n【概要】\n　既存区有建築物への太陽光発電設備の設置を計画的に実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":12,"name":"ＩＣＴ推進管理費","bureau":"企画経営部","dept":"デジタル推進課","budget":1604259,"next_budget":0,"root":"","cls":"ＩＣＴなどの情報通信技術を活用して利便性向上を推進する","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆デジタル社会の実現に向け、先端技術やデータの利活用により業務プロセスのデジタル化を行い、区民の利便性向上、業務効率化による生\n産性向上を図る。\n◆デジタル・トランスフォーメーションを推進し、区民一人ひとりのニーズにあったサービスを提供するとともに、生産性向上で得られる時\n間をさらなる区民サービスにつなげる。\n【概要】\n◆全行政手続きを対象にオンライン化が可能な業務について順次進めていく。\n◆公文書の電子決裁やペーパーレス会議によるペーパーレス化を進めることで、紙資源の削減に努めるとともに業務の効率化を図る。\n◆区民向けＡＩチャットボットの運用により、各種問合せの自動対応、回答精度の向上を図る。\n◆データアナリストの任用による高度分析の実施、ＢＩ（ビジネスインテリジェンス）ツールの導入、職員のデータリテラシー向上のための\n研修の実施等により、ＥＢＰＭ（根拠に基づく政策立案）を推進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":13,"name":"ネットワーク・セキュリティ経費","bureau":"企画経営部","dept":"デジタル推進課","budget":630419,"next_budget":0,"root":"","cls":"ＩＣＴなどの情報通信技術を活用して利便性向上を推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆各業務システムの基盤となるネットワーク等の構築・運用を実施するとともに、最新技術の導入により新たな脅威や社会情勢への対応を図\nる。\n◆情報セキュリティを確保するため、物理的対策、技術的対策、人的対策等さまざまな対策を実施し、区の情報管理安全対策を強化を図る。\n【概要】\n◆新たなシステムの導入を見据え、ネットワークモデルの検討を進めるとともに、セキュリティの強化を図る。\n◆システム共通基盤の構築・運用により、耐障害性の向上を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":14,"name":"住民情報システム運営費","bureau":"企画経営部","dept":"デジタル推進課","budget":1667832,"next_budget":0,"root":"","cls":"ＩＣＴなどの情報通信技術を活用して利便性向上を推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆住民情報システム（住基、税、国保）の運用・管理を適正に行うことで、区民サービスの向上と事務処理の効率化を図る。\n【概要】\n◆住民情報システムの運用（住民基本台帳・印鑑登録・区民税・軽自動車税ほか）\n◆住民情報システム改修（税法改正対応、住民記録システム改修）ほか）\n◆番号制度対応（他自治体との情報連携、証明書のコンビニ交付維持管理ほか）\n◆システム標準化対応（現行システムと標準仕様書との差異分析ほか）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":15,"name":"庁舎管理費","bureau":"企画経営部","dept":"経理課","budget":787171,"next_budget":0,"root":"","cls":"中長期的な視点で施設マネジメントを推進する","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆本庁舎・第二庁舎・防災センター・第三庁舎等の維持管理、庁有自動車の管理\n【概要】\n◆電気・ガス・水道等の光熱水費や電話料金の支払い\n◆警備・清掃・設備管理等の業務委託\n◆庁舎の維持管理に要する物品等の購入\n◆庁舎の維持管理に要する工事・修繕\n◆庁有自動車のガソリン・車検・その他の修繕・消耗品の購入、自動車賠償責任保険料・自動車重量税・ＥＴＣ利用料等の支払い","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":16,"name":"契約関係事務費","bureau":"企画経営部","dept":"経理課","budget":2508,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆効率的で公正な契約の締結と履行を通じて、公共の利益を守り、地域社会の発展と福祉の向上を促進する。\n◆公正かつ透明な契約手続きに基づき、契約の締結と履行を適切に管理することにより、区の効率的な業務執行と公共の利益の確保を目指\nす。\n\n【概要】\n◆入札手続および契約締結ならびに契約履行管理に関すること（区が締結する売買、貸借、請負その他の契約に関する入札および契約事務）\n◆競争入札参加者の資格審査および登録に関すること","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":17,"name":"公有財産管理費","bureau":"企画経営部","dept":"経理課","budget":104504,"next_budget":0,"root":"","cls":"中長期的な視点で施設マネジメントを推進する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆公有財産の管理に関する事務について適正な執行を図る。\n【概要】\n◆公有財産の現況を的確に把握するため公有財産台帳を整備する。\n◆普通財産の貸付に関し、貸付契約の締結（更新）および地所賃貸料（貸付料）の収入に係る事務を行う。\n◆公有財産の処分および財産の取得に関し、適正な価格を評定するため財産価格審議会を開催する。\n◆公拡法の規定に基づく土地の先買い制度に係る届出および申出に関する事務を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":18,"name":"賦課事務費","bureau":"企画経営部","dept":"税務課","budget":463143,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n　　特別区民税・都民税・森林環境税、軽自動車税種別割、特別区たばこ税の課税客体を捕捉し、\n　　賦課・更正事務を通じて区政の根幹である自主財源を確保する。\n【概要】\n　　①特別区民税・都民税・森林環境税の賦課\n　　　　当該年の1月1日現在の居住地にて税賦課を行い、税額決定通知を発付する。\n　　　　また、課税資料等調査により、適正な賦課額の決定を行う。\n　　②軽自動車税種別割の賦課\n　　　　当該年の4月1日時点で、軽自動車を所有している者に対し賦課する。\n　　③特別区たばこ税\n　　　　卸売業者等が小売業者に販売したたばこの申告に基づき納付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":19,"name":"徴収事務費","bureau":"企画経営部","dept":"税務課","budget":70431,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区財源の根幹をなす区税収入を高い収納率で確保することを目的とする。\n\n【事業概要】\n◆区財源の根幹をなす区税収入の確保の核心は、滞納しない環境作りにあるため、口座振替勧奨およびクレジット納付などの納付チャンネル\nの拡充を図る。\n◆税の公平性を保つため適正な滞納整理を実施。\n◆日頃から法令上の知識にとどまらず計画的かつ効率的な事務改善、研究等を積み重ねている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":20,"name":"税務関係事務費","bureau":"企画経営部","dept":"税務課","budget":15443,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n基幹財源である特別区民税等の税収確保のため、以下の3点を重点として取り組む。\n◆納税意識の高揚\n◆自主納付や期限内納付の啓発活動の実施\n◆ふるさと納税返礼品の拡充\n\n【概要】\n◆団体・個人に対し納税功労者等表彰を実施する。\n◆口座振替勧奨等自主的納付や期限内納付を推進するため、啓発活動を実施する。\n◆区内企業と連携したふるさと納税返礼品（体験型・商品型）を拡充する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":21,"name":"定額減税補足給付金","bureau":"企画経営部","dept":"税務課","budget":1441439,"next_budget":0,"root":"","cls":"","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"◆事業目的\n　賃金上昇が物価高に追い付いていない区民の負担を緩和するため、令和6年度税制改正大綱に基づき、令和6年6月から所得税・住民税の定\n額減税を実施する（定額減税）。また、定額減税しきれないと見込まれる方に対し不足額について給付金を支給し（調整給付）、減税効果を\n等しく波及させる。\n◆事業内容\n　定額減税可能額　＝　住民税　1万円×（本人＋扶養親族人数）　所得税　3万円×（本人＋扶養親族人数）\n　減税前税額が減税可能額を下回り、減税しきれない場合、その不足額について住民税と所得税とで合算し、\n　1万円単位に切上げ、給付する。\n　　　　※事務処理基準日　令和6年6月3日（令和6年度当初調整給付）\n　不足額給付（令和7年度）\n　　令和6年度中に支給した当初調整給付金の不足額が生じた場合にその不足額を支給する。\n　　　　※事務処理基準日　令和7年6月2日","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":22,"name":"企業・大学等との連携促進","bureau":"区長室","dept":"総務課","budget":1095,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"D 完了・廃止する事業","ev_detail":"事業の廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区と企業の協働により様々な施策を展開するとともに、企業同士の連携を促進し、地域の活性化につなげる。\n◆区と大学等との包括的な連携のもと、区と大学および大学間等での一層の協力関係を構築し、地域課題の解決や大学等の教育・研究機能の\n向上を推進し、もって地域社会の発展に寄与する。\n【概要】\n◆「しながわＣＳＲ推進協議会」の活動を通して、会員同士（区および企業）の連携を深める機会を設定する。会員が連携し、それぞれの特\n性を活かすことで、地域の活性化や地域課題の解決に向けた活動を実施する。\n◆「しながわ大学連携推進協議会」を通じて、区と大学が連携を深め、地域に根差した事業を展開することで、地域活性化につなげる。事業\n実施を促進するため、地域社会貢献活動支援補助金を支給し、大学が事業を実施しやすい環境を整備する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":23,"name":"非核平和都市品川宣言事業","bureau":"区長室","dept":"総務課","budget":13616,"next_budget":0,"root":"","cls":"平和で人権が尊重され多様性を認め合う社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆「非核平和都市品川宣言（昭和60年3月26日）」の趣旨である、核兵器廃絶と恒久平和確立の精神を継続的に広く普及させていくととも\nに、戦争の悲惨さ、平和の大切さを次世代に伝え、区民の平和意識の高揚を図る。\n【概要】\n◆平和への想いを次世代に引き継ぐため、原爆投下の日に合わせ、広島市に区立中学校・義務教育学校8年生を派遣する。また、長崎市に公\n募で選ばれた区内在住・在学・在勤の中学生～29歳を派遣する。\n◆品川図書館内の平和資料コーナーに、宣言の趣旨に沿った図書等を収集する。\n◆平和の願いをこめてつくられた「平和の誓い」像の保守・清掃等、平和関連の普及啓発を行う。\n◆区内3ヵ所および区立中学校・義務教育学校15校に設置している「しながわ平和の花壇」維持・管理を行う。\n◆非核平和都市品川宣言を行ってから40周年をむかえるにあたり、記念事業として動画作成や記念式典を開催する。（令和6年度のみ）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":24,"name":"危機管理経費","bureau":"区長室","dept":"総務課","budget":17159,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の生命、財産等の安全を確保する。\n【概要】\n◆災害、事故、事件等に即して、その予防策を講ずるとともに、不幸にして危機が発生した場合には、区が保有する行政情報、各種団体との\n連携を図りつつ、適切に対応する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":25,"name":"二十歳の集い式典経費","bureau":"区長室","dept":"総務課","budget":8408,"next_budget":0,"root":"","cls":"青少年の成長と自立の支援","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆節目の二十歳になる区民に対し、社会人としての自覚を促し、その輝かしい前途を祝福するため、式典（二十歳の集い）を実施する。\n【概要】\n◆毎年1月の第2月曜日（成人の日）に式典（二十歳の集い）を実施する。\n◆対象者は品川区に住民登録をしている当該年度の4月2日から翌年の4月1日に二十歳になる方とする。\n◆公募による実行委員が企画、司会進行を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":26,"name":"新年賀詞交歓会経費","bureau":"区長室","dept":"総務課","budget":1858,"next_budget":0,"root":"","cls":"協働によるまちづくりを促進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内官公署および関係諸団体との親睦を図り、併せて新年を祝うため実施する。\n【概要】\n◆毎年、仕事始めの翌日を実施日とし、区と関わりの深い団体の構成員等を招待し実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":27,"name":"自治功労者等表彰","bureau":"区長室","dept":"総務課","budget":10670,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区民の生活と文化の向上に特に功労があった方の事績をたたえることにより、区民の福祉増進に資する。\n【概要】\n◆表彰式を開催し、表彰受賞者に表彰状および記念品を贈呈する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":28,"name":"全国自治体との連携事業","bureau":"区長室","dept":"総務課官民共創担当","budget":3418,"next_budget":0,"root":"","cls":"地方分権・全国連携を推進する","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆人口減少により地方の活性化が課題になっている中、全国の自治体との信頼関係を構築し、ともに発展・成長するために、全国自治体との\n連携を推進する。\n【概要】\n◆特別区長会が推進する特別区全国連携プロジェクトを通じて、様々な依頼・呼びかけへ対応していくとともに、連携協定締結都市（高知\n県・福井県坂井市）、災害時相互援助協定締結都市等、全国各自治体との連携を推進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":29,"name":"地域住民と外国人との交流促進","bureau":"区長室","dept":"総務課","budget":52250,"next_budget":0,"root":"","cls":"平和で人権が尊重され多様性を認め合う社会の実現","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆区内では17,000人以上（区総人口の約4.0％）の外国人が生活している。異なる文化・習慣を持つ外国人とのコミュニケーションや多様な\n価値観・考え方への理解を進め、地域に住む日本人と外国人が共生できるよう事業を展開する。\n【概要】\n◆区内大使館等（大使館11か国、総領事館2か国、名誉領事館1か国）を介した文化交流により、異なる国の習慣への理解や、互いの文化を身\n近に感じられる環境を整備する。\n◆多文化共生講座ややさしい日本語講座等を開催することにより、区民や区職員の多文化共生への理解を促進する取組みを推進する。\n◆在住外国人向け情報発信を通して在住外国人の生活支援を推進する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":30,"name":"国際友好都市交流事業","bureau":"区長室","dept":"総務課","budget":147713,"next_budget":0,"root":"","cls":"平和で人権が尊重され多様性を認め合う社会の実現","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆姉妹・友好都市との交流とともに、地域における外国文化との交流を深めるなど多様な国際交流の推進および、外国人に開かれた地域づく\nりを通じて「暮らしが息づく国際都市品川」の実現を図る。なお、品川区国際友好協会が交流事業の実施主体として外国都市交流および地域\nでの国際化を進める。\n【概要】\n◆姉妹・友好都市（ポートランド市、ジュネーヴ市、オークランド市）との交流や多文化共生に関わる事業を品川区国際友好協会と連携して\n実施する。\n①姉妹・友好都市の公式訪問団派遣・受入\n②品川区国際友好協会実施事業\n◆ホッケー交流事業（令和6年度のみ）\n友好都市であるオークランド市とホッケーをとおして更なる交流を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":31,"name":"山北町との交流事業","bureau":"区長室","dept":"総務課官民共創担当","budget":4537,"next_budget":0,"root":"","cls":"地方分権・全国連携を推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆水と緑に象徴される自然環境の豊かな市町村との交流事業を通じて、健全で潤いのある区民生活の実現を図る。\n【概要】\n◆神奈川県山北町と昭和63年4月18日に締結した「水と緑のふれあい交流協定」の趣旨を踏まえて交流事業を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":32,"name":"早川町との交流事業","bureau":"区長室","dept":"総務課官民共創担当","budget":17621,"next_budget":0,"root":"","cls":"地方分権・全国連携を推進する","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆水と緑に象徴される自然環境の豊かな市町村との交流事業を通じて、健全で潤いのある区民生活の実現を図る。\n【概要】\n◆山梨県早川町と平成2年4月19日に締結した「ふるさと交流協定」の趣旨を踏まえて交流事業を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":33,"name":"文書関係事務費","bureau":"区長室","dept":"総務課","budget":22749,"next_budget":0,"root":"","cls":"変化に対応して効果的・効率的に施策を展開する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆文書事務に関する総合調整等を行う。\n【概要】　\n◆品川区例規集の編集、その他例規集の追録、法令関係システムの管理、ファイリングシステムの維持管理、庁内で必要な浄書および印刷物\nを集中管理し、浄書印刷業務の効率化を図る。\n◆庁内で発生する個人情報文書を一括して庁内で細断することにより、個人情報の保護を徹底し、区民の信頼を確保する。\n◆品川区が当事者となる訴訟事件の訟務の委任および法律相談を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":34,"name":"各種団体分担金","bureau":"区長室","dept":"総務課","budget":241042,"next_budget":0,"root":"","cls":"協働によるまちづくりを促進する","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆区政運営に必要な特別区協議会等、区が負担すべき分担金を支払う。また、各種団体分担金および年会費等を負担する。\n【概要】\n◆特別区人事・厚生事務組合、特別区協議会、区長会事務局等へ各種団体分担金を支払う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":35,"name":"私立学校関係費","bureau":"区長室","dept":"総務課","budget":2768,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆特別区における東京都の事務処理の特例に関する条例に基づき、区内私立学校（専修学校9校・各種学校1校）の指導監督等を行う。\n◆各種学校の東京朝鮮学園・東京韓国学園および東京中華学校に通学している児童・生徒の保護者に対し、その授業料の負担を軽減する。\n【概要】\n◆私立専修各種学校指導監督\n　①各種認可、届出事項における指導、監督、受理および各種証明書の発行\n　②各種調査等の依頼集計報告\n◆品川区外国人学校児童・生徒等保護者補助金交付事業　\n当該年度の4月1日以降品川区において住民登録したあるいは登録している者で、各種学校の東京朝鮮学校等外国人学校に授業料を納入した保\n護者に対し、その負担を軽減するため補助金交付要綱により補助金を交付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":36,"name":"総務関係事務費","bureau":"区長室","dept":"総務課","budget":12626,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】　　\n◆区の総合的な管理部門として、内部の調整・管理や外部との折衝等を円滑に行うことを目的とする。\n【概要】\n◆課内共通事務用経費、総合教育会議費、特別職報酬等審議会経費、儀礼弔慰金・交際費、区長交際費等の支払い・運営を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":37,"name":"いじめ防止対策推進事業","bureau":"区長室","dept":"総務課","budget":3654,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆次代を担う子どもたちが、いじめのない安全で楽しい生活が送れるよう、区長部局、教育委員会、関係機関および地域が連携強化を図り、\nオール品川でいじめ問題を根絶していく。\n【概要】\n◆学校・地域・教育委員会・区長部局が相互に連携し、いじめの未然防止・早期発見・早期対応の各段階に応じた各種事業、相談対応等を実\n施する。\n◆区長部局において、いじめ相談対策室を中心とした支援体制の充実を図る。また、教育委員会からいじめ重大事態の調査結果報告を受け、\n重大事態への対処または再発防止のため再調査の必要があると認めるときは、附属機関として品川区いじめ問題調査委員会を設置する。\n◆いじめ被害者等支援補助金を設置し、いじめを起因とした被害児童・生徒の転校等に係る費用を支援する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":38,"name":"広報紙発行経費","bureau":"区長室","dept":"戦略広報課","budget":152024,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区民等に対して、区政情報を分かりやすく提供する。\n【概要】\n◆区民に有益な情報を提供するため、広報紙「広報しながわ」を発行する。\n◆目の不自由な人を対象に「声の広報」を発行し、区政情報を提供する。\n◆新聞未購読者のために広報スタンド（駅等に設置）で、広報紙と外国語広報紙を配布する。\n◆区ホームページ・電子書籍多言語版（カタログポケット）の活用など、区の情報媒体の中心である広報紙の閲覧方法を充実させる。\n◆区の情報を外国人に提供するために、英語版の広報紙を発行する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":39,"name":"区政資料等発行経費","bureau":"区長室","dept":"戦略広報課","budget":22613,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区政情報等をとりまとめ区民等に広く提供する。\n【概要】\n◆統合ポスター・ちらしの発行(区の行事・催し物、講座・講演会の募集案内等を掲載)\n◆しながわガイド・品川区ガイドマップの配布(区民生活に必要な情報を掲載。転入時に1世帯1部配布)\n◆ミニ区勢概要の作成(区勢概要を手のひらサイズで発行)\n◆世論調査(区政の各分野について、区民の意識や意見・要望を調査)\n◆英字版区勢要覧(日本語版の品川区勢要覧を軸に、外国人向けに編集して発行）\n◆航空写真(品川区全景・地区全景等を記録として空撮)","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":40,"name":"広報番組等経費","bureau":"区長室","dept":"戦略広報課","budget":114089,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区政や地域の話題、緊急情報など、区民に有益な事柄を正確に伝える。\n\n【概要】\n◆ケーブルテレビ品川の区民チャンネル(11ｃｈ)に放送枠を確保し、区民向けの番組、緊急情報などを放送する。\n◆区民向けの番組を制作しケーブルテレビで放送するほか、著作権がクリアできた番組は区公式ユーチューブチャンネルでも配信する。\n　また、制作した番組のＤＶＤを区立図書館（品川・荏原）ならびに特別区自治情報・交流センターで貸出を行う。\n◆ＦＭしながわ(88.9ＭＨｚ)に放送枠を確保し、番組制作を委託する。区政情報や地域の話題、緊急情報などを放送する。\n◆災害発生等緊急時にケーブルテレビ品川およびＦＭしながわに割込放送が行えるよう設備を管理する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":41,"name":"ホームページ等経費","bureau":"区長室","dept":"戦略広報課","budget":59755,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民が必要な時に必要な情報を手に入れることができる状態を保つ。\n◆区民への情報発信や品川区の魅力を発信するツールとして、さまざまな媒体を活用する。\n\n【概要】\n◆区ホームページを安全かつ適正に保ち、区政や地域の詳細な情報を、正確・迅速に提供する。\n◆しなメール、ＬＩＮＥ、Ｘ（旧ツイッター）、フェイスブックにより、区の情報を発信する。\n◆デジタルサイネージの管理・運営を行う。\n◆外国語版広報番組（ＦＭ）で情報を多言語で発信する。\n◆ＷＥＢメディア・新聞社などに向けて、時事性・共感性を重視した情報発信・プレスリリースを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":42,"name":"都市ブランディング推進経費","bureau":"区長室","dept":"戦略広報課","budget":33231,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区と関わる人たちの意欲と共感を呼び起こし、未来に向けた活動を活発化させる。\n◆品川区の過去やすでにある資源を大切にしつつ新しいものに挑戦する「新旧の融合」を進めた先にある、品川区だからできる多様性を実現\nする。\n【概要】\n◆区民、その他のステークホルダーと一体となって都市ブランドを高め発信していく。\n◆ブランドデザインが起点となり、未来の品川をつくる区民やステークホルダーのアクションを通じて、人と人をつなげていく。\n◆多様性を認め合い、新たに挑戦することでイノベーションが生まれ、ワクワクできるような品川区を未来に向けてつくっていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":43,"name":"広聴経費","bureau":"区長室","dept":"戦略広報課","budget":3837,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区政への意見・要望等を制度的、継続的に収集し区政運営に役立てる。\n【概要】\n◆タウンミーティング\n　ワークショップ形式で実施し、いただいた意見を今後の区政運営の参考とする。\n◆区民参加型デジタルプラットフォーム(試行実施)\n　デジタルプラットフォームを活用した区民意見募集を試行する。\n◆ＳＮＳ情報収集分析委託\n　品川区が関係するＸ投稿を収集する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":44,"name":"区民相談経費","bureau":"区長室","dept":"戦略広報課","budget":12481,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆区民が日常生活の中で直面する様々な問題を迅速かつ適切に解決できるように助言・相談を行う。\n◆区や国・東京都の刊行物などの区政資料や地域に関する資料を総合的に収集・保管し、区民へ情報提供する。\n【概要】\n◆昭和39年4月に区民相談室を開設以降、社会情勢の変化に対応しながらニーズに応じた相談を実施。\n◆会計年度任用職員等による区民相談、犯罪被害者等相談\n◆地域の専門家による専門相談〔法律、税金、不動産取引、行政書士、司法書士、社労士〕\n◆国の機関から委嘱された委員による相談〔国の行政相談、人権身の上相談〕\n◆外国語（英語・中国語）による生活相談\n◆区政資料を収集・保管し、区民に対し閲覧・貸出、区発行の有償頒布物の販売等のサービスを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":45,"name":"情報公開等経費","bureau":"区長室","dept":"戦略広報課","budget":1255,"next_budget":0,"root":"","cls":"区民参画と情報発信を推進する","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆区の保有する行政情報を、住民の請求に基づき公開するとともに、個人情報の保護を図る。また、個人の権利・利益の擁護、区政\nの透明性の確保、区民と区政との信頼関係の強化に資することを目的とする。\n◆行政不服審査会については、地方公共団体の長の処分等に対する審査請求に対し、その裁決の客観性・公正性を高めるための\n第三者機関として、適正な運営を行うことを目的とする。\n【概要】\n◆情報公開審議会の運営（制度に係る審議・不服申立てに係る審議）\n◆個人情報保護審議会の運営（制度に係る審議・不服申立てに係る審議）\n◆公開等事務（情報公開・個人情報保護についての全庁的な連絡調整、公開・開示請求の案内・相談）\n◆情報公開審議会・個人情報保護審議会の答申資料の購入（他自治体の答申状況を参考とする情報公開等審査会答申事例集の購入）\n◆行政不服審査会の運営（審査請求に係る審議）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":46,"name":"広報広聴関係事務費","bureau":"区長室","dept":"戦略広報課","budget":6748,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆広報広聴事務のうち、他に属さない事務の執行。\n【概要】\n◆報道機関への情報提供等に要する経費　　　　◆職員報ふれあいの発行　　　　　　　\n◆職員(近接地内・地外)旅費　　　　　　　　　◆デザインアドバイス/多言語対応 　\n◆用品等消耗品の購入　　　　　　　　　　　　◆区民憲章・しながわ百景の普及\n◆組織・施設電話一覧の作成　　　　　　　　　◆コールセンター設置等検討　　\n◆日本広報協会会費　　　　　　　　　　　　　◆広報戦略推進事業　\n　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　　ほか","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":47,"name":"人権啓発事業","bureau":"区長室","dept":"人権・ジェンダー平等推進課","budget":21847,"next_budget":0,"root":"","cls":"平和で人権が尊重され多様性を認め合う社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆『人権尊重都市品川宣言』の普及啓発と人権尊重教育の推進を通じて、平和で差別意識や偏見のない地域社会を実現する。\n◆互いに人権を尊重し、多様な生き方に配慮しつつ、性別、国籍などにとらわれることなく、対等な立場で能力と個性を発揮できる社会をめ\nざす。\n\n【概要】\n◆憲法週間事業および人権週間事業を実施する。\n◆研修等を通して、職員の人権感覚・人権意識の向上を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":48,"name":"ジェンダー平等推進事業","bureau":"区長室","dept":"人権・ジェンダー平等推進課","budget":23684,"next_budget":0,"root":"","cls":"平和で人権が尊重され多様性を認め合う社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民一人ひとりが性別や性的指向、ジェンダーアイデンティティにかかわらず、その人らしさを発揮しながら、互いに尊重し合い、誰もが\n自分らしく生きられる社会の実現を目指す。　\n\n【概要】\n◆条例の周知・啓発を行い、ジェンダー平等と性の多様性尊重の視点の浸透に向けて、イベントや各種講座の開催、啓発誌やリーフレット作\n成などにより、理解促進と意識啓発を図る。\n◆あらゆる分野における女性の参画促進を図るための取組みを実施する。\n◆性的マイノリティに関する専門相談事業「にじいろ相談」の実施や交流スペース「みんなのひろば」を開催するほか、東京都パートナー\nシップ宣誓制度の活用による行政サービスの提供の充実を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":49,"name":"職員共済組合業務経理等負担金","bureau":"区長室","dept":"人事課","budget":64385,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆東京都職員共済組合は、地方公務員等共済組合法に基づき地方公務員の病気、負傷、出産、休業、災害、退職、障害若しくは死亡又はその\n被扶養者の病気、負傷、出産、死亡若しくは災害に関して短期給付及び長期給付を行い、併せて福祉事業を実施することによって、地方公務\n員及びその家族の生活の安定と福祉の向上に寄与するとともに、公務の能率的運営に資することを目的として運営されており、地方公共団体\nは、当該組合の事務に要する費用について、政令で定めるところにより算定した額を負担することとされている。\n【概要】\n◆東京都職員共済組合に対し、人件費・業務経理負担金を納入する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":50,"name":"災害対策職員待機寮管理費","bureau":"区長室","dept":"人事課","budget":69267,"next_budget":0,"root":"","cls":"区民を災害から守る対策の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆夜間休日に発生する災害初期体制の人員を確保する。\n【概要】\n◆災害対策職員待機寮（区有）の維持管理および修繕・工事（令和6年度：9寮98戸（内単身44戸、家族54戸））\n◆災害対策職員待機寮（借上）の賃貸借等にかかる事務（令和6年度：36戸）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":51,"name":"被災地支援事業","bureau":"区長室","dept":"人事課","budget":323,"next_budget":0,"root":"","cls":"地方分権・全国連携を推進する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】　\n◆東日本大震災および能登半島地震の被災地の復興を支援することを目的としている。\n【概要】\n◆復興支援にかかる人的措置として、被災市町村からの要請に基づき。長期的かつ継続的な職員派遣を実施している。\n◆派遣者数は、派遣要請等を考慮し、現在の派遣者数を維持する想定である。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":52,"name":"職員研修費","bureau":"区長室","dept":"人事課","budget":22224,"next_budget":0,"root":"","cls":"区民に信頼され実行力のある職員の育成と横断的な組織運営を推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆職員の資質・能力・態度・意欲などの向上を図り、効率的な行政運営および住民福祉の向上に資する。\n◆職員の能力を最大限に引き出すとともに組織全体の活性化を図る。\n【概要】\n◆職員の資質向上を図るため、職員研修を実施する。\n◆職層に応じた能力やスキルを身につける「職層研修」、職員が自主的な選択により実務的かつ専門的な能力向上を図る「選択研修」、各所\n属で実施する研修や自己啓発等、職員の能力開発・向上を支援する「研修支援」を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":53,"name":"代替職員雇用経費","bureau":"区長室","dept":"人事課","budget":29940,"next_budget":0,"root":"","cls":"区民に信頼され実行力のある職員の育成と横断的な組織運営を推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆職員の育児休業、休職等に伴う欠員や突発的な事務の繁忙等に対し、人的措置を行い事務の安定的運用を図る。\n【概要】\n◆職員の欠員および繁忙対応として、人材派遣を活用し代替職員を配置する。\n◆必要に応じ専門職種の人材派遣契約を締結し、柔軟な人的措置を行う。\n◆人材派遣契約の仕様内容等の見直しにより、よりふさわしい派遣人材の配置をできるよう検討する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":54,"name":"職員福利厚生事業","bureau":"区長室","dept":"人事課","budget":51007,"next_budget":0,"root":"","cls":"区民に信頼され実行力のある職員の育成と横断的な組織運営を推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n　①職員に対し職務上必要な被服を貸与する。\n　②区職員の福利厚生の充実および区民サービスの向上を図る。また、食堂従業員・区職員・区民の安全確保を図る。\n【概要】\n　①品川区清掃事務所職員には定期的に貸与を行う。それ以外の所属職員には使用中の被服が破損した時に貸与を行う。\n　　なお、新規採用職員については採用時に貸与を行う。\n　②庁舎食堂の厨房設備の維持補修および工事を行う。\n　③東京都人材支援事業団負担金および職員互助会補助金の支出事務を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":55,"name":"職員健康管理費","bureau":"区長室","dept":"人事課","budget":64946,"next_budget":0,"root":"","cls":"区民に信頼され実行力のある職員の育成と横断的な組織運営を推進","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆職員が健康に働き続けられる環境を整備することを目的とする。\n【概要】\n◆安全衛生体制を整備し、快適な作業環境を作る。全国安全週間等の行事を実施する。\n◆法定健診（定期健康診断他）､法定外健診（がん検診他）各種講習会、各種健康診断、ストレスチェック、健康教育指導会を実施し、職員\nの健康管理を行う。\n◆公務災害発生時の補償給付として、正規職員（再任用職員含む）の休業補償の付加給付を行う。\n◆労災適用職員にかかる労働保険料（労災保険分）および一般拠出金の納付を行う。\n◆労災適用職員の休業補償および休業援護金の支給を行う。\n◆産業医・カウンセラーによる面接等を実施する。\n◆保健室の運営を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":56,"name":"職員顕彰","bureau":"区長室","dept":"人事課","budget":4354,"next_budget":0,"root":"","cls":"区民に信頼され実行力のある職員の育成と横断的な組織運営を推進","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n退職した永年勤続の職員および教職員の苦労に報いること並びに組織として他の模範となるような場合に顕彰を行い、\n感謝の意を表するとともに職員の意識の高揚に資することを目的とする。\n【概要】\n◆年度末および年度途中に退職した職員に対し、長年の功績をたたえ顕彰を実施する。（退職者表彰）\n◆在職者のうち勤続25年以上の者に対し、長年の功績をたたえ顕彰を実施する。（在職者表彰）\n◆業務等において優秀な成績をおさめた所属に対し、顕彰を実施する。（随時表彰）\n◆業務等において優秀な成績をおさめた職員に対し、所属部長からの顕彰を実施する。（品川区部長賞）\n◆業務等の達成に必要となる資格を取得した職員に対し、その功績をたたえ顕彰を実施する。（キャリアデザイン顕彰）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":57,"name":"働き方改革推進事業","bureau":"区長室","dept":"人事課","budget":12363,"next_budget":0,"root":"","cls":"変化に対応して効果的・効率的に施策を展開する","ev":"D 完了・廃止する事業","ev_detail":"事業移管・統合","gai":"","legal":"","law":"","desc":"【目的】\n◆職員の健康確保、長時間労働の解消、超過勤務の縮減を図ることを目的に、『「しながわ～く」区職員に係る基本方針』を作成し、各種取\n組みを実施する。\n【概要】\n◆年度途中での新規事業の実施や既存事業へ付加価値を図るなど、新たな挑戦を図る職場を応援するために、人材派遣を活用し、ワークライ\nフバランスの実現を推進していく。\n◆業務改善推進研修を実施し、若手職員への業務改善の意識付けや、管理職職員への事業見直し・業務効率化の実現を図る。\n◆男性職員の育児休業取得促進を図るため、人材派遣を活用する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":58,"name":"人事給与関係事務費","bureau":"区長室","dept":"人事課","budget":109786,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆課内の円滑かつ安定的な業務運営を図ることを目的とする。\n◆最適な人事管理、効果的な人材育成を実現することで、職員の能力を最大化し、組織全体の生産性を向上させ、区民サービスの向上に寄与\nする。\n【概要】\n◆人事給与システムをリースし、職員の勤怠、給与計算等をシステム管理することにより効率的、効果的な事務執行を行う。\n◆人材マネジメントシステムにより、職員情報をデータベース化、一元管理し、それらの情報を活用して人事管理および人材育成を進める。\n◆育児休業取得者職場復帰支援プログラム（ｗｉｗｉｗ）を活用し、育児休業者が職場に復帰しやすいよう、品川区のニュースの送付、スキ\nルアッププログラム等を提供している。\n◆その他、課内の庶務的事務、人事給与システム改修、採用管理システム管理、業務支援室サポート等にかかる諸経費の負担。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":59,"name":"公立学校共済組合業務経理等負担金","bureau":"区長室","dept":"人事課","budget":241,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆公立学校共済組合は、地方公務員等共済組合法に基づき全国の公立学校教職員の病気、負傷、出産、休業、災害、退職、障害若しくは死亡\n又はその被扶養者の病気、負傷、出産、死亡若しくは災害に関して短期給付及び長期給付を行い、併せて福祉事業を実施することによって、\n教職員及びその家族の生活の安定と福祉の向上に寄与するとともに、公務の能率的運営に資することを目的として運営されている。地方公共\n団体は、組合の事務に要する費用を、政令で定めるところにより算定した額を負担することとなっている。\n【概要】\n◆政令に基づき、公立学校共済組合における事務に要する費用を負担する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":60,"name":"庁舎計画費","bureau":"区長室","dept":"新庁舎整備課","budget":586177,"next_budget":0,"root":"","cls":"中長期的な視点で施設マネジメントを推進する","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆昭和43年に建築された本庁舎・議会棟・第三庁舎は、建物本体や設備の老朽化が進んでいる。区を取り巻く環境の変化や多様化する行政へ\nの要望に適切に対応するため、庁舎移転に必要な計画の策定および建設工事を実施する。\n◆機能的・効率的で柔軟性のある窓口・オフィス環境を整備し、区民サービスと事務効率の向上につなげる。\n\n【概要】\n◆品川区新庁舎のコンセプトである「Well-being＆Inclusion Shinagawa=WISH」の実現に向け、ハード・ソフトの両面から未来に希望の持て\nる新庁舎を整備する。\n◆令和5年度に着手した基本設計の成果を踏まえ、設計図書を作成するための実施設計を進めていく。また、事業スケジュールやコスト管理\n等の体制を強化するため、CM方式（コンストラクション・マネジメント方式）を引き続き導入し、民間事業者の技術力も活用して、庁舎建設\nを進める。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":61,"name":"庁舎整備基金積立金","bureau":"区長室","dept":"新庁舎整備課","budget":5015419,"next_budget":0,"root":"","cls":"中長期的な視点で施設マネジメントを推進する","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n新庁舎の建設費、第二庁舎の改修費および初度調弁等のため、必要時に活用することを目的としている。\n\n【概要】\n◆基本構想策定時の建設工事費を400億円（区負担分：322億円）とし、起債は一般事業債で借り入れることを想定し、上限75％を基準として\n金額割合を検討した。残り25％は基金で賄うものとして考え、これを担保するため、令3年度から6年度まで毎年度30億円を積み立て、目標積\n立額を120億円とした。その結果、起債額は202億円となり、起債の充当率は62.7％の想定であった。\n◆基本設計中間段階の建設工事費は560億円（区負担分：450億円）と想定。その後、令和6年度の実施設計の結果、建設工事費は674億円（区\n負担分：553億円）に増額することが見込まれたため、20億円の積立金を最終補正予算に計上し、積立目標額を140億円とした。その結果､起\n債額は413億円となり､起債の充当率は74.7％の想定である。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":62,"name":"広町事業検討費","bureau":"区長室","dept":"新庁舎整備課","budget":50326,"next_budget":0,"root":"","cls":"地域特性を活かした計画的なまちづくり","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆「大井町駅周辺地域まちづくり方針」に即したまちづくりを推進するため、関係権利者や周辺地域と連携し、合理的な市街地環境の形成お\nよび駅とまちが一体となるまちづくりを進める。\n◆庁舎跡地等活用検討委員会の検討報告書を踏まえ、区民ニーズの叶うまちづくりと区民負担の軽減の両立が実現できる現庁舎跡地活用を行\nう。\n【概要】\n◆土地区画整理事業により公共施設の整備および敷地の整序を行い、区庁舎再編と連携して行政機能やにぎわい機能、災害対策拠点機能等を\n有する区の中心核としてふさわしい複合拠点の形成を図る。また、周辺市街地との回遊性の向上やにぎわいの創出等を図る。\n◆区民ニーズの叶うまちづくりと区民負担軽減を実現するため、最適な官民連携手法を選定するとともに、まちづくりのコンセプトや導入機\n能等を示す活用プランを策定する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":63,"name":"地域振興事業","bureau":"地域振興部","dept":"地域活動課","budget":73335,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆「品川区町会および自治会の活動活性化の推進に関する条例」（平成28年4月制定）に基づき、地域社会の福祉と住民生活の向上発展のた\nめ、地域に関心を持った区民がともに地域の問題を考え、解決し、互いに助け合う連帯感に支えられた地域社会が形成されるよう、コミュニ\nティ活動の担い手である町会・自治会および品川区町会自治会連合会や各地区の町会・自治会連合会に対して、活動助成を行う。\n\n【概要】\n◆町会自治会連合会助成　◆町会・自治会児童参加地域事業補助　◆町会・自治会新規事業定着化補助\n◆町会・自治会運営事務サポート　◆町会・自治会加入促進　◆町会・自治会法人化事業　◆地域情報発信事業\n◆地域課題の自主的解決支援　◆町会・自治会活動活性化支援　◆町会・自治会地域力連携促進補助","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":64,"name":"地域環境整備等助成金","bureau":"地域振興部","dept":"地域活動課","budget":101203,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆町会・自治会が町会内の環境整備等のために実施する交通安全や町内美化等の各種事業の拡充強化を図り、当該事業の運営に寄与する。\n◆区民の良好な生活環境を保全し、快適で住みよい地域社会の形成に寄与するため、13地区連合町会が実施する美化推進事業に補助金を交付\nし、環境美化の推進を図る。\n【概要】\n◆環境整備助成\n◆競馬場周辺地区環境整備特別助成　\n◆地域コミュニティ活性化助成\n◆美化推進事業補助","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":65,"name":"地域活動基盤整備補助","bureau":"地域振興部","dept":"地域活動課","budget":34052,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の町会・自治会が、会館や掲示板等の整備を行う場合、その費用の一部を助成することによって、地域住民の自治意識を高め、区政へ\nの参加を促進する。\n\n【概要】\n◆町会・自治会会館建設等補助　◆耐震診断・耐震補強設計補助　◆耐震改修補助\n◆町会専用掲示板設置補助　◆町会・自治会施設賃借料補助　◆町会・自治会会議室等使用料補助","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":66,"name":"ふれあい掲示板管理費","bureau":"地域振興部","dept":"地域活動課","budget":6012,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆地域におけるコミュニティ活動の促進を図ることを目的としており、平成4年から区掲示板の位置づけを「行政情報の周知板」から「地域\nの情報伝言板」へと見直し、町会・自治会に開放している。平成6年に名称を「ふれあい掲示板」と改称し、区内に約480基ある掲示板の建替\nえ、移設、修繕等は区が行い、ポスター掲出、掲出物の整理・整頓等は町会・自治会に依頼している。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":67,"name":"区民まつり経費","bureau":"地域振興部","dept":"地域活動課","budget":19265,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内在住、在勤者等を含め、区民のだれもが気軽に参加し、楽しめるまつりを幅広く行う。また、このまつりを通じて、人と人とのふれあ\nいや連帯意識を深めることにより、明るく豊かなまちづくりを進めていく。\n【概要】\n◆町会・自治会、青少年対策地区委員会等が組織する実行委員会が実施する区民まつりの経費の一部を補助することで、運営する地域の方々\nをはじめ、まつり参加者間の地域のふれあいおよび連帯意識の向上を図っている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":68,"name":"地域振興関係事務費","bureau":"地域振興部","dept":"地域活動課","budget":3063,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"◆地域活動課における各種事務事業の執行上必要な事務用品等の整備を行い、各係の事務事業の円滑な執行を確保する。\n\n４　予算・決算（概要）\n予算科目（節）名\n\n需用費\n役務費\n委託料\n使用料及び賃借料\n工事請負費\n備品購入費\n負担金補助及び交付金\nその他\n\n計\n\n予算現額\n\n決算額\n\n翌年度繰越額\n\n不用額\n\n執行率\n\n（千円）\n\n2,682\n61\n0\n150\n0\n0\n0\n1,901\n4,794\n\n2,079\n33\n0\n20\n0\n0\n0\n931\n3,063\n\n0\n0\n0\n0\n0\n0\n0\n0\n0\n\n603\n28\n0\n130\n0\n0\n0\n970\n1,731\n\n77.5% \n54.1% \n0.0% \n13.3% \n0.0% \n0.0% \n0.0% \n49.0% \n63.9% \n\n決算額の主な内訳\n◆需用費　2,079千円（複合機印刷料、課内事務用品・書籍購入、新聞購読他）\n◆役務費　33千円（後納郵便）\n◆使用料及び賃借料　20千円（民間駐車場使用料）\n◆その他　931千円（職員の研修および移動に関する経費他）\n効率性\n◆需用費について、電子決裁・資料のペーパーレス化を推進し、複合機印刷料の削減を行った。（前年度比9.0％減）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":69,"name":"八潮地区まちづくり事業","bureau":"地域振興部","dept":"地域活動課","budget":5598,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆八潮地区は昭和58年に入居を開始し、その当時に建設された公共施設の改築等の時期が重なることから、建替えや改修について計画的に進\nめていく必要がある。また、八潮地区の人口に占める高齢者の割合が他地区に比して高い水準となっている。これらの現状を踏まえ、持続可\n能な八潮のまちづくりを検討するための機運を醸成する必要がある。\n【概要】\n①「八潮みらい懇談会」の定期開催（年4回）…地域住民や施設関係者が主体的にまちの課題を抽出し、議論を重ねることで自ら解決の方向\n性について検討する場を提供する。\n②八潮地区まちづくりコンセプト検討…八潮地区全体に係るまちづくりのコンセプトを、地域ニーズ等を踏まえ、将来的なまちづくりや施設\nの整備について検討する。\n③現地見学会や地域活性化に資するセミナーの実施…地域活性化や団地再生の先進事例地区への見学・交流やセミナーを実施することで、ま\nちづくりコンセプトへの反映や地域への課題の共有化を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":70,"name":"区政協力委員会経費","bureau":"地域振興部","dept":"地域活動課","budget":9901,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民意識、区民の要望等を正確に把握して区政に反映させるとともに、区政の現況についての情報提供を適宜的確に行い、区政を効率的に\n推進するため区政協力委員を置く。\n【概要】\n◆町会長および自治会長を委員として委嘱する。（委員数201人）\n◆ブロック別区政協力委員会を実施する。（4ブロック別／春開催）\n　※令和7年度はブロック別での開催ではなく全体会議を開催する。\n◆地区別区政協力委員会を実施する。（地域センター管内別／秋～冬開催）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":71,"name":"協働推進事業","bureau":"地域振興部","dept":"地域活動課","budget":17520,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"◆区民活動助成制度\n　助成金の交付により区民活動団体の育成を図るとともに、地域課題を解決することで、区民のウェルビーイングの向上をめざす。\n◆相談・研修会等\n　ＮＰＯサポートセンターと連携し、地域貢献団体への伴走的な相談機能を充実、補完的に研修を行い活動の充実を図る。\n◆しながわ地域貢献活動展\n　ＮＰＯ、ボランティア団体、社会貢献活動をしている企業等を対象に実施。団体相互の協働促進と区民向けの協働啓発を図る。\n◆区民活動情報サイト（しながわすまいるネット）\n　様々な分野の団体・サークル等の情報を集め、活動の紹介、メンバーの募集やイベント案内などを、自ら発信・検索を行う場を\n提供することで、活動の活性化を図る。\n◆協働推進室運営経費等\n　協働推進室を運営し、地域貢献団体へ活動の場を提供する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":72,"name":"地域振興基金積立金","bureau":"地域振興部","dept":"地域活動課","budget":2267,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"◆社会貢献活動その他公益の増進に寄与する活動を行う団体を支援することにより、地域社会の振興を図るため、品川区地域振興基金を設置\nしている。\n\n効率性\n◆基金総額が634,729,297円あり、寄付額は確実に見込まれるものではないが、より多くの寄付金により基金を維持するため、継続した事業\n周知を行う。\n\n（千円） ②貸借対照表\n\n（千円）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":73,"name":"地域センター等管理運営費","bureau":"地域振興部","dept":"地域活動課","budget":421215,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆地域センター・区民集会所の効率的な運営を図り、区民サービスを増進する。\n　①地域センター　13カ所　②区民集会所　13カ所　③区民センター　1カ所\n【概要】\n◆地域の核として各種地域サービスにあたるとともに、住民基本台帳法に基づく住基事務等の行政手続などにあたる13カ所の地域センター・\n区民集会所の施設設備の維持管理や改善を行い、環境の整備を図り、区民サービスの充実を進める。\n◆区民センターは、地域住民で構成された「運営委員会」が施設の管理・運営を自主的に行えるよう、区は必要な経費を負担し、相互に委託\n契約を結ぶ。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":74,"name":"ウェルカムセンター原・交流施設経費","bureau":"地域振興部","dept":"地域活動課","budget":26929,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆原小学校跡に、平成20年9月28日に開設したウェルカムセンター原・交流施設において、地域住民で組織する運営協議会に運営経費を助成\nし、地域による施設の管理運営など自主的な活動を支援する。\n【概要】\n◆施設維持における各種点検費用および運営助成金の交付を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":75,"name":"区民保養所経費","bureau":"地域振興部","dept":"地域活動課","budget":145257,"next_budget":0,"root":"","cls":"生涯を通じた健康づくりの推進","ev":"D 完了・廃止する事業","ev_detail":"事業の廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者の生きがいづくり、夫婦・親子の絆を深めるための場、また、小中学生の校外学習の場を提供し、区民の保養・健康増進・学習の機\n会の増進を図る。\n\n【概要】\n◆品川荘（伊東市）および光林荘（日光市）は、民間貸し付けにより運営する。（貸付期間：令和5年4月1日～令和10年3月31日）\n◆施設維持の基礎的な費用は区が負担するが、事業実施に伴う経費は貸付先が負担する。\n◆光林荘は、4月～10月は移動教室、7月～8月は夏季林間学校施設として、小学校・義務教育学校の校外学習施設として受け入れる。\n◆区民利用を促進するため、区民、在勤および在学者に対して宿泊費助成を実施するとともに、70歳以上の高齢者や要介護者の家族介護者、\nおよび乳幼児同伴利用の父母の場合は、助成額を1,000円増額する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":76,"name":"青少年健全育成事業","bureau":"地域振興部","dept":"地域活動課","budget":25227,"next_budget":0,"root":"","cls":"子どもの笑顔があふれるまちの実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆行政と地域が一体となり、地域に根ざした自主的な青少年健全育成事業の実施を図る。\n【概要】\n◆青少年対策地区委員会連合会事業委託\n　青少年健全育成事業の一層の充実と地区委員相互の交流を図る。　\n◆青少年対策地区委員会事業委託（13地区）\n　各地区での青少年健全育成活動を推進する。\n◆地区委員委嘱経費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":77,"name":"地域支え愛活動経費","bureau":"地域振興部","dept":"地域活動課","budget":2935,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"◆住み慣れた地域で、安心した生活が送れるよう、地域で何らかの手助けを必要としている区民の日常生活を支援・援助する住民相互の支援\n活動を積極的に推進する。\n◆地域センターは地域の核として、町会・自治会等の地域団体が構成する「支え愛活動会議」を通じ、地域での相互支援活動の拡充を図り、\n豊かな地域社会の実現を目指す。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":78,"name":"歩行喫煙防止推進経費","bureau":"地域振興部","dept":"地域活動課","budget":79322,"next_budget":0,"root":"","cls":"生涯を通じた健康づくりの推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆歩行中の喫煙防止および吸い殻・空き缶等の投げ捨てを禁止し、区民の良好な生活環境を保全する。特に通勤通学など人の往来が多く歩行\n喫煙による危険や迷惑が生じるおそれがある地区を路上喫煙禁止地区に指定し、巡回指導することにより快適で住みよい地域社会の形成に寄\n与する。\n\n【内容】\n◆区内全域の歩行喫煙吸い殻・空き缶等の投げ捨ての抑止　\n◆路上喫煙禁止・地域美化推進地区(以下「指定地区」)における違反者からの過料徴収\n◆公衆喫煙所の管理","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":79,"name":"生活安全協議会経費","bureau":"地域振興部","dept":"地域活動課","budget":2334,"next_budget":0,"root":"","cls":"安全と安心を体感できる地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆すべての区民が安心して生活を送ることができる地域社会の形成を目指し、警察署および防犯協会と連携して区民の生活の安全に関する意\n識の高揚を図る。また、生活安全に関する事項について協議する品川区生活安全協議会を運営する。\n【概要】\n◆品川区地域安全のつどい\n◆こども110ばんの家事業支援\n◆品川区生活安全協議会","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":80,"name":"生活安全活動費","bureau":"地域振興部","dept":"地域活動課","budget":7157,"next_budget":0,"root":"","cls":"安全と安心を体感できる地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区が区民と連携して地域の防犯活動を実施することで、地域全体の防犯意識を向上させ、防犯啓発活動の充実を図り、「品川区に住んでよ\nかった」と思える、安全で安心して暮らせるまちづくりを進めていく。\n◆高齢者等の特殊詐欺被害を未然に防止するための対策として、自動通話録音機を無償貸与し、誰もが安全で安心な日常生活を実感できる社\n会の実現に寄与する。\n【概要】\n◆しながわキッズパトロール\n◆特殊詐欺重点対策プロジェクト\n◆自動通話録音機の無償貸与","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":81,"name":"生活安全サポート隊活動費","bureau":"地域振興部","dept":"地域活動課","budget":5631,"next_budget":0,"root":"","cls":"安全と安心を体感できる地域社会の実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆防犯知識の豊富な非常勤職員を専従配置し、警察署と連携した防犯パトロールを実施するほか、住民の生活安全に関する啓発を行う。\n◆児童見守りシステム（まもるっち）の発報事案や不審者事案など緊急時の対応にも機動力を発揮することにより、住民の体感治安の向上を\n目指すほか、小学校を巡回して不審者侵入防止機能をチェックするなどし、教員、学校職員に対し防犯指導する。\n【概要】\n◆青色防犯パトロール車によるパトロール等\n◆セーフティ教室への参加","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":82,"name":"児童見守りシステム運営費","bureau":"地域振興部","dept":"地域活動課","budget":140371,"next_budget":0,"root":"","cls":"安全と安心を体感できる地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【背景】\n◆平成17年度、登下校時を中心に区内児童の安全を高める仕組みとして、ＰＨＳ電波を利用した近隣セキュリティシステムを構築、その後、\nシステムの精度を高めるため、既存の携帯キャリアの通信網および市販品を利用した仕組みへと移行した。システム本体は、5年ごとに改修\nを行っており、令和5年度に改修、令和6年度に新システムの運用を開始した。\n【目的】\n◆品川区が独自開発した「児童見守りシステム(まもるっち)」を活用し、子どもたちの安全の確保を図るとともに、地域の防犯ネットワーク\nづくりを推進する。\n【概要】\n◆システムの安定的な運用\n◆協力者ネットワークの維持","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":83,"name":"防犯活動団体支援","bureau":"地域振興部","dept":"地域活動課","budget":39318,"next_budget":0,"root":"","cls":"安全と安心を体感できる地域社会の実現","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆町会・自治会、商店街などの地域団体が、連携して防犯設備の整備や地域の見守り活動を実施するにあたって、防犯対策の効果の向上を図\nることを支援し、安心して暮らすことができるまちづくりを目指す。また、空き巣等の犯罪の被害を未然に防止するため、個人宅の防犯機器\nの設置について支援し、防犯意識の高揚と安全な生活の確保に寄与する。\n【概要】\n◆自主的防犯活動団体支援\n◆防犯協会および母の会の事業経費助成\n◆防犯カメラ設置等の助成（町会・自治会、商店街）\n◆住まいの防犯対策助成","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":84,"name":"社会を明るくする運動経費","bureau":"地域振興部","dept":"地域活動課","budget":3479,"next_budget":0,"root":"","cls":"地域における共生社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆社会を明るくする運動：法務省主唱の「社会を明るくする運動」を区内関係団体とともに推進するため、団体の実施事業に対し助成金を交\n付し、健全な運営を支援する。\n◆再犯防止推進：平成28年12月に公布・施行された「再犯の防止等の推進に関する法律（平成28年法律第104号）」（再犯防止推進法）を踏\nまえ、区の関係所管、保護司等と連携し再犯防止に取り組むための基本計画として「品川区再犯防止推進計画」を策定し、推進する。\n【概要】\n◆社会を明るくする運動：犯罪や非行をした人たちの立ち直りを支え、更生について理解を深め、明るい社会を築くため、推進委員会を設置\nし、関係団体とともに「社会を明るくする運動」を実施する。社会福祉協議会を通じ、品川区保護司会に対し助成金を交付する。\n◆再犯防止推進：品川区再犯防止推進計画の推進、見直しを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":85,"name":"統計調査事務費","bureau":"地域振興部","dept":"地域活動課","budget":1806,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆統計事務全般を円滑に行う為の事務費、研究費、維持費\n【概要】\n◆近接地内旅費、事務用消耗品費\n◆統計調査支援システム運用に係る経費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":86,"name":"区統計資料作成費","bureau":"地域振興部","dept":"地域活動課","budget":405,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆統計資料を体系的に収録、整理、保管し、利用者への適時適切な資料の提供を行う。 \n【概要】\n◆人口・経済・社会・文化等、各分野にわたる基本的な統計資料を収録した統計書を編集刊行する。\n◆「住民基本台帳による世帯と人口」（地区別・町丁別）および「年齢別人口報告書」（男女別）の作成と公表（毎月）を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":87,"name":"統計調査員等確保対策","bureau":"地域振興部","dept":"地域活動課","budget":79,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆各種統計調査を円滑に実施するため、統計調査員・指導員を確保し、その資質の向上を図る。\n【概要】 \n◆統計調査員希望者の選考、登録、抹消\n◆講習会の実施（年1回）\n◆統計調査員の名簿管理、表彰管理","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":88,"name":"学校基本調査","bureau":"地域振興部","dept":"地域活動課","budget":31,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆学校に関する基本的事項を調査し、学校教育行政上の基本資料を得る。\n【概要】\n◆統計法第2条第4項に基づく基幹統計調査として、文部科学省が毎年実施する統計調査\n◆調査対象：区・私立幼稚園、小学校、中学校、義務教育学校、高等学校、特別支援学校、専修学校、各種学校\n◆対象件数：93校（私立37校、公立56校）\n◆調査期日：5月1日\n◆調査内容：名称、所在地、学級、教員職員数、児童生徒の状況等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":89,"name":"建設工事統計調査","bureau":"地域振興部","dept":"地域活動課","budget":537,"next_budget":0,"root":"","cls":"","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n◆建設工事および建設業・活動内容の実態を明らかにすることにより、我が国の経済・社会政策、建設行政、建設業者の育成指導等の基礎資\n料として活用する。\n【概要】\n◆統計法第2条第4項に基づく基幹統計調査として、国土交通省が毎年実施する統計調査\n◆調査種類：①建設工事受注動態統計調査、②建設工事施工統計調査\n◆調査対象：建設業許可業者から抽出された事業所・事業者\n◆対象件数：①80件、②480件\n◆調査期日：①毎月末日、②7月1日\n◆調査内容：①建設工事受注動向とその詳細、②1年間に施工した建設工事の完成工事高等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":90,"name":"経済センサス調査区管理","bureau":"地域振興部","dept":"地域活動課","budget":24,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆平成21年経済センサス基礎調査において設定した調査区を、今後の経済センサス調査区として管理し、必要な修正を行うことにより、事業\n所または企業を対象とする各種統計調査実施の基礎資料として利用に供する。\n【概要】\n◆平成21年経済センサス基礎調査以降に、境界変更や大規模な区画整理等により調査の実施に著しい支障を来たす事象が生じた場合、調査区\n地図等を修正し調査区台帳の修正情報を作成する。また、調査区内の住所情報が変更した場合、調査区台帳の修正情報を作成する。\n◆周期：毎年\n◆主管：総務省・経済産業省","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":91,"name":"区民活動交流施設運営費","bureau":"地域振興部","dept":"地域活動課","budget":85576,"next_budget":0,"root":"","cls":"誰もがつながる魅力ある地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆既存の旧八潮南小学校跡を区民活動交流施設（こみゅにてぃぷらざ八潮）として有効活用し、地域住民のみならず、多世代にわたる幅広い\n区民が文化芸術・スポーツやレクリエーション活動および地域活動の推進ならびに協働等の振興を通じ、ふれあいや交流を促進することで八\n潮地域の活性化を図る。\n\n【施設概要】\n◆地域交流室、多目的室、講習室、講習和室、パソコン講習室、音楽室、美術工芸室、健康増進室、託児室、スポーツ室、グラウンド、活動\n拠点室、交流スペース","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":92,"name":"国勢調査調査区設定","bureau":"地域振興部","dept":"地域活動課","budget":597,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆令和6年国勢調査調査区設定に先立ち、調査区についての確認作業を行うほか、東京都が主催する事務説明会へ出席する。\n【概要】\n◆統計法第2条第4項に基づく基幹統計調査の基礎として、総務省が実施する調査区設定\n◆設定周期：5年\n◆設定対象：区内全域\n◆設定期日：令和6年10月1日\n◆調査期日：令和7年10月1日","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":93,"name":"全国家計構造調査","bureau":"地域振興部","dept":"地域活動課","budget":1033,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆家計の実態を調査し、地域別の世帯所得分布、消費の水準および構造等に関する基礎資料を得る。\n【概要】\n◆統計法第2条第4項に基づく基幹統計調査として、総務省が実施する統計調査\n◆調査周期：5年\n◆調査対象：二人以上の世帯及び単身世帯\n◆調査件数：48世帯（二人以上の世帯40世帯　単身世帯8世帯）\n◆調査期日：10月1日\n◆調査内容：基本調査（24世帯）世帯の基本情報を回答する「世帯票」、年収や資産等について回答する「年収・貯蓄等調査票」、\n　　　　　　　　　　　　　　　日々の家計の収支を回答する「家計簿」\n　　　　　　簡易調査（24世帯）世帯の基本情報を回答する「世帯票」、年収や資産等について回答する「年収・貯蓄等調査票」","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":94,"name":"農林業センサス","bureau":"地域振興部","dept":"地域活動課","budget":231,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆我が国の農林業の実態を明らかにし、農林業行政に係る諸施策および農林業に関する各種基礎資料を整備する。\n【概要】\n◆調査対象：経営耕地面積が30a以上の規模の農林経営者および保有山林面積3ha以上の林業経営者等\n◆調査周期：5年\n◆設定区数：11調査区\n◆対象件数：160件\n◆調査期日：2月1日\n◆調査内容：経営形態や世帯の状況、労働力、土地、農業生産、農産物の販売・受託等","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":95,"name":"戸籍届出・証明事務費","bureau":"地域振興部","dept":"戸籍住民課","budget":228048,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆戸籍法第1条第2項の規定に基づく法定受託事務として、国民の親族的な身分関係を登録・公証し、併せて日本国籍を有することを間接的に\n証明するための唯一の公簿である戸籍原本等を整備する。\n◆戸籍に登録されている身分関係を公に証明するため、戸籍証明等を交付する。また、人の資格制限等の各種証明事務と選挙人名簿の調製事\n務を行うため既決犯罪人名簿の調製整備を行う。\n【概要】　\n◆民法、国籍法等の規定により成立する人の身分関係について、関係者からの各種届出等に基づき、戸籍原本に時間的序列に従って記録・登\n録する。なお、戸籍事務へのマイナンバー制度の導入や振り仮名法制化など、制度改正への各種対応を実施する。\n◆戸籍届出関連事務として埋火葬許可証の交付や人口動態調査を実施している。\n◆戸籍証明の交付に関する事務（窓口および郵送、コンビニ交付、キャッシュレスオンライン請求）\n◆身分証明および資格照会（選挙管理委員会への通知、民刑・後見登記等に関する登録照会事務）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":96,"name":"住民基本台帳事務費","bureau":"地域振興部","dept":"戸籍住民課","budget":95135,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆戸籍と住民基本台帳の記載を関連付けて、住民の居住関係の公証等、記録の正確性を確保する。また、全国共通のシステムの運用により、\n行政の合理化と住民の利便性を増進しサービスの向上を図る。\n【概要】\n◆住民基本台帳事務関係\n　転入・転出・転居・世帯の変更等の届出に関する事務および関係市区町村への通知事務\n　各種届出および戸籍の変動等に基づく通知による住民票の記録および修正事務\n◆住民基本台帳に関する証明事務\n　住民票の写し等の交付事務\n◆住民基本台帳ネットワークシステム関係\n　本人確認情報の行政機関への提供、住民票の写しの広域交付、転出転入の窓口手続きの簡素化、公的個人認証","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":97,"name":"中長期在留者関係事務費","bureau":"地域振興部","dept":"戸籍住民課","budget":62,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆中長期在留者等の住居地届出受理等の事務を適正・円滑に遂行し、在留外国人の公正な管理に資することを目的とする。\n【概要】\n◆中長期在留者および特別永住者の住居地届出に関する事務\n◆特別永住者証明書交付に関する事務\n◆特別永住許可事務","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":98,"name":"印鑑登録証明事務費","bureau":"地域振興部","dept":"戸籍住民課","budget":1898,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"法定受託事務・法定扶助費等","gai":"","legal":"","law":"","desc":"【目的】\n◆印鑑の登録および証明に関する事務が、正確かつ迅速に処理され住民の利便を増進するとともに、取引の安全に寄与する。\n【概要】\n◆印鑑登録申請等の受理\n◆印鑑登録証の交付\n◆印鑑登録証明書の交付","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":99,"name":"住居表示管理事務費","bureau":"地域振興部","dept":"戸籍住民課","budget":4920,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆住居表示制度の実施により、区民および来訪者の利便性向上を図る。\n【概要】\n◆住居番号の付定事務\n◆街区案内板の板面書替、支柱取替および支柱塗装\n◆街区案内板の清掃\n◆住居表示変更証明書の交付","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":100,"name":"行政サービスコーナー経費","bureau":"地域振興部","dept":"戸籍住民課","budget":35674,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆駅ビルや駅前に行政サービスコーナーを開設し、区民に身近な場所で証明書発行等のサービスを提供する。\n【概要】\n◆場所　①大井町サービスコーナー：大井町駅ビル1階　規模53.4㎡（平成5年4月7日開設）\n　　　　②目黒サービスコーナー：目黒セントラルスクエア1階　規模111.34㎡（平成30年4月7日開設）\n◆取扱時間　月曜日～金曜日　午前8時～午後7時　土曜日・日曜日・振替休日　午前10時～午後3時　休日：国民の祝日、年末年始\n◆取扱業務　①住民票の写し・住民票記載事項証明　②印鑑登録証明書\n　　　　　　③戸籍全部（個人）事項証明書・除籍全部（個人）事項証明書・平成改製原戸籍謄抄本・戸籍の附票、身分証明書\n　　　　　　④③の広域交付（令和6年3月開始）\n　　　　　　⑤マイナンバーカード交付業務（目黒サービスコーナーのみ）\n　　　　　　⑥図書取次サービス（予約した図書等の貸出しと品川区立図書館所蔵の図書等の返却）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":101,"name":"個人番号カード経費","bureau":"地域振興部","dept":"戸籍住民課","budget":108154,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民一人一人に個人番号を付番することにより、複数の機関に存在する特定の個人情報が同一人の情報であるということの確認を行い、社\n会保障・税制度の効率性や透明性を高めるとともに、区民の利便性の向上を図る。 \n【概要】\n◆番号法による区市町村の法定受託事務として、以下の事務を実施する。\n　個人番号の付番・通知、個人番号カードの交付、電子証明書の更新、区民へのＰＲ等\n◆未申請の区民に対し、申請を勧奨する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":102,"name":"区民斎場運営費","bureau":"地域振興部","dept":"戸籍住民課","budget":34130,"next_budget":0,"root":"","cls":"","ev":"D 完了・廃止する事業","ev_detail":"事業の廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区民が人生最終の儀式を執り行うのに相応しい「区民斎場」を提供する。\n【施設概要】\nなぎさ会館（勝島3-1-3）（平成4年4月18日開館）\n◆敷地面積：1,050㎡　◆総延床面積：1,294㎡（3階建）\n◆式場　　　：磯風の間・千鳥の間（2式場　定員各60名）\n◆会葬者控室：磯風の間・千鳥の間（2部屋　定員各36名）\n◆家族控室　：磯風の間・千鳥の間（2式場　各6畳）\n◆式師控室　：磯風の間・千鳥の間（2式場　各3畳）\n【使用料】\n◆65,000円","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":103,"name":"臨海斎場運営費","bureau":"地域振興部","dept":"戸籍住民課","budget":33905,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】　\n◆高齢化社会の進展に伴い、引き続き増加する火葬需要に対応するため、組織区5区（品川、港、目黒、大田、世田谷）の負担金により、火\n葬場及び葬儀式場の管理運営を行う。また、「臨海斎場施設整備基本方針」に基づき、既存施設の修繕・更新とともに、火葬場及び葬儀式場\nの増設を計画的に進める（増設施設の運用は2030年度開始予定）。 　\n【施設概要】\n◆所在地　　　大田区東海1丁目3番1号\n◆施設概要　　火葬場（火葬炉8基）、葬儀式場（式場4室）　　　\n◆用地面積　　22,500㎡　　　\n◆事業主体　　臨海部広域斎場組合　　　\n◆事業開始　　平成16年1月15日","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":104,"name":"おくやみコーナー経費","bureau":"地域振興部","dept":"戸籍住民課","budget":7760,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆遺族の方が行う役所内での手続きを一括で行える窓口を設置し、区民の負担軽減を図る。\n【概要】\n◆DX等を活用し、各所管との調整を行うことでワンストップ型の窓口を運営する。\n◆受付は予約制とし、窓口や予約業務は東京都行政書士会品川支部が請け負う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":105,"name":"戸籍住民関係事務費","bureau":"地域振興部","dept":"戸籍住民課","budget":63302,"next_budget":0,"root":"","cls":"","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆戸籍住民課内の事業横断的なサービスの向上を図る。\n◆Ｗｅｂカメラを利用することで地域センター窓口業務全般の資料を本庁職員が確認し、対応時間の短縮を図る。\n【概要】\n◆受付案内システムの運用管理・フロアマネージャーの配置・郵便仕分け業務\n◆地域センター職員単独での対応が困難なケースを戸籍住民課職員がサポートする。撮影された持参資料や本庁から掲示する資料にコメント\nやマークなどを施し、モニター表示しながら説明する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":106,"name":"中小企業センター運営費","bureau":"地域振興部","dept":"地域産業振興課","budget":137934,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の中小企業の振興および中小企業勤労者の福利厚生面の援助を行うため、中小企業センターの運営と維持管理を行う。\n【概要】\n◆中小企業センターの運営・維持管理\n　一般貸出施設（講習室、会議室、レクリエーションホール等）および体育施設（スポーツ室等）の貸し出しを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":107,"name":"伝統的産業の振興","bureau":"地域振興部","dept":"地域産業振興課","budget":6756,"next_budget":0,"root":"","cls":"伝統・文化を継承し親しむ環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の伝統的産業を広く紹介し、伝統工芸の振興発展を図る。\n【概要】\n◆品川区立中小企業センター1階ロビーにおける伝統工芸品常設展示　\n◆品川区伝統工芸保存会会員による実演および体験　\n◆伝統工芸ふれあい教室　　\n◆「伝統の技と味しながわ」展　　　\n◆販路拡大助成","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":108,"name":"産業振興事業助成金","bureau":"地域振興部","dept":"地域産業振興課","budget":10400,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"◆品川区商店街連合会、品川区商店街振興組合連合会、品川区公衆浴場商業協同組合、一般社団法人品川産業協会の各団体の振興発展のため\nに実施する事業に対し、補助金を交付する。\n\n効率性\n◆各団体とも会費収入および区からの補助金を財源として、予算計画に沿った事業が実施されている。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":109,"name":"勤労者福利厚生事業","bureau":"地域振興部","dept":"地域産業振興課","budget":38739,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆中小企業に働く勤労者の余暇の活用と勤労意欲の増進を図る。\n【概要】\n◆品川区勤労者共済会の円滑な運営を促進するために、経費の一部を補助し、勤労者福祉の増進に資する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":110,"name":"産学連携推進事業","bureau":"地域振興部","dept":"地域産業振興課","budget":4146,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内中小企業と都立産業技術高等専門学校等との産学連携の取組みを推進し、区内企業の製品・技術開発の強化を図る。\n【概要】\n◆都立産技高専連携事業\n製品・技術開発の強化を図るための高専教員による技術指導の実施および若手技術者向けの講座を開催する。\n◆産学連携開発支援助成\n区内企業による大学との共同研究等にかかる経費の一部を助成する。\n◆都立産業技術研究センター利用料等助成\n区内企業が産技研等の各種サービス（機器利用等）を利用した際に係る経費の一部を助成する。\n◆産学連携情報交流会\n区内企業が大学等を訪問し、産学連携担当や教授等との情報交流、施設見学等、産学連携促進を目的とした交流会を開催する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":111,"name":"創業支援センター等運営費","bureau":"地域振興部","dept":"地域産業振興課","budget":204724,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内で新規開業を希望する事業者・スタートアップ企業・個人に、優れた立地環境での創業場所を提供することにより、区内産業の活性化\nを図ることを目的とする。また、区内既存製造業者等が第二創業（分社化・新部門創設等）を展開するための拠点を整備し、中堅製造業者等\nの経営意欲の高揚と経営革新を促進する。\n【概要】\n①西大井創業支援センターの運営（平成15年度～）\n②天王洲創業支援センターの運営（平成17年度～）\n③武蔵小山創業支援センターの運営（平成22年度～）\n④広町工場アパートの運営（工場部分：平成4年度～　事務室部分：平成21年度～）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":112,"name":"品川産業支援交流施設経費","bureau":"地域振興部","dept":"地域産業振興課","budget":65719,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆企業の事業拡張および新たな事業の創出を支援し、ならびに企業間の交流を促進するとともに、区民の地域活動を推進し、区の地域産業の\n活性化を図ることを目的とする。\n【概要】\n◆品川産業支援交流施設ＳＨＩＰの運営（平成27年度～）\n　・3階　大崎ブライトコアホール\n　・4階　オープンラウンジ、多目的ルーム、会議室（第1～3）、オフィス、工房","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":113,"name":"品川ビジネスクラブ助成金","bureau":"地域振興部","dept":"地域産業振興課","budget":30273,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆ビジネスクラブ定款にある、品川区内の産業団体の振興に寄与する財団となるべく、ネットワーキング形成、海外人材活用支援、創業・経\n営支援事業などを行っていく。\n【概要】\n◆品川ビジネスクラブ事業運営補助\n◆自主事業運営補助（ネットワーキングshinagawa事業、海外人材活用支援事業、創業・経営支援事業）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":114,"name":"五反田産業文化施設経費","bureau":"地域振興部","dept":"地域産業振興課","budget":150500,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区内企業等の発展および連携を推進するとともに、五反田地区におけるにぎわいのあるまちづくり創出に寄与する。\n【概要】\n◆事業主　　日本郵政不動産株式会社\n◆計画地　　品川区西五反田8-4-13（旧ゆうぽうと跡地）\n◆面積　　　敷地面積約6,700㎡、延床面積約69,000㎡\n◆利用用途　商業・ビジネス、音楽・演劇、会議・集会などの利用\n◆竣工　　　令和5年12月\n◆開業　　　令和6年5月\n◆貸出施設　イベントホール、ギャラリー（会議室）、エントランスロビー","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":115,"name":"就業支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":15562,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区就業センターにおいて、ハローワーク品川による就業相談・職業紹介と、品川区が講じている就業支援・雇用促進施策を一体的に実\n施し、地域住民の就労支援と区内企業の雇用促進を図る。\n【概要】\n◆品川区就業センター（平成23年度～）\n開設：平成24年3月26日\n所在地：品川区西品川1-28-3 中小企業センター1階\n◆就業相談・就業支援セミナー（平成25年度～）\n就業相談：月・金曜日　午前10時～午後5時（1回50分）、火～木曜日　午後1時～5時（1回50分）\n就業支援セミナー：年12回（女性向け：年6回、その他：年6回）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":116,"name":"就業関連団体支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":186840,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者の多様化する就業ニーズに対応するため、関連団体に対し運営経費の補助あるいは資金の貸し付けを行うことで、円滑な運営を支援\nする。\n【概要】\n◆サポしながわ（平成14年度～）\n（福）品川区社会福祉協議会が運営するおおむね55歳からの無料職業相談所「サポしながわ」の運営費を補助する。\n◆品川区シルバー人材センター支援事業（昭和52年度～）\n（公社）品川区シルバー人材センターの運営経費を補助する。また、運営資金を貸し付け、円滑な運営を支援する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":117,"name":"産業情報収集提供事業","bureau":"地域振興部","dept":"地域産業振興課","budget":34726,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆企業、産業関連団体、行政、金融機関等の情報を収集・一元化し、区内中小企業の経営上不可欠な情報を提供することにより、企業経営の\n安定と向上を支援する。\n【概要】\n◆しながわ産業ニュースの発行　　年5回区内中小企業に配布する。\n◆品川区中小企業景況調査　　　　四半期ごとに区内中小企業の景況を調査・報告する。\n◆中小企業支援サイト　　　　　　区が実施する産業支援メニューを掲載し、情報提供を通じて事業活動を支援する。\n◆産業実態調査・産業振興研究会　産業実態調査を実施しつつ、区の産業支援施策の方向性等を検討するための研究会を\n　　　　　　　　　　　　　　　　開催する。\n◆助成金自動診断システム　　　　区・国・都の助成金を検索することができるシステムを導入することで区内中小企業\n　　　　　　　　　　　　　　　　に適切な情報を提供する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":118,"name":"中小企業事業資金融資あっせん","bureau":"地域振興部","dept":"地域産業振興課","budget":1032067,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内中小事業者の事業経営に必要な資金の調達を容易にするとともに、負担の軽減を図る。\n【概要】\n◆区内中小企業が必要とする事業資金を低利で借り受けられるよう取扱金融機関に対し、区が融資あっ旋を行う。\n　①事業者の負担する利子の一部を区が負担する（利子補給）。\n　②融資実行の際、東京信用保証協会から事業者に対する債務保証が付された場合には、区が信用保証料を全額または一部を補助する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":119,"name":"経営支援セミナー運営費","bureau":"地域振興部","dept":"地域産業振興課","budget":983,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆産業構造の高度化に対応するため、企業経営のノウハウおよび小規模企業が生き残るために必要な経営戦略等に関する学習の場を設け、中\n小企業の経営を支援する。\n【概要】\n◆経営者セミナー（平成13年度～）\n◆中小企業等講習会講師派遣（平成13年度～）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":120,"name":"経営相談事業","bureau":"地域振興部","dept":"地域産業振興課","budget":40673,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆区内中小企業の育成と経営の安定を図るため、融資あっ旋や経営の改善、国際化対応、生産性の向上等について、専門相談員による適切な\n経営支援を行う。さらに個々の区内中小企業からの相談内容や実態に応じて、課題解決に向けた様々なアドバイスを行うため、各分野の専門\n家等であるビジネス・カタリストを区内中小企業へ派遣し、経営環境に応じた継続的かつ総合的な経営支援を行う。\n【概要】\n◆主な相談内容は以下のとおりである。\n　①相談事業：金融、経営、創業、企業法務、特許、海外ビジネス（国際化対応）、経理等\n　②経営診断：一般経営診断（随時実施）、創業支援資金フォロー診断\n　③企業活力コーディネーターの配置：産学公連携マネージャー等を会計年度任用職員として配置する。\n　④ビジネス・カタリスト（専門家）派遣事業：ビジネス・カタリストを派遣し、直面している課題等に対しアドバイスを行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":121,"name":"事業承継支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":15747,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆区内中小企業の多くが経営者の高齢化による後継者不足等に直面している現状を踏まえ、必要かつ効率的な事業承継支援策を実施し、世代\n交代の促進と区内経済の発展および雇用の維持・拡大を図る。\n【概要】\n◆事業承継支援事業\n　セミナー、個別支援（専門家派遣）、しながわ後継者塾、後継者塾Advanceコース、事業承継設備投資助成\n◆ものづくり企業地域共生推進事業\n　区内のものづくり企業と地域の共生を目的とした現工場の改修や一時移転等に係る費用のほか、住民受入環境の整備に係る費用の一部を助\n成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":122,"name":"雇用確保支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":50312,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆労働人口の減少やベテラン従業員の高齢化に伴う人手不足により、生産性・経営力の向上が課題となる中、テレワークや新たな休暇制度の\n導入等に係る専門家やコンサルタントの活用を支援し、中小企業における優秀な人材の確保・定着等につなげる。\n◆外国人材受け入れや技術者（エンジニア）不足に悩む製造業および情報通信業の人材確保に関する取組みを支援し、事業の継続・成長を支\n援する。\n【概要】\n◆魅力ある職場づくり支援事業　※令和5年度以前は「働き方改革推進事業」として実施\n◆エンジニア確保支援事業\n◆外国人材受入・定着支援事業\n◆モンゴル高専との科学技術交流事業","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":123,"name":"競争力強化支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":88275,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"A 拡大する事業","ev_detail":"対象・規模等の拡大","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の中小企業の新製品・新技術開発やＤＸ・デジタル技術の活用を支援することにより、下請け脱却や新たな産業構造への転換を促進す\nる。また、特許権の取得を支援することなどにより、区内中小企業の競争力強化を図る。\n【概要】\n◆新製品・新技術開発費助成（平成9年度～）\n◆ソフトウェア開発費助成（平成23年度～）\n◆ＩＳＯ認証取得費助成（平成9年度～）\n◆特許権取得費助成（平成23年度～）\n◆ＤＸ・デジタル技術活用推進事業（令和4年度～）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":124,"name":"販路拡大支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":148699,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内中小事業者が保有する高度技術や高付加価値製品の情報等を展示会・商談会など様々な手法で各方面にＰＲすることにより、個々の企\n業が持つ技術ブランド力の向上を目指すとともに、受発注機会増大・販路拡大の推進を図る。\n【概要】\n◆展示会出展費助成（国内：平成10年度～、海外：平成19年度～、オンライン：令和3年度～）\n◆品川パビリオン共同出展事業（平成21年度～）\n◆事業ＰＲ・販売促進支援助成事業（令和5年度～）\n◆新規事業展開支援事業（令和4年度～）\n◆ものづくり・IT商談会（平成23年度～）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":125,"name":"スタートアップ推進事業","bureau":"地域振興部","dept":"地域産業振興課","budget":52634,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆五反田バレーを中心として起業家およびスタートアップ企業の事業成長を支援することにより、区内産業の活性化を促進するとともに、情\n報通信業等の企業の区内集積を図る。\n【概要】\n①五反田バレー情報発信・ネットワークづくり支援事業(令和元年度～)\n②ITスタートアップ支援事業(令和2年度～)\n③スタートアップ企業向け専門家相談事業(令和4年度～)\n④スタートアップ・エコシステム推進事業(令和6年度～)","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":126,"name":"商店街振興事業","bureau":"地域振興部","dept":"地域産業振興課","budget":85599,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆商店街振興組合の設立指導および育成を通じて商店街の振興発展を図る。\n◆商店街が保有する装飾灯等の管理に要する経費の一部を助成し、安心・安全な街づくりに寄与する。\n◆商店街が抱える課題やニーズをエリアサポーターを通じて把握・解決につなげ、商店街活性化や商店街組織の立て直しを図る。\n【概要】\n◆商店街サポーター事業\n　区と商店街連合会（エリアサポーター）が連携し、エリアサポーターの伴走支援を通じ、商店街活動の課題やニーズの把握、商店街の組織\n活力の維持・向上を図る。 \n◆装飾灯維持管理費補助事業\n　商店街が所有する装飾灯、アーチ、アーケード内電灯の電気代を一部助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":127,"name":"商店街にぎわい創出事業","bureau":"地域振興部","dept":"地域産業振興課","budget":91907,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆商店街の持つ地域的な商業核および地域コミュニティの役割を支援することにより、地域社会に貢献する商店街の振興とにぎわいの創出を\n図る。\n【概要】\n◆イベント事業助成等（若手・女性支援事業助成、にぎわい事業助成等）\n　商店街等が実施するイベントに要する経費の一部を助成する。\n◆地域力向上事業　（住民生活サポート事業、感染症対策事業）\n　地域社会で商店街自らが住民生活を支えるための活動や、新型コロナウイルス感染症対策に要する経費の一部を助成する。\n◆区振連によるイベント事業資金貸付事業\n　区が区振連に無償貸付し、これを受けた区振連が商店街等に助成相当額を無償貸付する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":128,"name":"省エネルギー対策・業務改善設備更新助成金","bureau":"地域振興部","dept":"地域産業振興課","budget":270740,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"D 完了・廃止する事業","ev_detail":"事業の完了","gai":"","legal":"","law":"","desc":"【目的】\n◆エネルギー価格高騰の影響が長期化していることにより、安定的な事業活動の継続に困難をきたしている区内事業者を対象に、省エネル\nギー対策および業務改善に資する設備投資に対して助成を行うことにより、事業継続の下支えおよび区内経済の活性化を図る。\n【概要】\n◆省エネルギー対策および業務改善に資する業務用設備の購入費および設置工事費に対して、助成金を交付する（1事業者あたり上限80万\n円、助成率4/5）。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":129,"name":"商店街活性化推進事業","bureau":"地域振興部","dept":"地域産業振興課","budget":22780,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"B 継続する事業","ev_detail":"計画・規定どおり","gai":"","legal":"","law":"","desc":"【目的】\n◆商店街の施設環境の整備、販売促進活動の基盤整備、組織活動の強化等を推進する事業に係る経費の一部を助成することにより、商店街の\n活性化を図る。\n【概要】\n◆商店街活性化推進事業\n　施設整備、販売促進等の商店街活性化を図るための下記5つの事業に対し、経費の一部を助成する。\n　①施設を整備する事業（街路灯等）　②ＩＴ機能の強化を図るための事業（ホームページ等）\n　③顧客利便機能の強化を図るための事業（案内板等）　④コミュニティ機能の強化を図るための事業\n　⑤組織力、経営力の強化を図るための事業\n◆街路灯等小規模改修事業\n　商店街所有の街路灯、カラー舗装、アーケード、アーチの緊急修繕に要する経費の一部を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":130,"name":"商店街ステップ・アップ支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":14579,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆地域商圏や消費者ニーズの変化、デジタル技術の進展、後継者問題など、商店街をめぐる環境の変化と課題に対する様々な取組を支援す\nる。\n【概要】\n◆ホリデー・トレーニング事業\n　商店街の集客力向上および次代の商店街活動を担う人材育成を主な内容とするミニイベント等の活動を支援する。\n◆商店街情報発信事業\n　日本語または外国語による商店街の積極的な情報発信を支援する際の制作経費の一部を助成する。\n◆商店街サポーターによる商店街活動の支援\n　商店街のイベントや販売促進事業に協力する地域ボランティアや、日々の商店街運営に豊富な経験を有する商店街ＯＢ等の地域サポーター\nを派遣し、商店街活動を幅広く支援する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":131,"name":"商店街店舗支援事業","bureau":"地域振興部","dept":"地域産業振興課","budget":3095,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆商店街店舗が集客力強化のために取り組む共同出店や催事、ブランド開発等の活動経費を助成することにより、商店街の活性化を図る。\n【概要】\n◆商店街販路開拓支援事業\n　区内商店街に係る催事、ECサイトの開設等に対する支援を行うことにより、区内商店街およびその個店の新規顧客獲得や販路開拓に繋げ\nる。\n◆商店街ブランド開発支援事業\n　個店グループが商店街のブランド力向上を目的として共同開発する制作物およびその周知等に係る経費を補助することで、個店の育成およ\nび商店街の活性化を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":132,"name":"共通商品券普及促進事業","bureau":"地域振興部","dept":"地域産業振興課","budget":1098804,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆品川区商店街振興組合連合会が実施するプレミアム付商品券発行支援を通じて、地域経済および商業振興のカンフル剤とし、区民生活の下\n支えと区内経済の活性化を図る。\n【概要】\n◆品川区商店街振興組合連合会が発行するプレミアム付区内共通商品券のプレミアム分と事業経費を助成する。\n◆品川区内共通商品券の発行に当たり、資金決済に関する法律に基づく法務局への供託が必要となるため、品川区商店街振興組合連合会に無\n償貸付する。\n◆昨今の物価高騰等の深刻な影響を踏まえ、区内中小店舗でキャッシュレス決済を利用した際に20％分のポイント還元を行う。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":133,"name":"商店街連携推進事業","bureau":"地域振興部","dept":"地域産業振興課","budget":0,"next_budget":0,"root":"","cls":"地域の活力を高める産業の振興","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆商店街が様々な団体・組織と連携して行う事業に係る経費を助成することにより、新たなにぎわいの創出や変革を促し、商店街の活性化を\n図る。\n【概要】\n◆商店街企業連携推進事業助成\n　商店街・企業・商店街エリアサポーター（または専門家）が一緒に、商店街および企業にメリットのある形で最長3年程度の商店街活性化\nプランを作成し、その必要な事業経費の一部を助成する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":134,"name":"消費生活相談および支援","bureau":"地域振興部","dept":"地域産業振興課","budget":9209,"next_budget":0,"root":"","cls":"安全と安心を体感できる地域社会の実現","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆講座の開催等による消費者教育の提供を通じて、トラブル等の未然防止および自立した消費者の育成を進め、区民の消費生活の安定および\n向上を図る。また、人や社会・環境等に配慮した消費行動（エシカル消費）を幅広い年齢層に啓発することを通じて、持続可能な社会の実現\nおよびＳＤＧｓの推進を目指す。\n【概要】\n◆消費者一人ひとりが正しい知識を身につけ、消費者の権利を認識し、自立した消費者になるよう着実な育成を図る。\n◆契約をめぐる消費者トラブル・悪質な訪問販売等による被害の未然防止のための啓発活動を行う。\n◆地域の見守りネットワークの構築・消費者教育の推進により、消費者被害の早期発見と防止を図る。\n◆エシカル消費の普及に向けて、一般消費者に対し、イベントや講座などを通じて啓発し、ＳＤＧｓの推進に寄与する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":135,"name":"消費者センター運営費","bureau":"地域振興部","dept":"地域産業振興課","budget":1108,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆消費者トラブルへの相談業務や消費者教育を推進するための組織として、消費者センターの運営および専門スタッフの能力向上等を図る。\n◆表示に関する適正な指導および小売店の立入検査の実施等を着実に実施しつつ、消費者の利益や安全を守り、不測の損失や危害発生の防止\nを図る。\n【概要】\n◆国や都が実施する研修や事務連絡会議に消費生活相談員が受講・参加することで、消費生活相談員の資質の向上を図り、相談機能を充実さ\nせるほか、消費者問題に関する情報収集や様々な相談処理に役立てる。\n◆小売販売事業者が販売する商品には、国が定めた適正な品質表示や基準に適合した製品安全マークが義務付けられており、これらの表示の\nない商品の販売等がされていないことを立入検査で確認する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":136,"name":"観光資源整備事業","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":143357,"next_budget":0,"root":"","cls":"まちの魅力を活かした都市型観光の推進","ev":"C 改善・見直しする事業","ev_detail":"対象・規模等の見直し","gai":"","legal":"","law":"","desc":"【目的】\n◆区内の多彩で魅力ある観光資源を活用した「都市型観光」の展開により、来街者の増加とにぎわい創出を図る。\n【概要】\n◆観光関連団体との連携、支援により「オールしながわ」での観光振興・観光まちづくりを推進していく。\n◆しながわ観光の魅力である名所旧跡や水辺、公園、アクセスの良さなど多様なコンテンツを関係団体や自治体との連携イベント、ＰＲキャ\nラクターの活用等により付加価値を高めていく。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":137,"name":"観光情報発信事業","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":16067,"next_budget":0,"root":"","cls":"まちの魅力を活かした都市型観光の推進","ev":"C 改善・見直しする事業","ev_detail":"取組みの一部廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆来訪意欲が湧き、更新頻度が高く鮮度の良い情報を発信し、来訪者の増加を図る。\n◆区のイベント、スポット、商店等の多岐にわたる観光情報を様々な媒体を活用して幅広くＰＲする。\n【概要】\n◆観光に係る各種情報を取材し、サイトやＳＮＳ等の情報媒体で発信する。\n◆鉄道事業者と連携した観光ＰＲを行う。\n◆区内ゲストハウスを活用したツアーや羽田空港周辺自治体との連携事業を実施する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":138,"name":"観光サービス充実事業","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":77089,"next_budget":0,"root":"","cls":"まちの魅力を活かした都市型観光の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆しながわ観光の魅力を快適に触れ、楽しんでもらうためのサービス整備、観光案内所を中心とした地域ＰＲ環境およびコンテンツの構築を\n図る。\n【概要】\n◆パンフレットや観光大使による観光案内、観光案内所の整備や支援により、来訪者へのサービス環境を構築する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":139,"name":"フィルムコミッション事業","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":5600,"next_budget":0,"root":"","cls":"まちの魅力を活かした都市型観光の推進","ev":"D 完了・廃止する事業","ev_detail":"事業の廃止","gai":"","legal":"","law":"","desc":"【目的】\n◆映画やドラマ等の映像制作会社の撮影場所探しへの支援により、作品に区を登場させる。\n◆区が登場する作品のＰＲによりロケ地訪問を促す。　　\n【概要】\n◆映画やドラマ等の撮影事業者および作品の視聴者をターゲットとしたサイトに、ロケ地情報や区関連作品のコラム記事等を掲載する。\n◆区内ロケ地をＰＲすることにより、ロケ地訪問者の増加、新たな誘客スポットの創出を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":140,"name":"区民レクリエーション","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":4893,"next_budget":0,"root":"","cls":"伝統・文化を継承し親しむ環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民の活動団体を中心とした連盟等と共催事業を展開することで、区民の参加を促進して文化振興を図る。\n【概要】\n◆区民レクリエーション大会：区民の活動の活発化と参加の促進を図るため、将棋・囲碁・合唱等の連盟との共催により、春季・秋季大会を\n開催する。\n◆区民いけばな展：区民の活動の活発化と参加の促進を図るため、品川区華道茶道文化協会との共催により年1回開催する。\n◆品川区民コンサート：品川区民管弦楽団の演奏を広く区民の皆様に楽しんでいただく機会として、品川音楽文化協会との共催により年2回\n開催する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":141,"name":"各種団体支援","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":2464,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆生涯学習社会の実現を図るため、団体の自主的な活動を支援する。\n【概要】\n◆社会教育関係団体の登録：登録制度を設け、施設優先申込みや使用料の減免等、団体の育成と発展に資するために必要な支援を行う。\n◆講師謝礼助成：活動の充実を図るため、社会教育関係団体が行う学習会の講師謝礼の一部を区が負担する。\n◆区民プロデュース型講座：区民を中心とした団体が文化や環境問題、福祉等の内容で広く区民を対象に企画した講座・講演会の開催を支援\nする。\n◆生涯学習ボランティア保険：社会教育関係団体（少年少女）等の指導者・育成者などを対象に、保険料を負担する。\n◆生涯学習ハンドブックの作成：文化・スポーツ・生涯学習に関する事業を中心にまとめたガイドブックを作成することで区民の社会教育活\n動を支援する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":142,"name":"文化芸術・スポーツ活動支援事業","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":23865,"next_budget":0,"root":"","cls":"伝統・文化を継承し親しむ環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民が気軽に文化芸術に触れ親しむために、幅広いジャンルの文化芸術事業を展開する。\n◆文化芸術団体や文化芸術資源の可能性や魅力を引き出し、観光や福祉といった他の分野と連携しながら、魅力あるまちづくりや地域の活性\n化につなげる。\n◆伝統文化や伝統芸能を次世代へ継承・発展・普及させるため、それらに触れる機会創出の支援を行う。\n◆区民等の自主的な文化芸術活動およびスポーツ活動を促進する。\n【概要】\n◆文化芸術団体が主体的に事業を運営できるよう区内で実施する文化芸術イベントを支援する。\n◆日常に溶け込んだ「文化・芸術」「観光」「地域の力」などを結集した、まちぐるみの文化イベントを開催する。\n◆（公財）十四世六平太記念財団との共催事業である「能楽鑑賞会」に対して支援を行う。\n◆文化芸術およびスポーツ活動で優秀な成績をおさめた生徒・児童等を顕彰する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":143,"name":"品川区民芸術祭経費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":30250,"next_budget":0,"root":"","cls":"伝統・文化を継承し親しむ環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区にゆかりのある音楽家・芸術家の協力を得ながら、区民の誰もが気軽に参加・鑑賞でき、質の高い文化芸術に触れ親しむ機会を創出す\nる。\n【概要】\n◆公益財団法人品川文化振興事業団との共催事業として実施する。\n◆区民による書道・写真・絵画・手工芸・華道などの芸術作品を展示する「区民作品展」を実施する。\n◆区内で活動するアマチュアの文化芸術団体・サークル活動の発表の機会を設ける「区民参加イベント（しながわアマチュアステージ）」を\n実施する。\n◆区内の小・中・高生・大学生・社会人による日頃の活動発表および交流の機会として「ティーンズコンサート」を実施する。\n◆品川ゆかりのプロの団体や個人の協力を得て、区民の誰もが親しめるよう、特に良質で安価なコンサートなどを提供し、芸術祭を通して文\n化芸術に「触れ・親しみ・楽しむ」ことができる環境を作る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":144,"name":"品川文化振興事業団助成金","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":290130,"next_budget":0,"root":"","cls":"伝統・文化を継承し親しむ環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】　\n◆区民の高度で多様化した文化的要望に応えるとともに、文化の振興を通して、ゆとりと潤いのある地域社会づくりに寄与する。 \n【概要】\n◆地域で文化・芸術活動を行うアーティストの活動を支援するとともに、地域団体等との連携を図る。\n◆事業団情報紙ｉｎｆｏＣＵＲＩＡ（紙・電子）により区内文化・芸術活動を周知および発信する。\n◆区民に身近な施設において安価にてカルチャー講座を開設・運営し、区民の生涯学習の推進を図る。\n◆芸術団体および地域住民の発表の場として美術館を運営・提供し、芸術を身近に感じられる機会を提供する。\n◆落語や映画、バレエ、音楽など多彩なジャンルおよび、有名アーティストから区にゆかりのあるアーティストまで、幅広い出演者による文\n化・芸術公演を区民が安価で楽しむことができる環境を提供する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":145,"name":"文化活動関係事務費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":12033,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆文化観光戦略課における各種事務事業の執行上必要な事務用品等の整備を行い、各係の事務事業の円滑な執行を確保する。\n【概要】\n◆課内共通事務経費の管理を行う。\n①事務用品（文具・用紙代他）\n②全国人権・同和教育研究大会等、各種大会参加費および旅費","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":146,"name":"区民学習支援経費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":5870,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆学習のきっかけづくりとなるような幅広いジャンルの講座を実施し、行政課題への関心や郷土愛を育む。また、差別のない明るいまちづく\nりをめざし、人権差別（同和）問題の啓発を主軸に人権尊重教育の充実を図る。\n【概要】\n◆専門講座の実施　◆地域講座の実施　◆しながわ学の実施　◆しながわ塾の実施　◆パートナーシップ講座の実施　◆しながわ学びの杜特\n別講演会の実施　◆チャレンジ塾の実施　◆講座のインターネット配信の実施　◆人権啓発・社会同和教育講座Ⅰの実施　◆人権啓発・社会\n同和教育講座Ⅱの実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":147,"name":"シルバー大学","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":12509,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆高齢者がいきがいを持ち、心豊かな生活をおくれるよう、高齢者の学習事業を体系化し、同時に幅広い学習機会を提供する。\n【概要】\n◆ふれあいアカデミーの実施\n◆うるおい塾の実施\n◆生涯現役実現講座の実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":148,"name":"障害者の学習活動支援","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":7481,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区内在住の軽度の知的障害がある区民を対象に、集団活動をとおして生きる力・働く力を育て社会生活での自立の一助とする。\n　①仲間づくり　②社会性の育成　③余暇の活用　④生活技術の向上\n【概要】\n◆日曜サークル青年コースの実施\n◆日曜サークル自主コースの実施\n◆日曜サークル成人コースの実施","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":149,"name":"総合区民会館運営費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":299762,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民への文化・芸術促進事業展開、文化コミュニティ活動の振興および区民相互の文化活動の拠点としての場の提供を目的とし、品川区立\n総合区民会館（きゅりあん）を運営する。\n【内容】\n◆指定管理者による管理運営：多様化する区民の文化・コミュニティ活動に弾力的に対応し、高水準の利用者サービスを行うため、平成18年\n度から（財）品川文化振興事業団を指定管理者として管理運営を行わせている。（令和2年度に指定管理者候補者選定を行い、引き続き令和3\n年度から5年間管理運営を行わせる。）\n◆総合区民会館の区専有部分・駐車場・共用部分のビル管理委託および光熱水費など、大井町再開発ビル全体を総合的・効率的に管理するた\nめ、指定管理者を通して、（株）品川都市整備公社に一括管理委託している。\n【施設概要】\n◆敷地面積　約5,055㎡　延床面積　約41,655㎡　諸室　①大ホール1,074席　②小ホール336席　③その他（イベントホールなど）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":150,"name":"荏原平塚総合区民会館運営費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":191617,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆区民への文化・芸術およびスポーツ活動の促進事業展開、文化コミュニティ活動の振興および区民相互の文化活動拠点の提供を目的とし、\n品川区立荏原平塚総合区民会館（スクエア荏原）を運営する。\n【内容】\n◆指定管理者による管理運営：条例第12条の規定に基づき、多様化する区民の文化・コミュニティ活動に弾力的に対応し、高水準の利用者\nサービスを行うため、平成25年度から（公財）品川文化振興事業団を指定管理者として管理運営を行わせている。（令和5年度に指定管理者\nの更新を行い、引き続き令和9年度までの5年度間管理運営を行わせる。）\n【施設概要】\n敷地面積 約9,133㎡（区立平塚公園　約724㎡を含む）　延床面積 約8,723.79㎡\n◆諸室　①ひらつかホール　362席　　②イベントホール　457㎡　　③アリーナ　756㎡　　④その他(会議室・和室・スタジオ・喫茶室）","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":151,"name":"文化センター運営費","bureau":"文化観光スポーツ振興部","dept":"文化観光戦略課","budget":1059902,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆文化センター（5館：五反田、荏原、東品川、旗の台、南大井）を円滑に維持運営し、区民に文化・スポーツの場を提供する。\n\n【施設概要】\n◆五反田
