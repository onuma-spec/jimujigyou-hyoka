書館運営費","bureau":"教育委員会事務局","dept":"品川図書館","budget":544942,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆図書、記録その他必要な資料を収集・整理・保存して一般公衆の利用に供し、その教養、調査研究、レクリエーション等に資することを目\n的とする。\n【概要】\n◆区立図書館の地区館10館を束ねる中央館機能を有し、武蔵小山ならびに大崎駅西口の図書取次施設も運営する。また、戸籍住民課との連携\nにより、大井町駅および目黒駅の行政サービスコーナーでの予約図書の取次サービスを展開している。\n◆資料運搬巡回車で、各図書館、区立小中学校および義務教育学校図書館、行政サービスコーナー他を巡回し、資料等の配送を行っている。\nこれにより配送が迅速に行え、資料を早く利用者に提供できる体制を整えている。\n◆スマートフォンや自宅のパソコンで貸出・利用のできる電子図書館を導入している。\n◆品川区の歴史を知るうえで重要かつ経年劣化が進む貴重な地域資料をデジタル化し、「しながわデジタルアーカイブ」としてインターネッ\nトで公開している。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":639,"name":"地区図書館運営費","bureau":"教育委員会事務局","dept":"品川図書館","budget":874331,"next_budget":0,"root":"","cls":"学びとスポーツの楽しさが拡がる環境づくり","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆地域の誰もが気軽に利用できる、身近な「居場所」としての魅力ある図書館づくりを進める。\n【概要】\n◆区立図書館の地区図書館10館で指定管理者による運営を行い、地域の商店街や地元企業などと事業連携を図りながら各館で様々なサービス\nを展開する。\n◆高齢者福祉課や在宅介護支援センターと連携し、認知症カフェ※を5館（品川・荏原・八潮・五反田・大崎分館）で実施する。\n※認知症カフェ：認知症の人やその家族、地域の人が気軽に集い、介護福祉や医療の専門職へ相談したり、同じ境遇の人との相互交流を通し\nて、介護負担の軽減や、悩みの解消を図る交流の場\n◆「品川区子ども読書活動推進計画」により、ティーンズ世代（10代から青年期まで）の読書を充実させる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":640,"name":"学校図書館運営費","bureau":"教育委員会事務局","dept":"品川図書館","budget":119596,"next_budget":0,"root":"","cls":"未来を切り拓く学校教育の推進","ev":"C 改善・見直しする事業","ev_detail":"手法等の改善","gai":"","legal":"","law":"","desc":"【目的】\n◆学校が主体となって行う学校図書館の運営を、家庭・地域・公共図書館が連携して支援することで、学校図書館を活用した多様な学習活動\nの展開と子どもの読書活動の推進を図る。\n【概要】\n◆学校図書館の運営の補助にあたるスタッフの配置を民間委託で実施している。\n◆学校図書館の蔵書管理・貸出・返却・予約、公共図書館からの資料借用等の業務を、電算システムを利用して効率的に行う。\n◆公共図書館から学校図書館への資料の貸出に対応するため、品川図書館と各学校を巡回して資料を運搬する。\n◆学校図書館ボランティアに向けて、活動するための基礎知識の習得やスキルアップのための講座を開催する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":641,"name":"会計事務費","bureau":"会計管理室","dept":"会計管理室","budget":51681,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆会計事務を適正かつ円滑に執り行う。\n【概要】\n◆収入・支出の審査、公金の出納および保管、決算書その他財務帳票の調製等を行う。　\n◆物品の出納、区有財産の調査、備品の記録管理等を行う。\n◆用品制度を運営し、事務用品等を迅速、安価に各課へ提供する。\n◆区の契約の相手方となる事業者について経営状況の分析を行い、行政サービスの安定した提供を確保する。\n◆区の債権またはこれに係る延滞金を放棄する際に、第三者機関である債権管理審議会の意見を聞き、債権放棄についての適正を確保する。\n◆弁護士への債権管理に関する法律相談委託を実施し、債権管理の適正の確保および問題解決の迅速化を図る。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":642,"name":"公金取扱事務費","bureau":"会計管理室","dept":"会計管理室","budget":28794,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆公金の円滑な出納および適正な保管を行う。\n\n【内容】\n◆公金の円滑な出納のため、公金収納等の事務を指定金融機関に取り扱わせ、その手数料を支払う。\n◆公金の盗難、火災への損害等に備えるため、公金総合保険に加入する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":643,"name":"一時借入金利子","bureau":"会計管理室","dept":"会計管理室","budget":0,"next_budget":0,"root":"","cls":"健全財政を堅持する","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的・概要】\n◆歳計現金が一時不足の場合、指定金融機関から借り入れる。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":644,"name":"議会運営費","bureau":"区議会事務局","dept":"区議会事務局","budget":619873,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆二元代表制のもと議事機関としての機能を十分に発揮するため、円滑な会議開催を継続して行う。\n【概要】\n◆本会議、常任委員会、議会運営委員会、特別委員会、その他各種会議を運営し、議事機関としての議会活動を補佐する。\n◆会議の記録を作成し、事件の審議の過程・結果を記録するとともに区民等に情報提供する。\n◆区民の声を議会活動に反映させる議会報告会の開催について支援する。\n◆政務活動費を支給し、議会活動の活性化等に資する。\n◆正副議長の公務支援、議長会・議員関係団体の連絡調整等の業務を行う。\n◆議員に対する報酬、費用弁償の支給のほか、議会関係予算を適切に執行する。","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":645,"name":"図書室運営費","bureau":"区議会事務局","dept":"区議会事務局","budget":2113,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n　◆議会図書室整備や資料収集、調査等の実施により、議会や議員の調査活動の充実強化を図る。\n【概要】\n　◆図書の閲覧および貸出\n　◆図書の購入・保管等\n　　（議会関係図書の購入、法令集等の追録等）\n　◆議員からの調査回答","pdf":"令和7年度事務事業評価シート（全部局）"},{"no":646,"name":"議会広報費","bureau":"区議会事務局","dept":"区議会事務局","budget":54399,"next_budget":0,"root":"","cls":"","ev":"B 継続する事業","ev_detail":"現状維持","gai":"","legal":"","law":"","desc":"【目的】\n◆議会の活動状況を広く区民に周知することにより、議会への関心を喚起する。\n\n【概要】\n◆区議会だよりの発行〔年6回、定例会号、新年号、臨時会号〕※改選年のみ年7回発行（改選号追加）\n◆区議会だよりの配布〔各戸配布（定例会号 function fmt(y){
  if(y>=100000) return (y/100000).toFixed(1)+'億円';
  if(y>=1000)   return (y/1000).toFixed(1)+'百万円';
  return y+'千円';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rootCls(r){ return 'troot-'+r.split('/').join('-'); }

const state = {
  ratings: JSON.parse(localStorage.getItem('shinagawa7_ratings')||'{}'),
  filters: {bureau:'',root:'',pdf:'',gai:'',cls:'',ev:'',rating:''},
  screen: 'filter',
  queue: [],
  pos: 0,
};
function save(){ localStorage.setItem('shinagawa7_ratings', JSON.stringify(state.ratings)); }

function getFiltered(){
  return EVENTS.filter(e=>{
    if(state.filters.bureau && e.bureau!==state.filters.bureau) return false;
    if(state.filters.root   && e.root!==state.filters.root)     return false;
    if(state.filters.pdf    && e.pdf!==state.filters.pdf)       return false;
    if(state.filters.gai    && e.gai!==state.filters.gai)       return false;
    if(state.filters.cls    && e.cls!==state.filters.cls)       return false;
    if(state.filters.ev     && e.ev!==state.filters.ev)         return false;
    if(state.filters.rating==='未評価' && state.ratings[e.no]) return false;
    if(state.filters.rating && state.filters.rating!=='未評価' && state.ratings[e.no]!==state.filters.rating) return false;
    return true;
  });
}

function stats(evts){
  const k=evts.filter(e=>state.ratings[e.no]==='続行');
  const h=evts.filter(e=>state.ratings[e.no]==='廃止');
  const f=evts.filter(e=>state.ratings[e.no]==='見直し');
  const u=evts.filter(e=>!state.ratings[e.no]);
  const sum=a=>a.reduce((s,e)=>s+e.budget,0);
  return {k:{c:k.length,b:sum(k)},h:{c:h.length,b:sum(h)},f:{c:f.length,b:sum(f)},u:{c:u.length,b:sum(u)},
          total:{c:evts.length,b:sum(evts)}};
}

function setFilter(k,v){ state.filters[k]=v; if(state.screen==='filter') renderFilter(); }
function clearFilters(){ state.filters={bureau:'',root:'',pdf:'',gai:'',cls:'',ev:'',rating:''}; renderFilter(); }

function batchRate(r){
  getFiltered().forEach(e=>{ state.ratings[e.no]=r; });
  save(); renderFilter();
}

function startCards(){
  state.queue = getFiltered().map(e=>e.no);
  if(!state.queue.length){ alert('対象事業がありません'); return; }
  const first = state.queue.findIndex(n=>!state.ratings[n]);
  state.pos = first>=0 ? first : 0;
  state.screen='card'; render();
}

function rateCard(r){
  const no=state.queue[state.pos];
  if(!no) return;
  state.ratings[no]=r; save();
  if(state.pos < state.queue.length-1){ state.pos++; renderCard(); }
  else { renderCard(); }
}
function prevCard(){ if(state.pos>0){ state.pos--; renderCard(); } }
function nextCard(){ if(state.pos<state.queue.length-1){ state.pos++; renderCard(); } }
function showFilter(){ state.screen='filter'; render(); }
function showSummary(){ state.screen='summary'; render(); }
function resetAll(){ if(confirm('全評価をリセットしますか？')) { state.ratings={}; save(); render(); } }

function opts(key){ return [...new Set(EVENTS.map(e=>e[key]))].filter(Boolean).sort(); }
function selHtml(fkey,label,val){
  const os=opts(fkey).map(o=>`<option value="${esc(o)}"${val===o?' selected':''}>${esc(o)}</option>`).join('');
  const dis=os?'':'disabled';
  return `<select ${dis} title="${label}" onchange="setFilter('${fkey}',this.value)"><option value="">全ての${label}</option>${os}</select>`;
}

function rcls(no){ const r=state.ratings[no]; return r==='続行'?'rk':r==='廃止'?'rh':r==='見直し'?'rf':''; }
function rBtnCls(no,r){ const c=state.ratings[no]===r; return c?(r==='続行'?'ak':r==='廃止'?'ah':'af'):''; }
function rBtnDesc(no,r){
  const d={'続行':'活動内容と予算に納得','廃止':'活動内容に納得できない','見直し':'予算に納得できない'};
  return state.ratings[no]===r ? '◀ 選択中' : d[r];
}

// ============================================================
// Screen: フィルター
// ============================================================
function renderFilter(){
  const filtered=getFiltered();
  const st=stats(EVENTS), fs=stats(filtered);
  const hasFilter=Object.values(state.filters).some(Boolean);

  document.getElementById('app').innerHTML=`
<div class="hd">
  <h1>🏛 ${LABELS.tool_title}</h1>
  <div class="sub">令和7年度実施 事務事業評価 ${EVENTS.length}事業 ／ 総予算 ${fmt(st.total.b)}（R6決算 行政費用・人件費除く）</div>
  <div style="font-size:.75rem;color:#9ca3af;margin-top:4px">出典：<a href="${LABELS.source_url}" target="_blank" style="color:#9ca3af">令和7年度事務事業評価結果｜品川区</a></div>
</div>

<div class="sbar">
  <span class="sb sb-k">続行 ${st.k.c}件</span>
  <span class="sb sb-h">廃止 ${st.h.c}件・${fmt(st.h.b)}</span>
  <span class="sb sb-f">見直し ${st.f.c}件・${fmt(st.f.b)}</span>
  <span class="sb sb-u">未評価 ${st.u.c}件</span>
  ${st.k.c+st.h.c+st.f.c>0?`<button class="btn btn-sm btn-o" onclick="resetAll()" style="margin-left:auto">↺ リセット</button>`:''}
</div>

<div class="card">
  <div style="font-size:.85rem;font-weight:600;color:#374151;margin-bottom:8px">絞り込み</div>
  <div class="frow">
    ${selHtml('bureau',LABELS.bureau,state.filters.bureau)}
    ${selHtml('root','法的根拠',state.filters.root)}
    ${selHtml('pdf',LABELS.pdf_col,state.filters.pdf)}
    ${selHtml('gai','外部委託の可能性',state.filters.gai)}
    ${selHtml('cls',LABELS.cls,state.filters.cls)}
    ${selHtml('ev','行政評価',state.filters.ev)}
    <select title="評価結果" onchange="setFilter('rating',this.value)">
      <option value="">全ての評価結果</option>
      <option value="続行"${state.filters.rating==='続行'?' selected':''}>続行</option>
      <option value="廃止"${state.filters.rating==='廃止'?' selected':''}>廃止</option>
      <option value="見直し"${state.filters.rating==='見直し'?' selected':''}>見直し</option>
      <option value="未評価"${state.filters.rating==='未評価'?' selected':''}>未評価</option>
    </select>
  </div>
  <div class="fresult">
    対象: <strong>${filtered.length}件</strong> ／ ${fmt(fs.total.b)}
    ${hasFilter?`<button class="btn btn-sm btn-o" onclick="clearFilters()" style="margin-left:8px">✕ クリア</button>`:''}
  </div>
</div>

<div class="batch">
  <h3>一斉評価 — 上の絞り込み結果（${filtered.length}件）を一括設定</h3>
  <div class="bbtns">
    <button class="btn btn-k" onclick="batchRate('続行')">✓ 全部 続行</button>
    <button class="btn btn-h" onclick="batchRate('廃止')">✕ 全部 廃止</button>
    <button class="btn btn-f" onclick="batchRate('見直し')">△ 全部 見直し</button>
  </div>
</div>

<div style="display:flex;gap:10px;flex-wrap:wrap">
  <button class="btn btn-p" onclick="startCards()" style="flex:1">
    カード評価を始める → （${filtered.length}件）
  </button>
  <button class="btn btn-o" onclick="showSummary()">集計サマリー →</button>
</div>
${hasFilter?`<p style="font-size:.78rem;color:#9ca3af;margin-top:8px">※ フィルター適用中。カード評価はこの ${filtered.length} 件を表示します。</p>`:''}

<div class="card" style="margin-top:12px;background:#f9fafb;border:1px solid #e5e7eb">
  <div style="font-size:.8rem;color:#6b7280;line-height:1.7">
    ※ 法的根拠区分・根拠法令名は評価シートからの機械的判定が困難なため全件空欄としています。
  </div>
</div>`;
}

// ============================================================
// Screen: カード評価
// ============================================================
function renderCard(){
  const total=state.queue.length;
  const no=state.queue[state.pos];
  const ev=EVENTS.find(e=>e.no===no);
  if(!ev){ showFilter(); return; }

  const done=state.queue.filter(n=>state.ratings[n]).length;
  const pct=total>0?Math.round(done/total*100):0;
  const st=stats(EVENTS);
  const isLast=state.pos===total-1;
  const allDone=state.queue.every(n=>state.ratings[n]);

  document.getElementById('app').innerHTML=`
<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f3f4f6;overflow:hidden;z-index:10">
<div style="max-width:780px;margin:0 auto;height:100%;display:flex;flex-direction:column;padding:12px">

  <div style="flex-shrink:0">
    <div class="nstrip">
      <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
      <div style="flex:1;text-align:center">
        <div style="font-size:.75rem;font-weight:700;color:#1e40af">${LABELS.card_title}</div>
        <div class="sbar" style="margin:4px 0 0;justify-content:center">
          <span class="sb sb-k">続行 ${st.k.c}件</span>
          <span class="sb sb-h">廃止 ${st.h.c}件</span>
          <span class="sb sb-f">見直し ${st.f.c}件</span>
          <span class="sb sb-u">未評価 ${st.u.c}件</span>
        </div>
      </div>
      <button class="btn btn-sm btn-p" onclick="showSummary()">サマリー →</button>
    </div>
    <div style="font-size:.82rem;color:#6b7280;margin-bottom:6px">評価済み: ${done}/${total}件 (${pct}%)</div>
    <div class="pbwrap"><div class="pbfill" style="width:${pct}%"></div></div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:4px 0 8px">
    ${allDone?`<div class="done-msg"><h3>✓ この絞り込み結果（${total}件）の評価が完了しました</h3><button class="btn btn-p" onclick="showSummary()">集計サマリーを見る →</button></div>`:''}
    <div class="ecard ${rcls(no)}">
      <div class="tag-row">
        <div class="tag-item">
          <div class="tag-lbl">法的根拠</div>
          <span class="tag ${esc(rootCls(ev.root))}">${esc(ev.root)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">${LABELS.cls}</div>
          <span class="tag tcls">${esc(ev.cls)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">行政評価</div>
          <span class="tag tev">${esc(ev.ev)}</span>
        </div>
        <div class="tag-item">
          <div class="tag-lbl">${LABELS.pdf_col}</div>
          <span class="tag tpdf">${esc(ev.pdf)}</span>
        </div>
      </div>
      <div class="emeta"><span class="field-lbl">${LABELS.no_col}：</span>${esc(String(ev.no))}　<span class="field-lbl">所管：</span>${esc(ev.bureau)} ／ ${esc(ev.dept)}</div>
      <div class="ename">${esc(ev.name)}</div>
      <div class="ebudget">
        <div><span class="bdg-lbl">決算額（R6実績）：</span><span class="amt">${fmt(ev.budget)}</span></div>
        <div><span class="bdg-lbl">次年度予算（R7予算）：</span><span class="amt">${ev.next_budget?fmt(ev.next_budget):''}</span></div>
        <div style="font-size:.72rem;color:#9ca3af;margin-top:3px">${esc(LABELS.budget_note)}</div>
      </div>
      <div class="edesc"><h4>事業概要</h4><p>${esc(ev.desc)}</p></div>
      <div class="edetail">
        <div class="edi"><label>法的根拠区分：</label>${esc(ev.legal)}</div>
        <div class="edi"><label>根拠法令名：</label>${esc(ev.law)}</div>
        <div class="edi"><label>外部委託の可能性：</label>${esc(ev.gai)}</div>
        ${LABELS.ev_detail_col?`<div class="edi"><label>${LABELS.ev_detail_col}：</label>${esc(ev.ev_detail)}</div>`:''}
      </div>
      <a href="${LABELS.source_url}" target="_blank" class="btn btn-o" style="display:block;text-align:center;text-decoration:none;margin-bottom:8px">📄 評価シートを確認</a>
    </div>
  </div>

  <div style="flex-shrink:0;background:#f3f4f6;padding:10px 0 4px;border-top:1px solid #e5e7eb">
    <div class="rbtns">
      <button class="rbtn ${rBtnCls(no,'続行')}" onclick="rateCard('続行')">
        ✓ 続行<small>${rBtnDesc(no,'続行')}</small>
      </button>
      <button class="rbtn ${rBtnCls(no,'廃止')}" onclick="rateCard('廃止')">
        ✕ 廃止<small>${rBtnDesc(no,'廃止')}</small>
      </button>
      <button class="rbtn ${rBtnCls(no,'見直し')}" onclick="rateCard('見直し')">
        △ 見直し<small>${rBtnDesc(no,'見直し')}</small>
      </button>
    </div>
    <div class="nav">
      <button class="btn btn-sm btn-o" onclick="prevCard()" ${state.pos===0?'disabled':''}>◀ 前へ</button>
      <span class="cpos">${state.pos+1} / ${total}</span>
      <button class="btn btn-sm btn-o" onclick="nextCard()" ${isLast?'disabled':''}>次へ ▶</button>
    </div>
  </div>

</div>
</div>`;
}

// ============================================================
// Screen: サマリー
// ============================================================
function renderSummary(){
  const st=stats(EVENTS);
  const zokkoList  =EVENTS.filter(e=>state.ratings[e.no]==='続行');
  const haishiList =EVENTS.filter(e=>state.ratings[e.no]==='廃止');
  const minaoshiList=EVENTS.filter(e=>state.ratings[e.no]==='見直し');
  const mirateList =EVENTS.filter(e=>!state.ratings[e.no]);

  function tblRows(list){
    if(!list.length) return '<tr><td colspan="6" style="color:#9ca3af;text-align:center;padding:12px">（なし）</td></tr>';
    return list.map(e=>`<tr>
      <td style="white-space:nowrap">${esc(e.no)}</td>
      <td>${esc(e.name)}</td>
      <td style="white-space:nowrap">${esc(e.bureau)}</td>
      <td><span class="tag ${esc(rootCls(e.root))}" style="font-size:.68rem">${esc(e.root)}</span></td>
      <td><span class="tag tev" style="font-size:.68rem">${esc(e.ev)}</span></td>
      <td style="text-align:right;white-space:nowrap;font-weight:600">${fmt(e.budget)}</td>
    </tr>`).join('');
  }
  const thead=`<thead><tr><th>${LABELS.no_col}</th><th>事業名</th><th>${LABELS.bureau}</th><th>根拠</th><th>行政評価</th><th>予算</th></tr></thead>`;

  document.getElementById('app').innerHTML=`
<div class="nstrip">
  <button class="btn btn-sm btn-o" onclick="showFilter()">← フィルター</button>
  <h2>${LABELS.summary_title}</h2>
  <button class="btn btn-sm btn-p no-print" onclick="startCards()">評価を続ける</button>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px;justify-content:flex-end" class="no-print">
  <button class="btn btn-sm btn-o" onclick="downloadCsv()">📥 CSV出力</button>
  <button class="btn btn-sm btn-o" onclick="window.print()">🖨 印刷</button>
</div>

<p style="font-size:.82rem;color:#6b7280;margin-bottom:12px">
  続行 ${st.k.c}件 ｜ 廃止 ${st.h.c}件 ｜ 見直し ${st.f.c}件 ｜ 未評価 ${st.u.c}件（合計${EVENTS.length}件）
</p>

<div class="kgrid">
  <div class="kbox kk">
    <div class="klbl">✓ 続行</div>
    <div class="knum">${st.k.c}件</div>
    <div class="kbdg">${fmt(st.k.b)}</div>
  </div>
  <div class="kbox kh">
    <div class="klbl">✕ 廃止</div>
    <div class="knum">${st.h.c}件</div>
    <div class="kbdg">${fmt(st.h.b)}</div>
  </div>
  <div class="kbox kf">
    <div class="klbl">△ 見直し</div>
    <div class="knum">${st.f.c}件</div>
    <div class="kbdg">${fmt(st.f.b)}</div>
  </div>
  <div class="kbox ku">
    <div class="klbl">— 未評価</div>
    <div class="knum">${st.u.c}件</div>
    <div class="kbdg">${fmt(st.u.b)}</div>
  </div>
</div>

<details class="ssec" ${st.k.c?'open':''}>
  <summary>✓ 続行一覧 <span style="color:#059669">${st.k.c}件・${fmt(st.k.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(zokkoList)}</tbody></table></div>
</details>

<details class="ssec" ${st.h.c?'open':''}>
  <summary>✕ 廃止一覧 <span style="color:#dc2626">${st.h.c}件・${fmt(st.h.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(haishiList)}</tbody></table></div>
</details>

<details class="ssec" ${st.f.c?'open':''}>
  <summary>△ 見直し一覧 <span style="color:#d97706">${st.f.c}件・${fmt(st.f.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(minaoshiList)}</tbody></table></div>
</details>

<details class="ssec">
  <summary>— 未評価一覧 <span style="color:#6b7280">${st.u.c}件・${fmt(st.u.b)}</span></summary>
  <div style="overflow-x:auto"><table class="stbl">${thead}<tbody>${tblRows(mirateList)}</tbody></table></div>
</details>

<p class="note">
  ※ 評価結果はこのブラウザのローカルストレージに保存されます（ページを閉じても残ります）。<br>
  ※ 予算額はR6決算の行政費用（人件費除く）です。<br>
  ※ 法的根拠区分・根拠法令名は評価シートからの機械的判定が困難なため全件空欄としています。<br>
  出典：<a href="${LABELS.source_url}" target="_blank">令和7年度事務事業評価結果｜品川区</a>
</p>`;
}

// CSV出力
function downloadCsv(){
  const BOM = '\uFEFF';
  const edCol = LABELS.ev_detail_col || '評価詳細';
  const header = [LABELS.no_col,'事業名',LABELS.bureau,LABELS.dept,LABELS.budget_col,LABELS.next_col,'法的根拠','法的根拠区分','根拠法令名','外部委託の可能性',LABELS.cls,'今後の方向性',edCol,LABELS.pdf_col,'事業概要','評価結果'];
  const rows = EVENTS.map(e=>[
    e.no, e.name, e.bureau, e.dept, e.budget, e.next_budget,
    e.root, e.legal, e.law, e.gai, e.cls, e.ev,
    e.ev_detail,
    e.pdf, e.desc,
    state.ratings[e.no]||'未評価'
  ]);
  const csv = BOM+[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = LABELS.csv_filename;
  a.click();
}

function render(){
  if(state.screen==='filter') renderFilter();
  else if(state.screen==='card') renderCard();
  else if(state.screen==='summary') renderSummary();
}
render();

</script>
</body>
</html>
